body:
  text: 儼山續集巻六明陸深撰七言律詩三十一首送皇甫子循謫黄州推官雪堂舊路君重到赤壁文章五百年一向東曺分郡檄却從南斗望台躔流塵逺道征袍上宿雨清秋客鬢前明發大江過夏口中流應有濟川船華侍讀鴻山以紅氊紵靴相贈奉謝紫氊絲履慰新寒扈從秋陵路㡬盤飛舄空傳雲外到舞䄄不數掌中看著來紅軟身先徤卧對青山夢亦安情似綈袍人似玉滿懷瓊玖報應難劉都閫以紅花本見貽才賞名花當送春移根西向伴吟身為誰池舘能憐舊到手風光又斬新謝令空題紅芍藥杜陵偏感白頭人公庭事簡餘芳草留取青枝襯綠茵秋初望西山有霧氣如雪偶成日照西巖曉霧封恍然遥對雪山峯奔波十載有萬里雲水半生知㡬重天上樓臺新雨候長安風物早秋容長趨舘閣慚無補日近烟霄五色龍送劉甥兆元㑹試天南春色探支來逺送魁春折早梅江上形容吾老矣望中臺閣子行㢤科名莫以文章小甲第須掄將相才記得當年塗抹處黄金城闕杏花開自睢陽入梁有懷何鴈峯憲副雲間遂作三秋别濠上相為一宿淹人世百年悲喜共客程千里雨晴兼棠隂鶴乳思方去玉節金符令更嚴後夜梁園回首望鼓城山月水晶簾送王禮侍思獻册封八座清嚴玉署寒新持龍節下雲端分封典禮存周制奉使威儀覩漢官南斗文星占氣象北堂萱草慰平安還朝正築沙堤路看草黄麻墨未乾次韻徐登州留别相看把袂又微曛春燕秋鴻各戀羣江上不題鸚鵡賦潮州應少鱷魚文先皇賜第恩如海五袴歌聲響入雲一枉朱轓更東去行春空谷馬蹄聞送劉徳徴赴䕫州昔從䕫府望京華今去江南萬里賖亦有詩篇如杜甫莫因辭賦弔長沙人從五馬憐春色地接三巴切暮笳天子正思甦逺郡長城時見倚雲斜利路紀雨八首自廣元至栢林驛適久旱得雨口占識喜甘棠實恐負初心時雨何期更作霖行處萬山驚簿暮望中一片見濃隂飛揚豈為催詩急飄灑終憐潤物深安有隨車方往轍虚煩父老沸佳音抵保寧是夜雷雨大作明復晴霽出謁文廟遂由城北門過社稷壇轉入西門禮城隍神拜張桓侯墓復出南門觀浮橋廢置乃自東門還分司疊韻慰却三農渴望心通宵霑潤己成霖客盤鳥道清新暑雲䕶龍湫散逺隂暘雨極知天意厚節調空感國恩深蜀川花鳥今無數隔葉鳴鳩多好音自大寜至瀘溪館小憇復有雨意遂再疊韻瀘溪巳入順慶之境以未忘閔雨故附之利路云兼程計日竟何心聊慰蒼生久望霖疊疊溪山千里道蕭蕭竹樹萬家隂閒看行蟻占遲蚤試䇿新秧問淺深五月南來多淑氣併將風雨佐虞音自射洪適梓州雨候同栢林驛三疊人心盡處合天心消得巴渝三日霖自信本來調水旱却緣底事怨晴隂雲封蜀道千山重江到瞿塘萬里深舊是吾家歌吹海放翁帥蜀有十年歌吹海之詩買教絃管續餘音午後微雨明早發中江新漲壞橋拿舟而渡始知四郊得雨甚渥四疊泉聲曲曲度江心知是前山已化霖巫峽風烟天漠漠巴渝歌舞曉隂隂春回䆉稏連村合凉沁芭蕉到骨深聖主中興多法古宣王雲漢有遺音予卜以六月十一日履任六日到省中諸公憂旱甚勤九日晨入撫院遇雨未愜十日雨如傾注未巳喜而五疊飄蕭竹樹動鄉心却是西川雨釀霖水繞巴江流漸長雲來巫峽氣常隂不妨栢溜參天下復愛棠棲隱地深欲為吾民歌帝力陽春白雪有餘音十日晩同朱秋崖憲副鄭海灣少參同齋夜分禮成星月朗然厥明有事公堂小宴時得雨六疊好雨知時慰客心須將滴滴比甘霖紫薇花下凉先動翠栢叢中曉更隂賦就漫誇神女麗夢回巳感聖君深遥憐谷口躬耕處試聴康衢擊壤音十二日復得雨大足七疊浪博虚名愧此心真成三日雨為霖谿聲一夜喧新漲雲氣千峯結晩隂喜極翻嫌歌管脆病餘渾怯酒杯深窓前最愛芭蕉響疑有人傳太古音送徐伯臣出令奉化徐卿家世更能文新綰銀章下五雲龍種擬看空冀北牛刀聊復試雞羣氣横湖海神仙侶坐擁江山錦繡紋欲向風霜占大節却從氷蘗樹竒勲送王世羙赴承天寫碑江漢星分本上游中天一統帝王州時曕王氣蟠龍虎實有文光貫斗牛詞客曉從三殿下筆端人擬五雲留丹青琬琰俱能事延攬登臨總勝遊十一月二十日次太平驛見梅花和謝僉憲邦正壁間韻山雲黯黯復㝠㝠釀雪為霖總未成忽見梅花如着意即看詩草可憐生月來粉蝶渾無影風度黄昏似有聲況與嵗寒期更早玉人消息最分明次韻荅介谿志榮遇之感風雲常䕶六龍行慚愧恩題翰學名碧漢遥憐通閣道弱流元不隔蓬瀛尚餘忠赤供趨向豈有文章佐聖眀幸傍紫垣占象緯㤗階平處玉為衡次韻荅霍渭厓西望遥山紫翠鋪篷壺瓊島切清都仙才何用東求海王㑹仍須繪作圗金榜日髙懸五鳯玉河水滿浴雙鳧遭逢若論恩波闊憶向瀟湘萬頃湖送鄒東郭學士赴南院手綰銅章白玉堂天南星斗避文光清華官府真仙界佳麗江山舊帝鄉擲地賦聲添紙價傳心書法長秋陽河堤待築還朝路雙闕天連一水長南還途中有作是日長至兩日出城重作客一年長至馬蹄中履霜夜展東陵祀到海山迴萬里風平望嵗華揺御柳南來王氣滿珠宮何人寒谷能吹律正見祥雲映日紅潞河候水次張石川韻心同野鶴恣髙飛學得屠龍與願違魂夢九天雙鳯闕江湖滿地一漁磯安身已辦烏皮几稱體新裁白苧衣頼有河邊同載客不應林下見猶稀和荅陶南川兵侍片雲將雨過西山望斷東歸水上灣海近似聞龍卧起天髙不礙鶴飛還桓公老去琅琊樹白傅歸來洛社間更遣餘工擬叢桂案頭湘管紫琳斑青羊宮餞顧頥齋即事青羊翠栢白雲阿又是春風一度過宿霧欲收初露冕餘寒猶在薄侵羅行邊巷陌流塵逺物外樓臺勝事多無數鄉山心水隔酒闌重與聴驪歌夀顧東川表弟春明棨㦸錦衣鮮近捧丹符下九天標柱舊題酧駟馬繡筵新啓集羣仙人如白玉臨風樹袖有黄庭煉石篇無限韶光正明媚扙藜携酒過東川廖學士鳴吾孫園之招席上和曾都諫日宣一首偶借春風半日閒來尋緑野共開顔蒼松翠竹含新雨金殿朱旗對逺山勝事巳傳豐沛裏髙情多在水雲間玉堂青鎻俱仙侶文雅風騷莫放慳和姚尚羙龍山㑹詩金錢片片籬邊疊買得天家一段秋橙橘飽霜黄樹頂芙蓉印水茜江漚縱横數陣飛歸鴈欵乃一聲歌牧牛人世都來能㡬日牀頭詩債㑹須酬老母自八月末失調至于十二月逾一時六日始離牀褥扶枝引步負暄㺯孫于簷下若春木向榮朝暾屏翳前十月廿八日為誕辰湯藥之中惟焚香告天不得備禮是日乃取巵酒拜獻團圞相保得遂母子姑婦之歡因志以詩蕭蕭雪鬢病餘深半倚蓬籠尚擁衾教子揮金酧國手抱孫低語調鄉音恐驚舊日迴眀鏡喜是今朝捧御簪重覔斑衣補春酒長箋題遍鶴飛吟五言絶句四十七首十二日試燈三五近春宵長空萬里遥預期華月滿先借綵燈燒漫興二首兩兩鳥對語翩翩燕又來草堂渾似昔時有好花開二簾紋青窣地橋影碧涵波江舘騰騰路漁郎欵欵歌初夏八首雨打蝸牛篆水回科斗文辛夷花正發咄咄欲書雲二竹粉輕過院秧針短出潮瘦笻妨草耳髙屐距山腰三行蟻醒槐夢游蜂静蜜衙嫣然成一笑更愛雨中花四散步常依樹髙眠且枕流北牕陶令宅南國庾公樓五雨意初蒸暑林聲巳變禽兼句斷來往無日罷登臨六竹閣開林樾蘭舟過石塘嵗年占五榖風物近端陽七雨歇鳩鳴午風行麥送秋村村雞犬裏疑有故時侯八晩潮常帶月夏雨不過田身世江湖裏人家水木邊敬亭竹色寒不改綠隂常到門年年春雨裏箇箇長龍孫思亭杉檜鬱參天山深含紫烟秋髙霜露裏落葉滿亭前醉窩愛酒不愛醉酒深如有神同來送日月無柰獨醒人觀水碓圓機荅髙杵急水激飛輪桔橰巳多事愁殺灌園人西巖詩有序西山在今都城之坤隅是中多巖岫洞壑之勝都閫劉君世臣燕産也嘗遊其地愛焉即以西巖自號雖宦轍四馳人稱之必曰西巖云西巖本出揚州之族與予俱為南人同事西蜀有郷邦之好為作西巖好七章贈之隨地可歌不必在金臺之右易水之左也我愛西巖好桑榆一徑長嵗寒竒節操揺落任風霜二我愛西巖好風光足大觀微波分太液咫尺是長安三我愛西巖好三台接九天何時飛閣裏東海看桑田四我愛西巖好巖中動八荒五丁翻地軸一矢射天狼五我愛西巖好居延出酒泉星流白羽箭風吼紫金鞭六我愛西巖好川西與浙西林逋湖上興杜甫峽中題七我愛西巖好他鄉說故鄉揚州迴鶴背燕國射龍光辛丑歸途中絶句五首忽憶乗髙躅因知遡急流陶潛初罷令李廣不封侯二野曠餘長畝家嚴具敵樓舊巢飛燕子古壁篆蝸牛三柳徑縈隄曲柴門逐水開無心論出處有客賦歸來四四十年前路三千里外心人生㡬兩屐閒處萬黄金五畏影常依樹尋盟每問鷗天邊孤竹國雲裏仲宣樓過宋玉墓楚國餘文藻當春過故邱為君悲不巳安敢向髙秋和蒲汀顯陵道中柳隂小憇四首花霧濛濛逺山雲冉冉髙幸陪金紫客時覩赭黄袍二寢殿祥雲合山陵王氣髙風光饒帝里春色滿恩袍三路細青山轉天空白日髙同來三扈從碧柳䕃朱袍四天子岡頭路風雲北斗髙穿林迴雉扇度嶺耀龍袍和安鴻漸登樓曲團圓三五夜待月上髙樓誰知風共雨又妬一年秋方春野挽詞三首春野依然在春風依舊來去年巢裏燕不見主人回二楊子談𤣥宅陶潛漉酒巾一時俱寂寞愁絶不堪論三樹遶滕王閣溪流徐孺祠昔年遊賞處花落雨絲絲書扇寄李百朋錦浪生春水茅亭盡日孤十年身不病天逺共江湖詠石七首吕公中峯有二竅如吕字呂公本俠士詭稱回道人黄金亦可變誰云非法身簑衣真人石紋縷縷下垂若簑衣真人巳忘我猶著雨簑衣一朝盡刼盡風雪不知歸麻衣道者瘦長人立皺若襞積當年錢若水寒夜撥爐灰若是公侯骨定應期不來邋遢仙形骨昌侈不受束縛古來神仙侣均為柱石材得志有廊廟有時居草萊劍石背呂公而聳透石劍葛陂化為龍八公亦鍊石借身逺報讐凝血今成碧紫雲積翠競萬壑孤頑自離羣因風欲吹墮夕陽明夏雲紫芝峯采芝堪療饑煮石亦可餐悵望啇山老浩歌蜀道難題江海看雲巻三首南有一片雲因風墮東海彌天作霖雨望之若可采二海上㑹看雲飄飄逈不羣扶桑紅日近錦繡總成紋三我愛看雲客江行復渡江東風一夜雨夢遶紫荆牕儼山續集巻六
