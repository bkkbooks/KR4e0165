body:
  text: 儼山集巻九十九明陸深撰書京中家書二十四首昨早日出時從駕入午門此行勞苦一生所無主上英明獨斷我與李蒲汀張陽峯三學士猶䝉聖眷僅降俸兩級三月間三婢産後病不起又聞家中火災日者云我命最怕戊辰此月是已陸俸張蕃計三月望後當到不知汝治行如何又聞邑中火盜燒焚心意甚懸懸此是天運聴其自然人事惟有積徳修善可禳或避地亦是一䇿但得汝子母同來京豈不為好汝母不欲來只是怕病耳可早晩勸之日下可打發的當人回别有細細處分汝宜三思之三思之四月十六燈前恩廕一事諸公多勸遺之小孫石門甬川尤拳拳此皆知愛吾兒也吾意決與吾兒此則本分事於大體上亦穏當後來顯榮吾兒自力致之兒且脱却升散送迎之勞閉門加工來北京鄉試一科此後事不可預必聴之天可也但須勉勵徳業以圖補報耳誥命三代軸文春暮可得驗封手本當先得之寄回以行焚黄之禮神主改題前書已報汝宜考檢禮制行之吾家兩處墳山文獻俱不足意有所待兹賴天地祖宗已得如願汝曽祖考妣木主竅中生卒年月開寫明白汝當以意撰一行狀來汝祖考妣誌石俱未埋可打兩三幅汝據此亦作一狀不妨加詳未齋閣老行狀原稿并吾自撰行實與汝祖母賢母事蹟曾求蒲汀作傳者俱在緑漆竹絲食籮内舊置浦東樓上可仔細尋檢抄來欲求館閣諸老文字入碑中此事猝難就手可從容為之著忙則無頭緒也家事吾一付之汝自料理雖不求贏積可也産業增置汝酌量之惟舊宅連傍祖塋間界可増價成之汝要禮部墨巻春暖時當為處置吾意近時舉業俱不如三五十年以前有理致可看近作雖不經目亦可只看五魁巻有多少疵雜處餘可知矣昨問無競惟人文章却是甬川老先生所作知之新年不知提學先生出嵗考否瞬息科場又到宜努力汝父母老矣家事只提大綱所讀書須於切要處用工此間有些書春間覔便寄回也世安叔説汝體氣弱胷膈有憤鬱之疾吾甚愁之學問要知性命此大頭腦處身外物可以理遣也連得吾兒書皆與我論官級轉遷此是人間父子至情但汝父自發身以來未嘗擇官而仕亦未嘗厚望於人至於清階榮任固聴其自至耳况近日陞擢皆受知主上親為注擬雖吏部亦不得與聞此又希世之遇顧衰鈍不能報稱爾知之知之雖然文名不如行名好官不如好人吾兒勉之勉之吾方自詹事府公座還此是近日聖㫖督責甚嚴殊為勞苦六月一日雷變奉先殿大小衙門修省賴此間人伴俱安但世安病復作方在調理令其家知之龍江老先生家墓誌已為撰次知之若舉殯時在親戚中禮宜從厚可代我作一祭文以五糖卓三牲禮奠之吾家官資在前行禮不可簡薄此正義禮也黄良式求陳娘子墓誌潤筆不薄我以五兩折祭柩歸吾兒可從厚行禮大小家事嘗與良式計較各有成説可一一問之汝所論轉遷供職事是汝父子至情但利用安身吾一生所學其餘俟命而已若要趨利避害只管便安處著脚恐犯天律此等嘗與標細論矣昨三林塘潘省祭棠回數字報去今姚霦還附去春帖一聨此出顧中書亨隸筆可懸之後㕔雖涉誇詡亦實事也姚生此來可善待之近時風俗甚不好吾兒加意以處鄉曲慈惠可也黄甥標喪偶兒女滿前殊可憐惜今決意作歸計矣乃叔黄潮一房絶後産業傾費當屬異姓吾兒可助其成若有借貸如所欲與之此子想不負也吾族内外親人如此之才識不多可扶持之此處要與謀些功名其命如此奈何奈何顧世安病體甚費手其家有的當人可諭令遣一二人來我恐照料不及可上覆五嬸處置或與世芳商量但不可張皇令人知也其餘家事悉付吾兒自處寄回黄手本可珍藏傳家若行焚黄禮可照文公家禮改題神主斟酌只請縣尹學諭等官須備表裏席面加厚便破費不宜儉惜若請府官鄉宦亦好但家下弟姪輩恐不得力吾兒一身照顧不到反失禮可量力為之墳山上修理事不知兩弟如何吾兒可不惜財力以為光顯祖宗之報亦不必區區計較也若商量得焚黄禮可少待之儻乞得新銜尤為光顯併欲與瞿夫人請贈有例奏疏已寫須待回鑾之日此要酌處只題主禮重可與龍江姑夫議此以為緩急昨晩龍夀到得書知汝母送女過蘇遂得學召蘇州書説頗喜悦康健雖然恐非老年病後所宜殊為懸念想冒暑還家矣無他恙否須謹事之今黄甥良式南還念此子兩度來京皆是倚仗於我顧其命薄盡成狼狽驅馳最可憐惜其破費亦不少也兹回欲興復家産汝可量力助之我亦許矣此子不是負人者知之知之此間大小事體我悉與之酌量披露心腹視之如子汝可與謀議行事吾三族中後生聰明皆不如也但凡事多疑且好氣勝吾兒能以義理相與涵泳浸潤可為益友也知之知之慎之慎之兩日前有與顧慎顧浩等書計先到閏月一日部文到日汝可就起送行期須再報為准家事收拾想各有頭緒凡事只求穏實吾鄉時俗一毫不可效尤也此吾兒事吾不與矣車駕回京之日未期若汝母肯北來喜孫可出路覔舟寛大乘秋水至京骨肉團圞此家國太平盛時福也顧未齋題本禁約假冒霍渭厓鄒東郭進東宫圖册通報抄回可細看知時事如此主上聖明不敢以一毫文飾上瀆吾兒所論託病解官等事禍福身家尚可測耶良式能具論可一一問之仔細仔細自承天還京雖勞苦異常頗覺身體健浪脾胃勝前痰火比舊減半分明是土氣燥濕所為每與良式論此有日東歸不愁無娱老之資但愁無逸老之地若選擇得髙明避濕去所在二三百里間作小齋髙閣以為閉關面壁之計此是晩景前程也亦嘗託良式與姑蘇醫士周同一之謀之如何如何一之文雅有信誼若過家可以禮待之莫失莫失家事悉付汝吾祗一子豐約從汝但見在家業必須處置有條理使後人可守此亦學問中第一事也連年有積蓄汝舉業之學秋冬間可温習明春出門便是忙人知之喜孫可加意照料樓下削風最宜迴避至囑至囑閏七月四日連日有朝參公事以奉先殿雷變修省聖意殊嚴覈也適王鎮撫襲職還來言松城下處彷彿記是玈溪所居今屬楊氏前後俱靠潮水宅後有一池塘云是唐堯賔教諭族中若王君來説可令曉事的當人相奪成之可否不宜草草汝母子居海濵風俗日下兼近來火盜屢作不可不深長為慮縱吾他日得歸老江南欲就城郭居住知之知之吾兒昨論正蒙頗見學問所得正要不隨人毁譽此老髙處在勇於求道其變化氣質知禮成性自是聖賢事業每與甬川論其偏處却是太和所謂道認氣為理爾故其書多與佛老相出入似不及周程淳粹吾兒且存此意於胷中涵濡之乆别當有見潘少參子仁行間附書知之沈鸞正月末書近日始到中間論吾官資遷轉正不須如此校量况名位有命禍福無端須順受之多少安樂豈可於是中置恩怨耶吾兒要當大着心胷始得吾老矣一生名位所至俱可不辱鄉里第愧不稱耳只待考得三品一滿便作歸計也宜體此意六月十八日書來欲為吾集文稿舊曾清出三册是丙子以前所作是姚天霽寫清放在浦東樓上西間壁廚内丁丑以後文字俱散漫稿簿俱留在家可乘閒清出令人寫浄須我自刪定編次也墓誌向付姚時望可問子明訪之此事大難别作報今早自閣下回適莫縣丞來辭云從陸還故附此此官淳實部解來京不曽十分管顧得可辦禮謝之只竹溪家解磚所託人不甚中因我扈駕南去却借了五六十兩官債孤兒寡婦殊可念也須與濟助之竹溪有些舊物毋令散逸可也近得徽州汪綺寄到四月間書只有學召信知汝為他事所奪懸懸桂魁寫來朱氏房宅若要三百兩可忍虧成之不必計較也知之知之今年收拾家事處分停當正月間起程來就鄉試不為遲也再俟的信喜孫將週要保護至𦂳至𦂳七月一日書畫是我一生精力所收俱各散漫不曽收拾不知汝有暇清理否我重入翰林屢有朝廷文字應酬苦無書檢閲此間有人事書亦復收買幾種今寫書目去來時可帶得𦂳要的數種若宋元板除此間所有盡可收束做書廚夾板載來我平生文字稿簿可一一收束一字不可失也交游書札自可作一櫃藏起樓上俱可架閣也畫成堂者不必帶只唐宋單幅可攜十數軸巻册都可帶來字帖有古而好者量攜之三日燈下復附此汝以明年春來京老母幼子處之甚當從水不如從陸行李務從省便人事之類此間為汝畧備黄良式云亦要明年來科舉但其意未決若與之同行尤好尤好若良式不來可以家事託之亦可亦可良式云要出市居當與謀之此兩便也吾邑傍浦邊海連年人心風俗日趨下流况火盜疊見不可無先事預防之術近嘗與公輔當軸者論此有築城之説不見吾鄉人有樂從趨事之意吾亦欲省事不敢勇為只好黙贊耳縱使功成利不在吾一身一家而已此事良式知之詳悉若為吾身家計惟有遷居入府城為上䇿吾連次有書及此亦嘗託一二人謀之不知如何良式回可與謀此若移家入城後汝來京吾心可安有府縣可託靠耳須詳慎詳慎七月廿九日偶理文字間喫㸃心折却當門左一齒言語頗覺漏風此是老信為之憮然累日汝母亦有此家事悉付之汝縱我歸休之日亦不理家事矣吾兒勉之勉之秋冬間收拾處置另書吾自乙未春二月離家入關遂入蜀今屈指五年餘矣聞之故鄉風俗大不如前恨不能冲霄縮地一歸觀之又愧忠信素薄無益轉移此吾所以有移家卜居之計吾兒恐未盡知此心事也昨霍尚書渭厓先生來京一相見便稱譽吾兒還田之事且云吾得之談先生兒要知之終譽甚難也姑弗論其他且如吾祖宗以來勤儉敬慎孝弟力田以起家積而發於吾身沗為仕族近見弟姪二三人皆不如意深慮吾家門祚衰矣吾兒勉當振起之其道以亷恥為要吾嘗愛歐陽公云有所不取之謂亷有所不為之謂恥吾兒謹識之己亥九月三弟栢姪來京正當考察自陳之際恐懼修省多懐慙畏譏之慮凡事簡省不得加意加厚今賴朝廷祖宗廕庇父子榮美而還冠裳名器燁然在躬惟願其好善修徳以延詩禮之族相聚月餘苦詞累百想能感悟是吾老景手足之樂亦是老景家門之福也吾兒當致恭禮義以修子弟之職自餘細故小事皆不足較也昨九日得華亭附朱知縣乃弟書知母親康健甚慰甚慰喜孫頭瘡却是胎熱可求明醫治之明春北行便可作急收拾停當以俟九月十一日儼山集巻九十九
