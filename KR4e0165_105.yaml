body:
  text: 儼山續集卷五明陸深撰七言律詩五十三首遊儲芋西園池乘月夜泛峯巒巖壑俯中流何處三山與十洲新雨不妨泥滑滑好風先送水悠悠鷗無機事迎人下客有髙懷盡日留向晚星河迷上下笙歌燈火木蘭舟縣衙隨班幄殿髙懸綘節朝龍紋浮動瑞烟飄地當東海開黃道仗倚中天切紫霄花縣千城臨禹貢華封萬口祝唐堯年時正憶臚傳裏玉筍金鋪具百僚嵗暮風雨中發藏書示楫子嵗寒風雨合江樓燈火樓頭數夕留新命誤䝉吾己老舊書多在子須收星辰萬里趣關塞環珮三朝侍冕旒抱得寸心終許國未應猿鶴怨林邱三日雨後登儼然亭蕭蕭竹樹夾溪深一雨初晴長緑隂真意倘違空老大野芳雖少亦山林好風似舊穿髙榻流水如知繞素琴東去大江知到海為誰烟浪送歸心寄黃希武提學憶昔長安夾道居玉堂黃閣晚來初槐隂滿院或共賦藜火隔忩時校書嵗月悠悠成浪迹烟波渺渺正愁豫聞君咫尺騎驄馬病卧扁舟限所如夏日樓居小樓長日轉朱炎糚褁殘書手自籖性癖真成文字蠧官清擬辦水晶鹽白雲出岫來當户緑樹搖風送入簾却喜到門塵事少始知吏隱信能兼火花次楊東濵韻巧憑銖兩結根芽暗裏機關頃刻花風火陳中疑帶雨樓臺影裏半為霞催開始信由人力搖落寧須待嵗華文菊瓶梨俱爛熳好開懷處是還家南溪四面溪山如畫裏扁舟南下更悠哉薰風五月常先到梅花一枝偏早開茅作小齊俱背水月臨午夜獨登臺朝宗萬派俱通海遙向鄱陽一脉來九日山居客至以大風不遂登髙因次李空同集韻澤國風濤鬱未開長緣病骨懶登臺無期逺客還能至有幾重陽得再來黃菊自應籬下看清霜如為鏡中催當年空負凌雲氣獨把茱茰首重回春日齊居對雪盡日風雲掃不開雪花如剪下髙臺幾家菜麥春猶淺何處漁樵晚正來去路欲迷南過鴈餘寒尚阻北枝梅病來辭賦渾忘却慚愧梁園授簡才病中簷外石榴花盛開病卧髙樓傷客心隔簾花發晝隂隂朱房宿露輝朝日碧葉穿雲映逺岑大碗移栽今滿地茂陵回首欲霑襟一枝為插如年少愁鬢天涯不上簪雨中宴莊氏東園留題山亭洞中山石俯波光忩外林花薦野芳況有管絃相映發儘教風雨佐清狂虛疑四老烟霞地正是三江雲水鄉我欲卜鄰酬望想自應團社寄篇章二日過唐橋莊畫船如鷁水雲遙閒過南溪五里橋行人渡口出復沒急鳥沙頭鳴更搖相携看菊留茅舍獨往尋源隨海潮無限髙情付江路林梢落日見漁樵秋懷斜風細雨滿蕉忩蘆花蘋花繞大江潮上水痕魚六六秋隨天逺鴈雙雙破除俗纍還髙卧韜卷談鋒願竪降物色若教供指㸃青山合比鹿門龐甲申元旦待漏入縣齊隨班樓閣參差一水西攬衣猶自候朝雞葭灰巳應三陽轉帝座遙瞻北斗低步入花封和雪動聲傳嵩祝倚雲齊太平有象君王聖天保詩篇手自題春晴登樓新晴樓館拂雲開萬瓦含風接上台短晷漸隨陽漏長長江元傍海開來雲山疊疊春千里世事悠悠日幾回倚遍闌干思無限黃金誰築最髙臺鳯岡書屋為寧波朱允升賦鳯凰岡下結幽居能讀先人萬卷書手種碧梧深雨露誰題凡鳥到門閭楚狂空有歌相和阿閣曾傳事巳虛見說上林工奏賦白頭未必老相如六日始晴春日常隂到人日今年人日隔宵晴雍熙有象回天地鼓吹無能答聖明江上舊便髙枕卧花間新辦小車行東風又動吳波緑流過閒居獨有情有拳石類靈壁嵌谾可愛作盆池貯之庭中湖上青山得共分映空搖漾緑生文下蟠或有蛟龍窟髙踞疑空虎豹羣雨後愛看封碧蘚月明如見吐游雲九華雪浪留題品願附蒼蠅次第聞送何鴈峯郡伯入覲六龍天上中興年五馬雲間早著鞭臺閣九霄圗畫裏衣冠萬國冕旒前淮南卧治須台鼎宣室論才促御筵試向王正占緯候風雲日月滿堯天登南廣福鐘樓百尺闌干圍暮鐘江流曲曲卧真龍望窮南畝棲禾黍天放西風吹菊松落日樓臺俱渺渺浮雲舟楫自重重凌空為盡悲秋興一上髙樓興轉濃晦日出城送葬曺啓東憲副入雲城堞俯危闌石磴沙隄路幾盤滿目山光無近逺一畨人事有悲歡聊生政可三杯酒進步何須百尺竿細柳幽花倍惆悵東風漠漠釀春寒秋日無聊偶然作問余何事每悽然尺璧光隂閲嵗年舊讀書今存蠧冗新縫貂巳剩鶉懸常餘孤枕還鄉夢頻乞東家買藥錢自信英雄須到骨業身隨處了塵緣贈别尤宗陽還吳門臨岐莫怪恨喑喑投贈天涯紙半函澤國鄉音三泖北江湖夜雨一燈南浮蹤去住僧留偈世味寒溫佛飽參歸去若逢人問訊文章何用學春蠶懷都下友人梅蒸懸榻晝慵開徙倚階除破碧苔短夢空隨蝴蝶化尺書頻問鯉魚來迷人芳草偏留雨極目浮雲忽送雷千里相思多少恨驅除無計且銜杯喬白巖太宰家山留題在邇亭晉陽文物上卿家小作江山殿嵗華望到白巖明玉雪相去十餘里由來緑野鎖烟霞雲窗覆奕傳仙譜石室藏書帶相麻同是登臨還在邇逺尋何用訪丹砂草四日曉發平樂白巖追送山行數十里中途微雨有贈山中秋色半隂晴上相肩輿許並行别有嵗年悲短髮與白巖别草三年矣謂豫如昨但髯髮有白者老無文墨愧諸生細談舊事兼新事遙聽松聲共水聲珍重桑榆最名勝龍光咫尺是神京書院池亭忽有𤣥鶴下集因養于庭橫空一鶴下危闌隱隱丹砂變羽翰疑是歸鴻須繫帛莫將野鳥誤稱鸞青田到後雲天逺北海從來嵗月寬白鶴千年復化𤣥飲啄漸馴宜試舞客衣偏感化長安東阿道中對雪天為山行借雪看路隨天逺更漫漫詩成驢背偏如意病後狐裘少耐寒授簡有才懷帝子折梅無使寄長安惟餘一片郊原興白馬翩翩兔窟乾和陳中川秋燕東關寺太原城畔東關寺合讓元龍獨倚樓回首風烟成隔嵗當時遊賞正髙秋黃花破帽寒猶戀紫塞浮雲晚更稠今夜燈前聞古調三巴最苦若為酬發平潭流年如水客程遙又是王正第二朝關塞極天三晉國風烟入望五雲霄名山有副藏遷史擊壤無功頌帝堯千里不妨隨騕裊一枝終自負鷦鷯送胡汝載丞武昌詩律從來徹骨清哦松端不負兹行星辰南斗占郎位江漢西來抱縣城鸚鵡洲邊芳草合鳳凰臺上逺山晴春眀門外衝寒别欲折梅花重有情蕭海釣文明先生挽詩朝野名傳翰墨餘白頭空有讀殘書南荒秋早逢搖落四海人多問起居塞下當年曾失馬釣絲終嵗竟忘魚八哀此日還成賦慚愧先生識面疏連日遲李獻吉不至有作幾日都門長者車風塵不見正愁豫只今對面還千里何處相思有尺書秋色天涯催客暮山光樓外為誰舒空歌枤杜回長嘯終愧緇衣歎索居西堂分韻得新字帝里風光屬小春橋門髙燕集嘉賔城臨北斗看山近人愛斜陽送酒頻憶昔圗南同作客相逢回首各傷神情深渾欲忘歸去怕見樓頭月色新安鴻漸贈詩兼惠紅酒狐裘途中和答恭承帝遣出詞林珍重髙懷抵萬金醇酒巳從心醉後綈袍何止故情深秦關日月時分照遼海風雲忽送隂一路畫圗隨馬首據鞍聊得繼髙吟寄曺孚若憐豫獨住神仙府憶爾清齊御史臺月近上元如有喜賦成郊祀愧無才香飄御輦和雲度寒勒宮花待日開巳覺歡聲連萬國更瞻佳氣滿三台送何文徴赴開州江東文藻竟誰如新綰銅章左佩魚天上風雲元咫尺兵前草木正蕭疏烟樓夜繞三刀夢露冕春行五馬車便欲修成循吏傳即看名滿薦賢書番陽察院課種竹偶來種竹當公事此去成林知好看春雨龍孫過墻起月明鳳羽滿溪寒恍疑臺殿臨淇水旋著闌干護石壇欲報所思頻悵望自將顔色比琅玕宿常山集真觀病懷自愛尋山憩面面芙蓉映逺峯向晚樓臺棲宿霧報晴鐘鼓動秋風千重地脉閩關北八月星槎浙水東懷國望鄉俱不極一龕燈火翠微中途中見縣僚迎春綵幡銀勝颭微風塵影人聲蹴踏中殘嵗雪消江柳外一年春到海雲東文明有象占天運草野無才贊化工須信烟波通雨露輕隂催暖護真龍遊武夷清遊妙得此山中一度來過一不同泉石烟霞時上下隂陽昏曉自西東溪流九曲層層去雲鎖千峯面面通向晚天風墮仙樂月明知是武夷宮秋曉泛九曲縹眇烟霞曙色分蓬壺𤣥圃只徒聞丹崖倒射潭心影錦浪初生水底紋合有仙靈藏蛻骨寧無富貴等浮雲擢歌九曲應誰和獨倚秋風弔二君遊歸宗巖異境靈源閟復開直從一水接三台閩山形槩何如此朋輩登臨有幾回片石隕空風出洞孤松架壑晝聞雷白雲巳滿層臺下雲裏更尋髙處臺次韻答萬石梁大參得陪騶從出城遊况愛烟嵐向晚收楊子何心能頌莾仲宣無計且依劉林間鳥並鵑聲急雲裏江分燕尾流酒量近來因病減令人苦憶醉鄉侯長至班罷嵗晚滄江客未還履長冠冕尚隨班五更漏水浮銀箭千里籓封傍雪山舊典嵗修知國體孤臣身逺憶天顔新陽一脉須調護環珮歸來學閉關出北郊候客因入金繩寺獨坐初過城隂駟馬橋緣溪水竹正蕭蕭得間豈恨流年晚愛客渾忘去路遙風捲斾旌驅陸海天寒樓閣霽烟霄南中景物長妍麗囊底無勞歎皂貂病後閉關萬里橋邊萬里身西風摵摵鬢毛新天應憐我長為客事到求名始纍人滿院蒼苔行省宅一川黃葉大江濵少陵老去多秋興且傍雲山結四鄰次韻酬衛􅘷川蒹葭真倚玉為林虛負知音愧此心世路百年風浪迥天涯雙鬢雪霜深依依别思俱通夢藹藹春雲欲化霖拋却簿書山水裏停驂時得和齊吟遊烏尤寺插天一柱障東南髙下僧房共佛龕巫峽地靈勞鎖鑰峩眉天險隔烟嵐常驚虎豹蹲蒼莽疑有蛟龍起碧潭為問魚蟲箋爾雅景純曾此事幽探閶門登城晚眺雉堞雲平臨北斗橋門流水接西湖綢繆巷落縈鐙火輸轉東南鎖舳艫西子館前多半夏越王臺下有蘼蕪晚烟生暈溪風靜欄檻千家入畫圗京師寄姚玉崖十度書來九不酬遙傳賔館是蘇州文章合動羣公賞山水真當萬户侯未見故知能薦馬但聞東道暫依劉相思又上金臺路滿地西風吹暮愁寄汪思雲白玉堂深午漏遲黃山髙處倍相思人於鶴背腰纒貫心似蛛絲手論棋聽雨樓頭眠較穩望雲天際立多時十年萬里常為别獨對金臺一賦詩夀汪思雲六十黃山六六嵗華新綺席宏開送入珍手揮千金作義事眼見四朝臨聖人尋盟愛結煙霞侶耽奕偏宜竹樹鄰天上長生先注籙共君華髮守松筠夀汪思雲室余孺人七十越山髙處入青雲仙里華堂啓夀尊日映萱庭花晚翠風含椿樹露朝新筵開緑醑重茵席簾鎖斑衣五色文從此耋齡垂慶節會看花誥玉樓春儼山續集卷五
