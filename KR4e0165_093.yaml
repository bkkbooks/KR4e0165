  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0165_WYG_093-1a, image: WYG1268/WYG1268-0598a.png}
body:
  text: 儼山集卷九十三明陸深撰書與倪小野正郎比日陳子新過江東承惠手教副以諸佳作欣喜無量具聞起居之詳復以為慰聞有小恙想遂勿藥闔宅自老夫人而下均享福履每作南望豈勝向仰之至自念山隂海上扁舟之約彼此同期嵗年之間歎此未能往而彼亦未能來也奈何奈何深憂患之餘遂成衰老凡諸外物等付悠悠收斂此身置之泉石竹樹之間是中便自空洞絶無他慕惟有知舊時時往來于懷耳輒奉逺書竟不測是何境界也數日前夢小野科頭對奕作潦倒歌呼之狀如在長安旅邸便爾得報他亦每每還復偶然爾一笑一笑山居多暇得與兒子楫對案讀書或觀弄筆作字為樂想子新或能道之也與何柏齋侍郎伏計奉違之日倐忽十有七年矣自先人背養荼毒餘生無復有望於世兼在羣疑積毁之中杜門待盡每一念舊愛靦顔負心者或至旬日未易以語人也特蒙記存賜之珠玉復以衰老為念此意尤未易以語他人也感激何如比蒙收召實出望外即日當北渡瞻望甚邇謹此具起居之敬儻不吝教言尤出望外也餘惟為道保愛以膺大拜不宣與劉子介溪至舍下留兩宿奉所惠手書如獲瞻對聞起居佳勝奉侍為樂去嵗作衡嶽之遊想遂竒觀也深是後一月亦遂起告比抵京勉供舊職但憂患疾病之餘遂成衰退大業遼逺終負斯志爾計審召命已臨不審為斯道能一出否古之君子其於山林廊廟不必專有所主若其志之所存雖甚不得已未嘗一日不欲見之行也足下充養完密義理精深非淺薄所能佐贊若以足下之惠得奉顔色敘契闊考德問業有所矜式則區區鄙私不能不眷眷也昨會劉憲副嘗與之細論計非筆墨所能盡也相望萬里未緣參承惟為道自愛答張君玉深比方卧病杜門忽承令郎枉顧強起以野服奉見於寓樓追念長者二十年之遊從知遇豈夢寐耶及拜手教纍幅委曲誠欵洞出肺肝具見長者風神精采真有福有德之人無任欣慰深辱愛最早最深今老矣不自量力輕犯世故憂患頻仍心志衰耗賴先人之業足以自適近築一隱居當三江之合流頗有竹樹泉石之勝又纍土作三山遇清霽景候可以望海其下葺退居之室榜曰靜勝今年四十有九矣因命其左齋曰知非右齋曰知還靜勝之後復作一堂度明年可成成即當題曰知命但不敢爾醫藥稍暇時時燕處其中大懼以筆硯為纍即辦一味枯坐耳何由得奉長者一經其處隨意點染悉成勝槩跂想如何是中藏書滿架所欠者白齋集耳往嵗在京嘗決劵買一部念白齋當自寄到遂輟又往往於友人家見白齋集輒復垂涎不意於今日併與續集得之快事快事向晚到手自有滋味若此鄭令君啓範嘗有場屋之雅間每一相見便問長者興化事迹啓範亦知向往者日赴召命去矣令郎不能久留力疾附此以代起居之敬殊不盡所欲言者萬萬為道保攝以躋上夀與徐子謙郡伯往嵗卧病時極荷道誼之愛詞翰之教永以為榮永以為感去秋起告近望節蓋在京潤之間竟以追攀不及為恨還京碌碌無足為報舊痾尚未得灑然每懷丘壑之適此意渺然果能遂否即日郡政多暇起居萬福髙才夙學少試一郡敦本復古之政計已次第欽慰何言望之來佐此邦想快人意也便中謹此修問餘惟保煉以膺大擢答方時舉少參比日伏承遣使珍惠極感記録奉展手教無任瞻企因念契分如執事相望百里而二十年之間才一二會晤人生竟如何耶即日具審尊候并闔宅萬福欣慰無量但浙藩未赴此自新聞兩疏交陳殊為異事執事德望才猷中外倚毗騏驥方發軔於康莊此豈回車時耶未由面奉委曲為歉深今年四十九矣掃妄歸真力事猛省豈特知非而已兼之衰病侵尋已成老醜春來一病幾至委頓屬有婚嫁事了此便蕭然矣營小隱居在江上頗有登臨稼圃之趣賤子自適恐非所宜聞於左右也力疾奉復容圖頌謝不宣與陳玉疇侍御深留南雍時最辱厚愛感不可言自顧庸懦嵗月如馳而所以報執事者尚未有地不識執事之教繼今以往猶可以覬得否也恭惟執事以碩學宏才陶鑄畿內文風士氣一變近古顧以峻擢在邇士夫皆將為借冦之舉而廟堂之議亦欲暫淹以慰士望或曰執事將薄而不為深未敢以為必然也伏惟為道自愛以膺大祉答朱世光侍御深獲侍教範極慰瞻依蒙賜欵洽榮貴多矣别後審仙舟尚留南浦無任欽企之至延佇為勞比承古經新刻髙辭妙翰若駢珠聫璧捆載而來把玩之餘真貧兒乍富令人應接不暇慰浣之情如何可言是豈惟林壑之光且將子孫世以為珍也不盡感謝深疏誕之蹤為世鄙棄恭惟執事宏才正學清裁髙風固宜激昂雲霄之上而獨加禮於不肖拳拳若是非深所敢當也比日使車至止物情肅然勸懲所及殆出於指使之外此豈他人易以及哉一丘一壑藉之自安又深一人之私感也時下溽暑仰惟行臺嚴凛保愛為祝新涼當攜拙作請教髙篇俟病間勉力追和深衰老頽情負知為惕臨紙不盡所欲言者與楊夢羽久不得夢羽消息殊以為念想德業進益大為三吳出色也欣慰無量姚玉崖東還過貴邑幸清拂一二聞虞山之勝久矣有小山居可置否能結一草堂相待他日扁舟往來為打乖窩如何如何費當自任也但吾夢羽方將騰翀霄漢而鄙劣以此託之不幾於枘鑿耶逺當一笑餘惟為道自重與夏桂洲閣老深無似衰病僻居自公之還南也可聞而不可見今既在南矣又可望而不可親跂瞻寤想奈何為情邇辰恭審台嚴棐相動定萬福高居賜第在丹山碧水之間感念舊遊恍如再到初不知形骸之為纍也此意未易以言了惟公亮之比日徐御史宗魯還承示新刻試讀前序目録乃知文章家有人而公論自在所恨目力短澀未即卒業還復恍然兹表弟顧定芳南使道當出門下敬此布忱深杜門待盡無足為道感知之私與日俱積亦未易言盡也冬和萬冀宣節保重以迓寵召不宣與嚴介溪閣老深無似受知至久至深前嵗東歸重辱垂愛抵家之日惟有北望感戀無已跧伏田野間側聞大拜之命聖眷無前亦惟有舉手加額為祝而已恭惟台候萬福功在鼎彛顧聞問無階益深瞻企江東舊居向承駐節每登小樓恍如公之在闌檻也此意非他人所能知真切真切深入春即抱病已成衰朽兹遣小兒楫北來補歷少為門戶計爾幸有以教之老妻久淹病卧宛轉牀蓐間特念尊夫人不置可憐此意亦非他人所能知也亮之亮之特命楫兒託東樓兄轉逹之亮亮餘惟為國保攝以慰中外重望不宣答許松臯太宰深無似誤辱知愛者踰三十年無任感激跧伏田野每每念之側聞召命起自家山惟有北望為宗社稱慶無階上記少敘鄙私方切感愧顧辱手教逺貽奬借太過豈鄙薄之所敢當哉敬當珍藏以傳示子孫使知不見外於大人君子永為世寶爾欽佩欽佩近田卷久淹歸几兹因小兒楫北來補歷捧以請教幸原亮之餘惟為國保攝以慰中外之望不宣奉李蒲汀尚書奉違門墻無階聞問跧伏田野惟有感戀表弟顧世安還逺辱手教新詞捧以為寶頽惰之餘不知所以為報也伏審台候萬福闔宅仙眷迪吉為慰霖雨之望日夕跂踵此海內同情不但門生故吏之私已也深薄劣抵家多病至今春尤劇小兒楫例當北來補歷因就秋試少為門戶計爾顧此行父師之託端有望於門下念此子頗淳謹曾辱青目想蒙與進此骨肉之感也伏惟留神萬萬與孫毅齋宗伯自前嵗東歸極蒙欵愛抵家多病不獲以時起居徒有瞻望顧辱手教逺頒捧以為感伏審向來台候萬福聖眷優崇霖雨之望日夕跂踵恭聞顯陵之行備承濃賞即日有留用之命皆大拜之兆也黃扉伊邇鄉邦有光其在鄙人尤以為慰深春來痰火大作醫藥無效俟命而已小兒楫勉令北來將就秋試蓋為門戶計耳念此子孱弱又未立嗣依歸有人所賴執事耳幸有以教之骨肉之感至叩至禱與張陽峯宗伯深不肖跧伏田野無階聞問忽辱記存特枉教翰副以陵祀諸作舂容雅健真太平宰相之言也每以誇示鄉里襲傳子孫為寶繼聞內召聖眷優崇又當代之所希有也喜慰之餘特深向往兹辰伏審入朝視篆大宗伯矣金甌之覆計在旦日此亦海內之同以為望者也匪佞匪佞小兒楫向辱顧愛兹來補歷敬令起居以近德容尚祈終教之想蒙不外多病臨書不盡所言與金美之太史舊嵗寓京邸姚生一貫來承手書名畫為惠甚渥屬時南歸匆匆遂阻裁謝抵家碌碌多病多事益取疏外比日薑明叔過舍具審起居佳勝德望逺孚但傳有枉顧之信殆成虛耳如何如何昨少湖來相對兩日夕每道髙雅不置當時買山收租之語今日兩秃翁政可辦之此豈亦畫餅耶表弟顧世安奉使道西湖之上恨不能附青雲也聊布所懷目力日短殊不盡所欲言答羅整翁太宰深薄佑早衰卧病海濵者已再閲嵗矣忽辱手書佳惠感極而繼之以泣也豈勝欽向恭審台嚴棐相萬福自違道範以來四易寒暑屈指明後年計登八旬念欲捧觴道路匪遙而人事難必徒深瞻望伏惟安車蒲輪之禮國典固存而天下之望所繫尤重萬惟為道保愛為祝深手足俱廢託門生代筆以達無任皇悚之至儼山集卷九十三
