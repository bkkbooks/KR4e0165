body:
  text: 儼山集巻六十明陸深撰傳二重修蘇軾傳蘇軾字子瞻眉山人也父洵母程氏軾生十年父時宦學四方母親授以書聞古今成敗輒能語其要母讀范滂傳慨然太息軾請曰軾若為滂母許之乎母曰汝能為滂吾顧不能為滂母耶比冠學通經史善屬文嘉祐二年歐陽修考試禮部進士嫉時文詭異之弊思有以救之同考梅堯臣得軾刑賞忠厚論以示修修驚喜欲冠多士然疑之乃寘第二復以春秋對義居第一殿試中乙科後以書見修修語聖俞曰吾當避此人一頭地㑹丁母憂五年調福昌主簿修以直言薦之秘閣試六論軾始具藳草文義粲然復對制策入三等自宋初以來制策入三等惟吳育與軾而已除大理評事僉書鳳翔府判官關中自元昊叛民貧役重岐下嵗輸南山木栰自渭入河經砥柱之險衙吏相踵破家軾訪其利害為修衙規使自擇工乗水進止由是害減半治平二年入判登聞鼔院英宗自藩邸聞其名欲以唐故事召入翰林知制誥宰相韓琦曰軾才自當為天下用要在朝廷培養之今驟用之適累之也英宗曰且與修注如何琦曰記注與制誥等爾不若召試館職英宗曰試之欲知其能如軾有不能邪琦猶不可及試二論復入三等得直史館軾聞琦語曰公可謂愛人以徳矣㑹洵卒賻以金帛辭之求贈一官乃贈光祿丞洵將終以兄太白早亡無後嫁妺葬事屬軾軾既除䘮即葬杜氏姑後推䕃彭彭太白曾孫也熙寧二年還朝王安石執政以判官告院四年安石欲變科舉興學校詔兩制三館議軾上議曰得人之道在於知人知人在於責實使君相有知人之明朝廷有責實之政則胥史皁隸未嘗無人而况於學校貢舉乎雖因今之法臣以為有餘使君相不知人朝廷不責實則公卿侍從常患無人而况學校貢舉乎雖復古之制臣以為不足臣謂今之學校特可因仍舊制至於貢舉之法行之百年治亂盛衰初不由此陛下視祖宗之世貢舉之法與今為孰精言語文章與今為孰優所得人才與今為孰多天下之事與今為孰辦較此四者之長短其議決矣願陛下留意於遠大臣又有私憂過計者夫性命之説自子貢不得聞而今學者恥不言性命讀其文浩然無當此豈真能然哉蓋中人之性安於放而樂於誕耳陛下亦安用之議上神宗悟即日召見問方今政令得失安在雖朕過失指陳可也對曰陛下求治太急聴言太廣進人太鋭神宗悚然曰卿三言朕當熟思軾退言於同列安石不悦命權開封府推官㑹上元勑府市浙燈且令損價軾疏言陛下以耳目不急之翫奪百姓口體之資願追還前命即詔罷之時新法行軾上書論其不便曰願陛下結人心厚風俗存紀綱軾見安石獨相因策進士以晉武平呉符堅伐晉齊任管仲燕任子之事同功異為問安石滋怒御史謝景溫論奏其過軾遂請外通判杭州高麗入貢書稱甲子軾却之使者易書稱熙寧然後受時新法行軾於其間每因法以便民徙知密州司農行手實法軾與提舉官議其不可行未幾朝廷罷之有盜竊發安撫司遣三班使臣來捕領卒悍凶至爭鬬殺人將潰為亂民奔訴軾軾投其書曰必不至此潰卒聞之少安徐使人招出戮之徙知徐州河決曹村泛溢于城下城將敗富民争出避水軾曰富民出民皆動揺吾誰與守吾在是驅使復入詣武衛營呼卒長曰河將害城雖禁軍宜為我盡力卒長曰當效命率其徒出築東南長堤首起戯馬臺尾屬于城城賴以全復請調來嵗夫築故城增木岸以虞再水朝廷從之徙知湖州表謝又以事不便者託詩以諷御史李定舒亶何正言劾其語涉訕謗逮赴臺獄神宗獨憐之以黄州團練副使安置軾築室於東坡自號東坡居士三年神宗數有意復用嘗語宰相王珪蔡確曰國史至重可命蘇軾成之珪有難色神宗曰軾不可姑用曾鞏鞏進太祖總論不合遂手札移軾汝州有曰蘇軾黜居思咎閲嵗滋深人材實難不忍終棄軾未至汝上書自言願居常朝奏夕報可道過金陵見王安石曰今西方用兵連年東南數起大獄公獨無一言以救之乎安石曰二事皆恵卿啓之安石在外安敢言軾曰在朝則言在外則不言常禮耳上所以待公者非常禮公所以事上者豈可以常禮乎安石厲聲曰安石須説又曰人須是知行一不義殺一不辜得天下弗為乃可軾曰今人争減半年磨勘雖殺人亦為之矣安石笑而不言至常神宗崩哲宗立復朝奉郎知登州召為禮部郎中軾舊善司馬光章惇時光為門下侍郎惇知樞密院二人不合軾謂惇曰司馬君實時望甚重不可慢惇以為然光少安遷起居舍人軾辭於宰相蔡確確曰朝中無出公右者軾曰林希年且長確曰希固當先公邪元祐元年軾以七品服入侍延和即賜銀緋遷中書舍人初祖宗時差役法行久而弊編户充役者不習其役遭吏胥虐使之害多致破産狹郷民有終嵗不得息者王安石相神宗改為免役使户差高下出錢以顧役奉行者過取以為民病司馬光為相欲復差役差官置局軾與其選軾曰差役免役各有利害免役之害掊斂民財十室九空斂聚於上而下有錢荒之患差役之害民常在官不得専力於農而貪吏猾胥得緣為姦此二害輕重蓋畧等矣光曰於君何如軾曰法相因則事易成事有漸則民不驚三代之法兵農為一至秦始分為二及唐中葉盡變府兵為長征之卒自爾以來民不知兵兵不知農農出穀帛以養兵兵出性命以衛農天下便之雖聖人復起不能易也今免役之法實大類此公欲驟罷免役而行差役正如罷長征而復民兵蓋未易也光不以為然軾又陳於政事堂光忿然軾曰昔韓魏公刺陜西義勇公為諫官争之甚力韓公不樂公亦不顧軾昔聞公道其詳豈今日公作相不許軾盡言耶光笑而謝之尋除翰林學士二年兼侍讀每進讀至治亂興衰之際未嘗不反覆開導覬有所啓悟哲宗每首肯之嘗讀祖宗寳訓因及時事軾厯言今賞罰不明善惡無所勸沮又黄河勢方北流而彊之使東夏人入鎮戎殺掠數萬人帥臣不以聞每事如此恐寖成衰亂之漸軾嘗鎻宿禁中召入對便殿宣仁后問曰卿前年為何官曰臣為常州團練副使曰今為何官曰臣今待罪翰林學士曰何以遽至此曰遭遇太皇太后皇帝陛下曰非也曰豈大臣論薦乎曰亦非也軾驚曰臣雖無狀不敢自他途進曰此先帝意也先帝每誦卿文章必歎曰奇才奇才但未及進卿耳軾不覺哭失聲宣仁后與哲宗亦泣左右皆感涕已而命坐賜茶徹御前金蓮燭送歸院三年權知禮部貢舉㑹大雪苦寒士坐庭中噤未能言軾寛其禁約使得盡技四年請外拜龍圖閣學士知杭州未行諫官言前相蔡確知安州作詩借郝處俊事以譏太皇太后大臣議遷之嶺南軾密疏朝廷若薄確之罪則於皇帝孝治為不足若深罪確則於太皇太后仁政為小累謂宜皇帝勑置獄逮治太皇太后出手詔赦之則於仁孝兩得矣宣仁后心善軾言而不能用軾出郊用前執政恩例遣内使賜龍茶銀合慰勞甚厚既至杭大旱饑疫並作軾請於朝免本路上供米三之一復得賜度僧牒易米以救饑者明年春又減價糶常平米多作饘粥藥劑遣使挾醫分坊治病活者甚衆軾曰杭水陸之㑹疫死比他處常多乃裒羨緡得二千復發槖中黄金五十兩以作病坊稍畜錢糧待之杭本近海地泉鹹苦居民稀少唐刺史李泌始引西湖水作六井民足於水白居易又浚西湖水入漕河自河入田所溉至千頃民以殷富湖水多葑自唐及錢氏嵗輒浚治宋興廢之葑積為田漕河失利取給江潮舟行市中潮又多淤三年一淘為民大患兼六井幾廢軾見茅山一河専受江潮鹽橋一河専受湖水遂浚二河以通漕復造堰牐以為湖水蓄洩之限江潮不復入市以餘利復完六井又取葑田積湖中南北徑三十里為長堤以通行者募人種菱湖中葑不復生收其利以備修湖取救荒餘錢萬緡糧萬石及請得百僧牒以募役者堤成植蓉栁其上望之如畫圖杭人名為蘇公堤杭僧浄源舊居海濱與舶客通元豐末高麗王子義天來朝因往拜焉㑹浄源死其徒竊持其像附舶往告義天亦使其徒來祭因持其國母二金塔云祝兩宮壽軾不納奏之曰高麗久不入貢失賜予厚利意欲求朝未測吾所以待之厚薄故因祭亡僧而行祝壽之禮若受而不答將生怨心受而厚賜之正墮其計今宜勿與知從州郡理却之庸僧猾商為國生事宜痛加懲創朝廷皆從之未幾貢使果至舊例使所至吳越七州費二萬四千餘緡軾乃令諸州量事裁損無復侵撓之害浙江潮海門東來勢如雷霆而浮山與漁浦諸山犬牙相錯洄洑激射嵗敗公私船不可勝計軾議自浙江上流疏鑿以避浮山之險奏聞有沮者功竟不成軾復言昔蘇州以東公私皆以篙行無陸挽者自慶厯以來松江大築挽路建長橋扼江三吳多水欲鑿挽路為十橋以迅松江之勢亦不果用軾二十年間再蒞杭有徳於州民生作祠以報六年召為吏部尚書未至以弟轍除右丞改翰林承㫖轍辭右丞欲與兄同備從官不聴軾在翰林數月復請外以龍圖閣學士出知潁州先是開封諸縣多水患吏不究本末決其陂澤注之恵民河河不能勝則陳亦多水又將鑿鄧艾溝與潁河並且鑿黄堆欲注之淮軾始至潁遣吏以水平準之淮之漲水高於新溝一丈若鑿黄堆淮水倒浸潁州決不可遂為言於朝從之郡有宿賊尹遇等數刼殺人吏以名捕不獲軾召汝隂尉李直方曰君能擒此當力言於朝優賞不獲亦以不職奏免君矣直方有母年九十與訣而後行手㦸刺而獲之朝廷以小不應格賞不及軾請以已之年勞當改郎階為直方賞不從七年徙揚州發運司舊主東南漕法聴操舟者私載物貨征商不得留難故操舟者以官舟為家補其弊漏所載咸達近嵗不忍征商之小失一切不許故舟弊人困多盜所載以濟饑寒公私皆病軾請復舊從之未閲嵗以兵部尚書召兼侍讀是嵗哲宗親祀南郊軾為鹵簿使導駕入太廟有赭繖犢車并青蓋犢車十餘争道不避軾使御營巡檢使問之乃皇后及大長公主軾於車中奏之哲宗遣使齎疏馳白太皇太后明日詔整肅儀衛自皇后而下皆毋得迎謁尋遷禮部兼端明殿翰林侍讀兩學士為禮部尚書高麗遣使請書朝廷以故事盡許之軾曰漢東平王請諸子及太史公書猶不肯予高麗所請有甚於此其可予乎不聴八年宣仁后崩哲宗親政軾乞補外以兩學士出知定州時國是將變軾不得入辭既行上書言陛下聴政之初當以通下情除壅蔽為急務臣日侍帷幄方當戍邊顧不得一見而行况疎逺小臣欲求自通難矣然臣不敢以不得對之故不効愚忠臣觀陛下之有為不患稍遲臣恐急進好利之臣輒勸陛下輕有改變敢望陛下虛心循理天下幸甚定州軍政壊弛衛卒驕惰軾取貪汙甚者配隸逺惡繕修營房禁止飲博軍中衣食稍足乃部勒以戰法衆皆畏伏諸校業業不安有卒史以贓訴其長軾曰此事吾自治則可若聴汝告軍中亂矣立決配之衆乃定㑹春大閱軾命舉舊典帥常服出帳中將吏戎服執事副總管王光祖自謂老將恥之稱疾不至軾召書吏使為奏光祖懼而出訖事肅然定人言自韓琦去後不見此禮至今矣契丹久和邊兵不可用惟沿邊弓箭社與冦為鄰以戰射自衛猶號精鋭故相龎籍守邊因俗立法緩急可使嵗久復弛又為保甲所撓軾奏免保甲及兩税折變科配不報紹聖初御史論軾掌内外制日謗訕遂以本官知英州尋降一官未至貶寧逺軍節度副使恵州安置居三年再貶瓊州别駕居昌化昌化故儋耳地初僦官屋以居有司猶不可軾遂買地築室獨與幼子過處著書為樂若將終身徽宗立移廉州改舒州團練副使徙永州更三大赦遂提舉玉局觀復朝奉郎建中靖國元年卒于常州年六十六所著有東坡集四十巻後集二十巻奏議十五巻内制十巻外制三巻和陶詩四巻論語説五巻書傳若干巻易傳則成父洵之志而作别有中庸論咸傳高宗即位贈資政殿學士崇贈太師諡文忠云三子邁迨過俱善為文邁駕部員外郎迨承務郎過通判中山府孫符禮部尚書論曰軾與弟轍皆師其父洵學嘉祐間父子兄弟並至京師一日而聲名赫然動於四方世稱之曰三蘇然軾文得之於天資幼好賈誼陸䞇之書既而讀莊子喟然歎曰是得吾心矣謫黄州杜門深居馳騁翰墨其文又一變矣嘗曰作文如行雲流水初無定質但常行於所當行止於所不可不止故雖嬉笑怒駡皆有文章轍嘗稱之曰自有文人以來未有若家兄之達者也君子不以為過當時受知於歐陽公特深韓魏公富鄭公皆待以國士一時文人如黄庭堅晁補之秦觀張耒陳師道皆宗焉負當世之望甚重仁宗以宰相許之神宗復稱為天下奇才忠規讜論立朝挺挺有大節每遭忌惡擠排遷謫迄無寧居與王介甫議論始終不合復與程正叔詰難禮文至分黨相攻或謂軾稍自韜戢亦當免禍不至大用人皆惜之或又以不大用為軾幸也儼山集巻六十
