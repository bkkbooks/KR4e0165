body:
  text: 儼山集巻六十四明陸深撰墓誌銘三太學生談君墓誌銘嗚呼此予友談君舜年之墓舜年諱壽與其伯兄田字舜于自相師友以文學鳴郡中有崑山片玉之風故人謂舜于為東石而君為西石云正徳辛巳有以舜年名上御史者既已得出察院歎曰齎吾志吾逝矣乃卒予在京師傳其事者不一予未敢遽信也東歸問于其兄弟子姪則皆泣不忍言又問于其親識交舊或言不欲盡言予意甚哀之嗚呼士大夫僅立門戶思為燕貽將使後之人弱者獲以自存其賢且明者復資以用世故孟子論故國必曰喬木世臣彼伐其枝葉以傷其本根使濯濯焉抑何利於人國斯豈其心哉無亦所遭逢者有命也嗚呼才美如舜年使蚤取科第以起必不死不必取科第得為寒素士或不死且不為寒素士稍自晦其才亦未至於死今死矣豈非命哉其孤伯古卜以正徳辛巳十二月二十四日壬寅𦵏于鶴坡西原祖塋之右持東石君所為狀謁銘予義不容辭按談氏今松郡大族其先開封人宋博士宗遂扈從南渡居苕霅之間再遷上海之鶴坡里工部右侍郎野翁先生舉天順間進士歴官九卿有經濟才君之世父也曾祖晩香公祖怡靜公俱贈通議大夫工部右侍郎曾祖妣祖妣俱王贈淑人考諱秩號存省義授郎官妣朱氏君生有異質寡言笑入小學時猶未茹葷年十三喪母即議廬墓曰此家伯喪大母時事吾家學也適野翁罷工部歸聞之曰兒真欲學而伯耶君對曰孤兒非伯尚誰學哉則又泣曰願伯父子視兒也野翁舉少時讀書鐙與之顧謂存省公喜曰弟有子矣時慈谿姚東泉先生有重名野翁禮致之俾君卒業東泉亟加稱賞已補為弟子員有聲遭存省公喪哀毁如禮服闋舉于鄉再三不利然名益起學益充諸提學使者更三四輩器奬益重竟以例上國子國子祭酒踵接皆愛之與東石君自國子再舉再不利更相謂曰司空之業衰矣不當再圖乎幸無忘授鐙之事年才四十有八而禍作矣寔三月一日也配唐氏有淑徳視庶子女如已出用不乏嗣躬行勤儉用豐其家方西石君䕶其姪不當為賦長有事于官時唐方病又私憂之一哭而卒云享年五十寔二月四日也再浹旬間而夫婦相繼逝於仁愛天道竟何如哉子男一即伯古孝敬而文息女一張志其壻也孫男一如金孫女一徳貞君器宇修偉昻藏如野鶴而談吐條鬯有古策士之風為文章辯博不群詩歌清麗筆札在晉唐之間家居尤事力田務本所與游盡海内名士而君之兄弟辱謂予為益友予竟何益哉雪涕為之銘銘曰孰豐其材而嗇其為器何成之難而毁則易嗚呼其藏之深以俟知已於百世勅封安人郭氏墓誌銘嗚呼禮婦人無稱其稱賢婦繫其夫其稱賢母繫其子匪專詞也此深讀郁侍御希正所狀郭安人事而有感焉安人今同知松江府事新蔡張侯配也深與希正為諸生時侯已來蒞於松松之人宜侯甚也由倅以登故無改地焉考於侯安人之賢概可知已按郭氏出汝寧世武弁有諱某者以文資通判武昌府安人之父也母曽氏初武昌君與侯家公友也器侯而女焉安人自幼即不凡習於女紅手不停製曽夫人見其勞於寒暑而止之每前對曰舎此閨中安事也嘗授孝經列女傳請於母師而讀之曰由此列女貞婦知古昔有若人也及笄歸侯侯時為庠生富有文名日多賓友安人從中饋給之無倦夜分讀書每以織絍助其佔畢侯博學多才嘗試為繪事夫人從旁睨之曰為此能無妨於學乎抑將奪而功也侯憮然止之自是一意於學領河南某年鄉薦遂入胄監安人奉二大人於家居起以時滫髓必具使二大人忘其子之逺於身也侯宦松迎二大人來養安人日率子姓娛㺯左右使二大人忘其身之去鄉土也侯顧内得助故不以家累政嘗受牒賑郡饑侯以里計民以民計粟大發一時全活者甚衆事竣閲燭㑹稽官廩幾空頗私憂焉安人心知之曰是不過得罪焉耳為郡父母而活民寧能計利害耶侯聞而釋然海冦發於崇明大出軍撲滅之檄侯為先鋒戒行屬安人以家事安人大聲曰此王事也吾將家女軍旅之道以無懼為主况此小醜盜兵者乎上慰舅姑下訓子女妾之分也侯果以大捷蒙厚賞若安人者亦可壯也侯督餉嵗一至京師安人嘗嚴治門戶以徯其教子也尤嚴而有法及是侯適出役而安人歿於粉署嗚呼若是者能無稱乎是故次其大者繫之侯以著安人之賢也享年五十有二以某年月日受封以天順某年月日生以正徳某年月日卒子男三長萱娶游氏次葵娶曹氏俱學生次芷聘王氏息女二長適曹大夏次適孟堂早卒孫女一侯南還將歸櫬於新蔡卜以某年月日𦵏焉乞銘銘曰惟婦之良為家之光厥功孰多中賛潛襄中州淑靈豈獨君子英英閨彦懦夫可起周詩采蘩秦風板屋太師是陳俾也可錄鳳吉終叶鸞章自天詎曰草露永賁重泉副千戶唐公墓誌銘嘉靖二年春三月庚申武略將軍副千戶唐公卜𦵏於周涇之原配以喬宜人大封焉禮也其嗣子太學生牧具衰絰奉太常寺少卿曲江趙公狀乞銘深不敢辭按唐氏著上海上海之唐寔出子方晉陽靈石人也吳元年有諱英者官烏泥涇税課局大使因家焉英生福福生俊俊生昭皆有隠操昭生瑜舉進士歴官至都察院右副都御史為憲廟時名臣公都憲公之仲子也母尹氏諱鏞字士和别號煑雪人故稱為煑雪先生幼有至性孝友和厚儀觀雄偉瞻視左右炯然射人音吐洪鬯纚纚然不為媕阿淟澁之態接人未嘗有惰容見者咸敬公公敬人亦終身也有長才見於家政事輙就理故家世遂為邑中冠都憲公遊宦無内顧焉暨還政歸則室堂精好園田清嘉歌舞都雅賓客之過從甘脆之盈潔公悉心焉都憲公顧而樂之待伯兄桂巖先生尤有禮意故邑中稱公為孝子弟弟云𢎞治壬子山東饑公輸粟若干賑之例授松江守禦千戶所副千戶月有俸給公具辭章服則拜焉曰聖恩厚矣正徳己巳邑大水公乃蠲租若干計口給食以活佃丁又若干郡邑長吏聞公名欲致一見之公不可或有禮其廬者人勸之曰當見於是公又不可嵗時又招為鄉飲賓公竟不可曰吾欲何求也顧不任為禮耳雅愛山水晩益為林泉之樂澆花蒔竹架石鑿池日與親知數輩徜徉其間飲酒賦詩意豁如也享年七十有二以正徳戊寅十一月三日終于正寢云配宜人喬氏贈翰林院編脩公之女有賢行初連舉女得子輙殀已乃生牧牧生九齡而宜人卒公特鍾愛乃擇令族得長樂令平野凌公之女配焉今倜儻有器局蓋方向顯榮云女四周鳳薛鳳張鸙沈陟其壻也深與公家有㜕少從桂巖煑雪公兄弟間游處若崑山雙璧與桂林連枝交映相輝應接不暇也退而察公所存咸近於厚諸女婺居撫諸甥教養備至故周氏甥既登科猶以公姓姓之示不敢忘也則公之種徳纍行概可見矣宜銘銘曰深山靈谷厥産鳳麟世徳名家乃鍾偉人吁嗟先生禀遇特異身際五朝家承六世既令厥名復全而歸文事武備完徳庶幾周涇之匯實維同穴太史銘之萬古是閱方溪劉公墓誌銘嗚呼必有世徳乃有世望必有世澤乃有世家夫世世有徳焉生長見聞必有超於風習之外使人望焉知為名流夫是之謂澤漸濡所暨濃潤固殊其於鄉邑郡國寔繫觀聽有感化焉此世家之所以重也予於誌敬之劉方溪之墓蓋致三嘆於斯劉故上海世家也敬之早承父兄之澤其生長見聞淵源夐矣加以通敏倜儻之才發其深逺豐碩之積淹雅藴藉望之於琴尊圖史之間非復尋常品流可企也惜乎天不假年而轉移之具於鄉國多所未試焉嗚呼其孤啓元等卜以嘉靖乙酉十二月六日庚申奉窆於祖塋之次以談進士承儒狀來乞銘陸與劉世婣也昨嵗汀州之𦵏予為書其𤣥堂之石茲安敢辭按狀公諱交字敬之别號方溪劉之先自南宋有亨叔者遷居華亭再遷上海者仲禮也曾祖諱文忠祖諱鈍字廷魯號水月以仲子璵貴贈奉政大夫真定府同知祖妣顧氏贈宜人父諱玉字鍾秀號靜齋母王氏生三子敬之其季也少頴異在群兒中目光如炬治舉子業即通大義善筆札長壻曹怡松家怡松諱玭字以淵縣之舊族以行誼聞又善鑒識一見敬之撫其額曰是郎終不碌碌吾未舉子吾有女宜配半吾子也既入怡松家即為曹氏持家政甚辦㑹靜齋府君遘疾乃辭歸率其婦日侍湯藥復奉王孺人以色養存歿咸厚以比于禮時從父坦齋府君致建寧政還敬之日侍尊俎殷勤欵至逮仲兄宜亭公以汀州還復事之如坦齋焉人每羨之湖廣嵗饑輸粟若干斛授魯府引禮舎人待次于家郡縣有公務冗劇者咸就敬之取辦焉乾清大工興部使者分司蘇州專督陶甓檄往從事劑料有法大為寧海張公所器縣侯𢎞農王公莆田鄭公咸加賞識敬之不問久暫勞勩未嘗伐焉友人趙雲谷既卒其遺孤龍無所於歸為收養之併恤其家如不及人尤賢之居嘗多蓄名酒暇則致客客至則賦詩屬對相與勘契法書名畫摩挲古彛器為樂與人交不為蹊徑有非禮相犯者輙形之顔面人亦亮之治家井井凡婚嫁喪𦵏之禮咸適于中教諸子以繼述為大蓋世家之望云以嘉靖甲申八月十三日終于正寢上距成化庚寅六月一日享年五十有五娶曹氏即怡松長女有賢行能相其家子男五長啓元娶余氏次紹元娶沈氏俱國子生次守元娶沈氏縣醫學訓科次慶元娶莊氏次鶴年女一適縣學生孫繼科孫男二繼孫承孫女二敬之視余少長幼嘗往來予家與之㳺處甚狎也予知其才之足以善俗而惜其年之未足以酬志也乃為之論次其家世而復系之銘銘曰千年在前承者劉氏千年在後劉氏伊始人孰不壽逖以名紀亦孰匪才崇善則美嗟嗟方溪人逺室邇斯文足徴九原莫起粤有遺休厥在𦙍似致仕新淦縣丞榮隠余公墓誌銘上海有舊家必曰余氏余氏之彦必曰榮隠公公諱麟字文禎以縣學生起家仕為新淦縣丞年未五十即自銓曹乞致仕是時鈞陽馬端肅公為冡宰特為例處之既歸修葺故居手理泉石花竹於城市中極為幽勝庭下紐檜相傳為宋元時物人稱之曰喬木云公修髯峻宇徜徉其間雅歌投壺飲酒賦詩不復以人間事注意澹如也年七十有一而卒其孤繼芳等以墓石請按余氏之先有諱承仕者仕宋為拱衛司兵馬䕶駕南渡因居華亭之華村十傳至耕樂公之髙祖也耕樂字穀寳穀寳永樂中應召為太醫賜緋直翰林而終耕樂生旭字景陽壻於上海鎮之胡氏遂家焉旭生郇字孟祈號梅竹以詩書行誼聞邑中郇生廉字清臣通敏倜儻累科不第以例貢入太學授新昌丞配姚孺人寔生公公遭愍凶力守先業專意科舉有聲既乃奉例補國子生循次授新淦丞新淦故號難治適尹去公遂署篆以清慎自勵種種悉辦上官才之他郡縣事有不能辦者輙檄公公受檄即辦如新淦三載矣旌奬屢至亟為按察使張公某知府吳公叙所器後新淦人去思之饋遺候問嵗時不絶吳公謝還亦至上海與公握手相歡者浹月乃去人以為難云以嘉靖甲申十二月三日卒以又明年丙戌十二月某日𦵏祖塋之次娶錢氏御史孫女柔順貞淑允執婦道先公三十七年卒生子一曰繼芳娶俞氏縣隂陽訓術女二適曹恢適奚邦寳繼娶彭氏府尹次女也賢明慈慧以賢母聞生子一曰繼瑞娶韓氏縣學生女二適劉啓元適曹應文孫男三重器大器宗器孫女三深少即知敬公嘗過其家坐春堂俯山亭周旋陟降覽觀故舊之跡焚香啜茶每至盡日舉手揮麈談古今治亂之迹纚纚可聽與人交啓齒即露肺肝不少狥俗態晩年耳目聰明步趨有章燈下猶能作蠅頭細字迨屬纊猶以繼述屬其子云蓋公天資豈弟樂善慕義無彫飾藻繪之行抑其流風餘韻固有以厚之也宜銘銘曰厥家之舊而徳之新雖宦途之嗇民以有親進退何累蓋云任真風以引之尚有後人是曰榮隠之藏信此貞珉勅封孺人居氏墓誌銘許孺人姓居氏封兵科給事中許公之繼室也公名滋初娶于俞生子相卿是為今兵科給事中公孺人所由貴也給事甫孩而俞孺人見背公抱之泣曰兒胡不幸幸有母母之其誰則宜時俞居甥舅兄弟也於是俞之長者以孺人聞公亦聞孺人之賢也遂歸許許一樗翁之喪室有季女公以屬之孺人曰此吾同産也先人之志也敢不惟厚孺人欣然以之曰抑敢不惟厚既笄悉推已匳具嫁之樗翁之妾蔡遺而無子孺人事之恭以老焉許故族大而衍内外長幼嵗時交際孺人品酌而密應之一一當其心家食凡數百指時其寒饑加之惠甚辦也凡祭祀賔客必親潔豐腆合禮曰中饋吾職也又敢不䖍生一子曰桐卿孺人督桐卿以兄之業既乃循例使待次益王府典膳官曰若且倦矣以儉勤助若家可乎由是許益大初給事幼善病孺人醫禱巫卜備至迨長學成弗即遇時以好言慰公曰此子必逺到遲早命也既舉丁丑進士髙等為時名流即拜兵科給事中今上皇帝覃恩兩宫首逮禁近之臣由是公受封俞受贈而孺人遂並命矣既乃喜曰病婦蒙恩何以堪此公曰吾亦思之第當恪守儒素以成吾子庶所以為報稱者一意深藏養恬故給事罔内顧以共其職云逮與告還每孺人初度給事率弟若子稱觴戯綵以為常一鄉榮之年五十有九以嘉靖五年十有二月六日卒給事尤極哀慕奉其友給事趙君之狀衰絰走四百里而問銘於上海陸深按孺人世家海寧城北隅大父諱縉父諱正生而婉順浙之東西稱賢母云子男二長即相卿次即桐卿女二適祝繼暄周王府典膳適賈中錫太學生孫男四曰聞過給事出也曰聞逺聞運聞近典膳出也女八卜以今年丁亥二月十二日己未𦵏于九杞山永安湖杜曲之陽以深觀于給事之孝而槩于孺人之賢也宜銘銘曰夫曰賢婦子曰賢母儷榮應典若劵左右風斯引之茲曰不朽萬世在前萬世在後儼山集巻六十四
