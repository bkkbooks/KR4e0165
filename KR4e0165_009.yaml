body:
  text: 儼山集卷九明陸深撰七言律詩一五十首長至侍班白玉闌干動曉容鳯笙吹律應黃鐘侍臣躡履趨金殿天子垂衣覆衮龍雲裏雪花依仗落爐間香氣入簾濃却看下界羅星斗身在鈞天第幾重南郊駕出南郊清禁鎖乾文時倚齊居望瑞雲帝輦欲來香滿路宫門乍啓曉初分芝房桂棟圜丘殿虎旅龍驤太乙軍昔日楊雄空麗藻唯將羽獵奏明君駕入龍旗日射九關開鳯輦風髙萬乘來皇國山川自迥互碧空雲物尚徘徊依微花柳迎春仗次第王侯獻壽杯漢畤唐封俱鄙陋虞書周典共昭回東山草堂一首送東山劉先生致仕堂成十載晝扃扉不負山靈將相歸物外漁樵相問答階前猿鶴有光輝偏宜夜月凉先到可忍春雲濕未飛想得夜䦨還有夢龍紋時動篋中衣賦得新鶯花裏新鶯髙復低遍身金縷養初齊自來幽谷偏求友慣領東風試學啼何處王孫停柳外十年征戍憶遼西上林喬木知多少他日一枝應借棲秋聲髙閣煩襟生逺興忽聞凉籟動羅幃隨風已去傳鳴柝傍月還來助搗衣疑有波濤從地起獨憐烏鵲正南飛長安此夜悲秋客細數流年感是非秋興二首細雨兼風若有情樹邊樓裏伴秋清候蟲燈火黃昏永客子衣裳白苧輕魂夢幾番偏故國襟期何處慰平生壁間更與悲團扇卧聽梧桐落葉聲悵望西山宿雨晴新涼髙閣夢魂清秋於景物三分變老覺功名一念輕日課就荒詩草少月支無補俸錢贏長安嵗嵗逢搖落宋玉情多鬢易星秋日慧昭寺訪舊迷道不是桃源路亦迷客心隨馬自東西蕭疏榆柳如前嵗依約樓臺記隔溪入寺緒風秋較早照窗斜日鳥偏啼憑誰指㸃還歸去頭白山僧有杖藜秋日㑹通河送客京國三年思故國黃花時節又登臺清江水冷魚龍伏落日天空鴻鴈來忽漫逢人渾似夢常因送客暫開懷鱸魚蓴菜江東地不為蓴鱸也合回與徐昌國登雞鳴山臨風蕭散撤荆扉緩步相攜上翠微試日丙丁看塔影賭松寬窄解腰圍路侵璧水分鳴鐸石近僧床掛衲衣滿目樓臺形勝裏當年辛苦憶龍飛送林見素都憲撫江西閶闔天開袖疏來先皇深意獨憐材江搖旌斾雲霞繞詔剪絲綸日月回千里藩垣聊試手百年海嶽幾生才故山聞說饒猿鶴滿地蒼生半草萊送劉直夫歸省還江西羣聫共愛挹蘭芳南浦魂銷一舉觴君獨有親甘去國我寧無夢繞髙堂天連鳥背迷寒雨江引漁梁出曉霜珍重天涯易回首官橋春日柳條長雙挽蕭蕭松柏北邙道連理凋殘風日清地下有靈龍合劍人間無主鶴歸城山西短日迷椿影機上殘燈照雨聲四尺碑頭字如掌行人讀遍汝南評元宵滿街燈火雜游塵消受風光五日春時十日立春微雨淡雲城上月紙燈茅店客中身家遙隔嵗書隨鴈山近當窗鬼笑人佳節不殊心賞異梅花新水獨相親破曉出水西門往江口途中作城西買馬滑衝泥總為風光候指揮拍案寒潮驚曉枕過江殘雪上春衣梅花野寺初聞磬楊柳村居半掩扉曙色漸分人漸逺五雲雙闕擁朝暉子殤后二首消瘦腰支減練裙異鄉音信可堪聞青春滿面殤兒淚白骨三遷幼女墳萍水飄零風顫雪文章消息雨收雲業緣尚有迂癡在愛惜圖書未敢焚磨蟻旋旋意緒同傷春隨處怯東風三年未了隆中卧一旦誰收稷下功滿徑藥苗因病減隔窗蕉葉為書空細尋舊事輪纎指雲水今朝是幾重夜宿龍江驛風塵隨分三年住燈火江村一夜留入市女郎能買酒懷家游子怯登樓烟中舟楫來京口雲裏鐘鈴出石頭水淨更闌不成寐隔船鄉思起吳謳入京口閘沙城擾擾人歸市喜色津津客過關船外寒潮隨白鳥樹間花氣繞青山夢魂風雨今宵減鄉國門墻五日還百里波濤幸無恙滿巵村酒慰慈顔入晉陵西門往東門晚泊百年雨露長繁華煙柳長堤入市斜石岸樓船載簫鼓朱闌簾幕護鶯花軟泥驛路人調馬細水溪橋女浣沙待泊黃昏更東下滿城燈火萬人家春暮還舊隱花木半存憮然拈筆有作淡花疏竹舊簾櫳墻暈苔痕碧土濃春燕定巢應識主夜蛾隨幌獨憐儂池塘課僕添栽藕杯豆留人半采葑僻絶吾廬偏不厭枕書日日卧髙舂夏日幽居即事手汲清泉和碧煙細臨晉帖滿吳箋南風送暑催三伏西日下山留半圓丹奈雨肥禽著意畫梁泥足燕髙眠方床髙結跏趺坐我與幽居信有緣書扇寄王天錫乃兄天則梅花嵗嵗憑君折折盡梅花第幾枝樹杪暮雲看去逺江湖游鯉到來遲詩今㸃竄成千首路已經過熟九疑坐對惠連談往事夜來應夢草生池挽周處士生前不識處士面身後空成處士吟小雨荷香池館靜暖風花信草堂深青山昨夜悲埋玉流水何年到賞音四尺碑頭數行墨罨溪松柏自蕭森寄王瑩中定山風景近何如江月江潮繞故廬龍洞舊游春服就太𤣥新著夜忩虛滿川花柳三杯裏隔岸樓臺六代餘我獨長安經嵗晚南來目斷數行書落花蝶粉蜂黃冷浣溪衰顔無主畫樓西情緣偏戀鴛鴦水勳業多留燕子泥荏苒芳塵湘魄化飄搖紅雨蜀魂迷池塘倍覺朝來勝新緑成隂護鳥啼館中書事深既入館司禮監太監蕭敬者在上前言進士陸深徐禎卿意若幸豫而惜昌穀之不偶數日後同年數輩在左闕門接本有中人問之曰爾進士中有陸深徐禎卿者衆皆愕然不識其故漫應之曰然曰前日蕭太監為至尊言之如此衆以告豫豫驚且懼賤姓名何以達于中貴因識以詩疏慵舊業大江東十載雕蟲愧未工豈有才名驚行輩徒勞中貴達宸聰少年賈誼吾安敢今日相如事偶同自笑子虛無賦草親將迂策獻重瞳末意謂深雖被蕭監之薦然以迂朴之學受知先帝故有是命與楊得意薦相如者異矣馮侍御野雉坪蕪莽頻年雜採樵山靈留此託髙標紆回負郭瓜田近平逺如村石徑遙日暖林端飛雉子雨晴澗尾送魚苗功成廊廟懸車處應有芳名配午橋張家灣志哀五年此地往來過人事悲歡奈爾何涕淚偏從寒夜墮月華空自海門多天邊衰柳連村郭囊裏殘書廢蓼莪沙際一燈人語寂北風流水共悲歌長女卒後復攜家渡江趨朝入市總無緣江上新開二頃田水閣茅堂元自得酒懷詩興故依然夕陽度嶺人吹笛秋水臨門客繫船尚有舊書三百軸海雲江月共年年送熊元交使越山水蒼蒼古越州菱花荷葉共維舟二髙峯頂三更日七里灘聲五月秋靈雨自隨征斾去綵雲常傍使星流江南江北還相望兩地各登髙處樓送顧與成使浙江江南此去經年别更欲殷勤不可攀細雨出城春淡泊斷氷辭岸水潺湲風花碧落鶯遷谷燈火黃昏吏報關歸計越中須作早石渠諸老待君還邵氏園亭主人池館玉橋東盡日輕塵不度風黃鳥愛啼墻曲裏緑雲常護日方中茶分陽羡家園好地接長安客况同何似更當良燕夜月痕花影淡簾櫳雪夜聽沈仁甫談鄉事鄉事連牀話未休春寒寂寂送春愁素衣憐子客千里書燭搖人風滿樓燕地雪花偏入暮故園楊柳幾經秋多情若問吳淞水猶繞儂家日夜流秋丁國學分祀瑶壇夜氣屬秋清禮殿衣冠肅上丁風度簫韶聞九奏露垂銀漢轉三星青松團蓋飄香篆白玉圍䦨映舞翎聖道彌髙垂萬古皇恩罔極授羣經題石淙二首為師相楊先生入雲嫋嫋石泉流回首青山憶舊遊天柱雪消銀瀑下海門日照紫烟浮即看鳥背三台路疑有軍聲萬里秋此地到江龍窟近化為霖雨滿神州滇水湘山故有情石淙又紀勝遊名坐來風雨聞韶濩挽作天河洗甲兵曉出五雲隨日捧寒流千折到江清暗通氣脈金山寺更表東南鐵甕城長陵文皇功業冠吾朝極目長陵北斗髙龍虎千重常隱霧松楸萬壑驟聞濤禮成寢殿嚴三獻版署曽孫饗太牢淺薄小臣叨法從夜分端拜擁青袍景陵景陵東奠接蓬瀛長憶宣皇致太平弓劔閟嚴龍氣合樓臺環瑣斗杓橫地髙海嶽依依見天濶風雲冉冉生萬嵗千年隆禮典羣官偏許夜深行劉蕡祠二首諫議千年自有祠唐朝宫闕黍離離多情瘦馬衝寒到無數青山落照遲往事空傳臺下駿靈風常滿廟前旗氷霜入夜頻搔首欲奠芳椒侑楚詞門帶氷堤一徑隨丹青寥落見風儀當年去國呈秋卷同輩看花滿麗詞言論縱危終愛主英雄空好不逢時客來繫馬祠前樹獨坐寒山有所思夜坐念東征將士長河乘夜渡貔貅兵氣如雲擁上游大將能揮白羽扇君王不愛紫貂裘十二關山齊故國百年疆域漢神州不眠霜月聞刁斗自啓茅堂望斗牛書扇贈何子元武選春風吹墮洞庭舟春日來從鸚鵡洲萬國風塵隨獨客五更煙月下中流天邊城闕身重到笛裏關山鬢已秋坐憶五年江海别楚雲吳樹各登樓赤水村登土岡同何子元武選張子醇儀制賦得春字林館來遲已暮春追攀且得共髙人貪山更送雲中目避日時移樹裏身臺殿近瞻龍氣繞笙歌聊代鳥聲頻城西亦是風雲地不遣登臨負此辰赤水村與方道士赤水村西風日晴紫琳宫裏鳯簫聲經冬翠竹搖仙珮萬里青山繞帝京休沐偶過花院靜盤飱兼愛藥苗清主人已得長生訣我輩空懷遺世情思歸飲欽之館鄉心迢遞鬱難開且醉佳人舊酒杯千里鴈書回隔嵗五湖雲樹鎖髙臺遙聞河北兵還滿坐看長安月又來容取腐儒江海上仗君終作濟時才病起見庭萱有作堂背花開空復情客衣偏感嵗年更滿庭緑䕃飛新燕無數鄉心啼亂鶯病後强題眠食健鏡中常為鬢毛驚黃金臺上頻回首慙愧當時買駿名鄭家口晚眺落日曠野飛沙平微吟捲席登岸行垂楊緑暗夕露下細草碧鋪晴月明空闊試窮逺望目飄零每動思家情明發一舟何處所江湖隨到問鷗盟戲馬臺晚眺王氣蕭條伯業收彭城依舊碭山秋山連青郡兼齊繞水合黃河入海流漠漠雲邊低度鳥疏疏樹杪送行舟凌空臺閣宜春望尚及西風半日遊儼山集卷九
