body:
  text: 儼山集卷三十明陸深撰頌二首景雲頌惟我皇明傳世九葉今天子嗣大寶之十有七年龍集戊戌九月己丑景雲見於已位五色畢具爛然成文冠日而興若華蓋之狀有目者之所共覩也于時天子方修明堂講配位蓍兆既協詢謨僉同將以吉辰有事于奠獻天意若曰文德至矣有如此雲萬口喧歡以為希世之奇瑞也聖德感格如影隨形而天子方退然不居特下明詔歸於默報甚無以慰臣民仰望之本心也臣聞之古記云天子孝則景雲出遊伏惟聖上重新九廟尊上徽稱追宗獻考奉飬慈幃本根終始之禮質文交盡可謂孝之至矣又聞之德至山陵則景雲出伏惟聖上春秋霜露親謁諸陵江南泗上葺飾備舉下至草木鳥獸之微生成咸若可謂德至山陵矣又按天樞得則景雲出夫天樞者北辰也居其所而衆星拱之斯得矣伏惟聖上創製圜丘密邇宸極禮樂修明效法圜運屹然有居中馭外之尊萬世永賴則天樞亦云得矣遒是衆美而眷祉方新有煥天章悉以類應豈一德一行偶以希合致哉而歌頌不作後世無聞臣甚恧焉臣深無似待罪詞林獲以文墨事聖天子輒敢忘其粗陋撰成頌篇雖不足以揄揚盛美之萬一庶以明臣區區之職分也頌曰兩儀奠位惟皇繼天山川出雲有開必先明明我皇履方體圓育靈江漢比德蒼玄誕膺寶籙龍耀百川殷邦靖嘉羲畫契傳撫世御宇何德弗全堯文舜孝禹烈湯虔郊廟儼若山陵愓然尊親饗帝禮樂經權文成有煥迹邁無前祥由善致氣以理宣歲舍戊戌土德允堅時維秋季離巽星躔太陽麗正風候暄姸有雲五色若抱若懸為章霄漢非霧非煙綵纈晃曜縹眇聫翩至和攸萃積慶綿連萬目快覩衆口垂涎額手蹈足裾袂蹁躚惟皇聖德克配彼天子孫千億麟趾闐駢皇風清穆九有八埏詎曰昭鑒符瑞稱賢小臣作頌以告萬年瑞雪頌嘉靖庚子歲行將除皇帝禱雪於西內重民命也天意若曰數有適符物以期致者非所以彰靈貺而答至精也乃明年辛丑正月元日戊子之辰誕降瑞雪揚空覆地爛若銀海明日己丑再降幾盈一尺于時萬國來朝四夷畢至被冒掀舞於大庭之上稽首百拜咸稱萬歲都城士女喜忭奔走於六街九衢之中歎未嘗有遠而望之皓皓無際灼然豐穰之兆矣易有之隂陽不測之謂神斯其神化也乎是宜頒瑞四方而頌聲作焉臣謹按雪者五榖之精也尤宜三麥夫榖晚成而麥早早晚咸宜民命厚矣其瑞為大又按庚者更也辛者新也是雪之降若更其舊而維新之從天貺昭彰我皇上必且盡釋舊恙而迓續新休矣斯所為瑞抑又大焉忝文墨之司敬獻瑞雪頌頌曰后惟玄聖道通于天風雨霜露無感不然爰念粒食惟茲素雪協候應期以屇嚴節皇穹蓋高其聽則卑我后明德響應是隨帝曰不遲三陽五始乃召滕六乃呼巽二重雲密霰玉潔珠輝來牟之慶遍于九圍優渥霑足黍稷穜稑遺蝗載驅愆陽盡伏我后明明既安且寧玉樓瑶砌垂拱穆清增高益下踰尺盈丈與化俱融何物不養瞻彼流泉聿成江河皇澤斯沛與潤孰多普天薄海以遂俯仰一人凝和參三贊兩凡此雪瑞函自后衷小臣作頌以表膚功贊十八首御史張公遺像贊是為御史張公之像前輩人物典刑猶存後生欲起為之執鞭何况升其堂而及其門一生忠義丹青炳然畫史徒能工於著筆豈盡得其似而肖其全惟我聖明文皇入繼風嚴度貞公實遭際侃侃中臺鳯鳴鶻逝萬言密馳重瞳屢霽一當其難衆疑太鋭公曰遠違左右我帝青驄繡衣凛凛百世再拜述言用告來裔按察使林公像贊此莆陽順齋先生林公總憲蜀司時小像也前史官陸深為作贊曰即之也溫而有萬仭壁立之風退然若避而負四海蒼生之望蓋才全者左右皆宜而內藴者形神俱王此將來宰輔之儲乃方今執法之象是豈贊揚之所能宣亦恐丹青之難為狀也朱允升像贊紅日赤雲碧山如畫梧竹交加衣冠古雅殆居士逍遙於鳯岡之下耶欲覽德輝方歎龍馬文彩聫翩風神瀟灑豈居士校六書於既暇耶外臞中腴調高和寡圖書在行辭翰滿把乃居士歸自東海之野耶金薤琳琅出其土苴鈞天虞廷以遂傾寫方將求居士於古之有道者也壽松贊誰栽喬松是為真龍曽充禹貢不汙秦封棟梁斯具冰雪攸從育苓化珀萬世之功有萬世功與天地同黃靜菴像贊髯鬢若沐咳吐成文儼然起敬卓爾不羣謙沖自持而量包湖海之太籯金萬計而家以詩禮相聞置之廊廟旗常銘勳如當折衝可奪三軍豈動中之靜常有得於典墳抑亦人中之仙聊寄迹於塵氛耶方棠陵豪像贊斯人也其名豪其氣豪其文豪其骨亦豪所謂譽望翕若丹青炳若者耶今之世孰為相若而深之所畏若者也羅太宰整菴先生像贊一代醇儒當朝大老內重外輕量大心小淵源聖賢之傳異同必析雍容廟堂之上模範不少文明國華平格天壽竹素傳芳麟鳯在藪門墻既入然後知宗廟百官瞻望每勤豈惟東山北斗此蓋一時之趨蹌方當百官之領袖也李百朋秀才像贊前十年得子於文章之會後十年索子於丹青之外禍福無端愛憎叵奈服求厥衷道不下帶噫吾將與子浮沈於百年之內以靜觀天地之大夏桂洲像贊此公大宗伯時耶年幾耳順睿作心思伊周鴈序夔龍鳯池歷試底績一節何疑玉攻金冶雕範愈竒角麟在藪海鶴同姿古稱骨鯁茲表風儀天子若曰此朕之五臣士大夫望以百世之師嚴介溪像贊四首身居廊廟之上心存山水之間任當宰輔之權享有神仙之樂衣冠儼然若在林壑退自南宮朝回東閣人言介溪之風景或兼平泉之經營我覽黔岡之川原實帶歐陽之鄉落天上飛龍九臯鳴鶴物色無邉丹青可託又龍章鳯姿巖廊在上高才古調清廟餘響猗與休哉大宗伯像此文章禮樂之司而霖雨鹽梅之望也又望之甚癯其中則腴即之也溫而多禮讓龍章鳯姿超遙埃溘之中正笏垂紳雍容廊廟之上真金馬玉堂之列仙抑胄監虎幃之退講經筵沃心木天藜杖不然將典禮之敷陳與啓事之簸揚彼擅丹青者徒有得於影響而工物色者方殷霖雨天下之望猗與休哉此介溪尚書嚴公之像也又此公扈從南巡時耶恩袍晃耀雜佩陸離公孤雅望文武兼資天子神聖省方以時公在左右如取如期六飛晨渡單騎夕馳奔走先後詎一匪宜雙瞳炯然四時備之一身攸繫八表是儀望之者曰此神仙中人以豫度之乃當代之名臣也耶東方朔像贊人中隱吏中仙多聞博識所全者天吐故納新聊用引年微露編貝之齒驚倒一世之賢胡大參像贊此公大參時耶芝山之麓竹亭之上余以使事過饒適及拜焉敬作贊曰湖山所鍾朝野之望邈矣獨持卓哉自諒今之牧伯古則輔相爵位遞升丹青成像乃有爵位之所未酬者經綸之才亦有丹青之所難盡者高雅之量友梅李錦衣像贊此何遜之東閣乎豈林逋之孤山也彼美君子心迹雙間身依日月之上人在吏隱之間交結歲寒之契座挹春風之還是其不恃金吾之貴而常有玉樹之顔當夫破輕煙於耿耿恍乎麗壽星之斑斑者耶林母王氏貞節贊夫閨門之際可以觀化林母感憑箕之事堅柏舟之節斯非所謂化與離形器超死生異哉乎其子文纘以秋官顯致封敕并輝旌典天之報施於是乎在乃作贊曰夫死君事婦死夫志事雖弗終志則靡愧有憑者箕孰俾罔迷陟降一致馭風騎箕道既粹矣風斯引矣子子孫孫涕惟隕矣有旌在門封典斯存惟家之範惟國之恩以慶于後昆怡順汪翁孝義贊捐生寧母未必即死爭死愛弟與弟俱理母心愛子豈間彼此兩利雙完天實鑒視惟孝與義儉哉兼美世豈乏賢乃見汪氏怡順之軒名垂千祀激昻高風贊者太史儼山集卷三十
