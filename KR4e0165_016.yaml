body:
  text: 儼山集巻十六明陸深撰七言絶句七十三首館中天上文章白玉堂日華浮動鬱金香詞頭封罷渾無事獨步花磚繞畫廊春隂送客即事洞口桃花帶女蘿不知春色幾分過長驅白日紅塵淨無數青山細雨多和俞生暮春閨怨二首落花庭院草萋萋雨鸛晴鳩各自啼倦繡一春長閉閣忽將清夢過遼西魚書欲寄轉多情錦字回文織不成落盡桃花飛燕子一番風雨又清明雨窻春興四首芳草王孫濕未歸江南慿望轉霏微疎疎宻宻俱成陣留住楊花不肯飛聽風聽雨隔窻紗愛弄潺湲試早茶更喜園丁報新事魚苗隨水上平沙東風吹雨帶龍腥散作春聲繞畫屏人倚碧窻初避濕芸香翻盡太𤣥經水心亭館午風多别有長條許客過無數落花紅作陣一篙新雨緑生波漫興六首東風成陣落紅稀日日溪頭坐釣磯傳語白鷗休避我此心雖在已忘機好山多在夕陽西十曲清溪䕶石隄臨水草堂春事晩罏香驚墮燕銜泥麥秀風行宿雨乾苧羅衣袂薄生寒行藏欲問吾何似盡日花開獨倚闌一卧林居獨下幃斬新時物換春衣絲絲細栁灣灣水步到前村看雁飛細栁新蒲已滿谿獨尋春過小橋西奚囊佩得詩多少欲寄相思手自題滿簑風雨楚江天釣得鱸魚不賣錢十里溪橋趁歸路酒壚茅屋背花眠書扇寄黄竹泉溪堂山館帶江城睡起催花雨正晴聞説閒人多樂事臂鷹調馬過清明初夏即事二首水亭山館緑隂肥漸覺心情與世違午睡覺來香未燼一羣新燕學交飛雲日隂隂水氣涼園林梅子半青黄農歌野唱元無譜和合滄浪意自長四月一日與客登梅亭隔籬修竹隔溪花淺映深圍整復斜風外數聲啼布穀桔槹隨處野人家野航身世元同不繫舟落花時節雨初收束書一枕江湖夢流過江南杜若洲泛舟乾坤湖海總浮漚風月圖書共一舟向晩酒闌何處宿蘆花千頃近沙鷗題畫贈唐雲東扁舟只隔五湖東紅樹青山萬里通囘首白雲閒似我却疑人在水晶宮黄葵碧紗高捲不勝情曉夢初囘半宿酲獨有丹心待高日小闌干外雨新晴芙蓉輕紅淺緑殿芳晨野水凌寒避軟塵一曲楚辭漁子去隔江愁殺采花人登樓小樓西下小西湖淼淼烟波望轉孤連日南風吹不歇自添新水浸菖蒲題蒲泉移得通靈上品苗雲根新水暗通潮曉來絶勝金莖露多少明珠濕未消秋興二首春光不比秋光好料理精神只自知三月花時常卧病晩涼日日有新詩翠竹高梧一徑斜草堂開占白鷗沙秋來幾陣催寒雨報道芙蓉又着花中秋節後黄葵作花滿園甚富病起坐對二首滿院晩葵秋日清裹頭强起坐前楹誰云欠却看花福病裏看花别有情翠節亭亭揺翠雲淡鵞黄剪薄羅紋向陽心事依然在不共南風早䇿勲秋江釣舟圖西風吹滿荻蘆花釀作霜寒啼亂鴉買得釣船如屋裏只將秋水老南華芙蓉栁外風前生晩烟一江秋水碧於天吳娃越女相思調只愛銀塘歌采蓮偶成黄花翠竹動秋容白日滄江有臥龍不是扁舟歸去急隔溪相約采芙蓉重陽試筆積水澄鮮雲日涼花芳開過木犀黄一年又是重陽節閒倚西樓看雁行漫興五首花枝壓雨粉牆偏淡白輕紅盡可憐獨立曉風無限意為誰零落為誰妍月明吹徹紫鸞簫火宿沉檀暖未消風送海潮來别浦賣魚人過竹西橋溪亭山館隔花分更起江樓和水雲八月木犀風雨信徧抽緗帙散香芸蕭蕭涼雨報秋衣雲影嵐光鎻翠㣲人在竹窻初睡起坐看蛛網織危機水芳無數長溪毛秀色遥連翠浪高欲寄佳人無處所漫依楚調注離騷重陽後六日登鏡光閣下方僧梵雜鳴鐘身上危闌復幾重微看太液波光淨更接蓬萊雨氣濃西軒鑿壁作南窻打炕其下以供夜坐地爐煤火夜如年旋作南窻映月眠誰種庭中數竿竹一時弄影到窻前丙子除夕一枝銀燭坐更闌小几攤書只自看家在江南四千里有人今夜説長安二月望晨起修竹深溪帶淺沙隔籬初見小桃花東風最是無情物却與人間管歲華曉起雨洗春容淡有姿栁絲花霧共參差人家住在青山曲無事朝來睡起遲園居雜咏二首迴廊曲曲面青山身世悠悠蝶夢間半郭半村秋色裏聴風聴雨夜深還竹闌干外石方塘映月含風貯早涼乞得名花周匝種為誰着意最憐芳芙蓉洞口石坡陀橘刺藤梢帶女蘿一夜好風吹雨過曉來添起碧嵯峨春日雜興二十七首緑楊如線草如茵紫竹肩輿白疊巾不是為春禁不得老來心緒最憐春山中春色二分强次第開花到海棠風日一簾初病起斜攤黄素寫官方臨池草閣背山堂乳燕泥融補畫梁却按茶經試江水自開陽羡閲旗槍種成修竹倚雲看新築方塘漾翠寒一夜落花風信急隔溪吹折釣魚竿隔江樓閣鬱岧嶤掩映繁花更栁條紅日半窻春睡足獨擕藤杖過溪橋上臨風雨下塵氛一上層臺思不羣更愛草深成小坐摩挲雙眼看江雲重重簾幙䕶餘寒搨得蘭亭映日看頗覺近來諸念盡偏於筆硯遣猶難久忘把鏡照容姿風動屏開見鬢絲巖背好花渾未發莫將春色怨遲遲土作坡陀石作巖曉乘甘雨種松杉門前日日春潮到定有雙魚寄一椷細雨庭除濕未勻小山毛骨長精神呼兒半捲湘簾坐滿澗飛花苦戀春春深山館日如年品石嘗泉各有縁好客逺從雲外至自移塵榻向花前湘簾面面擁孤亭雨弄春晴草更青山靜日長無一事倚闌閒看鶴梳翎高槐細栁儼成行遠水遥山䕶草堂一片浮雲颺空碧半分寒氣釀春光侍兒日日報花開白白紅紅盡手栽我自白頭春自好莫教風雨便相催江上高樓隔晩霞蒲團靜結倚窻紗暗香一道隨風力知是前村枳橘花寂寂春隂江閣閒緑浮新雨漲潺湲隔花一犬足高臥門外借書人未還花傍高樓半掩扉河豚風起釣魚磯沙鷗似解閒人意時向蒹葭深處飛春江一曲遶孤村鶴有雙雛竹有孫愛聴滄浪臨水坐背人新月弄黄昬遥聞大藥駐衰顔我付行藏與鬢斑多事一春眠白日無言十里對青山漠漠楊花閙曉晴穿簾入幙太多情如何無力遮春住㸃破滄浪萬里清一溪一曲大江東細栁新蒲窈窕通寒食樓臺三日雨捲簾庭院百花風花木隂隂午漏長遷鶯啼近讀書堂誰能料理春多少閒寫新詩上粉墻紙帳蒲茵白板床秪將春睡答春光夢中幾曲溪南路水浴風行總未忘鶯啼燕語各分明最愛春聲自物情風送夕陽賔客退一簾香霧浪紋生連宵草色雨中池拂地垂楊壓水枝倦倚闌干檢官歴忽驚春到已多時古意蒼顔積漸肥座中山色有餘輝岸囘細栁生緑暗風送飛花深翠微楊栁蒹葭一色勻江門日日弄絲綸夜來新水强三尺釣得龍灣六六鱗儼山集巻十六
