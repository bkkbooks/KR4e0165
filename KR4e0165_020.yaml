body:
  text: 儼山集卷二十明陸深撰樂府豫章臺豫章臺使君來銅符五馬春風回春風先傍誰門户破屋蕭蕭四邊土吹開隂沍見陽和散盡呻吟到歌舞洪都風土古不薄唐宋雄藩漢名落南州猶存徐孺祠西山遙映滕王閣豫章臺前秋日晴豫章臺下秋水清年年嵗嵗送人去送君今去獨含情潼關會曹操與韓遂馬超會語潼關超負其多力隂欲突前捉曹公曹公左右將許褚瞋目盻之超乃不敢動單馬潼關會阿瞞來送虜不恨事無成但恨事不武馬將軍人中虎力能捉曹公眼當空許禇英雄成敗常有幸舞陽殺人十四五舍東桑昭烈少孤舍東南角籬上有桑樹生高五丈餘遙望見童童如小車蓋或謂當出貴人昭烈兒時於樹下戲言吾必當乘此羽葆車東籬桑樹五丈餘童童結成羽葆車下有大耳竒男兒耳大志亦大擊劍走馬聊讀書左龍右鳳西南飛來銜桑土補舊居采桑桑有葉鑽桑桑有火桑葉成文章桑火不照中原土昌門别孫策命太史慈往撫劉繇士衆於豫章左石皆曰慈必北去慈去約六十日果還把臂昌門别還期兩月中不負孔北海寧負孫江東英雄託身非無地但恨相逢少知己臣念檻車恩君忘射鉤耻滿篋當歸空復爾望夫石望夫處近青天天高高山連連妾身化為石夫歸是何年夫不歸妾誰憐夫歸石能前夫有父與母高堂意雙懸妾不能前誰炊爨煙右石在鉛山車盤嶺之最高處僅以形似名傳稱此石處處有之自唐人山頭風雨之句而騷壇遂為一大題目藻製甚富豫少亦有擬作今過其地為補古樂府一篇要止於義理焉以示同行姚時望土人告豫謂此石頗著靈異每遷謫之人過其下必多風雨不亦有雲霧羃其頂若夫賢人君子與顯逹者之往來雖隂晦必為之開霽恆視以為占驗豫是晚宿驛亭適有微雨飄灑明晨就道行經其下碧天如洗紫翠萬狀一望可數百里也豫視時望為之一笑楊白花楊白花隨風起春風吹江隔江水楊花飛度江水東綺房繡闥珠簾櫳不恨花無主但恨花無力一夜風來留不得堂山高堂山高風木何蕭騷中有壯士骨英英不能銷昔日陳太丘於今見其曹天台六邑地淳風轉漓澆墓門多遺淚過客思奠椒越山南趨勢如萬蛟左蟠右結匯為土膏煌煌靈芝秀其苗千古萬古堂山高莫老虎王師平偽吳其將莫天祐號老虎者尚團土城以拒命錫山儒士縋城説降今其故墟名新安云平江夜縛張九四吳波不動吳山膩齊雲樓前半死灰殺氣隂隂北門至當年部將號老虎血戰區區一抔土計誠左心獨苦城頭夜納儒士語可憐黃金買辭賦炮震聲中散如雨姑蘇臺麋鹿麌麌畏虎招友也時政虐虎暴君畏浦我畏虎兩情慊慊各不武浦有舟航虎不可主叢牙雪白舌有火利爪中人如捋土東村西落豚犬空山前老嫠淚如雨浦頭潮落水不波浦兒五歲能搖櫓白蘋芳芷鴻鴈高樓船橫濟鳴簫鼓我歌君莫嗔君還聽我語未聞虎渡河但見君渡浦見竹篇慰孝子也孝子見物而思親昔見竹真不俗今見竹今痛哭竹色自來無改移昔日何樂今何悲森森繞屋秋更緑盡是先人手栽玉竹未化人當還舉頭見竹猶承歡直節空九霄清風尚千古徘徊竹間路照影月當午好竒有客頻到門何况人間父子恩君不見孟生筍湘娥痕搏狼篇狼來村煙黑狼去村煙紫迢迢青川路雞豚豈堪此雞豚尚可殺我稚子使者從東來耰鋤借閭里走馬競風電脫轡及日晷常年四境愁此夕一擊死姬公驅猛志在安民留侯揮椎匪為一身河清海晏物阜風淳歌我搏狼以告臣鄰野葛篇野葛不入口生噉一尺長一尺長何如一寸良我不毒人人誰毒我毒我我有命毒人其又可於乎啖葛郎空使葛挂腸圖身不死心則亡東石篇為談舜耕東有石一段雲臥起虧蔽如舞裙苔痕蘚暈土花繡中有玉質黃金紋東海更東下龍氣何氤氲空聞叩牛角旋見叱羊羣高山深林天地隔蓬壺方丈仙凡分明堂韶磬不作貢清廟柱礎殊無聞嗟爾東石徒紛紛我欲攜之障百川策竒勳不能煉成五色文補天妙手古所云補天手東石君新釘篇有新取進士者不欲名其健僕譁于國子先生之門曰汝舊釘也我新釘也新釘使得應舊釘使不應云云豫聞之為賦新釘篇曾聞新人不如故今見舊釘不如新沙沈苔臥土花澀鑽刺無功愁殺人嗟爾釘同一鐵先頴脫遂鳩拙不見赤日中炙手或可熱天道每如此人事安足説噫嚱噓少婦利口可以出走疆奴制家閉目搖手國之老成典刑誰守歲寒之姿松柏是有願汝且弗嗔勸汝一杯酒可憐舊釘曾為新那愁新釘不為舊元日詩太陽蝕太白赤三辰多失職願我皇帝建極羣寮旰食上天孔神下監無忒先民有言攸好德微臣作詩以戒元日守歲詞垂垂絳蠟銀檠滿烏薪盤獸金爐暖宫井迢迢玉漏聲參移斗轉欲三更小臣賤妾團圞守皇帝陛下增萬夀閔雨詞炎空一碧金烏走白龍蟠泥黑沈藪農人望雨如望珠一點一顆勝一斗清晨染土按五方黃冠烹蛇巫酹酒天門九重空爾為五月作尾六月首君不見隨車雨賢太守雨雪曲雨雪天山夜征夫閲壯丁將軍猶轉戰屬國盡來庭試比臨關月還同隕石星借問寄衣使何時過五陵妾薄命百年未畢願中道有攜心團扇秋風早長門晝漏深行雲頻入夢流水罷彈琴所嗟妾薄命未效白頭吟行路難勸子一杯酒聽歌行路難日落豺狼滿山深風雨寒出關雞作使度嶺鳥同盤兵後人家少蓐食帶氷餐望夫石望夫何日歸空閨鎖夕暉石從心內化人到眼中稀海月上糚鏡山荔長春衣巫山雲雨夢空伴楚王飛唐夫人五解夫人都庫部穆祖姑也生長吳門下恩情結髮初猶疑是生别無處覔雙魚二遺孤悲六尺今才三尺餘黃昏燈火裏聨坐教詩書三雜珮當年贈時時問起居隔窗聞侍婢相送下前除四細草催寒食孤墳對闔廬年年城下路雙鬢已蕭疏五論心荼更苦全歸玉不如鬱蔥佳氣裏椒桂欲將豫龍鳳洲四解朱節婦氏胡今河南按察副使尚節槩之大母故豐城杭橋朱公富之配也節婦不天時才二十有八逮其全歸年六十有七矣應令格當旌門然非節婦志有贊之鬻田以賄者節婦厲聲拒之曰吾豈以苞苴易名節也鬻田不可故至今乏表揚之者又若干年矣深蚤嵗與尚節並遊南雍高節婦之風誼舊矣昨參江藩守南昌有風化之寄焉方圖事事而遷部去矣往來章江之上陟覽劍閣沿洄龍鳳間未嘗不三垂涕焉為賦龍鳳洲詞以寄尚節使刻諸墓門章江南來龍鳳洲如鳳飛舞如龍遊鍾育士女皆名流中有朱胡成好仇胡家女嫁朱家婦復向朱家作賢母婦貞母慈兩無負氷玉飛聲荼茹口旌門亦是聖朝恩孤逺何由逹至尊錢可通神勿復言留田教子還教孫嗟豫亦是觀風使藜閣木天聞史事詩成或有蛟龍淚風雨江頭寒食至楊白花江上風多楊白花隨風飛去落誰家惜花戀花渾無賴攪亂春風空自嗟陽春曲十首寄縣侯徐德新輕雲微雨淨風沙門掩春寒颭碧紗縹眇鳳簫催羯鼓前村實有預開花春風欲動碧波平妙手行春遍海城九十光隂盡韶麗兩輪日月最分明街衢巷陌人如蟻簫鼓絃歌晝似年著意挽回和氣早地偏東海得春先走閣行樓錦繡空簇花條栁水雲東萬家古縣笙歌裏十里遊人笑語中山歌水調唱豐年漁鼓荷衣舞列仙紅抹額騎飱料馬錦襜䄖簇采蓮船陽和元屬種桃人禮樂從頭取次新滿路清平歌調起今年春勝百年春五風十雨卜時年萬户千門列綺筵不捲朱簾樓閣裏堆盤生菜酒如泉繁絲咽管九霄聲面具腰裝百態生請看一年春富貴儘拚歌舞答升平綵幡花勝參差動竹馬泥牛次第排要看芒神新結束短裙高履踏翻街市井門攤盡點名當行本色總教呈架上大書沽酒價簷頭先試賣花聲儼山集卷二十
