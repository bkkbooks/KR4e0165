body:
  text: 儼山集卷三明陸深撰歌二二十一首節婦歌憶昔敵人犯邊日先皇赫怒揮鈇鑕蒼天深意在戢兵六龍暫駐隂山蹕古來勝負兵家常土木之變悲莫當忠臣孝子畢誓死長纓徒手繫名王維時張公忠勇士肉骨藁葬蠻荒耳隕星莫想諸葛生落日雕戈揮不起中閨裁罷寄征衣征衣一寄不曽歸東海深深精衛苦九疑淚盡山成圍折叉分鏡甘獨守寒影遺孤成左右紅顔白髮須臾間長夜玄堂重執手遺孤無怙亦無恃期以功勳光後祀星聨八座位中丞重譯威敷雪前耻誰云綱常一日無嗚呼忠臣為君貞婦夫憑軒涕泗聲嗚嗚開河待閘苦熱長江無六月此語為誰傳筠簟紗厨裏何人不可憐我家本在三江上竹樹成行更森爽畫閣含風蘸水開仙槎到海隨潮長波搖雲夢通具區地接蓬萊與方丈何似黃塵千尺高脫巾羣飲總稱豪銀床玉井無由覔赤腳層氷何處逃徒聞東郡泉千𣲖不濟南湖水一篙臨流欲渡還晞髮待看西巖吐新月萬貫誰纒鶴背輕一蓬自笑鳩巢拙人間合有清涼方半捲湘簾坐超忽君不見陶潛釀秫兩疏賜金罹此毒熱聽我吳吟星月歌元宵自戴子充冬官小酌還卧養菴夢中得詩憶其首聨云大星無光月如水碧空無雲千萬里晨起櫛沐頗用訝歎適小野春官見過遂舉似之小野今之雅才首肯賞音云突兀不類常作因加竄足成為放歌庸拓旅懷大星無光月如水紫煙辟寒天萬里金吾木柝聲不驕火樹星橋接空起恭承休假作上元滿目韶華帝城裏團圞三五宵可憐淺薄一分春奈爾胡床浩興空昔年秋色不似長安妍五鳯樓前迎萬乘六鼇海上擁羣仙歡遊秪厭春更短欲挽空壺涵百川機中紅雨催花落天上青娥妬扇圓九衢羅綺人如蟻五侯甲第黃金炬底用還鄉作晝行真堪窮漢經年煮别有工夫巧奪天製成二八當窗女回紋暈采剪越綾五色含光漏湘楮雲母琉璃俱有神銀河牛渚恍通津常拋金彈誇豪俠獨抱明璫泣蜃人火具時時聞戰伐飛流一一繞勾陳誰家簾幕留歡住幾處笙歌按拍新節物人情豈相待後夜遲遲出滄海每驚舊髮羞鸞鏡却倚新聲填欵乃仙人自古有羡期書生妄意圖元愷但祈燈月兩相和嵗嵗年年常不改秋日入佘山觀昭慶三栝松雲間山水稱絶竒簡逺開豁無不宜村村花栁足佳麗亦有落落蛟龍姿新秋晴日照古寺鳴絲偃蓋風離離閣前兩株踈且瘦左右拱揖如佳兒獨憐衆草沒曇院不見十尺圍桐皮稍偏一株在東麓蓊翳拔起三虬枝擎空似欲拏雲雨匝地更與成漣漪我聞佳樹以地貴豫章赤水非人為雲間栝松重昭慶往往盆盎時見之此來得共恣幽賞山深谷暝何遲遲未嗟才大難為用頗恨地僻稀相知摩挲風霜有古意指點時代多遐思東廊一僧最朴野導我屋角開重籬為言秋高八九月風前落子堪萌滋邇來區賦要往役此事久廢從先師山中嵗月已如此世上風波紛路岐坐成三歎倚石壁欲别未别空猶夷蒼髯戟戟老髮秃白雲冉冉遊絲垂此山九峯居第一誰為姓佘誰所遺或云種茶似陽羡吳歈楚調聊相隨陸家放鶴還沙際張季思鱸今水湄他日青松能待我茯苓琥珀總宜詩悠然亭濠梁有魚水莊惠無爾我吾猶恨多事忘言豈不可俯仰天地同悠然魚忘于水水忘淵澄鮮一色月轉漢潑刺數聲風起船封君本是方叔後老氣盤空薄牛斗長嘯江湖范蠡書逃名松菊王𢎞酒庭中瀦泉泉上亭亭外萬疊青山青有時出雲作細雨此際遊小開南溟坐來一日當千日未論他年百四十海棠花發春氣濃一片胭脂鏡中濕赤壁歌我聞赤壁乃是曹劉之戰場襟鎖巴蜀喉控荆襄丹崖插江幾千尺疑是煆爛半面之崑岡下有波濤走萬里上有椒桂森衆芳紫苔斕斑伏虎豹紅雲縹眇遊鳳凰當時烈烈南風發北岸舟楫灰飛揚蛟螭失勢易為縛何奈太白多寒光時移連去疾流電江山如故天蒼蒼平生好竒癖山水夢寐倣佛徒倣徨昔有蘇子瞻來自白玉堂扁舟夜載七月涼月明把酒酹周郎英雄多有恨涕淚徒浪浪爾來數百載勝事不可常陶子五月使瀟湘殷勤請戒十日糧黃州弭節聊徜徉須凌絶頂出上方翹扶桑兮俯八荒清風時來聲琅琅為我一誦秋水章子醇雨後陪宿道館有贈春燈著花照春雨窈窕仙宫對床語龍池冥冥雜花寒魚書鴈信多愁緒一百五日又已過二十四橋何處所容臺美人錦繡腸能為楚歌歌白苧候我明光起草餘更約城南看花侣長安風塵緇素衣故園魂夢牽春渚三軍草露白鐵袍五侯宅第黃金炬聞雞起擊珊瑚鞭共慰此身同逆旅夜泊真州前嵗泊船真州江滿船明月搖船窗今年復向真州住黃昏待月月欲吐明月照人無醜好來來去去令人老一杯船尾得月多聽我試唱真州歌真州歌將奈何大船如屋船船官鹺危檣插空飛不入鐵鎖鉤聨密如織語音嘈唧了不分同是經商異南北居民大半趨四壩倡女沿河晚糚罷短擔雙簷喚賣鮮小舠三槳輕如駕連樓夾巷簇簇新家家許住異鄉人共道今年生意少下客折本上客貧江南春山疊疊緑荆楚轉運遙聨屬南京供奉日日過金字黃旗去還續君不見文信公幾陷虎口中但願路日通不怨東西逢逆風雨後於都司分種紅蕉今日不知來日事百年枉作萬年圖青青一種芭蕉樹春雨敷榮秋雨枯憶昨歲晚雪飛白都閫門墻映紅碧依稀記得建陽過南北東西總為客建陽縣令薛給事開尊北堂邀我至對花云是美人蕉不怕風霜逞嬌媚前月京師附書還為傳給事死諫官見花憐花為花惱萬丈雪山毛骨寒都司劉郎舉武舉每以危言動天子螭頭豹尾不肯留獨鞚花虬行萬里萬里邊庭絶羽書手種芭蕉三百株一宵蹄囓苦不戒粉碎玉人傷緑珠共汝朝來有歸興細雨沈沈滿三徑攜鋤斸取舊根荄且種窗前欹枕聽題李蒲汀學士所藏趙千里射熊圖王孫藻思錦繡紋點染青山縈白雲避鴈霜高錦樹出射熊風徑角弓聞似是西原獵場下公子翩翩齊騁馬捷如流電氣十倍滿彎明月神瀟灑沙平草淺石徑長左馳右突不可當直前一發遂得雋豈但百步能穿楊古來妙傳誇絶藝此幅摩挲今幾世周詩藹藹歌夢祥漢館離離是何處蒲汀學士人中龍勘畫披圖最有工致身本在霄漢上雅興時落山林中武功文事亦素具細認丹青有竒趣尚父曽聞載後車宣尼尚且供先簿試看更兆掌中珠雄風駿骨頭角殊他年隔座屏風裏喚取良工拓此圖南宫北郭踏雪前夜維揚玩寒月今朝燕冀寒踏雪百年快事能幾回誰料兹行兩竒絶漠漠郊原一掌平紛紛珠貝綴難成玉堂瑶圃隨行上縞帶銀杯逐步生復有軟輿和蓋重何似漁翁一簔凍白馬翩翩千里驕紅旗閃閃長亭送臂鷹走狗誰家兒頗憶東原年少時雙飛一箭穿雲下九尾千年匝地馳壯氣老來餘白首熊裘貂帽鵝黃酒掃竹尋梅何事無栁絮梨花隨處有東方又動朝日紅耀色流光四望通矮屋欲埋孤出棟遙山先映最高峯試問天公資發育前須巽二後滕六蒼生赤腹望豐年黃扉紫閣尤驚目誰持堅白攻異同燮理調和唯至公不見狻猊巧摶換消得東皇一夜風文峯歌為鄭正郎雲路東南永閩關紫翠重蓬萊宫闕近突兀見文峯文峯拔地幾千尺巨靈夜卓凌空碧特立疑從五老分髙標正傍三山出三山秀色鍾異人文峯先生尤絶倫身同砥柱障東海力挽華嶽開西秦二十明經取上第六曹郎署稱無二作雨為霖本有期擎天捧日真能事當今好手張平山寫出巉巖水墨間美人被服何雅素坐看白雲相往還先生愛山兼愛畫風物江南兩竒邁停驂駐節費追陪高堂素壁時張挂舊家門巷對山居共道相傳百代餘開圖宛見文峯面若論連城玉不如竹巖歌為程時言侍御題其先君方伯號君不見程公竹巖重新安上有鳳雛雙羽翰下有龍孫欲迸青琅玕嶙峋白璧連城價搖動清風六月寒美人嵗晚愛顔色身踞虎豹憑闌干秖今仙遊向湘浦唯餘落月輝林巒調和六琯製大雅鎮壓百里成偉觀孟生淚盡不復茁唐皇感之比二難江南程氏古司馬别有伊洛分𣲖如波瀾誰云今人不如昔竹巖太中相應看仲氏外臺握風紀儼哉伯子和氣端正公壁立幾萬仞要比季子鐵豸冠四時正氣鬱不改東南秀色若可餐掃除炎熱礪世鈍一為長歌天地寬嗚呼竹巖不可見見此孤標遺蔭回風湍西巖歌君不見崑山産玉高嶙峋當年一片稱絶倫邇來幾千載元氣醖藉含至淳乃有參天卓地壁立之西巖窅窱洞府棲仙真春色桃花誤流水秋清桂樹當月輪紫芝瑶草滿下界祥虹瑞靄往往早暮相鮮新箕山將讓許武陵聊避秦逺觀田變海昔傳嶽降神自如先生古柱史甲第華堂住其趾少年風彩真玉人陸家兄弟安足齒滿門忠孝世所希江南數作鳴珂里狀元宰相應黑頭季弟今為天下士大兒文學早作畿輔師直言忠諫丹青裏小兒頴異似楊修已署門生拜天子有孫行年十六七一舉鄉書衆中起珊瑚與珠樹過眼紛可喜先生况是真仙才酒尊常對崑山開消除日月歸棋局舒卷絲綸有釣臺屨杖登山疾於駕有時臨海望蓬萊玉耶人耶兩難辨但見秋容秀色逺與鸞鶴相徘徊五千道德間常誦三度蟠桃手自栽只今七十逢初度剛是浮生第一回山中好風日天末負趨陪短篇遙當長年頌願借澄湖作夀杯參天卓地之西巖永與朱顔黑髮相追隨題畫春風花栁溪橋路賸有韶華管送迎隔岸青山千尺起聞歌多少别離情此圖點染還清潤似是錢塘戴文進張公好畫如有神高築金臺同買駿內庭多暇日正長湘簾半捲當華堂時時拂拭見古意欲效丹青比夢良雨中泛舟聞座客琵琶蘭舟急雨橫銀塘水芳沙鳥滋暮涼煙雲彌望接蜃氣樓閣失地含龍光于時披襟坐盤薄愛聽瀟淅鳴舷艎座中有客偏好事獨把琵琶臨醉鄉一攏一撚有古意欲彈未彈先斷腸四弦嘈嘈乍入手似與風雨隨低昂曽傳青衫泣司馬豈是紫塞啼王嬙孤臣忠憤重離别壯士感激多慨慷鵾弦鐵撥世希有此曲杳眇尤難當誰裁無價紫桫欏乃有雙盤金鳳凰我生兩耳才具足妙解那得如中郎老懷政爾苦氷炭試遣陶寫憑消詳須臾返棹更東下雲物一空江水長可泉圖為胡大參我識可泉三十年今朝為賦可泉篇秦川蜀川渾漫爾相憶相逢俱偶然君家去天才尺咫雲樹蒼蒼萬山裏羲昊曾留畫卦文陸郎未試煎茶水當年妙小富文章春日承恩上玉堂客過每勞占劒氣人傳從此破天荒一朝汨沒青山下印月行風倍瀟灑遙從西郡夢三刀又向南臺騎五馬皖城東下是蘇州銀色流璃萬頃秋匡廬天外飛猶落楊子江心泥不流濟南突地七十二錢塘江頭水西寺還將詞翰舊風流總屬參知新政事一夜秋期夢故鄉某山某水暫徜徉如流車馬來阿曲似水門庭復晉陽晉陽相看吾已老開圖宛聽泉聲好白練橫拖萬里長銀河倒挽三山小溶溶漾漾更逶迤東流終向鳳凰池聊從漢使乘秋日正是商巖大旱時滿地蒼生望霖雨天瓢一滴何如此由來鄒孟達逢原安用蒙莊齊物理誰云嶓冢不勝舟誰謂崑崙最上頭請看逝者無昏旦化作江河入海流松鶴圖遙空受秋萬里碧松露團團野花白藤梢橘刺紛陸離細水涓涓繞雲石我疑此圖是玄圃中有雙禽鳴且舞霜翎砂頂足生韻玄裳風輕月將午當家妙品在逼真况是寫生須入神古來高人重圖畫欲令見者常如新我聞胎仙三千嵗摩挲此幅能幾世乃知丹青空爾為别有不朽超絶藝枯木竹石圖人間何處真不俗雨後山前兩竿竹雪村老人幽興多落筆龍孫削蒼玉離離亂石出澗底古木壓枝虬欲起相思天際望美人月明一片湘江水君不見工師取才伶倫裁管兼收並蓄截長補短開圖識苦心聽我歌欵欵次韻黃如英聽管生彈琴逸人最愛馮虛閣手弄絲桐自酬酢清安身世甘寂淡富貴交親供諛噱天空境靜初按譜掩抑悲凄更豐約淙淙巖背墮春泉歷歷林梢下秋籜緩猱急引大可憐含徵流商調相錯初聞古意三疊髙旋見失勢千丈落勇如壯士提戈戟靜似佳人洗丹堊吳山積雪開四窗夜靜金爐火猶爍是時相對擁青綾頓使煩襟坐來鑠中郎此意妙莫傳炊爨之餘尚堪鑿看君幽興正得意我和險詩聊善謔須臾鼓罷陽春曲門外青山映寥廓楝塘為李封君甬東水樹清深處楝花風動黃梅雨喬木由來世澤家清溪合有高人主主人本是種德人種成玉樹高嶙峋青驄白豸風霜古紫誥金泥雨露新苦縣遙宗元姓李今代聞孫還柱史彈壓爭知重有山門庭不愧清於水繡斧銀章使節歸摘花釀酒映斑衣明堂正要求梁棟墜子成林大十圍和答張子醇索硯容臺大夫古列仙謫向人間年復年當時正坐風騷客今日猶為筆硯憐吳東片石青山裏箬裹藤封四千里力微任重致不多空對知音慙未已看君筆陳何堂堂真堪作史蔡中郎自須剪贈西湖水化作虹霓萬丈長儼山集卷三
