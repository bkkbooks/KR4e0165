body:
  text: 儼山集巻五十五明陸深撰記四嘉興新建察院記我朝御史列居兩京皆謂之十三道各統以都察院道視十三省南北盡同而同以浙江為之首其制然也御史凡奉命而出所至則謂之察院匪若六曹諸司各以本曹繫其體然也是故御史職在肅僚貞度察院得專達上下維地維人固兩重哉嘉靖五年中秋日嘉興府新作察院成嚴整壯麗甲於兩浙嘉興浙首郡也凡御史至入境按治與御史按竟受代去必於是洛陽潘公倣適以浙江道御史按浙庶政維新乃以嘉興守蕭侯世賢為才蕭侯謀諸二守王君大化將改作察院以繫體制爰瞻城中得廢寺一區相與規畫以授諸匠氏㑹公代去御史朔州盧公問之寔來睇視規材因以議於分守參政胡公誨之胡公曰宜為計永永於時參政朱公應周僉事喻公宗之蔡公汝建史公文材先後行部至胥相之垂成㑹盧公以憂去既乃訖工蕭侯以書告于上海陸深曰願有記深不文竊聞之先王之範政凡以待人也君子之寳位凡以行道也器者道之所寓無弊無復無振無起此位置本末之論天地之化所以常新蓋不獨一察院然也法以人行人以地重御史之所為重凡以行法也察院之所為急凡以奉御史也廉逺堂髙羊存禮在此名實精粗之論天下之紀賴以不墜蓋不獨嘉興一察院然也顧天下之政有體有制出於一人符之百世成於一方則於四海是文武周公之意以待後之人明於此者謂之知辨於此者謂之禮舉此而集者謂之才若兩御史之賢二郡侯之績於兹察院也皆不可以不記是役也費出於羨耗工成於顧募役徵於優隙以金計者六百有四十五兩有奇以日計者三百有三十以工計者九千有四百有九十為堂五間崇二十四尺贏廣七筵深五之三翼堂而左右之者為室各二堂之前為露臺覆露臺者為軒棚為房以處案吏者列之東西各五間候隸房亦如之引堂而後者為穿堂五間後堂亦如之間為卧闥者二為烏臺三間臺之崇四尺為書房十間居㕔堂東西之際為生吏房三間門有儀墀有級庖有所湢有床浴有室溷有舍書房之東西偏各有隙地西為圃可射東為亭可憩亭之南為池可臨總之為地十有八畝南北四十有八丈東西三十有三丈總之為屋八十有三間經始於四年十月之朢佐之通判李君源與董君琦張君珮推官南仝而王君大化實始終之邑令之與有事者嘉興則龍君欽秀水則趙君章桐郷則董君鋐海鹽則劉君桂平湖則鄭君瑚崇徳則葉君瑞嘉善則李君調元有勞其間者則典史李玉梁珍也江風遺憾記江風遺憾終慕也終慕為誰歙之吳生鰲也生之言曰鰲早孤生才六月耳無所知知乳哺又漸知視息僅僅識母襁褓不能離又漸識母顔能辨母聲時時見慈節孺人出之懐中撫頭而歎淚續續霑臆揮灑嗚咽罷又或呼天長吁即摩挲號曰未亡人洪故家宦族也固能死所不死者恐吳氏鬼不食耳言已復泣泣不復已鰲當其時漫不省是何等言是何等狀也孺人勤紡績以育鰲又漸教鰲以詩書鰲奉孺人惟謹鰲漸欲覓父所在見時隣舍家悉事游賈或經嵗還或經數嵗未還意久亦還耳亦不敢問又漸聞父客死他郷不復還意惝恍叵測慈節始告之曰兒咍兒父果沉溺死死時余年二十今日久矣初商游於越歸自荻港人馬同舟中流遇風與俱覆矣鰲聞之號慟幾絶遂復修先業事遠遊將以訪鴟夷之遺蹤哀箜篌之餘韻每涉江水颺天風輒躃踊涕泗終日士大夫憐之為題江風遺憾或賦詩以弔鰲以慈節顔堂以為鰲母慰友人汪子裒其言致之陸深予感之為書其事曰生死天命也禍福人事也修事以俟命幸不幸存焉處死有道蹈禍有數不幸猶幸也獨其周旋於禍福生死之際依倚於義理慈孝之天者君子謂之世則聖君賢相將必求其人以揚礪引長之謂之世風風噫氣也鼓盪萬物以振迅八表莫速焉貞哉洪孝哉鰲是可表世風乎鰲之父諱賜字思寵重修松江府學記正徳已已江南大水而松特甚越明年庚午水再至浸公私廬舍凡旬有五日而退退而學宮壊特甚又明年辛未夏内江喻侯時以才御史來守松至既禮瞻大懼弗稱乃進師弟子而問故已又進父老於庭問疾苦外使之言其故皆前對曰自昔弦誦有堂有隍厥惟天災以渝舊觀侯歎曰是在我凡起天下於弊者乗其未極則費寡而功多若是者失今不為他日民有十百其勞者矣松民甚憊而又遺之後艱謂何是誠在我當是時府庫無羨財侯乃撙節浮費殫竭心力至冬而後始事而令于教授彭鍊曰教授職務稀宜試督於是且爾也能廉遂以規約相予予觀厥成焉鍊曰諾即日鳩材募工因以役民之不能食者咸踴躍恐後由是易腐以堅益圮以阜整頽輝黯次第舉矣㑹樂安詹君崇以進士來推府事旦夕侯之勤勞也憮然曰獨太守責耶適被符攝令華亭維侯之命以身任之百費有加事乃告集寔甲戍嵗之秋也凡厯四載自大成之殿明倫之堂殿之東西廡堂之左右四齋尊經之閣魁星之樓崇徳養賢之堂旁之郷賢之祠講誦之號舍游息之亭館禮器雅樂之蔵庖湢廨署之所後之郷射之圃外之櫺星之門成徳達材之坊登雲之橋皆還于舊維新有作者則仰高之坊以冠於文廟云偉哉皇乎教授君身親厥功以其始末走告于陸深又以其弟子員王輔而下凡三百人合詞曰是功鉅矣何可忘願昭示來裔深維皇朝建學徧㝢内而輔理之才於是咸出松之人才嘗甲天下矣今天子右文求賢皇皇弗給維是棟宇之敝也不患其無復也吾獨愛喻侯心之仁也以侯之知體也不患其無助也吾獨愛詹君義之勇也蓋自古豐功懋績必有偉才長識之士以為之於其豫周公之詩曰迨天之未隂雨徹彼桑土是已亦有同心一徳之人以相先後不言而喻帝虞之典曰伯拜稽首讓于䕫龍是已夫有周公之才為䕫龍之讓則和徳濟濟彞倫攸叙休徵臻而彞倫叙矣是故顔淵曾參之徒相與從孔子於困窮之中以刪次其説而傳固以望之天下後世也若兹一役可謂備矣宜有記贊之成者同知侯君自明孫君璽通判聶君瓚錢君貫參之者華亭縣丞趙才也羅氏義宅記昔高平范文正公作義田以贍族世傳以為盛事今歙羅君作義宅蓋聞范公之風而興起者也予亦欲傳其事羅之肖者曰滋將廣其傳以告予久而未有以答也兹乃伐石請書其詞曰宅以義名合族也義取於辨何合之為夫物久必繁繁則必合合而無辨何以能久是故合之所以成其辨也羅氏之宅凡七畝其居凡百有九十其族凡三十有六堂曰義堂圃曰義圃井曰義井其田百畝其租百石在羅宅之里嗚呼羅君無范公之名位與爵祿而彷彿范公之舉措君真義士哉夫義利之判久矣羅世以貲高郷里至東峯君益昌大東峯名元孫慷慨游江湖間所務者營什一以計贏縮若為利謀也而獨有志於作宅君真義士哉予惟世人愛身重自一軀外若靳靳然且以吾身而視吾之兄若弟未有如吾身者也自兄弟以至於為從為再從未有視之如吾之兄若弟者也自再從以至於為緦麻為袒免又未有視之如從若再從者也蓋其屬逺故其情踈逺則易忘踈則易離雖欲視之如吾身視之如吾之兄若弟視之如吾之從若再從不可得也雖然自吾觀之此吾之兄也此吾之弟也此吾之從此吾之再從此吾之緦麻此吾之袒免也自吾之祖若考而視之皆其子也皆其孫也皆其子皆其孫則其所以衣之食之煦之育之姻之嫁之安之養之以至於合而撫慰之者皆其心也吾祖若考之心將以衣之食之煦之育之姻之嫁之安之養之合而撫慰之而吾之族人或至於饑寒困苦離㪚而莫綂吾未知吾祖若考之心宜何如也嗚呼此羅君之義宅世不可少世又可少傳也哉雖然羅君之族三十有六矣自三十有六而又廣之其族漸以滋其費漸以繁吾懼夫七畝之宅百畝之田未足繼羅君之志也為羅君之子孫又宜何如也重義輕利以毋墜是舉此固世風之所關獨羅氏也哉千百世之下當與范公並傳無疑余故太史氏樂書其事故書薜茘園記深讀太傅王公志震澤稱兩洞庭之勝往嵗舉進士與今侍讀徐先生子容為同年先生西洞庭人也太傅公之言曰西山之起甲科寔自子容始夫山水之勝洩之乎人高賢之以聲光垂世也建置經位心目之所及則山益高水益深景益清逺造化之巧所不能與者又託之乎人若徐氏之於洞庭洞庭之有薜茘園是也園之廣凡數畝地産薜茘因以名園云園之景凡十有三曰思樂堂曰石假山曰荷池曰水鑑樓曰風竹軒曰蕉石亭曰觀耕臺曰薔薇洞曰栢屛曰留月峯曰通冷橋曰釣磯曰花源四時朝暮之變態無窮而高下離立足以當欣賞而遊高明可謂勝矣洞庭既勝而園又勝也使人樂焉若仙居世外煙霞之與徒而日月之為客也君子有當世之志者疑於習宴安而畧憂勤矣似乎有所不暇侍讀之言曰薜茘之有作寔自先太史公始太史公謀以娛靜菴府君之老也而未成成之者縉也是故堂曰思樂先公府君木主在焉一石一峯先世之蔵也至於一泉一池一卉一木之微亦皆先人之志也每一過焉陟降汎掃之餘恍乎聲容之在目縉也何敢以為樂願子為我記之以示後之人深道吳輙望湖山思一到焉以考信於太傅公製作之奇遂拜思樂堂下與先生講通家之禮往來通冷橋遍遊兹園以觀里仁之化未償夙心焉其何辭之能為雖然深少側聞徐氏之世西山也種徳修義自靜菴府君而上數十百年矣含宏潤澤至於太史公有述焉延和當秀乃大發之乎侍讀先生才富而學精雅負世望為天子講讀之臣獻沃𢎞多聲光方起將踵太傅公後冰輝玉映於西山之間以為族望以為郷榮固有大於兹園者而兹園之成也可以觀繼志之孝焉可以見後樂之仁焉可以見裁成之道焉可以見垂裕之謨焉合是數美不可以不記靜虚亭記昔孟子稱舜為天子被袗衣鼔琴二女果若固有之及孔子困窮身為匹夫與其徒弦誦以自樂至稱顔子則曰賢哉不改其樂顔子之所有簞食瓢飲之外無幾也夫窮達天下之分也達之至於天子窮則至於匹夫窮達之極也樂乎天子與樂乎匹夫無以異也何哉凡欲因於有者也妄成於動者也交於有而俱出役於動而莫止雖以天子之大通而累方將焉以匹夫之易以至足也而競方生焉故曰惟虚也足以涵天下之變惟静也足以宰天下之動自天子至於匹夫者境也外也有時而為天子有時而為匹夫而我未嘗與焉是故不以天子之樂加乎匹夫不以匹夫之樂易乎天子無我者也其知静虚之道者與顔孟氏歿而聖人之澤微矣迺有虚極静篤之説行焉彼豈無以異乎權數流蕩之為也而較較然滯於形器之小猶有我也故曰濟天下之務而不累静之至也成天下之化而不居虚之至也是是非非之辨也吾友顧君徳彰學有本原超然獨㑹於事物之表作亭後圃名曰静虚以求孔顔之樂遭時任用不鄙州郡之煩猥存乎我者無適而不豫也孟子嘗曰禹稷顔囘同道又曰易地則皆然是致一之學也徳彰請曰願書為記以張亭之牖下儼山集巻五十五
