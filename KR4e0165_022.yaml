body:
  text: 儼山集卷二十二明陸深撰樂府三一百三首大賀詞八首乙丑青宫潛德通元氣先帝深仁釀太和文武兩階初拜舞應知寶歷萬年多鹵簿前陳法駕高司晨燎火雜蘭膏千官曕仰新天子五色雲中覆赭袍巍巍帝德足光前寶歷中天第七傳聽得臣民私慶語不須明日更勞煎洞門法禁夜方中燈火煌煌動鼓鐘閣道淡隂連御幄祥雲應解識真龍時有淡雲曈曨斗月奔趨萬國歸新主次第千行列舊臣正值一陽初動後時登極正子時和風甘雨遍青春鴻臚聲肅漢官儀環珮珊珊滿玉墀黃道重開新氣象齊歌天保答恩私星星寶炬列高樓恩詔泥封在上頭忽聽半空宣讀罷嵩呼聲裏玉闌浮字字親將惠澤頒十分湔洗到愚頑先皇多少心中事丹鳳銜來一紙間丙寅元旦待漏參橫斗轉曉相將迢遞宫門漏水長不見滿朝環珮響坐彈氷淚憶先皇接駕曉日曈曈劍㦸森五雲宫殿鎖深沈侍臣候立頻回首傳道鑾輿幸上林素履齊新裁紙帳木綿裘曲几圍屏事事幽明月射窗殘雪霽夜深人在水晶樓隋宫詞二首螺黛朝朝吏散來糚殘猶展鏡奩開門前報道宫車過不似輕塵拂面回金鎖黃昏知幾重夢回疏影月簾櫳笙歌别殿承恩寵半露春衫蜥蜴紅端午詞二首碧青艾葉倚門斜寂寞深宫有底邪幾度思量背同伴暗分醎水引羊車石青蜥蜴泥金虎五色綵絲長命繩白髮宫監催拜賜含嬌時許未能勝江東竹枝詞四首黃浦灣灣東轉頭吳淞江下碧如油不用并州剪刀快水晶簾下上西樓二月春風滿地鋪茅針蘆筍一齊粗海門東來春潮上春水連潮漫白塗濱口航船一字幫櫂歌和起自成腔潮來上南潮落北南到湖南北到江明月垂楊獨樹橋橋西熟酒好良宵紅香細剝鶯哥嘴嫩白鮮羮玉麵條步虛詞四首晴日暖風吹紫霞西巖開遍碧桃花仙家只住巖西畔水水山山遮又遮風露滿山深翠微暗塵不上芰荷衣夜來拄杖成龍去斜倚枯藤送落暉芙蓉花下石闌干茅屋空山生早寒養得一雙朱頂鶴有時騎向碧雲端溪後溪前路百盤白雲常護禮星壇麻姑使者傳書到一派簫聲雙紫鸞鼇峯草堂歌十首閩山南去是鼇峯鼇峯草堂多卧龍春隨花路八千里天鎖煙霞十萬重谷口子真歸計成少陵老人歌北征五月南風吹海雨碧山無數荔枝明御堤楊栁春日遲折盡長條更短枝天上初拋祠部祿山中誰送草堂資平生最愛方思道方外更交孫太初作吏隱居非我意南巡新上萬言書早年慕道世情疏乞得青山背郭居不為登樓賦王粲文園真有病相如北來京國住三年南去青山得似前試問孤猿與孤鶴為誰消瘦為誰憐新裁道服緑羅寒别有烏霞製作冠後夜相思長瑣月酒徒詩伴滿長安山公啓事孰當前宣室求才誰少年一路桃花春水漲皂旗唯送得歸船羣策先皇一網收虎頭高選重龍頭相知賴有倪寬在與汝一時成去留莫倚高歌莫著書秋風病骨夜窗虛海門近傍鼇峯起錦字封題侯鯉魚元旦試筆二首和柴德美天門次第列中官御幄含風春尚寒拜罷兩班文共武相逢屈指計迎鑾帝德唯天仰日新聖經書法重王春青陽應律方東令翠輦臨邊正北巡書扇露下瑶空鴈有期高樓凝望已多時隔江一片芙蓉樹欲采紅芳寄所思寄江都舊友平山堂外蜀岡長十里樓臺隱夕陽更愛緣溪茅屋好與君相約住維揚節婦吟深閨獨抱舊分銅淚逐黃昏怨曉風惟有五更孤枕夢尚將膏沭到飛蓬閨詞四首背人憔悴轉回廊試折花枝比淡糚不忍問春深幾許芭蕉新緑過東墻水閣看花怕到遲白羅團扇手忘持多情更向侍兒說庭院深深稱賭碁晚糚重整翠花鈿滿指蘭膏試碧泉欲向姮娥訴恩怨人間天上共孤眠薰籠百和曉糚殘起探隂晴繞石闌折得梅花無寄處自憐纎指怨深寒又閨詞四首庭鎖繁花晝景長繡針刻晷記春光行天嫌殺金烏懶到得黃昏怯上床池館殘糚坐晚凉自將金彈打鴛鴦打得鴛鴦各飛去白蓮花度並頭香簾下風來月影過蕭蕭梧葉下庭柯起看鳳歷論時令夜刻如今未當多嬌娥自畫曉鴉蟠獨對梅花拄頰看直到夜深眠不得衾籠藝火鬭嚴寒縣齊春宴蓬萊方丈像三山舞象馴獅效百蠻人自東郊向南郭春從天上到人間清河東渡乳鴨苗魚促刺稠紫茸翠帶弄輕柔渡船人語回風細疑是江南小埠頭王兵憲于澤以二力士送豫遣還二首雕弓羽箭爛銀鞶白馬朱纓錯繡鞍踏雪護行三百里一行騎射萬人看紅袍白面好兒郎燕趙豪華獨擅場贈汝長纓三百尺樓蘭西去縛名王臨城道中寒雅成陳掠疏林晴雪峯頭弄夕隂憶向小窗茶竈下李成一幅論千金逢方仲敏侍御二首花驄高載璽書行憶在華亭政有聲塵土相逢渾不識聊從陌上各通名依依把袂逐多情為問何時下玉京報道聖躬添萬壽南郊大禮慶初成沛縣二首人言捧土塞黃河丞相開河怨亦多曉日卧龍岡上望白沙如繡湧層波山東列郡盡王臣漢室公卿俱負薪侍臣欲獻河清頌天運中興屬聖人南旺湖南旺湖中水接天南旺湖上多漁船榔聲刮地風聲急赤鯉烏魚不論錢邃菴挽歌二首出當紫塞入黃扉重去重來復暫歸今日竟從何處去長江空繞萬山圍金書鐵劵是何時空復人傳翰墨師唯有銘旌題道號更無一字上豐碑扈蹕詞三十二首保定候駕四首翼善衝天白玉縧團龍鞶繡赭黃袍山陵南去三千里紫氣紅塵一騎高乘鸞跨鳳貫魚隨日射行宫近午時密密柱頭黃幄竪重重軒蓋繡簾垂師保公侯列署分勑書先下兩將軍清塵雨歇祥風動抱日常瞻五色雲畫衣楚楚間青黃僉㸃民間俊秀郎未到御前先教習遞分班次列成行吕堰道中四際天垂夜氣凝平坡十里萬枝燈風回逺戍三更漏問訊行宫膳未曾博望道中天際紅雲捧節旄襄陽大堤三丈高宿雨平添漢江水軍門傳向裕州朝奉㫖三品乘轎車行歷碌騎行徐早晚誰來問起居聖㫖分明優老大特教三品用肩輿南陽金字黃旗隊隊過雲霓偏傍六龍多星聨火炬南陽道不到黃昏渡白河鄭州道中二首宿雨豐泥燕子飛客心迢遞送春歸江河嵩少俱從幸麥浪翻空柿葉肥節物驚心去日多功名無奈白頭何中興天子思豐沛一月官程兩渡河候駕渡河二首豹幡雉尾午風和萬乘時巡南渡河千尺樓船龍出峽擢聲齊和太平歌三月一日春水波縠紋苔滑送黃河六龍自有風雲翼飛度中流一睫過駕渡河二首積雨新晴河水平龍舟鳳舸午風輕周王八駿空馳驟大禹三門正告成水濶風恬曉露濃半空雲氣盡成龍萬方無事君王聖河伯陽侯次第從恭和聖製渡河餘字二首渺渺長河萬里餘昔年清徹見游魚太平天子南巡日穩渡龍舟似板輿天皇樓船百尺餘波神送喜湧蜚魚省方問俗勤王政白叟黃童捧帝輿曉過御茶房扎下行㕑按四方嫩黃幃幕下金床太陽出海高三丈照見流蘇五色光保安道中大風漢王豐沛壯心多今上襄樊特地過花栁盡迎紅日近山雲重起大風歌博望道中小雨驛路風塵去轉輕楚天雲雨近清明碧油衫袂三分濕金縷旌旗一半晴從幸顯陵三首春深南國半隂晴輦路無塵御蓋輕旋著賜袍忙上馬中官傳道駕先行板轎棕輿渡碧山澗花巖樹影龍顔雲中别有通陵路䟎過前驅插大班純德山前氣脉長太平天子盛還鄉從官文武拖犀玉靠著青松列兩行駕還朝門南上紫坡陀燈火叢中玉輦過內侍雙吹金觱篥教坊齊唱御鑾歌回鑾歌四首雨餘江漢長波瀾日照山峯起鳯鸞九鼎已成勞駐蹕萬方歡喜頌回鑾謁廟辭陵不盡情從官有旨許先行獻皇開國分南楚成祖遷都奠北京御筆分程意最深相兼七日到河隂凡情亦有思鄉急何况君王社稷心舊路重經不厭多龍舟銜尾俟黃河天心却與人心合若比來時氣更和泊黃河二首元帥旌旗護六飛河南河北盡光輝追趨侍從聨舟發歡喜都人大駕歸兼程通夕雨還風却望行宫信未通文武先行遵詔旨好浮新霽鏡光中趙州聞柏鄉駐蹕回鑾分日第郵程御輦常兼四站行聖旨特憐人馬乏柏鄉駐蹕道欒城良鄉行宫候駕青山疊疊繞行宫萬騎千官四面風綵繡趨蹌燈影下旗常搖曵月明中發良鄉紅日西飛白馬東錦袍織帶從官同親知相見如相問日有新詩紀聖功桂洲夜宴出青州山查薦茗色味佳絶巖背山椒一萬株青州糖毬天下無火龍行雨歸東海拋却紅明頷下珠張家灣櫂歌四首當年海運數朱張灣泊帆檣正渺茫幫著擢船愁水澀隔艙相喚剝南糧轉灣脫塹水生衣惆悵輕船載月歸約略寄居三百石盡拈香紙禮天妃百年漕運最稱能今嵗河洪見未曾司馬中丞新領勑聖神天子坐中興張灣水出北山頭十里洪身九里洲惟有老漁知進退深灘撒網淺灘揫天津櫂歌六首擘除軍餉顧長夫北上南來愁直沽十隻畫船如屋大火忙飛票報前途垂楊覆水晚湖平篛笠蓑衣一櫂輕何處官船初解纜抄關給廩唱花名滿船簫鼓載春歸燕子銜泥掠岸飛楊栁風多黃鳥健桃花水漲白魚肥拍拍襟懷潑潑身南來北去盡通津何如平地千層浪無影無形愁殺人船頭青雀碧紗幃檣上黃旗獵獵飛中貴少年紆蟒玉南京差遣進龍衣一溝黑馬百泉東萬里黃河五月終南運未離淮海岸北船難上吕梁洪送鶴池出鎮貴陽擬鐃歌二首將軍開閫向西南文淵孔明今成三草緑轅門春晝永磊落兵談如手談漢武開邊到渥窪張騫奉使上星槎何如將軍今日去蹀躞龍駒爛五花儼山集卷二十二
