body:
  text: 儼山集卷九十一明陸深撰書一與夏公謹都諫足下受知聖主大行所學甚慰甚慰往在延平嘗奉教翰比日再辱手書奏議極感極感顧罪釁之人不即裁謝亦恃吾公謹有以亮之也夏初入晉勉强供事頗喜此方朴野若可以展布者而上下物情亦復歡然令人頓忘其孤逺也近時頗有大難處者旬日間别當奉聞且僕之去國也重負者聖恩耳然於事幾之微未為無見不自量力亦欲效馳驅於其間詎意軔方發而軸先折矣秋來一閧頗得洗脫與老妻弱子在溪山佳絶處以自慶殆天所擬此意未易與他人言也但當日與見山形迹不過謂之公事不和而已兩無私怨與奪之權朝廷實主之公論在士大夫在萬世一身之去就甚輕也僕雖萬里之行意甚安之此又衆人之所未諭者自北來悠悠之談乃皆謂見山將甘心於僕而僕嘗併得罪於羅峰此言喧傳於是人人始以僕為竒貨而競欲賣之矣但恐積微成著致誤時賢此非筆墨可盡也昔栁子厚與蕭思謙書云飾知求仕者更言僕以悅讐人之心日為新竒務相喜可自以速援引之路而僕輩坐益困辱萬罪橫生意嘗非之宗元喜功名不自愛重在八司馬列若其黨就勢成誤國不淺宜天下之所深讎也無復悔悟而乃深文以委罪厚已以薄人真天下之險躁士也及觀陳師道問訊黃魯直便至仕者不相陵否僕始疑魯直文人不過以言語詞章取怒時宰耳仕者同類何至相陵至於舒亶李定之於蘇子瞻然後知天下之物情變態其所由來者非一日矣意又憐之竊傷今之人去古之人又逺矣義命之說僕蓋聞之自顧荏苒嵗年便已五十有五矣精神氣血等是六七十老人桑榆之日無復再中蒲栁之姿自應早落徒以先壠猶荒丁男當娶此心未嘗不一日南望悲傷也人情不逺公謹宜有以體之且夫君臣之交方固朋友之好未擕當斯時也豈不能待乎偶以褊心與之較文義之微諍毫釐之分坐成蹉跌如此者雖敗猶榮乃若蓄憂疑隱忍之心以須浮雲飄風之㑹縱復竒中如此者以榮為辱千里之繆古人所以痛也僕自先人見背祿不逮養已辦終焉之計秉志不堅妄謂用之則行今鑄此大錯矣嘗愛歐陽公兩言有所不為之謂耻有所不取之謂亷晚節末路誓當守此由今觀之亦可謂無所不為無所不取矣又嘗自怪性好潔高難堪再辱此宜公謹之所知也古人有言感恩則有之知已則未也今知已非公謹而誰哉聊因公差人便附此不盡去嵗今日亦是九月十九在延平晨往羅源里謁豫章先生祠堂還到公署西窗下結字滿一卷無一筆訛誤楫子從旁侍筆硯晉陽風日今年亦佳恍然如一日事但作此紙時在貢院中堂宇峻深明窗甚幽閴而下筆輒脫謬老衰便驗於此矣公謹勿訝勿訝與方叔賢冢宰深自先人背違旋遭擠毁結廬田中已有終焉之志自外朝籍者餘四五年矣辱公薦揚遂承召命中途聞擢附驥趨廷豈勝感激思奮深為祭酒公在禮部深謫延平公在吏部山西之命又辱吹噓是皆愛深之至者矣雖然愛之至又不若知之深也比有陳乞命下之日只煩早賜成全之則知已之恩大矣譬如奕棋滿局皆敗尚須廬山老此一著也意難言盡感與淚俱與徐子容吏侍比奉華緘副以手墨感刻感刻昨有小柬上西樵致謝矣想知照近日上乞休之章萬乞致意西樵幸勿復以漫語視之緣先人之葬尚草草弟輩不可託須躬親落成小兒來年已十七兒媳又長兩嵗二三月間要成婚事六十老人止有此子亦須此父親醮之若使男女失時念此豈能一日留身在外作癡兒耶此言惟崦西可告此事亦惟崦西可謀免使再舉至叩至叩至情至情嵗暮縱復氷霜入晉時初無行李上車尤為捷徑也言不能盡跂踵以俟俞音不任拳拳與周白川尚書前嵗楫兒入侍得誨慰勤勤骨肉之感也銘刻銘刻恭惟清望碩學遵養厚深神明所相中外倚毗無任欽向深衰退日甚無足齒録三十年來本願從公五湖烟水間耳此盟恐不復暖矣東望萬里瞻遡奈何敬此附起居餘惟為國為道保練以䆒大業病目淹纒臨紙惘然不宣與康德涵修撰論樂何柏齊曰今世詞曲與古樂同此言有理顧曲折細微古今須别爾何者古樂主聲詞所以譜其聲也孔子所删删其不合於管弦者如素絢不録是已謂之為逸詩者非也惟聲最易亡三百篇之聲未及漢已亡今特傳其詞耳漢樂府名新聲故詞難詮次新聲又亡至魏晉之詞通解而聲又亡後周得江左樂工至隋唐聲又亡唐詞多今律詩而聲又亡宋歌詩餘聲又亡至金元時曲子盛行今所傳者南北調二聲在耳謂即此是古樂深未敢信也大抵古人審聲以選字然後鍊字以摛文後世先結文字乃損益律呂以和之去元聲逺矣恐非古也即今詞曲論之亦有聲意二端聲一定而意無窮凡聲急處是欲趕板意緩處是欲合索蓋有眼以度腔調絲在指撥遲速惟意若明皇遲玉笛以合霓裳是已是故聲傅節拍意傅義理此感通之妙古今無二謂即此是古樂深亦未敢信也舊傳王粲張飛等作傳竒俱含鍊煆人才意所以鼓舞人精神不倦此却與詩之正變合不屬義理宋儒所釋正風變風大雅小雅是剩語也深行旅疲憊兼老病廢忘漫浪及此何當面質為樂願承教與陳省齊深不肖於今公卿中受知受愛之深未有過於執事者也衰病之軀由陜入蜀百無一補徒負初心所幸德音伊邇甚慰瞻依顧未能一承下風以叙契濶之懷為愧為渴恭聞討賊臨邊義明氣壯想成功當在日下矣拭目露布北來以觀蕩平之績為快蜀賦所逋屬在災荒空乏之日措辦殊為費手即日遣官部運用助先聲伏乞照數檢入後至之誅容勉力奉補亦不敢濡滯也餘具咨移轉逹萬惟台鑒幸甚與何柏村總兵二首深頓首連日西事在念恃執事在耳零星功級毒酒運謀此等正可慮可笑者不知此外别有方略否得手劄公牘為之憮然西番自古不能為大患害大要撫禦得其道而已李文饒苦心經略只緣中外議論不同遂至無功前史可覆亦可鑒也昨曾告秋崖兵憲云誅賞二字須要用譬如奕棋不可失先後著耳兹亦以告柏村大帥冗劇信手餘惟為國為民珍重不具比日承遣人馳書存候無任感慰西番事無的信何也自用兵以來已及一月進退無據雖得之傳聞者殊不成次第撫按兩院大失所望柏村不得不獨任其責也聞柏村初議甚好却恨執之不能堅爾兵憲頗歸咎於往年五寨之舉不停當致有今日此事少俟須當付之查勘也知之知之深老書生不知兵事亦與按察之官體假不同但欲保境安民不妄費不妄殺為本分職業爾用機弄術以成就小功名正不願諸公為之見周參戎亦望道此意七月上旬恐番人有動靜却須戒嚴幸密之餘洗耳與朱秋崖憲副昨奉小牘一以謝教一以謝過想䝉照原比日再承手翰并公移敬當如命奉行顧才識有限耳番情文字連篇辱撫按不鄙賜之與聞備見經略妙用使老迂之人驚汗斂服俱從貴司議行僕無能贊一詞也惟有往嵗軍前用過錢糧弊司一萬兩查有下落其餘未見清報為察院比較作第一件未完該吏往往涕泣哀訴竟將何為如果事涉嫌疑勢難推究煩為徑自呈奪以冀杜絶别有違礙亦望具由當為轉逹可也但惟付之髙閣僕受纍多矣奈何奈何令承差雷鳴逺坐守之幸留意留意深溝用兵議二千兩按臺允支但庫藏空虛復有大木之費即已呈請撫臺為斡旋第乏解運可托之人人須臺下委的當人臨庫支之庶不落人圈套也此事亦别有行先報此與王舜卿久失奉問比日得書為慰秋崖僕素厚僚友之間䝉渠敬愛但恐信不及爾近事雖小跡甚狼狽復恐以此為秋崖纍故擬議間殊覺費分疏也想山村野氓中或自有實話幸為亮亮僕老境功名俱出望外顧才綿任重自有速謗取侮之理恐不止此一事為然正如牛羊之入庖厨趨死地也而身則無罪此與朱陸異同大不類見秋崖為我謝之令兄相知最深身後有何表章僕豈敢有所愛也但武定侯所刻者實未之見便中不惜見示為叩山中夏爽兼有圖書為樂近呂都憲道夫亦將至天涯無事也餘自愛與郝瓠中兵憲兹者憲節止城門之外然以行速遂不及追候無任懸企胡覺先來得公文極承扶持知感知感但此事甚有難處者若欲餘出必須嬴入僕不敢為也若以原封對衆散之亦無不可者指揮張和年少狂妄行事貪鄙人言籍籍俱有指實非徒得之傳聞而已其叔參將麟屢有苦言訓之執事稍宜戒飭亦保全之道也恃愛及之簡敬劉汝成監收之差兩院頗有異同惟執事擇其可託者徑為轉逹可也草草附遞幸煩速報之與汪器之壬申秋鳶山信宿青港奉别昆季後至廣信附上鄙作圖書想已徹左右歸途至杭而病作遂乞告去春偃卧中側聞過吳門自恨不能扁舟奉候徒有此心嚮往而已邇者審自講筵出蒞南雍海內得明師範其為慶幸何可云喻顧草餘年之侍從而復肯為春明之逺别是足以仰窺執事所養之深厚深之欲私致一賀者又復在此僻居海角若面墻壁日逺大人君子之教為懼但心疾漸成時復嘔吐長日杜門止辦枯坐恐不復䇿勵可前唯有慙負知已之感而已奈何奈何令兄先生居京師况味何似令弟又復失意何以堪處石樓院長計相得甚歡日斜衙罷蔥翠之中導從冉冉與江山相映發殊勝未能奉後塵為恨臨風依依他所欲言者不盡奉劉野亭閣老即辰首夏清和伏惟台候萬福深以菲劣謬厠門墻計違台嚴已踰十載未嘗獲一奉狀門下少伸起居之敬罪愧何如恭惟執事正道正學追配古人不但出處進退足以繫本朝之輕重而一言一動之間皆足為世師表播在人傳極深向仰未由摳衣侍側以卒所業為歉耳深去秋起疾入館供職前月方滿一考憂患奔走之餘百凡衰退負恩負教實亦未知所以自裁也崔侍讀子鍾南還云當出門下謹此修問尚冀順時保練以副華夷之望與李獻吉去冬自仲默處奉手教子鍾子容處覩佳篇於賤子極荷存念顧不自量力扶病來此病日益深而毫髮無可效慙負知已何如入春以來緬惟起居佳勝學植邃深敬服敬慰比承乏禮闈舒生芬者偶出本房亦有夏生言者詞翰甚有法度云嘗受先生指教江西之政浸溉鼓舞者多矣外此有陳生沂梅生鶚者皆名士大率此科人材亦自不少恐要知之輒以為瀆外小詩扇附子鍾侍讀先生轉呈結腸之作少俟病蘇請教非敢忘也餘惟情照與顧未齊宫諭深卧病江村如坐井底久闕修問非敢忘之也春初大病幾至不起遂為小女納壻擾憒擾憒入夏以來漸蘇然精神志趣已如再世人矣水竹之間結一茅菴署曰面壁啜粥茹蔬以送昏曉無日不在是間也比日沈希賢過舍奉手教情誼拳拳無任慰浣備聞起居佳勝有少瘡疾不至甚苦想道力勝之也始知令郎北遊賢關不及餞送為歉承問及近况老兄尚未相諒否五十之年僅存一子薄田敝廬不失先人之舊復何所望耶兼之氣血蚤衰寡食少睡人間之樂以享為纍矣野㑹之約甚便踈懶地之近貴邑者青龍盤龍皆有小莊僧廬佛舍頗足登覽澱山金澤俱極宏勝此皆近漬澳也請為定盟須俟秋分後作半月約過此則有收成事催人矣如何如何餘非面莫盡儼山集卷九十一
