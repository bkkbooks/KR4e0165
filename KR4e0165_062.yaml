body:
  text: 儼山集卷六十二明陸深撰墓志銘一中憲大夫雲南臨安府知府致仕瞿公墓志銘嘉靖二年癸未冬十二月十八日甲寅葬我南山先生於洋涇之原禮也孤山以墓石為託且致遺命深拜而受之泣不能勝嗚呼先太史公竹坡府君初娶於瞿先生女弟也先生先公契分甚深先妣吳孺人就養京師與今陸宜人連邸猶嫂姑也嵗時往來無間故深出而從先生于朝若見吾先公焉先生既去雲南先妣見背歸而奉宜人于家若見吾先妣焉因念往嵗乙亥冬深將起告奉吾三族之尊老于江東之新堂先生時年八十有二矣世父梅月先生則少一嵗先公又少二嵗外父悅清先生梅公又少三嵗從父東隱先生則六十有七云作五老之㑹適曹憲副定菴先生與陳州守約菴先生自松偕至遂題之曰七老之堂命畫史圖之于時惟定菴年最高八十有四約菴最少猶六十四云齒德輝映衣冠肅穆咸賦詩紀之傳至都下以為盛事深官國子庚辰悅清先生之訃至辛已夏南奔聞定菴先生之訃既葬先公明年壬午元日哭吾梅月先生再旬併與先生哭之矣尊老雕謝若相鱗次孤苦之蹤無復恃賴其何以情為嗚呼先生之盛德深又安敢以弗著謹按先生姓瞿氏諱霆字啓東别號南山先生瞿之先自通許遷居華亭高祖諱富之字守仁號士清以德行稱曾祖諱阿滿字子謙别號菊軒再遷上海今為上海人菊軒府君生慈孫字以孝别號思聰世隱于農思聰府君生晟字彥明别號松巖先生之父也松巖府君復以農業繼間往來湖襄為貿遷家以益大配淩氏持家有程度生三子先生其季也後以先生貴加贈松巖府君奉政大夫修正庶尹左軍都督府經厯淩太安人加贈太宜人先生幼有奇表端慎敦厚年十九贅于陸已而歸焉補邑弟子員有聲場屋為諸名公器待五舉鄉試登成化庚子科以春秋上南宮從三山林公亨大問大義林公亟稱之四舉禮闈不偶以𢎞治庚戌秋謁選天官名在優等授順天府通判勾管上供薪炭積弊剔疏事倚以辦撫按交薦壬子居太宜人憂喪葬如禮乙卯服闋仍補順天督治糧草丙辰奉命同工科給事中李漢等清理武清等七厰葦地訖事繪圖進呈命勒石為定規戊午屬縣重囚犯至死而罪不至者李福名等三人立出之稱平允焉是夏親王之國供億甚擾備價則器急備器則價急先生具奏宜輸直長史司從宜顧倩兩便之㑹朝饗諸陵值沙河暴漲先生溺焉賴以救免方出談笑賦詩不失容色既濟即造二方舟以備後患庚申滿六載考最已未㑹試為簾外官辛酉鄉試復為簾外官調度有法癸亥秋滿九載州縣共保奏遂升左軍都督府經厯每朔望詣闕下敷奏朗暢武廟登極受白金文綺之賜者三是秋調後軍都督府仍經厯太師英國張公甚倚重之戊辰升廣南府知府廣南雲南邊徼郡也先生不以險逺即行廣南舊寓臨安治先生居禪寺中有扶桑黃花之瑞俄轉臨安先是嘗奉三堂檄署臨安矣故臨安人甚宜之元江知府那氏與族人讎殺不已先生往撫之諭以田真兄弟事立解庚午再撫䝉自所李師革普濟等又撫曲江驛石祥奉等皆解以功受銀牌之賞獨那氏一族黠夷也隂行千金為賂先生發其姦獻議誅之是秋入覲以老乞休許之東還日坐南山以為樂時時招致親朋賦詩為㑹如香山洛社故事如是者又十餘年以嘉靖改元正月草一日考終於正寢遡其所生實宣德九年九月初十日享年八十有九云配即陸宜人出名族恭慎貞淑有賢行少先生一嵗白頭相敬如一日內政秩然子男一即山義授郎官以孝謹亢宗娶王氏繼張氏孫男三長曰應元次曰應祥國子生次曰應隆曾孫男四繼武繼文繼魁繼恩𤣥孫女二官貞官福先生生當我朝熙洽之運是故德器豐碩若喬山茂林滃鬱葱蒨之色閲嵗寒而後雕力學懋成持滿而始發有淹貫練達之妙故天下事無不可為而意近於厚所至化之宦業不務竒苛而愛戴之者父母奚翅平居未嘗有喜怒之色尤不屑屑於厚産植生計門堂潔清禮秩整叙年過八十猶親近簡冊精彩如少壯好吟咏有南山集若干卷藏於家處宗黨恩禮尤極周密云初先生母兄怡清先生與蒲泉先生共相友愛惟篤怡清卒時有子才四齡先生宜人襁負之歸愛過所生長而命之曰嶤宜人以女姪妻之每侍宦遊孝如所生故先生行誼嶤得之多兹特為狀以速銘銘曰於皇明運宣正為盛篤生偉人直方以正魯史春秋斷自宣聖袞鉞之嚴孰執其柄公闡厥微傳之從政耽耽京兆載其清靜參畫大府翕張惟令遙遙臨陽萬里為境公手摩之克惠克定既曰倦遊攀挽莫競至神無方去思有詠大耋斯屇以保正命鬱鬱髙原草樹輝映磨崖勒詞述德纍行嗟豫小子孰敢為佞前江西按察司副使素菴曹公墓志銘孝宗敬皇帝之十有八年是為乙丑嵗當臨軒策士先期於宮中焚香祝天曰願得真才是科制舉三百人多忠節文行顯名當世天下以為盛未三十年而放黜夭死錯出殊常生無恙者不滿百輩其注仕版者才四五十人爾人或以為衰深厠名是榜無足比數每以罪遷庚寅春來山西山西同年總之八人僅存者三人又皆以詿誤廢處而平定之曹公憲副則既臥病不能見客矣辛卯之冬奉攝具獄再至則僉憲閻公復以七月捐館舍候㫖來次平定當壬辰春正之三日公適以是日終于正寢享年六十有九深哭之哀曰吾黨衰甚矣既相斂入弔周視其室廬儉素考其言論風猷皆朴實正直有益國家始抆淚而歎曰兹所以為盛也既而其嗣子自新等以墓石請乃諾而慰之曰非深誰克為之公諱雷字啓東别號素菴其先泰州人以戎籍隸平定州曾祖二祖輝父恕母葛氏公少即知砥礪名節性尤儉勤廉直事親孝大母某病風臥不起者十年公奉湯藥不離寢榻者亦十年人以是稱之以經學教其鄉出門下者百人舉進士觀政吏部授大理寺評事既改為闕道監察御史升江西提刑按察司副使兵備九江其在大理也平反寃獄多所駁正其為御史也巡光祿寺則立平準法獻納者賴之巡茶陜西則周嚴禁防私販大塞巡按湖廣則激揚風紀士民稱便有太監王潤家人犯贓立置于法在朝多正議敢言時流賊掠新蔡官軍圍之急賊自圍中聲言曰圍不解吾將屠新蔡主兵者以聞羣議皆曰寧殺新蔡之民圍不可解也公獨曰蔡民何辜寧解圍以善後圖可也至議三邊設總制官公又曰不便夫邊既有三堂矣三邊相去又逺若總制于一人三堂皆掣肘矣人尤以是直之然復以是惡之公不顧也正德間武宗皇帝初欲於西安門外積慶鳴玉坊買拆民居數千家以事興構者公聞之即上疏其略曰臣觀今之勳戚各有寧居有司庶府無煩添設禁城之傍又非演武之所三者之外豈宜别有造作是必左右希恩榮規私利者導之陛下未察而誤從之爾臣聞天生蒸民而樹之君君之舉措以為民也今一旦破民之産奪民之居令其轉徙提攜呼號道路上千天和所繫非細况兩宮被災經營未暇豈宜失先後之序而為此不經之務哉昔漢文帝惜十家之産而竟罷露臺唐太宗納張𤣥素之言而止修乾元殿陛下德過堯舜亦何嫌於漢帝唐宗哉在一念轉移之間耳伏願早發德音亟罷此役豈惟陛下享納言之譽而臣亦得竊回天之名矣疏入工為暫阻其在九江也適值宸濠之變時公以兑糧先往涇江口府衛官委城而逃公從瑞昌起兵復之事聞降詔奬慰有曰曹雷糾集義兵克復城池功勞可嘉時閹璫權幸以搗巢為名勢甚張公略不為屈張永劾公嘗與逆濠通餽械繫至京下詔獄雜治之無狀勾稽逆籍又無名訊之劉承奉者語無連涉始坐以兵不設備編戍太原左衛公曰是雷之罪也非雷之心也今上御極之九年准赦令釋除公惟舉手加額感恩而已不甚加辨云人方服公之善處患難而公遂不起矣嗚呼公生以成化之甲申配郭孺人有賢行先公十八年卒葬在桑溝之域今卜以某年月日合而封焉子男三長曰自新次曰自修自重州學生息女二俱適名門孫男女七人曽孫男一人宜銘銘曰生當治世推邦英既起立朝多直聲晚蹈危機禍橫生竟逢大霈䝉聖明有如不信視豫銘前承德郎刑部主事張君墓志銘嗚呼吾尚忍銘吾九苞哉又安忍不銘吾九苞也始時孝宗皇帝馭㝢內天下治平極矣統紀布明士大夫無所於自見乃皆留意藝文之事歌詩詞章字畫非此無賢是時淡軒張先生與從弟簡軒先生方攻進士業又力以文事為邑人子弟倡從之游者蓋彬彬焉是時有朱先生景陽者以雄邁之姿震蕩其間與淡軒為文字交甚歡時時飲酒擊鉢賦詩帥諸生講說邑中文事咸在是矣九苞最少而慧尤以沈默為淡軒鍾愛又遣從朱先生學是時邑之穎鋭者並集朱門則有沈恩仁甫瞿鵬萬里楊學禮伯立與景陽仲子豹尤為邑人器目而仁甫遂崛起連捷進士去九苞益奮不自禁作長書數千言若將與仁甫分道而馳者衆咸偉之然自是功用過苦得竒疾疾愈又六年是為𢎞治辛酉乃領鄉薦是時南畿士就試者幾四千人而九苞一試而捷邑中之同薦者則有郁侃希正張紘文儀葉鈇廷用戴慈子孝唐歡季和董懌世康暨深凡八人邑中科目之盛前此未之有也明年壬戌㑹試禮部下第而希正又以本經魁天下是時九苞益信文之必於工也奉淡軒先生南還方購書取友為進取計居三年是為乙丑㑹試暨賜第咸在高等觀政禮部是時淡軒先生復同在行謀奉而南遂以疾與告先是九苞之外母劉隨其夫東平州判官吳君貫卒業胄監時客死不能返葬蓋三十年矣是行也九苞尤以為念親扶而還識者義之今上之初權姦竊政九苞例以歸罷而仁甫亦以刑部員外郎罷既而深以先孺人喪還九苞數來慰焉退然益修所以用世者不懈權姦伏誅深三人者連艫赴召既至授九苞刑部山東清吏司主事提獄省中遂捐俸作亭於獄之庭榜曰放飯以便食囚之雨雪者霸州民有與中貴爭田者九苞竟判民田還之正德癸酉秋奉勑視囚淮揚等處竣事維允明年甲戌滿一考維稱加授承德郎刑部山東清吏司主事推封淡軒先生為承德郎刑部主事贈母唐為孺人制勑甫下而淡軒之訃聞矣九苞匍匐以歸深裹疾往弔退而驚其哀慘憔悴之過不意數月之間而竟哭之矣嗚呼九苞姓張氏諱鶠字九苞别號虹溪居士淡軒先生長子也淡軒先生諱鼇字文魁祖諱綸號樂道曾祖諱益號存耕世為上海人配吳氏封孺人即東平公女也子男二長挺娶豫兄子次拓聘吳冬官子儀之女孫男一九苞之卒年才三十有九爾今卜以乙亥十二月庚申奉厝於肇溪祖塋之次嗚呼君子之學始於潤身終於澤物夫所謂潤身者非取其言語之能工而聞望之徒外著也蓋必有不可奪者存乎我於凡外物之坌至而倏往者渙然若春冰之融液於澤而莫禦是故足以宰動應變而不窮夫然後成物以成身其功業所就者天也念昔乙丑之嵗孝宗皇帝臨軒䇿士先夕於宮中焚香祝天曰願得真才是時邑士之與計偕得奉大對者獨深與九苞爾攀髯以來歲星一周深之衰鈍無似上負國恩下慚所學而九苞澤物之志百未一效遽至於此則吾涕之所從者獨閭里親知之私而已耶銘之曰志也不遂遂未必如志命則若是於九苞乎何與奉直大夫司經局洗馬楊公墓志銘昔在成化戊戌之嵗憲宗皇帝預養士於館閣一時皆極天下之選若山西楊君廷俊人也固以為必至大用少猶不失卿二而孰謂遂止於洗馬耶嗚呼廷俊卒之二十餘年而余始獲銘其墓其尚何能為情耶按學士張君文卿狀公諱傑廷俊其字也别號立齊世為平定州人曾祖叔成祖玘舉于鄉授鳳陽府通判再遷鎮江府同知父灝修隱操以公貴纍贈司經局洗馬初鎮江府君之歸也囊無餘資時時教授鄉里至教公聰悟異常府君奇焉比成童為邑諸生每試必先成化戊子鄉試中式明年㑹試下第入國學尋歸郡西有冠山佛廬靜深公讀書其中以餘暇為詩歌追古作者後進士多從之遊蔬食菜羮淡如也時饑郡之守素不知公意欲公往而後修好公終不往素知公者或從他郡招公公亦不往其自守如此壬辰再試再不利再入國學時太宰耿先生好問為司業知公數與議論天下士多與之游戊戌禮部試廷試俱高等為庶吉士時學益進造詣益深庚子授翰林編修聲望日重癸卯滿三載賜勑進階文林郎贈考封母如制甲辰㑹試為同考官稱得士戊申孝宗敬皇帝龍飛充經筵官有文綺白金之賜已酉滿九載升侍講尋充講官啓沃得體辛亥同修憲宗實録成有銀幣襲衣之賜遂升司經局洗馬壬子為應天府考試官是科最稱得士甲寅滿三載賜誥進階奉直大夫加贈考加封母復如制配黃孺人進封宜人尋充日講官復以大臣薦充東宮講讀官又與修大明㑹典未終事而疾作竟不起實己未六月草三日也享年五十有六事聞賜祭一壇蓋特恩云配黃宜人有賢德同郡巨族當公喪西歸宜人實左右之提幼纍纍然茹荼隕涕竟教成其後而光大之以今正德十三年考終享年七十三禮宜大封云子二長育坤以公廕為中書舍人有文行能嗣其家次育圻側室出也女三長適呂應宸次適指揮朱瓚又次與育圻同出適某惟公端謹凝重安貧樂道可謂始終無間然者法宜銘銘曰顯允楊公令德令譽行焉乃沛處矣斯具瑚璉圭璋爾才則試丞疑弼輔往哉惟地嗟嗟早藏豈曰天賦惟賦之成惟公之遇皇惠載承公論斯樹鬱鬱雙阡孰敢弗度於萬斯年式啓爾祚儼山集卷六十二
