body:
  text: 儼山集卷九十二明陸深撰書與林見素尚書黃如英至都奉手墨髙篇并西征全集捧誦之餘如獲瞻對經綸之才剛大之氣髙雅之韻未知古人誰當為之伯仲也敬什襲為傳家之寶不但師法於是而已竊念深以晚末辱登龍門嘗獲一言之譽永為終身之榮此特深之自負耳妄意公之忘之也久矣公於天下士自不薄如深何足為門下重輕自十五年以來嚮慕徒勤而寒溫之常禮未敢通一詞於左右今乃始知深自待之薄也罪愧何言恭審即辰台嚴起居萬福登臨吟嘯供髙明之適想象風流如瞻雲漢此特公之土苴耳若夫精義妙藴豈鄙劣所可測識耶無緣執役門下日近道德之光一洗凡陋之習爾往嵗賜告還山中承鄉先生曹定翁先生教愛扁舟百里每辱過從時一道公姓字輒敬歎移日深退而未嘗不私自慶幸古之人有望聲光於數千載之上至欲為之執鞭而不可得者深之所得者多矣兹以親老抱病趨朝蒲栁之姿遂成早退孤負知已感歎何如敬和得題令弟山莊韻二首附呈一覽聊申仰慕之私南望千里豈勝馳情緬冀為道為國自愛以副華夷之望與王荆山都憲昨承手教領悉慙罪不暇伏惟明公德政威望風行江南者儼如神明二十年猶一日也深當是時初入仕途每每覘候一言一行以為師法私自念曰此非近代人物自是先後叨同朝班雖雲泥路迥未獲朝夕親炙以慰素心每一過明公館寓未嘗不停馬致敬為之啓閽而授刺也亦非一日矣所願執鞭投玖以致報於明公者嘗恐無地此心計當通於神明豈敢飾説於左右近者叨官國子深愧菲薄有負君相委託之重不意令器汝梅來遊橋門此雖職事亦某所以求報於明公之萬一也但在稠人之中未能遂為之賞識爾昨蒙督過以為難為兼動明公不得已之説捧讀之餘寢食不暇晨入國學細檢科條自祖宗以來舊規成憲試為明公言之每日坐堂抽籖點班若遇背書日期堂友長捧籖率領班生送過博士廳挨名驗背坐堂班生背其所讀之書新入監生則按日分背監規各官所臨衆目共視若因令郎一人將遂免其一班乎瞻仰之地勢有不能將自今以往祗因令郎一人并與其抽籖背書者遂廢而不行乎條教之際法亦不敢僕欲有請於明公者久矣即此一事情法兩全必有善處亦幸有以教之况今聖駕在逺百事宜慎正賴宰輔之臣容庶僚之守法耳而法之行也必有公平正大之體不諂不瀆然後可以當人心壓物論亦僕職事之所宜盡不敢有分毫加之意者而亦豈非明公之所為贊襄彌縫以樂於羣工百僚之交修共勉者但恐汝梅久樂放縱一時不堪約束家庭之間稟説失實致明公之過聽耳故敢委曲道逹兼布所以嚮慕之私如此伏惟亮之容卜日請強聒之罪奉羅整翁太宰往嵗自西昌以危疾還省不遂瞻拜嗣後為關蜀之行違教益逺聞問無階惟深向仰比蒙恩內轉首夏已供職伏審台候萬福神明棐相為慰恭惟執事振古人物一代師範自出處進退之大以至顰笑話言之微皆有關繫此華夏所共知非一人之私言也深不肖早承知教衰老無聞每一企望如沐春風顧鼷鼠飲河僅取充腹而深源逺𣲖有所未能知也即日蒲輪之召惠然肯為蒼生一出當候於上東門外為之執鞭以請顒俟顒俟兹令郎承命省覲天倫榮樂輒附夀意神往身留仰冀涵亮萬萬南中杪秋正及爽快萬萬為道為國節宣以副中外之望與陳晚莊京兆深執事之鄉後進年近三十始遊宦於外然未嘗一登執事之門請業焉不過望見眉宇於衆人中亦一再而已雖然文章之美道誼之雅固已熟聞而稔習之顧有甚於朝夕謁見者深竊意山川融結而為都會郡邑其中必有人焉為一方之元氣富學而養望早退而夀考者若執事所謂吾邑吾郡之元氣非邪比者家父夀日過辱不鄙賜以雄文近姪輩録至竒古朴茂而浩然之氣不啻少壯此又足以兆執事之夀履未艾非特區區為深傳家之寶而已也極感極慰深竊食京師未緣參侍伏惟保嗇不宣與顧東江學士深自去冬黽勉襄事後皇懼杜門兼以多病又遭嵗飢口衆食寡不免區畫遂爾匆匆度日將及大祥悲哀益倍不審邇來孝履何似不得以時奉慰瞻企奈何近日郡伯以提學之命來索古文大成序聞執事已書首簡想有大製作以傳矣深得略觀此書編次猥雜殊無義例當得執事重加校定乃成書耳聞楊郡博云郡伯難於改作此則過於奉承而略於公議也奈何深意欲移書提學論列其委曲庶幾見從乃不辜郡中此一費爾不審尊意如何鄙作録上請教不吝刪改幸甚與曹定菴憲副别後屢辱記存兼手教佳篇抵京多病多事踰時闕奉狀起居瞻企祝願之私無間朝夕即辰夀履康和動定多福聞有冢孫之戚逺惟悲感無緣奉慰想定力能遣之也儲懋中近選入翰林鄉邦有人為慰為快月筵之作去秋入都遲不及見涯翁故爾蹉跎已留為今嵗次第矣少當充夀筵之敬深比承校文本房頗得一二佳者舒生芬其一也此恐長者所欲聞輒以為報會録一册附將逺誠餘惟宣節加餐以膺洪祉與沈西津方伯三首緬惟執事擢科第時僕方束髮操筆為科舉文字然與執事有通家之好聨姻之雅不可謂不相知也而亦不可以謂盡相知也當時執事之知僕謂可以至今日而已矣僕之知執事者若芝草若鳯凰若麒麟若隋珠和璧望其外而念其為天下之竒寶也中間執事登朝為天子近臣僕束縛校官聲與聞不相及者久之壬戌之嵗竊與計偕來會於都門及下第南還匆匆兩月而别去去冬北上會執事於常州道中蒙出髙作見示讀之終帙知執事之志於道進於文凡向之臆度料想者始窺見其槩矣雖然亦未敢自信也今年僕沗登第會執事以使事還京握手劇談於是芝草之祥瑞鳳凰之靈淑麒麟之仁厚隋珠之照夜而和璧之截肪者乃盡得之竒矣哉僕之知執事也僕遨遊兩都凡大人君子之側未嘗不奉贄往交之而當世之號為大人君子者亦不以僕為不肖而進之故閲人頗不少矣然能知文章如執事盡言不諱如執事樂道人之善休休有容如執事求之大人君子之列固已難矣夫文章不患其不知患其知之而不肯盡言也盡言矣而患其以驕與忌乘之執事知而能言能言而能容僕又曷敢自失於執事也哉謹以所著雜文數首詩三卷伏惟一覽僕之能果盡於是乎否也謂盡於是不盡於是是在執事而已矣僕何與焉皇悚不宣春間奉手教兼佳貺伏審榮還展省忠孝兩極黃金垂帶滿銙生花鄉人不見此亦已久矣雖大拜崇階鼎來伊始而閭里之光可謂一時之盛也無緣得充賀賔兼敘契闊之私為慊耳計維揚夜别春秋屢易而深之心志灰折已成老醜非面莫盡委曲如何如何向來一出違老棄幼尤非本情第望執事入都得以左右提攜耳召命匪逺當令舍人束裝以俟也侍行尊眷輩一路想均納福麒麟消息竟復如何日夜以此為執事祝望耳便中幸示好音以慰區區沈東之來贊幕下輒此奉問獨居多病餘不盡所欲言亮亮月餘不奉候昨獲瞻對風神清腴方與世安表弟慶慰間再辱手書似有不滿僕者讀未終篇不勝皇悚恐執事偶未之察爾今世好盡言直道喜規人過者無過執事豈忍不為執事盡之昨柬所云平心者因來劄云自少至老於人了無妬忌故特奉頌盛德非敢奉勸忘情也今為執事盡之夫人心無形雖有形而難見故心不可以平不平言先儒嘗有平心之説蓋借衡平以為此心喻耳衡今之稱梗鈞石銖兩各以星分推移以權重輕畢應初不容有一毫人為之助今世稱等金銀之器至今俗諺謂之天平云衡之為物也投以鈞石則應之以鈞石投以銖兩則應之以銖兩夫是之謂平若本輕也而欲使之重則衡低本重也而欲使之輕則衡昻是之謂不平其於人也心具乎性性發乎情情之所向輕重生焉輕事而應之以輕重事而應之以重是之謂平若輕其所重而重其所輕是之謂不平此平心之本旨也執事似以寬縱為平心豈誤耶精察而熟思之義理自見矣來諭所引律文多未合何也準者但準其罪不在除名之例此是例分八字之義元不屬名例律內名例律自有稱與同罪一條是蓋據成案以再解以準之義稱如呈稱供稱之類若稱準盜則免刺若稱以盜與真犯用此為合律若稱準而刺字稱以而免刺者合坐官司出入人罪依律議擬似難便科律令重刑至於風聞言事未蒙施行者豈容深文必當有以服人之心方是法家若夫排陷裝誣别自有律執事嘗以漢廷老吏自居豈獨疏於此耶僕本書生不諳吏文試扣所疑如此願受教焉若謂深助泛交而薄至親出姦人之下䇿則僕亦未敢以執事為知已也病餘荒絮惟不拒幸甚惟不罪幸甚與朱子文五首清僧至得書惠異鄉久處忽覩親手筆豈勝欣慰辱鄉評每以足下與僕為敵僕浪得名耳實當退避三舍近作不吝逺寄至時一把玩儻有求士於僕者庶得徴實耳如何如何别久瞻戀之情非一端近兩得書惠極感親誼恍如接顔範也奉化故是劇縣子文初政已為卓越所甚慰者兩耳冰蘗之聲今日仕路多蹇中外皆然雖故鄉亦未能髙枕而卧也如何如何深自北來旋承攝篆數年隨行逐隊空言漫語知從政之難自今日始也小兒女輩三月末到京叨逺庇粗安餘無足録者尊甫聞已過南雍亦屢得教札仁甫薄有詿誤士絅政聲甚佳芋西動靜想周悉所喻當如命恐不足為重耳餘惟保練為祝嵗莫懸望久而疑其遲遲既得手教知所遭非常雖出無妄令人驟聞之為之驚歎纍日出至險而履坦途豈倚伏之理天將大任隨之耶即辰春和起居多福此中事體當無他變水村公處屢曽及此兹去吏有公文宜即赴貴任俟朝覲奏轉日部中必有處也幸毋他慮他日得與考功備道之也僕處此粗遣兒輩叨庇俱就學堂時事盛價想能一一南行急草草秉燭附此殊不盡所欲言自六月初旬抵家屢承尊翁令弟垂情皆極感慰上冢置後事匆匆一月攜家南來泛錢塘登草坪度分水嶺入閩遊武夷諸峯徘徊歸宗巖皆滿向來山水之願宿痾老態頗恨此行太晚也昨於草一日到任卧寄畫圖中瞻望甚邇頃當以公事遂參承有待有待敬令小僕奉內尊札附上近詩一紙發笑秋氣漸深緬惟眠食珍重為祝頃見錢方伯云王都憲伯圻來巡視浙中却帶金山地方想是三省入轄只恐故鄉海警吾邑未能髙枕也如何如何北來消息紛紛時事又一變唐虞之治企伺企伺僕處此粗遣家人輩不免啾唧無明醫可訪奈何楊伯止五溪先生客也欲往訪謝僉憲幸津遣之草草餘惟順時節宣以需寵擢崇安曉發殘燈未燼承專使教惠種種可謂攟載而來矣感愧感愧一行人賴尊庇均安鵝湖逢勑使廣濟得部檄自此去北風塵邈然未知所稅駕也此來已絶生還之望尚荷聖衷具悉隱微士大夫公論猶在或可持此歸見江東父老耳餘非面莫盡也居延九旬賴僚友知愛與士民瞻戀若不忍舍者不知何以得此兩司諸公故舊居多間有未相識者莫不握手如故人以此感激煩會間一一致謝舍人王旻賫憑來愧窮途無以副其望貴治下借一言慰之冬深珍重為祝儼山集卷九十二
