body:
  text: 儼山集卷二十七明陸深撰奏疏擬論取回都督僉事許泰軍中家人狀臣近見取回許泰家人某等十幾人某等皆勇悍武夫止堪殺賊之用泰託為父子同以生死已非一日矣今朝廷方用泰泰方用此輩不識陛下何為而取之厮飬下材過蒙特召祖宗以來並無事例况此輩姓名遠在行伍不識陛下又何由而知之訪得近日盜賊肆行無忌所畏者獨許泰一軍耳泰所以能使賊畏者不過敢死當先而已此輩正許泰敢死當先腹心之士若其攻堅陷陳皆能以一當十其於許泰若左右手不可一時離明矣臣料陛下不過聞其便捷騎射欲取而試之耳而道路流言洶洶可懼或謂有人欲忌許泰之成功或謂姦人隂主此䇿以剪許泰之爪牙而欲以泰委賊者此其無稽萬不出此儻相傳播未必不生賊間諜之計也况泰亦武人未知義命一旦奪其所恃蹤迹孤危加以流言必懷疑豫志日分而氣日索矣欲望其如前日之敢死當先勢必不能此其關係實非小小臣愚以為陛下於某人等到京之日姑試其能即為犒賞或薄加名目或靣賜奬言即還之於泰以終其所事則天下皆謂陛下神聖不惟深知許泰之功而併與許泰之爪牙心腹皆悉知之庶幾邉將知所激勸而賊滅有日矣臣不勝私憂過計冒昧以聞擬處置鹽法事宜狀臣近日伏見兩淮長蘆之間商賈嗷嗷怨聲載道問之皆云勢要奪其利故也臣謹按鹽課一事本因海澤自然之利以充邊方緩急之儲於國計甚便然使朝廷壅實惠而不下商賈畏空名而不來則蠧亦甚矣祖宗時設立各處轉運提舉等司僉竈以辦稅置倉以收鹽建官以蒞政設法以開中其要在於通商而已大抵商益通則利益厚此立法之本意也且窮邊絶塞輸轉極難之地而能使商賈挾貨負重以往隨令而足比至户部給引𣲖場涉厯萬里動踰歲年又况守支存積徒冒虛名仍復買補魚貫聽掣其辛苦如此勢要之人妄干恩典動以百萬往參其間馮陵假借支則盡支掣則便掣所經官司曲為奉承雖憲臣亦將有投鼠忌器之嫌彼將何憚而不為乎小人營利之心寧有厭足大率彼通一分則此塞一分自然之數也夫能得商賈力以利驅之耳彼既以有利而來亦必以無利而去又自然之勢也矧以彼之辛苦對此之徼幸交易之間又相懸絶坐使自然之利上不歸於朝廷中不在於商賈下不藏於民間雖天地亦將厭棄之臣實懼焉仰惟皇上軫念立法之本意靳惜恩澤不妄施與然後其他條畫次第可舉行矣臣又按今天下榷鹽之地兩淮為上兩浙次之而弊端亦於二處為多然尤大壞鹽法之端有二焉其一則竈丁苦於兼并其一則今日勢要之侵利是也然於兩浙又微不同大抵壞兩淮之鹽法者多勢要壞兩浙之鹽法者多私販而竈丁之苦則一而已矣蓋淮浙之鹽出於人力非若河東天造地設不勞之利也其法在於曬土為鹵煮鹵成鹽以鹽納官然而逋負多而國課損者何也夫欲曬土必有攤場欲煮鹵必有草蕩今之場蕩悉為總催者所并而鹽課又為總催所欺竈丁不過總催家一傭工而已煎煮之法名存實亡而總催者下欺竈力上負國課百計遷延以覬一赦而已伊欲處之在於盡復竈丁之場蕩而盡懲總催之姦欺則其弊可息矣浙中私販之徒以拒捕為常以殺人為戲驟不可剪則比之勢要差為易處茍使出鹽之地捕其買者之市家行鹽之地捕其賣者之市行而悉置於法則其黨可空矣非若勢要之家蛇蟠卵翼不可一旦去也今日得侵兩淮長蘆之鹽利者雖曰朝廷業已許之然終非法意臣以為與其壞天下之大法寧傷數人之私恩必使小人之姦無所容而後已夫上之支中盡歸於商賈下之場蕩盡歸於竈丁則商通課足而鹽法不行者未之有也謀利之事君子所羞臣恐利未興而害作故得備而論之謹狀伏候進止稽古禮以崇祀典事臣聞禮可以義起事待人而行竊照本監文廟春秋二祭纍朝列聖制遣元臣主行羣僚陪列逮我皇上紹統克懋前修益𢎞敬理可謂情文兼備無所間然者矣顧秋丁一祭正當伏暑之餘况今歲十月置閠炎蒸猶存誠恐浹辰之間陳設犧牲不無變動殊非馨香潔清之義臣心思之至久至熟義有未安謹按周禮祭祀共冰鑑説者謂以禦溫氣記又有之曰伐冰之家傳者謂卿大夫以上祭祀用冰夫秋暑何止於溫氣文廟難同於世家况於天子之所饗者乎臣又按凌人冰政經見禮詩實聖人燮理之方而祭祀之用為急知神明感通之妙而備物之意當求見今京師藏冰至多尤宜致用茲云義起蓋有待行伏惟皇上天縱聖明動求古義是誠千載一時也伏乞淵衷少賜裁度急修冰鑑之儀以為復古之兆仍下所司永為遵守庶幾神明饗而和氣應矣乞恩認罪以全大體事臣於嘉靖八年三月初二日經筵輪該臣講孟子書隔夜借宿於工部厰中溫習諷誦間心有未安誠恐於感格之道未切故於講畢叩頭之後謬為靣奏當蒙慰旨正在臚唱平身未畢之際委的有紊禮儀是臣知而故犯也合當萬死臣念經筵奏事百年所無之典也陛下臨御千古所無之聖也臣戅愚起自山野感荷千古所無之聖而欲舉此百年所無之典心迹牽礙遂至犯禮伏望聖明矜宥臣不勝隕越待罪之至陳愚見以禆聖學事臣遭際聖明備員講讀昨因講章未安特於文華面奏臣之為此者恃有陛下堯舜之主耳果蒙溫旨非臣捐軀所能報也彼時威嚴之下未盡愚衷先行犯禮故退而待罪方將具論所以不意又蒙慰旨是陛下既宥之辜而復誘之使盡言是誠千載一時也臣請盡言之伏惟聖明采擇焉臣謹按經筵一事關係匪輕輔養君德尤為首務因以䇿勵臣節者亦不少也何則君父在前威顔咫尺為之臣子者儼然拜起布義陳詞説孝説忠説仁説義説亷説恥説禮説讓若使反之於身而一無所有鮮不至於愧汗而聽者誰則信之故必勉加修踐之功而後可收感孚之效是以講章必出講官之手者其意蓋在於此非徒以便誦説為也然須有溫潤之氣以具告君之體此非輔臣鮮克舉之所以必送內閣改定者誠欲略去粗疏鄙野之狀以養夫親近儒臣之心其意又在於此非徒以美文辭為也臣竊思之熟矣臣豈敢不顧舊規直行已志若以此勸講是未誠也何益聖學當時面奏講章義理多未浹洽所包甚廣意不止於文辭已也伏讀聖諭益增戰兢是臣之愚倉卒未能上達爾且今內閣無所不統舊規俱帶知經筵事又皆老於文學之臣講説更改宜有精義者此特小節耳第使講章盡出內閣之意而講官不過口宣之此於義理深有未安而交孚相感之道遠矣此臣之所為諍也伏望俯察愚誠特諭內閣只將講章一節優容臣等各陳所見而內閣因得以考觀臣等之淺深至於義理往復藻潤迭加何所不可豈止於閲看而已臣愚意欲請自訓詁衍繹之外於凡天下大政事大利弊皆得依經比義條列類陳庶幾九卿百司有行之而不能盡給事中御史有知之而不敢言司府州縣有負之而不能達者皆得以次上聞則主勢日尊聖學日邃而臣等亦得附之以進修矣區區一得之愚如此此臣之心也臣少而戅愚晚年悔過荷蒙陛下特達之知每欲因事納忠以佐維新之化特患無路耳若復不知服善希變舊章則死有餘辜矣更何面目復望清光乎伏惟聖明垂察則臣之效忠者方自此始耳貪酷官員枉法人命重傷憲體等事嘉靖九年九月十五日據山西太原府陽曲縣儒學附學生員劉鏜家人劉鉞抱告本年七月內蒙本縣將劉鏜叔父劉文宗僉作社副比時文宗因買賣不在被積害老人王良却將鏜父劉文寬朦朧呈縣不料知縣某當將鏜父用大板痛打三十監禁至九月初五日釋放擡回重傷至本月初九日身死等因隨據陽曲縣知縣某申稱本縣建立社倉僉報正副據原委老人王良呈稱西關都社首楊奉社正副劉文宗各抗拒不服拘喚隨拘楊奉劉文宗到縣問擬不應杖罪不知因何病故劉鏜倚恃生員節赴各衙門妄稟等情各詞到臣俱經案候外臣先於本月初九日晚與按察使潘鑑一同回司忽見門外跪一生員呌聲有父被某知縣三十打死時將昏黑臣與潘鑑言或是膚受之訴諭使且去至十二日臣在提學道復見前生投狀臣已識認問曰汝父果死否答言已死三四日矣臣始惻然曰此狀該赴察院按察司告如有寃枉方與伸理本生當去訖至十四日臣同三司進入察院作揖出至門外知縣某慌忙跪告曰有一生員父親是知縣三十打死今糾合生員四五十人要行報復情願抵命衆未發言是臣職掌即令聽事吏探看隨同三司出門止見劉鏜一人衣巾裹頭在外餘無所見至司臣與潘鑑言昨日赴道告訴亦是至情憲長該與準理潘鑑是臣同年舉人委曲對臣説我昨日曾見此告但前日是察院放告日子彼既不受我不好受他臣曰此非憲體須臾吏人來報察院將劉鏜禠去衣巾送陽曲縣上庫責打二十釘上手鈕發太原府監了其人垂命矣臣愕然曰何得有此方才與潘鑑説昨日憲長若與準理辨其曲直豈有今日不曽見世上人父親被人打死察院去告不準按察司又告不準本道又不能準又遭非法刑打如此是甚道理且衣巾是祖宗制服必須結罪退黜仍與本道知會方可施行無乃侵奪職掌乎凡徒罪以上方上手刑今罪狀未白遽施此酷無乃有乖憲體乎只得一面令人分付太原府囑其且顧性命而已潘鑑向臣説不妨當進察院討出臣曰不好若討不出後無著矣至明旦月望該臣詣文廟行香畢見一老婦持狀號哭諸生環告寃苦臣亦為之墮淚慰令各散復進察院作揖窺伺淺深延至後堂三司旁坐茶話已畢出至前堂候立間並無言説有左布政使楊叔通按察使潘鑑上前北面稟説此事臣與都司馬縉東面却立以俟但見監察御史某微笑説昨日劉鏜是某知縣來稟故將刑責亦是他父子之情上手鈕頗重了我心不安既然送按察司罷共揖而出臣對三司曰父子之情刑具之過幸大巡已知之此人心之所以不死也我輩可以忘言矣至十六日復進作揖亦至後堂旁坐如故此時御史某先受譛言豫作怒色厲聲曰如何秀才們糾合四五十人扛打知縣是何體面便是知縣打死一人豈可便提知縣對理况某知縣是箇好官衆秀才們却去太府都府告狀色微在臣臣乃獨起立從容辨解曰秀才即不會聚衆三司共見若是知縣賢否自有耳目昨來父子至情刑法已過先生大人兩言甚明我輩亦甚服之只此可了不須張皇釀作大事方始笑頷曰是我聽之過矣却向潘鑑又説知縣余升問贓一百三十兩也中一場進士來可與減免些潘鑑起曰此贓該給主某又笑曰若是給主可補虛領子罷潘鑑欠伸承命而起不知向後作何處置臣本書生初叨藩臬日逐聞見如此為之驚駭且父子天下之至情也父死非命竟無控訴之地止餘一子排入陷坑察院按察司天子之耳目也全不奉法惟任一已之私敢於庇姦有同淵藪此非聖世所宜有也仰惟皇上好生之仁同符堯舜而山西之地密邇京畿豈容賣弄威福顛倒是非一至於此臣今忝法官不得不為陛下言之參照知縣某凶虐之姿貪叨之性一方士民怨入骨髓所犯實迹逐一開陳此特據臣之所知耳臣之所不能知者尚多也但其憑仗錢神巧為因糧假道之計合無照依朝覲考察事例先行罷黜特敕法司差官根究再照監察御史某不諳大體動違憲綱知善不舉見惡不拿巡按一方委的失職此特據臣之所見耳臣之所不及見者尚多也但恐别有所長似非堂下之人能辨合無候其巡按已滿回道之日特敕都察院嚴加考察庶幾國法正而治功明矣衰病不職乞恩致仕事竊照臣年五十四歲係直隸松江府上海縣人由𢎞治十八年進士欽授翰林院編修歷升國子監祭酒充經筵講官嘉靖八年三月內於文華殿面奏繼又不合言事周章奉旨降調福建延平府同知領憑赴任訖本年九月內蒙升今職依期於今年四月十一日前到山西管理學政不闕外念臣賦性迂愚叨塵任使頃以庶僚敢搖內閣茲膺方面復忤監臨本欲自結明主之知而不知先已陷身於衆怒群猜之地外難展布內蓄憂疑有臣如此陛下將焉用之况臣係南人不服山西水土舊患痰火麻痺等證不時舉發虛炎上攻兩目昏眊隂濁下泄便溺頻繁其於校閲關防殊覺廢力見今奉行沙汰來歲又屬開科度非臣之精力所能辦也伏乞查照見行事例將臣罷黜以為罷軟不職之戒如蒙聖慈尚存記憶特敕該部容臣致仕以為儒臣進退之榮是陛下始終保全之恩當圖死生銜結之報臣無任望闕待命惓惓儼山集卷二十七
