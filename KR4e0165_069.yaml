body:
  text: 儼山集卷六十九明陸深撰墓志銘八敕封太安人趙氏墓志銘唐母趙太安人考終於上海之里第時嘉靖丁酉十一月草有三日上距正統丁卯閏七月草有三日享年九十有一江西提學副使錦之母也太安人以副使君貴受敕蓋刑部郎中時推恩云副使君太安人季子也諸子惟副使君侍斂含棺衾咸躬親惟謹人以為副使君實亢唐宗而太安人成副使君之賢實有功於唐卒食其報天道何如也深之女弟歸副使君逮事太安人習聞太安人之風久中書舍人􅢫與共事館閣每泣向深曰太母之歿非舅孰宜銘且父命也今葬有期乃奉副使君所自為狀以請至勤深不容辭按狀安人之父曰趙怡閒翁母潘氏皆儒家世居上海之南浦怡閒翁開門授徒以師道尊一鄉無子晚舉安人與潘孺人鍾愛之安人自幼陶染詩禮動合經訓不但工女紅已也既笄歸封刑部郎中質菴府君以慈惠溫淑稱府君前室有子曰鋭曰銑側室子曰鎰及二女安人子之逾於已子皆成美才子若女亦德之如所生質菴府君事封衢州知府容軒府君甚孝安人每先意承之奉養備至容軒翁春秋髙遘疾危甚醫禱弗效質菴偕安人不離在右疾既革乃跪泣榻前翁舉手撫之曰汝夫婦孝誠篤至願生子孫如是如是時安人適娠復向安人語之曰吾此去當懇諸冥官乞一賢子畀汝逾月而副使果生質菴好客賓朋常滿座講經考史鳴琴賦詩日以為樂鮮入內室故內政悉安人主之媵妾童僕上下罔不得其歡心平生不好積聚恆曰積財乃積惡耳故自日用外輒以施人貧乏來告者必委曲賙貸之雖給者負者相繼咸弗較曰彼不得已固當聞有建橋梁甃道路者輒傾囊助之弗靳蓋其性然也𢎞治乙卯副使舉鄉試明年登進士第安人自家以五經漢唐諸書寄京邸囑之曰汝少年登科聞見未廣公餘宜從事於此為報效之地母徒從朋儕日遊燕為也出知東明復以脯醢葅鮓遺之曰以此佐汝滋味汝第飲官中水可也既為給事中安人色喜曰此官必廉能得之已而為逆閹仇陷去判深州或來慰之則又曰士大夫當保名節官資去來寄寓等爾正德壬申質菴棄世副使以刑部員外郎守制還既禫除欲乞侍養安人微知之遂命長子錞赴銓錞時盛文名乃授浙江布政司都事援例歸養安人曰汝兄歸汝宜行以報國也始還朝遂轉郎中丙子奉敕審録湖廣竣事多平反寃獄安人復喜曰刑官當如是尋遷江西按察司副使提督學校俄為逆籓詿誤罷歸安人曰是非命耶時安人年七十餘矣日惟焚香瀹茗集諸孫婦女講說閨房儀範或談善惡報應之事以自娛至於服飾華麗不好也居常布素至浣濯不忍棄間見侈麗輒戒之曰人當積福茍暴殄天物有神罰矣字紙偶墮地者亟俯拾水火之曰此聖人所製寧可汚賤耶其謹厚仁敬多類此年過八十猶聰明不衰惟齒則盡脫豫女弟躬視諸饌咸手成淖糜每為陸氏婦加一飱又數年得痺疾嵗輒發發輒殆副使君延致名醫時以善藥扶養元氣少愈嗣後每月發治如前久之乃月三四發即治不復效矣遂不復起而始終可無憾也惟安人育德於豐亨之世言歸於閥閲之家安享富盛逾九望百而子孫滿前金紫在側嵗時稱觴為夀則手撫曾𤣥常百十人翟冠霞帔高堂中坐望之如神人而懿德仁風內外人飲之不能盡大江以南賢母未之或先也其子女盈十半出安人長鋭工部司務取山氏次銑娶杜氏次鎰娶陸氏錞即都事娶余氏俱先卒錦娶陸氏封恭人千户李棨士族周遲顧源清盛珊陳熊其壻也孫男十六人長斆次徽次徹次文太學生次微亦俱先卒次考太學生次即􅢫中書舍人內閣誥敕房辦事次稷鄉貢進士次致次敔亦卒次敏又次交燮斕贇衮皆太學生孫女十四曾孫男二十五人𤣥孫十人深與憲副有兄弟之誼視母猶母也顧旅食京華徒以空文為役嗚呼尚忍言哉葬之日卜以己亥嵗之仲冬三日啓刑部府君之壙而封焉銘曰厥家之興緣起以婦惟子之賢實視其母孰克兼之世則鮮有嗟嗟安人取之左右人亦有言惟德不朽關雎閟宫風猷乃久嗟嗟安人式啓唐胄既惠既慈亦創亦守鸞封自天翬翟在首百嵗何遲同穴惟友慶澤之餘以豐厥後太史銘之泉深土厚黃良式妻陳氏權厝志銘太學生黃標之妻陳氏賢而客死死又無年三男二女纍纍然逆旅也標將扶櫬歸攢而問銘於豫標豫姊子也自幼從豫問學人稱曰陸家宅相豫愛之往嵗戊子豫赴內召㩦家入都時標亦以家從梅淑人甚愛憐陳氏婦數稱其賢嘗謂豫黃氏甥落落有竒氣輒不便委曲而陳氏婦低昻應之為能成吾黃氏姑之志也豫在成均淑人多病陳氏婦數來視如所生然既豫南遷黃甥陳婦復跋涉從之去國丁酉嵗豫召自蜀籓明年標自故鄉來卒業太學陳氏婦再從之行又明年乃以疾卒於崇文門東之寓舍年三十有九實嘉靖己亥十有八年四月晦日也豫方自扈從還揮涕哭之曰天乎天乎何奪吾甥之賢婦之遽也標為書三千餘言以狀其遺行豫屢讀之不能終一篇乃撮其大者以叙之叙曰陳婦諱香父金邑庠生母沈氏嘉定東鄉之采桃港北人也黃陳皆蘇故大家相距百餘里竹泉先生為標擇配凡閲數十家閲陳女賢好以龜卜于家祠龜不焞而兆兆又吉遂納幣焉會標出繼大宗事所後母俞孺人竹泉則相之成婚及期父母醮之曰兩姑之間難為婦兒勉之逮事俞孺人極其誠敬時俞孺人寡居齊蔬灰心歸依釋教常悶悶既而憮然曰早知有新婦若是安用自苦為壬午嵗竹泉先生暨吾姊孺人卲大母孺人俞孺人相繼四喪家蠱紛紛起陳婦贊標內外事帖然時病痘而産理家務無少懈逮己丑歸自京師每慰標曰此行甚勞畏而君之志識殊進矣標首肯再四壬辰六月以母沈孺人搆病急拏小舟江行中暑幾危坐是遂病會重入都而醫藥不能效矣既屬纊猶以好言慰標曰兒女事有君在當再世為夫婦矣標發其行篋才有故衣三襲遂用以斂而標哭之極其哀云標又哭向豫曰吾婦貞淑勤儉出自天性其初入豫室也妯娌姑姊妹或相陵侮受之若騃既就枕簀間簌簌有淚聲疑而問之輒對曰偶然念吾父母耳標少躁急當事有動聲色者略不校徐俟氣平曰君怒解耶若此數數標每愧而改焉標事夜坐臨文讀書或處分人事每至宵分必以女工佐之未嘗先寢有時親友紛集或客從逺來琴奕觴詠連留浹旬日從中治具甚辦親疏等數秩如至撫兒女必加嚴標少假借之乃曰惜兒害兒也一錢尺帛必留俟標用嘗曰婦人私蓄即皆夫財耳出入之際人亦能挾之吾斷不為也會嵗歉適場禾被毁家繁食指不給乃日織布一匹晨令市米又不給至稱貸又不給或盡脫簮珥標念之後豐稔償以數十金又不願為粉飾費曰是可買田宅遺諸兒也嗣後服用皆淡素有一青布幃施卧榻不易者十九年其賢多此類豫益不忍聞遽視標曰止止長子光次炎次熒女二人乃為之銘銘曰孰啓之賢而弗永其年孰傳若賢汝夫則然子以母賢而嗣息綿綿身後身前定者彼天聊用掘泉盍虛左以遲兮歸全廣濟教諭周先生配朱孺人墓志銘孺人姓朱氏諱某湖廣廣濟教諭南池周先生之配太醫院冠帶醫士同之母長洲耆儒東山先生之長女也東山翁以師道重吳中故孺人通孝經小學大義攻女紅復攻筆札能楷書翁鍾愛之自諸生中識南池曰是可妻也既歸南池南池為郡弟子員每試必在首選文章名籍籍起時世家大族爭禮致為孰師嵗留客館時訥菴府君盧孺人具慶在堂每去輒囑之曰吾父吾母得卿侍頗勝吾養也辛酉秋鄉試下第歸盧孺人遘疾南池亦因以疾孺人竭力醫禱會盧孺人卒喪葬事殷家遂中落然事訥菴公甘脆未嘗不具優游以至七十有六乃終人以為難云南池凡八舉於鄉至己丑始以貢選於廷授開化縣學訓導孺人從之九載叙升廣濟教諭在廣濟遂以疾挾幼子囿東歸至小姑山卒實嘉靖戊戌之十一月十七日也距其所生成化丁酉之五月十五日年六十有二云子男三長即同娶盛氏繼徐氏以精通醫術選視慈慶宫官匠次册吳學生娶陳氏次即囿贅胡氏女二吕恩葛藟其壻也孫男四爻乂學覺孫女二卜以嘉靖己亥十月初六日葬于胡搭村祖塋之次豫比還朝善病數飲同藥德之同固文雅往來久始知其學有所自而孺人之賢可書者又每若此遂按給事顧君狀而銘之銘曰其生也五湖之隂其沒也九江之潯天一育靈與大化兮浮沈賢婦慈母尚有光于古今碧溪先生孫公墓志銘公諱鵷字朝序號碧溪姓孫氏孫之上世蓋在前宋靖紹之間來遷上海黃浦之南因姓其地至今曰孫家灣云髙祖諱昌髙祖妣王氏曾祖諱善曾祖妣唐氏祖諱怡字某别號節軒賓州學正祖妣張氏考諱寅别號愛溪義授散官妣張氏生二子長鶚字朝立號黃溪仕為刑部司務卒於官次即公也初愛溪府君之才兩子而愛之也以宦業付黃溪以家業付碧溪故各有立而上海之孫氏益以大黃溪領鄉薦公每周旋兩都間㑹愛溪府君病風公侍疾特敬謹疾尋愈既卒哀禮兼至迎張孺人于新居孝養具備孺人卒公哭之哀曰昔我迎母圖報也茍私所遺為利也悉以供窆葬之費黃溪之柩至自北都公號涕奔迎尤竭心力嘉靖壬午子繼祿領鄉薦捷至公喜且泣曰吾自辛亥之嵗受誣鄉惡幾不能家明年妻亡旋已無室吾兒才八齡耳與兄妹零丁㩦負人所不堪姑忍死植立課之讀書僅僅足自慰辛巳之嵗長子繼爵又折吾門書香無復望矣兒幸成名豈天之報我耶乃撿括租利一切蠲之每事愈從寬簡鄉人以為惠既乃築室當市區規制楚楚有祠有堂有樓有寢悉比於禮義徐內翰少湖有文記之别築涵虛亭于宅西吟嘯觴詠時閲古書其中儼然身在圖畫居嘗誨繼祿等曰族人體異而派同者也臧獲分殊而理一者也天若玉汝于成當立義户以覆宗黨使無賴者均有所庇築義塜以掩胔骼使無後者得有所歸此吾志也汝等識之繼祿奉斯言以請銘于深深聞而歎曰此盛德事嗚呼如公之志安得盡白於天下也深少與黃溪先生同學為進士業或時宿食其家公必從旁具殽羞撰筆硯咸精潔有條緒每戲作長者語慰之曰此今日之佳子弟乃異日之賢父兄也顧黃溪相與一笑公亦鼓掌若和答然宛宛如昨日事而遽銘公之墓耶黃溪之葬深實銘之數載間人事果何如也公年僅五十有五以丙申八月九日生以庚寅八月十日卒兹卜以癸巳某月某日葬于薔薇涇祖塋之穆以合于張孺人之藏張出舊族孺人有賢行繼配許氏能相子男五長繼爵縣學生配朱氏俱蚤世次即繼祿有文行名將起甲科娶胡氏張出次繼孝聘喬氏次繼儉聘陳氏又次繼英許出孫女二惟公孝弟天厚綜理才周善能以不足纍致有餘故其起弊興衰之業視人人特易至於安恬好禮不嗜勢利與人交克已而信議論無阿有不合理者輒面折之尤人人所難云嗚呼如公之才安得盡用於天下也宜銘銘曰既起其家亦成其子前千百年曰此嗣美後千百年自此而始吁嗟碧溪不朽在此唐母梅孺人墓志銘豫友思巖唐君世明既卒之十有八年其配梅孺人卒孺人豫室淑人之女兄也吾海邑唐以顯達梅以故舊兩家並著姓而先世又同鄰閈烏溪之上督府都事桂巖公為仲子擇配以告于都憲簡菴公公喜曰此殆天合也孺人既歸思巖君君讀書好義有直聲學進士業成纍舉京闈不第實孺人以勤儉孝敬佐之一族稱賢然不能有娠屢為思巖置妾媵以好言溫色御之竟亦不育遂無子以承宗為之子孺人中嵗病乳癰久之甚苦承宗畢力醫治之少愈復作作復愈戊戌嵗疾作如初承宗忽夢具禮服走京師向豫拜乞文字傴僂望見豫館几上樹金書牌額作闕字醒而怪之曰此何祥也疑之而孺人竟以八月七日終于病癰及承宗緘書問銘適豫上疏乞歸田蒙上勉留詣闕謝唐生絳從旁道其詳如此絳承宗之母弟也豫始發書歎曰此豈有默定者耶孺人諱某考悅清先生諱元妣張氏孺人少負淑質事父母昆弟克盡其道歸于唐逮事都憲公公清白歷四朝無厚遺都事公宦遊南都尤為淡泊孺人安之惟蚤莫勤勞以取給奉姑余孺人于家更為委曲余孺人素羸疾湯藥飲食不敢輒委諸人人會都事公訃自南都還孺人相思巖力營祭葬居常治家咸井井如禮賓客姻親無少失門户日以豐潤既孀居恆處一室以節自苦疾既革亟呼承宗語之曰兒固唐氏一脉吾育之胎孩中黽勉作人毋墜祖業吾無子而有子矣此汝父之心也言訖而逝上距所生成化癸巳之正月十日享年六十有六云一子即承宗為邑庠生文翰方有聲娶倪氏孫男三杜槐桂孫女三長適陸文禧餘未行兹卜以某年某月某日啓思巖之葬而合焉為之銘銘曰夀不以年嗣不以身傳同歸及泉而世乃並賢藏焉息焉於萬斯年儼山集卷六十九
