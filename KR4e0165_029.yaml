body:
  text: 儼山集卷二十九明陸深撰青詞一首應制擬撰追薦皇妣獻皇后青詞伏以慈陵厭代載逢諱日之臨寒序凝冬彌切履霜之感念劬勞之莫報顧愴惻以何伸世隔仙凡目極蓬山之路寢留風木淚添楚水之波嘗聞仙籙一壇可資冥福天門九陛徑達帝聰以今肅啓皇壇恭陳醮事伏願上帝垂仁羣真敷鑒詞通悃愊開函於玉扆之前恩布祥光弭節於金庭之內蕊珠夜誦侍飈御以同遊青雀西飛導慈輿而遠至慶流𦙍祚介麟趾千億之祥福被家邦鞏金湯萬年之固無任瞻天仰聖激切祈請之至讚頌五首應制擬撰追薦皇妣獻皇后讚頌五首伏以慈闈誕育萬年開帝世之勳仙馭遐征永日灑天家之淚驚歲華之易邁期届大祥念母德之難酬恩垂罔極庸假熏修之典用資升薦之因欽惟皇妣慈孝獻皇后懿靈嗣任姒之徽隂教夙成於宮壼翊昌閎之運聖功覃被於寰區受祉介祺正享彤闈之養乘雲厭代竟為蓬島之遊叩天地呼神明嗟何及矣在羮墻入夢寐如或見之以今迓聖𤣥都敷筵紫禁供十華之道果有飶其芬酌九醞之霞觴維醹且旨伏願洋洋肸蠁穆穆居歆紫鳯臨軒羅梵氣於散花林表蒼虬翼駕現真容於五燭光中仙吹停音雲篇奏偈偈曰太皇雲駕去升天霜霰𤣥冬已二年賴有聖真垂接引慈儀來駐法筵前祥節逢初臘𢎞開欵聖筵慈馭引羣仙香霧裏感華年伏以圓景駿奔仰星回于碧漢浮光焱激躔日㑹于𤣥枵憐歲序之將周矧祥辰之甫及終身永慕明發有懷感與時來莫報三年之抱禮因義起聊伸一日之誠擬罄丹衷敬資黃籙欽惟皇妣獻皇后懿靈孝慈成性恭儉宜家荷眷命於三靈祥開華渚正儀刑於四國化始汝墳懿範徽音允矣女中堯舜鴻名美號至哉天下尊榮豈期遽棄人間自是仙游物外悵音容之莫覩路隔西池賴精意之能通筵開北極伏願徐引靈班暫違溫席鳯輦逶迤霞裾容與出洞府以來臨雙成後擁玉女前驅望瑶壇而戾止酌水獻花延羽衛於極樂世界考鐘擊鼓接歡娛於清淨人天恭上明香併陳法部偈曰髣佛慈輿度碧空瑞烟初裊上陽宮身居貝闕龍天上心在兒孫社稷中慈皇徂二載霜露切悲傷寶座薦瓊觴來肸蠁格洋洋伏以寒威奄至益增風木之悲日月其除長廢蓼莪之咏禮服以中月而禫仰報無階道範歷萬劫為宗皈依有在爰伸孝感仰借真詮欽惟皇妣獻皇后懿靈端一誠莊德配坤貞之厚安和恭儉道扶乾健之亨發螽斯麟趾之祥昭卷耳葛覃之化介之繁祉方永承千歲之歡乘彼白雲豈料棄萬邦之養以今恭修𤣥典罄瀝丹衷飛雲章奏玉檢請命帝庭薦時食陳裳衣奉安靈瑣伏願霞光燭地恍瞻華翟之儀月曜臨軒快覩鳴鑾之駕鑒茲孝享回朗照以降洪恩賚我思成樂逍遙而登霄漢偈曰颯颯風烟傍禁城遲遲更漏轉寒更龍帷玉几三年淚碧海青天萬古情碧落歌空洞鯨音動泬寥待曙想鸞鑣思昔日寢門朝伏以駟隙馳光塵世俄驚乎一瞥桂輪隱曜玉容莫覩於二周禮制有終曷罄子心之報孝思無已難忘母德之隆欽惟皇妣獻皇后懿靈積德興邦啓萬年之景祚施仁翊化揚四海之徽音休徴應堯母之門淑惠協舜妃之譽今則仙遊閬苑侍玉案以周旋駕返遙天騰綵雲而陟降霜寒寶樹慈烏徹終夜之悲月滿遼城化鶴引千年之恨渺龍胡而不見眷象服以猶存攀號莫罄於宸衷升薦特資夫道力伏願霞冠雲履暫離蕭鬱之宮紫蓋緋輪少駐凝華之闕脯八麟而臘九鳯籩豆靜嘉酌桂醑而奠椒漿韶鈞合奏右享惟傾乎致敬來歆庶慰於遐思載振琳琅式宣寶詠偈曰螭驂鶴駕降靈關瑶樹琪花得暫攀禮罷上真哀更切分明玉几見慈顔鳯吹和雲裊天香合殿飄瓊館斷塵囂停法駕謾逍遙伏以遡白雲於天際莫返真遊灑甘露於筵中式陳殷薦禮虛皇而披寶籙潔珍饌而啓雲厨對揚罔懈于誠將享必由其敬欽惟皇妣獻皇后懿靈言容莊敬性道希夷貽寶訓於宮中紘綖是則正母儀于天下禕翟攸尊方娛至樂於含飴俄結深悲於陟屺今者黑帝歸寒蒼冥司令日晼晚而忽落夜綿邈以何晨撫景嬰懷歎坤儀之益遠感時濺淚嗟慈矩之長違以今恭按𤣥科肅陳淨供伏願鑒觀伊邇陟降有靈宴玉樓瓊室之天式遊以息泛黃竹青尊之薦來格而歆讚誦宣揚宮商合奏偈曰蓬萊宫裏是天家青鳥書傳路未賖猶似當年稱壽日鳯笙龍管醉流霞飛霰嚴冬候哀親思轉重遙睇紫霞峯疑髣佛見慈容右讃頌五首俱嘉靖十九年十一月進讃饌文偈四首擬中元節追薦皇考皇妣讃饌文偈四首伏以節屇中秋灝氣應星樞之運天垂普度孝誠感霜露之期覩大火以西流萬寶將隆而圖報儼英靈之如在一心有象以思成謹運真香䖍誠上啓欽惟睿宗獻皇帝與天為體陟降恆妙乎帝旁隔世如生音容每瞻乎法座章聖獻皇后厚德承乾懿閫存萬年之鑒聖慈裕後祥光延百代之長伏願雲馭同臨鑒孝子蘋蘩之薦法音並聽享𤣥都花果之誠靈風倐俟於逍遙餘澤尚資於解脫仰瀝丹忱用宣寶偈龍髯天上不能攀鶴駕雲間未擬還玉几金爐香縹眇秋光滿目儼容顔伏以𤣥都寶蓋人天共秋氣之澄鮮祕殿瓊筵水陸備時新之芳馥聊表仁人孝子之至意肅肅遙將爰酬父天母地之深恩洋洋如在敬運真香䖍誠上啓恭惟獻皇帝至德無名仙馭已升於天上𤣥通有感神遊尚接乎人間再惟獻皇后誕育神堯過歷已占天定同符太姒端闈式著母儀伏願頃刻來臨瞻霄漢龍鸞之駕精誠上饗聞風雲環珮之聲隂功普濟於塵寰仙路超遙於物表雙靈共慰萬法齊揚碧天如水動秋光寶月初圓助晚凉金殿玉筵將孝享雲衢仙路共微茫伏以厯府授時亡月已過其半仙官校籍三元適㑹其中慨光隂之冉冉牲鼎無期荷功德之綿綿椿萱有恨謹運真香䖍誠上啓恭惟獻皇帝歷數已歸遜大美於南服天心彌眷鍾餘慶於眇躬再惟獻皇后作則坤儀聿修內教儉勤行江漢之化慈寧覃寰宇之恩伏願龍旗鳯輦少回雲表之遊玉振金聲暫聽人間之樂孝誠勉竭於涓埃精爽潜孚於天地法侶宣音和聲敬獻信有神仙白玉京芝軿羽翣彩雲輕遙瞻二聖雙旌引無限人間孝子情伏以閶闔風生又變炎凉之候盂蘭㑹啓式陳水陸之珍劔履猶存恨音容之漸遠羮墻如見奈謦咳之難聞俯竭孝誠仰祈神鑒恭惟獻皇帝聰明睿知之兼全每懷玉韞雷電風雲之際㑹惟事龍潜再惟獻皇后育聖鍾神久啓貫月繞星之瑞辭煩厭代暫遊瑶池閬苑之都伏願並駕下臨於法座鑒明德之維馨九天暫駐乎仙驅饗孝思之如見徹幽明而感格瞻雲物之徘徊敬發瓊音恭呈玉饌玉几香凝綺席張金莖露下碧空長珍羞寶饌依然具且薦天厨一味凉右讃饌文偈四首俱嘉靖十八年七月十五日儼山集卷二十九
