body:
  text: 儼山集卷三十九明陸深撰序三送馬都諫參政陜西序璞岡先生之參政陜西自刑科都給事中出也諫垣諸君子既喜其才將試於一省而又惜其人不可一日不在朝廷之上也相率屬贈言於深聶君子安若以深為知璞岡者深與璞岡同在班行過從之日不數數謂之深知或未能也璞岡往嵗令武進美政以數十布在人耳目深家去武進三百里而近謂之不知亦不可也惟今天子在位仁孝雍睦之治比隆唐虞而大小任使皆斷自淵衷暨于明作之功中外一體若鑑之照物也比者襄藩有爭襲之釁當事者咸以分辨為難久而未決上命璞岡以給事中往至則剸裁若破竹中外帖然上特器之歷轉副長凡大議擬大參駁務持大體士論翕然以為當代之名賢也顧今日仕版分中外而有親疏故親民莫如令親天子者莫如諫官夫令謂其能善於下也諫官謂其能善於上也既善於令又善於諫官則天下職任皆其優為也而豈以中外論哉璞岡自此將拾級而升矣雖然陜西古關中也今藩省惟陜西為重何則九邊要害其六在焉六邊之經費兵戎為大天下之勢不得不以陜西為重也藩司職總錢榖一涉邉事則費出尤大天下之藩司不得不以陜西為重也藩司之官參政而上惟有布政而布政特總大綱若夫畫守分行備嘗險劇參政事也况今日擘畫之在西北者乎諸藩之參政又不得不以陜西為重也天子用璞岡之意固有在矣深聞陜西邇年以來數被敵患而災荒相繼夫敵人之情難於意計使得志而去則所傷實多使失利而還則報復伊始區區一省之民日夜隄防不獲生息而旱蝗又乘之農工蕪廢奈之何其不寒且困也此藩司之責而在一方者參政獨任之將欲節民力與則邊餉何需將欲裕邊計乎則民膏日削二者璞岡宜有以處之矣國家治安日久西北之事凡幾變矣撫綏創痍洗剔蠧弊以復還祖宗之舊則今日之陜西又不得不恃璞岡以為重也璞岡素以天下為任而才識足以辦之是行也其有以副明天子之任使必矣他日入為卿輔以其善關中者善廊廟猶之善武進者善諫垣中外皆璞岡之相業也此亦諸君子願望之意遂書為贈光祿卿洪洋趙公讓廕序今上皇帝以大孝至仁統天下十有八載矣乃二月吉建位儲宫沛恩宇內凡廷臣三品以上得廕一子於時光祿寺卿洪洋趙公信臣上言臣廷瑞年四十有八尚未有子無以仰承恩詔恐孤陛下盛典臣有弟廷璋年及強仕幼習經書况臣母所鍾愛願以恩廕讓事下吏部天官卿以為賢乃覆之曰光祿卿移廕不私其子而成其弟乃推恩之至情實友于之篤愛事關風化於例有據亟上其事上特可之於是信臣入廷謝而廷璋入胄監以需用一時士大夫皆多信臣之善讓而侈聖恩之廣被也同官少卿東玉髙公輩謂深宜序其事以傳深惟父子兄弟其道一而已矣自吾身視之一氣也自祖宗視之一人也自天下視之一家也顧其分有萬殊而仁人孝子之所願欲與聖君賢相之所經綸者有遂有不遂有得有不得則存乎其遇爾今公之讓弟一請而得焉抑可謂遇矣是故於君臣有體悉之仁於父子有繼承之道於兄弟有遜讓之風蓋一舉而衆善兼之可不謂希闊之遇也乎且自古治平之極必有美讓之德風被天下以為萬世準則然恆自近臣始自古君臣之間必有孚感之意相為流通以示彝倫法程然恆自大臣始今公身為大臣而執事常左右天子意氣之孚感德化之流通其所以凝集而啓悟者獨兹讓弟一事然哉天下之所屬望於公者宜如何也公宏材碩學抱經綸之器今上龍飛首擢甲科入讀中祕書文章德譽崇重一時既居諫垣凡三遷而為都給事其在刑科屢進讜議蹇諤之風播於華夏上特倚重有超擢之命遂遷通政清理內黃再正太僕之位召為光祿益見親密由是天下之望翕然歸公名位勳烈自此而愈進矣其進愈髙其讓愈多必能濟濟相讓於朝以嫓隆唐虞之化於我皇上中興仁孝之業勸萬世而光四表者又將自一家始是可以傳矣因書為序海潮集序古今言潮者始於王充而備於盧肇豫生長海上諦觀潮汐孰主張之及聞諸鄉父老言潮起於南匯嘴始若湧突旋分兩派南派南漲入錢塘江北派北漲入楊子江南匯嘴者海之一曲也在邑東南百里而近比讀海鹽志志云海潮東北自金山而來西南至浙江名上潭自浙江回歷海寧茶灣至澉浦為下潭金山在海中屬華亭在南匯之東北又云葫蘆山澉浦鎮東南六里海上出沒潮中如葫蘆云澉浦屬海鹽在金山之西南豫嘗過其地蓋潮源云因檢古今論潮者類為集以存異同之辨庚子夏四月望道南三書序論語皆孔門弟子所記其篇次並有意義孟子之書七篇或者以為出於萬章公孫丑之徒秦漢而下士爭以著書名家而兹義鮮矣至宋儒者以講學為事諸家門人各有語録據所見聞而深淺具矣可以考論故嘗與成書俱存而互傳也子朱子作大學章句斷然以經文為曽子所述其傳文則曾子之意而門人記之也學者信之無疑深來佐延平始至問郡之故楊先生文靖公時羅先生文質公從彥李先生文靖公侗皆延産也遍訪其遺文卒業焉因次録之為一編總之曰道南三書既以附於及門者之為幸而又以局於聞見者之為懼也併求正於世之君子送左長史胡君世傑序有談者以仕宦不出國門為樂從容侍從之優裕密邇冕旒之清光信樂矣然而鄉國桑梓登堂上冢之念嵗時有不能以釋然疑此特為都人士言之也有談者以足迹不出里門為髙無奔走負荷之勞有宗族昆弟之樂信髙矣然而救時行道顯揚振大之業有不能以坐致疑特為山林枯稿者言之也夫人不能恝然於當世而又欲自便於閭里惟典鄉郡者兩遂之然非今日之制也若胡君世傑非所謂古今希闊之遇者乎世傑本廬陵之族有戎籍於桂林遂舉廣西之鄉試故今為桂林人宗族墳墓在焉自丙辰以來教安鄉轉上虞擢國子救時行道出而任負荷奔走之勞者草餘年矣中遭家難三弟連折蒸嘗丘壠之私未嘗一日不往來於桂林也乃今正德戊寅秋靖江府左長史闕吏部以世傑名薦上可之於是自國子學正列大夫之階當輔相之任下天子侍從一等而冕旒之光日周旋於殿庭咫尺之間視古之典鄉郡其榮光尊重者且數十倍而比於昔人衣錦之榮者不啻過之而又以遂夫顯揚振大之舉以遂吾睦族裕後之仁所謂樂且髙者兼而有之豈非希闊之遇哉雖然余願有告焉我朝廣建宗藩實藉以為奠安鞏固之具而天潢玉牒之英其崇德進學實於輔相焉賴之而世傑其首選也惟靖江奠在南服我聖祖親建之邦而於今日所謂故國也樂善好賢亦有東平之遺轍而禮樂修舉則河間之賢未逺也世傑宜以是為期正誼明道董仲舒之相江都也忠義慷慨則賈太傅之於梁可法也世傑宜以是自待余於世傑有寮寀之誼故既羡其私榮而繼之以公義者亦職也諸君子贈送之言具諸左方古詩對聨序禹貢三江故道惟婁與松可尋而松江入海處亦已再易今吾邑後一水名吳松江自西南來入黃浦合流赴海海口置戍亦名吳松江曰江灣曰舊江者故在惟東江無復考證書傳稱東南流者為東江今震澤東南流者自嘉興經長泖由府治而東北折則為黃浦雖其移易稍有不同而黃浦決知其為東江故道無疑余家自先曽祖竹居府君卜居於黃浦東涯已百餘年而子孫蕃衍內外族人已及千指余近買田頃餘於江上作樓六楹正當松東二江之合流被以蒹葭帶以楊栁隔峯樓閣一望如畫樓外有土岡數里隱若城郭宛轉有情樹宜木綿因名之曰木綿坂期以男耕女織於此焉老暇日倚闌極目風月無邊乃取古人詩句有默契焉者書之壁間每一登臨輒擊節歌之以代賦焉詩凖序夫詩以三百篇為經三百篇四言詩之祖也前乎三百篇有逸出焉後乎三百篇有嗣響焉猶詩也豫每欲因經采録以為詩學之凖則顧寡陋未能也嘉靖乙未入蜀明年夏始得蠶叢國詩一篇繼又獲見石鼓詩全文十篇乃編為三卷各著所由於每篇之下而詩之源委流别亦略可識云凡若干篇總之曰詩凖夫民之有心天下古今之所同也感而為情則不能以不異故詩也者緣情而有聲者也聲比律而成樂樂足以感物而聖人録之於經故詩可經也而經非盡於詩也故曰詩之祖也乃彚而序之以俟君子玉舜編序堯舜皆古聖人也聖至於堯舜極矣槿微物也而襲上聖之號奚取焉夫人性善也充其善則至於為聖人其不為善也則至於草木而朽腐此美惡同辭春秋之旨也二三子識之曰然則玉之義何居不曰白乎涅而不緇不曰堅乎磨而不磷此孔子之事也夫人無堅白之操則至於違已而害性者衆矣敢不慎與二三子曰敬聞命矣雖然玉成也舜聖人之變者也孔子聖人之窮者也舜處其變孔子處其窮聖人且弗能違之矣語曰庸玉汝於成此之謂也於是聨次為玉華之什而以諸和篇附焉二三子請書為序遙壽萱堂詩序豫獲交天下士樂觀今世文武之盛往往髙才雄略多出於西北意山川之靈使然稍起涉行長河大嶽之間磅礴孕誕者不皆盡是又意髙才雄略之士必有訓成之績使然昨厠晉臬與今都指揮僉事孫公同僚也公魁梧磊落誠西北之良哉豫昔待罪史官時武宗皇帝巡遊西北諸邊以耀兵同朝諸公苦諫留之不可得及聞分守居庸關有將官者固鎖南口駕扼不得行意甚壯之詎知即公耶乃相與甚歡豫既不合去晉今嵗奉旨至晉伏辜留繫僧廬公以故舊日來視豫益歡都閫馬公朝卿又長才也忽與偕至再拜以請曰璽少孤賴母劉撫教有立家本北邊守居庸時得朝夕奉左右既奉勑守鴈門奉母至鴈門養已而思歸奉歸居庸既又僉書都司山西奉母至山西養已又欲歸璽跪請且泣曰子在晉母在晉母養未極子心乃安母曰人老思鄉耳汝勿復言璽因入賀遂奉以歸今一載矣瞻馳千里璽寧無悲乎母今年八十有一九月八日實維初度之辰敬捧一觴東望致祝璽之意寧盡於此乎辱諸公有遙壽萱堂之作聨而為什願先生序之豫聞之曰孫公之忠此母之教也然則髙才雄略之士豈西北山川之所能獨擅哉豫之疑始釋然而又以未及登堂拜母為歉也夫移孝為忠母以子貴此古今之通例也雖然忠臣由於孝子孝子而不進於忠臣者有之矣是母必有是子舉子而不肖其母者有之矣今劉夫人有都閫為之子都閫有夫人為之母則忠臣孝子慈母名士萃於一門鍾和兆祥忘年愛日夫人之壽寧有既乎都閫忠勇名世必有平定廓清之功建大將旗鼓勒名燕然提兵瀚海金書鐵劵山河帶礪之盟夫人視之萬里猶咫尺也而又何但以山東西為遙哉聊書以引羣玉儼山集卷三十九
