body:
  text: 儼山集卷四明陸深撰謡三首邊城謡贈王司徒金木難丑之年大同六月風塵連將軍死綏戰士哭束芻斗米當十千司徒受命出餉邊綸巾羽扇何翩翩指揮捆載赴急援上山下山魚貫聨營中望見氣十倍抆涕裹血張兩弮君不見丞相昔日下三川木牛流馬何其便司徒之功相後先司徒之功相後先請觀渭上田卧龍謡龍卧不行天龍吟梁甫篇借龍何處所行雨遍三川三川山勢常含雨北風不斷東風駛赤龍上天掉龍尾更遣流星促龍起定軍山中龍骨藏龍光夜夜拂咸陽石橋謡一揮千黃金不如一石梁江水險不測人命薄於霜南州十月水涯降臨流不渡愁褰裳家住江水北市在江水陽朝渡給薪米暮渡攜酒漿有時浪急石齒齒對面千里空斷腸東鄰周封君有子登玉堂一朝發私帑波面流虹光方車結駟若坦道石可泐德難忘辭二首春山辭贈别何舍人仲默登長坂望故都辭帝閽兮南騖渡河梁兮春波時一去兮難再怨芳嵗兮蹉跎赴山靈兮夙約返初服兮苧羅林深兮春暮草靡兮雲和猿避席兮空谷樹開障兮崇阿左蘭兮右芷牽芙蓉兮鞶蘿聊徜徉兮寤歎淡容與兮嘯歌望佳人兮不可即眇千里兮傷如何風泉竹石圖為楊夢羽正郎賦啓玄圃兮纈羣芳淡容與兮翺翔望帝子兮極浦思美人兮瀟湘幽篁兮怪石泉激風兮鳴璫神舒兮境寂開藥房兮蘭堂冠切雲兮瑶珮飱沆瀣兮夜未央抱貞節兮自媚日夏烈兮秋霜羌秀色兮可攬邈江山兮蒼蒼遊夫君兮太清跨虎豹兮騎鳳凰行十五首沛水行戊辰嵗沛水東決如沸湯家家水痕強半墻麥苗不收棗樹爛雞犬縛盡無糟粳河上丈夫七尺身插標牽女立水濵自言豐年娶得婦結髮甫能勾十春隔年生女如獲寶阿翁提攜阿婆抱兩嵗三嵗學步行鄰里盡誇皮肉好今秋糧限不過年縣官點夫夜拽船可憐此女八嵗餘決劵只賣四百錢錢財入手容易盡但願分投避飢饉借問上船何處州異日經過煩附信答言家住越州城緑樹青山好託生桑樹養蠶常著帛湖田種稻早炊粳聽罷那禁雙淚流相逢只合死前休聞道越中多賦斂父北兒南兩地愁悲開河行鄞張秀才翰林檢討常甫兄也北來省弟道死開河作悲開河丈夫乍可道路死揮淚聽我開河篇開河五月暑有毒亢暵百日河無泉枯蓬赤烏汗如雨長夜白鳥雄似鸇遊子去家三千里况復病體纍十年秖知出門多歷覽誰料來日當大難木皮束棺靈寄寺縣吏檢尸巫布筵憶昔當時别家日父母挽留妻子牽自言省弟到上國自謂賦命天無偏地豈長沙人賦鵩道如陋巷鬢凋蟬弟不及見親已逺奈此半路連棄捐重泉杳杳不復旦遊魂黯黯何由還相逢親舊煩附信南到會稽北到燕堂上老親嗔惡夢閨中少婦焚紙錢長安空悲聽雨約旅館那得共被眠哭夫哭兄兼哭子呼神呼地復呼天一死辛酸尚堪忍兩地嗚咽真可憐君不見封侯無成向沙漠馬革裹尸猶是賢重草五行子憂居海鄉寄生理於稼圃今嵗壬午連遭天災前月一風今月一雨咸為異常况值七八月之間傷農特甚慨然逺懷命筆識之題曰重草五行紀時變也前月今日風若掣今月今日雨不絶頽垣敗壁補未完注棟傾盆勢尤烈對床不辨兒女啼懸天但恐星河決遙看密瀉同織絲復有大片如飛雪夜來霑灑愁圖書似聞揮霍鳴金鐵昨聽父老指顧言目數羣龍迸空裂海中沙縣全城翻邑裏譙樓半腰折皇天髙照正森嚴聖主中興自超軼豈伊玄化復偶然無乃蒼生自詒孽擁衾轉輾苦待明四野茫茫混魚鱉禾頭生耳須浪傳竈底産蛙幸虛設不然東南財賦區寧免宵旰勞符節小臣幽憂才一家終嵗飢寒詎堪説仰天端拜意獨深捧日何能計應拙挽回光霽敢望多今夕明朝事終别金陵行鍾山鬱嵳峩冉冉朝出雲昔日秦始皇於此埋黃金埋金空復爾千載悲歎深石頭繞其右長江亘其隂我祖造帝業此地遂發靈雙觀切雲霄宫殿何森森下有高樓臺甲第賁丹青縉紳羅其中白馬揚金鈴山川此都會登眺亦崢嶸送君金陵去歌我金陵行江南行送鄧良仲尹崑山僕本江南士請歌江南篇江南佳且麗沃野多良田道旁采桑女湖中木蘭船禮讓季札後文學言偃前崑山産良玉自古盛才賢東通滄海波西接闔城煙既饒魚稻利復當大有年登眺何鬱鬱井市互糾纒商賈競啓關逋流願受廛使君楚邦彥敷治若烹鮮新從天上來端坐理徽絃齊民本同性嗜好貴有先谷中自虛曠豈曰聲難傳酌酒聽我歌我歌慎勿諼傷哉行挽何處士傷哉薤露日欲午昨日草堂辭故主黃梁已熟夢初回百嵗相將一柸土北邙山下紙錢風杜鵑聲中寒食雨留得功名上墓碑行人立馬淚如縷椒漿滿地不勝愁日落玄猿為起舞流傳義事死不泯會有餘休大門戶蜀山行悲安處士蜀山何蒼蒼蜀江何湯湯江山相望鬱不改中有懷賢淚幾行淚行灑向嘉州道嘉州高士忽已老高士墳前四尺碑北風細雨搖白草至今人傳髙士德侍母能吞病回食讀書千卷老不忘白首猶能數行墨有文孫曽振其武巍科逹官相次取千秋萬嵗安家祠瓜瓞綿綿稱始祖駿馬行贈别殷近甫殷子有竒骨昂藏若駿馬康莊在逺道伏櫪甘土苴長安一朝别我去再三挽留不能住潞河新有下灘船到家正及朱炎暮君家本在齊魯墟楓林瑟瑟臨前除小樓畫檻蔭林樾中有先世千卷書北堂慈母髮垂領倚門望兒悲短景小弟今年十四五弄筆時時學馳騁上奉母顔下課弟日有餘功擬叢桂病骨偏宜秋氣涼藥囊間却參苓劑登高回睇望泰山恍見仙人時往還翩翩白鶴不可借流光日夜凋朱顔朱顔一往那再復惟有功名留汗竹志士偏增日暮悲佳人易感窮途哭憶昔虛堂坐論文辭鋒往往傾先秦談時屈指數漢魏歎息六代何無人殷子竒氣鮮有匹人間八寶光耀日吳郡徐卿吾畏友每每到君賞高逸君不見九方臯胡能按譜索馬毛願子加餐善自愛天間十二終當豢爾曹畫松行為鄭啓範題畢偃去已逺馬夏新有聲攜將秦大夫從事禇先生幽篁壓枝兔絲揚雪後氷前儼相向淺紅膩紫多好顔端合低頭丈人行蟄龍一夜聞雷起况復笙篁風滿耳縣齋晝靜簾影重聊伴詩書當行李君不見前年營建採山林竹頭木屑俱千金天南别有擎空樹回巖疊嶂深更深豈不中梁棟地僻誠難尋由來才大難為用始覺良工真苦心東家行東家有女嫁西家不羞白璧倚蒹葭結髮初疑連理樹牽情復比並頭花並頭連理願千秋夫壻今年輕薄遊鬭雞逺過夷門市繫馬時從白下樓鬭雞繫馬聊應爾可憐年華付流水月離三五弓下弦春當九十花成子千疊關山音信稀傳言絶塞寄征衣身騎大宛烏龍去手取將軍金印歸烏龍金印兩難成邊境蕭條不可行黃沙萬里雙睛暗白雪千山五月明風月空閨難獨守團扇絺衣豈堪久箜篌弦上公渡河羌笛聲中折楊栁楊栁秋來滿故園良人何日返東門黃金繞身久離别不如貧賤暫溫存西州門行悵望西州路經年感舊恩嘗因石頭醉不覺至州門至州門應慟哭輿疾歸來塵滿目羯兒江上兵八千黿子車中年十六蒼生滿地終奈何一枕白雞春夢足中原心東山志兩難憑俱不遂幾人能有羊曇淚分金行古人重結交何必千萬人一一茍知已安得各許身嗟哉管鮑交迹逺心逾親後來相齊功寧令負分金猛虎行天生爾物何雄發咆哮一聲振林樾倀魂離離腥風動山下行人竪毛髮乳子曾聞昔擾馴食牛誰料今搪突太山啼婦那忍聞血肉縱橫疊枯骨君不見東家近日射生手彎弓百步能穿栁射虎行海壖饒稻粱日夕滿牛羊忽傳虎南下逺見目炬光腥風獵獵振林木前村驚走後村哭南衙仙尉滇南才白馬雕弓美如玉太平寺西日卓午一箭殺虎如殺鼠長官迎勞吏歡呼負嵎長嘯今何處君不見南山白額長橋蛟眼中此尉人中豪擬飲馬長城窟行密密墻頭栁凄凄野中露徘徊念逺人即目不成覩别離誰不然相思逐流年日短願夜長夢中得相憐食荼知味苦登高知路長耿耿懷隱憂雙輪繞柔腸客來異鄉縣遺我一匹絹雙手認封題中有夫壻書上言紫貂弊下言近瘦肥持刀欲裁衣仍將比殘機四言古詩四首邃菴為師相楊先生賦時惟文明篤生哲人若大厦斯搆巨木既掄江漢濯靈于國之南來遊來觀有兹邃菴於穆邃菴奠長安之里先民有言人遠室邇仞墻既闢朗牖載啓邁心昭曠崇志玄始承明既下遵此深閎耽耽渠渠以造爾後生孰曰一室而匪八荒君子善居旁達煌煌凡此煌煌惟邃之功故嶽深則蓄川匯攸同誕求明德兹菴是出出則外攘入則內謐庸是基程光我王室帝用勤止僉曰允諧三事是寄以陟崇階對揚休命執德不回秉國之鈞邃兹𢎞開孰求勿獲胡致匪才以延我基緒於皇遐哉修竹篇三章孝子備物以奉親物取於備孝之至也瞻彼修竹薄言眷之依依庭除託植在兹我悅我親以况其儀竹之苞矣以慰我思瞻彼修竹其色如玉眷言顧之豈曰空谷出則爾恭入則爾復君子之居清風穆穆瞻彼修竹鳳凰于飛嵗聿云莫泥泥有輝崇是正直以保中虛君子萬年神明所依儼山集卷四
