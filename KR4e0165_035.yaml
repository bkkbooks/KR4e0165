body:
  text: 儼山集巻三十五明陸深撰銘二十五首白石硯銘予假寓三義道院得白石破硯命工改小製陷之雕匣中銘曰毋謂玉毁寧止瓦完吾方有取於使過爾尚自新之勿難疊碎石作小山具有澗坡巖壑之勝刻銘其崖萬仞雖巍一簣攸始咫尺之間乃有千里叢桂招隠淮南邈矣潄石枕流子荆可起卓哉静壽為仁不已我銘斯徴兹道甚邇緑雨樓銘客有出安福巷者見岑樓突起有槐覆于北簷問曰此誰氏之居也應者曰松江陸子客乃紆轡訪焉及門主人肅客而升隙光出入溶溶洩洩猥若積翡回薄衿佩涼爽霑溽若霡若霂望之可掇即之無物客曰美哉此槐之精也有似緑雨盍名其樓主人起謝曰善願揮厥㫖客曰夫本滋者末茂蓄豐者施廣昔人擇甘厚之壤蒔尺寸之萌孰不欲資其身詒厥子孫然非十年不用非百年不成亦難矣槐吾不知更若干主栽培灌溉之力不知閲若干嵗至于子之身而有之庸非天定乎且緑蒼勝黄之間色木土之中氣雨天之澤而氣之和也君子顧名思義以華國普施不亦可乎夫舍子其誰主人避席曰若是則吾豈敢然亦不敢不朂以塞子之望客曰夫木值秋則零非逆性也君子深藏若愚非貶行也草木榮枯以順令君子行藏以正命主人於是憮然若失瞿然若獲請客識之于壁客既敘其事復繫之銘銘曰嘉樹嶷嶷安福之里有樓言言與厥樹峙誰其有之雲間陸氏古有哲士一衡一龍聨英闡葩光于家邦奕葉承之載構載堂巋哉斯樓層城為屏西有玉泉山名東有觀星臺名仰瞻帝閽庶司在下屋瓦鱗次廣陌膴膴葺其上區以藏以修潛室素軒皆在斯樓名緑雨者厥掇其竒勿謂固弗培勿謂崇弗治平聲汝茂汝施我言如蓍娱永堂銘進士范君韶作堂於范光湖之上軒豁爽塏抱負隂陽取歡娱永日之義命曰娱永將以奉乃翁良沙先生堂成而翁適壽八十韶之志遂哉韶凡七舉進士有聲南宮徧交當世名公卿思得鉅麗偉特之辭又以為斯堂永而樂與之者衆也韶之志逺哉按古之稱孝者二養志為大身養次之兼之者謂之備物若夫娱永之堂游耳目逸肢體有足多者而翁之志也喜文章尚禮義韶復成之是舉也不亦備哉韶於是乎能孝矣其友陸深為之銘以示永永粤維先民觀象徴理上棟下宇奠厥攸處爰有堂構啓之述之克諧人紀是曰孝慈伊其有作娱永之堂實維范氏濵于范光范子之考范翁之居其中休休其外舒舒澤國所匯天水空泂嵗事維新日晷有永志以適遂年以樂忘風斯引之而澤孔長翁來堂上櫂歌漁唱蒲荷鷗鳬近逺趨向翁有孫子亦有詩書以手提㩦以口吹嘘纚纚閭里衣冠杖屨憲徳質疑周旋堂廡和明清夷翁寔備善乃勤人懐乃承天眷春酒登堂翁則楚楚風日載陽景物容與翁既醉止朱顔素領斕斑滿庭或覲或請翁則撫之亦屢顧之有揚王庭以樹徳基徳基維何黼黻雨露棟梁折衝取焉斯具孰啓之先譬彼流泉翁實決之以㑹百川惟桑與榆翳翳丘園駟馬髙盖以大其門惟皇霈恩章服有耀翁敬承之乃食厥報淮海攸鍾沃野千里有賁奎文自天上下君子之澤君子之廬孰敢弗瞻有踧儼如惟徳垂逺孝斯永世銘以介壽萬有千嵗井井亭銘夫利成於人而功配兩儀者井是也且霖雨之潤雖洪或無及於亢夏江河之浸雖博或不救於沍寒井則有恒焉有恒之道小而可大邇而可逺配厥兩儀孰曰不宜哉吳郡之西天平山之麓有井焉𣲖自白雲泉甘冽紺深故封編修吳公之所鑿也復亭其上以休役者榜曰井井人實惠之陸深銘其旁曰天平峩峩靈泉所畜有亭翼翼臨於其麓爰覆厥井虚體淵光濟彼二儀燠寒甘涼伊其有俶自吳太史惟太史公厥徳肖是澤流生人實恒實宏太史有作永觀厥成倦者來休渇者來飲注瓶挹罌滫髓烹餁朝井而西暮井而東衆享其利莫知其功功之不知厥功之崇我鑱斯銘庶永兹道式豐爾源勿以渫告木和氏銘昔卞和懐璧獻之楚王被則者三至今人悲之自和氏廢而荆山之璞遂為世大寶或謂和氏急於求售以速禍非不幸也夫和氏知矣用以自全顧不易易哉予重悲之嘉靖己丑秋八月謫南劒道武夷天日清霽極登臨之勝既謁朱祠釋菜於五曲明日任生鍇復要為九曲之遊回舟焉有古木出於沙際泉噬水囓幻為人形俯首交臂抱一石當胷若有所獻然時從遊者姚雲丘雲霄程乆中共諦觀之予太息曰此忠愛之化耶胡為乎來哉睨其下一足若蹺又類刖者因目之曰木和氏手為洗剔以付王羽士文賜藏之宮中表異也復系之銘曰和氏懐寶或謂乃石三獻而刖爾厲爾魄我行遲遲不索有獲知遇何難銘以勸百髙嶺書院銘今之髙嶺古冠山也冠山有書院髙嶺亦有之冠山以吕左丞思誠著髙嶺則自孫太守朝用作也前有倡而後和基構琢鑿咸於教學有功不但一州之冠冕已也於是東海陸深刻銘其巔曰穹山峻嶺以配人文峩峩冠山其上干雲豈曰藏副羅此典墳青青衿佩式歌采芹孔顔雖逺大道日聞羮牆有見慰我同羣梵宮琳館一何紛紜闢邪崇正自我孫君正齋銘都諫俞君國昌作正齋友人陸深為之銘曰渇不飲泉息而擇木毋謂小閑罔敢弗穆負扆以朝兩觀斯戮秉徳不回神明所福髙齋抑抑惠山之東於皇先訓配兹棟隆過焉必式君子之功蟻旋則折龍徳乃中曲房複閣以貯歌舞結綺臨春速釁召侮陋巷稱賢草廬頌武端居儼藏式是千古易云尚象書贊肯堂卓哉位置負隂面陽豈曰室邇用表萬方太史勒詞以銘勿忘石涇銘為陸方伯夫物之至重者為石水之至清者為涇惟重也足以鎮廊廟惟清也足以别妍媸石涇之時義大矣哉陸深為製銘曰沄沄石涇大江之東伊其有俶華亭啓封溔淼演漾襟喉洞空民生既奠人思禹功有煜偉人靈淑所鍾配徳比業循名考同厲齒可潄洗耳何工霖雨津澤與上天通江河淮濟式由地中千齡永譽百川攸宗白石印池銘若質維素爾用則朱尚毋紫奪而涅之緇鐘硯銘為汪司業器之確然就礱鳴以叩從斯文攸宗含垢有容以坦厥中庸昭帝躬筆屏銘保障萬里卓立四山斂而用之在几案間几上廬山銘予得此石於武寧谿谷中宛然雙瀑故道也因題曰几上廬山刻銘其東崖曰寰宇孤標匡廬雙瀑袖懐東海不有先淑小大之分伊其劖斵静對一拳徧游五嶽鼓枰銘未齋宮諭徳成藝游出新意製鼓枰其友陸深為之銘曰員象天方效地一動一静以闡斯義爾木斵之爾革張之無所用心將鳴而攻之洮河緑石硯銘予得洮河緑石琢成硯銘其背曰縝乎玉黯乎緑用斯郁郁儼乎君子若内足而不以汙墨辱惟不辱壊不速幾哉福芙蓉洞銘瞻嵩仰衡實惟隠映繄石與丁詎曰人境爾之始華氣澄秋靘爾之不華萬古常静常静常定以保爾正匪名之榮惟爾之命嵗寒乃心水雲成性臨髙履危敢不益敬硯銘夀鄭啓範文字之友毫楮為耦獨此最壽賦質近厚坦腹而受以兹故乆知白含垢君子之守君子之有小康山徑銘治靳小康君子思大唐風無已詩人示戒悠悠泉石夙夜匪懈臨深履薄理欲作界理勝為樂從欲斯敗敢告墨卿顧諟所屇大象石銘江之西海之東石為林桂成叢歌小山咏大風生有涯樂無窮屏石銘二首雲卧壁立仁壽為徒可乆可大以殿詒圖二完璧歸趙合劒于淵慎謀貴始後定者天硯銘陸氏之硯三世所珍用乆而益竒質朴而無文古人所重者以徳不以形嵗在已未贊者陸深大理石屏銘逺岫含雲平林過雨一屏盈尺中有萬里玉華洞銘山月如璧中天無雲人心朗然以顯斯文醒酒石銘昔以醒酒今以醒心難如蜀道勝比山隂儼山集巻三十五
