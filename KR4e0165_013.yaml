body:
  text: 儼山集卷十三明陸深撰七言律詩五十首賦得禁中早春重重臺殿護雕闌欲動春聲鶯尚寒旗影漸隨風力軟凍䀶初映日華乾雲依紫蓋和香度龍抱黃金帶雨盤世道正同陽道長午門朝下雜千官南郊雪後齋宫候朝雪片煙綃積漸和紫壇瑶殿接星河風行法駕塵颸盡雲護真龍雨意多萬乘旌旗環御蹕千官綵繡濕恩波揚雄老獻河東賦何似明堂九德歌禮成下壇時天宇朗霽星橋閣道倚層霄一徑天關紫翠遙合殿椒蘭含瑞氣九重煙霧鎖春宵萬年天子調元化四海諸侯奉大朝天意直教明主識風雲盡捲雪全消重登子陵客星亭望釣臺二首萬古江山復此亭天邊自有少微星人生俯仰成今昔客裏悲歡付醉醒誰為漢家延國祚欲從嚴瀨問山靈浮雲逝水秋風闊極目遙空環翠屏煙霞冉冉去還迷紫翠重重高復低雙柱插天擎日月一溪流水隔東西騷人道路頻回首客子光隂覔舊題悵望高風千仞外敢將容易事攀躋蘭溪易舟愈小而北望愈逺山峯疊疊水潭潭欲斷還開去始諳淨照波光深見石逺分秋色半成嵐夢魂總不離天上身世虛憐是斗南買得溪船如一葉茶煙頻揚酒微酣自懷玉驛復行舟行盡山程復水程水南山徑更須行攀高漸識浮雲薄度險頻驚怪石輕到處一身真逆旅傳來滿耳總虛名隂晴未定秋將半忽聽松聲是雨聲鵝湖曉發稻田迤邐水潺湲不待黃粱已度關去路每看青嶂合穿林時攬白雲還秋風午日炎涼裏牧笛樵歌楚粵間惆悵平生最竒絶未應向晚過千山遊武夷二首武夷宫前九曲溪好峯多在夕陽西仙人飛度無行徑過客躋攀有杖藜草樹隂隂連碧落風煙裊裊引丹梯相傳亦是秦人隱何必桃源路始迷日日溪頭風日清棹歌聲裏鏡中行千巖萬壑不知處芳草幽花苦問名照影碧潭憐我老分秋華月向誰明山川如畫人如玉望闕懷鄉無限情九月朔餞别過水南年年席上看圖畫秋日人從畫裏行夾道古松飛蓋迥漫灘竒石綵船輕依山别館雲封户入市流泉竹繞城回首夕陽無限好紫青如繡五雲明十月十日雨南州雨意萬山深毒霧蠻煙半月隂細草公庭秋淅淅隔花宫漏夜沈沈溪流破白添新漲雲岫拖青失舊林靜倚客窗聽不厭乾坤隨處望為霖雨中發玉山歲晚煙雲釀薄寒好山正向雨中看斷橋流水橫漁艇要路豐泥沒馬鞍初向玉山迎勑使時初接勑逺從閩嶺望長安北來南去年光裏却恐盧生夢未闌過草萍山作重圍天共低一灘分水浙東西雲邊野菜挑冬筍客裏行厨趁午雞鶴背還霑瀑布雨馬蹄偏戀錦障泥勝遊若許開晴照為借仙人一杖藜桐江北風瑟瑟灘悠悠行盡桐江興轉幽水西半天墮紅日溪南諸峯偶白頭嚴陵自是高隱地錢塘從古帝王州海雲不斷三山近時有青紅起蜃樓和汪有之園亭之作一區猶愧子雲才薄有茅堂傍水開逺信經秋慿雁到問竒長日有人來好花隔岸飛紅雨新筍穿籬迸緑苔同上玉堂俱出牧却從湖海望蓬萊春日有懷王天宇嘉定美人秖隔淞江水不待秋風首重回今日吳公居第一少年賈傅最多才遙憐細雨催春到忽憶桃花對酒開病骨幾時堪束帶紫扉青瑣共金臺清明前一日過毗陵老去逢春春更妍杏花開爛栁含煙風旗金鼓頻過寺石岸樓臺逺接天潮信有期通大海賞心如昨換流年禁煙時節江南路畫裏山川行畫船庚寅三月三日渡江明歲行年五十五今晨渡江三月三鷗盟鷺渚他無恙鵬海龍沙我所諳北固山前帆欲滿東風陳裏酒微酣樓船簫鼓旌旗繞黃紙功名老尚堪宿州道中水郭山村不計程淮陽春晚更多情靈風常傍征旗繞宿雨新添野潦明麥葉青青初覆雉栁條落落未藏鶯風雩亦是尋常事陌上沙頭盡日行憩驛亭晝夢蕉鹿何心得失間如何連夜夢家山藥欄定為遊人遍水閣唯應送客關春日欲晴常帶雨客途雖好不如還少年最愛河東問抽筆渾慚鬢已斑睢陽禮月金鼓聲繁夜向闌叩天無計路漫漫埋將桂樹三千丈失却姮娥十二闌后羿彎弧空躩鑠玉川流涕正汍瀾由來天上成虧事付與人間仔細看行經隋堤有感端委猶堪致太平龍舟錦纜竟何成空餘細水緣堤曲别有垂楊帶晚晴社燕歸來如有恨間花開遍不知名行人誰管興亡事但説揚州接汴京自清華西行村落間殊勝平疇流水果園竹徑驟作鄉思燕麥青青柿葉肥江南回首正依依千竿新竹消蒼雪一帶遙山深翠微間任野禽啼樾塢細分流水繞柴扉那知身是乘驄客疑向花前跨鶴歸淨果寺晚眺權店驛前山晚晴天留高賞待西征北來形勝重關紫春去鶯花幾樹明風物未緣懷故土文章終恐是虛名紆從一徑過僧寺紅藥翻階憶五城曉發權店行兩山間流泉耕牧漸觸見聞山花紅映石泉流初見牛羊散古丘秦晉河山俱重鎮唐虞風土此中州雕殘極目知生計慷慨何能與國謀頭白官僚半文字東風又上皂貂裘四月晦日盂縣試諸生圍棘森森翠幄重清和時候日高舂魚龍隊裏波濤闊桃李隂中雨露濃未為驪黃妨駿馬先從拱把養長松風傳筆陳春蠶細繞郭青山鎖萬峯自盂縣度石梯嶺絶塞風多四望寬始知天上不勝寒依稀步入羊羣化次第行隨鳥背盤撲面榆錢迎棧閣染衣山黛落征鞍關門去雁無消息滿紙書成欲寄難欣州試院雨中閲卷江南五月黃梅雨帶雨滋花向晉陽映空遊絲濕欲墮赴壑細渠流未長重簷淅淅雜午漏畫寢冉冉凝清香須女為霖佐明主莫將小技賦襄王五月十八日代州籌邊堂同陳憲副汝正大閲諸生因贈汝正白馬翩翩綵鶴開牙旗行帳繞層臺一時得共關山勝他日須收將相才鳯閣龍樓俱咫尺瘴煙蠻雨乍歸來君侯亦是三湘客莫漫凌雲賦楚哀繁峙率文武諸生較射沙融草淺繞青山冠序童年各就班參合地承魚麗陳崔嵬天險雁門關遙聞白羽鳴風調時向烏號抱月彎金馬雲臺俱不薄文章功業古人間南峪雨後取道上五臺六月蕭然似晚秋登高重整木綿裘即看滿澗泉初出知是前巖雨乍收碧嶂旋隨孤鳥沒白雲常傍古松留幽芳一路無人采何處三山更十洲入五臺山水情多不自由白頭終作五臺遊萬重雲樹高低出千里滹沱背面流絶頂只疑天北極朝陽初見海東頭共傳此是清涼地為洗煩心盡日留遊五臺五雲常覆五臺端天近清都特地寒澗道千年氷未化林梢一夜雨初乾黃河紫塞依依見碧殿朱樓面面看萬壑千巖青未了更從髙處望長安宿顯通寺一榻空齋臥白雲青燈微雨夜初分無緣十日慚凡骨有夢三台繞聖君别院雞催山月吐回廊魚咽澗風聞青山亦是人間世自覺悠然隔世紛竹林寺避雨十里肩輿石磴深禪房瀟灑亂峯隂巖花笑裏饒佳色山鳥倦餘懷好音下界風雷喧衆壑上方鐘鼓出長林蒼生正有為霖望慙愧西來冒雨心竹林擬宿未為長歌行路難青山最愛雨中看圖書暫許淹塵榻蔬蕨先教具午餐碧樹洗空千澗出白雲封滿萬松寒天留再宿清涼境明日溪南十八盤清涼石石長一丈六尺餘闊僅及丈云坐五七百人以此見異炙手熏心事已多曉涼來撫石盤陀不爭可受千人坐無事應須百遍過初日射林光歷亂懶雲將雨濕嵯峩夜深或有騎牛到堪和南山扣角歌七月十一日雨後東巡過鳴謙驛客居何似隱居間城裏不如城外山澗水獨澄吟骨瘦秋風又上鬢毛斑黃花信早高低路白雁霜前紫翠關愛殺無心雲一片隨風飛去復飛還草日發晉定秋風七月度榆關秋色千巖雨後間不向此中添白髮只疑無地著青山補天人遠留遺事女媧煉石憲在東浮山背水功成合早還多少高懷付長嘯興亡元自落人間九月將望始對菊遙憐佳節過重陽疊疊青山近短墻忽見黃花和我瘦不知白日為誰忙買栽自嘆居無地欲插先憐鬢有霜擕向小齋風露背捲簾邀日伴秋光分司院前植蓼雨後著花嫣然感秋懷土我家本住江湖上獨客逺憐山谷中忽見庭花紅帶雨恍疑浦樹碧含風此身去佳渾無賴隨地寒暄自不同試問桑榆能幾許長途南北又西東十二月重渡江東歸用前三字韻江頭十二月十二憶昨開帆三月三山川南北俱經遍氣候寒暄已飽諳月色下澄江更逺潮聲驚破夢初酣君恩難報親廬近國事鄉心總未堪辛卯三月三日再疊前韻三首百年過半五十五一春最好三月三茂林修竹事可續隨栁傍花豫素諳暖愛遊蜂衙正放晴看行蟻戰方酣士師何止三宜黜中散虛傳七不堪陶令間居愛重九故園今日是重三一觴一咏風猶在江外江頭路總諳地僻仙家無歲歷花開國色帶朝酣黃鸝紫燕渾相識舊壘新枝事事堪江天十日晴無一花市殘時月過三賣困送窮方不驗品茶鬬草事多諳新資恰有詩千首舊恨惟慿酒半酣不是廣平心似鐡粉勻香沁更誰堪八月九日月夜泊舟鳯凰橋鳯凰山下鳯凰橋與客移舟自海潮中半秋光明月小參差山勢碧波遙四時得意真行樂一榻高眠慰久要為問向陽多少地種梧栽竹老清朝過北簳觀舊題自西嶺步歸南山初下北山湄慚愧山靈舊有移看種松篁如昨日來驚霜露已多時漫遊最好逢僧寺閲世無過與客棋兩腋天風送歸袖野花開遍棘成籬舟去速遂罷入寺從塔院西畔泛青龍故江落日遙牽錦纜齊青龍江水故通西采藍斸藥多成市揚網投竿盡繞堤一曲吳歌猶欵乃千年禹迹半萋迷勝遊回首驚秋鬢怕向紗籠覔舊題登鳯凰山絶頂南山佳氣鬱嵳峩特地扁舟百里過緩步暗扶筋力倦高登偏覺海天多閨中素練衣初具天上風雲氣向和却立許時慙大手磨崖欲寫中興歌儼山集卷十三
