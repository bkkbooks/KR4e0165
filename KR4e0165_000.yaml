body:
  text: 儼山集别集類五明提要臣等謹案儼山集一百卷續集十卷明陸深撰深字子淵儼山其號也上海人𢎞治乙丑進士官至詹事府詹事兼翰林院學士事迹具明史文苑傳是集為費寀徐階文徵明唐錦陸師道諸人所論定而其子國子生楫為編次而刋行之錦及師道並稱尚有外集四十卷通此二集為一百五十卷此本不載外集皆其筆記雜著又自别行也史稱深少與徐禎卿相切磨為文章有名書仿李雍趙孟俯賞鑑博雅為詞臣冠徐階稱深以經濟自許在翰林院在國子監數上書言事督學於晉參藩於楚旬宣於蜀則皆有功德於其士民而惜其獨以文章見費寀亦稱其以剴切不諛忤宰臣左遷以後略無感時憤俗之意而舉其發教巖詩峽江道中詩證其無所怨尤今觀其集雖篇章繁富而大扺根柢學問切近事理非徒鬭靡誇多當正嘉之間七子之派盛行而獨以和平典雅為宗毅然不失其故步益亦可謂有守者矣乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:0a65e044c12735c1d7f9af22c6b424d739b9df55ccd8846f3246193a4a0538cb
