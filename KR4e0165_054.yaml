body:
  text: 儼山集巻五十四明陸深撰記三柱石塢記儼山西偏澄懐閣之下小滄浪之上復以暇日周施闌檻用備臨觀徙倚之適有川石者三高可丈許並類削成有奇觀焉因錯樹之為三峯中峯蒼潤如玉彈窩圓瑩豐上而鋭下藉以盆石有端人正士之象却而望之擎空干雲邈焉寡羣豈八柱之遺非耶題曰錦柱傍甃兩臺其左曰龍鱗石蒼碧相暈比次成文儼然鱗甲之狀森聳而欲化也其右石首媺嫷而婀娜拱揖有掀舞之意名曰舞花虬合而命之曰柱石塢曲徑其下以通往來每當朝日始升夕陽初下曳杖徘徊聊以寄吾孤岸之氣時時賦王右丞五言短篇或歌陶彭澤歸來詞一兩解俯檻觀游魚為之一笑意甚樂也客有過者相攜而共樂焉疑之者進曰古之君子閒居而寡求今之君子退蔵而喜事是塢也奚取焉儼山人復為之一笑徐應之曰夫生有定理物有定分各還其分以歸之理古之道也兹數石者遺棄荒林野草之間蛇虺之所蟠牛羊之所礪樵夫牧䜿之所踐踏石固無悔也而理有不當然者一旦起而拂拭之立者為峯臥者為岫嵌者突者為巖竇圓者中規曲者中矩抗者若介俯者若委參而列之者若同志孤者無黨正者不倚各還於理斯固其分也而石又何加損哉乃若君子之取諸物也近而遠粗而精一以貫之獨非古也乎且予之理是也役數夫之力假旦夕之工高卑以陳動靜以位清濁以判治忽以區夷險以奠不曰儉操而博取乎吾子殆求之形跡之際末矣客起曰槩于理遂書為記玉山書院記古以書院聞者嵩陽睢陽嶽麓白鹿並謂之四書院今白鹿在大江西最顯而廣信亦以鵞湖聞是二者皆以吾朱子為之重也玉山在淦淦志稱玉笥山廣信南壤相接也未聞所謂書院者今有之則自謝氏父子始謝於淦右族也與善封君謝氏之良者也既得地于玉笥麓極形勝之美其子今京衛參軍貴謀曰佳哉即與吾一家有之乎其將與衆共之也與善君曰良是於是書院建矣相與鳩工遴材卜日集事正方表位以大厥規中為堂曰㑹講後曰與善傍列兩齋左曰精義右曰麗澤出精義左上為樓以庋經史曰寳墨為庖湢所具器什繚以周垣東置良疇為廩入曰閲稼西為射圃有亭曰游藝弦誦以時養習有地合郷之人與族之子弟於是學焉前啓修途曰雲徑值途作亭曰禮賓右有清池池上曰洗玉亭左為方塘塘上之亭曰天光雲影其後為綽楔曰綠隂深處下有尋樂窩右偏之池為觀蓮復亭其上曰理窟名義惟良築鑿有煥而皆為書院設也既成取山名名之曰玉山書院邦之人士相與登與善堂落焉仰而歎曰與善之義大矣謝君之志也盍以謂君遂共稱之曰與善而不名云既有年矣正徳二載參軍始以狀來請記余惟今之書院與古郷學之意同今之學與古之所謂學者抑亦有同乎否也夫學至朱子大備矣自本以趨末明體而適用此朱子之所謂學也况江之西又朱子杖屨所及之地玉山之學者儻有聞而興起焉斯地也安知不與白鹿鵞湖並聞乎又安知不與四書院者相無窮乎此則謝氏之功也不可以不記是役也吾惟列其大者若夫工役豐浩謝氏之所優為者宜不書與善名乾錫以子封其行義類書院之為者貴字敏徳向用蓋未艾云可齋記鄭顯於歙蓋自前代已然矣有字子美曰師山先生者故忠義士也其後嗣之良者廉字宜簡今行義人也宜簡遊四方將大觀焉以承其家再至京師請于余曰鄙人不佞思立於寡過之地顧未有聞焉爾雖然名以命我字亦牖我惟廉惟簡以是號於人久矣一言而終身行之取諸近者惟先生詔之余曰諾是可與語者别號之曰可齋宜簡有間曰鄙人不文敢不惟先生之教竊願有謁焉天地之化一隂一陽人理之趨一邪一正衷心之制一是一非名行之立一善一惡其歸殊也兹欲靡然惟可之從殆未知何途之適也惟先生盡之余曰然是可與語可者告之曰至善者天之命也至不齊者造化之迹也不可不主一者人之心也是故有可者有不可者有可不可之間者可乎可不可乎不可夫是之謂可故世無兩可之説操兩可者皆不可也可以為善必不可以為惡可以為君子必不可以為小人故曾子曰可以託六尺之孤可以寄百里之命至臨大節則不可奪是可不可之辨也且辨乎此而後名立而後行成而後過寡矣天下之勢無而之有簡而之繁也其於人也多蓄必厚亡善動必屢悔廉則寡取寡取則無厚亡簡則有制有制則無妄動可之道也善之積也君子之歸也雖然於陵仲子非不能寡取也而辟兄離母則不可子桑伯子非不能慎動也而廢棄冠裳則不可宜簡歸而求之二者之間去其不可以適於可夫是之謂可宜簡再拜曰鄙人不敏築室於黄山之麓書諸壁間以為記黄山樓記黄山雄峙實當新安之境多偉麗卓絶之觀森然矗然而峯者至三十六若王公大人耆年尊宿頡頏於霄漢風埃之上使人起敬起仰於數百里之下大抵融結厚而氣勢盛猶之於人也涵養深而道徳著矣故曰泰山之於丘垤類也郷先生黄公質夫致藩參而歸築樓其麓當之凡黄山偉麗卓絶之觀霄漢之韻賞數百里之仰望皆不越几席而盡之榜曰黄山樓最勝也先生日登斯樓顧而樂之節宣四時寒燠之宜乗早暮氣候之變有㑹於中即命酒獨酌身被野服手執如意擊欄楯為節歌之歌曰山中兮白雲英英兮欲雨羌攬結兮不能時來宿兮簷下叶又歌曰山中兮有芝聊采之兮以療予飢望西山兮崔嵬思佳人兮不可期又歌曰山有木兮木有桐有烏集兮文厥躬夕陽兮高逝嗟矰繳兮徒工歌闋聲出林木若鸞鶴之噦層雲時人莫測也新安人士云爾君子聞之曰博哉先生之有取於黄山也夫物以象徳徳以類求斯逝川所以興嗟仁者然後能樂也且夫山類能出雲雨豐財殖以利物物利矣山無與焉先生以名進士為良有司入柄郎署出參大藩餘三十年矣計其利物之功何限也殆無蹈止足之戒乃頽然自放於斯樓之中與煙霞泉石侶先生又何與焉記曰舜禹有天下而不與言舜禹之能不與也夫能不與則其徳備矣乃作登樓歌三闋若以和先生之辭者俾新安人士持歸為先生壽且以為樓記歌曰登樓兮蒼莽萬里兮在下送予目兮扶桑㑹懸車兮駟馬粲金碧兮有煌俯兹山兮既長酌沆瀣兮欲咽極予心兮羲皇樓中何有兮有圖有書招仙人兮與居齊萬物兮一瞬何非是兮乗除玉泉記歙之潛川玉泉在焉潛川之汪歙著姓也而舊一樂翁者汪之彦也翁故有行誼嘗思以利澤其一郷人歙據江南上游黄山其鎮也潛川依山厥維高亢齒聚繁衍每秋夏之交民實病汲翁所居之左泉發地中㳙㳙不絶翁顧而樂焉曰兹郷之利澤庶其在是乃疏導之匯而為泉往來井井厥有利哉嵗既久漸就堙圮翁之澤幾微矣翁之孫維翰鍾情其地喟然歎曰兹惟一郷之利哉兹惟我祖之志哉夫利有弗廣非仁也志有弗承非孝也汪之宗又安用維翰為惟仁惟孝實維翰之責也於是募工伐石深鑿而堅甃之視昔有加而泉遂澄泓淵澈厥維永永潛川其利哉泉色潔白味清冽甚淙淙然有聲若鳴珮環甚可樂也維翰遂以玉泉聞人稱之曰玉泉子間來請記余告之曰玉天下之至白也泉天下之至清也記曰君子比徳於玉孟子曰源泉混混不舍晝夜復以比徳焉汪君其尚有取於是哉雖然玉天下之至貴也泉天下之至多也人之情得無惑於難得而忽於近且易哉然玉之用虚而泉之用實以其至貴麗於至多合而一之則天下之利澤其有窮哉何特一郷井而已此汪君之志也惟仁人惟孝子汪君其尚勗哉乃斂衽起謝曰玉泉之義大矣維翰不敏敢敬承君子之教請書為記維翰字宗臣倜儻好禮越國之後蓋故家文獻云蒲山書屋記蒲山書屋者歙士鄭子晦之所建也建以教其子若弟子若弟奉教以承鄭之先是子晦之志也既成其族之彦子西記之子晦復走東海乞余記余嘉其志為之記曰先王設教俾人復性焉爾矣故有小學有大學有庠有序有校有辟雍有頖宮皆為教也故自言語動息飲食男女衣服冠冕禮樂射御書數皆教事也故由暗室屋漏朝廷宗廟山川華夏霜雪雨露窮通險易皆教之地也是故有一代之教有一國之教有一郷之教有一身之教其義一也自古官教外别有書院之制若白鹿岳麓之類所謂四大書院以義起者也今制自兩京國子監之外府衛州縣皆有學而書院之設尤多若兹書屋者又書院之義起歟雖廣狹不同其為教一也準之於古蓋在黨塾之間其教於一家者乎夫一家者天下之積也士修於家以效於天下故曰教也者效也然則一家之有賢父兄與天下之有賢師帥其道一也子晦其人傑也哉是可以知矣子晦名炳師山先生之後少從其父嘉興府君宦遊博洽清修有志於復性之學自以為不獲效用於世而欲振其學於後之人其於是書屋也甚力鄭之子若弟羣而聚焉學而思焉當山川之形勝據棟宇之輪奐資經籍之儲偫逺有賢祖先近有賢父兄盍亦知所自奮哉夫性不逺而復者也孟子曰學問無他焉求其放心而已矣如以文詞焉爾矣如以功利焉爾矣如以榮華焉爾矣豈子晦之志哉蒲山在今歙之雙橋之北師山遺跡在焉書屋之役子晦優為之兹不記南泉記南泉古靈江也在今台之臨海越西南諸山起為天台赤城之勝含蓄靈秀東盡於海故曰臨海之域有二水焉溪清而江濁其在城南流者曰靈江或曰澄江云上接三江下引海門晚潮初上若拖白練於紫翠之間諸峯環列俯視之厯厯可數也王先生敬忱家于其上顧而樂焉遂自號曰南泉子南泉子少有大志不屑屑事家人生産又不喜為舉子業孤岸樸静淡如也年六十不識官府人稱之曰南泉翁云翁平生與人交不為欵曲罩籠之態遇有過必面折之人有隂事獨不肯談有談人隂事者必趨而避之人故以是徳之稱長者云胷次夷曠若澄陂渟淵涇渭甚辨尤不喜人穢濁之跡每聞官府貪墨輒拍几大嘯怒隠隠不能休獨之泉上睨而歎曰何以異於是清者水之本也濁者水之蔽也已乃掬而揚之曰何以異於是定者清之路也雜者濁之門也既而仰天祝曰有不返於本而祛之蔽者非夫也暇日或從諸父汎舟泉上徜徉容與出没於鷗波蜃樓之間以滌塵坌而游高明甚適也興酣耳熱則又從而歌之歌曰泉之清兮俟正命兮泉之濁兮徳斯病兮由是聲出金石振盪於兩涯風波為湧人望之以為神仙云莫測也嘉靖甲申嵗翁就養于松初翁别族於范氏凡數世矣始復王姓是為車溪之王王范俱宋宰執裔至今為台名家云翁有子度字律生舉進士在第二甲格當有官於京朝以獨子請便祿遂得教授松郡教授君恭行孝敬敦本復古之訓諸生化焉相率候翁起居於嵗時更相謂曰先生之教我至矣固翁之道也其何可忘乃撮其事以告深聞台據山海之瓌瑋志稱人神壯麗意者必有異人出於其間今世台士大夫尤以氣節廉介聞天下至有委身贊國忠烈貫世者顧其涵濡觀孚之久又不有超出而獨詣者乎其南泉翁之謂與夫名山大川為國鎮藪非徒以其崢嶸浩渺之觀已也蓋曰輔陽相隂産材育物與道為體功在萬世其降為偉人鉅公經綸天地之宜修明禮樂之道與國咸休功在本朝有若人焉不在其身則在其子孫其南泉翁之謂與諸生張其性輩合數百人請書為南泉記因以為翁壽栢崖記義水之上嶄然秀而蔚然深者栢崖也尚書民部郎中陳君徳階少日讀書其下既以科第起矣而仍之曰栢崖者志也君子之志其取諸物也博而其功業之至也嘗與其物類孔子曰仁者樂山知者樂水著其志也志有定而功業從之矣故曰君子不凝滯於物今夫栢之為物木也其材良栢於崖焉其託固而其成大其色茂以悦其凋後其用可以任重而傳之逺徳階之先以道徳文章顯者數世矣家學淵源固已若樹崖之栢根深而地絶也養之深厚則蔥蒨滃鬱之色即之而䕃望之而竦容也抱懐利器閟厥聲采若方春之栢退然而不與羣卉競榮也筮仕之始獨任逺縣若落落澗谷而無悔也東莞之治也適權雄變法之際確然之守則又早霜先霰之集而不挫也比奉璽書出督江南上下允賴固栢之舟車乎越川度嶺濟世險艱也異日棟大厦柱廟堂奠安鞏固垂之百世而不朽君子將指栢崖而槩之曰徳階之志有素定也若夫崖之邃幽孤峭足以游髙明而出塵坌景物之態四時不同而早莫變也才客墨卿或能賦之而深特記其志之有取也若是儼山集巻五十四
