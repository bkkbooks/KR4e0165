body:
  text: 儼山集卷七十七明陸深撰墓表玉壺阡表嗚呼是為吳封君之墓蓋衣冠冢云其仲子昻以山東提刑按察副使奉命養太安人于家逮終事遂合而大封焉太史氏表之曰天道於仁人之家深矣其始也必有摧殘拂逆之施以寓夫遺碩存仁之意然後付之育賢啓祚之祥以收其繁衍食實之報或自一世二世十世以至百世罔弗獲者蓋積之愈久則入之愈厚出之愈遲則成之愈大若封君者可以觀已封君姓吳氏諱寬以某年贈承德郎闕部主事以德稱太安人姓鄭氏諱某以節稱按吳氏之先浙東人洪武初因江圮徙海鹽之城東今為海鹽人曾祖諱添二曾祖妣沈氏祖諱繼宗祖妣姚氏繼宗厭市喧又自城東徙邑之擊壤里築室買田將以耕世其業考諱顯字必達號恬菴老人行誼為鄉里所服以高年賜章服妣姚氏出平湖名族實生封君封君敦朴和厚未冠時遭家多故幹蠱甚力以順適恬菴之志恬菴矜嚴少不當意即命杖杖而受之怡然鄉人皆曰今之伯俞也待三弟務極友愛終身無間言處內人以禮斬斬有法度其於宗黨也恪慎謙和與物一無所競有犯之者既不與校終亦不復言人故未嘗見其忿厲之色與叱咤之聲意淳如也年三十有三病瘵卒實成化乙未臘月七日壬午也太安人姓鄭氏出平湖望族年十七歸封君為繼室二十八而孀居即屏華茹淡躬勤紡績以節自苦手撫二孤命之耕讀各理昻受學於雲谷朱先生之門至以吉貝三端為束修蓋手所成布云逮昻起甲科馴致通顯自宜城新建咸分俸為養太安人曰祿以養廉宜留為汝助也昻既轉官留都乃來就養已自閩憲再遷魯臬陳情得請始備榮養人以為太安人善教之報越明年考終享夀七十有八實嘉靖乙酉三月草二日也封君初娶于馬逾年卒子男二長升娶闕世其家傳次即昻娶闕學行貞懿為時名臣女一適平湖陸滔孫男六綬紱纓緒維闕孫女五曽孫男十嗚呼古記稱仁孝必曰顔冉然顔以夭終冉以疾惡疑於天道若難知者然德成名立萬世如新死生修短之間此正天道之所以為大也初封君病狀殆方書所謂傳尸癆者俗傳妨後故尤諱之必燬遺乃已當時憲副君才二齡耳太安人每語之故憲副君必號慟攀慕浹日不能休嵗時饗祀則躃踊再三曰昻無父之人也聞者莫不悲之及兹同壙鬱成嘉阡人皆曰憲副君之知禮也深故特表之使樹之隧上以告凡世之遭變思復者若此太安人遺行復書之碑隂以代銘詩曰甲令凡節婦有終應得旌門太安人及格五清先生劉公瑞自翰林來督學政風有司具上太安人聞之曰守志撫孤婦之道也已被封典敢邀再命乎命昻力辭之每嵗時必帥二孤上鄭公之墓為置祭田紡績之工至老不倦每歸寧舟行往返必以木綿車自隨衣必浣濯破裂必為之補綴一布被五十年猶存每舉以示孫曾曰此阿㜑嫁時物也姚孺人有幼女曰菊英卒時囑之曰新婦母之太安人撫育如已出長嫁之如禮叔母韓暴卒後具索然太安人即檢自製者終之其仁孝若此又曰此吳氏之世澤也凡吳之後人宜世世知之宜世世保之作玉壺表晉國夫人院氏墓表蓋聞聖人御寓睦九族以展親君子好逑歌小星而𢎞化是以乾坤之位列則嵗功順成綱常之分定而家邦並理斯古今之通義也乃若發潜隱之德而光以上行屬綜核之朝而名匪例及孝敬之風翕然存殁之榮有耀則未有若夫人之盛者也夫人姓院氏太原欣州人父文舉母某氏今晉王殿下之淑媛也德工言容恩寵佐贊俱為宫壼冠以嘉靖十年辛卯六月十一日卒享年四十有三由蓐子不舉故也是時王世嫡尚虛尤痛惜之即馳傳上言于今上皇帝臣母妃彭以宗支事重博選名德親以院氏屬之臣曰是可助內也宜蕃𦙍嗣以延我統系臣頓首承命惟謹暨臣母妃之屬纊也又以院氏屬之臣曰是真孝婦也宜請封號以勵其餘人臣稽首受命惟泣身在㷀疚蓋有待也今不幸故於孕育臣上無以副母妃之遺言下無以顯侍承之潜德敢昧死以聞事下禮部禮部尚書臣某等上言曰禮緣人情例以起義徵之典故宜有以慰王者章再上皇帝若曰孝敬之道大可贈為夫人嗚呼蓋特恩云前後無是也自今觀之名器所以彰德也恩澤所以辨才也死生所以定論也雖然必有遭焉非天子之聖何以舉格外之典非賢王之仁何以隆逮下之恩非夫人之賢又何以懋交孚之應嗚呼休哉夫人賦性恬靜英姿婉娩自少寡默𢎞治十年禮選入府逮長事王恭慎有度上奉母妃益加勤畏妃甚賢之妃屬疾夫人入侍蚤暮不敢離榻前序進湯藥王親嘗之夫人亦親嘗之由是孝誠感格宫中之務悉倚辦焉夫人益修秪恪手製冠服親調飲膳下至茶果藥餌之類無一不致誠潔恆兢兢然而外政了無干預人尤難之仙遊之日府中宫中無老無少無賢無不肖無不􅐵噓流涕以為夫人之惠未究於世也弔者祭者持紙錢者以手加額者相屬於道而王亦益悲思之嗚呼兹夫人之賢也而亦夫人之遭也可無憾矣深昨備員晉臬有學政嘗以六月十有八日隨三司後入賀殿下千秋之夀具見品儀則篚筐織纊之文組繡鞶織之麗充庭耀目有指者曰是院夫人之勤也相與稱歎既得罪去再至而夫人𤣥堂之期告矣嗚呼悲夫既而左長史馬君朋奉狀來請文其實以備閫範使後有考焉故特為之以侈皇上睦族之化以彰賢王懷賢之德併以慰夫人之靈於不朽云東石毛府君墓表嗚呼我皇明之文盛矣遍海㝢皆知誦經摛文以起家科第為賢父兄以是教其子弟子弟以是事其父兄匪是則為愚為不肖為弱不能振其宗蓋自窮鄉下邑已然而兩浙為盛浙之東寧紹為盛紹之餘姚為又盛彬彬乎蓋十室而五六矣雖然顯揚經濟之志或不能勝其富貴利達之心蓋又不獨一郡邑已然也豫頃觀察兩浙渡姚江得一人焉曰東石毛本之是已其子復成進士名而東石即謝世復宴瓊林後二十日自京邸聞訃蓋公不欲食其報於子而復為顯揚之圖者伊始况具有經濟才如復者乎蓋其為學為訓已盡出風氣之外顧非豪傑士哉豫為題其墓曰餘姚毛府君云府君諱明本之其字也别號東石學士大夫又推尊之曰東石先生善有子也東石自幼力學甫成人即遭存守翁之喪事母鮑孺人奉大母徐曲有禮愛諸叔少孤捐私奩創田宅完然居之又撫諸弟以成立辛苦支吾遂廢舉子學築室東石之麓鑿池養魚引水澆花自適也大意教其子以明體適用不屑為世俗之學暇則觴咏為樂復領鄉薦作詩示之其佳句曰開軒慕三益閉户尋九思辛卯秋忽不喜飲酒復私憂之作迎醫侍養計不欲赴㑹試東石微知之復作詩示之曰孟子非大儒三遷成底事復不敢留乃諭之曰人之生世有子為不死有文為不朽汝能登第我即死必有海內能文之士表我我可託之不朽矣汝勉之復奉遺言走東海以請兹豈非豪傑士哉東石配貞懿孺人鮑先三十年卒子二長即復娶錢氏次師繼室錢出娶陳氏女二樂安王燫匡山羅袍其壻也孫十曰五采曰五美曰五英曰五倫曰五善曰闕壬辰之冬合于貞懿而封焉墓在湖杭渡山之隂豫為論次其世而詳書其系以告後之人金齒何氏墓表豫讀詩至瓜瓞作而歎曰古人之仁也何其明於本也及讀世本史記諸書作而歎曰古人之義也何其嚴於辨也夫不辨則不類不知所本則易於忘是生人之道幾乎熄矣生人之初原於一人所居不過一方暨其末也漸繁而漸逺又其别族變姓授氏錫爵已不能守宗統之舊况於遷避流播之勢百出而無窮是故不特至於途之人而已也金齒何生偉來遊太學卒業歸以先世狀請表於墓豫蓋重其知禮焉按何氏本出浙之烏程國初編戎金齒故金齒有何氏諱迪字惟吉者實何氏始遷之祖有令德以書數稱配石氏繼沈氏生一子諱滿字公退繼戎籍忠謹號稱長者配陶氏生三子曰勝宗曰敬宗曰德宗勝宗字用光復以能書用於有司多託於酒以自適配劉氏敬宗字用恭以孝友稱於鄉配胡氏德宗字用本有膂力多巧思時金齒初設學用本為諸生尋以養母歸與其配錢氏力豐其家而金齒之何始大矣勝宗有子曰仲瑛敬宗有子曰璟德宗有子曰瓛仲瑛輸粟拜官璟亦嘗為諸生瓛勤敏剛果益充其家而行義亦益大偉其長子也偉舉雲貴庚午鄉試勵行而績文何之後揚將於是乎在偉嘗請間泣而告曰偉也幼先世之遺行美矣而不及知知矣不及詳竊聞之先祖妣錢與伯祖妣劉孀居時與胡孺人同爨處者餘三十載更相敦睦終始無間言三大母繼沒又十餘載以食指衆而析析焉而意未嘗不合也然得之曾大母陶清範慈教為多云嗚呼此何氏之祥也自古家國之所為隆替者其始也未有不由於女德其終也未有不成於子孫其積纍之難也動以世計其傾墜之易也或以旦旬達於天下一也偉乎尚勉之哉使歸而刻諸石以示永永儼山集卷七十七
