body:
  text: 儼山集卷八明陸深撰五言律詩二五十五首龍窩驛一名雙溝逺道悲遊子春光滿驛亭幽花背巖發芳草上洲青帆影連銀海山形列翠屏何如張博望光動女牛星自滎澤渡河清曉輕塵濕長河新水通一宵花信雨兩岸麥秋風禹迹微茫外鴻溝指顧中七年三問渡南北更西東初從木罌渡水欣然忘危步入山菴小憩病骨難為路春容半帶隂木罌初渡水山寺不藏林脫險初經險違心却負心楚雲天共逺聊復一登臨過趙州當代朝天路猶餘望漢臺地分三晉古客過萬山來霽雪留殘照輕車動早雷望窮天北極紫氣繞蓬萊自下邳晨渡殘月曙猶上斷氷寒更流風回青雀舫塵滿皂貂裘勳業奩中鏡英雄水上樓行人連日夜陌上重回頭汶上汶上棲賢地風塵愧此行天寒日力短道逺旅魂驚不醉任城酒空懷賀監情浮雲亦何意常為碧山橫西望太行諸山白日如送客青山解迎人半空橫疊嶂萬里一孤臣澗積過年雪風回隔嵗春并州雖暫住難比故鄉親石鐵村乘月行一名什貼有鋪片月新秋裏行人山路中晚涼微帶露宿雨尚含風星炬參差列肩輿窅窱通去程迷逺近時復問西東陽武道中冬日如春暖河氷斷復流塵中藏去馬天際出危樓周道真如砥行人那可留風霜雙短鬢失計為身謀井陘道中雪甚井陘天下險何况雪中過絶壁看雲嶂危橋下玉坡奔騰千駟馬森矗萬人戈信有淮隂令銜枚夜渡河井陘西上故關是日隂翳雪艷騰騰長天容黯黯低千重無路入一望使人迷日午憑雞唱雲生傍馬蹄山川分趙魏關路隔東西過北關八月三日舊雨侵泥滑連朝得曉晴土窑留樹蔭山路逐泉聲近塞風先徑中秋月乍生幾家田石坂辛苦望收成定襄雨中細雨重門寂新涼病骨清河山襄子國關塞代王城獨夜聞雞早髙雲過鳥輕斷橋題豫讓身後尚留名涇陽道中曉行古樹捎殘月孤燈映逺村聞雞憐曠野驅馬上髙原戀主心逾切安身事不煩東風吹曉夢只許繞柴門寄題郭復齋太守别署二首城上樓臺迥山中日月開眼空人獨坐吏散客頻來泉石秋先到詩篇手自裁隔溪花發處時有鶴飛回二山水東南郡經營復此中渚花嬌欲語海鶴舞成童曲徑重重月回闌面面風蓬萊元不逺城外弱流東送朱守忠兼懷山隂舊遊我昔登南鎮山隂一水東禹功思玉帛秦刻卧魚蟲古有神仙宅今傳王謝風獨懷詞賦悔白髮老楊雄大浪灘江水清不徹秋容雨復晴捲簾聞瀑坐欹枕看山行密篠緣溪轉長松徑壑平人家翠微裏時有白雲生玉山西下換小舟乘月懷玉溪山路依稀記昔年秋風南國客明月下瀧船苦愛滄浪曲誰歌白石篇甘棠是何物千古使人憐書龜峯石壁上四眺山俱好入山遊興長羣峯更卧起萬木半青黃輕鳥巢孤壁流泉過疊廊幽期探未極翻憶巨靈藏宿龜峯一宿龜峰寺登臨願不虛巖花僧定後山果客來初峭壁時虧蔽孤雲遞卷舒愧無康樂手疑有子長書中秋對月二首今夜中秋月長安向北城髙梧雲意薄小草露華清氣候關寒暑天心忌滿盈孤亭虛四壁著意傍人明二對酒不成醉秋光倍可憐照人偏白髮為客况青氊幾處關山裏終宵鼓角邊未知塵世上能看幾回圓至潼關潼關天作險此地復樓臺一徑雲中度三川日下來東遷周左計先入漢雄材自有蓬桑志西南萬里開峽江道中暮色曉山南國麗中月復冬深輕露還蒸麓幽花尚滿林北風千疊浪西崦半帆隂何似湘江路常懸魏闕心雪中王嵩野過公館小酌次韻西臺梁苑客南國楚郊山共愛六花舞如登萬玉間平原千騎出逺浦一蓑還萍水萍鄉路相看得破顔宿邯鄲兼程趨百里虛館宿邯鄲世事渾如夢春宵尚帶寒古臺平雉堞殘月隔雕闌無端是興廢人共璧俱完十日早朝寒甚是日致賀皇子生寒重春猶勒風回雪未消旗常懸日月殿閣迥雲霄卿相恭寅協君王視早朝天顔殊有喜臚唱揚簫韶應制撰頴殤王挽歌四首潛德悲天愸餘哀眷帝衷素車明落日丹旐揚凄風聚散雲無迹彭殤數偶同人間留不得龍種自龍宫二玉樹難為實璇源本自清未勝桐葉剪先助薤歌聲祖祭公卿集皇恩父子情堂封千古地佳氣五雲平三瑶圃秋先到珠林露易晞千官歌執紼萬乘淚霑衣正氣蒼冥闊佳城紫翠圍多應是神物華表鶴重歸四皇胤分天派仙才降帝居如何埋玉日方及晬盤餘不見東平禮空傳北海書英靈同大造消息任盈虛新鄉道中望國還鄉路南人北客心鬢毛霜欲滿時序夏初臨宿雨風塵淨遙山紫翠深蘇門精舍近悵望負幽尋曉發新鄉落月猶在屋大星欲浮空旅門人戒曉官道樹含風隱隱共山濕迢迢衛水東黃河舊行處指點為誰窮淇縣道中雨濘雨深泥滑滑一步九躋攀世路分南北人情念往還濕雲縈細柳龍氣隱髙山想像歌淇澳何如蜀道間泛黃河渺渺望不極連天送濁流浮沈經塞外淘洗向中州鷗弄千帆雨沙明兩岸秋靈槎頻訊問乘興欲遨遊赴介溪賞雪懷鄉仍嵗杪喜雪况登樓天地俱生色江湖足勝遊十年依鳯闕此日更狐裘未有陽春調能為郢客酬次介溪看牲韻輦路金沙湧郊壇翠甓開定須騎鶴到唯許視牲來列炬銀花發嚴更玉漏催上卿仙骨勝侵曉入蓬萊送楊子濬大理得告歸嶺南愛爾不可别欲留其奈何池塘春草變山鳥杜鵑多采藥仙人侣緘梅驛使過于公好門第四海望陽和次韻曹承之留别二首舊京千古重許國一身輕驛路梅初發都門雪正晴新除分畫省惜别賦春明多少臨岐客於君獨有情二南至三千里東風一棹輕石頭城外曉桃葉渡傍晴客思奚囊重鄉心晝繡明六朝佳麗地登眺若為情送張希賢令泗會萬里古端州分符作勝遊雲山通庾嶺風土接羅浮縣靜仙鳬逺樓髙瘴雨收未能逢故舊回鴈有髙秋次韻送李都閫山顛與水涯時見野人家逺湖拖白練新竹長青蛇澗露浮雲石林藏著雨花神仙無别徑此地有煙霞邀甬川少宰過報國寺送吕涇野致仕赤日都門道青山故國情風前邀客過寺裏送君行有夢憑清曉何心計去程秦川一水隔天逺九重城舟發風水本無定有時能送行西郊不作雨北望獨含情習靜憐穿榻聞歌愛濯纓十年懷舊業六月遂南征潞河發舟兩日夜始抵和合驛快路日千里畏途腸九回古難當蜀道今日下燕臺柳色連村暗波光映日開北山如有待猿鶴未應猜放任城南閘風水自順逆物情生愛憎任城天設險湖泊氣多蒸相業商巖雨君恩玉井氷阮途多少意長嘯愧孫登十四日放徐州洪逢周一之脫險方驚險思君喜見君髙山共流水覆雨更翻雲初過留侯國行經亞父墳當年誰作計楚漢欲中分直河晚泊落日青山好舟行復見山楚天窮眺望河水正潺湲沙岸人爭渡柴扉夜不鬬向來戎馬地此夕且開顔河漲輕塵髙弄日新漲急翻江客子難為夜鄉心不可降村沽聊取醉野調自成腔冥遣懷篇翰垂簾短過窗舟中晚景偶理琴密葉隱日腳微風蹙水紋客心隨路逺人語隔溪聞過雨蘇秋穀征旗揚晚雲匣琴多古意移調奏南薰晴發氣爽鐘聲逺天空鳥影微檣頭分曙色席背引朝暉水亂添新漲沙明合舊磯田家霑足否天遣逺人歸山莊細雨移花果來禽帖重題山林元有骨桃李自成蹊林曠傳乾鵲村深報午雞暖泉如可浴呼杖小橋西方竹仙人九節杖誰琢玉成方倚石孤稜瘦捎雲列戟長莫將三弄笛雅製獨眠牀多少圓機客輪蹄滿道傍雪後風雪初開野江潮已到門水深三畝竹春蚤一墀萱無事偏宜懶初心苦畏喧不應吳市裏自有辟疆園儼山集卷八
