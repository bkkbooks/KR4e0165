body:
  text: 儼山集卷五十三明陸深撰記二荆南精舍記江南佳山水宜興為最宜興佳山水荆南為最按古陽羡在宜興今入宜興之境槩稱曰陽羡凡涉宜興之溪槩稱曰荆南水澄山秀明潤映發表之以銅棺蓄之以震澤魚稻之佳蒲葦竹箭之利喬松茂林之隱蔽習俗之儉勤人士之朴茂敦讓水旱之災鮮少鳴吠之警曠世不驚加之舟輿室居之堅緻以為息游居起之適洞府之深怪瓌瑋泉石之幽閒供登眺臨賞之勝信絶境也今少保司徒大學士靳公别業在焉有田有廬若將為明農佚老之計者公故潤人也潤有京峴北固之塹拔帶以大江之深長金焦之出塵亦既以效靈㑹粹鍾為大賢碩輔舒乾坤之祕藏當台鼎之柄任霈澤㝢內為兹山川重有如公者又奚羡彼為哉公之言曰潤天下之要衝也獨形勝乎哉然潤之産常不足以養潤之人地狹故也以狹地當道衝則善無常資而俗易屢壞是故潤自吾居之可也顧吾所以遺後者至薄而詔之以彛禮也至勤其將使後之人守宗祧於此而勤衣食於彼也故始作堂命曰和義志吾私也命深記之深退而嘆曰仁哉乎公之垂範也不侈求不咈乎人情不以崇髙為專恃不凝滯於物而有化其稱名舉事不煩而推類廣勞而有穫久而不可渝秩然享之暗然而無弊夫仁者之為慮逺邇一也則公之相業從可識矣雖然覩河洛則思往聖瞻嵩華而考其降神于材賢陶漁耕稼之必有其地則山川之所賴亦豈細故也哉昔蘇文忠公軾卜居陽羡至于今談者美之而陽羡因以益顯按文忠未嘗來居志竟不遂且官止于庶僚動與咎㑹學止于文章功名之末猶將借以不朽而况于德業學術本之聖賢者哉况于子子孫孫克以永世者哉深不佞姑記其大者異日儻獲從公問學其間亭館樓榭之美卉木之麗時物之變態或能賦之緑雨樓記陸子卜居長安爰得髙樓碩柱徑梁下為三室悉牗其南髙明靜虛是故夏涼而冬溫也以奉吾母吾母喜深退而亦喜登兹樓以望焉面臨廣園南風徐來城堞蜿蜿自東直趨而正陽宣武二門卓立相向若兩山然西山隱起半空彎環奔鬬吐抹雲雨變態立異回睇崇文若孤峰插霄平睨則緣城卉木髙低隱映萬瓦鱗次如陳几案都城之異境也背負巨槐團欒扶踈壽可百歲偃覆簷際每朝暾初起則浮緑滿樓動搖不散因摘古詩緑槐踈雨之句命之曰緑雨蓋將於此息焉樓既髙爽又洞中含風於燕處不宜乃障其東偏一楹覆以承塵飾以越楮既具而純白焉純白曰素素存而天下之變其矣傳曰素位而行故命之曰素軒又障其后為小室啓一户與軒通中設木榻一棐几一古琴一銅香鼎一左居圖右架史正覆槐處也北為兩窗槐幹肖龍每欲闖窗而入煩暑時於是讀書納涼蓋樓至此窮矣有潛之義焉故命之曰潛室又啓一户折而西通中􅋼榜曰書窟廣可五尺長丈有咫穴北壁以取明雜藏書三千卷斯樓之大觀云素軒之東二楹可娛賔時享窗之外有露臺可眺可坐可玩月或二三良友可觴咏有闌可箕踞而慿其下有棗當離離時可掇而啖也吾之取於兹樓備矣夫雨及時也素正行也潛育德也窟厚蓄也尚冀無負於兹樓焉芳洲書屋記今大參山東俞公正齊讀書之地在錫山之陽環水而羣芳集有勝槩焉故太師李文正公題曰芳洲書屋公既由此取甲科鄉邦之人過而式焉地日益重而名日益有聞歸自南垣嘗讀禮於是然未暇數數然也壬申之春既起掌北垣瞻望日逺其弟震承公之志益事修葺架橋於上以通往來作堂其中以揭文正之篆額既成而景物愈出矣楊柳之䕃芙蓉之叢益以茂密林之鳥池之魚四時之花果蔬蔌協候而宣和者不失造化之妙加以修篁籜而扶踈怪石樹而崒嵂有日新焉南峙則文筆之聳秀北障則龍山之逶迤枕以故堞帶以梁溪令人眷焉有忘歸之趣而况詩書之聲猶在道義之樂具存者乎庚辰之秋公至自東藩謂其友陸深曰泰寤寐兹地今將老焉子為我記夫林泉之操游息之居士大夫不可無而亦不可有者也三代而下井田封建之法廢士失所業故資焉以仕仕因所之而功業見焉雖然得失者命也進退者分也非我之所敢與也合則殉國不可則奉身去而無所託焉然後慕戀之計重而恬淡之節虧矣斯之謂不可無者士乏正學久矣故鮮完才氣質者德性之纍也勤逸者治亂之分也夫惟榮名焉是蹈而便安之懷則天下之務必有所略積略成弊積弊成壞若魏晉之叔季雖有一丘一壑之奇能獨饗乎斯之謂不可有者有無之間君子之所必辨彼以形勝焉者末也公與深同舉于鄉文學該洽精敏强毅有天下之才典司諫議忠正和厚意存體國有天下之志禮闈校士公鑒慎密為內簾冠退而未嘗伐焉有天下之量方將陟為卿輔舉一世而勤勞之以副天下之望若是芳洲者固公之所不可無而亦豈宜遽為已有哉異日荷公之成績朝野乂安一夫皆獲然後幅巾杖藜從公兄弟以周旋於水芳野色之間深也不敏尚將賦焉是為記月塢記金齒張愈光修古學而未有合於今也自䝉以癡人之號將即月塢之勝而益修焉以告于國子先生陸深曰含居大保山中築塢讀書盡山之勝有泉有澗有樹有卉有園有亭有臺榭有梵宫琳館可遊可憩可騎射獨於有月為最勝山西峙凡西之山咸拱揖可俯故於得月為最先月時泉聲澗影樹樾卉䕃園亭臺榭梵宫琳館參差隱映含輝互彩浮藍蕩白若有若無顧而樂之使人心跡俱泯世纍盡失期以終老焉又曰家君督含以進士業非古也弗敢廢命則兹山之月之境荒哉斯非癡乎又曰履靜以强志志强則學就緣癡以崇道道崇則用光含之志也深覽而異焉語之坐告之曰吾子用志良勤矣夫君子之學古也道貴𢎞守貴約動貴時不𢎞不足以周務不約不足以致道不時不足以利用吾子疑於適越而廢冠屨矣冠屨者首足之所用也越人廢冠屨非能廢首足也故科目者豪傑之所由也非由科目而豪傑也吾子求道於六籍修辭於兩都誠古矣今天子置館閣設論思所以華國而經世者非俗學之所用也吾見子之合也將有日哉請與子論月可乎月之時用大矣懸象於天敵體於日代明於夜積成於歲雖然風雨之夕雖望無月晦朔之際雖月無明上弦之與下弦魄同而進退殊也晨見之於夕見形同而消長殊也春之溶溶也秋之皎皎也夏之助暑也冬之競寒也是故月之變屢矣安往而不得月哉三代時士以選舉漢以經行魏晉以中正隋唐始以進士是故仕之變亦屢矣安往而不得士哉吾子耽月塢之山水幾于滯靜而未𢎞矣薄科舉之委瑣幾于騖逺而未約矣任氣質以疾疢幾于過動而違時矣愈光瞿然曰含癡庶其有瘳乎願書為記晴原草堂記吾友前光祿少卿賈啓之作晴原草堂既成自徽州貽書謂上海陸深曰宜有記深方退耕三江之野陟降臯隰以與老農老圃日相從事校量物宜占測晴雨以觀天地隂陽之變家本故農有先人之廬中田而植繩樞葦箔無文章綺麗之飾窗榻潔清取足卧起雜植梅竹桃柳以為障蔽風日暄和則䇿短笻選髙丘遐觀逺眺有延陵季子之風三國六代之遺蹟在焉歸而燕坐焚香讀周易楚詞歌淮南小山之篇自適也每當風雨交㑹之期則晦冥黯黮沮洳震蕩亦復無歡閉户而卧雖數日可也庶幾哉所謂晴原草堂者深疏慵人也不間世務强起從仕今方為世指目分當棄置儻䝉先人之惠力食是資未為無事辛勤勞勩之餘因以寄吾幽寂散逺之趣蓋將老焉如先生蚤負重名舉進士為御史正言直道聳動朝端視師靖邊有文武之略還陟卿寺嚮用矣而暫理逺郡固寸隂之游太空耳而必是云云非深之所敢知也先生之言曰吾少也命名以啓按啓從􅽠從日有晴之義吾佩焉及長授詩至小雅之什曰畇畇原隰曾孫田之按髙平曰原田於原焉有無逸之訓吾愛焉且治田於雨餘乘時也顧名思義此啓之志也深卒書而歎曰啓之今之知道者與天髙地下萬物散殊人生于其中經綸繫焉故形而上者七政四時之類皆天也形而下者五嶽四瀆之類皆地也天有隂陽之殊地有險易之辨人有邪正之倫凡陽明之氣為光霽為日星其於人也為高朗為睿聖凡平易之氣為原陸為道路其於人也為博厚為坦夷若夫消長之數治忽存焉君子之所慎也故曰君子之道猶日星然不言月者隂類也又曰周道如砥君子所履言君子之履無險也晴原之義意在於斯歟有非深之所能知也今天子舉用遺才賜環在邇啓之歸坐廟堂終經綸之業挽回清平淳厚之風以弼成雍煕泰和之治然後明農畎畝及桑榆之未晞餘光所被猶足以映後人人將指之曰此和風慶雲也此泰山喬嶽也則是草堂固當與茅茨卑宫同歌咏於詩書矣豈區區藩墻所敢望哉姑記之以俟小康山徑記唐風之詩曰無已太康記亦有之樂不可極極者太過之辭也蓋言樂之不可以過也豫謂真樂無過凡言過者皆情欲之感也夫物交於外欲動於中而情出焉順而無制然後流連荒亡沈湎淫泆無所往而不至至於傷性命之正者衆矣若夫無為無求無思無慮無物無我無嗜無好無方無體無所恃而適然悠然而天和熙然而春育廓然而無所於纍夫是之謂真樂夫是之謂不過孔子曰回也不改其樂曾子曰浴乎沂風乎舞雩咏而歸是物也何過之有豫閒居東海身境俱寂既無富貴功名之想聲色貨賄之奉兹焉素薄身之所到輒有山水竹樹之勝神契物化恬焉不知老之將至也四友亭之南有隙地盈丈因聚武康之石作小山具有峯巒巖壑之趣復作磴路迂回旁通可登以待月退坐亭上可以觀雨客曰奇哉山水宜以小武康名之豫猶懼此樂之涉于外而至於過也因題曰小康山徑且以示戒云丙戌之秋七月既望記靜菴記虛靜先生閒居東海之上其覺悠悠其寐休休其耳若目莫之與謀蓋環堵蕭如也靜菴居士大帶垂紳危冠曵履立若山峙默若坎止齊心十旬裹糧千里而來問於虛靜先生曰先生蓋有道者也辭榮就淡樂寂厭紛付功名於鴻毛等富貴如浮雲中腴外槁體隋志勤若輕世絶影而神明為之不分鄙人竊有志焉而未之有聞也願先生詔之先生曰嘻吾子亦既已知之矣何事於勤勤耶居士避席曰夫知之非難行則惟先羊亡於多岐而魚得於忘筌終惠鄙人願先生抽其關而摘其𤣥先生曰善哉斯可以語大者也居吾明告子人惟動物為物之靈未能離物不免役物為物所役斯將化物物既化矣靈則微矣顛倒紛拏殊適異趨凝定專一乃與道俱雖然有因有從有覺有識有習有合而後有得夫所因者資也所從者道也所覺者境也所識者誠也所習者行也所合者契也所得者德也而無所得也資不髙者不因道不正者不從境不履者不覺誠不孚者不識行不勤者不習契不投者不合而不得也虛明之謂資簡易之謂道深靘之謂境超悟之謂誠積纍之謂行融㑹之謂契相忘之謂得吾子博大髙朗不滯於物偉然端肅語默有常其資乃絶俗矣遨遊湖海觀察近裏不隨時化所至求縉紳賢大夫而師友之其道則端始矣家居萬山之中與世紛隔不眩於奇詭巧異之狀守厥貞一養其端倪而境則有助矣居起游息志於沈冥神明之府不障不蔽緝熙于光昭其誠則素定矣惟日孳孶勿迫勿後功利思欲不煩有來其行則有恆矣跂而若慕退而若終若樂而趨焉若求歸而策焉不有所利不利有獲其合也妙矣吾子若也循是以往無物無我無久無暫無內無外無逺無邇其動也不忘其所謂靜也其靜也不知其所靜也則吾子其有餘師矣雖然吾子識之哉且二氣五行大用莫過于水火日中致􅀈揚而烈之以至于旁燭無疆幽隱畢露可不謂明哉而欲物物而一之難矣惟水也渟涵汪洋澄徹溶映至於鬚眉目睫之間罔不洞寫而咸肖故曰能一萬物之形者也是何也靜故也居士脫然曰某不敏願終身誦之乃拜下請書為記居士黃姓名緬字惟中徽産也子思子曰喜怒哀樂之未發謂之中靜故能中云儼山集卷五十三
