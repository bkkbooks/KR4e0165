body:
  text: 儼山集卷八十九明陸深撰題跋四跋溧陽史氏族譜江南世家實惟溧陽侯之胄蓋自漢盛也雖然戚畹相王恩澤貴富前此史氏有之矣若也文獻之懿恬退之操則於今光祿少卿知山先生不尤盛哉知山名後字巽仲舉進士孝廟時給事中於留都忠貞安雅明於大體不事裱襮奉身而退極山林泉石之趣若神仙然今皇帝繼統敘復遺舊乃陟卿寺先生陳謝之餘益堅初志他日且當有光於國史况兹家乘所係哉暇日手自編次成帙寄豫江東讀之統紀昭明義例嚴整善哉惟魏晉以門第掄材隋唐尤重故氏族之書甚為不輕當時宰相皆帶知譜事而圖譜一局隸在翰林著姓望族咸加一等近代稍弛可謂立賢無方而豪傑之興信有不藉於文王者矣雖然神明之胄聖賢之後夷為齊庶而先人之功德參天地者至使其子孫不少蒙一班焉吾於斯譜也有感跋五賢像深間居鄭侯思齋致二泉書院新刻五賢像書畫文跋皆在平生師友之間而五賢者又極力向往之地時一展閲為之悠然忘日而感亦係之矣忠武侯身逢末造業不逮志吾家宣公手拓中興罪踵功來范文正始進之日厄於時宰司馬公亦遭黨人之禍惟韓魏公始終被遇無少間隙而相業遂為近代之冠昔人論公不獨材德之全而福亦備焉嗚呼又安得備福如韓公者濟世哉思齋其藏之跋九歌圖楚辭九歌凡十一首蓋以九命篇非必取於數也自後遂為文章家之一體此卷九歌歌為之圖才具十首而禮魂一首闕豈亡其末簡耶太原宋進士應宿文明所藏古之君子左圖右書所以取至近而遊高明也此卷合圖書為一所取尤近文明尚因其奧雅高古之辭以識夫鬼神祭祀之理不益有禆於學耶書作隸古不俗首有西涯李文正公題篆尤可重云跋解學士書卷學士解公才名蓋世其翰墨奔放而意向特謹嚴如此卷前輩正自可敬也姚文學文光攜示閲之纍日不忍釋手別有李文正吳文定王文恪三跋正為此卷乃知為薛二守朝英物今為南翔張子奇所藏可寶也跋米元章書卷右四帖為一卷其首為米海嶽次二帖無名最後則名而不姓皆元人書愧余之寡陋不能一一審别然遺文舊事賴此以傳不但充玩好而已海嶽書於晉人最有功故其淵源高於宋一代此為慧日峯録一菴記惜其起語處損闕數行行筆則規模聖教序而波法特佳識者當自著眼也跋東園遺詩二首東園十三景賦詩者涿郡陶宗儀吳郡楊基富春吳毅大梁董升闕倪樞闕邵煥上海馬琬天台李垚嘉興郭亨江右謝俊凡十人人十三篇凡百三十篇所稱東園者蓋吾松陸氏景周云其人無所見觀之園池亭館幽絶雅致而風騷相流激計亦一時之勝也是卷今藏王子貞中書皆當時手筆惜也紙墨焦弊首尾衡決一時藻翰之盛計亦不止於此也因録次為一編以備郡中故事在勝國時浙西人士沿季宋晏安之習務以亭館相高而吾松尤號樂土四方名碩咸指為避影託足之區故衣冠文獻為江南冠按十人楊基字孟載陶宗儀字九成二人最知名餘詩皆有典刑可諷誦獨邵煥者題曰里人意復孺之子弟群從云按復孺名貞亨復孺之祖桂子字德芳號玄同自淳安來家小蒸後復孺徙居潢泖之上號青溪居士詩中往往有青溪語則東園者豈當潢泖小蒸之間與異日東還扁舟杖藜徘徊其地時歌佳句慰昔人於山光水色之間而故家文獻儻有無恙而幸存者豈非一快事哉正德十二年丁丑夏五月草五日書於長安寓舍豫既録東園詩子貞復以餘卷來貺復得詩九十一篇賦者七人曰曲江錢惟善曰扶風馬文璧曰竹素生衛毅曰璜溪馮以墨曰薔薇洞隱者謝復曰吳郡傅著曰平陽曹紹紹復有序一篇且曰附於思復翁所敘後思復者惟善字也今曲江詩存而序豈逸與陸氏東園始末世履尚無於考更當訪而求之此特一家事耳何與於重輕之數哉顧雕殘放失之餘猶令人撫卷興嗟不能無憾於其子孫之不肖况於文獻有萬萬於此者乎此豫輯録之志也跋所書陸放翁詩古稱賦詩非必命意攄詞自已出也若左氏所載可考已要之宣志敘事如自已出者為快深少喜誦放翁詩臥病山堂適檢渭南集文學姚時望以此卷要豫書懶惰之餘因相與共誦之每一篇稱快即為泚筆書之不覺滿卷昔人云莊周齊物故與蝴蝶相化果然正不必異同意見也跋絶句詩選右詩離為四類曰暢快曰婉約曰風調曰壯浪本以聲選也而主於唐其有音節近之者亦兼取焉而辭義則斷自山林諸合作者不與焉雖謂詩之一節可也跋所書陳虞山詩卷虞山與深同以詩經舉於鄉御史江石虛先生為考官連名薦録各刻經義為程文故與虞山兄弟也及虞山為諫官深為史官然彼此出入若相為就避每以為恨既而深謫南劒北轉晉臬虞山亦自葛陽遷浙憲相值公館為之劇談兩晝夜平生出處學術之詳為之一快因出是卷遂有此作夫人之會合不在榮盛之時乃多出於流落之後亦猶孳嗣每夭折於華年而連見於衰遲之候人事可勝道耶秉燭記此於懷玉山房再跋虞山卷己丑臘朔豫自葛陽乘微雨上懷玉昏黑始到張燈寫此卷為明日早行計耳豫今年五十三矣嵗暮險途精力倦憊詩文字畫之間極為潦草回想南都待榜三山街大中橋與虞山把臂論文時何如也古人所以有老大傷悲之歎與是夜雨聲潭潭逮曉不絶遂不能成行空齋瀟灑頗有餘暇復書此為跋尾夫得子有遲速會合有蚤晚豈獨人事盡然哉雖隂晴有不可必天道每如此彼役役於妄境倒顛故步者果何為耶虞山其審之當有以復我二日重題跋家藏韓幹畫馬右八馬深家太史公竹坡先生購得之以呈先大父筠松翁翁目之曰八駿圖最所欣賞長兄友琴先生受而藏之深兒時影略記其如此蓋吾邑一士夫家故物倉卒流落後有題識甚富尚藏其家正德戊辰南歸明年理先世舊物友琴先生持以見畀是時筠松府君即世餘一紀矣相與捧泣裝為橫卷每以自隨因誦東坡所題韓幹十四馬詩按圖而索正為是作是殆韓畫也惜自後涉而下亡其六焉庚辰之嵗因有損脫付之重裝而先兄友琴亦復小祥矣感悼之餘乃録蘇文忠公詩跋其後以示子孫夫法書名畫果入神妙猶為無益於世而巧偷豪奪胎禍以纍德者不少君子之所為殷鑒也徒以是卷繫吾家世澤所以重者有不在區區藝能之末亦復以示子孫是嵗秋七月朔日跋所贈沈子龍詩子龍自為諸生時豫識於一見蓋不特以其文也頃年果能脫頴名場鄉里頗以豫為知人豫他無所長獨於鑒識天下士歷歷有奇驗豈多言偶中重豫不幸耶今嵗庚辰會試豫為鄉郡士預卜呼盧成梟擬招至成均東署聼捷草六日為會吾門有廖生道南者遝至遂留與會豫心賞廖然私望尚在鄉邦也既張燈小燕賦聚奎亭詩各持片紙觴翰雜飛以候漏下三十刻各心動有從座逸去者豫諦視子龍意度間雅若不介懷方與客圍碁決勝既乃出古琴為鼓一弄行已而報至廖生果以詩經魁天下吳君與成亦占前列吾邑李君廷鳳繼之子龍氣益和周旋益整飭余心益重之乃送廖吳去赴公事復呼酒與子龍飲劇談古人道德之高懿文章之升降與吾鄉風俗之轉移不覺曙光已動候吏速豫晨班矣遂與之别士之出處固自有時一第豈足為子龍多哉因贈以詩跋忠賢遺墨卷右師山鄭先生遺令一首凡八十六言嗚呼其事至烈矣裔孫暘間以寄示江東陸深既命其族人廉與僴裝演成卷併附以余忠宣公手柬一通元史列傳二通吕旭鄭忠歌詩二通篆其首曰忠賢遺墨按史師山先生名玉字子美歙人隱居教授徴召不起忠宣公名闕字廷心廬人進士及第守安慶官至行省參政二先生鄉郡交好考之柬中語知為莫逆也顧其死節適亦同時遺令所題戊戌者實至正之十有八年也忠宣死於是年之正月師山之死後六七月耳豈既聞忠宣盡節與忠宣之妻耶卜氏實從以死而師山之妻亦自許不疑豈觀感者有素與何其道之相似也居嘗無事友朋麗澤豈惟相敬愛相激賞以流聲引譽於無窮至於變故之來死生之大而所以相信者益深使後之人迹其故而論之疑若素講而夙諾焉者何其至也慨惟元氏以材力興非有豐功厚澤殆其季政弛縱不綱偏愛國族而中原仁義禮樂之懿素無躬履允蹈之實至於南士尤肆抵排醖成禍敗漫不可措忠宣眷深責重守當盜衝明大節於孤城俱碎之日心安義得於兹為正而師山徒以布袍巖棲之士遭逢用夏變夷之師雅持定志從容自裁視軀命如捐辨髦可以為難矣南士獨何負於元哉豫既悼二先生之節而因以附著深慨云爾暘字廷賔受遺令者忠之世嫡也嗚呼尚慎藏之哉跋秋錦堂卷菊備四時之氣根歸於冬茁於春苗於夏有華於秋是故芬芳爛熳足歷晦朔春妍之花則不俟旬日老圃云然君子聞之曰菊以秋芳畢俟時也學以壯行懋進德也時足於是乎有守德足於是乎有為吾友許君達夫種菊數百當秋盛開錯色若織遂顔其所居曰秋錦堂或謂達夫學而才屢北場屋以自况爾余曰有是哉淺之乎知達夫矣跋顧九和宫諭海棠詩海棠花中絶品不見賞於名公如杜少陵至東坡定慧院之賦而世知貴重物之遇不遇固如此哉此詩吾友顧宫諭九和所作為二守吳侯敬夫寫之便面詞翰深有晉唐風韻敬夫吾鄉佳士博學清才遊南雍時嘗試第一進士業為後學法式而竟不得進士試天官復為第一釋褐遂階大夫再佐大郡聲名藉甚起是亦海棠也九和此書其偶然耶抑有意耶或未可知而事之相類固如此哉跋墨竹墨竹起於李夫人其法具於與可答東坡書世稱與可為竹聖豈虛語哉國朝來最擅名者金陵王孟端中書婁江夏仲昭太常婁江出於金陵其後略變然瀟灑絶俗中書為多精神氣力太常亦自至到此册余北上時茂勳所惠者凡八幅晴雪風雨老少濃淡各不同要之為學仲昭者跋所書瞿甥學召詩卷豫泛錢塘行嚴衢間溪山佳勝入閩關尤奇絶不可名狀抵劒坐臥在畫圖中官舍據山椒一望錯繡復有小亭池供登臨之適公事簡稀幅巾竹杖又畫工不能盡也憩小閣弄筆寫南來詩滿卷不及半以寄瞿甥學召知豫老懷若是儼山集卷八十九
