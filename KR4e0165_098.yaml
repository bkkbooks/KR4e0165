body:
  text: 儼山集巻九十八明陸深撰書京中家書二十三首周郁卿來嘗為致力置在髙選知之知之昨有書附王世美家人行日下要遣一二人回具細報恐皆先此紙到也吾兒三場巻近稍稍出示館閣名公無不推賞已令録出細閲却有説理不透遣詞欠圓處秋涼得暇一一批抹去要知時格泛濫殊不及前輩之精約也吾兒感傷之餘須留意保養雖是讀書作文功夫忌過苦杜元凱所謂優柔厭飫孟子勿忘勿助之間當熟玩味之交游一節尤宜慎擇前示雖出於人言要處要處汝早晩奉母多方寛諭慰解與汝姊共慫恿之作北來計此自有深意餘須忍事養心七月十六日聞得造牌樓一事出自當道意思亦是相愛相厚知感知感但吾平生不喜作此等華耀事况無相應地方若立在西街却犯白虎太盛且逼近約齋先生家無甚意思吾欲造在浦東祖宅却稱四柱可與三叔四叔等酌量必在街上益慶橋南有地步否棠姪回再作計較家中事體緩急宜作急報來七日汝母病餘汝宜勸慰我心亦欲一回南部闕亦可得但朝廷聖明不敢言私近日品論廷臣各加優劣説如今翰林都無人只陸深舉動好將來可以入閣且遲些遲些前在山陵亦説陸深只是戇直天語如此聞之感懼感懼汝不可多對人言未齋八月廿一日到任知之昨廿九日得唐阿舅家人寄至書是五月廿五日發行是日温託齋尚書改禮部代未齋詹事府到任赴公宴晩回始得黄標處人寄七月中書併知一甥亦殀此間廿六日庶女亦驚風而亡一時氣數如此無可奈何見汝母子書中皆無悲哀過傷之情吾心亦泰然為慰此等修短事在天地間自有一定之命吾人惟有修徳以應之古人云祈天永命是學問最難事吾兒勉之勉之可向汝姐夫婦説可戒暴怒積隂隲利心放寛些以為後嗣計至嘱至囑崔縣丞昨來見亦多言汝力學向上勉之勉之朝廷恩典九月廿一日頒詔吾兒須來承受要收束行裝别報九月初二日昨日小倪滕六寄書同到即復得張蕃喜音為之豁然計新生孫正及滿月想汝母子當具湯餅享客此亦人間第一等樂事也乳名吾為命之曰聞喜予聞而喜也况是唐時進士宴名亦以此䜟之推命章文排筭甚宜養云是日主坐長生聞吾兒面生紅瘡此是心火過勞傷肺金所致於後嗣難育之象此等調攝自養當寛所謂寛者非弛縱頺靡之謂也凡事即從容順應要令無迫促急躁意思便是此盡性至命之事到此方是學問今日張文光亦到相見得書知汝行誼寡過足慰晚景但風俗日壊海濵尤甚吾兒宜力行古道可也九月七日明堂禮已成文武官表慶大宴於華盖殿廿二日五更入朝得㫖免賀遂領燕今早謝恩還禮部送到廷試録即附莫主事回吾兒可分送尊長處初未能多陸續印還可遍致也適又聞族中可笑事吾兒不必過為疑慮亮青天可恃也陸棠二十日早下灣有備細書計與此先後到也新孫滿月想吉康獨此意懸懸耳廿五日早扈駕上陵還期不出月也百凡事宜包荒含忍是非言語不必計較俟便再書九月廿三日廿四雞初鳴即撰進太祖高后樂章六成入東閣候至申時御殿下勑畢抵家已張燈矣連日夜身心寢食俱不得遂六七十老人恐難堪吾家族中復有幸災樂禍之心正所謂内迫外迫人生處此何樂耶唐􅢫甥到相見未及細敘畧道吾兒行誼亦加賛歎世道如此正要吾人力挽回之齊家治國是一理只須順應切不可多疑過慮致生疾病不得為仁孝也慎之慎之作惡降殃天道不爽不願家門有此也奈何奈何冬至詔下恩典吾兒作行計宜豫宜豫十月廿五日吾兒論吾轉官事此自有定命斷非人謀可與也望人薦引防人擠排此等意念一毫不可留置胷中便成妬忌種子也吾一生官資十餘轉皆未嘗有所擇今官清燕可以省事可以養生亦可以寡過吾未厭也知之知之十月處族之道當以孝弟為本而其尊敬當施之賢者至於任用必量其才力過則有悔而恩義於是不終矣吾家諸姪中惟標模可託可教外族惟黄標可與議論此外非老耄所知也吾兒要須泛愛親仁始得十六日有寄與陳岳糧長書十八夜宿翰林院之後堂奚學山家人書亦到知汝母康健并孫兒易長心甚慰悦中間所論遷轉事汝父一生不甚計較惟聴命而已别有詳悉報汝今早入朝頒詔仰賴天地祖宗三代俱䝉恩贈清卿學士叨冒逾分三十年來辛勤願望於此足矣但願吾兒立志勵行為好人以全門祚傳之子孫吾更有何事耶恩廕想待東宫册立吾兒可得也目下須積學俟時治家睦族以慰予南望之思欲令一二人回自作細報知之知之冬至晚燈下吾兒不欲收買古董甚正當正當吾所以為之者欲為晩年消日之資亦不可為訓也若是古來禮樂之器又不可直以玩好視之今寄回鈞州缸一隻可盛吾家舊崑山石却須令胡匠做一圓架座朱紅漆前寄回銀硃兩包此出涪州俱是辰砂研成祗宜入漆不可雜用了知之知之鈞州葵花水匳一副又有菱花水底一箇可配作兩付以為文房之飾餘不再收可也玻璃瓶彩漆架不佳可令蘇工製一烏木架可寶也前有十六日附陳岳糧長書廿一日頒詔已有三代誥命感謝聖恩無徳可報伺有吏部手本當差一人回議焚黄立祠堂禮春帖正門我欲題一方風教仁人里三世冰銜學士家於汝意如何如何吾每懼海濵土薄不勝重大只如此亦已為一時冠汝宜知此知此轉遷事吾一生惟有義命不必過望惜福可也恩廕未有期汝須静俟奉母讀書整頓家業開貢行學中淹滯得拔矣明日是汝母生日且在此祝延喜孫亦是一百二十日不勝南望感懐但不知學召行止如何王庫官行附此此人來宜禮待之聴言斟酌後附信十六日早入太廟陪拜至午方出天氣晴明聖容悦豫親見夏閣老手持黄票似是詔書條件俱出御製也知之知之此間事情盡出聖意如我轉遷皆朝廷自主張無能為力但覺聖意眷注日加每有文字坐名撰次具稿進呈並無㸃竄即此恐無以報答榮進事静以俟之此亦吾素行也吾兒不必健羨當權實難實難所論儲氏事甚當吾兒用為殷鑒可也府縣諸書只如禮酬答老年覺事多非敢有慢也族人鄉里善處之大抵為主者慈惠爾此古人所謂祈天永命者初三日王侃庫官行附書四日遂遭章聖太后上仙舉哀成服至十三日扈從山陵北去十五日三更還館往來半騎半轎天氣極寒擁重裘雖勞幸無恙也連日有顯陵遷合事宜議論未定廿四日申時奉御札與甬川同於次日上議㫖未下聖駕南行已止恐流言訛傳致生驚惑吾兒須安静待之無事無事奚學山黄門奉使行欲寄信忽張蕃朱貴等同到得書知汝母康强為之慰喜但世道下移吾兒以謙忍勤慎處之此心灑然矣陞遷事不必介介有命也十二月廿六日汝所論交游事不必有促迫氣象海濵小邑風俗頽靡之餘豈能便有豪傑之才可友吾兒且為衆所責望兼得時名斷不可過髙尊賢而容衆嘉善而矜不能此聖賢成法也更少以惠澤濟之至囑至囑所記章文懿公語非也乃劉忠宣公名大夏者是也今早張文光來見我先謝他寫扁書字懸掛須擇名筆楊文貞公新居須請楊仲舉先生先行過以仲舉長者也汝輩宜體先賢此等意思吾意玉堂金馬非人間可扁不若只用學士第三字為穏實耳有一對聨託姚霦寄回到未八日書行後附昨山陵之行賞銀八兩近為四川採木工成賞銀二十兩紵絲二表裏此間日用須得家中每嵗幇銀三百餘兩方彀去嵗用帳算清發回查照此等事不必報知汝母可也汝母雖屢報好信來終是老年要調理加慎加慎知汝在家處族極難要寛著心胷隨機應之李序菴閣老十二月十六日故木不甚好可憐可歎四川寄回板不知如何再可破價收買數副擇得一具佳者寄來此不必諱常事常事切事切事十二月東宫册立事准在新正吾當有廕子恩典吾兒前書欲留與慶龍此亦吾意但念孫尚小吾兒成名自有遺廕事例未晩也若舍子而廕孫恐於事體不便若命下吾兒勉承之且免升散之擾况及汝母未老時了此兼可入北監科舉也思之思之舊嵗廿六日有信附奚黄門是前後兩封却恐到遲今因黄標家人行寫寄今年京中甚寒適從早朝退後河凍忽憶離家四年足月吾未嘗别汝母子如此之乆也為之慨然奈何奈何吾今年六十三覺衰老不耐煩懐抱多不樂每自排遣夜間不得熟睡日中世安標甥時來伴話以為慰吾官至三品學士况遭逢恩典推及三世計年來家計亦自豐足此心無他厚望惟汝單弱在念事事鍾情汝既有志以聖賢事業自期不必與世俗較短長但處事貴脱灑切不可留滯傷氣横逆之來孟子比之禽獸方寸要令海闊天空可也己亥元旦近日選古文凡有數家惟此為得中附回熟讀之自可得文法也三祭文序事質實頗有好處故不批還大凡作文須要從胷次流出方成作家細看兩漢韓文當有自得處又須從與自已合處用工切不可隨人贊毁也上科三場巻向暖得暇亦細細批回扈從之行兼掌行在印信殊不得已但賴天地祖宗餘庇及列聖在天之靈宗社綿長之福自可無虞逺方傳説想作一番喧攘只以鎮静處之吾兒可加意安慰安慰念吾家三十四年來享恩致榮顯富貴如此自合思報况我隨事斟酌汝宜安心合族弟姪子孫畧可以善言勸諭之追封三代得兼清銜廕子入監皆吾邑建設以來所未有不可不知感報十四日發京别差的當人回細報學召想已到家收拾家事停當以待二月十二昨十一日有書附黄標家人已行連日收束扈從買車而發即得宫僚之報已䝉聖恩改遷詹事府詹事兼翰林學士所謂宫端光學古今清美之秩甚懐慙懼此天地降鑒祖宗積徳所致不知所以為報也兼今日吏部題奏廕子本上一兩日得㫖留陸鼉領部文而還一日兩恩並美兼得雖吾兒亦思所以為報也可向母親前委曲開慰令其歡樂也三四兩弟便可出此告知明日五更入謝恩即上車就道矣二月十四聖諭禮部掌行在印御筆親寫作翰林學士矣故宫僚之選得兼此銜介谿先生贈詩是實事實景寄回便可懸之中堂永作家傳之寶有和章二首并示吾兒亦可和作或求邑中文人才子和之成一小集亦可謄黄可多抄分與各房藏之儼山集巻九十八
