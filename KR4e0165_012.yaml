body:
  text: 儼山集卷十二明陸深撰七言律詩四五十首八月十六夜渡江天上金波影未闌人間已作隔宵看千家香霧籠銀兔一派天風吹紫鸞夜色分秋當二八桂華作意讓團圞不知髙處還誰忌倚遍幽人十二闌玉舜十八首嘉靖乙酉八月晦曰豫卧疴山堂木槿一株白花千葉移植盆中與表弟顧世安文學姚時望孫則夫把酒賞之為賦近體一首曾聞鄭女詠同車更愛丰標淡有華欲傍苔莓橫野渡似將鉛粉鬬朝霞品題從此添髙價物色仍煩築短沙漫道春來李能白秋風一種玉無瑕時望渡江去與世安坐對疊韻氷肌素質雪翻車搖動秋光嵗有華映水盈盈弄雲日隔溪淡淡鎖煙霞野人酷愛編青鄣老圃先教擁白沙聞道瓊花最竒絶揚州望幸却微瑕九月朔晨起盆中再著數花適錢國輔自松城至為余作儼山玉舜圖邑中數客繼集而世安具扁舟西去矣即席再疊月下風前宜小車令傳白帝斂繁華漫揮詞手填青玉欲酹花神澆紫霞佳節正逢黃菊信髙情分占白鷗沙相如自保完歸去趙璧從來本不瑕按毛詩疏舜華木槿也本以色取朝榮夕瘁還以寓色衰愛渝之戒此詩人之志也豫東吳薄海壤沃宜槿每當臘月條而樹之無不活至來嵗即暢茂作花紅紫甚富往往村落人家以編籬障不甚貴重也白色者豫近始得之葉似菊而幹類竹扶疏隱映頗有風韻若幽人貞士混跡于樵童牧豎之間履素而逸羣荒煙野草閴然有不願人知之意豫甚愛之昔離騷草木多以自况芳臭徑脆靈均蓋三致志云百世而下覽其物者未嘗不為屈子增悲焉何則物因勢殊情隨事感古今同然此人心也豫為賦玉舜詩將以傳之好事君子兹花儻因豫而見重是未可知也諺曰女無正色物無定形顧其遭逢何如爾斯言豈不信哉豈不信哉時望一和得五首再疊一首為答羡汝胸中書五車登髙還共賦瑶華幾家籬落多秋意一樹氷霜帶暮霞不是託根通閬苑即疑傳種自流沙最憐未識東風面一見東風定有瑕再疊答諸賢和章日日詩筒走傳車山中草樹有光華花神讓雪三分白文氣成龍五色霞肺病夜窗和玉露美人秋水隔江沙無由報得風騷手白玉明珠總未瑕秋日鶴溪明府過山居見和玉舜七首再疉三首為答門外頻勞長者車山中風物過繁華未成雪卧袁髙士已見仙才蔡少霞一任登臨留勝槩虛煩拂拭到泥沙欲將花比河陽縣花似潘郎恨有瑕羊裘曾起赴安車恨殺當年寵麗華木槿籬間好風露芙蓉江上共煙霞移將一樹渾如玉老去閒居却枕沙陶令閒情空有賦從來白璧忌微瑕緣江路僻不容車開過芙蕖又舜華淡泊看花宜待月風雲映水盡為霞正堪結社三江口何似封侯萬里沙試把一杯重酹汝不須自獻玉無瑕西津沈方伯屢和至十八首未巳再疉二首為答班輸妙具九攻車何似休文句最華曉日芙蓉出溪水暮雲楊柳隔江霞曾聞南國甘棠詠須築長安宰相沙劫火自驚山石烈不知白璧本無瑕每向花前望小車詩成一一歎才華須煩妙手題黃絹絶勝當筵賦落霞一任江天狎鷗鳥十年邊塞長風沙晏嬰猶惜封書社衛國何勞怨子瑕陳仲魯玉舜諸作豫讀之悲其志焉再疉一首慰之凌波仙子下雲車想見銖衣濕露華萬種閒情偏隔水一天佳氣半成霞緒風寒勒花間蝶落日晴銜江上沙辦得素心終不改有人抵死保無瑕再疊得七首伐檀江上未成車獨立西風殿嵗華誰復賞心同素月自憐春殿隔紅霞前身合住瓊花觀託跡遙連杜若沙不是風雲終少氣翻緣玉石共無瑕疑是星精謫五車不隨紅紫領韶華疏籬野水誰成伴淡雨微雲欲變霞為客緇衣驚嵗月倩人團扇掩風沙閒情脈脈秋江上玉面啼痕錯認瑕顔如穠李不同車千古詩人詠德華凉信預教秋作伴孤芳無藉錦為霞夢回嵗月梨花院望斷西風白鷺沙攜向玉闌干畔種青蠅不放㸃成瑕風雨無端懶稅車坐當秋水閲南華花開一樹臨重九人倚髙城望少霞顔色不隨游女豔心情常近狎鷗沙絶憐何用頻攜酒霑醉姿容玉帶瑕繞簷鐵馬驟鳴車花有清隂月有華江上水天同一色望中臺殿隔西霞風隨秋逺聞香露潮識溪寒閣淺沙無計可留搖落盡共梅開處鬬無瑕水雲深處挽羊車尋樂尋芳濕露華花徑五風還十雨江天孤鶩伴飛霞霜前已露全身白風外遙憐半面沙愛殺臨流晴照影青銅如拭淨無瑕看花每枉故人車花亦迎人帶露華是處倚闌憐夜月幾回攜酒泛春霞銀瓶手插新添水玉樹情親細碾沙欲寄報章重閣筆墨痕翻惜繭光瑕晚飲張虞卿舍西江泛月還舟南鄰歸去夜如何鼓吹無風櫂有歌兩岸碧波潮力定一身清露月明多天空星斗中流動家近舟航一水過千古勝遊誰得似前須太白後東坡九日滿目雲山氣轉豪一年佳節又登髙天連澤國西風逺書寄秋懷北鴈勞三徑素盟頻問菊六經遺事且題糕授衣時敘偏驚眼篋裏猶餘舊賜袍九月望初寒獨坐風回野渡水雲空猶是江南九月中病後嵗寒偏覺早眼前心賞更誰同蕭蕭竹院詩初就曲曲山居畫未工賴有夕陽西浦上殷勤留送半窗紅十月朔與客泛舟遊靜安寺蘆子東西野渡邊前朝宫殿赤烏年夕陽逗林鐘磬響湧泉墮地珠璣圓蕭然冠服豈傲吏偶爾賓從如登仙三江禹蹟不可問一舸鴟夷非昔賢十一月朔江門觀漲渺渺煙波連海門長風吹浪晝為昏磯頭錦樹隨船出天上銀河倒地喧便欲乘槎貫牛斗却愁斷梗失山村新寒十月登樓望岸草汀花半不存七寶鎮擬訪黃天章憲副寒甚不果乘興何妨似剡溪故人只隔市橋西心情聊復同雲水蹤跡真憐在雪泥白下館前時繫馬黃金臺下共聞雞扁舟定有重來約來上春風細柳堤遊東石山園度壑穿巖窅窱通好山多在夕陽東望窮碧海龍宫近踏破蒼苔鳥篆工花塢四時常帶雨洞門終日細含風仙蹤法界如堪擬不是蓬壺即華嵩乙酉嵗除細雨催春嵗又除縣城燈火接郊墟百年到我强過半萬事于人總不如弊齒病深拋酒盞安心法在卜山居東風若問新消息多上蒲團少著書丙戌元宵上元燈火鬬嬋娟滿月輕風夜可憐人踏六鰲看海市天連萬炬候星躔樓臺影裏疑無地歌吹聲中合有緣管取一春多樂事試從今夕卜豐年次韻楊伯立春興江南地僻晝如年春與閒人别有緣滿徑落花風陳陳一犁新雨水田田池塘草長詩成夢簾幕寒輕酒擅權四壁已空諸業盡囊中剛剩買山錢春雪少年端策覲君王記得春隂賦玉堂今日閉門風雪裏五更孤枕夢魂長薄田已就資生計省事初營却老方尚有圖書拋未得教兒多種翠藝香三月三日一年一度春最好三月三日烟雨中花外小車停過客山隂褉事想遺風髙樓正繞長江去舊壘新看乳燕通桃李成蹊總相似行人莫問午橋東清明出行阡丘病來草日始勝冠花柳清明滿畫闌二月光隂半晴雨百年塵世幾悲歡王孫芳草連天碧燕子東風作陳寒萬事山頭一抔土麒麟留得後人看清明後一朝見桃花有感因誦楊孟載也無人折休相妬才有鶯啼更可憐之句𤣥都觀裏到應遲前度劉郎鬢已絲燕語鶯啼有何意石橋流水至今疑一枝帶雨比顔色千樹蒸霞勞夢思莫遣漁郎重問路此中元少外人知和郁潮州欲從東海望蓬萊試上江頭百尺臺春色送將拚獨醉好懷留取為君開詩成滿砌翻紅藥客去閒門長緑苔寄語桃花休折盡劉郎應是不重來五十生朝自壽年行五十鬢猶青浪許前身是嵗星三刖尚存和氏璧一區初築子雲亭豫是嵗始有居人間好景中秋月世上浮名五夜螢偏愛江山圍故國欲將非是問蒼冥十四日晚渡團圓寶月漾空明東去疑從不夜城風送潮頭回别浦水兼凉氣弄新晴鵲填銀漢橋初就鴈布瑶空陳乍成一櫂中流雙擊楫隔江時度紫簫聲餞顧東江宗伯于禮塔匯留題千年地勝湖山繞十月江寒樹葉稀人向别時身是客舟從行處岸如飛舊家池館誰還念落日風帆我自歸天北天南俱逆旅莫將去住與心違山中嵗暮得㫖召還翰林兼許春坊供職志感一首玉堂金馬是重來新詔青坊許並開豈有涓埃報明主虛煩聲價築髙臺千年禮樂還周典一代宸奎陋漢才直北長安天咫尺紅雲無數繞三台平望阻風期友人不值渺渺碧波連白雲期君不見重思君妬花信急春如許折柳情多日又曛山色水光餘此地酒懷詩興憶離羣陽侯若借東風便燈火樓船坐論文嘉禾道中畫旗搖曵午風多金鼓聲繁水漫波春色二分看正好國恩千載報如何江天路接心逾逺花柳村深氣尚和童冠相隨單夾具康衢時聽隔林歌陳東祠堂郵籖初下雲陽驛國士有懷陳少陽人世自應餘感慨東風元不管興亡誰無一死寧須晚事到千年更有光當日上書多輟報至今遺恨說汪黃維揚懷古輦道蕪煙江水流遊魂不載舊龍舟花開綵樹春光永火暖沈香瑞氣浮絶域衣冠朝萬國拂雲宫闕遞千秋可憐惟有東征役星散旌旗戰骨裒三月晦登羊山望下邳一年春色此登臨入望遙山紫翠深二水帆檣風獵獵半空樓閣晝隂隂何當開鑿留形勝不盡煙花自古今直北風雲最髙處極天關塞築黃金東昌懷古旌旗簫鼓畫船過風送長河渺渺波水報郵籖朱夏晚岸縈官柳緑雲和聊城不下遺書在泰岱乾封往事多七十二君空有籙莫因秦漢問如何端午自天津發舟入潞河與夏公謹給事晚坐雲際髙城萬國通端陽佳節旅行中蒹葭碧映潮頭月楊柳隂依水面風天近北辰龍有氣地偏東海望無窮蒲尊箬黍依然在楚調吳歌一笑同七月七日以公事出城同林介立遊廣恩寺年年七夕是秋期殘暑猶存感嵗時未對天邊新月偃先貪林下午隂遲城鴉殿鵲紅雲繞宿鳥鳴蟬碧樹移兩月都門塵撲面偶同心賞一題詩與顧未齊遊西山過海子橋有作新水平疇逐馬蹄白鷗黃鳥瀼東西風雲天上身仍健雞犬淮南路欲迷倒影樓臺含旭日送春蒲柳拍長堤美人期我城隂曲已有風花入品題和未齊韻寄徽州鄭珏山人别後風煙去幾重思君多在鶴歸松緘中尺素雙雙鯉門外黃山六六峯花發春深行對酒地偏日晚坐聞鐘遙知十畝棲賢宅却比丹青韻更濃十七夜待月紫閣黃扉切九霄中秋待月第三宵天髙易識龍文動海近偏憐蜃氣消十幅秋光障雲母一簾凉影弄氷綃欲憑絃管吹雲散忽有雲間起鳯簫再出郊壇視牲王正十日早于華蓋殿復命九天風物麗春陽來自南郊夜未央龍馭遙傳香裊裊鵷行時送珮鏘鏘步依玉砌雕闌繞立近珠簾繡帶長華蓋極天懸法象此身真到白雲鄉儼山集卷十二
