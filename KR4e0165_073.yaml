body:
  text: 儼山集卷七十三明陸深撰墓志銘十二承德郎工部主事劉公贈安人趙氏合葬墓志銘嘉靖十九年十月草又一日亭湖先生劉公卒於番陽之里第享年六十有五訃聞京朝其子洵自太博南奔謀以明年十二月九日葬公於餘干旗峰之原將啓趙安人之藏合焉安人公配也與公同生丙申先公二十年以正德庚辰八月六日卒云洵以深知公也久乃奉文選劉君梧岡之狀來問銘按狀公諱録字景賢更字世臣别號亭湖饒之番陽人也姓劉氏傳自漢世至宋禮部尚書忠肅公摯實起吉水家富田鄉五世孫夀可翁自富田寓饒構積善堂以居夀可之孫雲樵翁諱琮玉字潤芳博學精天文當元季望氣知髙皇帝龍興與友人决䇿歸附髙祖聞而物色之翁乃隱跡於醫嘗師㑹稽楊鐵崖先生與姑熟陶安主敬同學最相友善㑹主敬守饒遂定居番陽著述甚富雲樵生教授澄字源清教授生御史經字季權御史生參政諱烈字尹吉以子中丞貴贈大中大夫資治少尹配詹氏贈淑人中丞諱城字廷髙以公貴贈通議大夫為本朝名臣配董氏贈淑人側室尤贈安人者實生公中丞年幾五十未有子時為福建按察副使巡汀夜夢偉丈夫來謁詰旦得王狀元祠葺而像之以祀遂夢抱一兒謝適公生閩官舍中自幼教之甚嚴年十二而中丞以都察院右副都御史巡撫河南卒於行臺乃奉尤夫人護喪南歸執禮如成人尤夫人教又嚴遣就外傅從李用和先生學訓成端重年十五補郡弟子員即購竒書攻古文舉𢎞治辛酉江西鄉試明年卒業南雍與天下賢豪遊聲稱籍甚凡七上春官嘉靖癸未始第進士出知贛榆贛榆海縣也而貧荒盜相仍且一紀矣顧征求嵗益增公至抗疏免其繇十七屬淮北大饑乃即通衢設厰四十餘所作粥飼之數百里內全活甚衆尚書席公署其考曰處國事如家事視民饑如己饑㑹宿遷有疑獄屬公鞫之夜宿郵舍恍見若婦人者按尻搴帷如訴明日檢格以自經報公親濯骨驗之乃尻先折而後自盡法當坐者咸伏罪又一日單騎謁府途中遇鹽徒數千一見知公皆羅拜更為護十里行而散去乙酉以更賢調浙之平陽時處有礦賊殺吏僣號勢甚張詔捕之重兵駐溫師老財費公請釋兵獨任其事近賊土民有葉光者家蓄死士力能制賊公抵其家諭之光感泣用命乃道民兵擊賊甚力城中有惡少數輩投賊公計敗其謀賊遂殱焉光既成功因隨公并遷族於市居時上官有力者欲攘光功文致光罪死公懇曰事由光請釋光願歸公功第一又海寇艤十七艘將登岸公親禦之挽弓命中殪一人又一矢貫篙工手賊相顧駭愕揚帆去而公初未嘗習射也丁亥擢刑部湖廣司主事先是平礦賊宿榛莽間夜三四徙遂傷右足至是以疾與告三年瘳補工部都水司管徐州洪舊例洪需取辦於州繇人獻一金以飾厨傳公至惟命人植三栁以固堤辛卯郊禮覃恩進公階承德郎追贈皆如制公感且泣曰聖恩至厚且褒及所生矣遂疏乞休再上乃允時年五十六云公家居十年口不談外事日惟教諸子以文史為適自少倜儻有竒節體貌修偉氣和而色莊孝友天至人尤稱之趙安人出宋丞相忠定公之後父諱哲同知兩浙都轉鹽運使司母恭人羅氏安人端靜恭儉能讀書結字年十六歸公逮事尤夫人孝謹備至內範肅而惠視諸媵尤夫人有愛女安人愛之倍於公嫁李榕榕故家也今為鎮江府學司訓云子男九長即洵娶戴氏封孺人次泌蚤卒娶楊氏次法娶章氏次沾中武鄉舉娶許氏次治縣學生娶黃氏次泳娶王氏次沖聘嚴氏次沚聘高氏次浚聘戴民女五長適余烋次適鄧西川次適祝奎次適姚承訓次適張文質孫男五棐檠案渠葉孫女十深憶在南雍時見公如鸞鵷五彩翩翩然正德間以史官使淮公方績學著書滿家如殷盤周鼎龍文彌漫逮豫參政江西則見公于芝山之麓矣握手談議侃侃不忘天下之大真當世之竒男子也時諸子庭列森秀若蘭玉豫得遍視之退而嘉嘆豫既召還翰林為學士與戊戌讀卷之列洵時以禮闈第二人對制文章髙雅在第一等封上御批為三甲第一人臚傳大廷於是天下皆知劉亭湖之善教子而中丞公之有後也比洵出使還朝豫猶得問公起居縷縷詎意遽銘公之墓耶所著有亭湖稿若干卷饒郡志贛州慶陽二府與萬年縣諸志别有哲亭集梓于平陽蓋公之學甚博而正可方古名賢惜乎其不盡用於世也稍稍見兩縣者固不勝書豫特志其大者系之銘銘曰山川出雲以澤天下渥窪之産厥有龍馬雲之油油返于太虛萬里逸駕羣龍並驅嗟哉水部前承後啓還珠合劒豈曰居俟番湖浩渺芝山崔嵬用徵不朽視此銘詩沈母龔孺人墓志銘孺人龔氏以母德冠江東之沈有七丈夫子能以科第臺諫振沈氏之宗者實自孺人始孺人故上海家也系出漢勝從宋南渡世多隱德皇明有尉井陘者諱某號淡菴孺人之父也母陸氏年十七歸友松府君諱梁友松父菊軒翁母瞿夫人事親如禮有司具聞孝宗朝以雙孝旌其門時孺人為冢婦實有力焉既而長子照舉進士再遷給事中武宗朝奉使忤權閹重譴奪官㑹友松訃聞還孺人倚門而泣以指數之曰汝父行誼厚且善今不及享下夀棄而祖母背而祿養汝之目且不瞑也言已而泣又曰汝父教汝立身成名起科第今復云何乃爾耳則又泣照拜慟而前微出聲曰兒無他坐不能與時浮沉故爾今生還得見吾母如見吾父也孺人乃揮泣曰誠如是是不失身即不辱親吾固知汝父將含笑於地下矣則又泣曰吾非不能死汝父顧吾姑在堂日且老諸子女幼婚嫁未畢吾恐纍汝也乃相與扶抱而泣失聲孺人幾絶㑹照得伸白叙官由是此言稍稍傳天下天下之人稱之曰賢母賢母云初菊軒公為江南望族族甚蕃瞿夫人在堂時子姓析居有一二里三四里者孺人侍夫人晨夕左右甘㫖畢辦㑹卧疾牀笫間孺人以一身周旋之幾二年如一日族人以此多孺人享年六十有四以嘉靖戊子五月八日卒卜以乙未正月某日葬戴溪之崇孝阡啓友松府君之墓封而合焉孺人性至孝勤儉慈惠動有禮則七男三女皆躬自乳哺訓誨至於成立人尤以為難云焰壬戌進士積官至廣東按察司僉事次耀雲南永昌衛經歷次煾王府典膳次煦太學生次炌次焃次燭俱引禮舍人其子也典膳徐倬序班諸華監生秦文解三人其壻也孫男十曰科曰思道曰自宜曰自立曰自正曰應奎曰應兆曰應辰曰自重曰思義孫女十深母吳孺人之祖母瞿與瞿夫人姑姪也僉憲君以深有世姻且通家也故使為之銘銘曰惟家之興粵有婦職子孫日昌乃視母德於惟孺人其報斯食鬱鬱堂封過者必式浙江按察司副使進階亞中大夫閻公墓志銘公諱睿字汝思别號三樂道人世居祁之㑹善里曾祖孝先祖棟咸隱於農父靜菴諱某贈文林郎永清縣知縣母吕氏贈孺人公生而臞靜菴委曲撫之每令於群兒嬉戲公惟旁睨而已少從餘姚毛世達授孝經即了大義諸童生當責世達課以句曰小水難為海公即應曰鮮鱗解化龍世達異之初靜菴明法律筮仕為通倉副使有政蹟稍遷上海縣稅務大使故公從來上海遂學於校官盧先生不踰年而通禮經貫穿百家豁如也時上海令㑹盧於學宫試之謂靜菴曰子嗣國器也汝官雖薄有是子奚滿載歸耶㑹靜菴卒於官公扶柩歸葬如禮服闋補邑庠增廣生督學使竒其文期之遂領𢎞治乙卯鄉薦登己未進士第授永清知縣永清素稱難治公至治以誠信仁禮勸農聽訟俗為之變又雅意學校修葺考校諸生若傅堯臣劉繼先相繼登科𢎞治辛酉縣蝗公發粟易民捕之積蝗至萬餘石故永清獨不災巡撫周公以事聞有銀幣之勞縣有夀府莊窪處不成田居民嵗代輸無從敢言公核實悉免之時孝肅皇太后有莊鄰牧場幾為所侵公疏請還之乃遣中貴人來按公力與抗復地百餘頃中貴人譛於太后后斥曰此為國官也汝奚白耶有事於霸州州民願借以為守縣人急往爭之訟於撫臺都御史洪公曰是當作風憲官耳非郡縣能留也滿一考進階文林郎例得推恩贈及父母已而檄召當去永清民遮留不可得至欲建生祠公堅卻乃止瀕行遺一履掛縣門從民願也正德辛未流賊至郊賊首齊彥明者公舊禁卒也感公德繫馬數匹於門望堂泣拜而去時巡撫毅齊李公寄詩云强暴思恩曽繫馬市民懷德願留靴蓋紀實云既入朝試陜西道監察御史巡視北城正德初元事務紛更公直言無忌有侃侃風奉敕查盤甘肅諸鎮倉糧糧多虧折官皆鬻妻子償之有自經者公革兜攬之人禁兌給之弊設法取盈釋淹滯之官凡六十輩舊例官軍馬斃所司責其人貧者至典妻貿馬以應因循成俗夫婦倫乖公命屯地每頃出銀一錢以給買馬仍嚴典妻之禁嘗經祈連暮宿山下夜分聞金鼓聲比曉雪滿地公詢諸左右曰山徑冰滑非雪馬不可度山後有霍將軍廟蓋神助云公入廟祀之廟下有池出冰若榴梨瓜果狀衆咸以為公所感云暨復命疏邊務數條上皆嘉納諸鎮至今行之遂命巡按陜西時逆瑾擅權凡公出者歸必厚賂不然輒加譴謫公曰寧禍吾身不忍剝吾民也置鐇之亂實遊擊仇鉞有功逆瑾欲歸功於鎮守總兵曹雄雄瑾親黨也公上疏别白之瑾怒遣錦衣官欲假他事逮之未及而瑾敗公獲免未幾升浙江按察副使奉敕巡視海道海接東南諸夷設憲臣為備自逆瑾裁革之後倭寇乘時劫略勢要開洋覔利公既至水操艦戰豪右斂迹海道為之肅清嵗甲戌以疾致仕歸祁優游田野之間芒鞋卉服號晉郊耕叟云暇日讀書猶不輟視世務漠如也辛卯冬忽嬰痰疾既革亦從容談笑殊無苦諸子請後事勗以勤儉耕讀福善禍淫之道賦詩一章曰一輪明月照祁川虛度光隂七十年今日收光歸去也海天皎潔十分圓端坐而逝實壬辰正月初四日也距其生天順辛巳五月五日享年七十有二公性敦直宦遊二十年以清白自持家居衣食淡薄宅舍僅蔽風雨人無少長賢愚皆誠心禮接凡族人親友貧不能婚娶者輒出資濟之友人王佑卒官於廣昌尹柩還家貧子幼得公而葬其仁厚類多若此性少飲酒而善吟咏有晋郊集若干卷配劉氏封孺人晋府百户劉鑑女有賢行子男五師善娶郝氏師賢娶陳氏師良娶王氏師文娶武氏師德娶馮氏孫男十紹芳繼芳繩芳聫芳緝芳纘芳綿芳維芳􅀈芳繹芳曾孫男五講論詩談女二長適郝廷佐次適許登仕女孫一嗚呼公今之古人也世豈多見哉嵗戊寅為御史朱實昌所薦嘉靖丁亥今上推恩之詔進階從三品云深故家上海童子時見公與先兄輩同學業既待罪史官有事於浙㑹公憲臺出督學於山西公自祁來逆我于榆次情好藹然豫再適晋而公卒矣嗚呼辛丑之嵗其子縣學生某走京師以葬期告而乞銘乃按方伯郭公韶之狀志而銘之銘曰晋山葱蒼惟祁孔良惟公祁産家瑞國光內臺外臬風紀載揚挂冠何早脫屣何長援毫揮手與化偕忘是曰君子之藏祚𦙍其昌儼山集卷七十三
