body:
  text: 儼山集巻九十四明陸深撰書與楊東濵十五首唐橋夜别情感萬端抵家不至勞倦否深南來一行人皆賴尊庇粗適輕舟軟輿上下山水間如在畫圖不知身是遷客也入閩尤勝大都丹崖碧潭隨處而有至於横嶂絶壁倚天卓立白雲英英巻舒其下劖削㸃綴疑有神工鬼斧不可名狀每每忘返悔恨不强東濵來共此為之悵然八月廿一日履任正當木犀盛開山中老樹有兩人合抱繁隂蔽天清香數十里愧無少酒量酬之公廨在山椒四圍紫翠在一指顧間後有小園有方亭流泉時時燕坐耳目清浄可以忘老於此矣知之知之辰下文候何似諸郎進學為慰世相日在念奈何無以振之也致意見怡直吳千兵為謝之不悉昨風作潮漲江門如海甚得竒觀浮薪無數恐非盛幹輩能拚命採掇也致去七十束應爨下繼此便可令人持具來也草草辱厚情拳拳即病祟退聴矣感感容謝道理天地間甚大仕宦没溺人最深此古人見成話頭煩東濵為我大書榜之座右草草附瀆勿罪晩將有佳月别具畫船載鼓吹同汎何如拱候適得和章辭翰雙絶令人爽然繼之以感歎也内典謂世界本闕陷奈何奈何昨載至湖石數株西堂前添却一倍磊磈新涼得月能過我為信宿留乎兼製隠居冠服待旦夕間命下便作山中無事老人矣餘面盡不宣山居初就日有遊人每一躋攀東濵未嘗不在念也邇日道體何似静養為樂僕新置二畫舸只用四五人可行約載數客其一設繩牀偃卧其一具歌吹先驅風日妍美即挾以出浦隨潮上下選勝而登或尋小港汊訪故舊即牽挽而去雖滑泥亦可動此或古人所未有也今秋稍徤顧念京師同輩多入鬼録不能不為之嬰情耳娱老之計聊報知已他人固未易言也亮亮夜來滕東遺過宿山館因作數大字遂至腕痛老態衰惰不獲欵洽今早去謁想遂佳晤儻能同渡為數日之留得傾倒也如何如何家嫂病勢可醫但舍姪輩心力不稱人意重可傷也十月天氣如春田野間極有好意味不勝跂望幸情照不次北發不及一握手正是惡滋味也清明時節樓船簫鼓行江南道中亦復竒勝三月三日渡江過儀真從陸抵環滁雨中望醉翁亭甚適自此渡淮泗遡黄河登太行陟上黨涉沁横汾入晉陽即日將出鴈門入雲中歴覽長城之塞帥諸生較射慨然有北向燕然之志每當意㑹處未嘗不念東濵同之比來起居何似幸自愛深到此粗遣出巡將及千里往返山川有極佳者大率太行西麓為山西萬山中得一平曠有水處便立州縣城堞外四面皆山真所謂萬疊雲屏也五臺尤靈怪而長松喬木髙下森矗如虬龍肩輿只行樹梢也六月須挾纊都無暑氣尚欲抵雲中觀漢武五將軍出塞之地上醫巫閭然後南還耳匆匆報此僕夜歸宿山中晨起觀初日散影遥田滿地皆白雲以軟輿經過瀰漫霡霂俯見城郭此身真在天上須㬰扁舟亂流如汎瀛洲還坐南榮映日從兒子冩漢書一兩段方啜新稻飯一盂此樂恨不與東濵共之急足報去能乘興來此一話如何連得手教皆極感慰兼省風神瀟洒間適為樂深謀歸未能賴有山水之適以自遣耳匏繫羝觸私心奈何兒子楫每䝉教愛此兒禀氣薄弱但習為淳謹是非之心不爽爾豈可便使之涉世况苦於多病文學未必能工應舉甚非吾願亟自江西令人止之已無及矣懊惱懊惱如深科第非不髙年嵗非不早今白首奔波討實受用處難得欲示戒於此兒也煩東濵以静定涵養誨之世間浮華事恐渠未有的見耳至懇至懇試録一册漫往令郎賢親一讀此中有意義不可以尋常程文視之餘保煉為祝比因修葺發地得一石刻甚竒偉細觀當是黄書蘇文考其文義為畫竹設當為墨君堂賦但今蘇集無之恨寡陋無從審定也惜脱去前後想不知石總幾段此特其中一段耳驚歎之餘臨去一紙請博雅者為一校勘有興即請過同視之如何如何别後戀戀為懐適華札佳味逺致甚慰甚慰渡江無苦令人幽然吾人胷次要陶寫精神要發舒然後隂魔退聴也須常提掇如此却是曾㸃輩樂地也知照呵凍作字覺老態不罪不罪深居南中多暇喜為人作草書彼處士大夫皆賛歎恨不多得以深北歸之速深亦覺運臂落墨殊勝少壯時嘗與汪閒齋侍郎論此惟惡惡筆惡紙恐是老衰退步處可怪也今早發至紙不佳内還寫去兩幅煩為評之若毁譽失實便當與東濵絶筆矣昨張勵齋行次附啓殊不盡情兹相姪南還念欲傳情言更難盡瞻望之餘奈何為懐即辰想道候佳勝日有真樂深老矣愁緒無端覺人間世太局促也江雲海月之思何嘗不在夢寐千萬珍重以需復㑹相姪此來甚不副所圖一則機㑹難乘一則力量未拓姑令養晦以俟幸有以教之一時朋游凋謝吾東濵魯靈光也西巖令弟為致區區不既昨以田家事催我東渡西郊汎月伺重陽修故事也花間與客坐水晶亭子得佳章累幅不覺滿座生香此又一境界也晩桂將舒早菊欲放芙蓉映條栁在秋水蒹葭之外何當置東濵於其間讀道書也與曹茂勲四首深自十五六遂䝉過許定交當時但謂深能為時文可以取科第深亦以此自進於執事未有如古人之交者也然執事天資峻絶意氣麗澤其去今人逺矣深生長蒿蓬之巷少無淵源之澤倀倀流浪未始知有古人之道天不罰棄俾得從士君子後奔走苦辛之餘少有所得思欲致之執事以報知已昨走拜奉執事微言察執事殊無相信之意當日議論亦但及文藝而已他盖未暇吐露也執事自謂力不及為是誠不可古之人其所得為皆為之所不得為者皆天也孔子有曰朝聞道夕死可矣若預料得為與不得為以為進止竊恐學問之道不如是之暴且棄也東還聞吾父兄子弟動輒稱尊字盖有微視舉動以為法式者則執事不可謂不繫吾海邑之風化也得自輕乎哉三代以來朋友道喪䛕悦逢迎最可悲痛使深而無知則已深既有知不忍為也學制一篇奉上覽正塊菴記一首并寫去僕之志聊於是見一二矣昨偶遺茄柸因以馳附鄙意香糕少許恐執事讀深之文倦而思睡畧啜以助終篇不勝慰幸令伯至辱手教兼悉居起甚善為慰索令祖母孺人墓誌已為撰成顧卑陋之筆不足發揚先徳是懼是愧行狀中有數處未安悉加潤色作誌乞知之殂字是不得正終之稱况是君后所用綱目凡例可考見也故僕只書卒繼聘二字義是再娶也祖堂恐不當稱之詳讀此節文字委曲反覆却是執事欲與祖堂諱其為妾古人妻齊妾接乃是定分名正而言順此正不當為之諱耳故僕起誌側室二字為綱却用繼嗣一段接之自見其為不輕矣多材藝至通曉一段此雖是祖堂實事然婦人之職無非無儀欲以是為盛徳傳之後世恐不可况多材多藝四字尤不可施於閨門故僕却敘此事於誌尾以見其為令祖堂之餘事而亦能如此精絶不滋重與中敘祖堂起家一段尤未安細讀文義却是當時曹氏凡百大小皆出自祖堂不復知有嫡矣古人嫡庶之分恐不如是其為祖堂累甚為不淺故僕盡用執事之文而小變法度見其若有承統而祖堂之功在曹氏者益顯嗚呼金石文字有天下萬世在後敢不慎重僕文雖下劣然却是字字較量過也更有未安處乞以書來僕尚當改定不敢憚勞也若入石須得善書者為佳或即託楊伯立作楷亦妙刻成須搨數本見寄僕官銜本不欲書但前輩皆如此姑以備一代之體也不識如何屈指禮闈不逺冀得傾倒耳僕日與人事相俯仰舊學愈就荒落殊非初志迺知山林之日長學問之深之語為古人實見一涉仕路安敢望其長進耶伯立向不得消息聞之來人頗不似初喪時守禮可惜也匆匆不及附書幸諭鄙意近日科場文字只宜平正順熟不必過於出竒此在令郎輩尤所當知績之乃郎試復居優可喜可喜惟恨諸故舊俱落落然不相及此何理也幸道達千萬秋涼孝履萬福去冬曾奉一書兩嵗間不得執事片劄孰謂親知契舊如茂勲者而乃爾耶惶悚惶悚家兄至審知動静萬福為慰深今嵗荐更憂戚每思東還之樂竟不可得往時看海月宿百菊亭扁舟短服出没浦雲荻花間與知已者奕棋飲酒比一思之恍如隔世何時能復有此事否雲溪亦無消息何故人皆棄我甚耶漫一問之當有報我者自入春以来深未嘗通問於執事執事不以深為罪深亦未嘗䝉執事片劄知執事非忘情於僕也自謂當膺首薦而來㑹合有期矣日夜懸望此意竟虚僕始悔前日之不通問為畧而又以不得執事片劄無所於慰也此情當何如耶人言學成而不遇知已者則不偶夫以執事之學而得士亷為主司竟爾不偶何耶將所謂聲譽不彰是不肖者之責耶意者其有司之不幸乎或天意竟將晩成也自愛幸甚葉廷用至聞三郎有疾今當何如大郎學業已當大就其餘諸郎想皆彬彬如此執事亦足以自慰矣深旅食京師常忽忽不樂有難以相告者月初䝉恩待罪史官祗懐慚爾奈何奈何家人東行聊此奉啓績之伯立皆不及奉書㑹間儻出此紙足矣時下嚴寒保嗇自愛與李百朋二首勵齋來得手教審起居多福賢郎向學極慰逺懐古人有言富貴春花雨後紅耳人生行誼感應如響造物之巧誰則逃之後來善惡之師也吾百朋聰明學識俱過人目下似淹滯又安知天不報之以乆大耶居安身健課子明農復有文酒為樂此自神仙境界珍重珍重深老矣十年去國萬里一身此䝉聖恩垂念拔擢清華玉堂重上真如夢寐過望過望過分過分便中聊此附言餘惟為道加飱以需蓴鱸之盟不具山居新作榭在玉華之顛昨乘月登之殊有異景因念吾白山無由縮地也奈何奈何雨後新涼得暇幸枉過一敘懸企與姚時望二首别來不審貴恙何似所託想一一用情深無復南顧矣提學到吾家子姪輩恐作一番畫餅耳如何如何令郎當在高選却有費用辦否楫兒只令讀書與静坐夙興夜寐便是功夫瞿生稍稍誨諭至叩至叩寫得途中雜詩一巻付楫見之知我近况也所喜舊病盡失頗耐勞苦復恐是秋後熱匆匆不多及小僕來得所寄書甚慰甚慰令郎已入學雖是小試三代書香亦邑中盛事恨不能為助也舊恙秋來都好小兒得拘束誨益大矣想能體悉鄙懐楫將冠煩時望字之乞一説為教如何僕意楫以操舟必先舟作乃繫安危欲以思豫與豫舟字之必得發揮乃可令郎能來與小兒講學已命楫禮之僕當圖報也與姚子明二首伏暑過廬嶽得報小試獲雋為之喜慰為我時望亡友含笑而揮涕也但不能奉餞耳薄儀别具鑒之楫兒學未成遂䝉當道與進誠所謂附青雲也何幸何幸已命相侍世契之雅想敦念之洗耳聴捷音容致賀極草草石屏承佳篇感謝感謝但作長篇須要轉摺變化轉摺在換韻變化在押韻若押韻不穏貼便成薄弱昨明卿歌頗得意可同此言參之與姚玊厓别後自春徂夏皆在病鄉一味畏濕耳今嵗雨多生寒故比之前兩年覺重望七老人不特受制時候而已玉厓向來何如近日已買得山之昭慶有茂林修竹佛屋拆盡别作小亭館以為娱老之計當有蕭然之趣不知玉厓肯來同住否世安弟病目杜門已兩月餘秋已新不可無一訪也楫兒就臺試必相見專此起居邑中小考如沈生希臯亦不與此外舊科舉共有廿一二人遺材亦是詫異事大率小率皆難憑據付之一笑餘惟保嗇以躋上夀不具六月十九日與馮㑹東二首昨夜風雪中遂宿浦缺口幸無他可勝瞻望承示和章甚佳適得東坡韻咏雪兩篇是令郎雅製持誦欣羡為雪竹喜賀不已異時當奉識也謝謝張遜之山石肯惠然要須禮求之牡丹恐俟來年秋分可移亦宜愛護以待呵凍草率亮亮深春來抱病乆卧郊居人間事都謝却載石已命兒輩處之來意多感力疾草草不具儼山集巻九十四
