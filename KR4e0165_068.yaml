body:
  text: 儼山集卷六十八明陸深撰墓志銘七誥封太宜人楊母墓志銘楊太宜人氏蘇諱洵故無為州知州贈順天府治中靖菴府君之配今南京太僕寺少卿陶園公亘之母也自太安人加封太宜人自歸進士為婦為寺卿母為貢士祖母為曾祖母為髙祖母自正統丙辰生夀九十有三以嘉靖戊子閏朔考終于正寢太僕卜以明年己丑某月某日葬于某原以從靖菴府君之兆域其猶子吏部尚書偲菴公為狀以問銘於前史官松江陸深深受知太僕太宰二公間舊矣適兹道南辱厠弔客之末弗獲辭既來延平太僕走二孫公輔公載以速而太宰之命再至矣太宰之言曰旦母棄養十有一年幸吾伯母之康猶吾母也今已矣有待于子是時太僕太宰並躋稀年二母餘哀與訓俱積且太師之昭穆也有風化焉深又安敢以弗著按狀蘇故建安望族竹坡翁配鄒實生太宜人太宜人幼端慧凡女紅皆早能父母愛之初太宜人伯兄泰娶于楊故劉夫人時時過蘇氏家劉夫人者貞素府君之配也一見太宜人悅之即為靖菴求配蘇亦欣然諾焉劉夫人遂脫二金叉為定天順丁丑靖菴舉進士奉旨歸成親迎之禮既還朝選授直𨽻無為州知州偕之任在任數年內助居多靖菴剛而負氣甲申考滿北上過淮竟忤當道坐失官太宜人自無為㩦家從大江間關而還還奉繼祖姑劉夫人于堂克盡婦道成化庚寅劉夫人養終靖菴始别居於所居之左壬辰乃徙居焉太宜人內總閨闥外應賓祭悉綜理之處妯娌待姊妹曲有禮意食指餘千撫御之咸當推恩衆妾視諸庶生子等於已子不但不妬而已性又好施賙窮乏助婚喪凡道路橋梁之役有聞無吝平居寬恕特嚴於教子𢎞治戊午靖菴卒太宜人慟絶之餘躬親終具太僕自天府奔還舉禮以襄事靖菴嘗擬作夀藏於太平丘矣至是太宜人忽夢與府君各乘籃輿後先詣吉祥僧寺徘徊四顧若有所屬者既覺以語太僕亟往訪之蓋寺後有園府君嘗與見素諸公之所遊而意樂焉者也見素者刑部尚書莆田林公俊也中有阜窿然起風氣鬱盤林木華茂遂輸重購以營玄堂今太宜人之所從以歸者即其地云過太平逺矣人以為默相辛酉大僕起復天府遇恩典受敕推封乙丑轉治中再遇恩典封贈皆如制正德丙寅上疏移疾以便養與誥俱歸及門太宜人冠帔拜謝如禮遂命焚黃如故事明年逆瑾亂政太僕勒停于家遂即所居少南闢園池構庭榭嵗時奉板輿周旋其中太宜人甚安之如是者三四載瑾既伏誅太僕得召還敘用意猶戀戀然不忍即去太宜人揣知之促之曰朝廷恩厚矣胡久不治裝耶毋以豫老故及今爾尚未老也翌日遂獨去壬申改南户部郎中然念太宜人不能置乙亥夏乞休不允冬疏再上吏部覆奏宜奬恬退詔進一階授南京太僕寺少卿致仕歸太宜人年逾八十矣清明康強如壯時每晨起焚香誦佛即視諸女孫習女紅飯飽時或㩦諸孫遍歷堂廡嬉遊以自適寢室外有盆花數本時抱甕灌之夜則篝燈取故衣補綴以畀卑幼太僕每勸止之則笑曰藉此以消夜不為勞也蓋其損已惜福者類如此嘉靖壬午乙酉詔養老太宜人兩荷米肉綿帛之典人以為異數安榮和豫如是者又三四載而後委順焉嗚呼髙夀懿德厚生令終宜為人瑞為家寶為太平之盛事太宜人可以不朽已子男一即太僕亘字恆叔有德有文娶鄒氏繼娶黃氏息女一適五經博士朱壆文公十二世孫也庶子一暄娶張氏孫男三邁鄉舉士次選次適孫女一未行曾孫四公輔公範公載公輿俱府學生曾孫女三長適雷藎府學生次適周臣武舉署都指揮同知次適范宣貢士玄孫三玄孫女三其楊氏世德具載西涯先生靖菴葬志西涯者太師李文正公東陽也靖菴之葬文正實銘之兹别為之銘銘曰既以從夫復成子逾九望百再承旨母之懿範女之士保大相門伊其始國有忠良家孝弟前千百年後萬世我勒銘詩職太史良沙范先生墓志銘良沙先生范公卒年八十有八蓋考終云既卜葬法當銘其子户部員外郎韶以屬之同年友陸深其外甥朱應辰實為之狀按狀公諱畬字耘夫别號良沙主人姓范氏寶應人也范故寶應著姓時為之諺曰前徐後胡左范右朱咸以資稱而范尤朴直大父諱宗泰父諱禮俱被服儒術未顯也公生特秀異然多智計父以其素羸也使治賈公弗欲強之乃就治賈賈有贏凡增鏹若干千凡拓地若干區凡買田若干頃日豐以大人曰范氏子賢良賈與公聞之笑曰是賈吾也凡賈有道增羡起責轉委駔儈非纎嗇筋力則不得贏昔計然用以興越吾試于吾家吾宗鴟夷子皮非耶夫縣官食租衣稅而已生無益於縣官雖贏何為會嵗飢公輒輸粟若干于官例授冠帶公屬其子韶曰吾將為漢卜式耶式忠矣而非吾志孰若顯于儒術以佐于國家是當在韶乃專教韶韶益奮于儒術起取鄉薦公喜曰兒固當亢吾宗矣未幾長子新病卒未幾刁孺人又卒公用愀然韶識公意弗敢去左右每嵗計偕輒歸凡六往來公恚之曰吾年且八十兒未顯尚誰待耶韶始往試天官名在第一授禮部司務公乃悅韶竟念公每嵗以便歸為公夀辛巳今上皇帝入繼以頒詔歸某年武宗毅皇帝升祔以頒廟號歸某年永福長公主下降以選婚歸某年興獻皇帝上尊號則又充使歸歸輒張燕樂歡韶每侍餐公故加一餐也韶得辭去去遷户部員外郎階奉訓大夫顯矣公遂病韶又以使職便歸公力疾倚門曰吾固知兒必來也居閲月竟不起實嘉靖七年五月草八日也配即刁孺人有賢行子男四長即新次翊次歆崇府典膳次即韶女一適徐行孫男六嘉謨嘉禎嘉議嘉祉嘉兆嘉愛議祉並縣學生孫女十二人曾孫男五人曾孫女六卜以明年某月日啓刁孺人之墓合而大封焉禮也公倜儻修正言行恂恂有規矩不事浮華事父母有禮事兄有意度撫弟有惠育諸子有道父母沒執喪禮即儒者弗過處宗族有恩與人尚義信有心計故常裕多交名人又喜談説古今稱先王人無弗知敬重公也嵗鄉飲為大賓詔下存問長老兩賜粟帛嘗聞公與人言嵗儉豐曰旱則資舟水則資車言貨殖曰貴出如糞土賤取如金玉言農畝曰欲長錢取下榖長斗石取上種皆善名理即儒者亦弗能過也深家故江南逮壯北遊取道淮揚必式公廬且韶又兄弟行也以耳目所睹記若此槩於朱君之言皆核可登載自惟以罪斥過公門而不敢入哭得南郡逺又弗克會葬而言又無徵重辱韶也咸可流涕云乃追為之銘納諸玄堂銘曰同理異用觀厥會通君子之風彼蓄此施其出不窮君子之功吁嗟乎范公渺渺良沙匯為若封異姓同宫過者必式于邑之東敕封徵仕郎刑科給事中龐公墓志銘丹菴先生姓龐氏諱能字大寬澤州大陽南里人也以子浩參議貴章服第四品大夫徵仕郎刑科給事中其實封也公資貌魁偉朴野慈良語言琅然然必依於孝弟忠信乃已故未嘗與人忿爭家嘗纍百金仲兄欲專之雖一毫不敢與也事仲兄甚恭時或遭撻辱罔弗敢順嘗若恐傷其意者鄉人至于今稱之成化中山西大飢人至相食大母王卒經紀喪葬甚力諸兄時適行賈食指頗衆皆賴公以濟正德中嵗又祲鄉人逋負積數百金悉焚其券大抵公以勤儉起家而以隂德積行將古所謂仁義人耶至老不入公府嘗舉為鄉飲大賓云享年八十有二以嘉靖八年已丑十二月草日考終於正寢少參君自浙籓奔喪深適聞晉臬之命遇於大江之南弔且哭焉既而請銘其藏按龐公於澤故家也七世祖資資生淵淵生沛沛生濟安濟安生宏公之曾祖也宏字彥隆洪武丙子鄉舉歷臨漳新安狄道安仁四學訓導博通五經贈工部主事曾祖母趙氏封太安人祖諱毅字克勤永樂丁酉鄉舉仕至兵部職方郎中祖母陳氏袁氏俱安人考諱聰字至明妣王氏實生公配牛孺人以賢稱子男三長即浩娶顔氏宦業駸駸有聲實次澤娶王氏又次沐娶劉氏息女三長適縣學生趙伯貴次適牛宿次適李時修孫男四曰敦曰敷曰教曰敕孫女四以某年月日葬某山之原是宜銘銘曰委蛻而遷誰則不然况也令問亦有髙年厥所難者其後允賢服哉雖衷絲綸載宣既順既安亦榮亦全過而必式鬱鬱髙阡於萬千祀左岡右泉視我銘詩以考承傳王母劉孺人墓志銘嘉靖七年春二月十有七日王母劉孺人卒於松江之郡齋孺人安福王先生木軒諱秩之配也孺人有子曰學孔學孔舉進士授推官于松孺人之所為來也蓋就養云初孺人至自安福是時順德何公子魚守松以推官之廉慎佐已也乃迎拜孺人于堂下退而喜謂諸僚曰此真魯卿母也及是卒公親為之衾殮如禮灑之泣曰魯卿之母猶吾母也已復雪涕為狀以告于陸深使為之銘深前為國子司業時識魯卿于館下器之及孺人之來松也復為魯卿為孺人夀且祝將以終惠吾松也奈何遽至是耶深適赴召道松哭之魯卿迎拜且泣且前又再拜曰學孔不天兹將奉柩歸以某年月日合木軒府君之穴惟吾母不朽之圖敢以請乃受狀為之志曰孺人姓劉氏出櫟岡巨族父公獻隱德弗耀母鄧氏實生孺人幼有異質長益修女德父母鍾愛之曰必配良士年十九歸木軒公族人以為稱既歸克盡婦道事舅姑孝敬備至家政巨細悉入綜理舅姑亟稱之曰得此元婦家之福也木軒苦學孺人躬織布為助計日三必成匹百費皆從中辦故木軒得一意於學遂有重名于時為學者所宗師有兩子課之亢宗會仲業成而夭木軒歎曰豈天不欲相王氏耶孺人抱魯卿于旁曰是尚在造物者固有待也復何憂既而木軒下世家遂中落孺人益勤苦為王氏門户計賴以不墜嘗泣謂二子曰汝復何望耶魯卿益勵于學或有外侮至抗聲曰爾謂孤兒寡婦易欺乎天道好還請試思之聞者愧伏會魯卿領正德丙子鄉薦登癸未進士孺人喜曰季子成名矣則又泣曰恨汝父之不及見也至松每見魯卿公退必問獄訟幾何何狀輒戒之曰務刻深文非王氏家法吾不願聞有此子孫也及見魯卿槖中蕭然常祿之入不暇給則又喜曰吾行時族人謂吾富貴矣今日所見殊不逮吾始知吾子之能廉也在松未幾每西望曰吾西日耳旦夕未可知也寧汝纍耶行且歸矣愛民為國須好為之所以報老身也煦煦為母子得無細節乎先一月魯卿以公事過蘇母子别時笑言欣欣然無恙也歸信宿而變作享年七十有八以天順辛未五月十二日生云子男三長學閔娶李氏繼劉氏次學昌娶彭氏次學孔即魯卿也娶劉氏女二長適彭育次適郭某孫男二長世祿次世官孫女二嗚呼孺人出自名族歸于故家其所聞見要之固有出凡異常者獨其茹辛崇素以為王氏衍長文獻之傳甲科聫武若今太僕少卿學夔進士學舜皆自孺人焉成之勤儉之風至老不衰則於王氏可謂有百世功矣善乎太守何公之論曰孺人蓋有丈夫所不逮魯卿政績丕顯而華要伊邇則孺人之所以報食于天者固大受而遲發之耶是宜銘銘曰其來也歸如其全以歸也寄如其賢子而母也以屹如奠如陳母嚴孺人合葬墓志銘陳孺人嚴氏以嘉靖元年壬午六月五日考終於里第越四年乙酉正月朔日庚申啓南疇陳公之竁而合焉先是太學生文禎祈得一官為孺人榮謁選天曹自京師聞訃哀慟匍匐走四千里還卒哭慘怛感動一鄉人及是葬有日矣縗絰奉中翰王君世美之狀問銘於陸深按狀海邑著姓稱嚴陳家世聲望故等夷也陳松巖翁諱衡嚴怡蘭翁諱復又交好也松巖有子曰泰即南疇公公幼偉竒卓卓能自樹立怡蘭見之曰吾有女真若配也遂締姻焉及笄歸南疇公已不及事松巖闕夫人備盡孝養及南疇蚤世事夫人益謹夫人每呼之曰賢婦賢婦能使吾老忘吾兒也怡蘭無子孺人自陳奉養之無闕事怡蘭以髙夀終孺人與之訣曰吾父無慮嚴氏之不食也即吾有子孫矣怡蘭曰果然吾瞑矣故今陳氏祠嚴氏云成化丁未嵗飢有賑貸之令孺人慫恿南疇輸粟數百石應格自舉文禎後嘗從容謂南疇曰自度吾再育難矣如君後嗣何乃為置側室詹氏有子曰文祥陳數世皆單傳至是始繁人尤以此賢之享年七十有二以正統辛未二月三十日生云子男二長即文禎勵行績學娶王氏東溪少參長女次即文祥以義授官千户娶顧氏息女一嫁梅萱孫男六璨玠理􅀈琮玘孺人仁慈有禮勤勞于陳甚大教訓子孫動有矩範日給裕而機杼之工至老不衰嵗時享祀未嘗不澘然下涕也蓋其天常之厚如此梅氏甥嫁豫家豫故知之尤悉宜銘銘曰陳之大嚴之功下從其夫以夀終陸溪之南氣蘢蔥後千萬年胤嗣無窮徵我銘詩其由衷處士思巖唐君墓志銘嗚呼此吾思巖唐君之墓君諱啓字世明世家上海南京後軍都督府都事桂巖府君之仲子都察院右副都御史拙菴府君之孫也祖妣尹氏封恭人妣余氏封孺人君生而秀頴工進士業屢試場屋不遂而後棄去性至孝兄兄弟弟親親賢賢各遵典憲余孺人素羸疾君事之每飲食必謹孺人每飲食君必樂也都事公遊宦兩都君自家經理資給惟力南都之訃至君徒跣千里扶以歸喪葬如禮與人交不為畦町開口論事峭直無面背人以此服之其於人情物態多所曉練卓有不羣之志年四十七以正德十六年十月二十四日病下滯而卒卒之日人愈哀之娶梅氏邑之舊族賢而能家與君相敬友終身未有子也為置媵妾以俟君每歎曰吾中丞公清白忠諒有功在國家將誰食之報耶吾都事公猶未融也吾兄千兵公世昌唐之世嫡也而德厚卜其一孫屬之梅曰母之且祝之曰庶以承吾志也遂名之曰承宗承宗長而就學娶倪氏左右孝養君甚安之及是葬有期矣乃手自為狀衰絰匍匐泣且告曰嵗在未月在丑辰值壬寅原在某溪謹奉以襄事焉敢以銘請深不覺失聲以慟吾思巖君之重不幸也每憶少時與君同壻于悅清先生之門嵗時往來聫鑣共載翩翩兄弟也同處庠校以文字交好甚密中間離合出處之際期勉規誨者多矣方將恃君以老而不虞君之遽至於此也俯仰今昔竟何心哉竟何心哉為之銘曰桂茁蘭芽發不長珠沈璧隕竟誰傷傷哉衍裕弗可常緣情起義後必昌粵有不朽垂耿光得羡為彭喟為殤孔悼回學今則亡黃生不祿鄙吝萌為仁為夀孰主張一氣茫茫繫彼蒼吁嗟思巖其永藏儼山集卷六十八
