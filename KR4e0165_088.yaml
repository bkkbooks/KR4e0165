body:
  text: 儼山集卷八十八明陸深撰題跋三跋月影辨豫道順德覽新志讀撖生月影辨而善之其謂非地影者三似矣而未盡蓋日中亦有影故也夫道體之全三有神有化有物不測之謂神無迹之謂化有形之謂物隂陽神也寒暑燥濕幾於化矣天地日月物也是故日月者水火之精也水火者隂陽之粗迹也水內涵火內暗液而為濁凝而為氷水體則然也蒸而為煙熄而為土火體則然也月中必有影日中亦然所謂查滓之未盡者故日月不離於物也狐兔者自下視之取象也猶觀逺山然近則否非地影者蓋月有魄而無質也故無所受與瞳鑑當異造化之理甚深有言語所不能盡者聊附此説於後以就正焉跋李嵩西湖圖此卷購得之長安當是西湖圖第有蘇堤而無嶽墳豈思陵時畫耶或云李嵩手筆然無題識可考觀其粉金題額非宋人不能書也豫夙有山水之好頗留意錢塘之西湖昨嵗出持浙憲輿舫往來若為已有既去而未能忘之今嘉靖戊戌臘日邂逅此幅恍如再到時適有山陵扈從之行表弟顧世安黃甥標從旁贊賞以為人世等鴻雪爾正可臥遊神往槖中自合貯湖山也豫笑曰吾老矣不復能有登臨之興儻遂歸休得從二三子於江海之上左右圖書以樂餘年是卷也寧非豫鑑湖之一曲耶聊記於此跋薑明叔西湖圖記韓昌黎畫記如畫至王摩詰輞川圖皆詩也明叔為豫作此記鋪敘詳贍有法展圖復讀之彌佳顧中舍汝嘉以小楷寫之亦復楚楚可樂也凡物至於可樂外境隱矣世恆謂古今人不相及豈其然哉跋鮮于伯機草書千文此卷千文豫屢見之其一勒石於四川按察司後堂其一表弟顧世安所收京師見一本乃臨書也與此卷結搆行欵俱同困學前元時書名與趙文敏松雪相埓或謂遒徑過之好事者至云松雪每以已書二幅易困學一幅焚去以其軋已也斯言何謂而學書家乃有發塜嘔血之事將後人之談柄耶顧松雪書法盛傳於時而升堂入室者往往有人其甚乃有奪胎亂真至不可辨詰而困學之法傳者落落此卷跋尾所云南方士大夫以豫北人粗識點畫固是撝謙不方重出若云雪寒晨起筆墨不調等語豈容一朝之頃為一任俟連書三四本殊以為疑而未之解但筆力當以此卷為勝壬寅巧夕試筆跋師子林圖此卷師子林圖徐幼文作凡十二段段有題名以古篆隸寫之獨損其一按圖當是雪堂云各係以五言詩凡十二首不書名氏後有少師姚榮公跋尾想見一時之文雅可補後來之郡乘榮公稱余友幼文洪武間為師林如海作十二景余嘗題其上頗有稱譽卷中之詩當出榮公無疑而詞翰盡皆簡健按幼文名賁仕至河南左布政工詩能畫吳門四傑其一也師子林在吳城東北隅本元僧維則之道場最號奇勝則好聚奇石類狻猊故取佛語名菴首圖一石題獅子峯者是已或云則得法於本中峯本時住天目之師子巖蓋以識授受之原也姑蘇新志維則字天如姓談氏至正初人而跋尾稱如海師豈即其人與但榮公跋於永樂丁酉似為其徒攜至京師而作故有四十餘年之歎而興感於幼文如海之謝世矣嘗聞榮公以少師還吳訪其師於師子林為所拒至夜漏深以微服往叩後門求見有僧瞑目端坐止以手捫其頂曰和尚留得此在蓋榮公功成貴顯猶本僧服故不曾蓄髮徐云和尚撇下自已事却去管别人家事恁麼榮公憮然而去可謂本教中之喝棒手乃大善知識豈即維則與又聞榮公法名道衍嘗學於相城之靈應觀道士席應真者盡得其兵法機事執弟子禮豈還吳所見乃應真耶顧風旨嚴峻粃粳事功異學中自有之不必深求其人亦可也暇日偶閲此卷因重裝之聊記於此若師子林之題詠尚多而幼文亦自有作天如詩尤可誦併録於後以資間中之一覽跋南牧稿余論文嘗欲如觀海海水也然可江可河可湖可淵可瀨可濤可澄不欲如澗溪汩湔激折縱不可涸才一體耳讀斯稿可以償吾素也跋邵二泉西涯哀詞右户侍邵二泉先生國賢詩一卷皆西涯李文正公卒後之作以致哀慕者萃寄都諫俞正齋國昌國昌示深讀之迂曲之情不可已敦厚之義不可窮實近世以來師生之所鮮有千載而下讀之猶將涕泗滿襟况於識西涯知二泉如吾國昌者往嵗丙子秋深起告北來舟次廣川適聞文正之訃亦有一詩哭之曰細推天運幾生賢又是山川五百年廊廟江湖今復少文章功業古難全重來東觀嗟何及再過西涯定惘然白髮門生傷往事每看憂國淚雙漣壬申二月深嘗與修撰何粹夫瑭檢討盛希道端明謁文正公於私第議及國事公手揮雙淚意甚悲愴落句蓋紀實也因附卷尾以諗於正齋云跋顔帖右多寶塔銘豫借臨於金陵羅敬夫輿敬夫豫鄉同年也豫家尚有善本遂舉以歸之然完好猶是百年前物豫後凡得數本皆不及己巳嵗南歸命工重裝蓋有感於生世之晚也又跋顔帖豫於書篤好顔書已幾於道矣豫所有大字則東方像贊行書則爭坐位藁又得蔡成之分家廟碑數行廟碑字結體小異而此帖沈著森嚴大小勻稱豫讀書內館時嘗倣之時同年王欽佩號善書嘗詆顔書為村夫子其所臨拓者則歐陽通穆伯潛素拙於書謂通書輕佻若不檢士而於顔好之忘味云豫每舉以為笑豈能者固不能賞而能賞者乃不能之人耶漫識於此蔡名天祜睢州人王名韋穆名孔暉跋淳化帖豫未嘗見淳化帖舊在南雍得此帖於同舍郎趙受夫宬比於長安觀江太史抑之家淳化帖與此正同戊辰冬南還與魯司業振之聨艫同下於漕河觀振之所藏十卷者後有宋元人跋字與此又同乃知此亦淳化帖也重有感於昔之寡陋為負此帖豫聞淳化帖用澄心堂紙李庭圭墨上有銀錠紋余所見者皆不然豈别為翻刻而尚冒其名耶當求識者鑒定之跋蘭亭昭陵永閟千年迹定武猶存幾樣碑今人間定武又閟不可見矣世逺則同歸於盡何物不爾近世蘭亭翻刻稱汴中絶佳金陵購得此本紙墨又佳也又安知後之歎此不如彼者耶跋石湖一曲卷吳之石湖有二其一在闔閭城之西南上方山之麓宋范文穆公成大所居而因以名者也其一在吾松城之西南闕水之上吳氏居焉松湖大不及蘇而景物幽勝水壤清嘉亦一奧區也勝國時吳氏有字益之者仕以州别駕歸石湖修隱操抗志文雅陸居仁所為作記者也益之幾世孫稷少有美質文名燁然起鄉邦舉甲戌進士為郡理官來京師出此卷示豫受而讀焉夫人以地重人亦有自重者焉然後相為不朽也始之微而終顯者繫其後始之顯而終微者繫其先先後相承有交重焉者然後為世家為舊族為故國使江山生色閭室起敬而世恆以是為難也是故登臨古迹則有興衰之感水木在顧未嘗不致考於本原焉舜弼亢宗嗣先鄉往未艾文章政事他日不難於文穆公之重石湖也特未知范氏之先與益之輔之輩竟何如哉舜弼宜珍襲此卷為吳氏之河圖丹書可也按居仁字宅之元鄉貢進士黃清老榜第七人文詞富艷與鐡崖楊廉夫曲江錢惟善交遊聲稱埓於一時既其殁也同葬于山世謂之三高墓云此記文既典贍書亦遒麗可寶云跋聖哲圖右宣聖并十哲像為今太宰水村公所蓄既重裝為一册將録史遷諸傳於右方深退考史記德行首科特少伯牛仲弓二傳而一時紀載多非實録昔人謂子長疏而不學豈容辭哉適有浙刻宋高宗七十二賢贊墨本因為列寫雖辭乏雅淳然一時人君知所崇尚如此其功倍於章縫之士逺矣按高宗所書諡贈皆仍唐舊又為附録開元褒表之制於後以備一家顛末復以孔子世家一論冠於首夫孔子以布衣終而遷知升之諸侯以啓萬世王祀之尊雖聖人之道不因是而為隆替遷於是乎有功矣水村公出入將相留情此圖固有深意至其鑒别古今圖書以考證史傳之訛闕殆今世之歐陽公劉原父米芾而下弗論也獨謂此圖乃宋人之筆卷尾糢滅數字當是重和元年寫真按重和宋徽宗紀年信然無容辨者深嘗見友人許誥廷綸所藏房杜小像真迹與此行筆正同意為唐人所作而卷尾題字細加檢認墨新絹舊必一妄男子所汙復為識者去之而未盡也深非知畫者請以理辨夫畫家之敷染粉墨雖極工祕決有承傳千載猶一日也乃若大賢君子之風神意度與夫步趨氣貌之精微所謂與其人俱往者此則流被於近而漸遺之於逺無疑也今是十一像氣韻典刑出於毫素之外此必近古之人能之而決非後世之所為也因留齋居參校宋像朝夕瞻對如身遊洙泗親接聖賢於唯諾之間取以為省躬修已之助者良多又不特區區識其器數而已古人謂書畫真有益者如是因併著鄙見且求是正於公云跋陽關圖右唐王右丞詩世所傳陽關三疊詞也調存而疊法廢往在京師日與王陽明都南濠論此或以為每句作三疊歌或以為止歌落句三疊迄無定説而紀載亦各不同意當時必有譜而今無所於考也或以為每句一歌每歌一疊輒減二字至三疊則歌三言矣言皆成文頗有紆徐婉曲之調似盡離别繾綣之情殊為有理而亦未知卒合於本詞否也此圖余所藏李嵩舊本思齋子命工模之西土景物藹藹有思致可備覽觀非徒以工為也因録本詞於左方并識是説以審於思齋子跋范石湖辭右宋范文穆公九日小辭題曰石湖燕山作當是隆興議和失受書禮范使金國時所書壯浪奇偉可寶也公此行危甚立後而行至金以附奏并夏人通書事屢瀕於危賴以重名為金所敬信而免高宗臨遣時亦嘗勉以囓雪餐氊之事故落句云惟有平安信隨鴈到南州蓋喜幸之辭自後一月歸矣公宦業文名為南宋冠冕家在石湖之上故號石湖居士云此卷今為歙黃子靜所藏嘉靖甲申秋攜過江東山居相示觀賞者久之敬書其後子靜名湛文雅士其父南山翁常與豫交好云跋陶氏家譜譜牒於士大夫家關繫甚重而尤重於武爵者之承傳士大夫以文墨名家宜不難於譜牒之修舉也而以干戈韜略用世者宜未暇焉先世文獻議例精詳若陶氏兹譜者不尤為可重耶公武揮使督運北上特以示史官陸深是可謂國之文武材而家之肖子孫也敬書其後而歸之儼山集卷八十八
