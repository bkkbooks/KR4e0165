body:
  text: 明陸深撰書奉梅月伯父陸資到奉教言深感至愛備審夀體康强細觀字畫皆無異少壯足以占夀年綿逺不勝為慰所示弟姪入學門戸之光皆嚴訓所及但須努力向前以期逺大姪之所望於後人者此心更自切也老父仰望伯父大人時賜勸譬得以頥養老境修墳造房等事一切當付與深也如尚有過當處乞念深含容之深自入冬來舊病漸除但新差司禮監教書雖則五日一往内臣有三百餘人俱從教授兼出入步行十餘里極為辛苦職業不敢憚也京中事體聖駕雖回在宣府祖宗法度具在人心安然如故况關係甚大乞不勞過疑也家小春間須作來計遲速之間伏望主張行裝粗能備辦也家人如教禁治家小起身以後浦東大小事宜俱望教戒時世如此安危未保不可自受累也餘惟順時保重以享上夀奉東隠叔父溥弟到京具審夀體納福并諸動静不勝欣慰家小及兒女在路安寧四月廿二日自河西務起車抵暮入城雖受辛苦幸無險阻皆賴叔父餘庇也姪居此守官粗遣但監事煩冗早莫奔馳兼時下不測每懐憂懼爾家小既來於姪雖便老親左右無得力人仰望叔父時加撫問不至寂寞也今年科塲兩弟考試未知何如當此之日家門已大須防小人侵陵惟有子弟勉勵讀書可以支撑今各房中惟有此一路可行叔父教子之心甚切故敢及之餘惟順時保重為祝與唐龍江三首近趙國賢還曽具啓達伏審邇辰台候萬福夀堂暨賢妹甥輩均安為慰深衰病日深思歸殊苦比兼攝湖東奉咨裂紙將過信州差人云欲開局修八朝國史不知㑹典結局未令郎聞已授官矣未有的報幸示知江西科場吉安最盛有時名者皆不在牓昨觀南畿録吾郡之否亦開科來所無豈文體將一變耶江録漫往不知舊生徒有幾草草附瀆餘惟若時保愛不盡所欲言者深寓蜀二載如在世外東望故鄉聞問為難兩辱手教無任感慰比䝉恩出峽抵荆州取道北上復過安陸謁陵徘徊山水之間念皆執事過化之地也為之慨然如挹顔範方今天子思求耆舊而用之恐隆中未得髙卧少須勸起以慰蒼生之望深此行速為入謝將圖自便然善後補過之方幸有以見教也至叩至叩兒女輩在家過辱骨肉之愛非謝可盡行次草草不謹直齋芋西公㑹間為道瞻企之私餘若時保攝為禱疊辱教惠極感記存具審道候萬福為世師表足慰瞻依邇聞海冦擾攘寒族髙門唇齒相依倚執事為帡幪也况老荆弱孫尤在咫尺幸垂清拂今日始知城池之有用也留意留意兩甥失解南還及夀筵骨肉團圞人間至樂楫兒多病且留過寒他不足道也深衰病侵尋憂疑滿腹臨紙無任惘然世全甥䝉時存候異鄉骨肉賴此與世安耳恐要知餘惟若時珍重與表弟顧世安十六首令祖詩云當門五株栁負郭二頃田此東歸景物如此余既無田雖栁亦不可得近營别業以待東歸姑欲揷栁須乞五株種之乃可冬月將盡幸能惠我否乆别欲一話風日和暖時望過一宿至叩本乾但知其善醫未知其好道也非昨見示幾為失之此人博聞多藝夜來與陳生同榻往來辨論僕隠几聴之自足為樂吾未暇究竟其淺深何如但其器根不凡妙具圓融豈所謂湖海之達生者耶賢弟留作伴數日未必無益齎持玩物吾第一見之足矣恐别有主者明日止為郁直齋李南園二公天氣佳甚一來如何深啓得夏間書甚慰昨見朝立乃郎云有書尚未送至今早唐士冏憲副家人到及見孫廷圭問及頗道有一二不如意事令人馳念不能已處今之世務須安静含忍為上吾弟素有見處自能中節如劣兄者不待五十而知四十九年之非矣舊病侵尋時事多棘老幼在念奈何為懐敝廬薄田已足讀書待老頗悔此出之謬也豈世縁尚未了耶身外事自可付之悠悠矣姑娘而下想均納福粟例再開恐令弟亦須乘此㑹耳孫壻小試優等不負美才聞之喜慰向朝立在京時曽有言欲求自便計今尚在否從厚處之須令子母間各遂孝愛之心與區區豢養又過一等也如何如何浦東兒女輩想䝉顧愛非言謝可盡風塵渺然未縁骨肉之聚臨紙悵然兩日有逺客兼先隴事殷奔走不給奈何目下想已康復不復致問承示病源正僕數年前舊犯須早圖之若所謂積熱恐無之盖是肥甘釀成垢膩滯在脾間下虚上壅為痰脾土受痰遂作沮洳濕蒸而熱耳非壯熱也醫家用苦涼之藥最有近效浸成後患尤宜詳審積滯感時氣必作痢宜用白芍藥澤瀉等劑分理之不可驟服止藥今後須食淡省思為要訣此二件乃脾家内外扶持之妙藥也園中晩菘菜肥白連根一截用甜水煮成清湯極有自然滋味侵晨空心啜碗許最宜養脾利膈白芥子時嚼數顆亦好屢承骨肉之愛非謝可盡比日世芳藎臣二生入監又辱厚惠所諭領悉乆客天涯見此骨肉令人喜極而繼之以泣也百凡不勞挂念近又得沈方伯家人寄到書知老父移居北宅心背俱刺四弟失教以孝弟之道致此狼狽亦深之不孝不徳為之南望惟有痛哭而已委曲情事亦惟有賢弟知之族中兄弟俱多離心而嫡血子孫盡不可恃賢弟早晩幸為調護深生死不敢忘也若有緩急之用可分付陸傑顧慶二人處之若再有重大事賢弟權為處置亦生死不能負也桂魁奴狗狂蕩如此深用人欠當豈亦窮秀才命中招注須發遣到京終當重治縁無的當人始終其事須深來春自還可也幸密之密之新府尊行時已嘗致囑去知之深拜啓昨相姪還病目寄數字為信比家僮至頗訝賢弟無書想即辰文候納福官事竟如何也聞九臯大諫來署縣事吾邑之福欣慰無量近知治吾家作過諸奴老懐逺客為之快暢已作書與子壻輩致感謝之私而已深方慚恧未敢頌言謝之儻謁候便先為深致此情至叩至叩楫兒欲出就試深慮其體弱幸教以持心養氣之道不知賢郎諸姪亦有出試否後生輩但不可留意得失以長浮競之氣為佳爾崇明之變近如何當道諸公必有撫禦之術便中幸示知餘不盡所言者深冒暑出巡江湖之上得書如擁冰雪慰不可言楫兒承教愛幸與觀場之末深甚慮其涉世之太早也賢弟近聞出上金陵能攜楫兒為旬月之行深大願而非所必也如何如何遣急足去揮汗數字到省别令家人還修問也極草草比還朝人事倥傯殊非老境所堪也奈何奈何㑹馮汝學説賢弟事甚悉為之驚悸世道如此且安心耐之釋氏以忍辱為修行第一義賢弟自能容受之不必芥蔕可也甬川少宰特䝉留情知之知之秋間望賢弟入京古人云金門大隠豈浪語耶燈下草草附此殊不盡世具甥來縷縷道起居之詳令人逺想慨然走自夏初入都門衰病之餘殊覺人事委積隨分應酬倦即撥置世間榮辱毁譽事一毫不復動念但静中别起一段思慮難遣即釋氏之所謂魔也當持定力勝之賢弟能北來可共辦此功業如何如何䝉恩内轉實出望外兼聞詔㫖曠蕩雖三代恩典或可得也故遂乘此春和入朝自荆襄北去勞勩亦不敢辭也老境奔波乃爾唯賢弟亮之家事乞與楫兒一處楫欲棄逺田甚好甚好吾當成此子之志但須賢弟酌處不使有後累為佳住大江濵束裝燃燈作書殊匆匆賢弟能以意㑹否賢弟有意北來秋涼能遂相見乎深北去盤費人力俱欠亦望與楫兒議處不令荒廢學業至叩至叩老入劇局舉目萬里雖片紙數字猶難得寄雖寄亦未知得達否况他乎亮亮聞賢弟亦時有啾唧此恐是少年作用大過或時事不如人意動火耳吾此來每有所悟亦有一二髙人如何栢齋先生相質問目今通宵宴坐青燈熒然頗有趣味但時有歸心作魔耳留與吾賢弟盡之第未知世縁何如也還復慨然度人經此間有印本寄一部去西樵别當覔便補之闔宅寶眷想皆安世道日下得省一事且省一事餘付之老天而已匆匆不盡所欲言深昨别後入舟作小憇風水俱令人疑懼還入寺中避暑見郁宗周來云見小輿道中知賢弟已入京受累極懐感愧也夜來小女病作比常稍増鬱熱故應爾懐抱轉無賴奈何舟人似催發南去三四公都到行止未定深意欲俟一雨後解維前途任運而已此間無人商量周一之望速之來同載也如張希周差事何時可辭朝抑恐不能待煩一問之六弟汝由姪感渠意甚好世全甥致謝不悉見南載有發者歸心如飛欲隨意去耳入京人望促之幹辦來不知周一之何日下灣也跂足而待附此見意舊恙比之去嵗稍減重裘絮帽枯坐一齋者六七日老態時當如此爾忽聞有人入都力疾附此紙宅上俱安諸郎皆玉立森森從徳尤解事明敏夙成昨入學為提學所稱許亦復作微語為教戒知之知之榮擢乏便修賀兹致少物去引逺誠鑒入故鄉風俗日下亦欲攬回顧忠信素薄奈何奈何得吾弟在朝老僕居鄉亦自遣慰桂翁處每欲作書輒止以傳聞無真的信見間為致傾向之私不盡餘自愛灣下執别無限情感十七日午刻始抵河西風水淹延皆竭晝夜之力前途任運而已去國之人不當作朝貴書亦自老懶遂放舟去見桂翁為道此舟中眠食頗勝惟此而已亮亮與黄竹泉三首令弟瑩卿至多承逺惠書物言謝不盡即辰伏想尊姐甥輩俱安好也深自長兒亡後憂苦萬狀鬚鬢盡白兼有老親之念忽忽如在囚繫中恨不一日東歸得見親戚骨肉為樂也奈何奈何令弟淵卿書來説河弟李廷益房基事深並不知其情但河之嗜利忘義乃其積習必有不當人意處吾姊丈當教而改之可也至叩至叩今日適有丁祭事忙因蔡晟行便草草附此雖七叔宗潤兄處皆不及作書詩巻容别寄上也餘惟情照萬萬承以胎仙一雙為貺與病骨争癯甚慰岑寂但飲啄無豐腆恐戀故主乘長風而東耳珍謝珍謝屢承厚愛不勝哀感竹泉巻納還頗恨諸作未足以發揮髙雅耳姑俟情事少伸當别圖之令弟淵卿與河弟房産事想有善處之道幸早斷之恐惹别議也特人奉請更瀆黄甲近當肥美兹欲逺餽煩為覔數螯佳者恃愛干瀆不次與黄甥良器二首扁為書去四字易後二字以寓孝思易前一字以避俗紙用礬重甚不宜筆只寫去一幅亦不佳可求佳紙至當寫去聞新樓成東望在目余老矣何時一登以望大海為快也昨承園果乳酥之惠感感俗事擾擾無一刻閒暇病餘無可驅遣稍覺淹遲勿訝甃堦卵石儻有剰便中為致一二斛許不一不一近日人來得畫巻多謝裝束之勞手柬亦作一巻極見賢甥致意世誼令人感慰為寫跋語去藏之載來石題一檀扇為謝大抵湖石須以無斧鑿者為甲老奴欠眼孔非賢甥初意也絹畫一幅寫舊作其上樓頭秋色可懸懸如見老夫也今春發痰火殊惡昨日始甦過山居打坐須盡此月方接人事賢甥有暇可以扁舟來覔我水石間也四軸已寫畢昶奴負不起俟别致之餘不盡欲言者與黄甥良式十二首比聞舉得男喜慰不可言是日報至予坐南樓適傳秋闈消息欲以應科名之如何連日匆匆未及作答知之薄具少物充粥米幸收之餘留面悉别來三年行數萬里棧道劍閣瞿塘巫峽水陸極天下之至險而寔亦天下之至竒此生遊覽之興可謂饜飫而予已老矣連年三月三日每有事今年以是日渡漢江由襄樊而北四月初入朝遂履任隨分供職昨以孟秋時祫始與聖主相授受盖八年鈞天如夢寐也承遣人逺來欣慰無量得安南議見學識長進且有志也此等事自有一副當人才當之予素不與聞其事此中非紙墨可了北來且自見之知之入監已成就如此亦好第愧無以助之當以逆旅主人為任也楫兒想䝉教愛秋試聴之老天而已餘惟自愛賢閫病何如恐是血虚畏燥耳與汝妗所患頗相類否却好尋醫血惡寒而生於寒行於熱而畏熱要知之唐詩絶句付來一閲明早望日須赴監當守法如是不具知吾甥已入潞河得遂親桑梓亦是一樂吾欲更賦一詩為别祗成一句云老懐旅思更逢秋後不復能續意可想見得書感拳拳一之同此致意張宗之吾甥即道吾意致書無不可者餘不盡昨嚴照來得書具悉蔡老朴魯不甚知事本再上明日當發抄工部西磐尚書面許為行却並乞築城事若一舉兩得亦吾鄉邑中百世之利也昨家人至又得與小兒書讀之得失固自有命爾且留了監事令渠從實地做工夫賢甥歴事已辦但未知何日得見甥面也懸懸聞汝老妗東來小莊不免有擾謝謝所論沙冦本吾民有司失於撫馭遂至如此又不能無師老費財之慮事當如何兹遣學召回欲移家北來百凡望周詳慎密處之至望至望至託至託杭嘉避地之䇿與松城卜居如何亦希酌量嵗暮候報信也續絃成亦足喜餘不盡近得書知有杭州避地之舉不審海上事情竟如何耶令人睡卧不安不圖老景遭逢乃有此付之浩歎聴之老天耳京師事勢又未易以一言了也奈何奈何又聞河決鳳陽兩洪俱竭若春水可乘且攜家北來儻更有阻則卜居松城差為穏便耳賢甥必能為我謀之草草附此日下當别有的確信息也留意留意日來屢承惠海鮮池魚甚慰病起但脾胃尚未開徤差勝前日骨立耳知之知之刻書復成幾種可草草印來一閲病餘因清出雜記畧有數巻寫得十葉付去就煩一校勘若雷同剿説抹去可也予此等文字大意欲窮經致用與小説家不同幸著眼可命照入刻行欵寫一本來有商量處也雪天殊無好况晴霽西來一敘懸望懸望臂痛不減不多及比復惠鱘魚感感連日病勢覺退但脾胃未開耳求醫了無影響可怪可恨吾甥作事必精所刻書不下古人計費亦不貲也篇名嫌不響可題作説海如何有𦂳要與典禮書多入幾種為佳臂痛轉劇指不多及日下望西出閒否亮亮小説若刋須喚得吳中匠手方可發還九種檢入但訛謬極多要校勘得精却不枉工價也予家所有俟天晴清出農書麈史兩册頗便病目留一看老懐為病困殊無賴昨許三府過訪慨然有築城之議但其言太易耳説漳州賊圍定海致書寧波守稱老兄索粮一萬三千其無忌憚若此時事可慮也又云漳州賊每往蘇城市易崇明交通更不可測沿海一帶尤可慮也近便處有得力人能覘候動静否煩一用心為之不宜露消息也至囑至囑候報臂痛楚作字艱難不多及二文皆宜抄録夜來樓居風雨不成寐却恐今年無麥也奈何奈何痘疹書校勘得可寫便寫入刻早完亦一件事了留意天晴過此痘疹論已入刻未吾甥所作後序亦佳老懐殊為喜慰劉栢山北行在近可促匠手早完欲送與一部以答其意耳嵇中散集及麈史俱便病目連日雨中藉此消遣尚未畢也松籌堂集聞是此老手編果精當否可細讀三四過西來商議其中若有關係朝廷典故及可備郡乘闕遺者另録以藏此看書要法也志之志之夜來病思甚不佳奈何奈何稍晴望即來夜話伺伺儼山集巻九十五
