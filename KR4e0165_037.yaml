body:
  text: 儼山集卷三十七明陸深撰序一送都閫王公北歸序今天子神聖御宇逾一紀矣文恬武嬉四方無事在大江以南東至于海尤稱晏然若乃韜略之務實無所於用士大夫之抱負竒偉者咸無所於自見輒思引退若不得雖以病免可也天子亦例可之於是浙江備倭都指揮僉事王公得以北歸公盧龍人也在卑濕柔脆之鄉常鬱衄無暇展布果若病然豫來浙訪公於私門遂以病見而竒氣表然於離褷局蹐之間豫甚疑焉公世受國恩凡疆場之事無論大小險易一切以身任之雖其子若孫尤當以繼志繩武為大非若豫書生然起自白屋茍不得志則求賢者能者而讓之位潔身以去安往不可公宜難於去也豫疑公固有待哉未兩月都閫順菴塢公一山李公以公歸期告且以贈言請豫甚不滿於公之此去而又以不得如公之得去為髙也乃為之言曰士大夫自一命以上皆有委質致身之義進退可易言哉是故知進而不知退者非也知退而不知進者亦非也當進而不知進者弱也不當退而必於退者非惰則有所利也進退可易言哉雖然能退者視不能退者則有間矣故曰難進而易退者古之節也古之人有文武才者不少而進退之際略可考見馬伏波忠勇出於天性建立焯焯至於請擊武陵五溪蠻則據鞍顧盻以示可用冦忠愍出將入相決策澶淵之役可謂有大功於國矣卒之皆為姦人所擠徒以老不知退爾公之此行胡可少哉雖然此特禍福之小小者耳亦非所以論公也方今天下之患惟西北二方為甚強而北陲外諸蒙古部落尤稱四方然非朵顔三衛導之出入不為功蓋三衛於我近在肘腋距京師不過三舍可慮也朵顔等衛入貢之途必出盧龍公自少有志於廓清習知其情狀且逼邇京邑公歸輕裘緩帶逍遙塞上以觀其變萬一有警則朝驟符而夕登壇矣區區東南宜公之所不肯少留也於是順菴輩舉酒酌觴曰公之志端在此請書以為序送都察院右副都御史安齋朱公治河序我國家定鼎于燕北塞南河其事惟大大抵塞上之事十七在人惟河之利害常有天數而人謀之事事者不能二三是故其事尤大天子每出大僚一人主之俾司濟上凡山之東河之南兩畿濵河之地皆得以便宜行事任至重也是故常難其人嘉靖癸巳治河之憲臣闕吏部以浙江左布政使安齋朱公名上上特升為都察院右副都御史俾蒞其任既而塞上事嚴吏部復以朱公宜任宣府巡撫之事特名上請上若曰河事非朱某不可宣府之事可别疏名來上於是天下皆知朱公受知之深而相與頌君相之慎於用才也如此于時右布政使鈞陽黨公請為贈深昔調官延平公適總閩憲得備觀公文武之才經綸之具可以大受者有不得辭乃起而贊公之行以告于衆曰公舉甲戌進士選為監察御史出知鞏昌陟為按察副使于浙江即轉參政繼升福建按察使復進浙江左布政使揚歷中外是可謂善天下之官矣癸未大覲吏部旌天下郡守之卓異者才三人公居最既而吏科薦天下之賢七人公以亷介與焉是可謂永天下之譽矣初巡河東鹺政大舉再按齊魯風裁振揚備兵溫處一道肅靖及長藩臬吏畏民懷是可謂具天下之才矣公自筮仕以及今遷廉潔自持一介不可以取與所至庖厨有終日蔬素者事必躬親雖井臼浣濯之微或至身為之嘗曰古人運甓果何為哉而又兢兢恭慎未嘗有疾言傲色是可謂有天下之德者矣夫履歷以練達聞望以感孚才以濟事而德以將才凡有一於此者皆足以大受而况公實兼之乎其於河事也何有雖然河事亦豈易易哉自河入中國為生民利害也久矣禹迹之後與大運低昻實繫興衰治亂之故蓋自戰國諸人各圖規利始以城郭園田宫室井市之侈繁與河爭而水勢始激為害至于今未平也凡治水工自上流乃克有濟今之汴泗徐沛皆下流也成功實難古河入海悉由東北順下之勢然也今日治河本為運道障之使南似從仰出故理逆而禍大此其大較也茍知讓斯須之利而不與爭凡事講求其本源而不瑣瑣於末流之拘事得順適之理而因事以興利雖公相天下之業亦不外是而况於治河乎聊於是行乎卜也公其往哉送葉白石學諭令邵武序貴溪葉君淳夫教上海且六年矣乃遷為令令邵武司訓伍君汝觀率諸生董繼寶輩來請為淳夫贈汝觀之言曰淳夫剛方磊落動與道義俱不設城府與人交若孤峭往往緩急之際氣力為多卒然犯之不校吾賢僚也諸生之言曰先生教人多方尤嚴於義利之辨生徒貧且病者至割俸賙之而束修之修不修不問也其講學則以致用為實際而一掃髙虛凌蠟之弊其校藝則以德行為首科而文詞為下升堂侍坐之次能使諸生凛然戒懼雖聲色不一假借吾嚴師也豫聞之曰是則然雖豫亦豈無良友之思哉豫憶少時往與計偕渡江道揚州觀同知葉公之為政上下響應如古循良然乃心自語曰他日有官如葉揚州亦足矣又何必位通顯哉是時未知同知為誰也豫既待罪史官友人空同李公督學江西以詿誤繫獄大書江西諸生之義而以貴溪葉生為冠是時亦未知生為誰也輒扼腕歎曰安得若人與之相周旋哉會豫自講筵調官同知延平便道攜家時邑中得新學諭偉如也即來慰豫不甚作寒溫便語豫曰先生當速就道豫竦然異之因以論其世始知學諭為葉揚州之子而李空同所與共患難者即其人也心益異之豫去延平不滿三月萬不如葉揚州督學山西得罪如李空同晉陽諸生候問者殊少益思吾淳夫之不可多得也家食嵗餘與淳夫益相知厚再起蒞浙稍遷江藩淳夫之規誨豫者日益至今還自江西肩藤未弛而淳夫去矣豫又安得無言哉豫行江西逺矣大抵多氣節之士往往類其山川而廣信在江西上遊尤為佳麗故又多文章政事之才若吾淳夫其一也往時少師東湖費公在館閣每向豫道信之丹山碧水宗伯石潭汪公少宰間齋先生昆季又相與躋攀覽眺自負為乾坤竒祕口縷縷不能休夫三公皆當世偉人豈徒詡詫形勝如幽棲之士哉意必有人當之有之不在吾淳夫乎淳夫之氣節著矣文章名世矣世所未必見者政事耳今將試手邵武吾知淳夫必能發山川之光彩以經綸宇內姑自一縣始無疑也邵武延平之右臂豫知其風土朴厚溪山盤固昔文信公之所嘗開府也而與貴溪為近以吾淳夫之才為之其有不以政事名一世乎夫以氣節根柢乎文章以文章緣飾乎吏事吾見邵武之政日起矣異時天子有召考功奏最為天下第一必吾淳夫也或曰淳夫才宜大用邵武非所以大淳夫也豫應之曰此用人之人之深意又安知不以淳夫大邵武哉淳夫往矣於是汝觀諸君子僉曰是則然宜書為序名藩至德詩序嘉靖十一年十一月十日皇帝親御奉天門降制勑一識以親親之寶若曰晉王天性純孝長而嗜學及居喪哀慕有芝草白鸐之祥撫按重臣來上其事兹特遣官褒奬且以風勵諸王尚益篤孝行以永終譽為宗室之光成夾輔之美顧不偉與欽哉故諭於是大行人臣某當陛躬承馳傳續食以往封以芝檢襲以黃帕導以文馬呼傳道途行者皆俯伏頓首屏息以候傳于晉郊黃童白叟咸歡欣鼓舞偵伺所由來舉手加額曰天子之神明也我王之賢孝也及於國門則設大仗香燈旗亭官僚具服奉迎鮮耀登于王宫晉王衮冕執圭北面拜受惟謹士大夫之能言者咸作為歌頌以侈一時之盛美于時前按察副使陸深適有事于晉與觀斯舉王以左長史馬朋來致命曰敬哉汝宜有述深以罪辭王再命曰咈哉汝舊翰林也何罪之能辭深昨任事時辱殿下知奬慰勞至于再三且孝芝之作已嘗附名諸公後而翔鸐為異則又見於河中王等之奏特勤璽書事豈偶然乃拜手稽首而言曰詩不云乎文王孫子本支百世釋之者曰本宗百世為天子支庶百世為諸侯古之諸侯今之親籓是已漢稱諸侯王今之藩王是已夫天子諸侯天下之大分也天子有天下諸侯有封國天下之通制也天子親諸侯諸侯奉天子天下之定禮也若夫孝以法祖敬以修身天子諸侯一也天下之要道也安天下之大分遵天下之通制守天下之定禮明天下之要道於是動天地感神明致休徴孚臣庶昌宗藩輔治化耀當今播來裔此則晉王殿下之至德也於歌頌為宜深謹序之曰名藩至德以傳且承命也虞山奏疏序今山西按察使虞山先生姓陳氏深之鄉同年友也又三十年矣中外進退大略相似而亷介之操敢言之氣非深之所敢望也嘉靖壬辰深候命于晉而先生至首出疏草示之皆先生為御史時所上也乃受而卒業焉分為二編凡論列者曰奏疏凡條處者曰奏議大抵使人便於誦法且以考言行也先生為御史餘二十載始自南入也當正德之初年再召而起也適武皇之末造及終制而來也際今上維新之朝時方多事有大舉措有大典禮先生居中居外無不言危辭與婉道並出施行報罷者間有之嗚呼兹一代之時也乎使先生終卧不起則有不得言使先生速化而去則有不及言豈天固遺之時耶將以舒露先生之蓄藏者而竒文法言往往亦在語云與時髙下豈不信哉宋制入臺有十旬不言事輒舉辱臺之罰深竊過之使時無可言固將強聒也故嘗謂臺諫之言事當論其大小不當論疏數當論其緩急不當論其早暮則是編也所謂大小所謂緩急所謂疏數所謂早暮咸可考見雖然先生豈有意於言哉故又曰先生之告君也文少而事多氣平而詞暢世必有知言君子送沈文忠左判德慶州序豫昔官翰林與有史事壬申之嵗南封于淮軺車所過郡縣以數十計而以常山為之界其所見守令亦以數十計而以常山為之難蓋自京師而達也放洪逾河絶淮渡江泛湖衝潮亂流上瀨有閘壩之限津梁之轄雖然陟降止於尋丈水陸之勞逸未分也惟至於常山則舍舟就輿出塗泥之下而躋攀雲霄之間雖西北之塞棧東南之嶺嶂有雄且險者于此此豈非一界限也哉令常山者往而送來而迎奔走於水涯山巔或東不及西西不暇東往往令人傳呼告至與謝不及其泛泛然者猶煩館榖津遣而後己其地儉其民習勞而吝健于訟簿案繁夥易緣以姦令豈不以是難哉沈君文忠適令於是豫以鄉里又有場屋之好且舊矣乃得從容延訪以故且以觀其政文忠執手板指顧風生具於一談之頃方謀作城鑿池安養斯民以丕變其習俗纚纚然可挈而整齊之不難也時方有饒源之警遣大將用兵百需咸具將於是途乎出豫既下草萍趨饒州竣事頗得賊中情狀還至常山則見文忠具畚鍤興工徒塹山疏水次第略舉行視其倉庫甚虛問其䇿但口胡盧以對豫心偉其才之敏而竊憂其成之難或成之而怨斂也但告之曰饒源之釁賊雖就招恨撫禦非䇿將半載賊糧且盡必大作禍常山其衝乎屈指計之臘盡春初其期也文忠勉之既為薦于同年王御史伯圻時適按常山云豫既抱病歸卧于家賊復煽亂果如余料自開化直搗常山以有備而止既而文忠果以築城用鹽引稅錢為當道文致罷令常山文忠訴其事於朝得昭雪之然猶坐微文當鐫一秩於是謫判德慶州豫曰此非文忠之罪盍再訴文忠曰令與判相去幾何地爾然吾正當以人重其官豈復藉官以重人乎昔人有言惠州豈在天上也豫益賢之與之飲酒而送之喟然歎曰天下事之難成也久矣自全者因陋就簡以為國羞自任者胎禍媒謗以為身困蓋自昔然矣若文忠者之所遭果孰為之哉而公道卒至於不泯聞之向來鍛鍊文忠者半在鬼録而文忠固無恙也文忠亦足以自恃而自慰矣安知德慶非文忠遊刃之地耶州守張君汝隆亦豫舊識才士方自開州得調文忠往願相與以有成也重刻百官針序我中丞新安潘公方塘撫蜀之明年重鋟百官針於行臺深適吏屬爰覩厥成公命序之按針本衣針醫人又用之以攻疾蓋彌縫其闕失而刺之詩曰因以針之是已百官有針自漢始此則宋儒山屋許先生所為撰次也山屋名月卿理宗朝進士及第家婺源許村蓋公之鄉人也深少側聞宋亡時南士有卧一車中五年不言者心甚偉之而未知即山屋也今讀其遺文又知講學於鶴山魏文靖公得朱子之傳新安為文公闕里則山屋固朱子之鄉人也平生著述甚多此針或其集中之一類耳針凡四十有九而名之曰百其見於自敘者意義深逺視昔楊胡崔劉之文尤為忠朴經世大業悉聚此書其曰分殊理一其曰本末源流又曰閲天下之義理愈熟處天下之事會愈精此皆朱子之學也且人品甚髙往往譏切時宰故仕不大顯至於摛文命篇辨於體裁雖音韻字畫之間博考詳據真朱子之正嫡也不可亡傳顧其制盡宋官言多宋事特一代之書爾要之有合于今者則經筵翰苑御史史臣尚書六部太常大理國監登聞覽厥名義殷鑒存焉京兆非今之天府乎守臣非今之郡縣乎發運轉運提點刑獄非今之布按乎茶馬市舶鹽鐡錢糧又皆今日之要司觀會通以槩於不可解之心雖百代傳可也此公翻刋之微意豈徒鄉人云乎哉惟公揚歷中外幾三十年百年之業無所不具又况遭時得君致位九列既非黍離麥秀之老可望而格物致知誠意正心之學自幼得之朱子者尤精其所到未可量也雖然以鄉人師鄉人為近而深亦山屋之鄉人也於是乎序儼山集卷三十七
