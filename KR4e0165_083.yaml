body:
  text: 儼山集卷八十三明陸深撰誄辭愚菴李府君誄府君蜀內江梧溪李氏諱吉安字邦瑞仕至華陽王教授年八十解教授歸梧溪居溪餘二年以𢎞治壬戌九月晦日考終正寢州閭悲思朝野弔唁山川失色天日改觀嗚呼悲哉府君幼懷淑慎長益明哲有蓉有守乃武乃文抗師赤縣規輔親藩立訓作則流風餘韻靡得而間然者矣遡厥華胄蓋自吉遷逮于皇朝世有聞人故兵科左給事中諱蕃之子今太子太保工部尚書兼都御史充嗣之父也初仁廟登極給事公自漢中訓導上端本策十有六篇驛召見即拜兵科所言皆國家大計剴切咸可施行具在國史尚書巡撫江南列職三事適皇帝繼統首伸大義八事開列禆贊元化功在社稷孫謀祖武父作子述抑亦有濟美者矣深故史官槩于聞見况且密邇嘉定母族寓焉憶在童稚講説府君之教訓嫓美蘇湖餘波所漸私淑有年兼以末路綴于尚書公之後私藉帡幪大獲知遇夫息隂者顧木愛屋者及烏矧夫府君之德履不朽可圖敢闕其文哉乃造誄曰於穆府君派姓自李粵有玄聖稱柱下史帝胄既降夷于編里有鬱奮迹徙自吉水龍市載西內江梧溪瞿塘地軸峨嵋天齊禎秀攸蓄俾也可稽蜀富文藻上當星奎皇明御宇慶雲甘雨大科徵才以還隆古李氏鼎興青紫俯取起家師儒陶鑄鼓舞逮于兵科漢中弦歌脫頴奏書謂臣匪多十有六策帝曰汝嘉宜侍禁近徵起傳車董生不録賈傅痛哭魚水之投豈曰夢卜篤生府君如玊斯璞如材楩楠萌于大谷至性夙成孝友鍾情蒸嘗既主慈顔獨承邈哉堂構遹嗣家聲詩書文藝疾世無名賔興屢起卒升胄子科盈斯行學優而仕嘉定惟南在海之涘既樹既柔生徒嶷嶷往與明揚陟傅華陽主驕法棄罔念作狂有搖內閫亦效鬩墻府君束濕既革既張明明祖訓縟禮大分有干者誅治逺自近至恩無親孰曰敢愠深惟誨言追事懲忿既復既同府君效忠日月云蝕君子之功無行不信有感斯通蓍龜傅保式哉惟公有孤在疚負荷以手左之右之式先式後養正以蒙可大可久危疑豁開茅土是有府君勤止倦而還事挽留莫回祖餞成市兩疏贈金穆生設醴圖書在行箕裘有子惟時𢎞才翰林秋臺垂翅州郡風操獨裁府君色笑喜聞屢來台鼎之績淵源始開大業有述將食其實朱顔素領金相玊質湯湯浯溪杲杲愛日形以外休心以內逸僉曰景賢於萬斯年如何不弔委蛻而仙風木遺恨山水餘妍景藏聲逹生直歸全嗚呼哀哉父子之間君臣之際授受之微進退之制緣禮則裕得正斯斃豈惟哀榮且以厲世國乏典刑士喪法程孰行不式孰涕不零東吳南楚尸像勒銘服有心喪囊有廢經嗟豫小子職在太史述德纍行遑敢舍是生世何遲聞風乃起緬託旒旗爰述兹誄嗚呼哀哉哀辭陳翁哀辭廣陵陳翁宗瑞卒之及期楊君鏞其異姓姪行也悲哀思慕間走四方求文士悼之君子曰於是乎可以觀德矣世有歿也有子弗父有孫弗祖弗可期也陳翁獨能感及異姓之戚其於德可知已用終楊君之志作哀辭曰施殫君之系兮爰得氏於有虞涓流之殿胄兮世弗靳於賢儒漢曲逆實蕃兮魏之琳與唐伯玊翳廣陵之一派兮審未逺其裔屬誕育靈於夫君兮眇千里之黃鵠宇魁傑以跅弛兮慕陶猗之所處遵海濵以養晦兮挾髙資而樂與端軌轍於室堂兮固閭廬之式也鼓螽斯以振振兮亦好還之極也惟惠澤之未究兮心惄焉其憂隱乃命女讓兮賑積倉於飢魯女諌暨女詳兮纘箕裘乎女父孫曰鎮兮曰銓博敏古以征前衆紛若兮承命合黽勉兮勵旃或侯封或幹蠱兮或頡頏於泮宫業雖殊而志一兮咸副望於有終君歡欣而遂適兮弛負擔於山之麓製綸巾被氅衣兮邀佺期而侶綺甪奈義和之逸駕兮嵗冉冉其在辰穴青山以窆璧兮如可贖兮百身輯素履於兹生兮夫豈惟今之鮮伍思顔色於倣佛兮涕浪浪以如縷誶曰已矣山空兮來悲風青猿嘯兮丹楓日黯黯兮雲濃思夫君兮傷余衷感舊事兮紀公趺贔屭兮碑豐窿揮淚眼兮將終思夫君兮首如蓬眇杖屨兮將安從睇蘭桂兮森叢叢徵厚報兮蒼空思夫君兮鞠躬祭文祭桴兒文正德十六年嵗次辛巳臘月辛卯日陸子自京師歸桴兒櫬前日甲申葬我太史公遂舉而祔之殤位乃抆泣為文祭之曰嗚呼豫年三十有八得抱此兒一何遲也汝才七齡棄豫而夭又何早也汝之同胞兄弟姊妹凡十三人是何多也今所存者一弟一姊抑又何寡也嗚呼汝父汝母以此之故衰老侵尋使汝有靈尚何心也往嵗來京翩翩丰儀過客愛賞玊樹瓊枝何生之竒也屢牽我衣勸我東歸謂兒孟浪斯言有違今乃歸矣何昨之非也今舉汝櫬以從汝祖早識孝敬斯曰得所汝復何苦也嗚呼祭鄭可齋處士文嗚呼可齋其可復起耶可齋之鄭實出師山代不乏賢作郡喬木至我可齋尤稱雅默克踵世範逺近推服少事客遊不妄交際而獨與豫傾蓋相契豫亦寡儔歡洽無幾獨視可齋猶芝蘭玊樹也既而可齋以耿介受侮豫為白之而可齋之德豫也獨深此亦義所不容已也正德辛巳豫還讀禮煢煢哀疚而可齋逺過慰藉矜恤家居十載不煩屢訪每一聚首輒連旬日藹然骨肉之誼也嘉靖戊子赴召北上明年遂自講筵左遷南劍可齋逺自海上操舟送之自吳歷越不啻千里南抵閩關繾綣難别每當祥風麗日之辰丹崖碧潭之上尊酒短篇未嘗不與可齋共之也是嵗豫遷晉臬明年遄歸是時可齋且病矣猶買舟騎驢訪余海上是豈世情交合者耶既豫入蜀萬里間關猶能聞問逮豫再上玊堂而可齋之疾不可起矣嗚呼哀哉感念今昔惟餘涕淚再越嵗年未酬挂劍嗚呼哀哉遺孤單弱庇護未加盟社猶存尚念世好耶豫且視二孤猶子若孫也忍忘吾可齋耶忍忘吾可齋耶嗚呼九原有靈可齋其歆豫之言否耶尚饗祭少師大學士邃菴楊公文惟公一代偉人四朝元老出入將相丞疑師保蓋天之生我公也固將以為世道計若乃公之所享實盛衰升降之幾胡蓋棺之已定猶未辨乎是非嗚呼哀哉盛德大業完器兼資謀斷並出公實多竒故渾厚宏博所以養天下之元氣而變通神化足以繫斯世之安危豈道大者難容而忠誠或以兆疑嗚呼哀哉本朝學術孰使之昌前輩相業誰云最良昔三楊之藻潤共建績於渡江逮李薛之醇正式以增復辟之光何我公之博逹兼數公之所長嗚呼哀哉人亦有言萬里長城五百之運賢聖合并縱后皇之孕育固不知幾年而後成儻求才於夢卜亦將合千萬人以為英公今已矣百口難名九京可作執鞭為榮此舉一世之所同悲而尤門生故吏之至情也深早承陶冶逺大是期動輒得罪徒負教知定芳晚登公門特荷恩慈幸託公之末照每相顧以得師忽山川之還氣指天日以何私當輀車之在駕奠一觴而陳詞嗚呼哀哉淚止於斯祭少保吏部尚書白巖喬公文惟公具經世才實天下士功施社稷名垂太史公孤卿佐臺省部寺進退出處俱關國是文章翰墨六經諸子人所難兼公則具美四海起居九重毗倚蒼生注懷詎曰不起嗚呼哀哉深託交道誼屬公忘年一别十載相見歡然公方謝政豫乃謫遷慰之纍牘贈以長篇約我南下追隨莫前豫方北征聞公棄捐百身奚贖有淚如泉世道之慟豈曰惓憐嗚呼哀哉門墻如昨子孫有託絮酒炙雞公如可作尚饗祭張都諫外母文於惟夫人出自名族皇皇大參中饋是瀆宦轍東西鳳凰相逐居常應變一一可録偕遊成均捐珮遺友策名夏臺氷蘖助守出鎮大藩不變所有晚歸于田翟冠在首嵗臨己巳倉卒變起都城皇皇士女四徙屹然安居誓以生死曰此君夫去將安止大參既逝門雀可羅強奴滑幹所存幾何獨撫二女甘此機梭辛苦門户心畫手摩大參鮮後丘隴何主蒸嘗四時涕泗如雨博選于宗義成恩煦絶者復續以光遺譜殷勤相攸爰得佳壻東海之子柱史之弟出司諌垣入讀中祕迎養于家甘旨終世嗚呼哀哉惟我夫人世之碩師國之忠臣今不可作哀我比鄰江風海月想見精神合葬有日栁轊于征赫赫黃門纍纍扶行生有淑德歿宜有榮蒼天之報終焉乃平深等涕雖有從足不能舉酒絮于尊殽􅀈于俎千里臨風舉目凄楚洋洋如在鑒此心膂尚饗祭封君誠齋崔公文維公維海宿望商顔髙風清時人瑞聖世伏龍脫頴藝苑飛聲黌宫仕親民社志抗哦松不大厥施以成其子華國有文直筆在史為天下師遂掌邦禮鸞封鳳誥公竟不俟嗚呼哀哉深慕荆有日許劍未酬遽聞訃告悵望十洲天風海濤若助隱憂尚有恩波永賁林丘嗚呼人生所貴者夀公夀絶倫望百逾九埃溘塵寰與化為友芳靈洋洋歆此絮酒嗚呼哀哉尚饗祭閣老石齋楊公文惟公兩朝師傅一代忠賢身騎箕斗氣作山川深禮闈門生最辱知憐相從館閣餘二十年白頭萬里謬寄旬宣過公鄉縣桑梓依然感念今昔有淚如泉嗚呼哀哉萬世在後萬世在前誰為此謀悠悠蒼天嗚呼哀哉尚饗儼山集卷八十三
