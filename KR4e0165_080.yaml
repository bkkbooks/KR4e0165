body:
  text: 儼山集卷八十明陸深撰行狀三光祿大夫柱國少保兼太子太傅禮部尚書武英殿大學士贈太保諡文康顧公行狀公諱鼎臣字九和别號未齊蘇之崑山人崑山古稱東吳吳四大姓顧其一也三國時雍為吳名相其後别族散處故崑山有顧氏云公家雍里村世以力田種德聞於時故崑山之顧氏為大族其十二公者元之萬户也實生德輝嗣為萬户德輝生八子其季諱士恭公之髙祖也曽祖諱大本祖諱良號耕樂道人父諱恂號桂軒有隱德列祀鄉賢三世俱纍贈光祿大夫柱國少保兼太子太傅禮部尚書武英殿大學士曽祖母蔡氏祖母吳氏嫡母吳氏生母楊氏俱纍贈一品夫人公生而頴敏數嵗能文章稍長學益進與兄子直潜同游邑庠皆有名時號顧氏三鳳𢎞治辛酉舉應天鄉試乙丑舉㑹試對大廷賜進士及第第一人授翰林院修撰七月丁父桂軒公憂正德丁卯服闋戊辰五月還朝與修孝宗實録成己巳五月升翰林院侍講賜銀幣十二月丁楊夫人憂壬申服闋告病家居癸酉冬還朝甲戌充廷試受卷官丙子五月升左春坊左諭德兼翰林院侍讀八月受命主順天鄉試時錢寧擅權令人持帖至公所囑其所親以重利啖之公不為動竟忤寧而寧亦不能害也己卯武宗南巡賜麒麟服辛巳今上入繼大統五月開文華講讀充經筵日講官賜銀幣孔雀服三襲復充武宗實録纂修官公在講筵音吐宣暢敷陳啓沃節奏纚纚上每傾聽嘉靖壬午正月郊祀禮成賜白鷴服三月疏乞歸省祭上以講官故特命馳驛還鄉賜白金文綺仍令速返供職癸未疏乞養病上不允再疏得請家居藏修者幾四年目擊東南利弊慨然欲起而振舉之丙戌冬赴闕丁亥二月復職經筵日講仍舊十月更定學士制公首為翰林院學士掌印仍充經筵日講官分撰誥敕十一月進講范浚心針上特諭內閣云朕因十三日聼講官顧鼎臣解說心針連日思味其意甚為正心之助昨自寫一篇并假為注釋復諭曰前日聽講心針深加愛尚朕自念上荷天命為人君長當務學以致知待粗有領㑹之時再注視聽言動四針後復御製敬一針命于翰林院兩京國子監建敬一亭并前五針俱勒石其中天下學校準為定制戊子八月三十日上又諭輔臣曰朕為洪範一書於帝王為治之大經大法實為親切講解須委一人庶得接續貫暢欲令鼎臣通篇進講分段計日從容講解務使盡其所言以為朕為學求治之助九月八日上又諭以公所講洪範盡心指解復慮詞語長多恐溫書之日有所失記少為刪去幾句從容講說以發明朕心使有所得直解揭帖內可撰寫精全朕得覽閲以求㫖義為為治之助十月賜文獻通考四書大全書傳大全各一部閏十月二十日上又諭曰今以寒月例暫免經筵日講但朕以洪範未終篇故未循例暫免又曰為學貴終始亦在乎篤行不在急迫與徒知也鼎臣暫免朝參止入講殿進講庶得從容朕亦安聽或得於領㑹矣十一月二十一日上又諭以公進講洪範終篇盡心指陳升詹事府詹事仍兼翰林院學士賜白金文綺又諭稱公入仕有年故特進三品與他講官不同蓋特恩云上又諭公自進講以來忠誠剴切於經傳多所發明甚為朕進學之助又諭以公學行素優侍講有年啓沃良多勤勞簡在特給賜誥命己丑四月命校勘續修大明㑹典公充副總裁考定損益多公手筆云十二月上奉先聖先師神位於文華殿之東室行釋菜禮特命輔臣及公等十臣瞻拜復召至西室親承天語期勉賜茶而退繼頒聖諭令十臣各敷陳經義關切於君德治道者以獻公撰述中庸首章講義一篇進呈御覽大意言圖治者期臻於聖神功化之極不安於小康也庚寅二月上肇舉耕籍禮特㫖命公與九推之列賜雲鶴服七月命掌詹事府事辛卯九月無逸殿成上御殿命輔臣及公等坐講周書無逸篇賜宴十月升禮部右侍郎兼翰林院學士仍充經筵日講官不妨部事十一月歷三品俸考滿廕孫謙亨入監壬辰十月奉特㫖教庶吉士吕懷等二十一人舊例教庶吉士率用翰林臣二員獨受簡命自公始也十二月升吏部左侍郎掌詹事府事兼官職位如故癸巳三月上以釐正先師祀典再幸太學命公充分獻官上祀畢御彞倫堂命祭酒司業講書賜坐聽講賜新鈔羊酒時取孔顔孟三氏子孫至京從幸陪祀公退而上言以為孔子之道為萬世帝王法在當時門弟子唯曾參之傳獨得其宗觀大學一書綱領條目昭然明白端可見矣而二千年以來未有能表章之者我皇上崇儒重道逺邁帝王似兹曠典所宜肇舉伏乞命禮官詳議盍訪曽氏子孫與孔顔孟三氏一體録用則吾道幸甚上是之於是求得曽氏子孫名質粹者授博士以主祀事甲午再滿考進勳級授資治尹時大同軍士屢變執政者欲以大兵屠滅公抗疏言叛者不過二三渠魁誅之則國法正而人心安矣奈何戮及無辜使玊石俱焚乎上從其奏全鎮生靈賴以獲免乙未孝靜毅皇后梓宫發引禮部疏請命大學士一員題主上特以命公是嵗廷試進士充讀卷官舊制親賜策問皆內侍傳捧是年特命公捧下仍著為例上復御文華殿親試選進士趙貞吉等三十人改庶吉士內閣疏請簡命主教事者上擢公禮部尚書兼翰林院學士仍掌詹事府事教庶吉士公具疏懇辭上諭之曰朕以卿講幄舊臣效勞有年特加兹秩専委教讀為國儲材宜從朕命公就職程率訓勵模範肅然冀得真材以稱上意七月公有疾二十三日上賜手札云前因秋享祖考卿以疾奏别委捧主朕意以卿微疾耳昨聞之李輔臣謂猶未愈卿受命教習吉士此非小託宜善加調理可用心教之以副朕任用焉二十六日復賜手札問疾并手製藥一劑賜公諭意諄諄恩眷有加丙申三月從上幸山陵賜麟服及銀瓢繡囊諸物四月賜飛魚服二十七日召見行宫時公教庶吉士因論進學之方作文之法教育人材之要及言宋史浩繁宜加刪削以備御覽上意嘉悅議修飾七陵并豫建夀宫命公往祭天夀山之神八月上遣祀先師孔子九廟成禮部疏請定各廟時享太廟祫享大享諸樂章上特命公専撰九月重録纍朝寶訓實録成公為同經理官特加太子太保賜宴於謹身殿仍賜銀幣鞍馬十月議遷孝肅孝穆孝惠三后神主奉安陵殿特命公題主丁酉七月公上疏言東南財賦重地積弊甚多為民蠧害遂條陳四事一曰暫議差官總理二曰查理田糧舊額三曰催徵嵗辦錢糧四曰查復預備倉糧皆究極利弊纎悉不遺公恐行之者不得其意反為民害故又曰所以更化善治非作聰明以亂舊章也法久弊滋務在整飭振舉以復舊焉耳其惓惓若此先是嘗以四事建言于朝行之而有司因循廢閣故復有是奏上特命户部臣速行之加嚴切焉是嵗京師大水沉竈浮尸見者駭異而天下郡縣又多水災湖廣尤甚公疏宜修人事以格天心紆民困以消隱禍極論傷痍困窮之狀乞請優恤京師被災之家其湖廣承天乃皇上受命龍飛之地災沴如此神人震驚宜遣大臣馳往賑救遺黎掩瘞枯骼更敕天下撫按憲臣嚴督有司奉行德意加惠存亡庶邦本固而天心可回矣上嘉納焉戊戌二月奉命主考㑹試時士子一時習為竒險之文靡然成風禮部疏言其事公當文衡崇雅黜浮文體大正士論服之三月廷試進士充讀卷官公簡在帝心自己丑嵗即擬大用公時宰張羅峯以密疏沮之非上意也是嵗八月十七日上御平臺始敕吏部以太子太保禮部尚書兼文淵閣大學士入內閣公疏辭上諭曰卿講讀舊臣才學茂著朕心簡在內閣重任特兹委用宜盡心輔贊以副朕意公既大拜與序菴李公桂洲夏公同心輔政上倚任焉重九日賜上尊珍饌二十五日駕幸山陵秋祭公扈蹕侍行十一月朔駕詣圜丘恭上皇天册表復詣太廟恭上册寶賜銀幣召對便殿復論經史欲集儒臣彚纂修葺公奏請皇上宜如漢宣帝時開白虎觀召諸儒講論五經同異親稱制臨決斯文之幸也上曰卿言甚合朕意朕思作此等事勝於他事也二十六日聖母章聖皇太后違和上命輔臣引醫入視賜銀幣既而皇太后上升十二月侍駕幸山陵相度陵隧上駐蹕德勝門手賜禦寒首衣途次賜食器銀杓諸品物是日昭聖皇太后遣中使至山陵問上起居以輔臣扈從勤勞各賜銀幣己亥元日賜上尊珍饌與勳輔諸臣被召至𤣥極寶殿觀燈賜燕二十七日上於平臺敕吏部以昨冬祗薦皇天冊表命使諸臣䖍恭贊佐宜錫殊嘉加公少保兼太子太傅武英殿大學士尚書如故二十九日召至啓祥宫入見皇嗣賜銀幣花紅二月朔日皇太子冊立及景裕二王就封賜銀幣新鈔時上卜以是月十六日南巡承天乃命夏公扈蹕而以公留守京師八日賜牙刻留守關防一顆聖諭略曰朕將躬詣顯陵為親營計吉地日以期矣特命卿同錞鏸守北京佐太子代理之重卿職也宜協心護守一應題奏以關防用使密切要務重封印記庶别詐僞昨論宋事朕見文人每私檜為忠卿直以為姦可見卿之公讜也朕此行非有導之者卿但盡誠居守十三日召見文華殿面計南巡程途日行次序手授几筵祭文及記事一帙遂賜蟒衣四襲金寶帶一圍上以諸邊重地密邇京師欲遣大臣行邊公曰須重臣乃可上曰翟鑾何如公頓首曰聖諭甚當遂起翟公於家即拜行邊使奉敕巡厯九邊是日公疏聖駕南巡伏䝉眷命留臣居守京師輔贊機政受命以來蚤夜兢惕不遑寧處良由責任至重切慮才力綿薄弗克負荷以傷皇上知人之明私憂過計不容隱默手上七事皆軍國重務內一事云皇太子正位東宫文武官例該朔望朝參上曰可怠者戒之又一事云內閣於各衙門舊不統攝臣留守事重乞令順天府五城御史兵馬巡捕參將把總悉聽臣約束庶便行事上是之著暫此悉聽統束其餘皆上手批可復諭之曰朕祗為顯陵南往躬視土地留守重託簡付于卿宜夙夜慎恭以匡儲政條奏各有批示卿其欽之十四日上召見平臺手授御筆面敕曰朕躬以二親妥靈之地日夜思念心甚不安必親見乃安此心非漫遊也特以留守至託簡付于卿宜朝夕慎恭輔贊儲政庶朕心安于行卿其欽哉慎之又面諭曰朕用卿晚卿受重託凡各衙門事務皆得預聞官員有不職廢事者重則奏聞區處輕則請㫖懲戒公即奏曰九重密㫖人不得聞乞降綸音百官悉知警戒臣得以行所無事矣上可其請宣諭百司是日又敕諭公曰朕兹巡幸承天恭視顯陵車駕往回動歷數月昨以冊立東宮命之監國特留卿贊輔協同文武重臣居守內自禁掖外而都城逺及邊陲并大小百司庶務悉以付卿宜遵承朕命應啓請者擬請令㫖施行應聞奏者馳奏行在定奪其有密切緊重事情宜用欽賜印記來聞卿講幄舊臣久懷經濟朕兹重寄宜欽承之哉十五日召見文華殿賜皇考御書扁二面一曰日新又新一曰太極無極又賜銀圖書一顆文曰經幃首選十六日車駕發京師公奉命居守振舉紀綱輦轂之下肅然屢以錦衣舍人齎皇太子問安疏及公留守問安密疏詣行在凡內外軍國機務無不纎悉聞奏三月二十五日上在承天以山陵相度事宜手諭特先示公一人并賜御製詩歌三篇且諭以衛輝失戒令録詔敕諸文馳進公疏謝略曰臣仰知聖孝純切諦視山陵已定大事聖子神孫億萬世無疆之福基於此矣臣自忭慰未敢宣泄至若聖情悲喜露於述作格律髙古思致真切直追典謨訓誥之作信非漢唐以下秉德好文之主所能窺測其萬一也四月十五日車駕回京公率百官奉迎致詞瞻拜上慰勞之公居守時律下太嚴不少假借言官論之公即引罪辭避上特慰諭焉時上以草敕事督責輔臣公頓首陳諌詞意懇切上為之霽威五月公以纍朝典故文籍俱貯內閣制敕房翻閲衆手文字漫滅前後脫落二月間召對平臺時面奏乞令中書謄寫進呈聖覽為萬世法程上俞允之至是成二十餘帙上之餘未及就時皇妣南祔顯陵舟行遣公至通州題主十二日賜御批寶璽聖製詩歌二函皆南巡時作也十九日特賜天靈茶筍六月公以疾在告上遣醫視疾中官齎賜羊豕酒米諸物閏月朔祀永明後殿先聖先師堂上命公代拜十五日一品考滿復職上遣中官齎賜羊酒新鈔八月南薰殿書太祖成祖睿宗三聖玊冊寶賜銀幣九月賜白花玊帶一圍金織麒麟服三襲二十五日召至皇極閣視書皇天玊冊表賜銀幣二十八日扈從聖駕親閲夀宫及奉安成祖陵碑賜銀幣諸物十二月四日賜白金蟒衣庚子正月十日冊封皇貴妃等妃嬪充副使捧冊十九日上祈榖于𤣥極寶殿夜召勳輔禮臣六人賜貂皮暖耳三月八日欽奉聖諭公具對解疑言及朝㑹事上再賜手札詞意諄懇一時君臣相與誠信通流雖家人父子不是過也五月三日夏至有事於方澤命公視牲郊壇感寒病噎請告上遣醫視疾仍遣中使賜食品如前時公卧病日久不瘥上屢遣中使齎手札賜問越三月公以例上疏辭俸上復豫告給俸如故八月病甚公懇乞歸休上溫㫖慰留九月十六日公疾少間伏枕呼冡孫謙亨語之曰吾受皇上厚恩畢力報稱今殆不可起矣吾志未及為者爾筆記之於是口占五言古詩一章云天下幾大事初意戮力為流景若逝波世路况多岐天造既難明立事不可期後來有傑士一一為為之為國開太平千載壯鴻基復命書五事于後一曰復鹽法以備邊計二曰興南北直𨽻山東河南水利開稻田樹積蓄以省漕運三曰經理宣府大同二鎮薊州遼東山西邊備以保障京師陵寢四曰復河套經理甘肅以保全陜五曰經理松潘以保全蜀皆國家大計云十月五日病革乃力疾陳遺疏感激聖恩勸上親賢圖治加意元元頥養聖躬茂登萬夀以貽聖子神孫無疆之業以慰天下臣民仰望之心上答曰覽卿力疾陳奏足見忠愛朕已具悉六日午時卒于正寢訃聞上為憫悼敕禮部舉恤典以聞賜祭九壇仍命禮部主事王健營葬事贈太保諡文康公身長七尺虬髯虎視姿貌竒偉風神峻拔自束髮為舉子時即有大志初名同後更今諱其志也果以掄魁發身位登宰輔文章功業卓冠一時殆不負所學矣公性直諒不諧於俗遇事輒敢言人雖敬而畏之亦以是見沮賴為聖主所知卒能保全晚嵗始入政府恩禮優渥賚豫頻蕃公亦竭忠報稱不避嫌怨僅僅二載竟卒于位至於遺言一不及私可謂社稷臣矣公生於成化癸巳二月二十五日享年六十有八配朱氏纍封一品夫人有賢行白首相敬如賔長子履方夫人所出也鄉貢進士娶梁氏次履祥娶周氏側室薛氏出次履貞順天府學增廣生以履祥有疾讓䕃入監娶陳氏履吉尚幼皆庶出女二皆夫人出長適國子生歸本次適國子生朱端禧早寡孫男四人長即謙亨尚寶司司丞以公內閣恩改授娶陸氏次謙益四夷館譯字生娶周氏續聘查氏餘幼女二王世業周允懷其壻也曽孫男五咸和咸平咸康餘皆幼公所著詩文應制諸作奏議共若干卷藏于家公之卒也上遣禮部主事董子儀護喪南還履方等將卜以嘉靖壬寅某月日葬公于潭山之原禮也深叨從公後三試皆為同年而家居不逺百里又嘗同官翰林辱公以為知己者久矣比聞國子司業王先生繩武數論公之行誼曰公居家篤於孝友父桂軒生公時年已五十有七公既長恆恐不逮養每夜焚香祝天願減已嵗以益父夀桂軒公果登耄耋公狀元及第得報後兩月而卒竟如其願云公少不獲於伯兄事之未嘗失禮待宗族皆有恩義其貧者幾百人計口給粟以贍之與人交遊洞見肺腑雖韋布久要雅敬如新云倜儻大度喜施豫所得俸賜見貧者輒以周之濟南一貢士就教職待選日久無以自給遂鬻其子公聞而惻然遺金俾贖之居京師凡病若死不能具醫藥棺斂者有請於公公輒濟焉為人外剛嚴而內寬和禮賢樂善推誠布公奬引寒士孜孜不倦自公之暇奕觴詠歌寄興蕭逺平居不廢絲竹所至室宇煥然雖紛華之中未嘗不淡然自得無所係纍也公生長東南念財賦日蠧為國大患故三舉奏又以故鄉崑山為東南要地財賦上供者四十餘萬濵海數受警無城郭可守何以保民乃言於撫按憲臣疏請凡沿海縣邑無城者令有司次第修葺而崑山最為要害首議興築三年而城成民用乂安百世之利公之功也繩武與公同郡邑而有親好相知尤深其言當為實録云履方實豫國子所教士間奉遺命以斯文為託乃相與敘次如右將以請於當世之宗工大手製銘焉謹狀儼山集卷八十
