body:
  text: 儼山集卷六十三明陸深撰墓志二特進榮祿大夫柱國宣城伯衛公墓志銘正德丁丑八月十有一日特進榮祿大夫柱國宣城伯衛公卒訃聞上如制遣官諭祭于家越明年戊寅四月二日賜葬於阜城之西翠屏祖塋之次先期嗣宣城伯錞奉監察御史周君鵷之狀來請銘按公諱璋字景昂號逸菴世為松江華亭人曾祖諱炳贈特進榮祿大夫左都督追封宣城伯祖青贈特進榮祿大夫左都督追封宣城伯父諱頴奉天翊運宣力武臣特進榮祿大夫宣城伯諡壯勇追封宣城侯實生公𢎞治戊午之春侯卒而公嗣豫每聞先輩之談壯勇侯當英憲兩朝之間邊陲多故故多奇功其追也先也邀於黃花鎮戰於西直門鏖於紫荆關其鎮甘肅也與敵連戰十二皆捷敗西番於涼州拔毛忠於重圍克定把沙其鎮遼東也破毛鄰咸身當矢石匪獨以大將旗鼓為也定封立名翊國傳後夫豈偶然哉公事侯久韜略之學得之家庭最深當孝宗皇帝之世四鄰向化五兵不驚治安極矣公嗣爵之嵗以兵部薦提點三千營簡練精嚴庚申掌龍旗寶纛尋推坐顯武營操閲敢勇已乃得竒疾辭免職務復起領衛士直宿中禁穆肅祗慎癸亥春充正使使韓府襄事有容今上皇帝正德闕持節册封晉府至國與王議日定禮王雅重公親送之丙寅復使瀋府往還益謹是時逆瑾擅權以公使得罪者頗衆亦譏伺公無所得暨還朝獨指曰汝宣城伯好官也吾今知之已乃病復作屢疏乞休賜告家居凡十一年謝客燕處無外慕病少間以書史自娛雖顯達過門不一見也豫與公同郡通籍于朝以鄉里故及識公又辱與公之弟海鷗公子瓚遊故嘗謂公之才不盡見於世而隱然故家遺烈若大山深林鬱茂蔥蒨之色中含萬有殆未易一二測識耶其餘澤潛德尚復有待於後人耶公長身美髯容止偉異沈毅寡默遇事謹畏馭下嚴而恩有將帥之風焉享年七十有一以正統七年五月七日生云前母嚴氏母金氏配顧氏皆誥封宣城伯夫人子男五長即錞次錕鑑鋹鈇皆早世息女五法當銘銘曰有偉其先其後則賢樹功實多與國並傳才以地顯業以會宣金券玉帶公則有焉太平無象公福斯全其然其然後千萬年中順大夫廣南府知府顧公墓志銘憲宗純皇帝時逺郡有才良之吏曰上海顧公諱英字孟育初同知雲南之廣西府以憂去既乃改陜西之延安府九載升知廣南府廣南雲南夷中地也尤險逺公之在廣西也民楊姓者兄弟爭産訟纍不休楊夷俗也公至各以百金入賂公兩聽之明旦詣府受理譁辨更肆公曰若所爭者幾何也至是其弟悉白其兄匿財狀凡五十金公曰若以五十金之故致訟比於餽人以百金求勝其盈縮又何如也反顧吏人出其賂於庭即取其兄賂半償之兩人羞伏各涕泣投拜而去其在延安也適兵歉之餘民多逋負公即移文所司曰本郡東繞河湟西接慶環北連沙漠南迫關陜山多川少土瘠民貧且以一年之收欲完數年之負竊慮民力不堪愈加逃竄舊糧既無完期新糧必至遺誤乞以舊糧量收輕齎候充俸支折色庶幾民免負戴之勞軍得實惠而無朽腐之患矣所司是之時歸德等堡東西兩路土曠兵飢巡撫丁公委以安撫公往閲田授丁給以牛具三年然後科之遂著為令中官汪直者進軍征討卒經其地即欲用馬槽數千時已薄暮公命窽地作坎築以起土爇火燎之儼然芻秣以濟其在廣南也寓治臨安府屬車里讎殺宣慰板雅氏者死有二子安長庶也愛猛幼嫡也各爭襲位蠻夷承傳惟貨力是視志吞啖而已撫按檄公往乃冒險行千餘里入其地為辨嫡庶之分卒定其事兹行也或連日不炊夜懸宿樹間衝薄瘴癘出入虎狼蛇豕之羣自是有歸志矣明年得歸去縣市五里所構南溪草堂賦詩奕棋以取適公自少奇逸有大志不屑屑治家人事間從博遊已乃從兄行賈淮北輒負不能壯嵗始折節讀書遂一舉而登上第時年二十有六也去來兩都授徒取給比有祿入常不繼是故生理尤薄長子澄以儉勤起家有田十餘頃公曰吾志也吾草年官逺地無厚澤及人雖曰未嘗仕宦可也當以此田倣范文正公故事為義莊以澤吾族人會白其事於府時守以其體大也議上請未及行而公卒矣嗚呼公生以宣德甲寅五月十九日卒以正德戊辰十月四日壽七十有五云考諱文敏號清隱有隱德妣陳氏祖諱仲睦祖妣沈氏曾祖諱友實曾祖妣邵氏配徐安人邑舊族有賢行先公十三年卒今卜以庚午十二月壬辰啓從公於肇溪南原合而大封焉子四長即澄娶陸氏孝友禮讓以亢厥宗次清蚤卒次雲龍娶姚氏國子生謁選而卒季淵側室張出也女一適張錫王出也孫三裔芳賢而夭娶談氏定芳國子生娶李氏世芳孫女三韓恕劉燾陳相其壻也公貌不逾中士而勇略出人談辨清雅和婉恭敏喜為近體詩工緻有草堂集藏于家云惟公發身在英憲熙洽之朝人文靈鬯得以攄忠效謀補裨國體及其奉身而退也尚在強盛之年返適樂土具有林泉之賞金紫輝映詠歌太平者垂二十年以考終出處如是可謂得所遭逢者矣公之冢婦深之姑也少獲以通家子事公數從遊燕得公言行為詳復按邵君政所狀書其大者系之銘曰政以逺懋澤以義濟匪懋之難濟亦詎易展矣顧公允也垂世高丘永寧曰此良吏散官省軒顧公墓志銘公諱澄字源潔上海人也其世系具深所撰草堂先生志中草堂先生故廣南守公其長子也母徐恭人配陸氏實深之姑有子三曰裔芳有美質蚤卒娶談氏曰定芳太學生娶李氏曰世芳側室蔡氏出也女三長適浙江都司知印韓恕次適劉燾又次適陳相並太學生孫一斯道孫女三深幼侍先大父筠松府君見公每以嵗時至至嘗從旁撫豫額曰翁家千里駒也復彈指曰隱隱作五花紋矣府君為之破顔深孩漫不省何等語也長而知公器待之厚自後每成名公輒手書敦勉辛未之赴闕也至作十詩送之明年秋奉使還省公則已病矣乃握手敘平生不欲大聲輒附耳語不休大抵憐其婦之節與其弟之無後者而欲定芳以文學致身大草堂公之業也或泛及其造家辛苦細事意若有所託然心私怪而憂之竟以癸酉嵗之二日卒上距所生景泰壬申享年六十有一云其孤定芳煢然一身經營三世以繼志為任卜以乙亥嵗之二日庚申奉厝于肇溪南原從草堂公也乃泣而請銘深亦泣而諾焉公素長者慈仁慎密有心計特長於理財他人所縮公則嬴之用是為邑中巨室草堂公宦轍所至輒以清白聞公之助也其歸自廣南槖中圖書而已及按視其家則曰吾兒自足也遂營别墅於郭西之五里橋為草堂觴奕吟嘯之地母弟雲龍遊邑校例得入粟公資以五百金補國子生卒業而還又益以千金腴田數頃與之曰此固父遺也第受之勿疑草堂知之召雲龍曰一錢非吾有汝兄之為以悅事吾也人兩賢之有别業在邑西水鄉己巳以來連災於水公傾廩給里人全活甚衆公起自勤儉一文不以妄費當其勇於為義乃如此深嘗論公仁足以事天也而耆耊逺義足以隂隲也而螽斯微藝足以角勝也而名位未稱意者天將大其後於其逺者耶若夫父母稱其孝宗黨飲其惠鄉閭服其誠信識公者莫不敬其生而哀其死雖百世傳可也為之銘銘曰皇皇三吳著姓顧陸祚之斯遙粵有芳躅昔在中葉海邦奠居偉矣草堂懋起詩書沖沖省軒草堂有子惠始于宗亦及國鄙秩之七品壽以六旬曷疚于內以潤厥身身所為教貽燕斯妥孰云承之亦詎匪我高風晚頤築亭浚沼昔公出遊睹物雲表霞裾鶴馭屢轉星眸豈曰厭世或從之遊遺慶若流沛厥來裔太史勒詞以奠于世世顧母陸孺人墓志銘孺人姓陸氏諱素蘭議授承事郎省軒顧先生之配廣南太守草堂府君之冢婦處士筠松先生陸公之季女太學生定芳之母而國子司業深之姑也其卒也定芳以書來成均請銘惟廣南府君與省軒先生之葬深皆刻辭兹則忍忘吾賢姑耶惟吾大父筠松公與大母尤孺人育德葆和以昌厥後故八乳而有五男子三女子鄉里異之而孺人又賢始孺人之在室也已見長姪有受婦者是時一爨指逾百數而公孺人治家極嚴且勵子若孫以儉勤也孺人事父母奉兄嫂撫婢媵無不曲當故公孺人最所鍾愛諸嫂氏有不合公孺人意輒訪於孺人而必得也既歸省軒先生時廣南府君方事宦遊百需咸給於家多孺人從中措書府君安之省軒先生共相起家共祭祀應賓客和妯娌滋産業顧氏之門祚益以振拓及府君解廣南持圖書以歸入其門視供帳涉田園曰據此可以老矣誰則營之既而知孺人有力焉每向筠松公謝曰翁之女耶吾之子也不啻由是而仰孺人以濟吉凶者凡若干家孺人之所視以為子女者凡若干人深之先孺人吳來繼太史公竹坡先生之室及孺人之嫁也歡好尤厚其行仁而好施也若相競而趨之故兩宗之賢陸則稱吳顧則稱陸也先孺人之喪歸自京師孺人哭之尤極哀而視深也與深之婦也則其所出也不翅初孺人有子曰裔芳少深兩嵗自齠丱以至於誦書綴文之日異而遊息者無間月非裔芳過舅家則深來自姑家也裔芳賢而有文年十九而死裔芳有子曰希賢後一年亦死故孺人意極傷之而又念定芳之弱而未有助也既又遭徐恭人之喪連遭廣南府君之喪自是而省軒先生亦謝世矣茹荼隕血以植立顧宗蓋有奇丈夫偉男子之所難者既以搆疾尋愈尋作定芳之求瘳也力則醫誠則禱以口續食以體藉臥深心憂之已而訃至又明年移家至都始悉所以而哭之不能盡也孺人病既革梅氏婦攜二子往候焉猶執手問深且問聖駕還京未語既翛然而逝時正德十二年閏十二月五日也上距所生景泰壬申四月二十六日享年六十有六云嗚呼孺人之懿行淑德蓋有深所不能盡述者獨其推財濟物出於天性而又力足以行其志故厚惠周遍感之者皆思報之於定芳無間也故廣南之後雖孑焉寡弱而所以維持隂隲之者甚厚斯亦為義之效也子男二長即裔芳娶談氏次即定芳謹慎有行義將以進士業紹其家者女三長適浙江都司知印韓恕次適太學生劉燾又次適太學生陳相孫二曰斯道曰斯德孫女三深謹按古記貞烈以不恤緯而憂王為賢彼猶為生也若吾姑之纊既屬而國事之大無忘詎不謂得正也已此亦偉男子奇文夫事也而猶以未之學而式也為難兹卜以正德十五年正月三日之吉啓省軒先生之兆而大封焉宜銘銘曰秉禮植德女中儒既以成子遂從夫為之銘者謂為姑竹泉黃先生夫婦合葬墓志銘豫女兄歸竹泉黃先生實同乙未生竹泉才長十有六日耳暨其卒也復同壬午竹泉僅後百有二日耳是嵗十有二月十二日甲申復以同日葬于楊溝之原嗚呼伉儷之情賓主之敬同牢共穴之義可謂終始于一者矣豫方居憂悲親知之雕謝重念竹泉髫丱交遊都門旅寓歡若同胞而買田築室共老東海之計猶一日也而今不可作矣嗚呼天道於善人果何如哉其孤檯泣以銘請豫亦泣而銘之按先生姓黃氏諱涔字克清别號竹泉其先汴人從宋南渡家于嘉定之清浦高祖子富高祖妣塢氏曾祖升曾祖妣顧氏祖亨祖妣朱氏考鉞妣陳氏鉞以義授承事郎號濱陽濱陽翁始遷上海故今為上海人孺人陸氏諱翠翠豫從父東隱先生之女也母顧氏竹泉先生天常甚厚動合典則豫雅重之自少事濱陽翁以孝稱陳夫人見背時以幼弟潮為屬竹泉撫之終身有恩逮事繼母陸又事邵母有禮待庶弟漳有惠母兄浙早卒無後以次子標後之有倫其孝友有如此者濱陽翁後吳中稱巨家最先而徭役及之亦最先竹泉一身往共二司不乏漳以賦長部運入京受誣謫戍高山乃走京師纍疏卒白之得脫戎籍所居邊海恃以為命者護塘耳每嵗率僮僕修之甚完既又周視曰護外水者塘以障內水者亦塘也利害等耳非永永便乃大伐石選木穴塘作竇時其潮潦而啓閉之既成一方蒙利海寇施天泰暨流賊入江之擾咸有保障擒獲功制府欲論上歎曰此足自衛耳奚以賞為其局幹有如此者有逋券纍千金遇里中嵗儉悉取而焚之捐田十畝作義冢又益以十畝命萬謙守之以代冢賦與修冢之廢浙有士人凍死于道備衣棺葬之其仁義有如此者嘗以例為中都留守司知印赴吏部選當得一官受章服即辭去曰如此足矣歸築精舍鑿池架石有清泉修竹之勝時時臂鷹牽犬從數十騎校獵原野之間或信宿而還則調馬聽鶴課子讀書講古人已廢之禮延名勝士修家譜理文墨暇則奕棋飲酒以自適其高逸有如此者嗚呼年才四十有八而死矣實十月之六日也先是六月草有二日豫女兄屬纊竹泉哭之慟女兄孝慈儉勤明達貞淑當竹泉愛客倡義時不問巨細皆從中資給之一一中節周旋宗黨憐恤孤貧一族稱焉一族賴焉故家務雖極浩穰竹泉了不介意特可否而己一旦失去若左右手嘗過宿豫江東意惘惘不樂豫寬譬之多方然不意其竟相從而逝也嗚呼哀哉子男二長檯有志肖其父娶秦氏次標出繼女六長適談萬言次適王應欽次適沈燭次適車元爵次二未行孫男一煾宜銘銘曰並世敵德天相有仁歸亦曰耦兹豈延津斗牛之間當有竒氣我作銘詩九京是慰勑贈承德郎刑部主事松雲沈公合葬墓志銘公姓沈諱鎡字時用别號松雲上海人也其贈承德郎刑部主事既卒而遷葬於長溪其原曰鳳凰其配姓謝諱貞字永慕其封太安人道卒歸而祔焉其孤恩既謀狀於深復以壙石見託乃復敘而銘之曰按沈氏其先嘉禾楓涇人也其占籍上海也自其高祖諱居仁者始當元季兵興人不能有厥家所謂避地者耶曾祖諱德𢎞祖諱晟考諱環號梅月翁四世相繼皆不仕妣尹氏實生公公猶未仕也所謂盤桓者耶公美丰儀有口辨不務為勾棘之行與梅月翁並以雅量聞邑中年二十餘即孤克自樹立手致千金之産樂善好施舉義睦宗養其不能養者婚其不能娶者貸其不能償者葬其不能葬者助其不能舉者濟其不能給者至罄千金之蓄又破産以益之不吝也其行誼多類此所謂善士者耶其子恩登丙辰進士則為之走京師觴客于堂曰吾家數世未嘗顯達逮豫又貧吾兒所謂發于持滿者耶吾願足矣竟以是嵗十二月望日還卒得年四十有七初娶于談産一女而夭太安人者公之繼室也幼孤鞠于外氏翟翟與謝俱邑著姓自少靘莊端慎及笄而歸于公尤稱能相所謂好逑者耶中遭家儉嘗脫簪珥以助經營傾奩賄以還棄業卒至於成其子所謂賢母者耶就養于京者五載既南歸復往往未至以正德丁卯十二月十日卒得年五十有四明年戊辰十二月二十一日合而封焉子男一即刑部員外郎文學吏事俱有聲稱女二長談出適陸淮早卒次適韓惠孫女三長適孫天相次許聘張寶中次尚幼嗚呼深獲事刑部公太安人則嘗往來豫家公磊落豐厚類壽考人而其行往往逼古之有道者太安人又仁慈孝惠早厯多虞皆不至下壽天之報施竟何如也將所謂斂以遺其後者耶銘曰雙美並世以成厥子穴于同歸以妥萬祀匪積之厚曷流其長年則不永維德之良或後其生後將罔繼曾是多取造物鮮忌歿贈生封隴首峩峩斯是不朽厥終孰多土深草茂奠厥玄宅靡瞻弗虔靡車弗軾儼山集卷六十三
