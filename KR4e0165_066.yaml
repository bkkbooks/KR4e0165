body:
  text: 儼山集卷六十六明陸深撰墓志銘五將仕佐郎刑部司務黃溪孫公墓志銘嗚呼黃溪公遽至於是耶嗚呼黃溪公竟止於是耶自余束髮與公交好同筆硯聨衾席以周旋於兩都之間因以遍交當世名士自窮經考文求志講學以相與許可期待於意氣之外者何如也余去國五七年公竟不轉一資而卒訃聞哭之盡余哀乃復低徊輟泣志其墓曰大道既隱風流日靡士大夫馳騖於功利之區往往處下以窺髙而於出處進退之際蕩無紀限尚安知所謂義命之歸者耶余大為是懼公才宜舉進士每向余曰從鄉舉非出身耶既試天官名在第一得京官在第九品則又曰茍事事非從仕耶余心是之嗚呼公今已矣且恐朴厚之風從之以盡余又安得不悲嗚呼公諱鶚字朝立姓孫氏故上海世家居龍浦之南因以姓其地曰孫家灣云祖諱怡號節軒祖妣張氏考諱寅號愛溪妣張氏公生六七嵗讀書屬文已不羣節軒府君愛之嘗指謂所親曰吾家世儒達者在此子節軒以文學雄鄉郡有成集行世仕止賔州學正愛溪府君恆服賈逺遊以為養而又以資公之學公弱冠出試有司輒優等嘗師事今中丞東泉姚公公尤竒之𢎞治戊午領鄉薦中遭愛溪府君張孺人之喪哀毁盡禮居閒教子姪彬彬起科目正德庚辰始就選授將仕佐郎尚書刑部司務公在刑部盡心職事時命獄吏清圄舍捐俸佐囚食時其寒暑而矜恤之全活者甚衆諸司事有弗平者輒平之僚友之際不為茍同而卒歸於理大為諸司冦所器若見素林公而下無弗任之年五十七嘉靖丙戌冬以早寒趨朝急遂得疾以二月草六日卒於京師之旅舍配王孺人有賢行先一嵗亦卒京師之旅舍至以雙柩南還遂合葬薔薇涇祖塋之次實丁亥之十二月壬申日云子男三長繼臣國子生娶沈方伯西津公女次繼科縣學生娶劉氏次繼謙縣學生豫表弟顧裔芳壻也三子俱有文行將大發公之藏者女一在室與其同年友嘉定沈僉憲東溟公長子聨姻云嗚呼系之銘曰絀於前將裕於其後年則不永而銘為之壽同室同穴抑又何負視此銘詩以信我友孫孺人胡氏墓志銘國子諸生孫世隆以豫友張進士于漸之狀來為其母氏乞葬銘豫遂往弔焉還而志之曰孺人姓胡氏孫君朝用之配年五十以嘉靖五年丙戌六月草有一日卒先是朝用輸里賦京師留滯越嵗不及視殯殮事既歸而視竁窆事甚哀且哀其賢也卜以丁亥某月某日從葬玈溪祖塋之次遵父命也按狀胡氏世居上海之烏泥涇有諱鼐號耕隱實生孺人孺人生八嵗而孤奉母吳事諸兄曲盡孝弟一溪孫翁聞之遂聘為朝用婦既歸事翁姑尤極孝謹待賓客奉祭祀豐潔中度世隆既知學補郡諸生資給之不乏至北遊國學間謂朝用曰孫氏饒裕如𦙍嗣單弱何君胡不自為計朝用不可徐謂之曰君視吾妬婦耶乃擇得夏氏舉一子愛之與已子等兄文泰多女為養其季者厚資以贅之其他鄰族匱急罔不推濟故其卒也人尤哀之子二長即世隆次世濟女一適張伯澄即于漸子也宜銘銘曰百嵗詎有五十亦壽夫稱賢婦子稱賢母奉之白首爾姑爾舅承前啓後茲石不朽散官北園唐公墓志銘嘉靖乙酉閏十二月六日庚申北園先生唐公之葬合以孺人宋氏兆在金匯塘之東從祖塋也公壽七十有六孺人之壽同卒之嵗又同又同以是日葬蓋合德也人尤賢之其子若孫益哀慟不任相率來問銘圖永終也深按沈君愷之狀公先汴人也宋有將仕郎貴一扈髙宗而南至于松卜居于華亭金滙塘之上厯元入國朝日以大曾祖諱璟字廷譯號東皋祖諱玉字伯堅號耕雲皆有隱德父諱墉字景皋號徑節母周氏有內行公其長子也後徑節府君以次子禎貴贈兵部車駕司主事母周贈安人公諱祚字原德北園其别號也自少嶷異異羣兒數嵗知嗜學長以家産出督里賦遂至中落猶閉户讀書或勸之仕不應徑節府君謂之曰汝宜總家政相汝弟成名吾兩子後唐各有立是吾志也公曰諾遂一意幹蠱色養事二親凡所欲咸盡心力母病久卧公夜未嘗帖席比其卒不渝喪居哀毁如禮與弟西園友愛尤篤西園者即兵部君也字原善舉成化丁未進士後官至禮部郎中聲績隆重公之贊助為多壬寅應詔輸粟關中凡若干斛例授郎官冠服偉如也正德戊辰饑公為作糜粥飯若干人死者為具棺又若干人務樹德也今上登極尋被粟帛之賜鄉飲酒禮郡請當賓位一時鄉邦之人推齒以德者未之先也配宋孺人出望族松人稱蕭塘宋云父諱言號存耕母潘氏孺人生有令質長有令德存耕翁為擇賢配得北園歸北園公曲盡婦道孝惠敬肅唐之族人稱焉燕賓治具不問皆中家孰教子弟晨夕饗饋皆其手出公嘗欲給錢以勵勤者請於公曰利於子弟非所訓也宜以紙筆充公深是之晚嵗猶親女紅家人就寢中堂燈燭熒然刀尺有聲衣飾雖敝不忍厭棄公嘗指所居示子孫曰得承先人弊廬以至今日者宋氏之力也先公以八月九日卒公後以十月一日卒子三長僎國子生先二年卒次傅王府典膳次㒜縣學生女二長適國子生談壽次適金山衛學生李煦孫男十長自誠次自明應例入監自新府學生自謙早卒自道命後仲子傅自得自古自立自守自持孫女七長適馮鳴殷次適王諶餘未行曾孫男五以嗣以禮以文以德可大曾孫女四惟公承家世之舊天賦精敏言動綽有禮度躬行孝友之道惟敬惟勤以終其身故家日饒裕以副其好禮舉義之志詩書之風彬彬然科第踵接起矣蔚為松之望族可謂光前而啓後者哉嘗聞公戒諸子孫云凡事以豫為先小事隔日思之大事隔年思之時以為確論云深初舉進士讀書中祕時與西園公締通家之好茲以兒子楫議婚於西園之孫與公之從子儒實有姻誼今年夏與表弟顧君定芳拜公於里第談燕浹日嵬然名德君子也神觀修整有松柏嵗寒之操詎意遽哭公孺人於一旦哉為之銘曰金匯之塘流湯湯東海沃蓄南浦傍氣聫派續者蕭塘約束靈秀調隂陽中有異産德乃雙何殊梁鸞匹孟光門户宗祧興美唐潮汐草樹俱輝光尚有遺祉封若堂金純玉采深以藏生世猶短沒世長請示茲文徴不亡千代萬代其永昌鄉貢進士錢公墓志銘鄉貢進士錢槐亭先生卒於華亭之里居實以嘉靖己丑六月五日即生亦以己丑六月五日得年六十有一卜以明年四月二日戊子葬於徐家濵東祖塋之次其子子才授狀於深以乞銘深與槐亭同舉於鄉乃今且三十年矣不容辭按狀公諱恩字承之别號槐亭姓錢氏錢出吳越武肅王至公蓋十六世云元直學公􅀢自洛徙松遂家華亭望仙橋之東高祖壽祖號廛隱曽祖行號竹屋散人祖敬號瞻筠考璋號友桂皆修隱德公幼頴異就外傅時與趙少卿經同業書有名初友桂翁與趙恱梅好一日各擕其子游别墅令默誦四書公誦如流觀者驚歎弱冠值翁以鄉賦纍其家日落公勉力幹蠱出耕歸讀與僮僕同甘苦者幾十年遊邑庠與朱御史昴周御史鵷沈教授暄輩爭相濯磨凡試必先一時聲稱大譟從遊者日衆𢎞治辛酉遂領應天鄉薦髙等明年上春官屬翁微疾强之行既南歸極意為養親計郡邑交聘為弟子師悉不應舊所受者亦罷遣之翁嘗受誣郡守宜春劉侯幾不可辨翁籲天曰吾誠有此事吾安得有吾子守問子為誰曰錢恩者即憮然曰恩美器也汝能善其子而顧不能善其身耶遂釋之嵗甲子翁卒公喪葬如禮悉力營墓道人以為難一時門生故友往往取膴仕以去公雖春官不售自如也益為敦本崇孝之行修家乘建家祠設家孰置贍族之田整葺上世諸墓有惟日不足之意丙子喪葉孺人如禮服闋應謁選銓曹公意不屑也乙酉秋以舊患手足顫掉度不能愈即預為後事營雙壙以俟己丑春命子才行親迎禮已乃考終配趙氏賢勞克相側室尤氏包氏子男一即子才包出娶陶祠部女女二長適侯侗次適監生徐應奎皆趙出公平居性極儉勤敝冠垢服每不為恥而灑掃纎瑣之役亦躬為之與人尤和易坦率不為髙岸矜炫之行稠人廣座中欣欣然不廢諧謔田父氓叟有邀必赴雖蔬食漓酒為之盡歡處宗黨尤極篤厚與弟惠白首相愛方病劇時出數金授惠曰我後事具矣汝亦為之令及我目不諱可也侯氏女早寡以承繼為後侯祚益衰俱無所歸先生為之收育于家復教承繼有立為之娶于葉復為之割田以贍人尤以為難云深與公雅相知厚蓋孝弟敦朴人也若夫諳練之才使盡用于世雖古名卿輔亦何以讓乃止于是惜哉宜銘銘曰繄昔侯王必復其始公斂厥施將以遺嗣子蔚蔚槐亭緑隂滿地精魄閟茲尚有徴於不死喬母陸孺人墓志銘嘉靖十有二年春正月某日葬喬孺人陸氏於榆木涇之北原以合於怡閒公之藏禮也怡閒公姓喬氏諱嶽字鍾秀别號怡閒邑故大家公尤倜儻日蕃且大以𢎞治壬戌之嵗幾五十而卒明年成葬孺人躬親視冢壙處墓所月餘後之三十年乃克從焉志也其子通判安陸州事䆅問銘於陸深按孺人陸氏又故大家族於東海之上父諱紳孺人生九齡而母某氏卒乃育於外氏凌妗任即能以幼弟妹各一人同有立既笄歸怡閒公俱以門第相髙而男女比德為宗黨所稱逮事南圃府君余孺人余又故大家也咸色喜曰吾此兒有此婦家其有濟耶南圃府君嚴每有疾即不喜他人奉藥孺人時親執藥進即喜為一啜南圃府君余孺人後先棄養孺人治喪祭井井如禮乃總家政以相怡閒上下親疏曲有恩義延師教子輸粟助邉怡閒公多所賴焉初有慫恿訟事於怡閒公者公曰嚚且健矣獨不念後人耶孺人撫安陸君於旁曰政為之地爾有奴逃且負或謀抵死怡閒公曰計良耶孺人亟搖手怡閒乃置勿問邑故大家以德誼聞者曰喬氏喬氏陸孺人有力焉孺人生以景泰癸酉三月三日卒以嘉靖己丑十二月十二日享年七十有七故卒之日上下親疏多為之涕淚云子一人即䆅孝謹和厚以世其家娶馮氏繼邵氏孫男四謨訓國子生誥縣學生說孫女一曾孫男二曾孫女三豫與喬世姻於孺人則為同姓與安陸君同學同場屋者屢矣蓋通家云序而銘之紀實也銘曰嫓美永世有相者存譬彼喬木隂逺益繁嗟嗟怡閒詒厥子孫孺人相之以大其門其大維何家範國恩鬱鬱高原豈曰後昆過而式者日逺日敦陵谷萬年以視斯文俞孺人墓志銘南京詹事府主簿唐君士儀以公便還葬其配孺人於肇溪之塋者禮也時以嵗辛未正月癸酉者吉也乃來問銘於深按狀孺人姓俞氏諱永寧南昌丞俞公諱麟女也天畀淑慎勤精女紅南昌公竒焉曰必以得佳壻及笄歸詹簿君事都憲公尹夫人公夫人愛焉曰必當佳婦公之去為牧伯守鎮也孺人每以不親養為歉嵗必製時物函獻公夫人在數千里外嘗之必曰是吾冡婦所為也是故終公夫人之世獨孺人適稱順志焉詹簿君績文種學雅量嗜義率於孺人焉是相賓從滿座干請者沓至又孺人中贊之人之知譽之者詹簿君也教諸子孫尤得其理富者進以義敏者朂之學幹者率之以儉勤也其賢若此大抵稱其為唐氏宗婦也年六十有五以正德己巳十一月十五日卒子三長隆義授千户娶姚氏早卒次啓縣學生娶梅氏次政娶沈氏孫三紹宗繼宗承宗孫女二皆適仕族曾孫四官保秋魁期元應魁深竊觀女德最隱其功最巨蓋不獨家之盛衰由之也往往賢女多出於故家名族將其觀化者然耶惟吾邑之俞最舊而以清白禮教傳者最逺誕育孺人言歸于唐唐又最顯族也式克承之身所於處為子為婦為母考於詹簿君於諸子孫靡有遺悔焉懿哉孺人之德所由來者焉可誣哉宜銘銘曰美珠良璧所託者然名山深淵珠光璧器用斯允臧彼被者昌小星易歌河清難俟珠糜璧毁韜珠瘞璧崇岡斯厚以延厥胄儼山集卷六十六
