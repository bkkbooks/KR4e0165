body:
  text: 儼山集卷十七明陸深撰七言絶句五十六首南窗試筆硯二首紫閣花深吏散衙肘懸金印淨胡沙山中亦有間勳業拓得蘭亭上白麻減却塵緣六十餘背山花木面山居爐煙茗碗春風裏龍尾鸜睛自著書即景江門日日弄扁舟雨雨風風得自由昨夜桃花新水漲鮆魚多在碧莎洲水涯一里二里過頭樹三株兩株著眼花東風一片間心力送緑添紅到水涯中歲中歲山林頗有情栁條花蕚弄春晴目長無事江門外獨立斜陽看水生書扇寄楊朝敬一夜江門春水生東風吹浪海雲輕從來不識王侯面兩兩漁舟盡日橫和顧未齋韻寄鄭山人二首暑雨初開江閣空水芳搖動棟花風新裁白苧明於雪間倚闌干送斷鴻蕭蕭竹院午風微曲曲花籬宿雨稀人向此時初睡起海潮正上白鷗磯山間雜花雜花冥冥嶺雲低紫豔紅芳各自竒最愛午風吹作陳杜鵑枝揚海棠絲三月三日與客一絶城外青山翠可餐欲酬心約怕春寒美人肯伴雲中宿為買青驄白玉鞍至昌平與客月下看主人後園梨花最愛梨花傍晚看月光如水漾輕寒為憐明日知何處試借春風暫倚闌書扇贈棊士褚子高陳馬衝車次第行觸蠻蝸角總功名山中盡日無人到臥聽松間落子聲寄題張氏南莊鶴坡南望水如天亦有人家似輞川蓴菜鱸魚無恙否幾時來泛季鷹船瑞應堂留别所知二首世間好事一百一春日麗辰三月三此地故人還故國他時江北望江南四面有山皆入座一年無日不看花此豫山居春聮如何又踏朝天路春水樓船漾淺沙南旺湖二首愛此長隄夾樹行北來鄉土倍關情青山白水渾相似只欠提壺布穀聲逺水貼天霜破曉微風無力搖枯草青蠅不點爛銀盤湖上無山湖更好題扇秋滿江亭生紫煙綸竿穩泛木蘭船多情只愛芙蓉水便得鱸魚不賣錢滿林風雨圖山林何處無風雨不似人情翻覆間我有一區江上宅幾回蓑笠夜深還和趙類菴題畫魚天池咫尺候龍飛荇帶荷錢出水肥神物自應多變化長竿空傍釣魚磯絶句十年憂國鬢如絲一路看山到武夷信宿故園無限意人情莫怪去遲遲送陸生歸天上青雲白玉堂子雲辭藻擅長楊因君併羡南歸鴈海月江雲入夢長龜湖湖繞青山候客歸暖風堪著芰荷衣水中鷗鳥今無數知傍間人不肯飛壽陽察院壁間次韻無心隨處夢魂安古柏臺深五月寒自笑青山老居士松窗間殺舊蒲團入晉南關丹崖倒浸一溪影碧葉抽花十里香最是閩中留客處不知春盡度遼陽松隱為弋陽王冒雪擎寒氣轉豪遍身鱗甲五雲高自從不受秦封後風雨年年長翠濤草萍道中老懷病目向秋風江水西來湘水東可是青山知好客淡雲疏雨翠微中龍窟二首江南澤國水風秋彭蠡西來是上遊百尺樓船簫鼓發和雲衝過百花洲白鳥斜飛水拍天隔湖樹色見風船煙波只許漁郎慣一任蓑衣枕月眠偶成曲曲筠闌雨乍乾拍湖風釀海棠寒不知鄉思添多少寬盡黃金舊帶鞶官署紅梅著花便傷於雪憮然有述因贈提學張靜峯僉憲謫廣東提舉胭脂的的照疏林蝶泠蜂寒春未深一夜無端風雨橫朝來多少惜花心劉都閫送菖蒲虎鬚戟戟映窗紗徑氣孤標露有華見説仙靈通九節夜深清夢伴梅花病愈細煮參苓擁弊裘滿城風雪送春愁下幃強作還家夢蝴蝶衝寒不過樓病起獨坐東堂斜倚繩床落照東一簾秋意捲西風金丹換骨誰曾見欲起衰顔借酒紅有數燕遞營一窠若人之伴工然者偶成湖上雲開水漫波緑隂庭院晝清和梁間燕子如呼侣相伴銜泥壘舊窠乘月行定州道中有懷表弟顧世安絶愛丰標玉有煙故園分袂已多年如何今夜春宵月辜負金臺共被眠黃河南岸見梨花二首煙消露濕鬭輕盈梨花枝枝如有情分付東風莫吹盡道旁留照夜深行粉痕香暈雨初乾惆悵芳心怯曉寒憶向小樓吹鐵笛湘簾十二捲朱闌新野道中隆中迢遰漢江濵輦路風吹陳陳春二十四番今第幾莫將花信寄間人山居八首十旬高臥畫樓東曲曲闌干面面通遠暝欲成梅子雨晚涼初動楝花風人間何處無風雨老去才情減十分半月不曾梳白髮薰籠添火暖香藝水雲煙月市橋西菱角荷錢已滿溪讀罷黃庭三百首人家茅屋午時雞倚空樓閣枕西郊新築方塘漾栁梢忽有山童報竒事一雙孫子鶴成巢背山亭館跨山橋楊栁風多當舞腰一榻夜涼人不寐隔窗疏雨滴芭蕉一樓風雨獨離羣藥裹詩囊酒半醺漁浦一篙翻白雪麥田千頃濕黃雲熟梅天氣晝隂隂簾捲湘筠一徑深十二闌干間倚遍晚來多少水雲心望中城郭故依依喬木千章水合圍風動海門聞鶴唳鱸魚正美客南歸西園四首緑隂紅雨大江頭遠有三山近十洲花外畫輪蓮葉棹夜深燈火上西樓新篁高過粉墻西野水通池欲滿溪坐久不知香穗燼隔窗幽鳥盡情啼三宿青山傍此君農歌時向雨餘聞牡丹芍藥俱開過滿地槐隂湧緑雲竹作闌干樹作軒菜畦正傍槿編門白雲滿地留春住只對青山無一言六月十三日夜雨作寒人間六月火龍蟠秖道牀頭瀑布寒底事江南連夜雨五更欹枕怯衣單送汪思雲還徽州秋風秋雨滿歸舟明發錢塘古渡頭西望石灘三百六倚天雲樹是徽州京口別黃甥良式千里相隨論古今河橋風雨夜沈沈不知此日江頭路何似當年渭水深留題董子元紫岡別業江流南下第三岡曲徑回闌繞畫廊最是杏花春色裏縠紋浮動木蘭堂贈楊雲時望揚雄與世漸無緣誰作侯芭守太玄今上好文先帝武白頭空自感流年儼山集卷十七
