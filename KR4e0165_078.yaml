body:
  text: 儼山集卷七十八明陸深撰行狀一敕贈承德郎刑部主事松雲沈公配封太安人謝氏行狀松雲府君卒既葬之五年獲贈官刑部主事又四年其子員外郎恩始克以品官禮改葬於長溪鳳皇之原初府君以盛年背養其配太安人謝囑其子曰汝為雙壙以待及是卒於天津旅寓謀奉以歸啓而大封焉正德元年夏恩以例得歸省遂營改葬事已而復奉太安人就養於京而連遘婚喪事遂不得行既行而太安人疾作禱于淮卜于徐醫于齊魯衛之間遷延者數月竟不起而恩竟坐違詔旨免官人咸憐之先是府君之葬既有銘矣因改而廢而兹合葬弗可以闕深與恩士同學官同朝且又世世姻媾聞府君太安人之風習矣故敢為狀以請按府君諱鎡字時用號松雲其先嘉禾楓涇人髙祖諱居仁元季避兵因家上海曽祖諱德𢎞祖諱晟考諱環是為梅月翁妣尹氏府君初娶于談産一女而夭繼娶太安人謝氏諱貞字永慕以子貴至是竟同冗云府君之卒也卒於家以𢎞治丙辰十二月望日夀止四十有七其子方舉進士於朝不及見太安人之卒也卒於客以正德丁卯十二月十日夀止五十有四其子侍焉人咸惜其夀不滿德云府君少聰敏以單傳故不為仕學弱冠遊杭有鄰女挑之亟遷居以避其自幼端潔如此年二十三喪梅月翁喪葬一如禮而家稍歉太安人助之經營數年遂致千金之産自是舉義睦宗能世其家外祖母某老無嗣為迎養于家日招鄰母之賢者相與談笑以悅其心既殁喪葬任其費且半諸甥庶弟某已異爨矣長弗能婚乃厚為之聘諸父有葬者為營其墓道費過百金竟不出一德語年三十二喪母復如禮鄉人有負粟至千斛錢至百緡度弗能償悉焚其劵時有亡奴為盜者執而諭以義竟遣之施棺掩胔成橋濟涉殆無虛日而向之所致千金屢空矣市有樓一區既售太安人曰十年成之一旦棄之不可顧吾兒後業也遂傾糚奩贖還後卒以讓其宗黨其行誼皆此類也太安人出邑舊族幼孤鞠于外家翟氏靜莊儉孝尤精女工紡績織紝常至夜分其養祭尤竭力稱其為府君配也恩既第進士府君攜家來京師是日適初度恩戒客上夀府君喜動顔色曰吾上世無仕宦始發於吾兒祖宗之積也雖貧吾願足矣三閲月而南還還二月而不起太安人就養長安者五載遂及封云子一即恩刑部員外郎女二長即談出適陸淮深之從兄也早卒次適韓惠孫女三長適孫天相次許聘張寶忠次尚幼卜以某年月日奉窆恩嘗泣向深曰更延吾父十載延吾母五載於天如何是雖一時逼切之言然封君太安人生既有德沒又有後修短之數似有不足憾者矣惟君子賜之銘焉庶託於不朽也奉訓大夫尚書禮部精膳司署郎中唐君行狀君諱禎字原善世為華亭人居白沙里自高祖而下皆弗耀至君始以科第起家故白沙之唐日益以大君自少頴敏淳謹年十二三即知讀書綴文鄉先生宋冬官克輝時致仕家居以經授徒號博學持鑑徑節公以君往見宋目而器之留置門下既又從張先生士欽學舉子業尋與張同登進士鄉里竒之君家故饒逮君一無紈綺習常寓居百里外讀書以一僕自給見者謂為寒士也由金山衛學生領成化癸卯科應天府鄉薦丁未科釋褐高等觀政某部會憲廟升遐宗伯特選文學之士分遣天下編纂實録君赴浙江至之日鎮巡官以賓禮逆君君往答焉時鎮守者故閉中門欲詘君從旁入君下馬南面立取刺授門者入達即上馬去識者以為婉而得體書既成事多入國史尋賜告歸無何居何安人之喪哀毁有禮丙辰嵗服闋還朝拜兵部車駕司主事明年聞徑節之訃匍匐歸治喪既襄事復還朝改禮部儀制司儀制掌四方封事君每閲佳疏輒口誦之有太激切者為之歎曰言固當如是耶精膳每嵗新茶進御必先至司驗視附其餘為饋曰樣茶者分餽僚友以為常君揆諸心曰焉有上供之物人臣敢私嘗耶乃戒諸門者每茶至必執策數而入之無容入其餘驗既復執策數而出之如其入焉由是樣茶遂絶乙丑升主客員外郎主客所轄皆四裔情狀不一號稱難治君一一調度皆得體時哈密貢方物粗惡倍常數覬優給君悉閲折之其人譁諸庭纍數日不伏曰吾主方物皆有數今乃爾歸必抵罪君徐曰爾主將罪爾耶吾以尚書一咨關吾邊將以尚書一咨諭爾主如何衆皆愕然不敢動蓋其物之粗惡者皆其使之在途潛易也君機敏類如此尋升精膳郎中蒞事數月而疾作竟不可治以卒於長安寓舍時丙寅四月八日也君平生篤於天倫奉二親極孝與兄祚相友愛甚篤與人交不立城府然未嘗不儼然也其為學不為章句文辭好識前言往行博洽體法所繫嘗借豫皇明政要手抄未畢而卒云嗚呼天之生成不偶然也如公之才十不試一二而竟齎以沒抑又何哉深初登第與君鄰寓且有姻故辱君不鄙每公餘即過從談議故略得數事竊識之兹將歸葬於祖塋禮也夫為善而不獲其成茍併所存而泯焉卒亦何賴敢為狀以陳伏乞大人先生刪次為銘聊以慰君於地下也君生天順戊寅四月下至卒得夀五十凡三娶初劉氏再陳氏再王氏子男三長曰儒松江府學生娶張氏次曰侃劉所生也息女三長適府學生戴匆次許配宋公選即克輝冢孫君蓋不忘所自次一女一男皆幼側室王氏出云思巖唐公行狀公諱啓字世明别號思巖裔出子方晉陽靈石人也吳元年有諱英者官上海烏泥涇稅課局大使遂占籍焉英生福福生俊俊生昭皆有隱操昭生瑜舉進士由給事中歷官至右副都御史為憲廟時名臣瑜生鉞以太學生歷官至南京後軍都督府都事生三子公其仲也公生至性孝友和厚儀觀清麗存心正直樂易自如見之者咸敬公公敬人亦無茍者有大才諳練世故通曉時制篤學力行遂成名士時有以粟入監例由此途進者濟濟公獨不屑將期大成而與時忤遂躓不振然其江湖之憂時發諸議論聽者竦然若其表正鄉里一念尤其拳拳者故遇人有過輒面折之弗諱焉又節儉不妄費用能自樹家業奉親極豐故都事公宦遊以豁達稱由公能養志也母余孺人素羸病公事之益謹每樂就公養而不欲宦從既以夀終公哀毁殊切凡斂葬具悉力營辦服甫闋而都事公之訃又至矣公不覺失聲號泣即徒跣南都扶柩以歸時語人曰天乎何困人若此吾大父中丞公忠諒廉直實清白吏而未食其報冀吾父必達而祿秩止此意蒼蒼者尚留有餘之福於吾後人遂刻意訓子迎師取友實皆義方之計其事伯兄千户公隆尤篤禮意待弟政不失以恩故邑中稱公孝友無間云享年四十有七遡公之生以成化乙未十月十七日以正德辛巳十月二十四日終于正寢配梅氏有賢行公德其幹相力敬愛特至子承宗讀書識義克纘公緒承宗娶倪氏生女一公卒邑人莫不惜公以坦夷仁誠而弗夀豈造物之理有不可測者耶嗚呼傷哉沈孝子行狀孝子姓沈諱輔字良弼别號菊軒蘇之嘉定人也孝子幼有至性奉親曲盡孝道成化丁亥嵗孝子嘗出郡母孺人黃盛暑中癰發于頸既決壞莫可治孝子忽心動汗流驚曰得無吾父若母恙乎即日趨二百里餘歸已無及于救矣哭踊絶水粒者三日及至葬會天久雨成潦孝子先一夕率其配瞿泣血拜雨及期果霽既襄事而雨復作如舊辛丑嵗思善府君病腹痢醫藥罔效孝子復率瞿禱于庭願減已算以益父年拜至額瘡忽聞異香滿室思善遂瘥同邑潘郎中時陽作傳行其事錢文通公溥吳文定公寬夏少卿寅張給事寧沈石田周皆有紀述由是孝子之誼寖聞於人人遂聞于御史御史聞于天子天子下其事於府若縣核實以聞天子若曰是不可以不勵爰旌其門於是大書華扁幾與節孝之徐義門之鄭等矣故一時吳越之人皆稱之曰孝子而不名云孝子之先為鳳陽人有諱都逺者登宋進士第仕於揚州會元兵渡江復仕於蘇夜夢雙虎黝然據獄厥明入獄果有兩男子荷校者察其有異隂縱之即張瑄朱清也尋罷官寓蘇之烏鵲橋後瑄清以海運有功並都通顯一日遇諸途遙拜曰吾父吾父即奉以歸清浦清浦瀕海帶江號沃壤因樂其地遂卜居焉是為沈氏南遷之祖也都逺生元震元震生觀光觀光生壵壵生璞璞生箎樂善好施是為思善府君孝子之考也至是七傳矣而家益以大族益以昌美宅良田凡若干區而詩禮之聲益以盛登科賜第聫嵗而有若孝子者猶之於沈氏可謂有德有功之祖矣嗚呼盛哉孝子幼頴敏能讀書長涉獵書史尤好法書名畫古物器尤善鑒定種菊滿庭以娛親悅賓因以自號雅歌投壺與文墨士相周旋而彈絲吹竹家富聲樂其習尚如此性好施與凡親之黨貧乏者惠之患難者拯之凡鄉之人則葬其死而貧者婚嫁其失時者藥其病者橋梁其病涉者修菴觀之傾者壞者殆無虛嵗族叔有諱軒者無後則養其生送其死甚厚徐氏姊少寡則撫其孤勵其志卒以節完天順辛巳嵗海溢遭漂溺者三千餘家則輸粟四百斛於官賑之成化壬寅嵗吳飢又輸粟五百斛獲章服之榮又輸粟若干於邊應格當復得一官因以讓其兄某𢎞治辛亥嵗吳復飢又輸粟一千二百斛獲旌門之榮𢎞治壬子嵗夏旱又請于官輸種豆六百斛于民賴以有秋𢎞治戊午嵗又焚逋劵若干通其行誼如此尤為鄉人敬服至於縣大夫亦多材之質成于門者無虛日天順癸未甲申間鹽徒為寇孝子設法擒送于官一境晏然其材制如此𢎞治己酉有司舉充鄉飲賓戊午長孫照登京闈鄉試辛酉孫灼復登明年壬戌照登進士第乙丑例被上賜有綿纊米肉復有冠帶其遭際如此生於宣德甲寅六月二十二日卒於𢎞治乙丑十二月初八日得夀七十有二卒之時其孫照灼皆以朝命便道還家侍疾惟謹既屬纊戒諸子孫於庭曰人數有限吾本布衣屢被恩榮夫復何憾但鄉人忘吾之惠纍致於訟雖然不可因此而怠其為善之心也勉哉耕讀吾家業爾其夀而終終而不亂如此子男四人長曰梁娶龔氏次曰棠娶黃氏次曰棣先卒娶黃氏次曰槩娶楊氏孫十四照今官行人娶闔氏耀庠生娶徐氏顧氏灼娶唐氏煾娶談氏勳娶錢氏煦庠生娶唐氏爚庠生娶曹氏烋烈焃燾燭爅孫女十四德清適庠生陳金德莊適徐倬德真適郭指揮乾德寧適徐孔麟德溫適上海庠生諸華德柔德良德英德馨德藝德和德潤未行曾孫一未名曾孫女七俱幼其胤嗣如此夫孝之德廣而義之道安前則有光後則有啓生則有享死則有譽若孝子可不謂聖世之耆逸也哉是宜以有傳兹將以某年月日奉窆于崇孝之阡惟當世之宗匠敘次為銘庶以慰諸幽而徵諸明也深外曾祖母實瞿孺人之姑則深視孝子祖黨也又獲與諸孫照灼同朝而灼為同年家且鄰比焉是故托其大者為狀以俟儼山集卷七十八
