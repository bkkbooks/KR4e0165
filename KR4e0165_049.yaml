body:
  text: 儼山集卷四十九明陸深撰序十三送嚴介溪宗伯奉使安陸詩序禮也者緣起於人情會通以大道橐籥夫至和夫然後頌聲作焉休禎應焉今天子大孝尊親又將備物於顯陵陵故在安陸於是特以禮部右侍郎介溪嚴公往凡禮儀之事悉總之奉璽書佩織符至重也蓋古山陵之使而今天子又寄之以精誠焉於是聲和祥協所以為之應者多矣公方自祭酒遷於是國監自司業林先生而下咸賦詩送之深適來嗣公為祭酒乃聨而為什以為贈且遂為之序曰夫禮王道之終也有所終者必有所始無為者王道之始也有所見者必有所因國家拔天下士聚於翰林若將養之以無為和平之福者及夫因能授任各有見焉禮之所為體者固如是公之是行凡以為禮也且因公可以觀禮焉公少以神童聞天下未弱冠掇巍科舉進士入翰林讀中祕書擢史館為編修官校文於禮闈侍經於先朝今天子紹統之初署篆於南翰林召掌成均遷副宗伯自今以往崇階峻陟未見其終也而皆有其始矣其在齠齔時妙語奇句應聲而成每試場屋必以經義為士人傳誦唱進士名幾及第居館閣試必在首選為史官編摩有法戶外求文之屨常滿校文輒得名士南院有望北雍有化可謂隨所因而緒見者矣而况完才厚蓄於是行也有不益懋大禮以弼之成乎夫是之謂緣人情觀會通達和氣以比於王道則是詩也固聲光之洪鬯者非與使事有程式遄其歸今天子開明堂契大道必將賞懋功登名德公當以山陵之威儀為廟堂之規畫以神明之歆格為民物之主持休禎其有不應者乎而王道於是乎成矣此深之所謂禮也公其行哉公之教學也尤有恩諸生至懷涕以思公之去一時屬下多才士觀感之深深之初至京師也翰林學士未齋顧先生遺之書曰善乎嚴公子當以為法故深之序是詩也尤致跂戀焉若夫覽形迹之奇神江山之助隆體貌之尊養宰輔之望此公之餘事也所以望之公者亦餘事也故序送李長史宗豫赴任序余嘉靖戊子再起蒞國子頃之吏部問士於豫豫以三人應蓋皆臺諫才也其一即李君宗豫頃之崇府以長史請吏部疏名上由是宗豫遂遷或謂豫曰先生薦宗豫作臺諫顧乃得外藩得毋少之乎豫解之曰古今稱臺諫與宰相權略相埒蓋惟臺諌能言之惟宰相能行之謂其皆得與人主可否是非以圖成天下之大業若夫輔導啓沃之功則宰相居多是故臺諫資卑宰相責大故凡有可否是非之任與輔導啓沃之益者皆臺諫宰相事也蓋嘗有布衣恭相業者况長史固一國之相哉輔導之啓沃之偃然相天下業也宗豫為不薄矣其尚求所以報稱哉宗豫領𢎞治乙卯貴州鄉薦登乙榜去教蜀又教浙又教南畿之建德既又奉特旨入教魏國徐公遂擢南監學正已復改北且滿四載宗豫之履厯深矣今天子修親親重宗藩輔導之職必欲得人宗豫固擇而使之者哉行矣昔董仲舒以漢之醇儒逺過公孫輩乃出相藩國凡相兩王皆驕仲舒正身率物以禮誼匡王咸敬重焉况崇王殿下好學秉禮有漢河間之典則而宗豫以該洽之學敏贍之才端諒之行輔導之固今之醇儒也而崇王之賢有弗敬且重之乎宗豫其尚思所以報稱哉使王以名德重天下屹為河南之屏翰則宗豫亦隱然有重望固今之仲舒也宗豫勉之邇者臣僚建言籓府諸佐有聲績者許入為京朝官今天子立賢無方安知宗豫不自此而陟華要乎長沙之徴前席之問有日矣雖然相一國與相天下亦略相埒相一國稱矣官至大夫榮矣又奚必中外崇卑之較乎此固仲舒正誼明道之説也宗豫行哉因書以贈重刋周禮序周禮一書説者以為周公致太平之典或又曰戰國時書也議周禮者持此兩説久矣謂其為周公者以其廣大悉備周萬物而不遺輔三才而皆當非聖人不能作也謂其為戰國者以與孟子王制不合又謂下至輿皂之事皆備書疑周公不如是之猥瑣也皆有所執故卒不能合鳴呼秦火之後載籍散亡失次惟易為全書而諸禮之病尤甚蓋自戰國諸侯惡其害己巳盡削之故諸經亡於秦而禮尤先焉者竊嘗謂是書實本於周公而今之周禮則散失之餘者也或又曰未成之書詳其規模亦既備矣漢興諸經書稍集而是書獨亡冬官一篇至購以千金不能得河間獻玊始以考工記足之足之誠非是也向歆父子尊以為經馬鄭諸儒與唐孔賈氏皆有注疏然但承河間之舊而已至宋諸儒力校羣經號稱有功而於是書亦略逮俞庭椿始為復古編以為冬官不亡特漫入五官中耳於是刪取五官之羡餘與無所附麗者以為是真冬官也吳澄遂考注之以為周禮復全彼固有見爾其間亦有不類冬官者要之竟非全書也大抵法因時異治以道同善復古者在倣而行之耳竊嘗讀是書而有感焉以為良法美意盡此則幾於王矣古之人有用之而卒以敗者其故何耶抑亦存乎其人爾茍存乎其人雖得其意而遺其法亦可也善乎程子之言曰必有關雎麟趾之意然後可以行周官之法度信若是則是書之全闕又在所不必較者矣雖然必有得是書於言外者因重刋之而并著其説如此云贈别駕屠先生致仕序三一屠先生以太平之政來致上為增秩而許之於是金緋在躬廷辭而去中朝士咸相顧歎曰賢哉或曰是以退為進者耶世有俟滿課功陟竟弗及者而先生顧於此得之庸非進耶雖然非先生之心也或曰先生仕不得意位不過下大夫官不過州郡是以去雖然非先生之情也或曰先生稍厭世樂髙間大江之南風日之美有釣遊舊業故去雖然非先生之志也先生有用世才視天下疾痛如在已宦轍所至嘗以一僕自隨廨宇壁立如梵舍晝夜治文書不休是為樂髙間者耶今大司冦公於先生為兄夏官奎進士壵則先生之子也若鼎彞引前珠玉擁後而委蛇在中是為不得意者耶其在武昌時破寃囚斷疑獄號稱神明其在建昌時恤民隱抑權勢作民父母臺省藩臬交譽疊薦先生皆退然不居而獨於此時求進耶夫出有為處有時古之道也是故幼而學之壯而行之適可而去之其學也若飢其行也若推其去也若遺先生蓋幾於是矣何為紛紛乎議之淺也或曰禮稱七十致仕先生齒髮尚壯若是者禮與昔宋錢若水早罷欲以進退之道自全先生初為郡推官與錢同其折獄事又同後所至雖不同而其去也適當人主之初年則又同殆欲以是勵世風與為轉移感動之機與是或先生之微意而非僕之所敢知也武庫林君利贍夏君某王君某畢君某相率請贈故序重刋千金寶要方序自古無不效之方而世醫有不識之病若也為對證之藥此方書之所以不可少也是編千金寶要蓋傳自孫思邈云我大中丞西野先生張公撫蜀以自隨因以濟人而每效焉視他方書特為簡約可傳公亦寶之公自內臺出任旬宣之寄數年以還凡三易鎮至於藩臬之長皆再蒞經世之務靡不達練設張舉措各有次第而尤以濟人為先務如此方書其一也雖然先王之政為之醫藥以濟其夭死是故本草昉於神農而周禮命之官屬後世則有專門名家以效用者皆仁術也夫仁故無小行必自近先王為理之要固如此思邈此作又嘗託之神異以取信於世要其實理亦有不可誣者今夫醫得其理凡醫得是書而理之人有其書還以證醫之理則所全活者必多矣豈非王政之大端哉而亦公之微意也於是左布政使陸深右布政使衛道合辭請而梓之冀以廣公之意會道以遷行深亦內轉皆不及視其成成之者參議鄭重也鹿門遺隱詩册序昔漢龎公隱居襄陽之野曰鹿門今鄭君成大隱居新安之野亦曰鹿門古今人若是其同乎按史載龎公在襄陽時躬耕壟上劉表勸之仕不應扣之至再則以遺安之語答之而去蓋古逸民之流與今成大寧有是乎曰不必盡有是也而其人固龐公之儔也成大少孤事其母兄以孝友聞處閨門有禮壯遊四方考德資善年五十歸為隱居計家在新安之雙橋鄭故節義士子美後也雙橋濵湖負湖為腴田成大親操鉏鎛率童僕耕耨風日中如龎公然大夫士髙之遂改姓其地豈不以成大真龎公也哉豫竊謂龎公當東都末季隱或非其志也其答表語蓋以之風表者後表卒不能安及其子方其時固有髙林深淵之慮為旦夕栖宿之謀而已隱豈其得已哉今成大當熙洽之朝無意外之患保林泉之嘉遂髙尚之志是真隱者其與龎公同乎不同乎又未可知也孰得以其地為疑哉雖然地之靈勝者必鍾為奇偉之士而奇偉之士居其地亦輒以名按襄陽之鹿門本號蘇嶺因習郁而得名因龎公而遂顯若是安知雙橋之不可名鹿門乎又安知雙橋之鹿門不因成大以顯乎又安知成大之終不可得使雙橋為鹿門乎成大今年六十葆和養志其子亷豫獲識之是能承其所遺者又按龎公有子某其孫渙皆為魏晉達官成大之子若孫又安知不龎公若乎同其終必同其始豫故得書其事授亷識之送黃翠巖節推考滿序翠巖子黃協恭以才進士出推松江松號大府所轄才兩縣爾而地皆儉於百里六官之事最其浩繁者視他一省而刑獄尤甚何則松之四境多枕江湖而東盡於海昔時嘗富淳矣近年多事而水旱乘之民力日困爭訟之風熾矣夫江海之間易擾困窮之民成嚚勢使然也翠巖之為理也原情麗法事至立斷鉤距鍊煆之術無所施凜若神明而兩縣之俗遂革一府若無事然于時述齋何公作守元峯李侯副之皆負當世之望每稱之曰翠巖其人傑哉於寅協則良友也法律則老吏也器量則元卿也吏民之歌頌帖服者則師保也父母也奚啻乃廉靖之操直大之行三年猶一日也會當書一考還朝適華亭令闕府倅龍岡張侯攝之狄丞希明率僚屬請為贈言而以屬之上海陸深顧無能為翠巖役也其何敢辭夫自晉魏以來仕宦之籍門閥為重至於世德繩武之風實鮮其倫漢唐之後文章政事分為兩途若夫全體合一之學世不恆有兼之者兼之者豈非一代之豪傑哉翠巖學士壺隂先生之孫也先生少為世師名滿四海而仕獨晚達深之待罪翰林也同為編修官既而司業國子深復踵代景行師法固有餘地而先生不豫鄙也憶昨戊戌之春忝以學士讀卷有事于內閣得縱觀諸進士之文賞歎之餘意欲求得世家士攄其文獻以光輔聖治而翠巖在焉實始託交而翠巖亦不余鄙也余既歸田而親炅翠巖者又二年所見逾於所聞逺矣然則莆陽之家世松江之政績翠巖真人傑哉客有過余而問之者曰今制舉進士賜第後例分中外外補厯三年則後科進士資及受代去矣翠巖兹行分當得代將陟臺省躋華要以光壺隂之祚使我朝有世臣為國增重固斯文之慶也雖然此貫魚行鴈資格之説耳夫資格以待常流不次以待異等今日翠巖之行吾子之所謂人傑者果若是足乎豫應之曰資格朝廷之懸也銓衡吏部之權也持權以破格此用人之人之事而我何與焉若夫本以不次之才而甘為循資之舉無躐等無躁進而我亦無與焉此豈非天下之真豪傑哉翠巖行矣當有所遇也問者唯唯而退因書為贈儼山集卷四十九
