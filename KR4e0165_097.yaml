body:
  text: 儼山集卷九十七明陸深撰書京中家書二十二首自黃甥家人來得吾兒六月間書知為考試留松至今尚未知院試吾兒名在幾也末世浮競滋偽不足介意次第程子看詳學制罷去月書季考以息爭此是大賢經世深意可思之思之宋朝惟呂申公韓忠獻家世可法吾意欲兒隨衆就試以養氣體省奔波不知誰同相處姚子明想共事否餘可擇交語云泛愛衆而親仁吾兒以謙厚存心最好鄉人來俱稱道此雖不足恃詩云庶幾夙夜以永終譽可用以進德也至囑至囑今打發桂魁周秀二人徑往南都恨不及汝入場左右之吾老衰日甚望汝不淺待此翻消息吾亦當結局矣為汝母病耳非言可盡非言可盡努力努力恩典得及三代吏部再題上即出謝矣許仲貽有書知之八月三日山立侍我三年往來水陸二三萬里小心謹慎早晚醫藥效勞過於骨肉吾兒知之今遣與唐中舍同行陸仁伴送還此間薄有所助亦不能加厚吾兒可經紀其家使不失所至囑至囑唐世全待我敬愛倍常見時可致謝併謝龍江翁也差去桂魁周秀計草一二日可抵南都吾兒試事惟當盡人以聽於天但吾兒早有令名可思所以保之此書到日事當已定吾此間得信早有分曉别有書去也汝母聞病漸好老年人不可恃第一不令管家事間靜中又防有悶鬱處可思所以承順之家事大小吾兒須要周詳慎密最是門戶要緊要緊各家人俱要守本等餘事可問山立仔細八月十八日晚來始得南京鄉試抄白名字吾邑竟無一人上録豈氣運所關耶吾兒且可因此積學未遲也目今可一意奉汝母親以安我南顧之心此間官事亦有轉動機括但我在仕路三十餘年未嘗有一希冀幸成俟命而已知之知之家事我悉付汝自宜勤慎謙和但家下倚靠生事之人不可不嚴以待之事露即送官府重治我家前車可鑒毋得再令小人藉手以為功名也至囑至囑門戶早晚切宜著緊關閉房屋上緊補完其間區處吾兒自主張為之我亦不與也奉母之暇自宜治心養氣讀書窮理以希古人汝得名太早吾私憂之學召夫婦欲要北來當别有書九月十九日人來傳汝三叔行事過當吾不敢信至親人到方問得的確但只是為利耳初無大失只是吾老矣恐招尤取侮為家門之玷吾作書勸之所謂垂涕泣而道者吾兒早晚當愈加謙慎積誠意感動之亦可説破此意也如今朝廷甚明我輩文官家不好如張孚敬閣老家事危不可測知之知之不能盡不能盡昨寫一紙寄與蘇州陸鳴鴻恐到遲今附唐子登監生知汝下第還康健為慰自古得失窮通俱有定數如今嵗又不測乃爾凡百只有安命極有受用須要進學不可疑阻吾處此頗安穩前月衙門有火災甚異賴聖明幸免罪過又恐流言驚汝輩也知之知之汝母入冬來何如前附芡實方可常常煮服想有益而無損也慶龍并新甥要節慎風食家事種種吾悉付汝隨宜料理仁義為上不必更求增益以奪汝向學之心此三年正好用工以逺大自期待要與古人為侶後此汝父母老矣惜隂為囑為囑族中諸骨肉并世安至親等俱一一致意榛姪近有書物至可謝之長子不幸殊可惜也長安東軒十一月七日顧子龍上舍來為乃祖東江公乞諡得文僖葬祭恩典皆蒙聖賚甚厚亦孝子慈孫也南歸附此今年畿省試録陸續寄回雲南方到已完矣吾兒想曽著眼吾以廣西雲南為優以其有規矩也語云三人行必有我師焉不可漫過如有疑可劄出寄來以考所見如何向見包中書自南來傳馮提學先生盛有稱許且感舟楫大江之夢近陸棐舉人至所説亦同果然吾兒當勤惕向上以求無負知已也家事只宜敬慎收束吾兒將此事操練熟以為他日致用之地亦無不可但不可學驕奢侈靡耳冬盡著一二人回探望汝母只要左右奉養醫藥調理為上此間懸望差一的當人到餘不一一十二月二日寄來墨卷觀之辭理不失格式俱是但氣未貫耳將抄出細批還得失有命不足計校正須更下三年縝密工夫也用以呈石門老先生極口稱美有批語柬帖併還思以報知已也至囑至囑新解元卷亦自有好處惜空疏爾未易輕視之臘月草四日燈下正蒙一書難讀吾嘗欲箋注數語不敢輕下筆橫渠先生認氣為道與吾意見不合今得此書寄吾兒讀之有所得處可寫出寄來日常讀書工夫不可間斷却要理致分明行事須義利路頭辨别耳盛名之下難副吾兒自須喫緊龍江今堂老夫人訃音雖無的報吾亦不曾奉慰汝可行弔禮為我具祭作文一軸郁直齋儲芋西皆可隨宜沈西津俟其發引吾有修玉牒事且兼學士聖上恩威俱不可測南除南歸事且不敢言及吾兒為我久長作區處可也汝母有一日者云過今年尚當強健且看秋冬間姑以北來并出玩山水勸之汝可料量以慰其心須時時報的實信來族中親戚俱可慰達下第諸人歸可訪勞之朱子明孫汝益有書禮至别當奉酬可先謝之日下大忙不能一一今年江南文運似厄郡中才兩人劉德資復下第頗可念顧道夫姿性聰慧過人且相聚講學用工以待時未晚也吾昨於初三日謝新命恩始終十年不欠一日復上玉堂豈有數耶玉牒纂修須待書成意作南歸恐不得如願奈何奈何劉奉今日到傳説汝母病愈但不見汝手書爾意甚懸懸汝可盡心侍養册立事尚未有期且候的信作行計也扈駕沙河失朝候罰俸三月知之知之翰林院到任擇在初十左右事畢令姚雯回報恐此信在後到百凡事可敬慎世道日下吾兒務以寬厚仁惠為本餘别有信報知不一一今科會試録出於未齋甬川二老先生之手方復得成化𢎞治之舊只照此説理修詞自可合格矣不必務為浮詞漫語以取主司之厭薄也作舉業須體貼經傳為主只看蒙引與虛齋所選程文亦可我自十五日入閣下讀殿試進士卷今早五更入華蓋殿拆卷還姚雯尚未行復寫此報今科名第皆朝廷親定校閲試卷甚精且當真不世出之英主也初內閣擬蘇州陸師道作狀頭其卷甚佳御筆批作二甲第五取袁煒第一文華宣讀已出復召二老兼未齋入改為第三親擢茅瓉作狀元吾松二人皆居前列莫如忠初亦擬在一甲之列董子儀文字亦好但有繆誤處須得與吉士選也試録名字一本凡讀卷官俱有今寄回可藏之近黃甥標至具知家事委曲三月七日髙石灰人至書亦到殊念汝子母中夜為之泣歎吾既留滯於此且有職事付託此出聖主淵衷未敢作辭謝計也奈何奈何吾兒敬謹勤慎鄉人來輒有美譽吾晚景頗以為慰須向百尺竿頭進步也古人云愛身明道修已俟時此喫緊第一法也眼前不如意事亦須區處要令胸次灑然不可傷氣尤宜勸母親減煩惱省間事至囑至囑吾兒少便得名却須忍耐忍之一字衆妙之門吾老來亦只學忍也知之知之五月草六日孔子有言不如鄉人之善者好之其不善者惡之吾兒所具鄙吝矯激之言但安受之不妨吾一生在毁譽中老覺得力若做鄉原濟甚事不足與校也側身修行却不可放過寄至古文二篇不妨酬應已為批抹塗改可細玩味之自汝學為文吾皆在奔波之日無暇指授法度前日寄來三場卷亦已令人録出亦要細批不曾得工夫辦得文章是儒者末事亦須充養始得吾家有老泉批點孟子可讀其次多讀漢書韓文左傳却被近時學壞了成一套子矣朝廷每有大事必令與議但乏書考校此間亦復置買數部兼抄得竒書亦有數種四川板禮記纂言便寄一部來家內藏書可曬晾收束再做數廚匱亦不難此傳子孫至寶也可倩山立輩併桂魁等識字人逐一清楚作一書目寄來殘闕查卷數明注其下只作經史子集分類標出宋元板并近刻分作三四等有重本者亦注出此間可損益也畫卷字册亦須架閣古人重收藏也歐陽文公圭齋云士大夫寓形天地可託者二一曰有文二曰有後二者未必得兼吾蚤年成名科第皆占髙選今官為學士薄有文名筆札著述流傳海內未必一一合作古人於今人亦不為少若吾兒向上不墜家聲無憾矣六月十日自東閣議禮還書昨日有書與髙石灰張九錫今日行再附此此人在京吾待之頗盡委曲到家可隨衆行賀禮今嵗京師濕熱如江南梅雨尤異故自五月初腰痛牙疼殊不快近日已蘇但覺人事勞攘日用廣費耳吾亦懸念汝子母顧瞻桑梓如在天上奈何奈何此間人伴緊用鈐束陸方夫婦却用心不至如人言也吾兒治家聞有條理時世如此更宜收斂家人輩治生斷不許放債若曹濟陸鑑量與資本或以租米換布來此亦可緣我要知家事爾酌量酌量飯米可隨便附搭蘇物蜜果之類要用六月十三日得汝所撰筠松府君行實文字亦可觀但欠世次事迹詳贍遂留俟吾兒到京商量要求得神道碑文字須慎之今且先啓神主櫝抄寫生卒年月并查考葬期尤夫人同寄來汝祖妣墓志石尚未埋俱留浦東南宅上所以久俟者正為今日爾可查出墨打四五幅寄來或先抄白亦可勑命亦要謄黃來二代共四通此要作新誥命按據墳山工作秋間可再加修理粉飾之吾兒便可承當靠人不得此等子孫祖宗有靈亦不廕祐牌樓題扁吾只欲書一官蓋大事惟簡重若事誇耀便小家相汝三思之即日世安四弟俱已入城骨肉團圞於久别之餘亦是旅中一樂但汝母子懸隔安否在念却又添一倍情緒也吾此間人伴粗安亦無他難事只今年濕氣過於南方著意調理醫藥不離頗覺衰年酬應費力爾亦以節省為事使用人事須用家資幫貼可於房錢內寄得三百兩來應手却俸資可積整銀如此計較亦要兩便耳知之知之家中諸事四弟輩亦未曾細話吾兒能善處自有天理切不可傷氣致疾至囑至囑古人云忍過心清涼不必與俗人校短長也吾賴朝廷祖宗清銜美秩已為過分吾兒能做好人富貴何足道也六月草二日此集劉德夫先生為庶吉士時館閣中試題月課先生丙辰科豫為庶吉士時嘗得其抄本讀之甚加敬慕其製作和易典雅無後來險怪之氣吾兒觀之如何如何草二日對雨書昨草二日有書附奚黃門乃弟今相姪行甚促再附此相來吾兒備道曾醫汝母有勞有力相亦滿口稱吾兒行誼吾甚待之厚但其所謀所望者皆非吾力量可為兼於事體甚礙甚不得意而還觀其詞色似忿忿然吾兒可善待之善待之世道下移人心叵測宜加意加意汝母前可稟知顧東川并四弟俱到别居早晚相見事尚未處也此間有一處相應房子講價千金若決成須家中取銀六七百兩來此房要作久計也意要請汝母來再有處置定當報之吾兒可調理身子存心養性為第一義家事預宜收束著落吾不從中制也六月草四日儼山集卷九十七
