body:
  text: 儼山集卷八十六明陸深撰題跋一題海叟集後海叟集舊有刻又别有選行在野集者暇日因與李獻吉員外共讀之又遠次為今集云先生多權奇有才辨雅善談謔卒亦以此自免於難顧其詩乃雅重悲壯渾雄沈鬱殊不類豈先生别出其餘以應世而中之所有固自不可測耶深先生鄉人也恨相去逺無從考論姑誦其詩以附孟氏之義云題蜀本史通深在史館日嘗於同年崔君子鍾家獲見史通寫本訛誤當時苦於難讀也年力既往善本未忘嘉靖甲午之嵗叅政江西時同鄉王君舜典以左轄來自西蜀惠之刻本讀而終篇已乃采為㑹要頗亦恨蜀本之未盡善也明年乙未承乏於蜀得因舊刻校之補殘刓謬凡若干言乃又訂其錯簡還其闕文於是史通始可讀云昔人多稱知幾有史才考之益信兼以性資耿介尤稱厥司顧其是非任情往往捃摭賢聖是其短也至於評騭文體憎薄牽排亦可謂當矣善讀者節取焉可也題史通後按史通十卷舊本定為三十八篇篇繫一事惟因習分為上下篇上篇舊稱闕文今本存三十七篇比因訂正曲筆鑒識二篇錯簡乃類為一篇以還之於此未必其本書也而文無煩綴矣知幾之為此書也高自標致嘗謂國史以敘事為工敘事以簡為主故自子長丘明而上皆涉評彈然此篇之冗長亦不少矣笑前人之未工忘己事之已拙嗚呼修辭之難也如此題七賢過關圖右畫雪景谿山樹石間為關門下自關門騎而乘者七人為黄牛一為騾凡五為馬之蒼者一從人八各有所負持為琴書囊箱之類皆日用所需物若移居然位置筆意頗有佳趣衣冠似魏晉間豈世傳所謂七賢過關圖耶今為樗仙王公進徳所藏公方供事章聖宫闈為今上眷遇日向柄用其所嗜好者乃皆琴書圖史之屬有甲第在東華門外清整雅潔未嘗與俗人往來休沭之暇即闔户焚香彈琴讀書或展古名人墨妙臨寫不釋手故書法遒麗遂成名家與當代之張東海蕭海釣輩可以並駕也尤好接禮賢士大夫讓座設榻皆欣然不厭煩予召自蜀藩入掌大官適主其家毎接緒論宛然一儒者乃於席間覽此圖亟為稱賞非徒以其藝焉而已公即裝池成卷求予題數字踰年而未有以復也按七賢過關事無所考豈竹林之人耶或曰即作者七人爾蓋畫家多尚興致不屑屑形似要在得其意於筆墨蹊徑之外可也公遭遇聖明叅與帷幄密勿之地以其愛畫之心而為愛才之舉則天下必不至有遺才如此圖中望望而去也予重以是望之書偶軒先生小傳後傳曰使於四方不辱君命蓋言有死道也何則置身險阻犯瘴霧風濤之毒死一也抗手夷庭有跋扈彊梁之虞死二也所死不同處死則一而已雖然唯仁者不以夷險貳其心然後能委順唯勇者不以禍福奪其志然後能明道故曰非體之難所趨之難也蘇子􅀸䧟身匈奴者十有九年當其犯險阻叢脞厄瀕死者數矣世恒為子􅀸重重其能處死也若偶軒先生黃公之死於海非所謂仁者耶公死後二十年深從公子今御史君如金遊公之從弟諱乾剛從公於難者亦有子曰希英同舉孝宗朝進士故深聞其事甚習乾剛雖無使責然因使而死謂之死於使亦可也非所謂勇者耶公既膺卹典久而御史君兄弟俱以文學紹庭愈逺則愈傳而愈烈可無憾矣然使國乏忠良家乏弟弟䧟彼兩賢惜也悲哉題蘿山集潛溪宋先生景濂開國文人第一百五十年來博學洽聞未見其比也深讀先生文最早詩則無從得焉妄意先生於此毋乃小有所讓抑亦昔人所謂難兼以長者近得蘿山吟藁五卷讀之鍜鍊之精工體裁之辨治氣韻之偉麗詞兼百家亦國朝詩人之所未有也欣慰累日若還至寳於是歎前輩之高雅世未易盡知而又以愧深之寡陋徒相值於遲暮焉而未暇學也是嵗己卯長至日書書戰國䇿後二首余家窮鄉又故農也素無遺書迨余又力薄故其致書比於他難也十五六時喜讀蘇氏書側聞先儒悉謂蘇實原於戰國因訪諸友人得一斷簡蓋齊䇿至楚䇿凡十卷受而讀之其事至不足道而其文則至奇時恨未覩其全也壬戌之春㑹試南宫始購得之猶非善本下第南還避谷亭者幾兩月始伏讀之然殘闕者多未免遺恨嘗作三論兩補亡十五擬代雖詞采無取當復棄去然於是書不可謂無意也正徳改元余第進士之明年始於同館徐子容借得善本手自補校而余之所有戰國䇿者乃僅可讀於是竊歎夫學欲及時而淵源不可少云竊以是書古昔大儒多以其縱橫之習鄙而棄之故視他古書舛錯尤甚中間雖經劉氏曾氏之手今所傳本則鮑彪氏吳師道氏所為校釋蓋因劉曾之舊而加密焉者鮑氏嘗詆高誘為陋儒然鮑之高論自專動以聖賢律游談之士是其所短而吳氏主於攻擊鮑氏持論往往失之太過反有不若鮑之得其平者間因校讎之餘正其句讀通其訓詁而二家之言復時折中之藏去以便私覽尚冀他日之復讀也䇿首舊載諸序猥雜今定以劉序曾序為冠其餘别為一卷以附其末云題所書後赤壁賦國初書學吾松嘗甲天下大抵皆源流於宋仲溫陳文東至二沈先生特以毫翰際遇文皇入官禁近屢遷為翰林學士故吾鄉有大學士小學士之稱民則不作行草而民望時習楷法不欲兄弟間爭能其所存有如此又聞之前輩言民則蚤年書甚瘦勁渡江以後務為豐腴妍媚以合時尚文皇毎不喜歐體以為織竹編葦有衰颯氣象予家所有二沈手筆不少而以民則赤壁賦小楷為第一惜乎止得前篇為寫後賦以具蘇文之全非敢方駕於古人聊以示兒曹耳題誌窮錄後嗚呼此安成之風化世所謂三窮之圖而一代名賢高士之所為歌詠敘述今中丞弓岡周公之世澤在焉深讀之既而後知天人之相為倚伏者昭昭也哉窮於此達於彼窮於今達於後窮於為善必達於獲福若是錄者可觀也已初安成之周族古而傳單至贈御史梯雲公凡幾世矣許孺人之相梯雲公也年十九而公卒卒之四十有六日而弓岡生是時舅姑年五十矣夫一門之内祖窮於獨婦窮於寡子窮於孤斯非天下之至窮者乎斯天也既而朝廷旌門矣孺人受封矣弓岡有子矣斯非天下之特達者乎亦天也嘗聞友人吕仲木有五苦之論則許孺人造周之功為不細此則人也夫天之福善人之感天豈不昭昭也哉方其窮時使孺人一念可奪則周氏之一脉無餘矣雖天亦將何所施其報乎所謂忠臣烈士嚴師大賢節婦慈母鼻祖孝孫孺人一身實兼之弓岡方以道徳風槩左右聖天子功業日躋恩榮時頒上及厥祖下廕後人則周氏之三世且將為三達矣孺人之於周功徳何如也敬書諸末簡以示有永題方氏世像自封建廢天下無世家五方之都㑹風氣通淺凋榮最易獨重山深谷往往能養其渾朴之族而引之予觀開化方氏此冊三朝之禮度數公之儀範若身見其歴歴於一日間也思道尚思所以引其世哉題李楝塘詩文卷後嘉靖壬辰予歸自晉陽舟次阿城七級之間待水南下時李侍御㘅命西巡得朝夕談敘因出楝塘詩文凡十巨册皆當代名筆展翫再三如入寳藏因以歎侍御養志之勤予許為作傳先成二詩繼贈侍御侍御仲子生威侍相與論文談道時時成一小詩皆隨筆寫之侍御父子各持去若與奇物等予取適不問所憎愛也舟過沛中流有災滿載而燼併與符印俱失相顧錯愕不暇為謀而向之十册留予舟四册者獲全相眎驚喜而予之筆墨一空侍御父子尤惜之予亦促歸悵恍如夢既而南北不相聞者三月侍御控訴天子再給符印俾終巡事便道過予東海予為述懷并記一時遭際如此題張九苞高房山畫卷此予同年張進士九苞所藏畫筆簡淡深逺無纎穠習氣房山以畫名元盛時其人品亦高極為趙松雪諸公推許是當為真蹟但後所題至正丁卯殊為可疑按松雪集載題高彥敬畫詩一則曰堂堂侍郎公二則曰尚書雅有氷霜操又曰與公攜杖聽潺湲則房山當為松雪前輩矣松雪卒在元英宗至治壬戌時年六十有九後十九年順帝始以至正紀元不應此時房山尚在也况至正又無丁卯嵗耶按史順帝以癸酉即位改元元統又明年重紀至元后六年又改為至正是嵗辛巳也訖於二十七年丁未而元亡後二十嵗始得丁卯實我太祖高皇帝洪武之二十年也不應復以丁卯繫之至正此其可疑者也豈此畫舊無題識後人愛而或以意增書之耶書名籓至徳詩後深既題名籓至徳之什復序次所以以道君臣之分嚴而雍睦之化大可以風四海傳百王無疑也顧詩人之旨不白似於美盛徳告成功之意有歉乃復申為之説曰先王之制禮凡以修徳也先王之修徳凡以永世也世之修短卜於徳徳之大小卜於敬敬之存忽卜於心心之出入卜於人人以檢心心以主敬敬以蓄徳徳以延世夫然後中氣應而和聲協於是託之人文被之管弦薦之宗廟此帝王之業而咏歌之至也周之先王蓋嘗卜世矣故其詩曰文王孫子本支百世周之徳至文王止矣故其詩曰穆穆文王於緝熈敬止蓋言文王之子孫皆百世也百世之子孫皆修文王之徳也恭惟我太祖高皇帝神功聖徳嫓美文王盤石之宗屏翰皇室晉王殿下孫則六世也文之昭也於今天子分則君臣親則兄弟也一以世天下一以世其國帝徳王道於是乎告成可謂以克永世者矣如此詩所歌玉芝白鶴有合於六義之旨趣此雅頌之道也將見前星有耀世府儲祥其世又豈特如周所卜而已則是册者固將與河圖大訓同為國之禎符豈但如周家所謂卜世而已以被弦歌薦清廟則是詩之義也深故不厭其複而以是終焉書青烏先生葬經後右世傳青烏先生葬經以為漢人而史失其名間嘗取而讀之詞義淺於葬書决非兩都之製豈好奇者反有取於景純之成書剽獵撰次姑因葬書所引經曰者以傅㑹之將以誇世而眩俗中間雜以術士巫師之説而錯亂刓闕恐亦已非當時之舊矣豈術家之言秘嗇隠穢故應爾耶乃為節其浮偽正其次第叶以古韻始為可讀而地理之學頗亦緒見於此又恐非後世卦例星峯繆悠之談所可同年語世當有知言者而重愧余之懵於是也今按葬書所引經曰凡三十而此書所存者無幾據其所存則反不若葬書之精奥此又後人竄竊之一證也豈景純所受之青囊顧自有其書與抑亦趙載者之竊讀煨燼所剩與皆未可知也余嘗覽近代之載籍質雅近古惟魏伯陽之參同與郭景純之葬書爾然參同以艱深之詞文淺近之術地理則以繁難之術亂易簡之道將是書者固龍虎上經之類與雖然葬薶之禮實繫人事之始終而仁孝之道於斯焉有助固非神仙荒唐之事可無待於世也故為之論著其所以以俟君子書越行小稿後嘉靖癸巳浙江按察使芹泉姚公遷山東右布政使僉事碧湖洪公遷廣東左叅議予亦以副使遷江西右叅政同日報至例當辭巡按御史而後去時御史九畹謝公南巡于台遂以三月六日渡濤江聨舟而行七日辰時抵蒿􅄵舍舟就舁行萬山之間至寧海禮成由奉化甬江曹娥而北予少後望日午刻復抵蒿壩得詩共十八首皆途中之作夫登涉雖勞矚眺實逺故屢形之言既已入舟茍非偃息厥有應酬蓋有不暇者亦勢也聊復存之以紀一時之感寂如此書學古編後元人於書學有復古之功吾子行尤長於篆籕圖印之學今京師學古編非善本間為校正數字重次第之託吾友姚尚絅錄之以便考觀題七寳寺僧詩卷嘉靖甲申六月晦秋之三日也予遊七寳寺入門考驗覽觀知寺舊為陸寳院吳越錢氏以塗金經至遂易今名若加一寳云然陸寳本以陸氏家山名非以寳數也其承傳久矣少憇方丈中颯颯有秋思僧靜菴焚香作供出此卷蓋張學政友山先生手筆初為法忍寺作復作此以遺碧山僧豈其所自珍愛者耶友山名璞鎮人也有文翰名此作亦自清逸可翫因附記嵗月於此付靜菴嗣碧山藏之題利路紀雨詩三首嘉靖十有四年乙未予領益州自秦趨蜀以五月八日戊辰至廣元古利路也蓋行百有十里甫就館而雲雨交作入夜霑足明日南行一百三十里望栢林驛而雲氣坌涌命舁夫促步以至堂坐未畢而淅瀝四灑矣從官候吏與一時父老咸冒雨列庭中讙呼叩頭曰此方一旱四十餘日公來而雨隨之某等小人有命矣舉手加額至再至三予慰而起之既以為喜復以為愧也因識以詩是日東南有虹霓氣映以雨脚微成五色黑雲中神龍蝘蜿上下予行峻嶺西日未蔽光射之爛然身在天日雲雨之際又一奇也晩宿驛亭蓋古葭萌縣云明日復行百有十里至槐樹驛驛據七盤坡之麓時北雲閣雨適蒼谿令何繼來迓遂率之登山巔道觀致禱而下明日行八十里午抵閬中今之保寧府治也是日亦有雨意而物望尤切自顧六十老人千里棧道既窮日力兼抱隠憂與民俱病矣方當休偃市藥尋醫不過付之浩歎明日壬申晨興而天愈晴朗心愈憫惻乃命郡縣長吏合厥僚屬秉誠祈天予遂齋沐將以詰朝羣望是夜三鼓雷雨大作簷溜如注約三四寸餘不覺失喜推枕次前韻一首予復將有事於順慶爰自嘉陵曉渡因上錦屏登書閣北望盤龍玉臺諸山而罷循江南行入山山稍寛衍人知瀦水畦稻桑桐栢竹藹藹有吳越風致古稱揚一益二正為農桑論也八十里至南部縣問顔魯公離堆記無恙否云離堆瀕江去此尚五十餘里而崖刻己漫滅久矣因歎金石之不足恃而忠義之氣則萬古如新有模致碑字并題名乃宋人書而亦既剝落矣入城西門有橋題曰狀元蓋為宋陳堯叟堯咨及馬涓云按三狀元史稱俱閬中人今割地入南部得專之矣縣前有山若列陣名曰跨鰲又云前連蓬萊後枕閬苑夫蓬萊閬苑道書所稱海上眞仙靈異之境嘗有擬之中禁者不知此何以云蓬萊當指蓬州大蓬而言閬苑即閬中本名隆中以避唐諱爾隆閬聲相近意蜀語為然豈好事者遂附㑹其説如此又志稱閬中山水甲蜀遂將比於蓬萊閬苑也是夜宿城東分司明旦月望而望雨益甚姑命禱之而出西南行數里觀鹽井多在山麓有深至三十丈者人以竹木作高架汲出煎熬亦有水淡者復以竈灰雜土淋鹵煮之頗亦艱難顧利於旱爾所謂造化無全功者殆此類耶又百里至大寧公館已屬西充而保寧南界盡矣予所行總六百里而東西不與焉可謂大郡矣夫郡有田蠶鹽稻之利使有司勸課以時人皆力作為益不小豈非保蜀而寧之哉此昔人命名之深意也因併記之以備郡乘十六日丙子發大寧三十里至瀘溪館小憇有風從南來習習而雲片如簇須臾川谷𡨕蒙絶有雨意遂三疊韻冀終惠焉儼山集卷八十六
