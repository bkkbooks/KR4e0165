body:
  text: 儼山集巻十八明陸深撰五言排律六首江湖覽勝芳草天涯路乘潮舴艋輕三生今世業萬里一鷗盟山送杯中影灘縈枕上聲微風采石渚圓月岳陽城賦就漁燈讀詩成旅鴈驚滄浪甘世味瀺灂足浮名波靜安三峽雲開見兩京逍遥湖海外吾獨羨吾生挽王復菴錦文藻王褒手年華賈誼才秘書天祿閣驄馬繡衣臺自許溟鯤化終成市虎猜節旄頻奉使松菊早歸來門雀無勞問巴猿益可哀大江流浩蕩勾曲聳崔嵬秦嶺重逢雪揚州更詠梅性靈陶萬象魂夢繞三台鵩鳥悲斜日昆池起刼灰平生山嶽動身後簡編開駿骨千金價天章五色裁長抛緑野地高卧白雲隈掛劍人終到生芻首重回傳家今有子他日兆三槐追挽王愚菴儀像風雲杳衣冠草樹稠行人收涕泗立馬拜山丘古有隆中操今從地下遊空傳楊子宅尚憶李膺舟地亦三槐古門惟五栁秋著書深擬易作賦過登樓鴻鵠雲霄闊龍蛇嵗月遒山川還正氣風雨泣中州俎豆千年祀碑銘萬古留欲將椒桂酒一為酹眠牛卄五日夜漏既嚴抵安徳水驛有僕自北來遇之得家書已附還家信應知去國心一身還我有雙鬢為誰侵松藥如無恙琴尊或可尋刪經存相鶴臨帖課來禽小閣開蘆渚枯棋閟橘林逺山春雨靜新水夜潮深乘興客移棹素心朋盍簪野情偏浩蕩秋意正蕭森自覺忘人我何勞問昨今沙田縁海稔無藉雨為霖春野緲緲蕪烟緑依依栁日明好山圍畫幛細水咽琴聲心逺江湖適身閒黻冕輕鞲鷹回夜獵攜鶴看晨耕藉草遥憐色愛花時問名韶光偏屬我節序總闗情蜜足蜂羣倦泥融燕陣爭臨風一盃酒相與了浮生詠雪禁體虛館都門裏遥空雨雪時雲同山受鎖霰集地承篩初對無還有徐看正復差霏霏旋布宻陳陳漸成竒入瓦猶飛􅘇披墻故累基蒼皇忙宿旅鼓舞走羣兒氣襲裘功劣光揺眼力衰撲階登陛級打戸閣扊扅勢倍初昏㑹威伸入夜期空林愁鳥雀曠野失狐狸古屋深藏脊危城正没陴牕腰明敝紙字脚飽殘碑山勢勻肥瘠湖聲帶嘯悲贅疣瘡竹節擁腫病松枝池沼甘居下郊原苦厭卑當庭昬有影卧地險成夷田犬思馳逐鞲鷹欲奮追四簷迷一色獨榻下重幃風過梅苞瘦陽回麥壠宜墨池乾更掬茶鼎渴旋滋真足臨書巻應堪弄酒巵樓臺誇富貴歌調競嗢咿座擁嬌娥鬢杯分俠士髭生憐江上客困憶隴頭師帆濕橈迎凍兠膠馬礙馳豐年昭國瑞聊復一題詩七言排律三首發谷亭曉乘江漲下徐州秋氣侵人著眼浮小棹載青蓮子摘甫田揺綠豆花收林蟬泣露鳴無節江鴈和雲去不㽞時物每驚羈旅改江山未惬壮心遊乘槎欲奉張騫節作賦思登王粲樓薪火千年湘水哭干戈滿地浣溪愁良辰勝境難兼得久客窮途易併憂桂槳蘭橈輕日費筆床茶竈逺風流吕梁山勢危奔馬邵伯波光蕩没鷗雨蝕龍蛇殘石裏徐州州治唐碑并子由黄樓賦刻月明簫管夜橋頭山連天闕遥通海帆帶風花故滿舟此日懸知真有助當年自分總無求夢魂偏向家山入習氣難除書巻抽寄語篙師休汗漫倚廬人老不禁秋夀西安楊節推七十為其子孟鸞上舍賦蚤嵗青雲曽得雋中流綠髪已懸車眼看甲子年将亥戒守庚申夜是除楚國江山空犴狴壺天日月付樵漁白雲獻罷千年賦青鳥銜將咫尺書舊歴漸抛身未老新陽纔復景初舒雲霄有子堪傳鉢滄海他年擬結廬鼎鍊芙蓉丹已熟門填蘭桂慶方餘朝來七十遥稱頌此是先生一度初曲江歌送趙天挺歸省曲江風日竟如何碧樹紅雲傍海多春暖瑶堦留舞鶴吟成白雪雜鳴鼉高堂㑹見重生齒舞袖新裁舊賜羅石氏里門應却騎秦朝源水更通波天邊曉日牙緋近浦上靈風彩鷁過真有神仙居陸地願将勲業帶黄河遥持寳鏹臨桑梓重拜鸞封照薜蘿綺席味甘羅海錯軟輿春暖擁琱戈還憑鼎養供期耄不負庭趨費琢磨我亦有親歸未得因君聊賦曲江歌五言聯句席上限韻送沈仁甫憲副陜右鸞坡新拜命栢府更乘驄繼孟别路風煙隔離筵臭味同縉闗河迴逺使氷蘗奏膚公深大華羣峯削昆明一鑑空孟春長城韓范在麗藻古今通繼孟共羨恩袍紫何憂塞火紅縉朱輪常帶雨玉節徧觀風深威動三邊士名傳五尺童孟春徃年資砥礪今日見英雄繼孟聖主方虚席王臣仗匪躬縉七言聯句十五首雨中同嚴介谿張碧溪懐宋西溪地官今雨懷人一水遥深小堂深竹坐蕭蕭江間去棹憐仍駐臺裏緘書枉見招嵩剪燭無由聯夜榻裁詩還憶共春瓢公餘漫有皇華咏鈇為寄相思趂落潮深與石門介谿聯句二首坐愛書聲起隔鄰嵩隨風和雨伴吟身盃深翻恨春宵短深交好誰論白髪新匹馬衝泥歸路逺鑾隻雞高㑹故情真詞林舊侣今南北嵩百遍相過莫厭頻鑾載酒遥臨揚子居深寂寥春夜滿床書即看詞客非常調鑾頼有高篇足起予細雨緑深庭下草嵩短檠清照席間蔬十年無限綈袍意深猶喜同登白玉除鑾餞别聯句三首稽山白璧産來雙喬親向瀛洲沂玉淙宇家近蘭亭秋正好韋夢回薇省醉初降永佛燈深照離筵菊俊詩句頻催永夜釭傑江鴈有書還寄石天和寂寥慰我客邊牕深樓船南下乞靈風深白露横江水接空縉夢繞紅雲雙闕迥宗心隨碧漢一槎通宇離觴照蠟情偏切韋授簡催詩句未工永佳㑹良宵須記取天和不妨寫入畫圗中傑離筵高啓逺公堂傑漏盡何辭更舉觴天和光彩可憐雙白璧深文章絶妙幾青箱縉飄飄仙躅丹霄下宗渺渺鄉心碧海傍宇明日星軺當曉發永淡雲應䕶鴈天霜深丁丑六月二日與東江石潭未齋介谿餞别閒齋司業於受公房聯句二首十年蕭寺此重遊清一酌還同惜别留聚散無端庭樹長俊隂晴未定海雲浮宦情莫問僧炊飯鼎臣詩興惟憑客倚樓天末相望重相憶深欲攀江栁繫蘭舟嵩芳樹移尊坐夕隂嵩清風為我濯煩襟天邊為别難今日佃海内論交見此心池草夢回凉夜雨嵩江雲望逺碧山岑謝家兄弟多才俊清共沐恩波玉署深深道院夜酌聨句三首月色虛牕逗客燈深坐疑身是玉壺氷仙源幾曲塵蹤隔孟春雲路千重浩氣凌小鶴立庭渾似約繼孟清風入座鎮相仍何當漏下催歸騎恩離合其如重友朋縉深深簾幙晩風清縉滿座衣冠四海情宫漏隔花仙掌近深月華如水帝畿平臯比有道憐張子孟春宣室多才愛賈生紅燭燒殘詩興逺繼孟賞心誰復謂難并恩月光剛照蕊珠宫恩對酒論文興正濃楚水昨憐何遜至縉吳宗逺愧陸機同天連鄉國俱為客深地借山家幸有公花雨坐深雲洞閟孟春共看彩鳯下梧桐繼孟與介谿聨句長安東陌復西城深十載并州客舍情寄跡不妨旋馬地嵩歸心如負狎鷗盟遥山晴送城頭色深好鳥時聞禁裏聲金馬由來方朔隱嵩日長門巷似氷清深綠雨樓賞月聨句二首淡雲疎雨弄清光艾尊酒南樓共晩凉燈影照牕人語靜嵩烏飛遶樹漏聲長隂晴誰謂闗離合元圓闕情知是抑揚此夜萬金難買得深歸程休促馬蹄忙艾綠雨樓前月色明承仁雨餘良夜似秋清市喧不到人初定深鄰火新分漏有聲翠䕃滿庭驚霧下承仁黄花一樹隱蟬鳴誰家喬木今傳我深莫遣三槐獨擅名承仁願豐堂後隙地疊石作小山與張碧溪聨句旋分泉石作溪山深圓嶠方壺在此間一柱擎天高卓立鈇四時含雨細潺湲常疑虎豹穿羣去深更覺猿猱費力扳斜嚲却如垂舞袖鈇娉婷復似綰雲鬟幽懷乍對簾頻捲深佳興堪乗屐未還安石東山非乆計鉄子綦南郭偶偷閒敢言夙有山林骨深自分久違鵷鷺班人事化工相勝負鈇酒尊詩巻日躋攀深集句三首舟中集杜句寄顧九和諭徳二首愛汝玉山草堂靜更有澄江消客愁竹葉於人既無分微軀此外復何求穿花蛺蝶深深見長夏江村事事幽安得仙人九節杖獨立縹緲之飛樓爾家最近魁三象童穉情親四十年避地何時免愁苦斷腸分手各風煙謝安不倦登臨費蘇晉長齋繡佛前李杜齊名真忝竊封書寄與淚潺湲再集一首寄徐子容侍讀更為後㑹知何地想見歸懷尚百憂念我能書數字至似君須向古人求三年奔走空皮骨萬里風煙接素秋寂寞江天雲霧裏鶺鴒飛急到沙頭儼山集巻十八
