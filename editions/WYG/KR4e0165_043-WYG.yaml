body:
  text: 儼山集巻四十三明陸深撰序七郊祀録序故事天子有事于南郊卜自正月上辛預於舊歳季冬之朔備鹵簿法駕啟大明門南出郊壇太常奉犧牲天子躬親臨視一一唯謹謂之看牲既還宫翌日命大臣以次行詣中馳御道禁旅分隊夾從出入甚嚴明早盛服入奉天殿陛前復命大臣以次歳一行焉正德十三年已卯臣深備員國子司業忝預視牲之列是歳皇上巡西北二邊大臣與視牲者才十有三人於是人遂輪次矣又六飛未旋郊期再卜於是臣深遂至於六往返矣蓋異數也將事之夕臣深得分獻風雲雷雨之壇各以小詩識一時之感遇附以齋居之作題曰郊祀録藏之篋笥蓋曰禮謹於微榮以為懼云爾臣深謹序李世卿文集序本朝文事國初未脱元人之習渡江以來朴厚典易蓋有欲工而未能之意至成化𢎞治間宣朗發舒盛極矣然要而論之蓋有兩端以雕刻鍜鍊為能者乏雄深雅健之氣以道意成章為快者無修辭頓挫之功故修辭類於雕刻而雕刻者辭之弊也道意成章者近於雄深雅健而雄深雅健又不止於成章道意而已大抵深於學昌其氣然後法古而定體吾嘗持是以考焉而有愛於李世卿之文也世卿嘉魚人名承萁與其兄承芳相師友嘗遊白沙陳公甫之門舉於鄉年甚少遂不舉進士而肆力於古文章是編也昔在翰林日假於崔同年子鐘錄之一日發篋因敘而藏之以備一家言尚當訪成集以考借冦囘天詩序嘉靖四年夏四月十有一日庚子上海有災于市市據邑中甍棟鱗次其西為縣衙其東為學宫而禮殿為近是時日方下舂旋颷扶揺邑人喧呼烟熖滃翳莫測也布政使西津沈公有屋去之丈咫而深之寓居亦值其北風從南來融甚乃相與匍匐往救之議斷火衝然力微勢重無與也通守松江府方齋鄭侯適署邑乃自西來指麾倉皇水具火政畢備整襟再拜曰直攝令天降重罰當抵直躬是邑焦土惟上鑒匪逺仰天眎雲物徘徊則又再拜曰茍微直之故惟上帝霽威以惠下土敢以身請乃端立不敢動屏竦以俟少焉風滅火熄其尤異者太學生陳相之家火燎其棟矣止若畫木乍見創觀厥惟神相士女填道沃燼拾爍變慟為嬉萬口一詞咸曰我鄭侯之神力也侯方退然不居曰天庇斯邑予亦何有侯既還邑政邑人愈神其事相與歌謡騰口積帙渢渢有聲旁達四馳侯初不知也深既目覩身臨乃聨而為什序之以傳曰災祥之來也𤣥哉邈乎昔鄭子産之論火也歸於天道劉子政之傳五行也附之人事二者豈皆通論也乎天道果逺人謀無能則曲突徙薪之計輟矣徴驗著矣人心從之則巫蠱禱祠之禍兆矣是其畔理以干政豈曰細故也哉故孔子之作春秋也以備裁成合一之道災祥不忽事應不書若曰神而明之存乎其人爾茍非其人變不虛生茍無其徳福不妄應是以君子之為道也至誠以格天責報不敢也勤政以輔行非望不冀也存吾心於齋莊靜一之地以養此氣於勿忘勿助之間夫然後天人之際一而位育之業致矣易曰先天而天弗違後天而奉天時蓋是物也彼有噀酒反風為者抑亦末矣侯之學有本原殆夙有聞於斯與觀其一節可以知已侯向用伊始勲業鼎來異日所以格天者尚有大於是因題曰借冦囘天聊以慰邑人士大夫之望侯名直字子敬别號方齋襄陽世家與其從父吏部郎中伯與先生少相淬礪並以正學聞于當朝云送陳靜齋都憲巡撫南還序今江以南蘇松常鎮徽寧池太凡八大郡首之以天府附之以杭嘉湖三郡而財賦幾於國家之十六七矣重以人才之進退利弊之興革凡地之故可以裨國而裕民者悉以便宜從事至重也天子必用才德譽望之臣寄以巡撫之任今嘉靖更化之始江西靜齋陳公以右都御史為之公年壯而養深學純而志大敷施翕張與道變通期月之間政用就理方欲為江南建不世之績施行次第各有端緒議者謂天子斷然用公以贊維新之政雖公亦奮起許國以天下之重自任僉曰兹惟為宜何則今之巡撫以十數而必以江南為首江南之巡撫以十數而必以文襄周公為首蓋江南地重文襄功大故也公文襄公之鄉人也而才望奚啻蓋嘗畱意文襄之江南者有年矣故議者謂天子用公之深意與公所以副天下之望者又曰兹惟為宜雖然文襄江南之功以久任成也識者竊恐公之一旦入為元輔不獲終文襄之業盻盻然望之而不虞公之遽去江南也公謙冲消息與道為體懇上辭章至于三四天子皆答以温辭勉畱而以别㫖遂公之去於是議者始兩疑之謂公之未可以言去而天子未宜遂公之去之早也士大夫願為畱行江南之民至欲遮道使不聽公之去屬下僚吏咸相顧錯愕一旦失所以為師承稟受之規者松江守何侯合其僚王君某以問于陸深曰天子固欲成公之髙公遂決去矣如國事何某等不能無惑於議者之論非徒以藉奬拔共功名為也其義何居深鄙人也病廢久不閑當世之務以深凖之凡公之所為去與天子之所以聽公之去者皆古之義也何則自古聖君之御世必有度外之舉措以待英傑之士故其意常恐異日之乏才而所以為敷貽之地者無所不用其情自古大臣之事君嘗以身繫天下之輕重而無心於去就故其意常恐人主輕天下之士而所以自重其身者多主於早退是故世有餘才而士多髙尚所謂上下相與以有成也公年甫五十經綸具在異日國有大事事有大疑一旦起公於燕閒之中坐而濟之方今天子神聖睿畧蓋世亦知天下有難進易退之臣以堅其尊禮不遺之志則所以宏鬯中興之業佐成嘉靖之化者逺矣比於當一面舉一職何如也竊恐文襄之未足以與於此是公之退乃所以為進今日之去乃所以為異日之來也何侯聞之曰子之言然請致之公大司冦立齋吳公七十壽詩序大臣之進退繫天下之重輕往往當天下隆盛之㑹則大臣多饗壽考福履之盛而其子孫亦必重賢疊肖出膺世用以延續聲光贊佐國家昭熈之休者無窮若今大司冦立齋先生吳公固其人哉公少登甲科典司内外刑獄明允詳恕資階屢遷至按察使召為太僕卿入輔孝廟邊圉蕃育之政績勩懋著進為少司空由少司空又進為大司冦出總今上畱都之務攬憲持法侃侃不囘忤意權姦竟為所中退而家居未嘗以幾微自見若是者其所繫何如也公之伯子山為刑部郎中奉命按事江西仲子巖為工科給事中聲望照映實時名流其重賢疊肖者何如也深比起告北來拜公於吳江里第衣冠儼如瞻顧炯炯若泰山喬嶽滃鬱蔥舊之氣猶足以出雲雨澤㝢内退而詢其所事事日惟教子弄孫沃以詩書之澤吟咏登眺於湖山空曠之表而不知年之與積也乃歎曰我國家涵育休養川嶽之氣完厚効靈毓秀於一世之耆彦若此是豈非隆盛之極㑹哉故曰非有喬木之謂也有世臣之謂也深既見給事君於都下私以為賀而未敢告也明年正月八日公壽登七十偕其繼室丘夫人之誕同焉給事君方當天子喉襟聰明之寄稱觴舞綵未遑所私凡厥僚好謀為公壽且以慰給事之心於是六科之長吕君道夫俞君國昌葉君良臣潘君伯和王君存約石君巨瞻合而屬敘於深夫大臣於國家無間逺邇至於所以幸其身之綿長而安固者非徒為太平之符瑞聲容之敷張以震盪耳目而已也古者憲老而不乞言漢養三老五更於國學宋起文潞公於朝堂惟師尚父則亦以耋耄之年成開周之績其於理化何如也深與國昌實鄉人謀為之壽與所以為給事君慰者尤切是故推其所繫者尤大為諸君子先焉頌禱之義則詩人備之矣碧溪詩集序科舉之業盛而此學廢仕進之心勝而此學微蓋彼有所工則此有所拙嗚呼獨兹一事然哉慈谿張子威先生自少時一再遊場屋即棄去學古人之道攻古人文章學既成咸可試用㑹有推轂士欲薦之天子遭讒罷去然胸中負挾益富練閲益深開口論天下事髯㦸㦸若繅絲炙轂竟日而不竭也一座人皆驚服有弗當其意者終席不能發一聲聞人之善千里赴之亦有隔屋而斷請謁者然坐是落落今年過七十老矣而猶未有所遇合也稍用其學為人修敘譜牒以自資歎曰是猶能食吾力者茍非禮義之宗輒亦不往也正徳十年自粤來訪余一見語合明年再見論益合先生自謂晩獲知已相從於寂寥枯淡之中久而樂焉一旦思歸出其所為詩一帙曰子知我宜為我序予受而讀之曰此唐人之格律而碧溪子之性情也先生之學其盡於是乎盡於是則世人或能知之余宜無言且猶未也未也則余不宜無言夫文章與事功難相兼而聲名與貧賤常相值大抵安於貧賤以養夫聞望固君子之心詳於文章而畧於事功者豈君子之得已哉績學勵行存乎我而功業所就因於遇不遇之間是故有難易焉姑以詩人一節論之自古好文之主有聞于名篇佳句輒與宰相議求其人而誦所作於直廬燕見之頃者顧以致斥兹非難哉夫天作之君君立之相務於延攬一世之才而用之操一善者無遺挾片長者畢達故宰相求之天下天子得之宰相者職也先生宜自愛㑹當有夢卜之舉舉於今日先生名鉄别號碧溪子因以名集云壽路北村郡伯序今天子興自郢邸改元之年即用汶上路公賔暘守松由是天下咸際中興之㑹而吾松重沐維新之政矣乃八月九日適天子萬壽之節而公亦届懸弧之辰天人妙合君臣應期兹豈偶然者哉詩書所未有也郡之大夫士相與詣闕上萬壽畢將次第登公之堂捧觴為祝公既合郡之僚吏寓公鄉袞致詞拜舞退將次第以慰邦人之意者忠愛之風行上下之儀辨君臣之義篤天日開明禎祥協候一時之盛又吾郡所未有也太學生王淮喬䆅顧定芳輩相與謀曰若此非常事而歌咏紀次無聞焉不可吾輩將最其大者壽公以告於陸深曰松郡介在湖海之間土沃民勤為天下先在司牧者安定優畜之耳我公仁恕慎厚視篆以來無毫髮擾民不復知有官府而桑麻禾黍被野矣願公至上壽以長養吾松也又曰松實富饒而敦朴之風視昔少衰矣我公明練嚴毅事集於庭者如蝟徐出一言無不立决而天理民彞因之感格者多矣願公至上壽以長教吾松也又曰我公才無不宜望則素養自舉進士時已甲天下之選居郎署典大郡皆有重名故公之來松也望治者跂如覿德者薫如被化者淳如漠如也願公至上壽以長此風庶於松有所矜式也先生以為如何深聞之曰君子哉之言也美不溢上愛不忘本禮不踰制三者備矣是可以壽矣雖然古記有之安我所以寧天下也存我所以厚蒼生也故古之仁人君子其志不在一方也然自一方始天之付畀斯人也所責匪止一事也然自一事始猶之千歳之日也然自一日始是故我與天下常相通而安寧所繫者至近也而至逺也此華封嵩髙之意而聖人之所録以示其微者若此若公之壽夫豈吾松所可專哉殆將自松始耳自松而始以輔成今天子嘉靖之治以措天下於安寧仁壽之中則吾松豈獨後也况降生之始蓋已有黙兆預擬之數矣諸君子請因人以驗諸天衆皆躍如起曰是可以為公壽矣請書為序儼山集巻四十三
