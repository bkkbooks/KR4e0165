body:
  text: 儼山集巻五明陸深撰五言古詩一三十七首園中芭蕉産甘露金色若蓮花而大幾盈尺欣賞一首園古草木茂氣和休祥集老堪寄一廛當此三江入緑蕉隱輕霧紫葩垂巨實駢房類馬齒厚味過蜂蜜蟠桃經千嵗優羅竟誰挹縹緲仙人掌馨香鸚鵡粒珍竒徒飽聞何如手可拾文園素中消起痾冀一吸太華玉井蓮菡蓞黄金濕孤標自無羣惆悵臨風立食芹想明主欲起為什襲倚檻良有情搴芳偶無術把酒一賞之拊膺百愁失還聞制頽齡大藥儻可及欲草貞符篇緬慚春秋筆聽雨白髪日夜長青草縁堦生江村荷時雨潮田愜耦耕稍稍辨逺樹依依見孤城魚鳥亦何意上下如有情撫已得良晤與物本同生遭逢百年間重隂幾開晴儼山西偏鑿方塘而未及泉四面窪空若壁適春潮暴漲懸澑而下若珠璣萬斛水晶簾一段迸空垂舞噴射照耀奪人目睛而衝撞漰湃頃焉出聲又若張樂洞庭之上信天下之竒觀也作詩紀之九天落銀河一部喧水樂自昔飫竒聞于兹破塵濁東風吹海門潮頭擁蛟鱷漫坡已鋪練澑崖遂懸瀑雅音發鏗鍧天籟韻宫角横開水晶簾亂颭珍珠雹迴風拂漚沫落日漾瀺灂排波摧氷霜蕩空驚鸛鶴雖慚逹人觀緬希百川學無私理則然盈科仰先覺嗟予方寡陋昔賢何渺邈垂老卜此居偶爾期浣濯林木日已繁茅衡向堪斵相要素心人文史事商㩁慶夀寺西廊齋居贈沈仁甫山陵屇良吉羣寮秉精誠梵宫庭宇靜願託塵土形華鐙照木榻四面凄以清璧月度雲漢珠斗當女城值我同心友相依敘平生弱齡結髙誼白首有定盟君為澗中水我如隨風萍萍飄入澗水蕩漾永合并送王存約赴惠州遠别當長歌歌短調轉苦鄙生寡諧合屈指那可數夫君重意氣交誼薄太古豈惟到爾汝未暇辨賔主同懷奉聖明何心慕纓組契闊萬里途恨無衝風羽客宵仰雲天明星燦三五清河曉發清霜肅晴野秣馬乘暗發長逵㑹凄風疎林薄殘月三五東方星横斜北斗沒似聞度前陂苦寒傷馬骨遊虎丘憇劍池上作盤石廣且平萬木鬱以蒼中有高樓臺翼翼何煌煌黄金塗殿柱五色錯中堂問是誰所居緇衣禮空桑感此金石固變遷不可量始因伯業顯中更晉諸王况以血肉軀焉得久樂康促膝臨澗水澗水清且光澄碧照我衣可辨黑白黄俯身濯長纓素手激清凉適意易為别悵悵不能忘西堙曉發日出山霧黄五月氣猶肅溟濛十里餘轅馬傷局縮豈不憚馳驅所欣恣余目沈沈樹隱岑稍稍黍抽陸仰觀雲中岫俯視澗底谷境深工出竒地古尚餘樸駕言問民風十稔九無熟巖嵌時突煙委複閟土屋行行重嗟咨明光竟遺覆予本登才賢幽探事陶育撫此晉陽區孱綿愧食肉送王憲副廷吉赴蜀出郭已可愛何况郊外遊十里歴大陸偶此值杪秋黍稌畢刈穫蕭條見高丘宻雲釀㣲雨輕塵斂前騶送客遠行邁道路阻且修臨岐一觴酒去去不可畱丈夫懷明徳仳别難自由雜興江河赴東流日月西馳速天運有乘除人事工報復如何首陽薇一去無後禄子雲最和同符命手自録婉婉舒我言徃徃覆人國叶亦知重身圖誰家非骨肉伊余六尺軀寧用千鍾粟禍福止一時安能辨直曲浩歌歸去來田中有茅屋晨起南牖納凉庭柯含逺風時暑散煩襟豈乏華屋爽適我良所欽頗愛陶彭澤五斗北窻隂南薰來前楹何必懷千金野居自云樂俯仰遂素心素心亦何有息影睠山林嵗月忽已邁江湖一以深手持一編書中有太古音誦言消永夏是非遺昨今坐月效古肅肅迨秋夕明明月流光衆星燦若珠三五正縱横居人不能寐客子懷故鄉大化無停運弦望倐相當鴻鴈多哀思庭柯變青黄時徃老將至悲來夜何長咏彼蒹葭詩悵望宛中央儼山精舍晚意林深暮煙紫海近秋月白稍稍神慮淡悠悠寺喧隔乾坤等逆旅誰非逺行客遣此百憂端棲我一畆宅楚狂雖忘世湘纍竟何益寄情混漁樵託契友金石新秋别三首送唐士回悠悠都門道執手從此辭明時各致身那復計别離君已寄民社我愧空文詞相視各不語秣馬當風嘶馬嘶識故道落葉戀故枝仰視雲漢間牛女將秋期二潞水日滔滔豆花復離離新凉動長河樓船正南馳相望日已逺何以慰相思願多東來風吹鴈過京師樓頭夜初永起坐薄羅幃團圓向人月鑒我懷中私三與子三嵗間一嵗一聚首人生少百嵗能共幾尊酒子年三十餘我已二十九後時聚散期日月能俟否同心多仳離良會不可久奈此參與商任運付何有遲嚴介谿太史遠至卜燈穗近約嗔路遥娟娟十載别盈盈中夜潮僻地安足賞佳人不待招榆栁含新妍泉石共孤標雖慚陳子榻廼有顔生瓢開徑屢延竚永冀念久要我有平生人二章我有平生人故被雲錦裳灼灼桃李顔娟娟饒清揚婉婉吐麗辭纎纎素手長後宫選名姝三千一身當逺從二妃遊歴覽周八荒膏車駕言邁使我涕泗滂念君不能已謳吟遣巫陽二我有平生人善鼓朱絃琴清商發髙彈泠泠太古音萬人羅列聽歎息一何深玉衡指孟夏朱明自南侵曲中正悠揚絃絶調不任鸞膠是何年長令負此心豈不増悲辛古意日已滛連理詞挽畢封君春草碧髙阡春晴寒日煙下有雙白璧上有芳樹連連理復連根根深葉何鮮大枝髙一尺蒼蒼欲擎天孫枝復秀發直起拂雲穿樹色耀白日璧光掩重泉出土城即事粼粼原隰遠遲遲麗景晴始欣出塵想遂暢同物情夭桃出穨垣曲澗縈舊京民俗遠漸朴山照去猶明天闗古無對邊塵今自清撫時感雨露縁禮報生成因公遂攸徃倡言紀兹行發昌平山城麗淑景沙堤度輕輿身從雲中歸疑有雲生裾離離列巘崿藹藹越里墟時有桃李花無言臨澗隅雜詩苦乏山林資來此朝市遊日月不相待華髪變清秋晞心中道獲懍懐末路憂浮隂隱層城輕冰結洪流孤語冀冥契同逝匪良謀緬慙南征鴻豈曰道里悠遊潤州城南諸山日斜始取路春服遂遊行街迴復巷轉西望見岒岭道旁車輪推呦呦何嚶嚶平濤灌時蔬健婦日把耕意愜勩不辭奮歩直前征荆榛鉤我衣煙霏拂我纓忽焉凌絶頂俯視江與城一氣漫浩浩清飇四傍生藉草聊小憇為樂不可名暮景漸㣲茫欲下仍含情晨發柯村藹藹山川曲朝曦散秋光草露尚未晞嶺樹變㣲霜白雲滿長谷此中多深藏遵養共時晦滅景不可望擾擾倦行役拙誠難可將上峻坂臨崖少陵有佳句再拜扶病翁掖予登峻坂此事將無同好竒已成癖履險始有工流泉噴玉雪危石揺青紅下臨千仞淵上摩九萬風秋陽正皜皜極目雙飛鴻率童僕出田旭日照桑塢乳鳩拂林㘭農務日就理駕言赴東臯東臯有佳適云是江海交彌望眇孤帆凌空俯危巢伯禹功未泯季札風猶高戢戢出士女田田及土膏鹿門有遺響子雲徒解嘲違已詎非病喟予傷繫匏理園庭下石齒齒水際花冥冥宿痾霽暑雨時還枕孤亭百慮靜以遣世紛老旋經所存復餘幾兀然顧兹形呼童理荒穢森爽出衆青宣父歎後凋湘纍眷芳馨孰云草木姿奄忽隨飄零持此遂久要庶以娛暮齡秋懷仰觀流大火圓魄復西馳未覩凌霜葉先見隕風枝羅幃閟清景瑶瑟流哀思掩抑不成調清商汎朱絲恐驚髙樓婦蕩子阻歸期贈别安鴻漸給舍四首西馳萬里道送子不及逺萬里非所嗟覲子恐嵗晚青青蠶叢山厯厯太行坂素冠集流塵客子中夜飯驅車當周行相顧各繾綣二繾綣夫如何欲語不出口㝠㝠雲中禽菀菀道傍栁炎暑方載途客行日彌久山川氣候更風雨昬旦有毋為人所先寧為人所後三青城多異境蛾眉隱新月巴江從中來紆曲如一髪秋氣勁楩楠春陽長薇蕨地髙魚鳥閒天近星斗沒行歸及桑梓山川共輝發四君還江水源我去江水委江中多鯉魚尺素來萬里遥渉岷漢流復泳沅湘沚海門何浩蕩但恐風波起江干候鯉魚秋髙水瀰瀰儼山堂遲友淡煙釀朝㝠細雨含秋姿獨立更延佇悵望遲所思麗容本絶代被服何陸離一為經時别悲喜極感持徽音寄篇翰徃徃追四詩知己自曠遇佳㑹貴及時大業日云遠非子誰與期移居寄子容予本四方人慷慨赴天路幸託金蘭交再蒙鹽車顧端懐素居憂豈乏同袍賦側身向長安凝望幾朝暮浮隂結苑墻年華落宫樹是非金玉姿安能磐石固時欲徃從之駑馬不能歩相思在相知因風寄情愫送徐進士昌榖湖南纂修丈夫及壯辰足迹徧川谷送子湖南去佳勝付遐矚渺渺洞庭波盤盤衡陽麓朝鱠武昌魚暮聽瀟湘竹嗟此赤壁灰悲彼長沙鵩雙旌動秋色俯仰如新沐境内三千里候吏豐館穀山水富竒聞歸借南遊録發西店驛海嶠不可即林巒互盤縈依依度阡陌靡靡事前征僕夫秖趨騖昬曉各有程豈不愛嵗月娛此山水清少小四海志老大竟何成伏轅傷局促履境戒髙盈南中氣候早三月競深耕林煙起菑畬園風動茅衡物華遂敷暢旅懷倦將迎喧寂㑹所適感歎重含情儼山集巻五
