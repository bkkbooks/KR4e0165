body:
  text: 儼山集巻七十九明陸深撰行狀二刑部右侍郎乙峯蘇公配淑人王氏行狀公諱民字天秀别號乙峯先世為浙之遂昌人洪武初我太祖高皇帝大封親王博選東南巨族以畀侍衛公曾大父良與焉時從愍王之國遂為秦人籍儀衛司良生仁貴仁貴生鄠南公文通配趙氏實生公以公貴累贈奉直大夫吏部考功司署郎中事員外郎累封趙為太宜人嘉靖闕年公以滿一考例得推恩由是蘇氏之入秦者自仁貴文通皆贈為通議大夫南京兵部右侍郎而趙宜人為太淑人公自幼頴悟不凡稍長樗南公訓以學即通文義突弁遣游鄉校師事宿儒栁先生學有進益㑹邃菴先生楊公時為憲副督學較諸弟子員公名在栁先生上當廩食公以栁先生師怡然讓之白於楊公公曰讓美事也知讓必知孝與忠矣亟稱之一時鄉士大夫皆曰蘇氏子賢能讓自是刻志向學舉𢎞治乙夘鄉薦累試禮部登乙丑進士第初授山西榆次知縣榆次健訟且善謗人難之公無懼色下車公以蒞事廉以律已於是訟息而謗弭邑大治鄰縣有訟於撫按者不之他而願之公取決焉賢聲藉藉徵為兵部職方司主事時故關巡檢素無狀過者必沮沮公不遂乃叢怨方逆瑾擅權搆公落職為四川橦梓驛丞公毅然就道在任盡職無悔時蜀蠻叛撫按委公進剿公承委獲功甚多撫按曰爾功也公辭不敢當亡何瑾誅復官為工部主事管理山東徂徠等處泉源改吏部考功司主事陞驗封司員外郎調考功文選兩司陞驗封司署郎中為諫止巡遊事奪俸六月再調考功司署郎中循資得實授為郎中時奉例凡諌止巡遊官跪廷受杖者得陞俸一級乃調文選司為郎中文選據銓曹要地多所嫌疑公處之特有清譽乃陞太常寺少卿以祭掃例請上俞之畢事復任陞南京太僕寺卿馬政修舉召改光祿寺卿撙節財費嵗以萬計陞太常寺卿提督四裔館尋陞工部右侍郎皆克修職務丁趙太宜人憂家居數載清修自持一毫不以干人服闋欽改南京兵部右侍郎甞署工部事八月餘司㕔以直㕔百金奉公公辭曰我自有應得之者此何以為南都人士服其廉且當也滿一考例當給由道經榆次榆者公舊治縣也父老百姓至萬人要迎入縣則又挽留遮道不欲行甫入京適刑部右侍郎闕吏部疏名上上即用之以南京工部修理孝陵功賞白金二十兩大紅織金紵絲二表裏甫兩月即得脾瀉疾偃卧者兩月題詩以見意怡然而逝寔戊戌冬十月之三日也距所生成化丙申之三月十四日得夀六十有三云卒之明日其子幼平奔而至猶及歛人以為孝感所致配淑人王氏故驛叢臺丞咸寧公經女先公六年卒𦵏韋曲里之新兆公自為誌稱其賢不一而足今上皇帝修復古禮嘉靖九年皇后初親蠶於北郊有制九卿命婦從采桑淑人與焉鄉邦榮之卒於嘉靖癸巳之四月一日得夀五十有六子男二長曰幼平恩廕為國子生娶王氏夔州府通判王君瑜之女次曰幼方側室孔氏出聘盧氏工部郎中紳之女女二長出側室何氏適秦府引禮舍人李君璋之子􅂱如次嫡出適翰林檢討段公炅之子徵幼平扶柩自京師將歸卜以某年月日啟淑人壙遵制大封焉嗚呼公以明敏之資剛大之氣通變之才堅定之守兼之以宏休之量歴轉官階凡廿有一顯晦近逺始終一節天下方望其大用而位不滿徳人咸惜之深與公為進士同年雅相知愛公方謫蜀時甞從總制林公見素先生平藍鄢賊深昨入蜀道經江津瀘戎之間見孤城敗堞水聲嗚嗚然正公効力出竒之所土人猶能歴歴道公姓名深心甚偉之丁酉召還公適捧表入覲獲與公握手談徃事縷縷不能休戊戌之夏公内轉過從尤數而詎意遽止於斯也予視殯斂哭之哀幼平亦向予哭不能已涕泗向予曰吾父之賢辱公之知而吾母之賢有可書而人未及知者吾母病屬纊時甞撫幼方而屬之幼平曰此汝弟也莫作别視之又曰汝父止汝一子吾為蘇氏宗祀計二三年為置四女侍竟得一子一女如吾所生皆同氣也汝識之弗忘言已又哭訃聞上悼惜之特賜𦵏祭皆如例人以為榮遇云因序次其行以告於當世之大人先生乞銘其藏伏惟採擇焉通議大夫應天府府尹黼菴柴公行狀公諱竒字徳美號黼菴姓柴氏崑山人也其先出嘉定有諱延富者元萬户公之始祖也公生而頴敏初同故禮部主事盛公鍾濟陽令杭公東往謁太常卿夏公仲昭公未出私約分識其壁間文字凡若干篇及歸臨紙書之不遺一字與顧太保顧文康公同為邑庠生時令崑山者慈谿楊公子器有鑒賞才尤慎許可一見公所業文即曰此竒士也因屬以遊浙中用博聞見𢎞治壬子遭通議府君之喪兄亡弟幼家適中落公畢力營喪𦵏如禮辛酉以易經中應天府鄉試名在第六主司刻其文以程多士正徳辛未與弟太同登楊慎榜進士觀政吏部時少師楊公邃菴為冢宰上書言東南水利事深為楊公所器復極陳白茅塘七鴉浦之利害請以逆瑾沒入貲財給濟工費楊公上其議於朝特命工部尚書梧山李公充嗣往司其事績用告成大抵皆公策也是嵗八月吏部考選科道以諫諍論試諸進士公居第一銓授吏科給事中時劇賊劉六等弄兵山東朝廷討之命將出師以公與御史吳堂為監軍既班師有白金文綺之賜權貴囑託一切絶不行所核功罪皆當壬申二月賊陷曲阜城禍及闕里禮籍樂器皆焚蕩公奏移曲阜城以就孔廟永為保障九月凱旋獻俘賜金織鷺袍與宴兵部加俸二級癸酉六月丁計淑人憂弟太任刑部主事適卒乃扶攜二柩歸𦵏如禮乙亥九月服闋丙子四月還朝復除吏科給事中丁丑六月滿一考授勑階徵仕郎八月選户科右給事中戊寅夏再遷左於吏科當事多所建白疏上即焚草人罔周知間有傳誦之者若武宗南巡之疏錢寧持寵之劾與邊儲屯政事關大體葢有人所不能言者己夘八月陞南京光祿寺少卿時武宗駐蹕南京凡諸供應皆先事而備若寺之圮廢次第興復查革更正多所修舉辛巳夏今上登極詔考察京官適寺長闕公奉行惟謹黜屬吏不職者五人查復厨役之占役於他所者凡百有二十餘人謗言叢集一莫之顧然竟無他壬午改元公力辭加俸上以公山東河南剿賊之功不允八月進階奉政大夫癸未三月滿一考丙戌十月六載考績加授修正庶尹己丑三月進賀册立中宫箋至京陞應天府府丞值尹闕攝篆者五月巡撫都御史荷峯陳公祥特疏薦之辛夘三月以郊祀恩進階中憲大夫八月鄉試充提調官場屋事惟謹壬辰九月陞應天府府尹秋八月頒詔例授誥命封贈及二代仍廕一子入監甲午春清查官占埋沒地還之民間以絶權勢起佃之謀復積科試羡餘以開拓貢院矩範儀觀為之一新是秋鄉試再為提調官㑹南京太廟災引咎自陳致仕得請即日東歸家居幾十年足跡未甞入公府口不談貴顯時事惟以詩文自娛樂而已周貧贍族之舉則奮袂為之不愛也公性孝友嵗時祀先必流涕每謂其子曰祖宗功徳不可忘吾平生無夢夢必有兆皆祖宗之報甞憶山東時夜過吕孟社身在賊中暫止郵舍就草榻傍垣遂夢而祖呼我曰速起速起寤驚而頗疑為賊乘之方啟户出探有逸馬觸垣悉壓覆榻上旁近無完物矣此祖宗之佑也爾子孫謹識之異日雖乞誌吾墓可也告等以遺命語予若此予謂此公忠信之應也公以成化庚寅十月十有九日生以嘉靖壬寅六月七日考終于正寢享年七十有三配淑人有賢行子男三長郊娶盛氏先十二年卒次即告以文學世其家國子生娶周氏次秩國子生娶周氏側室夏出女二長適監生徐良次適縣學生張必紹側室殷出孫三輔喆監生娶顧氏輔光廕補入監娶梁氏繼室徐氏輔延孫女二適朱景運張士瀹曾孫男一曾孫女二所著有石池稿嘉樹軒紀聞并黼菴集藏于家惟公以經濟之才該博之學茂有鄉譽為時名臣與深同舉于鄉暨同朝為從官寓邸復同閭巷最相知厚予之赴關蜀猶及見公于密室今歸乃以後命為託顧予衰陋知公為淺尚賴當世巨公大雅採擇焉以垂不朽此柴氏子孫之幸也謹狀儼山集巻七十九
