body:
  text: 儼山集巻三十一明陸深撰詩微大序詩者志之所之也在心為志發言為詩情動於中而形於言言之不足故嗟歎之嗟歎之不足故永歌之永歌之不足不知手之舞之足之蹈之也情發於聲聲成文謂之音治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困故正得失動天地感鬼神莫近乎詩先王以是經夫婦成孝敬厚人倫美教化移風俗故詩有六義焉一曰風二曰賦三曰比四曰興五曰雅六曰頌上以風化下下以風刺上主文而譎諫言之者無罪聞之者足以戒故曰風至于王道衰禮義廢政教失國異政家殊俗而變風變雅作矣國史明乎得失之迹傷人倫之變哀刑政之苛吟詠情性以風其上達於事變而懷其舊俗者也故變風發乎情止乎禮義發乎情民之性也止乎禮義先王之澤也是以一國之事繫一人之本謂之風言天下之事形四方之風謂之雅雅者正也言王政之所由廢興也政有小大故有小雅焉有大雅焉頌者美盛徳之形容以其成功告於神明者也是謂四始詩之至也右詩大序或以為孔子作或以為子夏或以為國史或以為衛宏皆無定據考其文義蓋先秦古書云顧有錯簡而窮經之士未之或知不免傅㑹牽合以成破碎決裂之弊竊敢正之如左亦思以還之於舊也今校定大序詩者志之所之也在心為志發言為詩先王以是經夫婦成孝敬厚人倫美教化移風俗故正得失動天地感鬼神莫近乎詩故詩有六義焉一曰風二曰賦三曰比四曰興五曰雅六曰頌是以一國之事繫一人之本謂之風風風也教也風以動之教以化之已上十三字舊誤入小序言天下之事形四方之風謂之雅雅者正也言王政之所由廢興也政有小大故有小雅焉有大雅焉頌者美盛徳之形容以其成功告於神明者也是謂四始詩之至也情動於中而形於言言之不足故嗟歎之嗟歎之不足故永歌之永歌之不足不知手之舞之足之蹈之也情發於聲聲成文謂之音治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困上以風化下下以風刺上主文而譎諫言之者無罪聞之者足以戒故曰變疑闕一字風故變風發乎情止乎禮義發乎情民之性也止乎禮義先王之澤也至於王道衰禮義廢政教失國異政家殊俗而變風疑衍二字變雅作矣國史明乎得失之迹傷人倫之變哀刑政之苛吟詠情性以風其上達於事變而懷其舊俗者也按古文皆漆書竹簡而韋編之韋易絶而竹易紊是故古文傳世錯繆實多如此序者窺豹一斑爾安敢自信間有闕誤亦復擬而存之以備一説且以求正於君子云國風一國十五國風四詩之一體也亦樂名一説牝牡相誘曰風多出於男女之言情也朱子曰如物因風之動以有聲而其聲又足以動物也又曰閭巷風土男女情思之詞又曰風雅頌者聲樂部分之名也臨川王氏曰風之於物方其鼔舞搖蕩所謂動之也及其因形移易使榮者枯甲者拆乃所謂化之也周南一之一周代名南樂名關雎后妃之徳也風之始也右關雎之詩至為深遠蓋成樂也若咸韺韶濩之作隨所用而有感焉所謂洋洋盈耳者是已至於三月忘味亦是物也文詞訓詁之間恐未足以盡之抑亦所感者淺矣如以詩論孔子嘗曰關雎樂而不淫哀而不傷夫哀樂情也哀而不傷樂而不淫所以為性情之正也夫性情之正萬化基焉此后妃之徳也而文王家齊國治之化於是乎足徴此關雎所以為詩首也今斷以宫中之人美其始至之作必指淑女為太姒則所謂寤寐所謂琴瑟所謂鐘鼔者皆宫人之性情爾於文王后妃乎何與風化所自不幾於誣乎又按孔子曰多識於禽獸草木之名夫託物稱名以寄吾不容盡言之情此詩人之㫖也雎鳩性鷙而物莫敢狎河洲幽遠而物莫能近因以比太姒之莊正而靜深使人望之而善念興焉凡人情冶容則誨淫下流必招侮是關雎之義也而即所謂興也彼王雎淫鳥爾狀似鴛鴦其取類者遠矣夫后妃旣具莊敬之徳又居􅃉嚴之地然無妬忌之心能求淑女以事君子因率之以薦羞烹餁之務與共内政焉而有事於柔順潔芳之物以致吾左右采擇之誠是以未得而憂既得而樂初無情慾宴眤之私而常有好賢求才之志情性之正莫大於此其贊佐文王者深矣所謂憂在進賢不淫其色哀窈窕思賢才而無傷善之心則序説固為得之夫然後二南可為也其餘則朱傳備之矣按鄭康成誤以雎鳩為王雎故以鷙為摯又以摯為至古字或相通也但鷙則有别至不可以言别也字書别從咼從刀蓋決而離之也列女傳所謂未嘗乘居而匹處是已四曰乘兩曰匹至之言到也或曰周至也皆親近浹洽之意王雎之交頸相和則有之故雎鳩不可以言至王雎不可以言鷙蓋二物云葛覃后妃之賢也右葛覃之詩朱傳得之此庸徳之行所謂動容中禮者因治葛而見耳非容心於葛也至於景物暄妍意氣和暢以遂一時賦咏之志眞樂形焉序曰化天下以婦道鑿矣巻耳后妃之志也右巻耳之詩詞危意迫必為羑里而作也闕巻耳備酒漿以行飲至之禮而文王方闕還未期酒將安所用之故不復終事而棄之闕事端如此初無審官進賢之志其下三章闕從而未能之意張衡四愁實源於此顧闕靡麗不典為非類爾金罍兕觥蓋感闕瘏僕痡皆託言也巻耳非託言也其闕古如見尤非後世工文之士所能及闕味使人咀嚼而忘厭况被之管絃乎此闕删述而為經也夫居而相離則思以闕於乘馬飲酒可謂傷矣然在憂患之中闕切此所謂性情之正也序説疎矣樛木后妃逮下也按文公不信小序千載一人而已至樛木之闕取其誤説以為傳不可不辨天下未有闕而能逮下亦未有不能逮下而無嫉妬之心者也夫木曲下垂以引乎葛藟以興后妃下闕衆妾此興之取義者至於葛藟必附闕祿必降乎君子是則比也故一章言闕二章闕三章言成感應也傳謂樂徳稱願乃懷報之情其體又進乎頌矣螽斯后妃子孫衆多也右螽斯之詩與樛木三章皆后妃之徳也闕和平文義回互初無激昻豐縟之費反覆而闕則深淳醲郁之化自溢於音響節奏之餘以闕言之三疊之類也以聲樂言之三闋之類也闕調從可識矣桃夭兎罝芣苢麟趾之作闕而體製皆同此所謂一倡三歎者耶桃夭后妃之所致也右桃夭之詩説者以為因婚姻而知女子之賢因女子而知室家之好亦可謂善矣然桃闕時也大抵女子之失身由於失時一失其身闕蕩猜貳之情有終其身而不自宜者矣闕室家乎后妃内助文王以成齊家治國之化闕强暴侵陵以奪其守又無凶荒扎厲以闕中人之性皆可跂及於善道也故因桃夭起興而所感者深矣謂非后妃之所致不可闕君王無道妾當災萬騎血題詩云千軍逐馬來深合風人之㫖按桃木久實微故貴夭夭而實實而闕之候也時和物阜有萬物各得其所之象男女室家其中一物耳此文王后妃之化而周南之所以為盛也又按此詩亦疑有錯簡凡桃華而後葉葉而後實故華稱灼葉稱蓁實稱蕡其序宜然不應先實而後葉也其序于歸也亦然始言室家總指門閥猶云巨室大家也次言家人指夫也婦人内夫家亦夫婦互稱之詞次言家室合族而言由家入室宜之至也具有積漸廣狹之勢非但變文叶韻而已於體宜屬賦如以興則華興色葉興歸實興子非一時之事也今姑從舊説兎罝賢人衆多也右兎罝之詩以序之終言合於朱傳見文王作人之盛也兎罝賤役也干城好仇腹心皆重任也蓋成才不器精粗一致也夫自武夫野處以迄于治朝之五位所謂比屋可封矣芣苢后妃之美也和平則婦人樂有子矣右芣苢之詩序曰后妃之美也和平疑文有闕誤朱子以化行俗美室家和平足之其㫖煥然矣按此詩凡三章章四句句四言總之為四十八字内用采采字凡十三芣苢字凡十二薄言字凡十二除為語助者才餘五字爾而叙情委曲從事始終與夫經行道途招邀儔侶以相容與之意藹然可掬天下之至文也即此亦可以見和平矣始言采者乃相約之詞繼言有者有芣苢也掇先於捋袺先於襭條理自然文化至矣漢廣徳廣所及也文王之道被于南國美化行乎江漢之域無思犯禮求而不可得也右漢廣之詩道江漢之人能變舊汙以沐新化女知守節男知好徳風之所被者廣矣故曰漢廣按周南詩以木興者二篇喬木取其仰也樛木取其俯也仰則物不敢干俯則物易以附皆女徳也樛木性之也喬木化之也雖然樛木居上宜俯喬木處下宜仰此又性情之正也故曰君子之徳風小人之徳草秣馬猶言願為執鞭之意致敬也秣駒與秣馬同變文以叶韻爾人言休息息字當作思蓋思息字相近而傳寫之訛也讀者風咏尋繹其義自見此不難曉汝墳道化行也右汝墳之詩次於漢廣之詩以地言之所謂南也漢廣猶舊民也汝墳猶舊地也穢濁之餘烈尚存耶此周南之詩孔子所以列之於國風也闕出汝州天息山今之汝寧是也汝旁之國昔闕苪皆是也文王之化被之雖遠紂都朝歌者尚無恙也豈應遽以文王為父母而遂不知有紂耶傳稱三分有二以服事殷文王無心於二分之服而惟知有臣節之共此文王之徳所以為盛也説者謂率商之叛國以事紂此猶謂桓文之舉可也夫汝墳之人猶以文王之命供紂之役則一時之人知有文王而不知有紂矣而文王姑命之以闕役此則曹馬之事恐非所以論文王也考闕紂至不道而為商者有人不但夷齊之高闕至於三監之叛武庚既誅而洛邑之頑民闕天理民彝豈容澌滅而無餘哉故劉辰翁謂父母為行役之父母蓋謂婦人不堪如燬之虐既以為夫憂相見之餘得邇父母因以為夫慰則家室團圞之情忠孝惻怛之意益以見風化之美而闕徳澤之所及雖文王亦有不可得而知者矣豈非王道哉朱子復取一説於後尤得經意愚謂劉説亦不可廢麟趾關雎之應也右麟趾之詩序以為衰世之公子周之盛明商之衰耶周雖盛商之國也故周南以麟趾終焉聖人删述之㫖深矣序曰然則關雎麟趾之化王者之風故繫之周公南言化自北而南也鵲巢騶虞之徳諸侯之風也先王之所以教故繫之召公按此本大序之文蓋綂論二南之體也今錯在關雎序中恐亦有誤夫周公之功固大矣今以周南諸詩考之皆文王之事所謂王者之風也周公代王而曰繫之周公何耶要而言之周公麟趾之一爾是時或未為政於國中也若召南則召公之所治而甘棠行露之詩已有明據矣故曰繫之召公是也疑周公之公因下文召公之公連類而誤耳周公之公當作南故重而觧之曰南言化自北而南也召公則無庸解矣或衍一公字亦通讀者詳之又按召南云先王之所以教先王指文王則西伯分治非文王時事明矣召南一之二召地名公奭采邑按召南之召當屬之分陜不當屬之食邑鵲巢夫人之徳也右鵲巢之詩鳩居鵲巢興女入男室興之之義采蘩夫人不失職也右采蘩之詩夫人共祭也禮莫大於祭而主婦主薦豆祭盡禮則夫人之職盡矣凡蠶桑中饋之事無不盡者去事有儀恐非婦人之禮傳曰婦人無儀祁祁從夫以歸也草蟲大夫妻能以禮自防也右草蟲之詩室家之至情所謂風也采蘋大夫妻能循法度也右采蘋之詩音節體格盡同采蘩特以宗室之奠知為大夫之妻而叙事頗有簡密是貴賤之别也傳曰位彌高者事彌畧季女叶韻甘棠美召伯也右甘棠之詩夫見甘棠而思奭覩河洛則思禹皆聖人之風也行露召伯聽訟也右行露之詩蓋謂聽斷明則習俗變本末具舉也是之謂周官之法度鼠牙雀角所謂無情之辭也羔羊鵲巢之功致也右羔羊之詩因服以知徳由外以知中被化深矣殷其靁勸以義也右殷其靁之詩婦人聞雷起興以思其夫本有不安之象而尚冀安全以旋歸也猶今云草露風霜然情之真切而亦不失其正者矣摽有梅男女及時也右摽有梅之詩女子之情事如此其急也然急於成禮以幸於免辱與情慾之感者異矣江有氾美媵也右江有汜之詩次於小星之後小星取其下之能安也江汜取其上之能悔也人無不可改之過世無不可化之人而其本始皆起於家人是二詩之義也野有死麕惡無禮也右野有死麕之詩亂風也亂極思治必先見於男女之情是詩女貞於男化有先後也夫天下之治亂實始於男女之邪正大抵男之從滛女成之也若淫風流行世雖治必亂女節守貞雖亂必向於治此陳詩觀風所以為王政之大也何彼穠矣美王姬也右何彼穠矣之詩與麟趾相表裏公子男徳也王姬女德也皆后妃之化也騶虞鵲巢之應也右騶虞之詩序傳所説咸有未安而謂為蒐田以時春田之際者則同是也先儒不取小序惟取首句其下則皆經師所講説故有得有不得理或當然此詩之説正恐於序首讀之或過也序曰騶虞鵲巢之應也麟趾關雎之應也蓋謂關雎以麟趾為終鵲巢以騶虞為終特指二南篇帙云耳猶曰關雎之亂也孔子删詩盡為樂章肄在樂官者首尾有相應之理故曰應嚴粲讀為效應之應非也何以言之夫麟趾文王之子孫也感后妃之徳化固宜應之至於鵲巢則諸侯之妻也當時之諸侯顧何以為之應哉其説有相背馳者矣是以晦菴朱子之説曰文王之化始於關雎而至於麟趾則其化之入人者深矣形於鵲巢而及於騶虞則其澤之及物者廣矣南軒張子之説曰麟趾言公子仁厚則在内者無不孚騶虞言國君蒐田以時則在外者無不孚鵲巢之化關雎之達也其義精矣皆未免於讀序之或過也愚於此詩嘗欲為之説曰彼茁者葭草淺也壹發五豝獸多也于嗟歎美詞騶者文王之囿名虞者囿之司獸也按騶虞自毛公始以為獸古皆官也若六騶七騶山虞澤虞是已彼有白虎黑文者是名騶牙其説具見於華谷嚴粲詩輯中發發矢也即天子發諸侯發士大夫發之發豕牝曰豝豕一歳曰豵乃牧養之物非田野之獸正所謂虞人翼以待射者翼驅也故易著三驅之象周禮有山虞致獸之文唐補闕崔向上䟽引小雅之詩悉率左右以燕天子解之曰悉驅禽順有左右之宜以安待天子射蓋古禮也中必疊雙巧射也亦後世窮兵黷武者之所為非三代之禮射也禮射禁毒矢仁道也五豝五豵所謂禽獸之多者得之或虞人翼之以成列也此詩之㫖大抵詠文王蒐田之事蓋謂方春氣和草淺獸肥之時以射行禮而蕃育禽獸者得人因以致歎於虞官此可見文王之化而人材之盛雖小官皆舉其職與兎罝之詩相表裏若孔子之乘田百里奚之飯牛皆是物也此所謂王道之成也按二南孔子之所整齊也其篇章次第厥有意義如關雎麟趾鵲巢騶虞經㫖明白其他篇名未必皆有配合之意要在使人虛心易氣諷咏而得之耳傳曰樂出虛詩樂章也憑虛宣隱無跡可尋至於興象所寄尤有不容窮詰之妙是故六籍大義各有指歸惟詩多傅㑹穿鑿之病亦易為地也如以采蘩配葛覃而以親蠶證之失之固矣又按孔子曰人而不為周南召南其猶正墻面而立也與夫面墻言道窮也窮必變變必通詩之所以為教也紂之惡至深矣周南有以變化之周南之化未廣矣召伯有以推行之皆由近以及遠自身家而至國與天下猶運之掌豈有窮乎此二南之用也儼山集巻三十一
