body:
  text: 儼山續集巻二明陸深撰呉中新刻臨川集甚佳雙江聶文蔚持以見贈携之舟中開帙感懐寄詩為謝少小有書未能讀暮年好書讀不得豈惟簿領少餘間兩眼𡨕䝉淚旋拭簾前見物私自憐霧裏看花慣曾識憶昔家住東海濵世務耕農寡文墨勉勤誦習起家門毎事收藏節衣食一從觀國上皇都十載具官充史職長安朋輩心多同古典探搜事尤力荆文丞相宋熙豐國監遺文舊嘗刻猗予謬司六館成手許校磨工未即當今楔棗稱呉中唐模宋板俱奇特是非本定空愛憎報復何窮恣翻覆文章功業兩難朽治亂興亡三太息蘇州太守古鄴侯貽我逺勝黄金億樓船風雨滿章江把玩新編坐相憶蒼鷹圖蒼鷹瞥地風蕭蕭狐耶兔耶狂欲跳老拳未放輕一攫側目政爾愁雙翹天空秋老闗塞晩落日孤林萬山逺覽圖令人氣滿膺荆榛匝地移蘭畹林生五嶺太平人何事落筆心先嗔忠貞立朝奸佞懼貔虎負壑山林春錦衣周君人中傑意氣要與圖爭烈封侯萬里看下鞲一灑平蕪遍毛血次荅沈叔明石屏歌效古初開綠野堂偶置屏石增清光此屏來自萬里道産向滇南山水鄉㸃蒼秀色多烟景雲霧重重玉龍隠星斗高侵太白峯海天常拂扶桑影疑有隂陽變晦明臥遊坐對俱崢嶸若非黒白分明見必是丹青㸃綴成猗予少日多遊興今已白頭尋蔗境愛月時登庾亮樓歸田重理陶潛逕摩挲此石得大觀羲娥來往雙轉丸獨倚巖巒酒醒後便覺空同眼界寛微茫雲外見新月晃漾峯頭餘積雪長夜高堂如有神衣冠滿座皆含冽多君珠玉羅胷中落筆宛有唐初風為我石屏歌一闋安得持獻天子明光宫次荅姚子明石屏歌乾坤竒秀皆儲精老我儼山偏多情是中猶有愛石癖一見竒石雙眼明十年去國行八省參謁咨請兼逢迎晩䝉聖恩召自蜀置之金馬白玉京晨趨黄扉暮紫闥左圖右史心無營賜金月俸有餘鏹買得一屏當座横人言此屏本無價我亦得意還若驚烟雲縹緲天台路巖壑隱映芙蓉城瑶池東來降王母仙掌擘出煩巨靈有時坐對一長嘯便覺毛骨隨風輕滇南䝉叚昔開國此石充貢萬里程擕歸東海添秀氣聊與平泉作後塵得君長歌更增重五色光燄輝文衡七峯歌七峯主人家七峯七峯東來如七龍地當北斗星辰見􅉽接南山雨露濃緣江亭館連雲起方丈瀛洲天尺咫帆穡渺渺萬里船烟波日日東流水主人元是孫子荆漱石枕流非本情胷吞雲夢已八九眼視四海皆弟兄況有文章稱大手逺追建安成七友雲樹鶯花一萬重琳琅金薤三千首遥峯絶壑迥還孤虧蔽隂陽自有無寂寞可憐楊子宅丹青空事輞川圖觀國才華工好古别啓圖書羣玉府黄鐘大鏞序殷周太華長河儼賔主門外聨翩長者車峯頭縹緲列仙居青天白日常應爾金塢珠樓總不如江南自昔多佳麗誰復豪華誇甲第桑梓依依見此心弓裘永永承先世天鍾形勝待公侯莫因風物重淹留願將郭隗千金價更起元龍百尺樓丹陽孫思和新作七峯之居與江山相映發予曩在翰林時許以題識以冀身逰其間為偉麗特絶之觀蓋乆而未果嘉靖癸未思和東過海上要予夙諾聊成短歌庸荅雅尚七峯其能出長風盪穹林與江聲海濤相應和乎是歲十月既望竹齋歌有序豐城王君鑑之以竹名齋游宦所至輒以竹齋聞蓋紀勝也凡勝無常物勝則人附物人勝則物因人仰七政而思舜覩河洛而見禹物之勝也陶靖節之菊林和靖之梅人之勝也物勝則重其人人勝則物因之重自古逮今一也竹之勝自孔門所羡清修節槩之士咸願附焉鑑之其有取於竹哉故予為作竹齋歌君不見仙尉齋前數竿竹勁於龍䫇嫩於玉向晩氷霜如有情多時盤筯寧無肉一從手種春雨餘摇動青𡨕散炎燠未論留汗等琬琰先須截管諧琴筑曾聞子猷傲山隂何如衛武歌淇澳虚齋中含八靣涼恍疑瀟湘秋萬斛軒窓隱映月漸移枕簟飄蕭粉初撲堪擬封侯自千畆正有幽人在空谷凍雷驚筍起臥龍恠石蟠根解羣鹿遶簷日日報平安一歲清風三百六齋中本是瀟灑人歲寒之交元有神當年隨計赴上國尚書宰相俱心親人言松栢並竒操共愛金玉尋芳鄰㷼京爭誇見彷彿黄金别築高嶙峋劍江回首舊隱地花縣拜命新行春朅來小試釣鼇手東海裊垂絲綸九苞彩鳯下覽徳千里青雲高致身仇香枳棘昔同調蔣詡徑路今通津蹔將形影照南浦若比甘棠尤逼真我歌竹齋君試聴天子用爾清風塵㑹須嶰谷逢伶倫怡菊歌贈童相士品菊如相馬不在驪黄間以此復相天下士伯夷陶令何為顔維時日月俱逢九千山蕭森松栢後且看歸去三徑花況有生前一杯酒酒酣耳熱歌嗚嗚白眼仰視雲天無虎頭㷼頷秪俗輩鳶肩火色誰丈夫拂衣起就菊花舞白頭童童風縷縷金錢若解買秋光更種明年一千樹送朱玉洲遊南雍玉洲勝絶天下無皎如秋月懸氷壷連城豈為索高價千頃直欲吞江湖幾年東海抱絶藝邇來長安稱鉅儒黄金殿前看落筆滿紙一一驪龍珠庭前郎君名進士門下諸生朝大夫自有鼇頭須手致更從北闕向南都千金駿骨非難事萬里鵬風有壯圖太史近占乾象好題詩贈汝還憐吾聽我題詩作呉話終當把酒話蓴鱸岐陽石屏歌喻太守子乾所恵岐陽之民像侯徳逺致山中一片石依稀宛見城郭面彷彿尚帶山川迹一從乗驄換五馬霧渚烟村坐來隔摩挲三復如有情指麾從吏貽江濵長卿多病枕書臥驚起門外高嶙峋倒履相迎問來使開椷再拜生陽春荷侯此恵百感集媿我家徒四壁立忽焉屋底開暮晴摇蕩虚無翠寒濕新恩舊恵俱在眼萬壑千巖互相入滇南大理空自珍江上數峯尤絶倫天然飛走肖麟鳯瑟爾瑩潤同瑶珉坐當保障屹不動豈免覩物終懐人自是侯家有餘積留待他年隔朝席泥金孔雀映芙蓉郎君近作乗龍客胡為致之向儒素恐使湘靈動深惜君不見唐朝太宗重畿甸遍題姓字留宸眷天生異質當大用安得隨君獻入光明殿題鄭俠流民圖為曹承之主事近時畫手數呉偉泰和郭詡差可擬良工位置着意深何但烟雲生筆底此圖淺淡頗有工描冩人物間闗裏骨肉牽聨老稚兼衣裳繿縷面目紫云是鄭俠流民圖彷彿啼號聲滿耳風囘草樹生晝隂翠壁華堂容有此雲間才子曹濮陽胷藏丘壑心如水朅來射策光明宫便欲飽煖同遐邇俸貲積月數不盈擘畫太半收書史時騎痩馬向長安買得殘縑大小李㑹心論格不論錢袖來向我陳終始闗同荆浩久己無馬逺夏珪呼不起郭生自是清狂人東抹西塗聊復爾太平有象雞狗肥世路無情鄉井徙君不見治亂興亡各一時憑仗調和與爕理民瘼寧知千百端君門空瞻一萬里摩挲此圖展轉不已荆文相公熈豐天子月潭歌有序月潭以盛宗舜氏聞人境俱勝毎當秋月印川時又若宗舜氏之在予目睫也宗舜明於地理之學予葬先太史公宗舜寔有力焉兹將謁選天官作月潭歌送之青天一片月墮影萬丈潭上下本空同水月自相涵月潭先生人中豪家住東海之東臯心胷瀟灑了不染肯與世路衝風濤早年文史富筆硯中歲節介何其高秘傳别有郭氏訣直欲萬里空秋毫月潭子真地仙尋山問水廢白日彈冠結綬還當年方今天子神且聖虎拜鵠立金鑾前願將玉兔長生藥并獻水底驪龍涎乾坤朗照湖海静予欲秋江弄月圓吕梁行君不見吕梁之水天下竒奔騰轟湱無停時飛氷走雪燿日色龍吟鯨吼啼蛟螭恍如鼇足昨夜折銀河倒傾忙驟馳又如天鼓落下界神丁六甲相追隨舟人伏枕不敢睡稚子未解驚滿頥黄河源自星宿海千里萬里歸天池濟川以南數十水匯同潨㑹來於斯蓄受既富發泄盛俯視此理良無疑不信請看田道間夜來春雨今朝泥題文徵明畫筆下塵埃一㸃無開圖知是賀家湖秋風九月菰蒲岸横着溪舟看浴鳬阿明此藝稱獨步前身妙絶元姓顧安得置之水晶宫臥看雲烟落毫素七十歌歲月流落何草草古今七十世稀少我生二十五始仕自計五十歸須早餘年二十付閒適等此三分少壯老邇來倐忽四十五鬢髪斑斑志灰槁況懐憂患在逺途慘淡冠裳雪皜皜人生苦非金石固恒恐形神不自保悲歡晝夜正相半此後信可知懐抱欲從今日巧相補利路名塲迹如掃五年縱復能幾時一寸光隂璧非寳虞翻骨相久己寒子雲曉事恨不蚤故園花柳雖未成願得强徤晩亦好交戰要難為達者乗險那得窺大造試將此意一問天長風南來萬里道十一日安陵始得風過桑園人生快意寧有此帆腹飽風走溪水憶昨躋攀分寸間今之北船無乃爾天公大運詎兩全怨者自怨喜自喜半生紛逐向畏途首肯分明到物理華閣滕王高宴中青衫司馬扁舟裏古來此事信有然坐看明月江心起贈别殷子殷子有竒骨昻藏若駿馬康莊在逺道伏櫪甘土苴長安一朝别我去再三挽留不能住潞河新有下灘船到家正及朱炎暮君家本在齊魯墟楓林瑟瑟臨前除小樓畫檻䕃林椒中有前世千巻書北窓慈毋髪垂領倚門望兒悲短景小弟今年十四五弄筆時時學馳騁上奉母顔下課弟日有餘功擬叢桂病骨偏宜秋氣凉藥囊閒却參苓劑登高迥睇望泰山恍見仙人時往還翩翩白鶴不可借流光日夜凋朱顔朱顔一往那再復惟有功名留汗竹志士偏增日暮悲佳人易感窮途哭憶昔虚堂坐論文辭鋒往往追先秦談詩屈指數漢魏歎息六代何無人殷子竒氣鮮有匹人間八寳光耀日呉郡徐子吾畏友毎毎到君賞高逸君不見九方臯胡能按譜求馬毛願子加餐善自愛天閑十二終當豢爾曹和王元章梅花酬姚時望歲寒冉冉餘氷霜留此一樹先春芳山農能事數獨步淨掃楮素摇兔芒龍池波騰鸜眼裂噴薄元雲沁蒼雪須臾樹梢送長弓掛此一片寒潭月賞心詩客多風韻欲挽筆力回春信競搜竒事出枯腸亂揷繁花向春鬢青錢沽酒白玉缸自勸一觴梅一觴調羮有時㑹結實物色夢落商家王山林托交盟未冷衆醉何須悲獨醒中分一頃養鶴田半頃種花泉半頃儼山續集巻二
