body:
  text: 儼山集巻十九明陸深撰詩雜體十五首和昌穀蓉菊圖五七言誰傳徐熈趙昌手寫此秋一幅黄花得意香芙蓉映江緑誰云揺落將滿林豔陽紅紫錦成村但令顔色不薄惡春雨秋風總是恩題曲江春杏圖五七言北地春偏早長安二月中杏花凡幾樹金水玉河東緑羅衣袂寒猶重九陌香多漾軟紅何用内園催羯鼔一枝驚破喝聲雄病起清河阻風因删次俚語五七言十日灘頭坐一日過九灘去者得順風來者生怨歎人心險不測對面九疑山一言悟主三冬熱半句傷人六月寒芳樹篇求友也三四五六七言瞻芳樹渺何許本在海濱發育時雨秋風不可期流光日夜馳歎息復歎息為樂當及時若有美人江湄贈我瑶草一束臨流不度徘徊遥望紅顔如玉人生聚散那有常白日苦短夜何長明月可以代秉燭清風可以薦素觴丈夫四海皆兄弟何况對靣同肝膓咄嗟胡為乎東復西君不見青松女蘿自相依後篇登泰山望滄海俯視九州一何慷慨仙人王子喬飄然遇雲端手把十尺芙蓉灝氣六月生寒嗟彼下土何啁啾昨日綠髪今白頭胡不服食求大道永與元氣相為仇海風蕭蕭吹海雨海若揚旗靈鼉擊鼓仙人一去冉冉兮不可攀遺我一粒之金丹雜言贈别李獻吉三四五六七言爾丈夫志四海出門驅車半路莫改長歌雖激烈短歌亦徘徊登高南望舊鄉山川一何纍纍别日苦短㑹日長兩心對面不能當古來結交惟管鮑去之千載尚覺流芳香我有瓊樹枝能令饑渴忘南樓對鏡見白髪長短句得一日過一日鬢邊白髪參參出有個知音教我染有個知音教我摘摘染有何益世間多少少年郎要白不得白風木圖為長沙施可大題長短句母生兒兒啼饑母乳兒兒未知兒今有知母何之悲號形影覔不得却寫風木憑􅋂􅇖畫圖意有盡孝子心無涯時復一轉輾聊以慰所思山頭風㣲日抱珥栖烏無聲待哺子落葉深深井逕埋萱花魂銷招不起高臺鸞去秋復春寒食新煙蝶飛紙孝子引領情内傷辛勤只望揚姓氏鄉書甲榜次第來提攜此圖悲不止生綃半是血淚痕不是丹青㸃山水難言長短句清流注燈望照耀鉊刀裁玉成圭璋捧土欲塞黄河決隻手障盡日月光未若不相知對面隔絶萬里長易言長短句狂風驚葉柔條落順流一葦建瓴下束薪灌脂益火揚彈指決機助矢舍未若同心人片言相要即盟社李白對月圖長短句老白愛月不愛身酒闌捉月秋江濱平生見月即舉醆自道對影成三人采石深不測青天高無垠騎鯨一去忽千載月與老白俱精神鸚鵡洲長短句鸚鵡洲邊水東南日夜流空傳鸚鵡賦千載使人愁榮枯生死遭逢耳不在多言在知己汝衡既漫刺安用讎阿祖老瞞志在傾漢室一時輔佐皆名士公爾繇卿爾歆富貴夀考俱絶倫豈但作人語區區耀毛羽君不見庖中鴈不能鳴亦能死行路難長短句行路難江南道何况十八灘江南何所難我試言請君聼之勿復驚歎東南風吹舶䑲信五湖白浪排銀山欲度不能前欲住不遑安有力不得出帆檣空好看船中轆轤轉船尾撥剌翻淺虞豺虎多深恐蛟螭蟠昬黄復月黒四顧何漫漫乗風巨艦快如馬相呼相喚不可攀茫茫家何處萬里在寸端我言尚未竟君淚揮潺湲嗚呼行路之難只如此仕路之難難未已夢椿歌為冒廷和長短句落葉不可復離離滿前除云是漆園樹嚴霜化枯株孝子安忍問何如空堂清夜雙淚珠雙淚珠迸如霰靈椿枝夢中見春日書事用十二生肖體磔鼠真慚獄吏詞飯牛甘結主人知己無虎頭食肉相聊從兎頴䇿勲遲春風欲動神龍蟄酒影藏蛇不復疑失馬有時還是福亡羊自古笑多岐沐猴竟誤韓生辨函谷聞雞事頗危莫為侯封歎烹狗牧猪奴戱儘堪為儼山集巻十九
