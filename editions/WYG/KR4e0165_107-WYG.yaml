body:
  text: 儼山續集巻七明陸深撰七言絶句七十首春日送客即事春隂漠漠晝沉沉度嶺穿林深復深關路望窮人正去野花開處鳥能吟漫興水郭江村不受塵惟將石竹伴閒身玲瓏漏月看雲骨瀟灑含風對玉人登樓掉臂歸來萬里身倚闌無數物華新細尋往事知多少我是明年五十人雨窓春興泉石烟霞共此身總於春雨長精神窓前更有芭蕉樹一夜輸心似向人溪山疊疊雪初寒江水悠悠一釣竿着得羊裘竟何益簑衣和月下前灘晩放舟東渡扁舟揺蕩浦雲東疑有神仙向碧空製得六銖衣試着新凉浮動一襟風題陸封君怡梅巻我家放鶴坡頭樹種近西湖處士居獨板橋邊山十里杖藜來探雪晴初呉江長橋奉和邃庵閣老長年此地往來過風景時時付短歌千尺卧龍如未起水光山色柰愁何買得一小舟往來江上題曰水晶宮三江西下五湖東風月烟波四望中我買一舟輕似葉分明揺動水晶宮架石摽排甲乙位髙低愛殺山翁手自題多少黄金教歌舞落紅空濺雨中泥客至小酌花下客到東軒慰病身嫰凉天氣露華新人生有酒花前飲酒色花枝俱照人春日雜興惜春無計為春留獨倚元龍水上樓無數飛花隨宿雨海門東去更東流題屈處誠雪竹蕭蕭雲物滿堂寒屈老風神向筆端帶雪琅玕三百箇蔣家徑裏見袁安為方思道題畵眉折枝中山紫翠䕶層層合起髙樓對雨凭愛汝一雙花底鳥為春啼殺海裳陵張仙斜驂鸞歸去是何年覆釡山頭有墓田名姓却隨丹竈在縣人相對說張顛重陽後六日登鏡光閣五首層層樓閣俯京畿一帶清溪白鳥飛直北長城千萬堞江山如此羙人稀天涯秋色倍思家南鴈歸來萬里沙今是重陽第㡬日登髙無處問黄花曲闌矮几坐晴波柿子胡桃落葉多為愛城西好風景相期一日一來過並馬來尋水西寺春風憶我慣曾遊壁問題字悲歡共簾下爐烟盡日浮城外光隂日易斜城中車馬足風沙此時極目登臨意舊有雲山㡬片遮送楊百川赴南太常典簿南國容臺我舊遊淡花疎竹映髙秋送君秋日容臺去無限鄉心逐水流寄襲錦子春風三月滿汀洲來看瓊花憶壯遊二十年前文墨社思君不見過楊州任城題楊誾直夫泉香書屋二首水紋花氣鬬精神疑是成都賣卜人傳得一區楊子宅藥苖閒洗雨中春常山人家畵不如君家宛在畵中居草堂新開何所有半貯參苓半貯書崇法寺刻竹養花天氣帶微寒林下輕烟製月團忽過僧寮題竹坐春醲如酒對琅玕馬嵬秦關山勢拂雲來才過驪山又馬嵬今日豈知當日事澗花含笑為誰開予素不能飲酒昨至成都僚友並勸予蜀燒酒云可祛暑濕也命家童以蜜和之初吸半醆漸至引滿復能加一酌極有効自後每晨起便飲飲之輙冲和與年少時苦酒迥異不意老來始知其趣乃爾日飲兩三度陶如也家童驚喜謂自飲酒來顔色頗異豈於此將有所得耶笑成一絶向來酒醆太無緣多負風花雪月天今日天公憐老大放懐加量到西川都司紅蕉為逸騎所傷粉墻髙映緑成隂待看紅花雪裏深一任摧殘付蹄囓人間何限惜花心桂州夜宴出青州山查薦名南珎盧橘與枇杷北果紅秋帶晩霞清潤入脾消酒渴甆甌如雪更宜茶張西峯少叅以詩促厯次韻荅之二首㡬時不見張公子風調才情正可人頗怪嵗寒催短景為君遲送一年春秪辦送迎酬過客那知城市有閒人何湏鳳厯看時令才有花開便是春病起獨坐東堂病後光隂逈不同怯寒嗔熱怕當風不知短髪緣何事盡㸃霜華入鏡中來青軒和玉溪韻磴轉峯迴年復年古藤喬木暗流泉西天正在西牕外一片青青落照前送人往姑蘇春病春愁撥不開欲因東海望蓬萊扁舟不得從君去同上姑蘇百尺臺嵇忠穆墓滿川花柳鬭春分城日初髙艷綺雲恩怨一空人代換道旁猶表侍中墳曉過鹹寨壁間黯黯路漫漫茅舍雞聲夜向闌浮世無端渾似夢春來客夢更無端題西域圗自從博望通西域唐代諸豪最盛强今日玉門關外路不須請組繫名王自劉元海嘯起中原馴致契丹金元之盛防微杜漸令人三歎息於徙戎一論也西北諸邊回族尤黠鷙猛嗜慾出於其性此圗簡逺頗得其情狀於丹青之外蓋錦衣沈君所藏展閱之餘不能無感於近事因書一絶其後云題竹送王秉哲平安不用報泥金春雨龍孫看過林贏得清風滿人耳汗青留秘玉堂深題雙嶼水面波心相對開海門西望妙髙臺不須更問蓬瀛路獨棹扁舟自往來題畵鷹素練秋髙草樹枯來從東海勢應孤即看一擊還千里更愛凌風不受呼雪後次西峯韻二首長安旭日照西峯照見峯頭千尺松龍甲虬枝風鬛動蒼顔翠色露華濃獨上髙樓望雪峯有人卧雪伴長松不知門外停車蓋鐵被觚稜睡正濃題倪雲林畵夀齋詩轉夀唐龍江倪郎逸筆夀齋詩轉夀龍江海鶴姿如此山林嵗寒節便􅂸千文鬢成絲題黄斗塘詩畵飛鴻雪跡為誰留筆底青松走翠虬憶得縣衙公事散聴風聴雨水西頭送顧生文羙遊瑞安碧峯黄葉釀髙秋滿架圗書手校讐見說逺遊南海去好隨龍氣望瀛洲題馮會東雪竹巻强項折腰還一時要看雪裏兩三枝春風桃李花無數白白紅紅吹又吹寄南莊相看無限故園情獨寄西樓向晩晴秋水一奩天上下荻花楓葉隔江城贈董子元汝家舊業天人䇿漢室公卿第一流猶有箕裘待華胄杏花春雨曲江頭題畵萱樹背殷勤祝嵗華短鋤將雨䕶春沙朝來省識丹青意留取堂中日日花題畵寄陶良伯東谷先生谷水東黑頭歸去五雲中門前五柳今如許不負陶家有祖風題悅茶巻水竹交居事事宜更將春思鬬槍旗分符調得中泠到未放松隂鶴夢遲予與襲錦子别凡十年矣丙戍冬初再得書不勝馳想題此寄之人間真有楊州鶴海上寜無青鳥書一紙應湏萬金價相思又是十年餘題馬麟畵蘭秋風九畹正離離畵裏相看一兩枝欲寄所思無柰逺閒拈湘管對題詩梅雪絶句三首嶺南多梅却少雪塞北苦寒花絶無爭似吳峯千尺白暗香疎影兩三株主人亭子青山曲雪䕶梅花傍綺疏扶起隔宵淹酒病裹頭袖手仗消除淺沙細水獨相親無頼飛瓊妬早春本是玉肌偏耐冷捲簾孤負惜花人挽人失偶春辭原上花銷雨鸞去臺空鳯獨飛寒夜燈前開故篋不知淚滿舊縫衣題竹隱巻抛却閒緣謝畏途短床方簟竹閒鋪睡餘滿地西風後亂掃枯枝下酒壚過無錫泉聲髙下青山裏樹影蕭疎廢堞前無數客愁驅不盡買魚沽酒喚開船人持元史至用二十陌得之囊中恰减三旬用架上新添一束書但使典墳常在手未嫌茅舍食無魚夀陽察院次壁間韻二首無心隨處夢魂安古栢臺深五月寒自笑青山老居士松牕閒殺舊蒲團疎慵聊與拙相安華髮蕭蕭鏡裏寒門掩萬山深院静古槐成蓋綠隂團試院初寒偶閱陶詩三日無詩太好竒放翁事莫將胸次惱希夷不知彭澤緣何事十七年來九首詩寄姚文光白鶴江頭白鶴村水芳沙暖有名園谿南九月黄花信欲覓餐英夜過門鄉人送菊列之堂中滿堂秋色又年華白白紅紅客到家不似東籬老陶令只愁無酒對黄花前十年願豐堂曾識金宗魯後十年宗魯之子復至江山如昨而余已老矣不知今吾故吾寜何如耶漫興一首曾看老馬五花紋驥子風神又出羣世上驪黄總相似不知誰為掃千軍過溪莊留題漠漠平田水漫流溪莊端合雨中遊主人愛客千金夀報爾天香萬斛秋謝何登之恵玉蘭揚州何遜最能文江水東流隔暮雲我有好峯三十六玉蘭花發正思君儼山續集巻七
