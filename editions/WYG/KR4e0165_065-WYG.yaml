body:
  text: 儼山集巻六十五明陸深撰墓誌銘四朱夫人秦氏墓誌銘朱夫人秦氏壽七十有一以嘉靖三年冬十一月乙酉卒於玈溪尚書之里第尚書公哭之哀凡朱之内外族人哭之哀秦之人來哭之哀里之人相向而哭之又哀嗚呼是可以考夫人之終矣卜以又明年丙戌冬十月十一日奉窆於錦澚西祖塋之次嗣子警詧以尚書公之命來問銘於陸深予家朱秦間猶東西鄰也外氏梅於朱尤近習聞夫人之徳稔矣其敢辭乃按秦君文解狀誌之文解夫人猶子也狀稱秦出髙郵之䢴溝本宋太史少游之族建炎南渡有諱知微者遂來居上海髙祖以政曾祖必通皆修隠操祖瓊號松軒軒豁有壯氣父諱濟號午山樂善舉義屹為秦望夫人其長女也母李氏有淑行夫人生六年而母背育於祖母張夫人幼有至性松軒翁竒愛之事翁與張夫人迨事繼母朱曲有禮意以孝聞稍長嫺女紅通書史大義故憲副鈍菴朱公擇婦也嚴年十六以歸尚書公事鈍菴公與王夫人必敬必慎鈍菴時時自官中寄詩勉其子夫人即熟記舉其語諷之尚書未達時為歌詩或出無聊語夫人亦時時誦之鈍菴公既謝政歸夫人遂總攝家政鉅細豐約悉有條理雖尚書一錢以上不妄費也至脫簪珥以佐賓朋無靳容成化甲午尚書舉鄉試卒業南雍夫人與俱躬織絍以助薪水之費甲辰登進士捷報至而夫人適歸寧于秦宗人􅃩之夫人意沖如也宦轍所至夫人輙隨尚書内掌刑曹外司按察每夜歸必請所訊罪至大辟即愀然曰人命事重君必慎之𢎞治戊午鈍菴公屬纊時撫簀呼曰兒婦安在若將有所屬者諸婦迭往瞠目視曰欲見秦婦耳夫人奔喪還意甚傷之既尚書服除還朝夫人遂留侍王夫人遣一側室從是時尚書未有子也夫人侍王夫人備至内外裕如已而尚書奔王夫人之喪還百事具舉有助𦵏者尚書欲却之與夫人意合一無所受凡尚書有所舉措惠澤及物必力賛之夫人意有所為或尚書所未及也故尚書宦成九列無内顧之憂朱氏之門閥益以大白首敬共猶一日也處妯娌有惠御臧獲有禮尚書公晩未獲嗣每擇佳媵以進冀有子焉及舉子愛之不啻已出尤人所難者訓諸子諸姪各底成立有為時文儒彬彬起科第者雅尚勤儉無華侈之風有餘財即以濟貧乏故卒之日無留贏焉奉午山公尤盡孝愛午山卒時夫人年髙且七十矣奔走於殯𦵏遂感風眩待其弟姪輩每近於厚有憂深思逺之意非世俗所能窺也夫人諱端字惠以甲戌年十一月六日生受封至宜人子二長警太學生方以器局需用娶沈氏次詧俊敏績學娶陸氏女二長適都察院檢校張岦次適中書舎人陸修内外孫男女凡十人云唯夫人出自舊族歸于名家天錫之厚既有異稟而所以為觀刑之地者固有本哉令妻壽母賢婦孝女具彛道焉抑足為世教勸也懋矣是宜銘銘曰玉駢珠儷為世所珍並善兩美肖哉斯人尚書有婦夫人有夫鵲巢麟趾詎云絶無以似以續大厥門戶忠臣碩輔茲焉維伍玈溪縈流蘋蘩載羞霜露之感曰萬春秋軍器局副使宋公墓誌銘按公宋姓澄諱一清其字也山東武定州之宋其先也曾祖士榮祖仲輔父福文思院副使母裴氏其世也宣徳初仲輔始以尺籍𨽻武功中衛故世為都人成化癸已公以修大内功陞文思院副使𢎞治改元免歸辛酉復以修城功再起為軍器局副使正徳丙寅謝歸其官也李氏其配也子男六長鑑丁夘舉人娶葉氏次鉞辛未進士拜行人娶徐氏次鐸冠帶娶田氏次鈺武功中衛總旗娶王氏次鎧娶戴氏次鏜孫三曰廷相曰廷槐曰廷椿其後也女三袁賢馮華范銓其壻也孫女一適俞志同公少學進士業乃更從司空以世其官器局秀整幹畫精密於職必勤也天性孝友慷慨樂施家無妾媵之奉而言動淳直無弗愛者其行誼類此其生也以景泰乙亥八月三日卒以正徳壬申正月廿有三日享年五十有八其𦵏也卜以是年二月廿有一日從先兆於小南城之側乃乞銘於太史氏深曩入京聞都門外三友堂名籍甚既乃鑑來自余授詩遂登堂識公焉和厚愿雅儉勤以文余偉而敬之三友堂者公所葺也外環花卉中庋圖史以友章縫之士又曰因以教子以求益者也夫友以徳徳可以世矣丁夘之秋鑑鉞同領鄉薦余再登堂賀焉公從二子欣欣迎余辛未夏余再入京而鉞已成進士余再登堂賀焉琴尊無恙而公已病不能揖客余私憂之閱嵗而訃至余四登堂則遂哭之矣不五載而人事果何如也若公其無憾也已余宜銘銘曰有要者途彼踐斯棘古稱不卑我力我職有尼而止亦起而仕以茲澤餘溉及厥子彼都人士風人所思思公不見悵矣其悲順則斯委歸亦曰全過而式者後千萬年西郊先生瞿公墓誌銘正徳壬申十二月某日𦵏我西郊先生於長溪館甥深寔以職事獲誌其藏曰先生諱崙字茂卿故有别業在西郊習而稱之曰西郊先生云誥贈後軍都督府經歴諱晟之孫義郎蒲泉公諱霖之子也少失母鞠於祖母誥封太安人凌氏稍長受業於從父今臨安太守南山先生有成矣蒲泉公委之家焉先生稍用其學於家家遂斬斬晩事繼母孫孺人以孝聞又䖍事凌太安人太安人時時來就其養𢎞治辛亥嵗饑輸粟若干詔補官迺大有貲積晩用雄一鄉先生不為守聚計益務施予樂惠建義友輩有落莫者資之使大發然竟不言或梁於行或轊於死或衣於寒糜於饑貸於所不能償者百金時舉也蒲泉公觀其志已甚恱焉公嚴先生事之無不得者章服儼然寡言和色君子惜其無推挽之者使當世獲其用而僅見之一家焉見之一鄉焉就其孝友所至已可準古所謂鄉先生者其人矣年五十有九以某年某月某日卒配陳孺人有淑徳佐賛之道稱其為先生婦也子男三長曰鵬績學攻文歴試南北京闈娶吳氏繼曹氏仲曰鶴為進士業有聲娶唐氏俱太學生季曰鸞娶韓氏補醫學訓科息女三長殤劉杰潘文其壻也孫男七曰學顔學曾學思學孟學周學召學伊孫女五嗚呼惟深前孺人瞿實先生之親姑家公太史之憐孺人也不置久而必泣凡遇孺人之兄弟必泣又遇孺人之諸姪則又泣伯氏宗海與先生兄弟行也謀所以慰太史公者迺以長女壻深及委禽焉而歿深獲以舅禮事先生每嵗時候問則先生必泣於堂陳孺人必泣於室或留與鵬同學往來出入先生未嘗不送迎焉退而與孺人相向未嘗不泣深既得官而還思所以慰先生者議以弱女歸先生之孫而先生不可作矣嗚呼銘曰匪古迺世匪今斯人承茲傳茲以萃厥身亦有不朽斯文永存宅是長溪以需後恩丁素軒墓誌銘素軒丁公既卒之明年謀以某月日奉窆於某原其外孫冐良予同年友也次其遺行其子倫奉以請銘予讀焉而得公之為人也公諱某字良玉號素軒金陵人也其先世籍廬州祖貴從起淮甸以功授泗州千夫長父某南京某衛鎮撫娶馬氏封闕人至公之身以輸粟功加贈鎮撫府君為明威將軍母為太恭人其兄輝進爵如父階公自幼不羣齠年失怙哀毁如成人親母愈謹長即綜理家政日不暇給所為多敦本善俗之行故賢者不以為陋中才者不以為過也孝友之性得於天者獨至薦時拜墓禮容有章昆弟之間形骸可合併也外祖父馬英以錦衣指揮調廣東卒歸柩託公經紀其喪卒為之守墓不替嘗服賈從者發槖覺而不言道遇人為貸家所苦即傾槖代之蓋長者云性不嗜酒故平生不見其茍簡與人交雖不為斬絶而富貴崇髙之勢毋得而加焉以𢎞治癸亥之嵗八月乙夘壽終于正寢上距所生宣徳之癸丑春秋七十有二配馬氏子男一即倫孫男二曰武曰斌息女三長適明威將軍徐某次適舎人李芳又次歸于山東參政冐某為繼室嗚呼善必獲報報將在公之後也叙而銘之銘曰徃也惟忠國之所臧惟孝惟弟家焉斯昌嗟嗟丁公厥存則良遙遙餽邊不有其藏俾食厥報曰莫敢當推于上世有􅂱寵光嗟嗟丁公奉徳馭已統在有繼豈曰非美惠家睦宗含和履砥開國之孫明威之子不愧于生不朽于死勒辭貞珉永奠厥止處士朴菴倪公墓誌銘浙之東處士朴菴倪先生卒訃于京師其仲子翰林院庶吉士宗正解官歸治喪且𦵏奉其友人張君邦竒所為狀問銘於松江陸深深按處士諱某字用文一諱彬餘姚人也曾祖諱某祖諱允中有隠徳父諱守禮有詩名處士美丰儀善談辯詞吐鴻鬯時舉經史奥義相詰難一座皆傾其所為多俊爽不動以利不屈以勢又能以信義服其鄉人鄉人爭訟有不願之官府而願得處士一言者嵗時伏臘必聚宗人酌以酒告以振宗為善之道衆皆恱家理故薄而好客不倦多取給於外氏勇於為義嘗覽范文正義田記擊節嘆曰吾志也兒子二郎終成之迨晩一歛其邁徃之氣歸於爾雅又儒者也喜歌詩通隂陽術伎有造精者其所不信而深排之則浮屠法與巫覡云處士少處人倫之變長而能教其子尤為人所稱初守禮公年既長無子其伯兄意以己子後公未幾公繼娶陳氏生處士及處士之弟又未幾而公卒時處士年纔十餘耳始謀者瞠曰兩遺孽去之則産吾産也日來擾其門穴窻毁瓦推瓶倒罌躬穫以歸則要諸路擊而奪之死者屢矣時陳母外無以禦强暴内無以庇其孤日夜哭泣因以喪明處士百千委曲以有成立而陳母卒後每見目眚者則為之一慟至其待讎者之子弟未嘗不如族人也是可謂怨而不怒者矣處士食指既衆家尚不給或勸之曰若子盍使之從賈處士聞之歸撫其子曰吾兒賈人耶是當以文學裕吾家使之讀書不輟若是者可謂不惑於流俗而善貽謀者矣今談者必曰倪處士倪處士云年六十有四以一疾而卒時𢎞治丁夘閠正月某日也配汪氏賢而能相子男三長某次即宗正次闕孫男五闕息女二將以某月日𦵏某原深與宗正同舉進士又同官茲弗敢弗著宗正哭而告予曰吾七年於外求以禄養今得禄而吾親不逮已矣深聞而愈悲之乃系之銘曰遭變孰難難歸於厚有蓄弗施而匯為其後嗟嗟處士仁勇曷負剛則不折貧而能守惟不折與守乃見其有勒辭貞珉以永不朽曹母顧孺人墓誌銘友人曹君𢎞濟幼喪母鞠於祖母孺人既喪大父連喪其父獨依孺人以居實兼兩世四親之義及是孺人卒𢎞濟為斬衰服三年𢎞濟長深十有四年而交數宿食孺人舍嘗登堂納拜焉時孺人年已八十毛間黄白于領癯如而精堅家事一不關白其孫𢎞濟得專力於學慨然以報劉為志𢎞治甲子春𢎞濟將有事於科場而孺人遂屬纊嗚呼悲哉深適還自南雍哭孺人於殯次弔𢎞濟於繐幃𢎞濟毁瘠扶而拜杖而起殆不勝哀既而以深粗明已志又識孺人諉誌其藏深辱𢎞濟忘年視孺人寔有母道且勤館穀之徳敢不是著按狀孺人顧姓諱妙真義望曹公度之側室也其先嘉定人有諱叔臧者孺人之父也始來占籍海邑初公度既壯無嗣父母憂焉聞孺人潛徳欵懇求之閱時果産子瑞以繁曹宗孺人幼聰慧精女紅父母甚愛之慕公度之為人而歸之孺人執禮不越事舅姑如事父母事其嫡如事舅姑久之萃愛敬焉凡事事必謀及於孺人孺人務殫心竭誠咸輔厥宜終始一軌其修饋祀必時以㫖其治衣飾必儉以潔其處閨閫必嚴以肅相夫子應宗黨御僮僕皆有憲度各滿其願公度遂以富饒禮義甲海邑孺人之力居多己酉遭公度之喪壬子喪其子悉采古禮而襄之婦道母道盡之矣晩年唯一孫侍養尤篤情愛每親師取友必戒之曰近君子逺小人毋爽厥徳以忝所生癸亥秋嬰疾厯冬徂春而勢愈張猶呼𢎞濟與之欵語曰吾且忍死終待汝成迨𢎞濟試御史臺還忽厲聲曰吾不濟矣勉諸後勉諸後言迄而逝時二月某日也享年八十有六云子男一即瑞娶吳氏息女一曰淑蘭皆先孺人卒孫一即𢎞濟邑庠生娶談氏曾孫凡五長恢亦邑庠生次懐次憬次愷次懌卜吉於𢎞治某年某月某日奉窆於范溪祖塋之側禮也惟孺人儉勤淑謹長順和惠粗渉書史能知古今得失至於醫卜書筭博古格物之類皆合于學蓋其天性然也其為忠臣碩師於曹諒矣哉宜銘銘曰穆穆孺人終昌曹氏如劵斯獲允副厥始緝勩纍勛豈愧良史勤家惠宗嫡仲任只中更家紛載罹夫子居中應外有容有禮莫齡撫孫携手提耳將食其報竟不少俟短景下馳挽歌莫起徽志必承豈曰生死范溪滔滔有芹有芑後千百禩鬱鬱髙壘儼山集巻六十五
