body:
  text: 儼山續集巻八明陸深撰序八首贈楊司封仲玉序我朝兩都並建士大夫宦歴同謂之天子禁近之臣自北乞南者著例輙聴其去非獨以便臣下之情亦以養亷静之操也自南入北者必以薦㧞遷擢論不得自乞其法意微矣楊先生仲玉以桐鄉令五月調開化三年政成入為刑部主事閱三月以養母便乞南改吏部主事去子方卧疾于家聞而慕之及起告來先生之子兵科給事中士宜以行巻請敘先生之行也予不及送願有言焉及讀少宗伯東江顧先生所贈序稱楊氏之先世積善于已獲報于天故先生兄弟父子之間科第人物聫羙並秀為一時郡邑冠昭乎天人之際可以勸矣予何加焉惟昔往嵗以使事過三衢方是時先生令開化適羣盜發饒信間而開化當盜衝先生亟請城焉既得命親閱版築屹然保障而開化可守矣嚴村者開化之間道也先生眎其地曰僻而捷請守焉上官不以為然賊竟由嚴村口入賊既入開化間先生據城不暇寢食者凡六旬獨以恩信招集勇敢殺賊甚衆及上首級歎曰殺人以成功名吾不忍也卒為有力者冐去以得賞賊既退殺掠慘酷居民凋耗上官欲按舊籍定賦先生曰亡者民也存者籍也亡者實存者虚以虚存徴實役其何以堪吾不忍為之遂躬歴鄉鄙閱實口數以新籍從事余採諸道路之言如此復訪諸士大夫皆然予竊識之今得牽聫書諸簡末使後有考焉先生蓋勇於為善而獨亷静於進取者耶楊氏之獲於天者宜益厚矣則是行也果不足以盡先生而足以為先生賀先生之兄伯玉憲副與予為忘年交憲副公直諫不喜人諛佞年未及而身先退亷静之操尤為卓立夫屈伸進退之間君子所以與道消息者也余無似不足以與於此士宜幸有以質之縣侯張八峯考滿序嘉靖癸卯八峯先生令上海之三年今上皇帝中興之二十有二年也仰惟皇上深仁厚澤浸漬海隅而綜核之法精我侯以宏材碩學輔理赤縣而循良之政舉蓋千載一時也侯舉戊戍進士有聲當道者器之試令於海海東南壯縣素號難治侯之令海也先徳教而後政刑敦本實而汰浮冗嘗有言曰使吾有赫赫之名吾寜徐徐之為愈也使吾為快心之舉吾寜遜志之為務也是故一年而道行二年而信孚三年而化成海之為海亦既改觀矣今獻績于朝當為治平第一侯自此升矣夫君子學成而仕患無其時時矣患無其遇遇矣患為他奪而業之不能竟也我侯身際聖明道合當軸而又實以三年之俸厯志遂而業成上獲而下得可不謂千載一時也㢤卜日戒行邑之士大夫相與餞之江上有為達才之論者曰侯豈百里所能淹㢤司封駁持諫諍以左右天子發舒輔相之業吾海上固桐鄉也有為留行之計者曰天下一縣之積也使侯之道行必有轉移感應之機風動阿衡猶運掌也兩者不能决以諗于深深曰皆是也凡人之情有愛之者則不忍其去有望之者則不願其留雖然大小則有間矣與其私於一方孰若公於天下八峯其行㢤昔王文正公子明宋之賢相其送薛簡肅之為轉運也曰東南民力竭矣薛公一奉其言為世名臣竊意當時文正深居廟堂之中未必親覽東南之實且真仁之朝宋事將非矣顧宰相一言雖百世猶頌之惟我聖祖肇基淮甸皇上龍飛江漢東南氣勢豈前代所敢望㢤况今天下一統幅員萬里又無燕雲興靈之役中外臣工注意根本之地者謨謀迭出海實東南之一邑固在袵席之上矣但今日之事則我侯之所身親目擊者也侯亦有意於文正之言否耶今制凡考滿自外入者先上其事於考功考功殿最之乃上其事於朝天子親殿最之其髙等則有錫宴賜勑之典或有面對輪召之舉侯時在列倘以東南民力聞於上事有所濟則回天沃日之功又當出王文正之右矣是誠千載一時也侯唯唯相與載拜而别御醫顧君定芳輩前趨以告諸士大夫曰古者行必有贈禮也斯可以為八峯贈矣請書于簡鯉庭雙夀序嘉靖甲申嵗秋九月未盡一日董徴君三岡翁初度辰也實開六袠配孺人氏宋同焉翁孺人有徳徳翁與孺人者咸以雙夀夀翁初翁屢舉子輙不育昨嵗始得男男甚偉長必後董人尤以為仁者之報進士董君羽用既祝焉曰是宜稱鯉庭雙夀庶以彰天之報仁人乃手書翁之懿行足以祈天永命者百十以告于儼山人陸深曰翁子儀之伯父也子儀猶之子也知子儀者伯父深矣伯父母之夀故子儀之慶尤深焉夫可慶者夀可傳者文可文者情文以彰夀夀以徴徳徳以永世於有道者望也此子儀之情也敢請予發書不敢當者久之子儀之請至再而益勤因念今世號稱巨族世家者為不少矣而詩禮甲科之盛則吾郡聞焉吾郡詩禮甲科之家為不少矣而父子兄弟之盛則董氏擅焉乃若出處之皆賢􅁇承之不替則尤盛於董氏予初登朝從廷尉中岡公郡伯宜菴公之後而太守守菴公實有京闈同年之好已復連婣曩嵗拜太夫人於里第時與三岡翁游處信宿醇然君子儒也方時年甚强氣甚壯偉貌而玉晳真貴介公子也退乎其容縟乎其禮度謙謙乎不示人以城府則名門之令器也聴其議論辯而理考其踐履密而誠觀其運用出而不窮蓋練達經綸才也游心物外不以世慮紛擾茂林修竹之間杖屨往來却而望之又神仙流也予敬且慕焉頻年以來徳義益聞惠澤益廣充養益邃而春秋益以髙矣承事諸兄間藹然孝友之光為世矜式天眷明徳俾有賢嗣翁殆今之仁人耶傳曰仁者夀夫仁道之難也久矣千載一人若猶接踵况於並世而雙一家所萃饗偕老之福如翁如孺人者是又國家禎瑞之符而非董氏一門之慶雖羽用愛深情至恐亦未得專而慶之也自是而夀愈升則慶愈大慶愈大則傳愈永傳愈永則徳愈深而風愈逺古人所謂不朽者蓋若是深知翁故史官也庸書以俟并以復羽用云翁名懐字世徳御史介軒公之季子别號三岡人稱之曰三岡翁亦夀也夀沈西津方伯六十序大方伯西津先生沈公既致蜀政歸歸數年年始登六十今嘉靖辛卯六月九日實惟初度之辰僉謂公官至二品矣用之尚未盡其才或者天將益之以􅄸乎深曰何但已也聖明圗治惟才是求惟求老成是事天子且用公於六十外益之以􅄸者庸知非所以盡其才乎僉又曰然是宜賀且祝也相率先期登堂舉禮請詞為侑沈氏之良有雲谿先生者明於大道善為盈虚之詞曰榮名外也神明内也外益形内益生外厚矣而生無益者有之未有趨於外而中之有也其惟核之存乎其惟兌之塞乎惟聰之黜而明且闇乎以無為為為乎吾家弟之所知也是故抗志物表獨超大原雖涉世多虞而險夷欣戚之境藐焉不一槩於中是夀徴也有百户侯昌甫者志於大業善為康濟之詞曰文經武底治之道也禮禁法防理之制也故變化消息與天地俱大人思以一身易天下故曰安我所以亨天下也存我所以厚蒼生也仁夀之効成而吾且與共其不朽吾家兄之所辦也是故敭歴中外卓有政績居常未忍忘世於凡國家理亂之原聞焉必議議焉必詳精神意氣之駿發日盛而月新是夀徴也於是進士存肅捧觴趨而前曰二父之言良是夫修身以至於永命為邦而迄於治安此豈常人所能㢤吾叔父實兼有焉雖然古君子之道放之則運六合而有餘歛之則藏一身於無迹此豈有二致㢤吾叔父豈有聞焉顧吾叔父亷直自信動與時忤耳順云及冢器尤虚天道於仁人何如也方今天子神聖斷然為威福之主清問明揚使是非忠佞大白於天下以究中和位育之化吾叔父葆真延祥誕毓多男以衍螽斯􅆶瓞之風存肅忝以詩書承公後嵗嵗當率宗人如此一觴此存肅之志亦存肅之所為祝也光生以為何如深聞之曰懿㢤雲谿之言淵乎有兄道焉户侯之言秩乎有弟道焉進士之言藹乎有子道焉是可以訓矣深少而鄙公有五年之長竊幸同朝猶兄弟也膏馥所溉亦既多矣使公之道行與公之身夀方且恃以為重寧非慰且願㢤自惟沈陸世居海上百年以來迭相婚婣先世長老皆淳檏和厚故多夀考至於今未衰也又幸從公以科第起其家益有榮光焉一脉之承傳又寜無望於公㢤公將邁期耋閱嵗寒巋然松栢之韻使宗黨婣戚永有矜式庶㡬人以道尊年以人夀此又深之祝也是故特書為序以張之鄉邦且使兩家子弟共聞焉世敦之抑世守之固有出於言語文辭之外者不知公以為何如也海國留春巻後序右海國留春之詩凡若干首弁以海國留春之序一首此鄭侯啓範自上海令赴召起而上海士大夫所為作也蓋以留侯侯不可留遂以思侯云侯莆田名家弱冠舉進士負竒傑之才博學而明於理令上海滿三年矣惠政焯焯以百十計最其大者右文興學稽古䘏民有丕變焉海環地六百里齒聚而易爭故好訟海地之所産利薄而費穰故吝財訟之至也至於忘曲直而擾公私吝之至也至於逋賦貢而喜怨誹二者海之難理也甚矣自侯之來百事改觀固未嘗遣一介行境内又未嘗輕取一介於人人故海之民甚安之其去也海之民甚思之夫海之民能思之未必能言之海士大夫能言之未必能傳之故彚而帙之并以贈侯將使天下後世知侯者衆也衆謂深宜序其後深辱侯知且舊顧不文未必能傳侯乃為之序曰環數百里而為縣壯縣也以進士令壯縣擇而使之也進士令壯縣舉矣才也舉壯縣滿三年得召才之著也召去且將為給事中為侍御史當其才也夫縣令給事御史極内外之選也雖然縣令給事御史品皆在第七自進士為之皆初階也自此以往陟臺省與國政充其才也雖然其事則皆縣令之事也縣令之事吏户禮兵刑工古之六官也故縣令才也然後為才給事才御史故初之難者縣令也上海視他壯縣尤稱繁鉅侯舉之已無難矣而况于其他乎自此而陟臺省聞國政特出其餘耳深病且老矣願拭目以觀侯之進且以永海國之思也若侯之留於海者衆矣故序鄉同年㑹序𢎞治辛酉南畿錄士凡百三十有五人正徳丁丑之春三月二十有四日㑹于京師與者凡二十六人越七日再㑹前此甲戍之春嘗㑹矣凡四十九人至是則㑹愈數人愈寡而情愈親嗟乎士方年壯志銳輙欲盡攬天下之材傑而交之然嘗患乎不專及夫歴閱久而事變更升沉散聚槩於中然常患乎不樂暢湮鬰之情以聫渙散之勢是則兹㑹之意也朋友之道其來久矣惟近世同年之交同升而臣有兄弟之義同師而出有几席之親是故疏而宻逺而近間有不識面目一問姓名而情好已敦雖其子子孫孫猶將世世講之矣况於地鄰人接生長千里之内為鄉同年者㢤是則兹㑹之不容以已也雖然情必附義私不勝公此古之道也諸君子知所以㑹者乎以同年之好也亦知所以為同年者乎國家設科以待天下之士固將以同文求之夫文同則道同求同則進同然而出處顯晦中外逺近大小蚤暮勢有不能盡同而同力同心以報國致志無乎不同者是則兹㑹之光也深不敏敢以為諸同年告與㑹之士某授某官行也因以為贈歸田錄序歸田錄者沙邑陳公詩一編也公在英宗之朝仕為河南布政都事公既歸老之言也其後人錄之以昭公之志公卒之餘三十年其孫璵始由閩省檄貢在今天子之庭既留南雍又二年始歌鹿鳴於應天又二年始出録俾同年友陸深咏歌之既又屬以序頃嘗奉君語間及先公嘗婉辭以避或中語則輟察其意蓋悼公之不得志又重慮聞者之未悉也乃盡扣之曰先公士乎曰士也治經讀史負不羣之志操筆摛文時軰退服曰先公仕乎曰仕也亷明有識長於治治但以氣岸自髙不知為小官也以是為當道者弗容然窘孽百至竟亦莫能加民譽日增焉曰先公歸乎曰歸也有田數畝以給食課童婢以足衣讀書賦詩以終日英氣壯志常發於酒酣耳熱之後深之得於公孫者如此及讀公是詩果樸素英發古之風節人也徐考所至皆不稱公公有經史胡為八舉皆北公有才政胡為官不再遷是豈皆遇也乎由今觀之則天之報公也不必於其身將隆其後靳於一時者流於百世髙階通顯有與公同時者今其鄉鄰子弟有不能舉其名尋其門户亦就凋廢公雖一命之士去於世也逺矣天下之士識與不識咸樂繹公之羙讀是錄也皆知於今有公也進而與公之孫交也皆知公之有後也於公孰賢㢤公諱某忠肅公之後璵字良玉積學富文將盡發公之藏者是為序夀唐母張孺人六十序唐母張孺人以辛丑生今嵗再行辛丑花甲重周而始開七袠古稱中夀是已十月十有二日為初度之辰兩族子姪暨郡邑婣婭相率登堂為夀而以侑觴之辭屬予惟吾郡士族多舊家而張唐尤顯城東三節之門尚書南山公擅焉孺人其女孫也唐氏居金匯者世世以積善稱郎中西園公復以甲科起其家孺人其冢婦也予陸氏亦望松郡忝列朝紳適從尚書郎中公後且敬且慕辱兩家皆不予鄙子楫遂娶孺人之季女有婣好焉故知孺人為詳復念竹溪君游締之雅故敬孺人為最蓋有年矣予適蒙恩歸休楫時以廕卒業太學侍予南還數請於予曰唐自西園公違世家遂中落頼我竹溪公以詩禮纘家聲以勤儉保家業彬彬然日益昌大孺人内贊之力居多兒將以此為祝予曰是婦道之常爾未足為孺人夀也楫曰再自竹溪公違世家日益凋頼我孺人周旋百蠱訓迪嗣子以有聲太學唐祚之衍未艾兒將以此為祝予曰是母道之常爾未足為孺人夀也惟孺人之大節在造唐其足以格天也必矣兹當食報之秋吾知天之所以夀孺人也必矣孺人惟一子自治方其早失怙也孺人憂其無以立夙夜訓誨身兼師保今自治之學有成矣氣體充裕矣當俾西園公為有孫竹溪君為有子而自治將多男則含飴錫類其所造唐者比於安國運豈出忠臣良將之下㢤今兹稱夀正祝頌之始耳兒軰觴酒豆肉足為賢母榮㢤於是楫跽而前曰是兒之所欲言而未能者也請書為賀遂書儼山續集巻八
