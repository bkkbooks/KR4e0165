body:
  text: 儼山集巻五十九明陸深撰傳一季札傳季札者吳壽夢之子也封於延陵故號曰延陵季子初壽夢有子四人長曰諸樊次曰餘祭次曰餘昧次曰季札季札賢壽夢欲立之季札讓不可於是立諸樊諸樊已除䘮讓位季札季札曰昔曹宣公之卒也諸侯與曹人不義曹君將立子臧子臧去之以成曹君君子曰能守節矣君義嗣誰敢千君有國非吾節也札雖不才願附於子臧之義吳人固立季札季札棄其室而耕乃舍之諸樊立十三年而卒有命授弟餘祭欲傳以次必致國於季札而止以稱先王壽夢之意且嘉季札之義兄弟皆欲致國令以漸致焉餘祭四年聘於魯見叔孫穆子而説之謂之曰子其不得死乎好善而不能擇人吾聞君子務在擇人吾子為魯宗卿而任其大政不慎舉何以堪之禍必及之請觀周樂為之歌周南召南曰美哉始基之矣猶未也然勤而不怨歌邶􅅠衛曰美哉淵乎憂而不困者也吾聞衛康叔武公之徳如是是其衛風乎歌王曰美哉思而不懼其周之東乎歌鄭曰其細已甚其民不堪也是其先亡乎歌齊曰美哉泱泱乎大風也哉表東海者其太公乎國未可量也歌豳曰美哉蕩蕩乎樂而不淫其周公之東乎歌秦曰此之謂夏聲夫能夏則大大之至也其周之舊乎歌魏曰美哉渢渢乎大而婉儉而易行以徳輔此則盟主也歌唐曰思深哉其有陶唐氏之遺風乎不然何憂之逺也非令徳之後誰能若是歌陳曰國無主其能久乎自鄶以下無譏焉歌小雅曰美哉思而不貳怨而不言其周徳之衰乎猶有先王之遺民也歌大雅曰廣哉熙熙乎曲而有直體其文王之徳乎歌頌曰至矣哉直而不倨曲而不詘近而不偪逺而不攜遷而不淫復而不厭哀而不愁樂而不荒用而不匱廣而不宣施而不費取而不貪處而不底行而不流五聲和八風平節有度守有序盛徳之所同也見舞象箾南籥者曰美哉猶有憾見舞大武曰美哉周之盛也其若此乎見舞韶濩者曰聖人之𢎞也猶有慙徳聖人之難也見舞大夏曰美哉勤而不徳非禹其誰能及之見舞招箾曰徳至矣哉大矣如天之無不燾也如地之無不載也雖甚盛徳無以加矣若有他樂吾不敢觀去魯遂使齊説晏平仲謂之曰子速納邑與政無邑無政乃免於難齊國之政將有所歸未得所歸難未息也故晏子因陳桓子以納政與邑是以免於欒高之難去齊使於鄭見子産如舊交與之縞帶子産獻紵衣焉謂子産曰鄭之執政侈難將至矣政必及子子為政慎以禮不然國將敗去鄭適衛説蘧瑗史狗史鰌公子荆公叔發公子朝曰衛多君子未有患也自衛如晉將宿於戚聞鐘聲曰異哉吾聞之辯而不徳必加於戮夫子獲罪於君以在此懼猶不足而又可以樂乎夫子之在此猶燕之巢于幕也君在殯而可以樂乎遂去之文子聞之終身不聴琴瑟適晉説趙文子韓宣子魏獻子曰晉國其萃於三家乎將去謂叔向曰吾子勉之君侈而多良大夫皆富政將在三家吾子直必思自免於難季札之初使北過徐君徐君好季札劍口弗敢言札心知之為使上國未獻也還至徐徐君已死於是乃解其寳劍繫之徐君冢樹而去從者曰徐君已死尚誰予乎季子曰不然始吾心已許之豈以死倍吾心哉餘祭卒傳餘昧及餘昧卒欲授札札讓逃去於是吳人曰先王有命兄卒弟代必致季子今季子逃位則餘昧子當代乃立餘昧之子僚為王公子光者諸樊之子也常以為吾父兄弟四人當傳至季子季子即不受國光父先立即不傳季子光當立又用專諸曰我真王嗣當立吾欲求之季子雖至不吾廢也既而簒僚季子至曰茍先君無廢祀民人無廢主社稷有奉乃吾君也吾敢誰怨乎哀死事生以待天命非吾生亂立者從之先人之道也闔廬命哭僚墓復位而待札長子死於嬴博之間因葬焉孔子使子貢觀之其穿深不及泉其斂以時服既葬封其壙左袒右旋號者三言曰骨肉歸復於土命也若魂氣則無不之也遂行孔子曰延陵季子之於禮其合矣札凡事吳七主年九十餘卒孔子表其葬曰嗚呼有吳延陵季子毘陵之間尚有季札墓云論曰司馬子長稱季子閎覽博物及觀嬴博之役又何深於禮也信乎附青雲哉重修伍子胥傳伍員字子胥楚人也父奢兄尚其先曰伍舉以直諫事楚莊王故世有顯名於楚楚平王有太子名曰建使伍奢為太傅費無忌為少傅無忌不忠於太子平王使無忌為太子取婦於秦秦女好馳歸報平王曰秦女絶美王可自取而更為太子取婦無忌既以秦女自媚因去太子而事平王恐一旦王卒而太子立乃因讒太子建建母蔡女也無寵於王王稍益疏建使建守城父備邊兵頃之無忌又日夜言太子短於王曰太子以秦女之故不能無怨願王少自備也自太子居城父將兵外交諸侯且欲入為亂矣王乃召其太傅奢考問之奢知無忌讒因曰王獨奈何以讒賊小臣疏骨肉之親乎無忌曰王今不制事成矣王且見禽於是王怒囚伍奢而使城父司馬奮揚往殺太子奮揚使人先告太子建亡奔宋無忌言於王曰奢有二子皆賢可質其父而召之不然且為楚患王使使謂奢曰能致汝二子則生不能則死奢曰尚為人仁呼必來員為人剛戾忍訽其勢必不來王不聴使人召二子曰來吾生汝父不來今殺奢也尚欲往員曰楚之召我兄弟非欲以生我父也恐有脱者後生患故以父為質二子到則父子俱死矣何益不如奔他國借力以雪父之恥無俱滅為也尚曰我知往終不能全然恨父召以求生而不往後不能雪恥終為天下笑耳謂員可去矣汝能報父之讎我將歸死尚既就執使者捕員員貫弓執矢嚮使者使者不敢進員遂亡往從太子建於宋奢聞員之亡也曰楚國君臣且苦兵矣尚至楚楚并殺之員既至宋宋有華氏之亂乃與建俱奔鄭鄭人甚善之建又適晉晉頃公曰太子既善鄭鄭信太子能為我内應而我攻其外滅鄭必矣滅鄭而封太子太子乃還鄭㑹從者告其謀鄭定公與子産誅殺建建有子曰勝員懼乃與勝俱奔吳到昭關昭關欲執之員遂與勝獨身步走幾不得脱追者在後至江江上有一漁父知員之急乃渡員既渡解劒與漁父曰此劒直百金父曰楚國之法得伍員者粟五萬石爵執珪豈徒百金劒耶不受員未至吳而疾止中道乞食至吳吳王僚方用公子光為將員乃因公子光以求見呉王久之楚之邊邑鍾離與吳之邊邑卑梁氏俱蠶兩女子争桑相攻至於兩國舉兵相伐吳使公子光伐楚拔其鍾離居巢而歸員説吳王僚曰楚可破也願復遣公子光光謂王曰彼伍員父兄為戮於楚而勸王伐楚者欲以自報其讎耳楚未可破也員知光有内志而未可説以外事乃進專諸於公子光退而與太子建之子勝耕於野五年而楚平王卒初平王所奪太子建秦女生子軫及平王卒軫立是為昭王吳王僚因楚䘮使二公子將兵往襲楚楚發兵絶吳兵之後不得歸吳國内空公子光乃令専諸襲刺王僚而自立為王是為闔廬闔廬既立得志乃召員以為行人而與謀國事楚誅其大臣郤宛伯州犂伯州犂之孫伯嚭亡奔吳吳亦以為大夫前所遣二公子將兵伐楚者道絶後聞僚弑而闔廬立遂以其兵降楚楚封之於舒闔廬立三年乃興師與伍員伯嚭伐楚拔舒遂禽故吳二將軍因欲至郢將軍孫武曰民勞未可且待之乃歸四年吳伐楚取六與􅈞五年伐越敗之六年楚昭王使公子囊瓦將兵伐吳吳使員迎擊大破楚軍於豫章取居巢九年闔廬謂伍員孫武曰始子言郢未可入今果何如二子對曰楚將囊瓦貪而唐蔡皆怨之王必欲大伐之先得唐蔡乃可闔廬聴之悉興師與唐蔡伐楚與楚夾漢水而陳吳王之弟夫槩將兵擊楚將子常子常敗走奔鄭於是吳乗勝而前五戰遂至郢已夘楚昭王出奔庚辰吳王入郢昭王出亡入雲夢盜擊王王走鄖鄖公弟懐曰平王殺我父我殺其子不亦可乎鄖公恐與王奔隨吳兵圍隨謂隨人曰周之子孫在漢川者楚盡滅之隨人欲殺王王子綦匿王自為王以當之隨人卜與王於吳不吉乃謝吳不與王初員與申包胥為交員之亡也謂包胥曰我必覆楚包胥曰我必存之及吳兵入郢員求昭王既不得乃掘楚平王墓出其尸鞭之三百然後已申包胥亡於山中使人謂子胥曰子之報讎其已甚矣吾聞之人衆者勝天天定亦能勝人今子故平王之臣親北面而事之今至於僇死人此豈無天道之極乎員曰為我謝包胥曰吾日暮塗遠吾故倒行而逆施之於是申包胥走秦告急求救秦不許包胥立於秦庭晝夜哭七日七夜不絶其聲秦哀公憐之曰楚雖無道有臣若是可無存乎乃遣五百乗救楚六月擊敗吳兵於稷㑹闔廬久畱楚求昭王而王弟夫㮣乃亡歸自立為王乃釋楚而歸擊夫槩夫槩奔楚楚昭王見吳有内亂乃復入郢楚復與吳戰吳敗乃歸後二嵗闔廬使太子夫差將兵伐楚取番楚懼吳復大來乃去郢徙於鄀當是時吳以伍員孫武之謀西破彊楚北威齊晉南服越人其後五年伐越越王句踐迎擊敗吳於姑蘓闔廬病創死夫差既立為王以伯嚭為太宰習戰射二年後伐越敗越於夫椒越王句踐棲於㑹稽之上使大夫種厚幣遺吳太宰嚭以請和求委國為臣妾吳王將許之伍員諫曰昔有過氏殺斟灌以伐斟尋滅夏后帝相帝相之妃緡方娠逃於有仍而生少康少康為有仍牧正有過又欲殺少康少康奔有虞有田一成有衆一旅後遂收夏衆撫其官職使人誘之遂滅有過氏復禹之績祀夏配天不失舊物今吳不如有過之彊而句踐大於少康今不因此而滅之又將寛之不亦難乎且句踐為人能辛苦今不滅後必悔之吳王不聴用太宰嚭計卒與越平其後五年乃興師北伐齊員諫曰句踐食不重味衣不重采弔死問疾且欲有所用之此人不死必為吳患今吳之有越猶人之有腹心疾也王不先越而乃務齊不亦謬乎吳王不聴伐齊大敗齊師於艾陵遂威鄒魯之君以歸益疏子胥之謀其後四年吳王將北伐齊越王句踐用子貢之謀乃率其衆以助吳而重寳以獻遺太宰嚭嚭既數受越賂其愛信越殊甚日夜為言於吳王王信用嚭之計員諫曰夫越腹心之病今信其浮辭詐偽而貪齊破齊譬猶石田無所用且盤庚之誥曰有顛越不恭劓殄滅之俾無遺育無使易種于兹邑此商之所以興願王釋齊而先越不然後悔無及吳王不聴使員於齊員臨行謂其子曰吾數諫王王不用吾今見吳之亡矣汝與吳俱亡無益也乃屬其子於齊鮑牧而還報吳太宰嚭既與子胥有隙因讒曰子胥為人剛暴少恩猜賊其怨望恐為深禍也前日王欲伐齊子胥以為不可王卒伐之而有大功子胥恥其計謀不用乃反怨望而今王又復伐齊子胥專愎彊諫沮毁用事徒幸吳之敗以自勝其計謀耳今王自行悉國中武力以伐齊而子胥諫不用因輒謝佯病不行王不可不備此起禍不難且嚭使人微伺之其使於齊也乃屬其子於齊之鮑氏夫為人臣内不得意外倚諸侯自以為先王之謀臣今不見用常鞅鞅怨望願王早圖之吳王曰微子之言吾亦疑之乃使使賜員屬鏤之劒曰子以此死員仰天歎曰嗟乎讒臣嚭為亂矣王乃反誅我我令若父霸自若未立時諸公子争立我以死争之於先王幾不得立若既得立欲分吳國予我我顧不敢望也然今若聴䛕臣言欲殺長者乃告其舍人曰必樹吾墓上以梓令可以為器而抉吾眼縣吳東門之上以觀越之滅吳也乃自剄死吳王聞之大怒乃取員尸盛以鴟夷革浮之江中吳人憐之為立祠於江上因命曰胥山論曰事豈不有天道者哉伍子胥本用吳以報楚乃謀越以忠於吳初言既酧交疏隕命倒行而逆施亦夫子果於自與也尚之死足以稱仁子胥終有功名可以不死予往來江上未嘗不悲之儼山集巻五十九
