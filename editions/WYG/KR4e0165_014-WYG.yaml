body:
  text: 儼山集巻十四明陸深撰七言律詩五十首晨登厙公山山形横如軸正當鳳喙地理家謂之丹鳯銜書丹鳯銜書下九霄分明形勝見山椒先秋古樹蒼黄出映日高峯紫翠揺稅地澆花人未老買船載酒路非遥經行更愛清溪曲若箇淮南苦見招宿布金寺五年荏苒重過寺一夜空明獨倚樓水亦何縁俱到海心如無礙總忘鷗細尋徃事和頭白多感新涼與病瘳安用逺公要靖節蹔隨蝴蝶化莊周將抵闗橋迎漲泊舟北岸待月簇簇江雲妬月明悠悠沙岸海潮生漁歸别浦風無力人語孤村夜有聲頗費推移為去住尚勞恩怨是隂晴兹遊逐水留三宿别近翻多戀别情連夜月色甚佳浦上尤勝西渡有作昨宵對月思東渡今夕月明西渡江紅燈照漁隱數㸃白鳥傍人驚一雙恍疑混沌太古色忽聞欵乃俚人腔一天星斗浸上下時有波影揺船窻渡江本有江南水竹情謬持華藻謁承明四年五向金焦渡戊子北渡己丑南渡庚寅兩渡辛夘西渡萬里重為晉冀行臣罪每蒙明主貰吏文先為故人驚風前又聽滄浪起兩鬢霜寒一棹輕維揚哭蔡石岡侍郎魚鳥猶疑水上軍河州重到不堪聞才名滿世誰當忌膏馥宜人秪自焚已向蓋棺須論定聊從破篋覔遺文西門總是傷心地淚迸羊曇濕暮雲懐寄喬白巖太宰吳山楚水謝行舟望入榆闗路轉悠聊向歲寒占緯候旋看春色動林丘相逢先問尚書履願見渾勝萬户侯憶昨過江勞物色是誰同載上揚州宿遷曉發重裘絮㡌北行裝地炕煤爐候曉光十里鷄聲常帯月五更蝶夢半還鄉闗河逺近俱蕭索岐路東西各渺茫不怕孤危縁歴慣太行山脊更羊腸雪後登平潭驛樓面面峯巒一水通危樓正倚夕陽東自將短髮明殘雪閒看孤雲送斷鴻北斗地高天更逺巴人心苦調逾工南冠嵗晩催歸客合讓元龍臥此中除日平潭道中陽和藹藹度郊墟鳯歴拈來歲又除萬事可齊終有盡一生能幾苦求餘茒茨人靜鷄聲早闗塞天高雁影疎欲寄封書東海上藥闌花塢近何如呂左丞書院穹林古寺有殘僧指㸃前朝呂左丞石洞嵗深苔黯黯礪墻春早雪層層舊藏萬巻龍常䕶欲寄雙椷雁可慿星斗夜闌雲霧裏州人遥見讀書燈孫傑太守高嶺書院石梯隨歩與雲升又是青山第幾層望到只疑天更近興來唯有斗堪凭嶺頭日月開昬曉洞口詩書感廢興一自文翁歸蜀後手扶風教有誰能孫太守兄弟陪遊郄家瀑水簾瀑布見應多疊嶂層巒奈此何春向雪中翻玉乳人從天上挽銀河久蒙郄姓宜攀桂未必王家勝浴鵝好事主人金玉侶逺擕名酒沸清歌南里楊用之憲副朝囘遂歸共遊城南嘉山二月二日榆闗春流盃猶在蹟俱陳谿風撲面知新候野老傳名愛古人山外有山青不斷客中逢客意偏親桑田滄海尋常事共惜尊前萬里身嘉山次韻郄文淵知州尋山問水約同行嫩栁初勻花欲明正及人間修褉節更堪林外踏歌聲病嚴酒戒三分量清愛茶烟一縷縈韋杜去天元尺五不辭歸路暮雲平次韻再答郄文淵久客寧忘地主賢每勞移步出花前川圍風日春難老山抱樓臺月又圓燕子暖泥低掠水王孫芳草逺連天行藏未定頻看鏡獨羨君歸及壯年送王賔峯赴陜西太僕少卿初從白豸換金緋遥拜彤墀達紫微外省中臺無别署求才買駿本同機秦闗百二沙場迥渭苑三千塞草肥龍種不縁常在野雲車留取待驂騑贈高如齋少參巡雲中北門鎻鑰紫薇㕔新轉官階舊典刑鼓角令嚴邊月曉旌旗春暖塞雲青臺懸駿骨千金重身作長城萬里寧會見極天歌帝力聊將風力掃王庭栢井東下重闗紫翠深好山如㦸送歸心瑶空日月雙行蟻夏木園林一變禽旗畫半銷嵐􅂔濕邊烽高結陣雲隂前身或是乘槎客碧漢銀河取次尋度井陘石谿磊磊水環隄喚起雞聲更馬蹄三晉山川分左右一陘塵土逐高低樾隂逗日連村動麥秀含風掠地齊近北韶華終覺晩尚擕春服事攀躋題兩江號長江西來雙白龍接天波浪春溶溶羣鷗弄影舞欲下獨鶴轉翅鳴相從雨後鶯花看不盡煙中舟楫望猶重主人不是鴟夷子一曲滄浪十二峯五月卄七日雨後過山居觀屏間所留橘實更豐肥而色囘蔥蒨詰旦南鄰致白菊一本三花燦然皆異也賦詩紀之菊花開早橘收遲碩果幽芳又一時未用千頭當萬户只愁無酒負新詩薰風五月黄金顆畏日南鄰白雪籬欲起三家問書法春秋何例合修辭雨後雨送微涼月向圓江樓獨倚早秋天梧桐自解知時令牛女何心識歲年近水夜雲常結綺含風海氣半為煙倦來欲展南窻臥宋玉悲哀是偶然和張贊卿喜雪雪滿琳居小洞天陽春一曲為誰傳雲低百尺闌干外寒在半空樓閣邊栁絮梨花俱不俗瑶臺玉署本通仙洞庭新水東風裏會送江湖萬斛船癸巳春日崔東洲蔣東曉陸體齋諸同寅作湖山之行早春風日未全和十里湖隄小隊過歌舞樓臺聊復爾興亡今日竟如何三竿日影山中寺千樹梅花水上坡面面紫青看不厭好峯偏向夕陽多寄鄭思齋侍御罷官百年何處無風雨試問行人歸未歸畫裏山川看亦險人間岐路事多違海門有影龍方戰桑土何心鳥倦飛最好中流千尺浪不曾搖折釣魚磯德清谿南山水從乾元絶頂東樓午餉是日晴朗一望極目但不能把酒復自元峯觀北折山家玉蘭一樹高可三丈餘兩虬株盛開香風逺襲亦一竒境也連朝積雨喜新晴渡水登山取次行南斗星辰奠吳越東風煙浪接蓬瀛半生酒醆元無分二月花枝太有情回首好山千萬疊青雲長傍澗松明嵊縣早發沿涉新昌道中沙明水淺映疎星十里春寒䕶短亭地僻稀聞行客早日高初見逺山青羊腸鳥背尋常事問竹看花次第經一任午風吹不㫁薄羅衣袂近蒼溟經天姥天姥峯頭雲日開欲臨東海望蓬萊不辭謝客登山屐逺愧孫郎作賦才秀色南來連五嶺星文高處接三台何人更有凌空手為築黄金萬里臺天台東入寧海侵晨起踏天台路雨意微蒸海上霞嚴衞共傳天使節靘深疑到地仙家千盤雲外羊腸坂幾樹山頭謝豹花欲問當年劉阮事人間紅日又西斜寧海北歸海城風物送歸程一段春遊畫不成山色有無分近逺嶺雲濃淡識隂晴青浮島嶼鯨波立緑暗松杉鳥道横欲采柔芳寄相憶好花開遍不知名桐江舟行沿月錦㠶明月舵樓風逝水澄鮮復映空萬里鶴歸迷近逺一谿人語隔西東廣寒金粟秋香動碧落銀槎海氣通漫向桐江論往事客星元是釣魚翁瑞虹江湖住傍青山好舟楫來驚白浪多兩岸菰蒲迴鸛鶴中流風雨長蛟鼉書隨驛使心先寄秋逐年光鬢已皤一曲滄浪多少意况堪重聽楚聲歌白鹿洞遊眺亭臺高下恣登臨泉石松篁處處尋一徑莓苔無俗轍四時弦誦有清音人逄勝境功名薄山到斜陽紫翠深五老不隨雲雨變卜隣初見古人心伏日自南康郡城登觀瀾閣匡廬彭蠡氣争雄一段閒雲萬頃風五老地高俱拱北九江天逺總朝東秋期先逐鄉心到眼界聊隨野望空更向青霄問明月畫闌人在水晶宫十二月朔雪夜宿宣風館次壁間韻歲晩溪流凍有痕嶺頭雲日瘴猶渾向來萍實千年事一去梅花第幾村高鳥過林驚積雪長亭催客易黄昏深慚未遂還吳計獨譜離騷招楚魂二月廿二日冒雨發天長斷橋亂水經涉甚險軟輿籠雨破春寒煙水江淮路百盤橋斷正憐羸馬度雲深疑有老龍蟠行邊白髮和愁長望裏青山帶濕看為問隂晴成㡳事鷦鷯終羨一枝安虹縣曉發是日清明拂曙星河擁使旌隋堤花栁報清明人家煙火寒猶禁客子衣裳暖漸輕夾岸露華添細水浮空春色抱孤城東風滿地皆芳草一為多情盡日行南陵王望雲樓五色雲中本帝州梁園更起望雲樓太行西去天逾近華表歸來鶴蹔留貝闕珠宫元渺渺白衣蒼狗自悠悠憑將一掬思親淚灑向朱闌最上頭洛陽書懷河山天地此中州千古風雲擁上游王氣不消天正逺元功猶在水常流幾時荆棘銅駝巷何處隋唐五鳯樓六十頭顱身萬里香山洛社愧前修登華山至青坪群玉峯頭鐡鎖寒周秦遺事共漫漫山從拔地五千仞路向穿雲十八盤上界樓臺懸日月下方風雨長波瀾乾坤不博䝉頭睡一借神仙蛻骨看棧道寄康徳涵修撰當年館閣重離羣渭北過逄正暮雲髯鬢共驚俱長大寒暄無處不慇懃人皆欲殺偏憐我老更何求敢負君一上陳倉雲路永蜀川歌調况堪聞利路紀雨欹枕無眠萬里心濟時須仗傅巖霖三更忽送千山雨五月難逄半日隂禾黍壠頭新水漲芭蕉聲裏大江深起來欲着蓑衣舞細聽牕前斷續音八月一日出郊秋色佳甚逺山流水曉雲和松有盤陀竹有坡兩月簿書堆積滿千重巖壑夢魂多蓴絲漸逐秋心長鴈信憑將旅恨過一出郊闗風景別桃源未敢問如何十月六日晩登大安門樓望雪山歳晩天空旭日晴雪山當面始分明登臨到我元無約風景於人似有情樓閣欲從千里見雲烟誰借一朝清不知地位高多少瑤樹琪花近五城詰朝侵曉再出西城門曙色喧闐滿市樓穿雲十里度林丘漢家事業三分國禹貢山川九等州村落人煙風不散園田生計歳應收茂林修竹渾如許安得蘭亭擅昔遊微雨出城赴南泉憲長草堂之招偶述衝雲重作草堂遊庭樹青黄濕未收子美有靈終戀蜀孔明無計為安劉何須往事千年恨自愛長江萬里流老去諸縁看漸盡每逄知已勝封侯仲冬望東郊送鄒和峯侍御冉冉山雲壓樹低村村茅屋帶沙谿征旗滿路風初勁尊酒長亭日又西栢府獨傳烏夜曲花驄偏戀錦障泥隔林好鳥知人意更向離筵盡力啼至後四日偕鄭少參謁孔明祠丞相祠堂特地過仲冬風日更柔和時隨運去終應爾事與心違獨柰何庭樹不凋棲燕雀江流有恨泣蛟鼉唐碑漢署青山下過客留題積漸多過萬里橋愁聞萬里橋南路囘首關河萬里多入望煖雲山破白長年臘月水層波石闌且逐行行度蜀道時聴欵欵歌此去應知東到海欲憑雙鯉問如何儼山集巻十四
