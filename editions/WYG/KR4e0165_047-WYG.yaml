body:
  text: 儼山集巻四十七明陸深撰序十一送大京兆江公赴南都序瑞石先生江公之尹應天也自晉之右轄升升等矣而榮尤焉蓋自藩而輔於格謂之内入故三司之在晉者因公以為榮又榮也大方伯自楊公而下憲長自潘公而下都閫則馬公王公咸屬贈言深又安敢弗是之榮哉而謂公於此有榮焉則未也士大夫操内外之説一切較量之故有一生仕宦不出國門者為幸且遇至春時天涯之咏戀戀然不忍舍去二者皆過也夫仕事也内亦事也外亦事也顧事事何如耳或曰居中清燕任外勩勞獨非人情也乎曰知其勞逸而均之以為理此用人之人之事也榮瘁焉吾何與公以經術魁天下進士髙第筮仕兵部既優拔之吏部既十餘年布政山之東西亦既十年矣夫兵部吏部方今之貴要顯融司也公未嘗以自逸山之東山之西亦今繁劇險瘠之地而公未嘗以告勞是豈畱情中外者哉是行也公實有榮焉而非是之謂也請為諸公言之夫堯舜禹湯文武皆古之聖王也然而稱聖王者必以堯為首自堯舜禹湯文武以至周公孔子皆古之聖人也然而稱聖人者必以孔子為首又自漢髙唐宗宋藝暨我朝之太祖皆中國之皇帝也然而稱得堯之統者必以我太祖為首何者堯之道欽明而已矣孔子之道時中而已矣我太祖之神功聖徳損益百王以還之仁孝而已矣今之應天太祖之舊京也山之東孔子闕里在焉山之西堯之故都也堯之故都公嘗治之矣孔子之鄉公又嘗治之矣咸以最聞今將舉堯孔之道以復治我太祖之舊京矣則凡創業之難與夫守成之不易者其在于今抑亦有裨於神功聖德乎否也有裨於神功聖德以贊佐一王之典顧不大榮矣乎諸公曰然因書為序避喧菴詩序避喧志隱也從而咏歌之成其志也凡人之情必有避觀于避斯知其人矣是故避位者讓避名者賢避地者哲避喧者隱夫喧讙聲也城市多喧山水則否大抵山益髙水益深則境益靜而喧益不到四方佳山水稱東南東南之佳者稱天台天台一脉為黄巖黄巖又天台之佳者也蓋天台東至黄巖窮矣其磅礴鬱嵂又鍾于人故黄巖多著姓而以戴氏為佳戴故石屏後也恬隱公又戴氏之佳者也避喧則公所名菴菴據黄巖之佳曰太平㠐事見秦行人記中所謂善于慕陶者得之矣公之子允大仕于朝為國子師以學行聞天下由是避喧之名往往入于騷壇吟社中為咀嚼品題之具矣深曩遊南雍辱允大先生賞識兹㑹都下别且三年矣而所得避喧詩益多彚而授深序或曰公既隱矣焉用文之若是者無乃幾于喧與而併為公所避與深曰不然夫萬有相吹而聲出焉其在城市則車馬綺紈聲利名位紛然擾者謂之喧其在山林則泉響谷應禽弄木奏悠然適者謂之喧又其至也莊生所謂天籟焉自然動者亦謂之喧茍自其本舉謂之喧亦可也茍自其末則喧亦多端矣公之所為避者其城市之喧乎不然悠然適者自然動者公方有㝠㑹焉而又曷避為况詩書之聲和雅洪澹諧韶鈞叶音吕與天籟等公方樂焉以為兹菴助而槩曰避之是豈公之志哉或者喻而退既廼録為序送賀君汝修赴内江令序余往歳遊南雍取友於天下而湖湘實多士於武昌得三人焉張君一卿胡君汝洪賀君汝修而汝洪汝修復以同經講好時同經之士以數十輩而汝修年最少資最敏余視之一日而千里也數年以來余最劣最先成名而一卿尚需次于家汝洪令内鄉已迨一考汝修與汝洪同得項城俄以家制去今庚辰之秋起今内江予已轉官成均與汝修㑹于都門俯仰今昔為之慨然屬其鄉士夫自少保陳公而下以贈言請而王大理實來速之予於汝修豈得無言乎哉始汝修與數君子朝夕服勤者先王經世之迹前賢已試之方不知於今果可以見之行而無難乎兹得一縣去百里民社之責一時風俗所關不知操縱張弛者果昔日之所講明而許與者乎昔之所學不可施之今是徒勞也今之所履不皆本於昔是忘其久要矣古之君子蓋有從容數言以槩其平生於把袂之頃者余於汝修豈得無望乎哉昔與汝修約曰人品必為諸葛孔明程伯子文章必如先秦兩漢政治必效三代斯言未逺聊於内江乎卜之也内江蜀之壯縣去京師萬里地險而逺且當兵革之餘民弊而易怨又有中貴人將命在蜀供需歳以數百萬計内江茍當一日之費且不能辭矣汝修能不以為難乎哉汝修嘗遇至人聞大道為予講性命之説坐而聽之浹日焉皆不異吾聖人之指即是而措之則曹參之所以治齊欒巴葛洪之神化一邑者寧不大過於功名富貴之所為圖哉汝修行矣聊於内江乎卜之也汝修文章已成而博學未為世所盡知知之深者余不能多讓也於是乎言别聶文蔚詩序余倀倀然無當世之交自罹憂患以來神情銷落尤無當世之志而世亦將棄我矣獨雙江聶君文蔚不終見鄙時枉山居惠而教我然文蔚來令華亭凡四年矣政績為當世第一今年春天子亦以第一人召之深故華亭家也方將託文蔚以自老於一丘一壑之間而文蔚去矣文蔚去將陟華當軸以大發其胸中之所藏文章政事卓為名家信當世之才也顧深方抱病不及一握手别以謝知已賦詩送之送張虞咨都事序自古觀盛治必徴於世臣觀於世臣之家者必徴於子若孫蓋積家而國積國而天下其化通也皇明世德之臣於吾松有一人焉故贈太子太保南京兵部尚書謚莊簡定菴張公是也公之學有本原不為言語文字而其所自得者為多故敭厯中外餘四十年位至八座皆有為有守晩就懸車蓋始終出處無少遺憾焉今之稱公率以董學兩浙為盛殊未有及其學者深生也晩嘗一拜公近讀公之文獲窺其一二故竊論人品於吾松必當以公為首又意其不當以區區一郡論公也公之子牧字虞咨復修公之道以公廕當補官吏部優其材得為南京左軍都督府都事將赴任凡松之人有事於京者重其為大賢之後而又賢也實光于松故咸有贈而謂深為序乃進告於虞咨曰南都重地昔者先公之所畱守也五府要司昔者先公之所參贊也其徳惠條畫固結於人心者方新一時之士大夫嘗登公門者今且布列於庶位有與公同朝同事者三數公尚在聞君之往也必私喜皆來觀于公之世焉使其父黨退而歎曰清忠肅恭猶吾莊簡也其君子聚相慶曰公信質敏猶吾莊簡也其小人匍匐而進鼓舞而退轉相告於其父兄子弟曰是我公之子也猶我公也若是是能世其德矣使后之人觀我治化本公父子其於吾松不滋重與凡松之人惡得無厚望於今日哉夫人之生乏賢父兄而外取諸人人或不足而尚取諸古之人是二者蓄德均也難易則有間矣若虞咨者其蒞官其行已豈待他取乎哉故於是行也備論公焉而不以為複者深之私也初公之卒有司以聞孝廟悼之為賜祭勑工部營葬事事既竣虞咨以太夫人之命入謝遂請贈謚今天子正極之始首是之事下禮部既成請復疏乞終養事下吏部例格不行授今職得便養乂成其志皆殊遇也故序南渠集序南渠子三十舉進士四十為天子諫官之長有詩若干首有文若干首詩諸體畧具奏疏之文居十六七予既編次為集讀而愛之為之敘曰有傳世之器有濟時之具有行道之資傳世之器文章是也濟時之具功業是也行道之資禄位是也三者之不兼也久矣君子惡乎取舍哉或曰三者於人亦若是班乎曰皆君子之所不容已者也雖然禄位者命之制也功業者分之畫也文章者自致之道也是以君子安命守分而不敢怠於自致故寧為此不寧為彼寧彼之失而或得之此也南渠子為諫官數年有行道之寄焉其所論列皆天下大計有濟時之心焉文章典則温雅有傳世之才焉是可謂兼之矣由諫官而上愈進則道愈行由論列而上愈行則濟愈廣文章雖無事焉可也今罷諫官佐逺郡將有取於江山之助益肆力於自致而寧約取之非耶或曰南渠子之道隨時也是故居位則道行當事則有功身退則學進覽斯集者有考焉陳江丁氏族譜序此陳江丁氏譜也陳江之有丁氏自諱堇府君始丁氏之有譜則始於毅齋府君繼之以養靜先生而大備於文範君倅松之日也文範名某舉孝宗乙丑進士直道雄才厯試郡邑敦本好古有天下之志此譜之作殆其一也譜成而徴序於同年陸深昔者先王世禄故士大夫氏族掌在國史井田故民庶具諸版圖雖厯世可按也自封建廢而士大夫失其世世失而譜興譜者補也亦所以補王政之不及者也漢以後中原多故士民遷徙不常厥居號稱文獻之族者鮮有能保譜牒於不墜魏晉及唐以門第用人至有昩冒神明之胄以為禄仕之媒者而俗日衰矣今文範之為此譜也近倣歐蘇之意以成一家之書其立法嚴其處意厚法嚴故闕其所不可知而百世之傳覈意厚故篤於所當行而親疎之制明丁氏族之人一展閲間某也祖某也禰某也兄弟某也子若孫水源木本綿連續屬繩武肯堂之思􅜇鴒棠棣之念有不油然興者乎昔人嘗謂由一人之身而至於為途之人蓋不獨一家然也雖天下之大其始未嘗不本於一人而其末也為九州四海萬里之逺推此意也親親仁民之政厚本定分之業先王之制不以後世而難者此文範君之志也故序龍江春逺詩序凡人情之有别也必歆艷之必期待之愛慕之甚者悲之恨之攀畱之又跂望之而不已焉士大夫之能言者乃從而寫其歆艷期待愛慕悲恨攀畱跂望之意而歌詩之頌之諷之下至畫史則圖其事與其供帳冠裳車馬山川風物之致以比於聲詩焉豈其居相漠然而情至是乃始發哉夫君子之行重有事也事之大者莫大於致君以及民孰不為君也而亦孰非民也是故歆愛之情生焉甚或使絶域去治朝則梗鬱於其中虞變於其外者不能不蓄而為悲恨洩之為攀畱攀畱之不得則跂望從之矣是豈有所待哉蓋必居也有忠信之孚而後出門有眷戀之色二者固相為也不然郵傳之送迎等耳豈復有所謂情也哉龍江唐先生士絅既禫除其先公之服矣卜日還朝邑之士大夫自南山瞿公而下咸賦詩送之深亦有作既成復俾敘之深於士絅安得無情乎哉曰始士絅以丙辰進士退而讀書龍江之上者十年乃起而令東明有異政天子召為給事中於兵科侃侃諫諍奮不顧身尋以璽書按事廣之東西勤勞者三載矣還為權姦所怒斥判深州權姦伏誅始叙遷為南京工部主事已而再進為刑部員外郎矣是行也天子追念舊蹟必畱為侍從擢為卿貳是固士絅之所宜有者士絅亦將有慰于今日作者之情乎哉因題其首曰龍江春逺者期待也行春畱愛詩序史侯來攝上海滿三月而去去而人思之士之能言者各寫其意之所到比律吕而可歌凡若干矣而侯未之及知也浙士魏允升見而録焉録成而徴序於予予時方卧病諾焉而未之及為也既閲歳將還于朝而民士之思侯愈久愈稔歌頌將愈作而侯之政蹟愈美予之觀感于侯者愈深乃作而言曰郡邑之政於今日難矣細民知有恩而不知有制其難柔有如此者巨族知有利而不知有度其難得有如此者監臨知有分而不知有體其難事有如此者誅求知有給而不知有民其難供有如此者弊怵於積勢利奪於羣咻其興革有如此者侯之􅊩海邑也能亷故民悦焉而忘其勞也能公故巨室憚焉而不敢怨也能禮故待之者易以感也能愛故取之者隨以足也能權故推之則以變措之則以新也五者天下之能事備矣而况於郡邑之政哉此侯之才足以辦之矣天下非無才也彼以攝焉者郵傳寄耳嗚呼能不以郵傳視天下之官守焉此古治所由興也讀是詩者可以知侯矣侯名瑭字某儼山集巻四十七
