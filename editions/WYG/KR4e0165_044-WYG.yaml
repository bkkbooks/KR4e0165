body:
  text: 儼山集巻四十四明陸深撰序八臨潼楊氏族譜序楊故𢎞農此臨潼族譜也臨潼之有楊氏實自顯甫處士始臨潼楊氏之有譜則自今石川先生始先生名槮字子喬少以文學起髙科今同知松江府事初石川知汝州時謀作譜屬其從子郎中淳是譜則成之松江者也石川敬慎凝定每事先大體而文理粲然故治松優裕而是譜所為成也按譜楊氏自昭信公以百户避兵居澄城蓋元之初造也由澄城四傳而至顯甫府君諱仲微當我太祖髙皇帝統一初例編臨潼之安業里故今相橋鎮之右石川河之曲楊氏盛焉而先生以石川稱志本始也由臨潼至於石川蓋五傳矣而楊氏益盛光其門閥則科第繼起表厥里居則坊樓相望叢以顯融則法從部院之官牧伯守令之職聨次也蓋世逺則澤深蓄富則發厚信哉有故國而後有世家也夫所謂世家者豈徒以族屬之繁衍第宅之輝映富貴之盛麗相雄長哉亦以文獻之足徴也夫文獻之足徴則由一世而至於千世百世由千萬人而㑹統于一人渙者可合疎者可親逺者可邇而仁厚之風行禮譲之俗成矣既其大也則世道之升降於是乎考論而有國有天下者藉之以為聲光往往故家舊族流風餘韻猶足以起懦興衰囘天命而繫人心者不少此石川斯譜之志也今夫過關西者知問夫子而徘徊於四知之坊者真若與伯起遇挹清風而聳毛髮不必其同宗與並世為然也况此楊氏之系而居相近也哉石川方退託不敢以自附則其傳信之心澄源之志尤足以為文獻家法又安知後世不以石川為夫子乎此又斯譜之志也譜之為世九為圖十有三為録二為編二家山之圖二祫祭之圖一時祭之圖一大宗小宗之圖一世系之圖一卒葬之圖一衣冠之圖一先塋之圖二璇璣之圖三恩命之録一叢載之録一譜傳之編一世系之編一集一曰餘輝之集餘輝集者集先事也凡碑誌之文附焉世系以辨宗支譜傳以謹生卒叢載以類家集恩命以萃宸翰家山衣冠先塋圖以繪時祭祫祭圖以位大宗小宗圖以文世系圖以系卒葬圖以朱墨璇璣圖以歌詩其他凡例以數十皆刪取儒先之精奥以裨補世教而隨事起義足以勒成一家者此又石川之志也深得讀而善之故為之序贈侍御林君以吉南還序監察御史林君以吉先為進士觀政户部時上言臣有孚先臣某荷上恩賜之祭賜之葬葬有日矣臣孤分當汛掃里門肅清墓道以迓寵靈且親喪固所自盡而誠信宜身親之乞如故事賜臣假還以臨先臣之葬昩死以聞上不報疏再上曰臣有孚近蒙擢為御史得蚤暮事上非但臣志亦先臣之志也顧今歳才三十有二耳犬馬之齒尚堪驅策即令臣葬父以還皆報陛下之年也夫事固有緩於目前而圖報於後日亦有失於一旦而莫贖於終身者惟陛下憐之又不報疏再上曰陛下以股肱心膂之故尚能念先臣於地下臣孤懷鞠育顧復之恩獨不念先父於下地之日乎陛下又焉用此不念父之臣哉即使臣靦面班行於聖化何如也又不報於是惶惑罔措浹日而疾作矣乃更以疾聞制可以吉始得去夫上之屢不聽其去者將惜以吉之才也既乃聽其去者卒成以吉之志也始之不得以襄事去者非以吉之不能也竟得以疾去者乃以吉之所為孝也君臣父子之間可謂兼得之矣且以吉之疾也以不得遂葬親之志也而疾疾斯去今而得遂葬親之事也其殆有瘳乎瘳將速來斯固去就之鏡也雖然先中丞心在王室被國厚典凡為其後者雖逺之於十世百世之下猶將明繼述之道而况於一體而分親為之子者哉凡為其子者雖屈之於布素草莽之間猶當奮涓埃之義而况於身居法從易以報稱如以吉者哉方今國家多事斯亦以吉倥偬之日非與夫君親大倫也忠孝一道也以吉行矣其尚懋之余忝史職竊當紀載是故敘而列之為行李贈使後有考焉以吉辛未進士以學識稱余聽之於汪君希㑹而信之於疏云壽談東石六十序東石談先生以奇偉磊落之才拔自鄉校遂有重名於當世當世賢士大夫自館閣而下咸願交東石東石亦以徧交當世賢士大夫與之相上下其議論為慊由是東石名益重幾與素宦大官等重以先司空之世澤在朝野由是當世益賢東石以得見東石為幸者復與素宦大官等問起居卜出處無論識與不識殆無虛日東石視之意豁如也年甫五十餘即自言海岱倦遊矣由是兩都公卿咸有海岱倦遊之作嘉靖丁亥始及六十云賢士大夫咸願東石表表天地間以起懦而激頽也相率為壽春正月廿有七日實維初度之辰先是丙戌秋暮東石以華峯蓮葉之舟泛龍江過海邑鄉先生朱侍御玉洲趙太常曲江輩望見東石喜相迎曰東海談生歳甲一周今翁矣老成人物巍然為鄉邦式幸甚無恙顧謂儼山人陸深曰子知東石舊矣宜有言為壽幸甚無辭及期談進士元璽王貢士世祥以告顧予鄙陋安足以知東石哉嘗憶少小隨諸生試有司時見東石修髯峻宇冠佩楚楚揚眉吐氣一座人盡傾若珊瑚玉樹光彩奪目操觚揮翰頃刻萬言如奏金石之聲以破蟋蟀鍧盪耳目令人敬服願為之役而不暇心竊偉之意若人必當出而為世用以文章潤色國家以道德師表海宇以功業銘勒旂常信司空公之有後也嗣後與共場屋深濫先登今五十無聞而東石遂且六十矣未嘗不往來于懷傷知人之孟浪也每見東石輙欲攘袂劇論共敘少年豪邁之氣以一吐胸中沈鬱之奇東石輙一笑止之令人憮然自失余又安足以知東石哉雖然竊聞之矣士君子有天下之志而又有天下之才使世未得用之而其人亦未肯小用於世則必享有清明壽考之福昔人謂之天賞以其無所於試也則必以胸次之所蘊大放於詞章左右典墳鼓吹風雅使千萬世而下如見其人雖與天地同久可也昔人謂之不朽若是者蓋不數數然也或曠世一見焉東石豈其人哉今之知東石者不過曰富而好禮貴以下人瀟洒絶塵之姿超然於形骸聲色之外居深養晦山園池館之勝甲於天下賔從清嘉極一時之彦左圖右書大篇短什尊爼琴奕之樂如神仙然以是窮年而閲歳有不知老之將至云爾此固東石也乃若東石孝友之行孚於神明謙抑之風若在寒素與時推遷以盛滿為戒往往歛其未試之具以為有餘之地若昔人之所謂四畱者東石蓋兼之矣嘗至京師有權貴人當軸處中其氣力足以變移國是者欲禮而用之東石拂袖南歸雖十不遇於科場無悔也是豈他人所易及哉而人亦或未之知也至於八面受敵之才一揮千金之義髙舉四海之心凌跨百代之氣輔之以博學濟之以雄辯嬉笑成文無所不可此又東石之餘也昔者太公望秉燭赴齊之日乃九十餘矣使其八十未遇之前汲汲於求知已而用之則文武之際或不相值雖天固不得而賞之矣東石之道似之東石著書滿家别有杜少陵蘇東坡和篇雅麗髙深金舂玉應真若起二公於今日揖遜一堂之上比肩並列無少愧色其所以為不朽者又在是孟子嘗言禹稷與顔囘同道是豈以形跡論哉要其實同不同何如也世必有知言者諸君子皆曰是足以為東石壽矣遂書為序梅林詩集序深既僻居無所交接感念陸氏之舊封則聞有蕭嘉興之政追惟孝皇之清問則知有蕭梅林之詩世恒言文章政事文章政事信難兼哉徒以風雅之才卿輔之位巧於相值爾古之人所為發憤而寄憾於兹也雖然經綸之業有不盡於藝文之流此完才之所以難也讀梅林集可以考完矣梅林子舉進士餘二十年積官至嘉興守守有異績其大者曰瑞蓮之異曰秀水之異曰嘉禾之異古稱神明殆謂是與益以其餘躬帥諸生講論道藝一郡文學又彬彬焉是時復有北湄子王𤣥成貳其郡左右襄贊大明風雅之道是故嘉興之政與嘉興之詩一時表倡東南云其門下士沈銓與陳憲輩相與彚次為是編以致師傚之勤刻之嘉興以傳其詩縝潤其體典則其氣沈鬱其味雋永其導鬯性情聲和而義理其紀載時事思逺而言深信風雅之具也明興百餘年矣而詩道盛於𢎞正之間是不足以名一家乎深故特著孝皇敷貽之化以冠集端將以復考梅林之所至云詩凡若干首其在嘉興者十之二三其在梅林之詩又十之二三其在梅林之才則又十之二三云梅林名世賢字若愚𢎞治乙丑科進士桐城人有别業在梅林窮極幽勝嘗著書其中學者尊之曰梅林先生因以名集云重刻家禮序徽國文公朱先生家禮一書世行久矣曲阜郭侯節之倅松之明年將納民於軌徧求郡邑之文獻加意焉既得是書乃撫巻歎曰是不當家有而人傳耶既又從二三子讀之則又歎曰昔者先生之為是書也蓋云自附於孔子從先進之遺意今允禮之為政也獨不得自附於朱子作家禮之遺意耶亟捐俸刻之刻成以示郡人陸深曰願有序深聞之禮也者理也先王因人情之多變於是為之節文以還于理孔子曰喜怒哀樂之未發謂之中發而皆中節謂之和夫喜怒哀樂其變蓋有不可勝言者矣節而後和故曰禮之用和為貴夫禮以和而行亦以不和而廢也先生之為是書也其義精其文辯其大指見於自敘其微意之所存則深有病於好禮者之無所折衷而貧窶者之不得與於禮也惟吾松饒而多才風俗淳厚重以侯之愛禮也既知教之必且富之由是君子和德於上小人和力於下庶幾先生之意日新而侯之惠松者日逺也深謹按此書成於隆興己丑行於先生易簀之後又按先生既修家鄉邦國王朝禮乃以喪祭二禮屬其髙第弟子黄榦氏成之書凡十有五巻今書四巻嘗經後儒撰次若文莊丘公尤有功於是書者類亦不失先生之意也竊惟先生大儒意在發揮周公孔子之道舉一世而劑和之兼總古今製為通禮以示法程惜也立朝之日淺居閒之時長著述之功多經綸之業寡意者有遺憾焉安知百世而下乃有同志合德如侯者率其道而尊之而深也獲覩敦本復古之舉自吾松始故樂為之序侯别號復齋舉鄉貢於甲子科實孔氏之外孫云送郡伯何鴈峯入覲序今上皇帝再朝萬方實維嘉靖五年之春正元朔於是天運又一新矣我鴈峯先生何公時以松守往際其㑹遂以守松之績獻明受上賞於是治化又一新矣先期戒行士民攀送歌舞載途跂望太平之盛於是耳目又一新矣少參王公時暘請舉贈如禮而以言屬之深乃作而歎曰懿哉此太平之典也夫上有至明則下有至良信乎相待而有成哉太平之業將不由松始乎夫治化大矣顧遇合之幾一也孔孟終身徒以難遇爾今有其人矣有其時矣有其遇矣太平之業謂非始於松不可也松在東南稱大郡其地狹而賦出之名多其民繁而擾生之事廣故松之治也難矣深初登朝待罪史官時嘗聞前輩知銓事者言惟爾松守擇難于良莫良於憲度之士既又曰非才御史不可退伏田里竊從鄉前輩習問郡事皆曰松之美俗視曩昔少衰矣非命世之才為之振起不可公實抱命世才方以才御史來當維新之㑹視篆之初疎剔姦偽而乾沒之徒歛手彈壓豪右而漁獵之輩革心肅然示以簡易之道旬月之間百度改觀津津然太平之象矣公方詢求民隱振而起之觀感之下翕然風動此固前輩屬望之勤而當道選擇之意公於吾松豈偶然哉顧松也小不足以畱公誠使畱且久焉則所以深長而逺大之者豈徒吾松之福哉夫福莫大於恤民之隱知民之隱斂而錫之福於是為盛是故治有體時有變道有宜志有定夫牧之尚寛糾之尚嚴是之謂體氣完則淳文勝則弊是之謂變物而付之時而措之是之謂宜不畧於易不怵於難是之謂定雖然知體而後能合變變合而後能隨宜使非志定於先三者安從施哉公自少即有重望於嶺表思以孔孟之道自致於時庸其志固已素定矣嘗宰一縣於浙南少見緒餘俾民尸祝今上臨馭之初風采議論為諫官第一選擇而來斂福松民實以四者之道行之而人或未之能悉也當宁必將聽而采之乎則太平之具在松矣深之言安敢誣也雖然此亦公之緒餘耳公學深而養完才髙而志大發舒精藴以究太平之極以當天子丞疑之任此則非淺薄之所能窺也姑録其由松之始為序以别儼山集巻四十四
