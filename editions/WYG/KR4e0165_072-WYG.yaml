body:
  text: 儼山集巻七十二明陸深撰墓誌銘十一勅封孺人錢氏墓誌銘孺人氏錢封徵仕郎禮科給事中顧公啟明之配前禮科給事中存仁之母也嘉靖丙申存仁自餘姚令召為給事中明年丁酉遇推恩大典受勅封孺人戊戌冬天子舉郊廟大儀存仁疏言五事忤上㫖廷杖六十編管保安州孺人時已屬疾聞之曰兒以身許國邪䝉聖恩未即死死自其分也庚子存仁歸自保安拜牀下慰勞悲喜感動逺近孺人疾為少間明年辛丑五月五日竟卒得年五十有八存仁哀毁㡬死躬親歛含宅卜祠祭皆如禮又以身是罪人幸乗間踰望天也乃手自為狀匍匐三百餘里來乞銘有傳陸子浚明所著顧孺人傳至海上余讀之作而歎曰嗟乎物貴有本也哉夫土膏沃則木蕃水淵渟則魚字此閟宫𤣥鳥之所為作也豈獨神靈之託為然忠貞之成固亦有之漢之范滂晉之陶侃是己方存仁以言遭譴孺人在牀笫間無悶色無怨詞垂堂之愛若是乎此與范母何以異乃若士雅之功名本於秣馬截髻此固存仁之後效耳母徳所係大矣顧深不類無能為孺人重重念存仁情事不可以不書按孺人諱某錢武肅王十七世孫父翥號鶴皋母莊氏鶴皋七世祖曰謙出贅在崑山生政仕宋為提舉提舉遷太倉之新安鄉生員元海道千户員生景春國初徵士景春生瓊以義聞髙皇帝錫之衣楮瓊生晉晉生貫貫孺人大父也孺人生有淑質寡言笑端静而慧事嫡母聞以孝謹稱能通小學女誡大義鶴皋翁鍾愛之年十八歸封給事君迨事寳善府君黄孺人暨曾太母楊夫人咸稱之曰錢婦賢寳善府君有二幼子一女晩以屬之孺人孺人撫教各底成立其季鍾蚤世無嗣遺命以孺人子為後孺人不可竟立伯兄子田宅頗厚正徳末封君以鄉賦累家遂中落徙居郡城逺二百里甘髓之奉嵗時益勤寳善府君與黄孺人感且泣曰吾安得死錢婦之手乎後值二喪孺人竭力以佐襄事弟璨詿誤得罪乃晝夜泣為營解之至發疾撫諸子女尤慈愛而訓飭特嚴平生無妬忌之行多病寡孕育媵妾得男即為保抱如已出人尤以為難故吳中稱賢母必曰錢孺人錢孺人云子男三長即存仁娶盛氏繼謝氏次存禮娶陸氏蚤卒次存性側出娶文氏息女一適州學生龔愛孫四長可立娶劉氏國子生次可大蚤卒次可貞聘王氏次可興聘毛氏孫女一卜以又明年癸卯十月二日𦵏新安鎮之新阡禮也比孺人之在殯也適鄰火風颷烈甚柩重而室隘勢無救存仁但泣涕露拜須㬰反風無恙人又以為慈孝之報也母子復完以處死生之際天將於是乎定矣是宜銘銘曰勾吳東防溟海汪洋出其潤肪與雲俱長波濤怒狂魚龍奮揚莫之敢當有葦一航翩然下將弱流湯湯天開扶桑旭日載陽帆檣斯張利涉奚量珊瑚琳琅鵰鶚鸞皇光采回翔既泰既康若堂在旁是曰孺人之藏誥封山西右參議盧公墓誌銘嘉靖十八年某月日𦵏盧封君裕齋先生于某原遷王恭人藺恭人祔焉先生初封工部虞衡司署員外郎主事階承徳郎加封山西布政司右參議階朝議大夫皆以子耿麒貴先生既終正寢耿麒自大同鎮奔還襄事乃奉王大理汝立狀貽書京師託李中舍某來問銘焉深辱耿麒交且嘗同官不容辭按狀先生諱梁字峻卿永平之樂亭人也盧氏系出山陽自山陽遷定州樂亭則自山陽遷云七世祖温温生和甫和甫生從徳從徳生信信生斌斌生敬敬娶某氏寔生封君敬舉成化乙酉鄉試官刑部司務侃侃不阿以卒于官先生甞悲其父之未大受也刻意問學并教其子一時俱有聲塲屋間而耿麒輒先成進士先生笑曰兒輩偶取㨗吾尚未晩也久之以年資貢上禮部又久之會耿麒官滿一考乃詣京就封因以贈王藺俱為安人輒復對人嘆曰吾讀書自少至老未嘗一日怠顧吾豈無自致者今若此又安能卑卑從人後徼升斗之祿耶適制詞有就封髙矣之褒每捧讀之曰吾有兒吾有兒即吾所以報朝廷也又何必身親為之哉吾可休矣遂歸與耆舊徜徉泉石之間以飲酒賦詩為樂先生儀觀甚偉修髯而白晢如玉有飄飄塵外之氣生平不妄發語與人言盡出肺腑人有危急即倒囊周之事有不平者毅然見于色若其人革面亦復讙然處兄弟尤有恩禮長兄槩氣性嚴雖摧剉之無怨也弟棐早世先生撫其孤嫠各不失所妹有瞽者且貧待之加一等諸姪中有乏嗣者為置妾而豐其直一鄉之人咸以義稱之以嘉靖己亥二月十八日卒上距所生之戊戌享年六十有二配王氏沂州同知琰之女有賢徳相夫教子齊家睦族皆可為世法以正徳癸酉正月十有八日卒得年三十有八繼娶藺氏縣主簿泰之女行實生卒在穆太史伯潜誌中子男三長即耿麒文學政行為世名流娶郁氏繼娶李氏即李中舍女次耿麟娶李氏次耿􅀈娶歐陽氏女三長適國子生齊宗道次許聘王九韶次尚幼孫男二夢熊夢羆孫女五嗚呼先生之生當聖世文明之運學成矣竟齎以沒然承前啟後卒植盧氏為文獻之宗應法宜銘銘曰吁嗟先生有文有守欲承于前乃啟其後古稱無憂兹曰不朽有封若堂珠聯璧偶華衮之褒絲綸孔厚勒詩貞珉以視瓊玖顧室華氏墓誌銘太學生顧大棟汝隆之妻華氏一夕卒於京邸年才二十有四時庚子歳五月朔日汝隆以其賢也悼之甚予適鄰巷而汝隆時時過從問學予往弔焉汝隆泣以返𦵏告且乞銘予諾焉江南大族稱華顧世相婚姻初海峯君為汝隆擇配聞華女賢曰吾故華甥也使大棟有子華顧其遞好乎遂以禮成聘年十八歸汝隆祖諱祖知號三山封户部郎中父木母陸氏聞汝隆言自吾之有此室也舅姑孝養賓祭恭修吾弟妹訓習僮奴柔帖顧族稱焉或可以世乎言己則復泣又抆泣指數之曰是有人未及知而吾獨知者今已矣天乎何奪之速也昔吾母以氣疾發虚巫醫罔効乃從夜分出中庭拈香拜天黙禱微聞其言曰妾願身代之旬日間果愈某年例上成均於北乃盡撤匳中裝畀之曰此行入都門當多購書籍歸為逺大圗丁酉嵗將從順天舉鄉試乃移村落館中日夕攻業以好言相慰曰此一巻書耳離父母棄妻子何為者光隂幸自愛既而疾作則手書勸之曰此過苦乃爾保身為上毋貽父母憂也己亥歳卒業北雍遂㩦之往舟淺後至道路惟謹秋抵京邸則念孤客問疾相勞苦至潸然泣下時從四方士作文㑹館榖周至至售手織布以具見作文成帙則喜動顔色若相予得意者又嘗勸予置側室以蕃孕嗣心感焉而未之遂許也不久有媵娠乃喜曰吾志也繼之亦娠而禍作焉是豈天道茫茫者耶言己又泣予聞之曰此天下之賢婦也宜銘女一許嫁浦賛善子某以某年月日𦵏從祖塋禮也乃為之銘銘曰雲之慶月有華難為永易興嗟之子歸宜其家水瀰瀰山嵳嵳奉訓大夫寧海州知州沈君墓誌銘君諱鉍字建之别號恒齋仕至山東寧海州知州階奉訓大夫致其事年五十有六卒於京第贈禮部尚書沈公祿之仲子今太常少卿抑之之母弟也母張氏贈夫人夀寧侯綬之女慈夀皇太后之姑也君卒皇太后特遣中官致賻實嘉靖二十年二月十五日其生以成化丙午十二月二十有八日云今卜以五月十一日𦵏崇文關八里之原從先兆也君幼頴異兒時不為嬉戯長娶鄭氏贈安人故通政使諱表之女今工部左侍郎紳敬菴先生之妹也先三十年卒繼娶潘氏錦衣指揮諱賓之女君無嗣卒之日悉以後事屬少卿君冀善處焉少卿君奉敬菴狀乞予銘予有鄉里之誼不容辭按狀沈出松江之上海永樂初有諱良者君之曾祖也隨駕來京占匠籍今為順天之宛平人良生敬敬生尚書祿君以尚書䕃為國子生治舉業甚有功試不偶以母命就選正徳丙子授光祿寺掌醢署署正公亷奉職滿九年陞知寧海寧海山東迤東州也僻處海濱民風刁頑健訟號難治君蒞任興學校省徭賦補偏救弊而示之禮義一時民皆向化焉積榖萬餘石癸巳嵗大歉君請于上官發倉啖饑所活甚衆時有歌曰寧海之民太守生之寧海之水太守飲之太守一去誰其嗣之在寧海者歴四載屢為撫按守巡旌奬賢聲綽然偶一不合於當道輒嘆曰此吾歸路也遂解官不一辯白知者髙之君性和厚孝悌藹然至對妻孥如嚴賓遇親舊則情禮周至居常儉素自持未嘗有疾言遽色人尤以是賢之病既革乃出所有金帛分散親族雖童僕亦及也君可謂徳誼士哉宜銘銘曰世胄髙門振厥聲出處進退與時行都人士兮東海生八里之原閟佳城千古萬古垂令名誰其式者視斯銘司設監太監董公墓誌銘司設監太監董公以嘉靖十九年二月六日遽卒實以正徳二年十二月十八日生得年三十有五今上皇帝特憐念之賻恤倍加諭祭之文有曰温敏之資小心敬慎蓋公以實行受上知如此故凡同事内廷相與朝夕者尤哀悼不置弔相之日涕泗漣洳蓋公以和氣得人心如此豈偶然哉内官監太監王公遜與公尤善厚匍匐過余乞銘其墓予不敢當辭至再而請益勤念予往嵗以翰林編修官奉命教内書堂每見生徒中少年敬謹者必加禮之且致厚望以為此皆他日聖天子心膂之寄與吾輩外庭體貌之臣殊蓋君父之心雖出一致而逺邇勢分終不若親且宻者之易於納忠也故今生徒之柄用者往往不忘予為師範而王公又予之舊館人也義不容恝乃誌之公諱智字克知别號明齋家世湖廣武崗州人正徳九年秋九月入大内遂選近侍乾清宫今上龍飛改元嘉靖夏六月選入司禮監從學内書堂明年春三月復選乾清宫内侍是嵗八月遂有牙牌之賜冬十二月遂陞奉御自是賞賚日繁眷注日隆矣又明年陞司禮監右監丞五年陞左監丞六年陞右少監七年陞左少監九年陞太監太監内庭之極選也自右監丞凡五轉而至皆以嵗之八月八日若刻期然蓋異數云時方年二十五妙齡美質夐出倫項又殊遇也十年十月遂命視事本監十七年又命為宫内牌子牌子又近侍之極選也十八年命掌司苑局印二月上南巡承天命掌行在印四月迴鑾仍掌原印於是上將欲大用之矣自奉御以來凡受賞大紅紵絲麒麟表裏一斗牛一蟒衣表裏一玉帶一大紅金彩蟒衣紵絲紗羅表裏者三自十二年以後嵗加祿米者八總之為一百三十有二石又特許内府得乗馬上之禮遇至矣公亦益奮忠貞以至於歿身為報可不謂生榮死哀也已予昨扈駕時以翰林院學士掌行在印從彷彿於行朝嘗目望公今不可作矣以今年某月日𦵏于阜城門二里溝之原經理其後事者則太監毛公隆也為之銘銘曰龍衮日近蟒玉有輝何機柄之伊邇乃淵氷以全歸勇從順委忠孝一機顧賦形之萬變羌定數以焉違後千萬年視此銘詩儼山集巻七十二
