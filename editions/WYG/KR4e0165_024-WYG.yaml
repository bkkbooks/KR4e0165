body:
  text: 儼山集巻二十四明陸深撰詩餘三十二闋念奴嬌疊韻壽桂洲天下竒才算蛟龍終不是池中物妙小文章驚海内秀氣降生東璧八柱擎天三長冠世節操逾冰雪神仙宰相元來同是人傑同朝瑞靄蘢蔥蓬萊閬苑青鳥翩翩發報道桑田還變海銅狄要看磨滅赤暑全消金風初動進賢冠上髮况堪心事一片長安秋月念奴嬌同費鐘石宗伯再和桂洲扈駕南巡六飛南下大河上多少禎祥雲物紫氣平明浮水面向晚更穿奎璧畫舫盤龍樓船綵鳳兩岸沙如雪開頭捩柂長年也是人傑休誇碧漢銀潢天上人間一派靈源發界㫁華夷奔大海島嶼煙波明滅一曲一千三門三級驚起冠中髮聖人康濟太史大書年月念奴嬌與甬川鐘石同宿楊園再次前腔半途微雨為灑浄滾滾風塵中物一帶青山如畫裏咫尺層巒疊壁吏部副卿南宮少伯清映如冰雪白頭老我三十年前争傑而今扈駕朝陵白馬銀鞍紫陌聨翩發尋得山莊勞下榻共剪燭花明滅香霧撲簾茶煙隔座相對頻搔髮同胞異姓真個渾忘嵗月念奴嬌秋日懐鄉大江東去是吾家一段畫笥中物襟帶五湖吞百瀆說甚黄州赤壁兩岸蘆汀一灣柳浪海湧潮頭雪蒼浪聲裏漁翁也是豪傑明年准擬歸來輕舟短櫂兩腋清風發春水穏如天上坐閒看浮漚興滅黄歇穿沙袁崧築壘到處堪睎髪鱸魚蓴菜一任江天嵗月念奴嬌秋日懐郷再和介翁秋風客裏消不盡胷中許多長物瘦骨稜層才一把與病戰成堅壁欲造河車旋營丹竈贏得頭如雪尋山辟穀算來他是豪傑一生四海交遊浮沉聚散長嘯從風發惟有鈐山嚴少保不共世情磨滅藜閣相輝木天同上當日俱青髪綈袍戀戀多應念我寒月念奴嬌和錢文通公小赤壁江山闌入想安排真箇有那神物誰遣是非泥印定天際一般赤壁馬援懐珠燕人抱石此意憑誰雪曹劉成敗旁觀輸與豪傑謾説吳國山川陸家池館征鴈和雲發紫岫丹崖髙百尺落日淡煙明滅二俊才名長公英邁一夜俱華髮天公堪訴照人惟有圓月風入松和桂洲内閣賞芍藥用虞文靖公韻絶勝國色帶朝酣偏稱膽瓶簮清嚴開向絲綸閣容誰駐墻外遊驂笑靨露勻臙粉衣裳霞想羅衫黄金屋角繡雲藍乳燕學呢喃試把一盃黄票酒倚闌封罷紫泥椷一段太平氣象分明冀北燕南風入松再填前腔送桂洲離筵髙興付餘酣暫得解朝簪路出齊封三宿晝未須鞭快著征驂兩岸山横畫障一川水膩羅衫終朝不采滿筐藍話别語喃喃一把相思無處著欲憑鴈足寄雙椷自是煙霄有待怕飛不到江南風入松再和桂洲綠窻午枕睡初酣夢喜脱朝簪覺來猶是長安客垂楊裏空繫歸驂戀主心依曉闕思親淚濕春衫玉河流水碧於藍花外燕呢喃新詞譜就憑誰和重封罷親手題緘欲待天邊鳴雁秋風寄與江南木蘭花令二闋初夏即事清明時候催花雨人早是紅英辭樹愔愔情思碧紗厨睡起槐隂最深處衷膓沒箇人堪語屈指流年暗中數無奈雕梁紫燕兒春社飛來秋社去二綠油擁蓋張槐雨繁英簇絳燒榴樹無限幽懐午夢餘憶在江南水風處家書題後教傳語新種魚苗正堪數荷錢竹粉更關心戀著君恩未歸去減字木蘭花新居雨後踈窻小閣銀燭揺紅簾影薄院宇深沈雨送新凉抵萬金休休驀驀一任那知身是客茗椀爐薰雲裏更籌次第聞醜奴兒四闋咏閣前芍藥紅芍開向絲綸閣裊裊停停人比花清倚檻揮毫九制成不枉芳名呼近侍遶殿流鶯槐蟻初醒傍砌頻經勑使行二白玉闌干紅芍藥黄閣前軒一朶嬋娟封罷詞頭仔細看幾番過了風和雨避却塵喧紅紫將闌開向鈞天倚蓋圜三黄扉紅藥翻堦好要賞娉婷日暖風清幾闋新詞按譜成莫道春光留不住尚賴啼鶯半醉半醒起向花前緩歩行四問花底事花無語倚徧南軒香沁瑶娟手撚髙枝著眼看養花天氣隂晴半雲翳風喧黙黙凭闌彈指年光作轉圜天仙子咏雪閙夜冰花輕不定撲上窻兒如寄信灞橋橋外望青山髙一陣低一陣霎時白了詩人鬢是則是逺近都難認路入藍關人嬾進青帘斜壓酒壚空描不盡題不盡平沙留取飛鴻印蝶戀花和道州周希旦長安囘首香塵杳紅日迢遥偏愛無情惱病鶻髙風看去鳥欲奮雲霄無利爪栁暗溪頭荷葉小淑景方濃燕子雕梁遶彈鋏計程何日了萋萋官路王孫草㸃絳唇冬日懐鄉千尺京塵斜陽沒處西風弄小樓夜永鐵馬丁當動襯貼愁懐那更寒籌送淚痕凍天涯不了遮㫁還郷夢㸃絳唇送縣侯張八峯行取進京縣遶清江桃花紅處春波綠畫欄曲曲風動簾紋蹙鎮日鳴琴有个人如玉煩推轂鶴書髙薦選入黄金屋浪淘沙寒夜齋居寒漏夜遲遲𦂳閉柴扉破窻風透暗絲絲半滅瓦燈書滿案獨自支頥惆悵少年時沒箇人知紙屏剛有影追隨滴滴淚痕彈不了一把相思青杏兒寒夜齋居爐燼更拈香小窻裏百結柔膓天涯踏遍塵千里仲宣樓逺正平刺沒薄行襄王黙黙護新粧堪憐處花老釀蜂忙萬事轉頭供一笑蕭蕭紙帳圓圓燈暈短短藤床謁金門送縣侯曹孟輝行取進京秋正好一路西風吹早栁條折盡青山小咫尺長安道此去蓬萊三島袖裏常懐諫草要看風神驚八表動揺山嶽倒踏莎行二孫殤半捲湘簾落花時候六幅畫屏圍永晝天關目㫁是江南家書一紙開封後只恁蘭香堪憐玊秀一畨愁絶愁還又居人已鑄鐵心膓聽来却怕行人瘦浣溪沙都下思家緑送蛟冰出御溝黄回鵝栁覆朱樓一塲春睡替春愁踪跡似鴻渾未定嵗華如水只東流家住青山碧海頭長相思二闋次韻山悠悠水悠悠山水中間一段秋扁舟古渡頭過芳洲又芳洲更好登臨散逺愁誰家竹裏樓日悠悠月悠悠光景驅人春復秋驚看白了頭憶沙洲夢沙洲無數鄉心無數愁天邉王粲樓南鄉子四闋馮延已細雨濕流光芳草年年與恨長煙鎖鳯樓無限事茫茫鸞鏡鴛衾兩㫁腸魂夢轉悠揚睡起楊花滿繡牀薄倖不来門半掩斜陽負你殘生淚㡬行二擬細雨濕黄梅深院閒堦處處苔抱得細筝防浥損慵開為誰搊取早歸来有路到天台欲寄封書沒個媒窻外芭蕉聲作陣可猜那有相如奏賦才三擬細雨濕秋風金鳯花殘滿地紅閒蹙黛眉慵不語情濃舊恨新愁知㡬重飛鴈過遥空嵗月如流只向東簾捲曲房誰共醉匆匆惆悵秦樓恁日逢四擬細雨濕同雲繡倦鴛鴦五色紋凝望天涯音信杳微矄打窻風雪不堪聞倚徧舊籠薰淚痕空沁石榴裙自捻腰圍牢約凖東君莫比今宵減㡬分南唐馮延已細雨濕流光詞余蚤嵗極愛之因按腔廣為四首蓋四十年前之作也癸夘梅月偶於小樓敝書中翻出才情減退老為侵尋為之憮然者久之風入松山居冬曉和胡􅄨庵祭酒韻溪山如畫客初歸年近古來稀踈籬曲徑霜天曉江梅早已放南枝近日過從絶少連朝臥起偏遲風從竹裏弄漣漪宿鳥恰驚飛人生得意須行樂思往事幾墮危機花外小車隱隱林間髙閣依依儼山集巻二十四
