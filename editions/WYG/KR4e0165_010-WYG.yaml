body:
  text: 儼山集巻十明陸深撰七言律詩二五十首對月深院黄昬清露多月明初上女墻過行邊幾度圓如此髙處不勝寒奈何宿鳥頻翻動綠樹釣船遥憶開金波山城漏永坐来久牛女今宵正隔河淮隂祠是非千載總成空滿地淒涼在眼中落葉數聲秋雨暗女墻寒影夕陽紅旌旗南國悲遊輦圭璧東陲想故宫書劍扁舟乗夜發擁爐閒坐讀周公虎丘江鄉蕭颯不禁秋古刹名山占此丘雲䕶龍池迷鴈塔雨平虎跡上漁舟聲傳清梵疎鐘出衣妥紅蓮極浦流千古宛然渾在眼越王臺畔女墻頭晩行浦中秋江東北風吹櫂夜色西南月度河客子生涯隨路酒漁郎消息隔煙歌鴈行千里緘題到牛背前村短笛過船外暗香来不斷芙蓉知傍水雲多苦熱朝来病骨不勝衣望㫁淮南一鴈飛故國青山三畆宅何年白屋兩重扉况堪旅舎多殤殯安忍家書逺報歸長日畏途猶苦熱江天閒殺白鷗磯嚴陵嚴江秋色碧于空嚴陵祠堂江水東山雲不斷欲作雨巖樹半欹常背風行人度嶺忽髙下返照入壁時青紅櫂歌互逐漁歌起相送樓船上峡中將遊龜峯寄汪抑之器之二太史愛此秋髙風日清紆迴常作探山行俯㸔飛鳥有時下悵望美人無限情沙浄水根偏見石樹含谷口少聞鶯好峯只隔斜陽外擬借新居卧月明謁張東海先生墓東海先生天下士近從驥子讀遺文風霜滿壑松杉古日月雙懸曉夜分書帶尚縈堦下草練裙疑化嶺頭雲廿年正有髙山仰形勝東南更出羣下鳯山南麓聞曹定翁先生夜過山居至已西還瞻行花竹間奉懐一首遥傳拄杖過山居度壑穿雲更短渠入院秖餘霜後菊䕶牕唯有讀殘書聊鑱翠竹留題字獨上青松望小車咫尺懐人情萬里江流為覔一雙魚驄馬一首寄同年沈御史子公長安驄馬鐵連錢新賜黄金鑄作鞭千里共㸔皮骨好五花應入畫圖圓昭王築罷燕臺下桓典騎来御苑邊已見過都頻厯塊最憐神駿鬬春妍甲戌二月十三日大雪厚數寸晚得月書事瓊瑶滿地月華明寒勒東風過海城午夜夢魂清化蝶蚤春心賞負流鶯半空臺殿疑無影幾處江湖尚有情澤國年年候農事恐驚風雨報西成春雪後百廿日必有大風雨俗占謂之雪報最傷農雪霽與朱子文陳起静訪李百朋舟次先寄雪消沙岸暗潮通南浦仙舟二妙同柳褪凍痕黄欲綻鴈拖夕照晩猶風幾年鄉夢三更後十里波光一櫂中復有月明同下榻山隂却笑興偏窮甲戌四月八日再遊龍華有述六日龍華兩度遊陸行騎馬水行舟風雲塔院松將暝煙火村家麥已秋病到静餘初減藥望窮天際更登樓桑榆苦愛清江曲常愧山僧半日留春興和張碧溪韻天上歸来白玉京茅堂依舊帶江城安身已辦烏皮几晚食初甞玉糝羮何用門前栽五柳秖須石上結三生東風又送催花雨起向花間次第行贈别碧溪次韻江上忽聞歌濯纓好風如䕶客南行黄金總為收書盡白髮長因覔句生鄉里定誇能老健交游誰復更多情不須惆悵江湖晩造物從来本忌名江上載疾送嚴介谿太史風風雨雨度江来此嵗登臨第一回五月葛衣猶未著幾羣鷗鳥莫相猜催農已盡黄梅節送客須傳綠蟻盃南去舵樓波浪闊望君真是濟川才送黄竹泉兄弟南還雪後遥山紫翠重宦情歸興二難同天邊樓闕身曾上冀北風雲眼獨空到日春回紫荆樹去途詩和鶺鴒風懸知别後相思處江北江南夜月中除夜僦居對雪誰遣天花白滿筵破除殘臘入新年江山萬里春猶淺煙火千家夜未眠馬援歸来空有累揚雄老去始知𤣥浮生踪跡元無定泥上飛鴻亦偶然雪後遊廣恩寺贈同遊張儀部落日未落西城西孤亭曲徑遶氷堤丹青合殿煙初暝紫翠千峰雪後低萬里旌旗聞戰伐一年風物送攀躋同来苦愛張平子袖有琅玕錦繡題綠雨樓漫興暑雨初晴樹色偏晝長風景滿樓前天邊白鳥兼雲没簾外青蟲映日懸古鼎香煙時裊裊小池墨水復涓涓綸巾羽扇閒居服獨對南薫理太𤣥禁中觀雨天連仙掌曙光分龍氣遥瞻五色文山勢浮依金殿轉簷聲清報玉堂聞似知佳節催農事願比甘霖奉聖君昔日侍臣憐宋玉空將麗藻賦行雲下陵仙堦瑶砌雨如膏大饗初成月正髙夜静溪聲傳水樂山空天籟奏松濤參差燈燭趨羣從次第官僚備列曹更許乗驄向歸路一宵清境不知勞月下有懐王存約都諫倪本端祠部二首嵗晩相思雪滿庭也知祠部亦氷㕔心期許我俱頭白雲路何人獨眼青落盡燈花收夜􅈰寄来詩草帶春星長安客舎多如許每過門時馬自停雪後樓臺鬬月明懐人咫尺最關情心無機事如君少時有詩篇過我評琪樹夜寒巢鶴怨紫簫聲逺彩鸞輕想應正草回鑾疏倚遍闌干卧未成登翠微恭望長陵有述春深王氣藹重重身到中天望轉濃近接星辰看拱極遥從江漢識朝宗風回喬木千章合時有祥雲五色封一自鼎湖仙去後萬年弓劍閟真龍八日雪中自海子東過朝天宫習儀今日自誇銀海過古来空羨雪谿遊連天紫氣迷金殿遶郭青山盡白頭髙處寒多渾可奈望中人逺不勝愁一年長至須成慶重試雞人拜冕旒展牲還月照齋心萬慮空嚴寒時送北山風氷蹄入夜天關紫宵御分行燭影紅世事浮雲千態出時秋臺越獄出入皆檢頗恐恐不測故人破凍一尊同江南苦憶歸耕地三匝茅堂一畆宫廿四日再出視牲落日朱衣五色紋天南清閟鎖祥雲重来正及春初動歸去遥憐夜已分十里瑶壇當地脈萬年郊祀應乾文風雲喜為傳消息翠輦黄麾度漢汾郊壇還贈同行余德重副郎貝闕珠宫上帝居月華夜氣鬬清虚西来步出天門迥東望春隨斗柄初粉署仙郎時並馬禁城銀鑰尚留魚御街風色香塵細吟過南郊十里餘初與郊祀分獻風雲雷雨壇露冕垂紳午夜長瑶壇灝氣正蒼蒼靈飇不度松聲細端拜初来曙色凉願有風雷悟明主敢將雲雨賦襄王時有所諷圜丘禮樂今皇盛萬騎千廬簇女墻時邊軍皆扈從入壇候祭神道如弦春月寒女城西畔第三壇樓臺始信中天起星斗翻從下界看五色龍蛇揺羽蓋九重烟霧藹椒蘭君王合在清齋殿共聽鐘聲夜向闌孤悶中有懐途次兒女細雨斜風隔市塵重門深巷怕逢人春隨久病難為客老覺虚名苦累身何處桃花流水漫一宵魂夢鬢毛新天涯兒女癡心在寄語家貧未是貧秋懐曲徑孤亭盡日幽砧聲又動一年秋詩因才減頻留草老為情多易得愁天上風雲金鼓迥江南鴻鴈稻粱稠隂晴却恐隨朝暮半月鄉書十度修秋病病裏逢秋愁轉多隔窻風雨滿庭柯寒衣欲授催砧杵鄉夢初成繞薜蘿天上樓臺真是好人間岐路竟如何山東兵氣看雲變何日王師奏凱歌奉和石齋少師對菊封後文書紫閣閒對花身在五雲間松筠嵗晚偏知己桃李春歸空厚顔自許託根依鳯闕誰從落帽宴龍山多情未忍輕歸去莫待金蓮輟送還哭桴兒六首生兒辛苦擬傳家揺落秋風感嵗華過客虚煩竒跨竈行窻留取亂塗鴉旅魂欲返疑無路涙眼頻揮似有花强起憑髙望南國斷雲流水逺天涯經行無處不傷神新剪羅衫四尺勻病母五更能送藥阼階三揖解迎賓渾疑死别還生别莫問前身與後身我已白頭聊哭汝髙堂更有白頭人半生苦愛說㤀情翻覺情多遣未成夢後青燈風不定搔来白髪鏡偏明家書自寫疑還信世路誰憑住與行悲怨短長吾豈敢空令身外有虚名琴書辦得為消憂獨抱琴書可自由歸計未能隨北鴈年華無奈逐東流廢来詩草誰收拾驗後醫方自檢求賔客不通門巷寂幾番寒日下西樓更闌愛聽短歌聲倦倚藤床趂畫屏幾處逺書還詫友最憐同學尚尋兄鬢從此地雙蓬短人過中年萬念輕後夜客居聊復爾涙痕偏映月華明客舎并州背苑墻獨繅愁緒鬢絲蒼三千里外抛中産四十年餘哭下殤院静風簾隨日動城髙霜角共更長可能㑹得探環事来續衰翁未斷腸五七哭桴次吳朝言御史韻二首坐依塵榻起循墻一月情懐兩鬢蒼生死最憐俱作客嵗華翻恨未成殤何愁異日居人後空想他時共我長見說食荼腸易苦極知荼苦不如腸六齡攜汝即辭家能變南音語帶華時向西雍觀振鷺遥從北闕認朝鴉乾坤有恨容啼鳥風雨何心妬落花莫向故園傳此曲年年寒食海西涯次韻温菊莊大參浣花溪上草堂閒多在青松白石間不與風雲重入夢每逢山水一開顔慕陶興寄霜前菊和杜詩成雨後山聞道年来倍强健溪藤髙拄看雲還寄懐獨上滄江百尺臺夕陽無數鳥飛回寒暄氣候隨時變翻覆人情秖自猜白髪有期和我長黄花着意為誰開壁間團扇尋常事空說班娘最有才元年除夕試筆二首嵗寒冉冉夜將除景物依依繞故廬大禹三江俱到海春王五始合教書山中日月從閒積天上風雲入望餘何用青銅看勲業自應愁鬢已蕭疎蠟炬含風夜不寒得從兒女簇杯盤麤知萬里歸猶暮老覺多情遣更難期與青春酬寸草羞將白髪付彈冠百年塵世同官厯今夕明朝取次看二日隂江天不斷海雲生誰遣隂晴總未成苔片漸隨閒徑積梅花欲傍小橋横占年法向山農問種樹書從老圃評幽興最關新節候莫教風雨妬春明次韻王欽佩寄秦元甫賦就停雲第幾篇江湖渺渺轉堪憐更隨驥尾知何地同抱龍髯憶往年惆悵又逢三月暮夢魂多在五更前金陵城裏山如畫城外誰營二頃田山居和答鄒山人城上樓臺隔暮霞敢誇泉石自成家空煩妙句追風雅自許閒人領物華岸柳嵗深髙擁日潮田水落半侵沙倚闌正見三江口剪取吴淞共試茶儼山集巻十
