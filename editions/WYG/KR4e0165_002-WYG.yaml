body:
  text: 儼山集巻二明陸深撰歌一十八首紅白蓮歌白學士秉徳池亭分題白家池館薰風裏恰在香山最深處池流曲曲暗通泉蓮葉亭亭齊覆水花紅花白相間開香風香氣四邊來乍比珊瑚出銀海還疑瓊蕊下瑶臺銀海瑶臺俱可憐仙舟一葉渡晴川素心飽露秋同月豔質凝脂曉破煙歌罷江南不知暑渚平沙暖新添雨江妃映日試紅糚楚客因風摇白羽别有風光傍晩看遥山流翠入闌干四面畫屏相向立一機織錦亂交攤主人个時玉堂退紈扇綸巾坐相對静虚如此可論心芳韻于今應作佩論心作佩總堪誇不愧名稱君子花記得金鑾送歸夜分明一朶隔籠紗魯橋熱赤日行空正當午老夫畏熱如畏虎計程歸路三千七值我行年六十五昨過任城舊酒樓山川信美非吾土仲宣太白俱仙才安得並載黄龍浦此日池塘楊栁風此時庭院芭蕉雨牙緗架插餘萬巻衮鉞心傳破千古滿座時看羽扇揺半酣起拂呉鈎舞已約清風成故人更須霖雨歌明主回瞻殿閣憶㣲凉却向園廬依茂樹秋水篇江南潔修多水芳紫菱翠荇下銀塘銀塘遥接芙蓉渚曉糚亭亭沐秋雨摘花美人雲錦裳鬱金香佩雙鴛鴦家住湖南碧灣裏碧煙如紗拍湖水少年射策蓬莱宫文彩隱映芙蓉紅珊瑚十尺空自好靈芝九莖何足道一為君歌秋水篇濟川穩汎木蘭船若論顔色休嗟晚竟堪持補君王衮楊妃病齒圖沈香亭畔催花鼓華清宫中翠盤舞瓠犀半啓櫻桃顆可是玉魚偏作仵似將一掬黛娥顰翻取三郎斷腸譜歸來南内情更多一曲霓裳淚如雨石齋歌少師楊公之以石名齋也學者稱之曰石齋先生葢有年矣客曰公博極羣籍尤深於易不俟終日取其介也又曰公家本蜀竒偉秀拔之觀蜀實有焉著之心目示不忘也門人陸深獲周旋齋中問學而退甞深思之夫道以濟時為上物以資世為賢故聖人不寳難得不作無益逺觀近取凡以致用也今夫用石者博矣其細者不論清廟明堂之建負荷而底定者是曰柱石疲癃殘疾之人延起而安全者是曰藥石盛徳豐功之著刻畫以傳不朽者是曰金石盤石以言其固也鐵石以言其斷也彼甲乙之品袍笏之拜是玩物矣又君子之所弗論公碩徳重望鎮物礪世其取諸石也非深之所能知自今觀之相業柱石也言行藥石也文章金石也使宗社有磐石之安處大事決大疑確乎鐵石之操石之用大矣備矣作石齋歌歌之關西夫子今元老有石當齋齋更好疑從天上墮支機似向瀛洲擘瓊島磨礪堪為百世師璠璵不數連城寳星光璀璨太白精雲根崒嵂西川道早年充貢來明庭玉堂紫閣靜儀刑擎天八柱開黄道障海千尋掣巨靈有時條理振韶夏百獸率舞游魚聴孤標共仰積鐵壁大手為勒磨崖銘授書空傳穀城叟漢室開基一培塿何如五色補天材元付當年取日手石齋峩峩高入雲四海蒼生共翹首萬年永藉聖朝安再拜為歌仁者夀寳絲燈屏歌鮫人夜織氷蠶絲不數細滑鵞溪絹或云并州快剪刀剪此一叚澄江練乃是雲南之南萬山中雲腴石髓蟠青蔥酒黄鴉紫祖母緑復有無價桃花紅遠人不貢車與服持此射利如射鵠遂令長安富豪家下視隋珠賤和玉瑣屑璀璨星宿同水碓火鎔俱有功短長曲折巧應手無乃鬼幻神為工分經錯緯了不亂各以本色呈絢爛霞蒸霧􅀈有無間遥看一道晴虹貫是中白膩若可餐良工㸃染開林巒似嫌世上縑素弱頗有勁氣生毫端製成屏風向燈夕聊慰風塵遠為客壯心豈解隨物遷鄉書又送經年隔酒錢不愛典衣償要與明月爭輝光但願明月長輝光三松圖可齋鄭宜簡抱負偉竒身通技能俱造精妙使推而致之可資經濟之用而宜簡甘自隱約於農賈之間不肯少露一斑徃年游京師館閣巨公與諸學士史官暨當世名流頗有知之者而宜簡益自韜晦甞告予曰道之精以為身也他非所望今年六十矣日修孝義之行若以祈天永命然者使仁者必夀其殆斯人與乃題三松圖夀之三松亭亭高插天離立森爽含風煙棟梁廊廟似無用撑架日月如有權渾疑無地着此物日觀其下天壇前秦時大夫封不受漢家武皇來何䖍潛龍卧龍差可擬鱗鬛頭角俱依然懶為行雨六丁怒彩虬金電揮成鞭有似高人傲一世寧舍富貴耽沈𤣥師山孫子今竒士家住萬山蒼翠邊胷中惟儲秘書監囊裏不貯司徒錢手種青松一萬樹如此三樹尤堪憐風雷掀舞山嶽動歲華剥落氷霜偏古栢空傳二百丈蟠桃浪説三千年有時坐石聴凉籟獨把黄庭金字編神仙官府總一致朝中宰相山中賢題詩一寄可齋子㑹見滄海成桑田蓉溪書屋為金司㓂蓉溪江山真畫圖蓉溪主人絶代無徃歲西歸結書屋風前月下聞伊吾牙籖插架幾萬軸雲錦照水三千株有時谿頭風日好一叚秋波淨於掃水香花氣相氤氲人間别有蓬萊島蜀道時歌李白難草𤣥甘抱揚雄老只今身復上天衢太平經濟須巨儒尚書省裏少司㓂御史臺中上大夫共道孤芳持晩節還應廊廟憶江湖别來幾度花開候每向西風重回首補成五色衮龍衣元是當年摘花手復有堦前蘭桂行相期歲暮松筠友君不見南陽草廬緑野堂此溪此屋同垂芳渡淮放歌出門江南花無數行盡淮南春欲暮風霜添上鬢絲繁頗悔從前好詞賦伊吕分明道可行孔孟咄嗟時不遇故人衮衮俱公侯頻嵗勸予勞尺素亦有封章逹姓名曾傍重瞳屢回顧憶昨素冠成陛辭天子中興初踐祚八年林卧心常懸一捧部符躬莫措玉堂天髙舊夢回青宫地切新恩誤萬分何補等涓埃五十無聞昩時務憑將一出期遂初自保孤忠總如故長河濁流足風波飛鷁揚舲競津渡攜家十口兒女情居安慮危在雲路遥持一寸報主心時放歌聲和韶頀吕梁洪青山夭矯如渇龍墮地直走河流東岸崩谷應氣猶怒其下必有黿鼉宫舟人估客盡回首篙師舵手俱神工人言大險亦大勝如此江山須畫中宣尼南游鬼物出伯禹東導神靈通天地何心世多故劉項曹吕皆豪雄聖皇恃徳不恃險萬里袵席歌同風我來其間正初夏片帆遥映斜陽紅風旛前麾影接岸水檻下視波連空肩輿十里據髙坐始信靜處觀無窮大風宿畱城身世浮沈如一舸一日千里十日坐順風人喜逆風怒我任天公何不可隨身所到一問津去者從右來從左古今道路無不然自有亨衢自坎坷黄泥岸高緑樹深遥望前船宻如鎖爭先疾趨古所戒夜宿澄潭傍漁火寳應湖翫月我生愛月仍愛竒着意欲到西湖西不然具區三萬六千頃坐此一色銀玻瓈今宵寳應湖南路桂魄皎皎風凄凄水光四接上下合氷柱十尺雲天低樓船不渡南北斷危檣宻鎖烏鳶棲我攜二客恣清賞試選高岸成攀躋弦光滿射白玉鏡斗柄倒浸青雲梯人間天上非還是翻疑海外聞天雞瑶華臺殿雲母障水晶宫闕黄金泥胡床老子興不淺揮手弄影沿長隄菰蒲何心爛不起鮫鱷有恨蟠猶啼南中卑暑不耐冷况復風雨尤難齊兹行所得差足慰未覺嚴沍欺袍綈人言春月勝秋月春月花桞空萋迷爭如冬月有勁氣復此淮海氷連谿酒懷逸興俱浩蕩霜明雪映工品題君不見漢家中郎持漢節風槩凜凜海上甘牧羝和王元章梅花為叚主事子辛賦畫堂六月飛嚴霜客持此幅梅花芳乍窺疑浮初月影細對忽麗繁星芒塞垣風高吹石裂嶺南天低不受雪何似孤山處士家一叚西湖弄華月梅花此時殊有韻青鳥遥傳海山信度水盈盈玉雪膚含風裊裊堆鴉鬢萬種心情春酒缸起為花神酹一觴誰憐白賁元無價空復紅芳號假王㑹稽山農骨已冷夢入梅花呼不醒巡簷且索屋三間負郭何須田二頃雪村晩酤圖為温宫諭題崆峒萬木凍不僵瓊瑶一片埋夕陽雲安道上少行客百花潭西封草堂橋回谿轉疑無路前村依稀後村暮時見青帘獵獵招如聞白鴈翩翩度天涯揺落空嵗華翠㣲自有高人家林端紅葉飽茶竈梁上青蚨挑畫义一斗鵞黄正堪買拍浮好懷同北海不來租吏渾無譁夙約溪翁如有待川源窅窱古人風幸際車書萬國同床頭何用紀嵗歴門外但送郵詩筒憑誰致此好氣象必有明君與賢相託齋先生素心人懸此一幅髙堂上畫家畫意不畫形當朝戴進最有聲未歌三白呈祥瑞先兆六符開太平南峯書院為徐良節題南峯主人顔如玉更向峯前築書屋虹光夜夜貫斗牛秀色冉冉連嵩祝復有家傳萬巻餘累朝諸父皆詩書子雲寂寞空𤣥閣諸葛經綸有草廬南州高士元同譜玉樹氷壺映千古風騷共許國無雙韋杜浪誇天尺五孤標絶壁倚春晴風動芸香滿院生常畱雲氣從龍出須種梧桐聴鳳鳴龍江歌夀唐士回憲副五十龍江東來萬里道遙接瀛洲與蓬島三江有水剪不㫁五湖無波淨於掃龍江先生江上生徳器文章俱老成胷吞雲夢已八九量比汪陂無濁清登科弱冠人如賈辭源倒挽銀河瀉砥柱中流力有餘扶揺九萬風斯下掖垣諫草避人焚憲節西持徃校文多少魚龍隨變化一天星斗浸寒雲雲間自愛歸來早蓴菜鱸魚舊盟好閒看秋影澄道心坐見紅塵揚碧草碧草紅塵閲嵗年宣尼當日正知天終同渭水非熊兆㑹起浮空萬斛船瀛海圖為李宗易諭徳歌天南咫尺帝城隅山靈水秀相盤紆中有瀛海接銀漢吞九雲夢涵五湖太行西來走其下排列七十二朶青珊瑚㣲風吹波縠紋淨明月照影驪珠孤汪汪千頃蕩星斗上下一碧隨鷗鳬世傳神龍有窟宅霹靂驚起頭角殊化為霖雨灑六合波濤壁立風雲麤須臾光霽變天地荏苒花栁呈芳腴我聞弱流三萬逺隔扶桑外六鼇三島空傳呼玉堂學士李太白家住瀛海真蓬壺水心樓閣開雲母風外簾櫳蹙浪珠有時倚檻一長眺宛見雲中五色清虚都心胷已着秘書省殿陛恭承子大夫青錢萬選絶代有白璧連城天下無頻年文場拔董賈昨嵗武舉羅孫呉廟堂自當金玉器鼎鼐竟與鹽梅俱周家申甫嵩嶽降蘇氏軾轍眉山枯大賢應運重得地瀛海似也非其徒江南程生近好手㸃綴金碧工調朱經營意匠入窅眇翻取商巖舊典謨玉顔丈人古冠佩疑是退直金鑾趨手揮一籌探海水坐見清淺連桑榆魯連高蹈帶俠氣仲子汗漫甘乘桴君不見張子房借前箸為漢驅請看此籌一下能奠萬古之皇圖題嚴介谿所藏何竹鶴畫江南五月黄梅雨濕雲不斷生逺水風流太守竹鶴翁家住江南水雲裏興來揮灑出畫圖高峯掩映雲糢糊江迴路轉草堂靜雨崩沙塌谿橋孤鈐山堂中羣玉府此幅逺淡尤足數憲使先生最愛才玉堂學士真博古到處護持如有神攜来長安手澤新高人韻士千年蹟孝子慈孫百代珍儼山集巻二
