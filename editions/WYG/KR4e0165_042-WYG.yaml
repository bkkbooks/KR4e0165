body:
  text: 儼山集巻四十二明陸深撰序六滎陽鄭氏族譜序莆田鄭君啟範重修族譜成視世所有姓氏之書特為詳整無失次無闕文義例森然上下三千餘年枝分𣲖别儼若敘昭穆於一堂之上可以言仁孝矣題曰滎陽鄭氏之譜莆田滎陽出也按鄭本姬姓蓋周胄云宣王之弟友封於鄭是為桓公詩之風所敘緇衣之鄭是也其後散處蓋以國氏云按滎陽之鄭在唐最顯敘於四姓八族之中至不得婚婣餘姓而於是取相才焉故鄭氏之相唐者衆矣今啓範所據以校定是譜者實本於唐書宰相世系之表在宋則夾漈之漁仲號稱大儒博雅淹貫頗嘗是正焉信乎故家文獻之足徴而鄭氏之多賢也夫狀元宰相世所榮貴傳世之器厥維文章是譜咸有焉則所以承之後者宜有道矣啟範奮然繼諸父而為是也蓋有意哉啟範志甚古學甚正年力甚富不朽是圖有光斯譜非啟範誰望哉雖然由啟範而上吾不知其幾世也將於是乎衷之由啟範而下吾不知其幾世也將於是乎開之彼富貴顯達不足言也功業聲華之美其輕重兹譜也果何如哉深不佞卒讀其書而歎曰休哉其神明之裔乎備哉其典則之萃乎遐哉其耆舊之家乎懿哉其嗣續之昌乎以神明之裔光有功也典則之萃傳將逺也耆舊之家蓄必厚也嗣續之昌後則大也皆不可以不序若其世次則自封國之後有過江之𣲖有入閩之𣲖有南湖之𣲖有桃源之𣲖有入城之𣲖城莆城也至於啟範桃源之十九世過江之三十九世入城之八世也其諸郡望自滎陽之外有河南之鄭有咸陽之鄭有京兆之鄭有南海之鄭有北海之鄭有丹陽之鄭有東陽之鄭有泰山之鄭有晉安之鄭其諸閩聚自莆田之外有興化之鄭有仙遊之鄭其在莆田者則故坵前埭後埭上埭劉橋楓嶺桃源其在興化者則洋頭後虺井門上下龜上下溪大田竹演永泰其在仙遊者則鞏橋白湖盤石柘山埔兠赤湖烏石鄭塘北鄭市西鄭雙峯鄭縣市鄭潯陽鄭溪東溪西鄭咸祖三公云三公者露莊淑也故曰閩無二鄭其所由來者逺矣深偶記唐乾寧中司空表聖作滎陽族系記文甚爾雅該洽又宋紹興中臨海尉鄭􅊛作臨安譜序與漁仲文相出入又記魏少府大匠鄭渾生晉荆州刺史崇崇生遹遹生扶風太守隨隨生趙侍中畧畧六子翳豁闕静悦楚豁字君明燕太子少傳封濟南公豁生溫溫四子濤􅋫簡恬濤居隴西後魏建威將軍封南陽公為北祖簡為南祖恬為中祖三祖者世次當過江之先後與又泰和有澄江之鄭越有浦江之鄭皆云出滎陽是書之所未見也因附於此并録二文以貽啟範謹序送曹博士先生赴福寧州序余友曹君茂勲之教福寧也問道於余余昔南使渡濤江遡嚴瀨抵三衢之交南望萬山之間邑曰江山羣旅之人裹糧趨焉曰道此以入閩也又西經草萍下常山汎廣信之谿東望萬山之間邑曰鉛山羣旅之人裹糧趨焉曰道此以入閩也客有告茂勲者曰彼由江山則逺彼由鉛山則險孰若趨永康登馮公赤城之嶺揚舲永嘉之江以濟則捷茂勲疑焉曰是將何途之從余起而告之曰福寧於閩壯州也茂勲期至於福寜已矣夫茍期至於福寧則兹三者皆道也舍三道而望福寜者無是也里之逺近行之安險達之迂㨗者遇也是豈獨行道然哉其於仕道也亦若是已矣今天下士大夫誦法先王之道以待用者道亦有三自郡邑升者謂之貢自畿藩升者謂之舉自省部升者謂之進士然其所程試者未必不同也事有難易官有崇卑職有廣狹者遇也方其遇也錯然交於吾前因所遇而自致焉可也局於所遇者非也孔子曰殊途而同歸茂勲其行哉膏車秣馬以至於福寧而已矣樹德以為訓因事而有成天下後世之人將指而目之曰此福寧曹先生茂勲也則所遇者殷矣余與茂勲共學者餘二十年相知最深其為人髙爽尚氣節其學淵深𢎞懿其治經多所自得其歌詩有騷選之感激悲壯其文章馳驟於韓歐之堂奥往往能以晉唐之書法溢為雜畫又能為墨竹可方軌近世之王舍人夏奉常蓋其才無所不宜然十黜於京闈今正德丙子始應郡邑例貢之天子兩試之咸優授以今職余不能無感於其所遇也因書為贈草堂遺稾序廣南太守顧草堂先生詩一帙其孫定芳授深讀之既乃編次為一巻而敘之曰先生宦轍所至皆在萬里外有長城龍沙棧道滇池巨麗之觀又屢捧檄撫諭諸畨車里盂養窮荒羈縻之地皆身所經厯中歳歸田有林塘亭館之勝其詩宜工土官板雅氏者兄弟爭長殺人連嵗不休屬先生勘契其事至作兩詩示之立觧此亦可以風矣先生少以經濟自負奮欲有為故常不鄙僻逺期得行之而仕僅至守守又不久故得自肆於篇章甚富深幼甞記其口誦如雖憂地險難為客且喜官閒好讀書竹林斜日聽啼鳥苔逕東風數落花吸殘金露難消渴種得荷錢不濟貧等作今集亾之蓋多散失其存者止此而此亦足以傳矣深方欲輯録郡中諸前軰詩自為一編以致景仰之意愧寡陋未就如先生之詩亦胡可少哉先生名英字孟育别號南溪草堂卒之明年始為集集名仍之著志也望金焦倡和詩序今上皇帝興自江漢川后效靈無波濤之警改元之明年侍御史王子升先生自南臺奉璽書巡江上下東暨于海十百州郡環數千里之地倚以金湯焉先生所至職事之餘多有咏歌登臨省覽之間不忘經綸功德之大故人競傳之而和者羣附渢渢乎鼓盪于一時雲物改觀而川原生色固維新之朝一景象也此閲軍北固望金焦之作和者若干侍御史朱子文方自北臺賜告見而嘉之曰此所謂治世之音也授深為序之曰京潤之間有江山鉅麗之觀陸則北固諸峯水則金焦對峙形聨勢接寸目可盡而江流萬里之砥障南北一統之喉襟在焉故當天下無事之時則文人韻士髙賢大夫之所為遊憩嘯歌臨風雨而出塵坌實世外之奇蹤當天下有事之時則控扼關鍵水陸之要㑹百萬之師可因以集而吳蜀閩嶺之財賦器械無脛而至蓋天下之重鎮惟昔孔明所嘗往來而劉毅穆之之徒因以興建李衛公之泉石米南宫之翰墨咸於斯在先生得無感於兹乎夫地所因者時也因地而用者人也人之所用者才也故人才之用世也處廟廊密勿之間則以文墨議論之懿定萬世之典禮而不過有藩宣兵戎之寄則以誅賞激勸之權布一世之材而馭之以底於安定焉故曰地有全勝人有全材若乃付全材以全勝之地又維新之朝一化理也後世讀是詩者可考已深既屬和而復論次其大者若此時華亭尹聶文蔚上海尹鄭啟範咸曰兹義也宜序諸作者以表先生之全故書送别路北村郡伯序嘉靖甲申歳六月汶上路公解松郡事歸而承重嫡孫禮也先是天子有詔凡臣僚布列于外者得終養養終復起事事公拜詔曰臣有祖年九十有五矣宜有養臣及格即日移文所司趣裝去有思所以畱其行者有頃㑹汶上以祖訃至公遂去而畱之者亦無計矣民眷眷然猶不忍公之即去也嗟乎一念之誠積而至於能感然後事應隨之及其至也金石開焉豚魚孚焉而况於君臣父子之間氣類合一者哉故公之志若不相值而誠實相通蓋其始也本以至情㑹于國典暨其終也不以私事先乎公家公於是乎為孝子為忠臣矣夫忠孝之積也神明通焉而况於繫一郡之思哉上海令鄭君啟範慕公尤深既為文以道邦人之思公而不可畱者復謂深曰公果去矣子且謂何他日嘗受愛于公矣仁恕而易親也未能窺公之髙深也吾今而後知公之不可及也他日嘗受教于公矣敬敏而懋功也未必知公之難遇也吾今而後知公之不可得也故吾之令海也獲免於議其善且大者咸受成于公而人亦未能盡知也吾今而後安保吾政之無纇也某於公也宜何役之圖深聞之曰此非一人之言也蓋天下之言也雖然公之去畱者跡也感應者心也不能不去者制也制有禮跡有限惟心無窮是故心之精神謂之聖神而明之謂之化此學不講久矣故以官職為傳舍而以民物為秦越民亦始以愛憎為推挽矣皆非也公之學有本源而才無不宜故其治松也再歳爾而善政以百十又其大者則牧凋瘵之民於饑饉之時振亷靜之風於奢靡之俗示敦朴之道於文勝之餘此公之精誠達于松者百世未泯也公之身豈松所能專哉啟範儻推公之心而致之公固未嘗一日去松也其去畱者跡也啟範曰公之道大矣請書之以慰邦人之畱公而不可得者送監郡趙侯赴辰陽序今天子升自興邸於是湖南之藩比於漢之南陽矣辰故湖之南郡若也比於畿輔等耳宰相慎選才賢佐理其地以禆聖靈鴻鬯之化又加一等矣則今之辰非昔之辰也仕固易以當此哉况天子臨御六年於兹閲厯既深治效斯漙其所操賞慶之典將自近始而神謨睿眷拳拳於龍翔之境者又豈他郡所可倫儗也哉今年丙戌夏六月天官卿試天下士於吏部將列之官以永康趙君孟立為賢俾倅辰郡孟立亦喜自負曰吾母老矣獨不可藉是以投維新之㑹哉捧檄赴辰取道東海之上海令徐侯德新君衿友也要諸途餞之海士大夫實從徐侯顧謂深曰此名士也金華忠諫之後而楓山先生之徒與子宜贈之言深昔登楓山之門竊講於金華文獻之故知憲副趙公忠諫之節既奉使道浙求金華士大夫交之是時聞孟立名籍甚篇章藻翰時見一斑蓋傾心久矣乃執爵而颺之曰士之於世也以得所生為賢以有師承為幸出而自見也以得時為遇以遇知已為達夫不得其時與有時而失其㑹不見知於時君世主至有異世不同道之歎則所以得之庭訓授之師門者猶空言也今時何時哉孟立可謂遇矣或曰孟立讀書金華山中餘三十年博觀而約取胷次經緯具有成説為古文章髙視漢魏要之以吕成公陳同父流輩自命也時出緒餘猶足以奪魁而名世乃今僅僅得一辰倅去若是者猶之遇也深曰不然凡余之所謂遇與孟立之自以為遇者非以位之崇畢也非以地之逺近也非以建立之小大也大扺擇官而仕必其才弗足者也擇地而趨必其力弗給者也宜於大而妨於小者必其質任之一偏也孟立才備而力充養深而施厚視天下事皆所優為兹將因辰而見重非取重於辰者也又况今日之辰哉我朝士大夫金華最尚名節憲廟初年楓山章公自翰林編修諫鰲山以危言被廷朴謫官末年趙公自刑科都給事中諫宫闈復以危言被廷朴謫官終始二紀金華兩公天下共尊師之孟立之所為淵源者已然然則兩公之所以不獲遇者將不於孟立有望乎哉且夫學以致用為道道以澤物救時為賢以不失已為正以忘我為大彼髙談性命者失之清虛專事藝文者蔽於委瑣此亦深所聞於楓山之門者敢以是贈徐侯曰可以卜之辰矣海士大夫請書為序儼山集巻四十二
