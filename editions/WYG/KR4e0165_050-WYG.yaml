body:
  text: 儼山集巻五十明陸深撰序十四書輯序前代書家之論著洋洋乎何其備也大抵文過其質寡要約焉予之輯此也擥百氏之菁華示一藝之途轍庶使後來求方圓於規矩將由下學而上達也顧微辭奥義獵取牽聨既已成篇似為已出不幾於掠乎若夫一章之中畢還衆善則今古迭形難以倫序尤乖櫽括之體今故㑹萃諸家首條品目庶幾博洽之士知所由來云爾書輯後序予少溺志於書無傳焉而未有所得也頗喜考尋前人之遺論纂輯既久恍乎若有以見其指意之所在而亦未敢遽以為是也中歳以來抱詞賦之悔不復數數然正德戊寅假館老氏之宫新凉病後再加刪次深懼古人之法不盡傳於將來也昔人有言經術之不明由小學之不振小學之不振由六書之無傳嗚呼余亦安敢少哉送沈員外歸省序沈君仁甫副郎之積勞六年也疏以歸省請上若曰其如故事吏部覆實以聞俞之遂特給寶楮廷辭而還吾鄉之士大夫皆來諗于余曰仁甫不宜去今上新政百度更始賢才焦勞時也巖穴之下思奮負一藝者畢呈况如仁甫者獨得優游遂其私於若時乎是一不宜去昔仁甫為主事也其屬衆其事分猶可逸也今副郎矣衆者以一分者以萃當兼晝夜為之固其職也是再不宜去又况仁甫刑官也民失其教罪戾沓冒輦轂之下大扺尤甚思得執法明刑者雖百十仁甫猶將少之是三不宜去太保閔公以其才也屢用之以裨左右遇知已又一時也是四不宜去仁甫皆不顧焉以去不幾乎薄於君隳於業懷其寶以負於所知者乎余曰否仁甫之去無不宜者謂不宜去者愛仁甫有焉非通於情者也人之情未有薄於其親而厚於其君者也况其他乎昔者温嶠弼成江左后卒不償其功徐庶辭其主於國事倥傯之日至今以為得事君之體夫二子者當其時也各有所急及其獲乃其所緩君子亦量其情而已矣所惡於不情者謂其不可以訓也若仁甫者自始登進士尊翁即背養夫不及養其父獲其母是其情已難安矣又况越在數千里外無他兄弟為侍獨能一日安其情耶維我朝以仁孝立國著在甲令缺曰有六載不歸者例得觧職暫還仁甫不於此時缺何去衆皆曰諾遂請為贈余與仁甫通家兼有世好知太孺人春秋方鼎盛又賢也望於其子者匪獨一歸省之榮而已仁甫亦思所以孝於親尚有大於是者乎誠有之是宜速來去而不來始無以自解於衆口矣仁甫亦曰諾遂為叙梅林續稾序梅林蕭先生詩沈生銓既刻之嘉禾余既序之矣陳生憲復裒為此集復徵予序銓憲皆嘗學於梅林夫學者於其師之言行惟恐不致詳焉况於其成章者耶此集之所不容自已而亦非梅林之所能禁也刻成予卒業焉歎曰有物於此為世共寶然祈人之愛弗可得也有物於此爲人鍾愛然祈世之傳弗可得也是故黄金白璧世寶矣亷夫或睨之而不顧髙官大爵人愛矣貞士或推之而不居寶斯愛愛斯傳者惟文章為然凡以有定價也定價云者抑之不能使短揚之不能使長得之足以致治失之足以召亂一時之所未融萬世之所必白者也兹集也本之性情而足以考見治亂興衰之故學者有興觀焉梅林冲逺髙簡不隨世汨沒其為詩淵源於魏晉而涵濡於唐人之風者甚深故其所就亦非世所得而抑揚也信哉寶斯愛愛斯傳矣陳生曰以憲之所睹記不可誣也請書為序縣侯張八峯膺奬序嘉靖辛丑歳八峯張侯以名進士令上海再及朞矣適監察御史髙君奉璽書按吳越間覩侯之政有成也將以聞于上先下檄奬之邑之諸寮以御史知侯之深也信之其詞曰持守謹確幹理周詳清宿弊而邑政新敷實惠而人心悦蓋實録云於是邑士大夫咸信之外邑之士大夫亦信之惟邑之民以侯之聲望起而將去吾海也則又慮之深方蒙恩歸田㑹見其事乃喜之蓋喜侯之獲乎上信乎友感乎下而才賢之將得路也貳尹何君寶文君觀光李君中允幕史陳君相相率來請為賀惟我皇明建官經國法意相維是故以公論付臺諫以民社寄有司良有司盡職于六官以當臺諫之激勸故天子髙拱穆清之上而四海之治成矣詩書所稱何以過此雖然此有毁譽焉此有明闇焉古諺有之受君子與則多榮惟御史公惟侯誠相濟以功業則我朝之法意具存而漢治之循良可幾也固宜賀顧吾邑在東海之上地僻賦煩歳供至數十萬而非時之需不與焉邇年以來民日貧而風俗日壞天下稱劇而令尤難侯之來也宰輔實以難邑試侯而侯不動聲色處置有方若觧牛破竹然百事就理人徒見侯寛大之規模與豈弟之治理而或未知侯之有本也大抵有諸中則外施無不宜有所養則外應無不當語曰本立道生御史固亷得之矣憶昨戊戌天子臨軒策天下士於廷深以職事􅂶讀巻之末偶觀一對甚佳竊以為此他日宰輔之器自閣老而下相注目焉深私識之及啟封廷唱則侯也今世學術髙者纂宋儒之講議務為攏挏之詞以譁也其下者則獵取腐爛時文之語以合程式君父前殊歉大觀惟侯之文超然逺邁直攄胷臆於藹然忠孝之風其大本已如此是科兩主司為顧文康公未齋張少宰甬川皆予同年又同在館閣每詢之必擊節以為然夫學與政通則侯今日令海之政特一斑爾是殆未足以盡為賀也何君輩固以請深方欲論次侯令海之尤難者庚子之秋海沙盗起兵犯太倉勢甚張邑且剥床士民望烽煙而奔竄者巷陌相屬呼號之聲與風俱烈時丞佐咸闕以一身當之飭兵食謹瞭探馳驅鋒鏑之間而戎務悉備賊幾及境若望之而退者百萬生靈頼以袵席侯固吾海邑之長城也此尤宜賀御史專理鹽政詞筆所未及深將附御史欲併以聞于上何君輩咸拜下曰此寶等之所未知也遂書為序送王君世熙授職南還序王君世熙八九歳時黙誦書傳厯法甚習長老以為奇其自少警敏如此少長為舉子業輒有奇語遊泮庠既而以為不足為乃棄去從豪俠士日夜飲博千金一揮不難也其雋爽又如此余家與世熙家鄰也頗憶其少事又與之同遊泮庠故得其人焉比余竊禄走兩都别世熙且五六載世熙亦已三十餘矣乙丑之歳㑹于金臺執手敘舊殊非曩之王世熙也日居小樓讀書自娛足不履户限外客非相知罕見其面周旋曲折動合矩矱何其爾雅儒者也蓋郡邑以隂陽訓術薦起將世熙别後從事於天官之學而有得耶不然一變至此何其美也大抵天官之學上窺消息之妙俯察流峙之機中稽人物之變類非麤心所能勝也世熙脱壯年之習以返儒者之故其為不負此職也明矣雖然是學也本吾儒者之事窮理盡性則得之矣自史遷作天官為日者立傳始裂而外之後世往往取其恠誕不經之説風角占驗之術附㑹砌合自成一家而聖人齊七政授厯明時之意遂微蓋二千年於兹矣世熙自少即有志於厯法今果以是進用儻能推明尚書之㫖以復還吾儒者之舊而不以術自小焉則又豈非其善變哉孔子曰齊一變至於魯魯一變至於道余有望焉兹奉部符南還將以蒞政也吾友郁行人希正舉其職以告之盡矣余獨愛世熙之屢變以趨於道也故復以是贈之吾邑種竹主人者世熙之師也雲谿居士者世熙之友也兩人者皆予之知己儻問我為謝之曰脂韋甚矣往時坐竹所據溪上臨文賦詩自得之氣十失八九若余則為不善變者也於世熙之還也寧無慨且愧乎送某先生閩省校文序科場取士得士之髙下視主司主司亦以所得之士自驗其髙下是故聘必於名士大夫士大夫亦以得聘為榮歳在丁卯今上改元之二年秋適當天下大比於是某應閩省之聘先生浙産也而校文於閩閩浙壤相接也文相上下也閩之必欲得先生而先生必不薄閩而不為也已夫以今同文之世而先生知文之深無不可者顧亦何擇於閩哉閩山水奇絶靈秀所涵必有瓌瑋磊落之士將待先生以收之或有右於他方者矣吾聞閩有佳實號荔子者味甲天下今之適閩者口不嘗荔每以為恨夫天地清淑之氣鍾於物為奇品鍾於人為奇才適閩而不食奇品猶以為恨况適閩而不得奇才者乎且荔子之味不過美人口腹况人才可以美皇猷美天下相去又萬萬者乎先生必加之意矣他日閲鄉書見名士滿紙則可以為先生賀得閩士為閩士賀遇先生而聘者不失人是亦可賀矣先生行哉深請俟之錦衣千户陶君五十生子詩序產子何賀成孝也或曰禮無賀余曰不然古之君子其心必於人倫是厚其為教也必以厚人倫為本是禮之所由起與協於義以合乎情故無得而泥焉人之有子也由吾而上不知凡幾世也得以續由吾而下不知凡幾世也得以引吾而續之孝有承於前吾而引之孝以開於後其於人倫不已厚乎古之君子必將歆艷揄揚以成之惟恐後聖人不著之於經者常之也事皆由常多不見其迹惟有出於常之外者則其歆艷揄揚之情殆且過焉而不自知者勢也茍不害於義以咈乎情獨不得附於禮之遺意也哉若吾陶君以五十之年始有􅂶閭之慶情慰於久望孝立於幸成其賀之也尤宜凡今之君子起為陶君賀者余推其意以為有合於禮也陶君吾故松人也由先世北徙至君起家為錦衣衛千户余以里閈故獲識君魁梧偉傑心固異之繼聞君談兵事絲理𣲖分有源有緒又異之最后見君上天子封事一帙鑿鑿時政失得益異之其先悉疏今錦衣衛之宿蠧巨害積數十年者將以陳之於上今夫各覆所司之短以成輔車之勢者世之通患也在武弁為尤甚陶君知明而勇達奮不顧私一旦慨慷累數百言有人所隂諱而私忌之者求之儒紳亦難矣於是異之不已乃退而歎曰孟子稱始作俑者無後惡其不仁也若陶君其必有後矣夫今果然將非一念之仁所感召與由是見天理不爽之妙且以幸余言之偶中也遂不辭而為之序君名淳字克清産子之辰為某年月日云儼山集巻五十
