body:
  text: 儼山續集巻九明陸深撰序九首送臨江俞節推之任序天下之事必有始故善作者不廢善成者不遺斯古今之通義也雖然道化與時隆汚殆未可執一而論其始卒未嘗不在豪傑之士必先識之得之以為理相時而動罔不吉其至也率於化㑹於道而天下之理成矣今天下之理曷為乎始孔子之言曰飲食必有訟故受之以訟訟必有衆起故受之以師夫飲食者嗜慾之道也生人所不可一日無者也有嗜欲而後有爭訟有爭訟而後有師又天地之大義也故自乾自坤自屯自䝉自需而訟而師雖聖人之序易也亦不得而與焉訟者小刑也師者大刑也今之世即使刑措焉而六官之職弗理者未之有也國家百有餘年涵煦而生息之至矣閭閻之下以聚以嬉日用飲食詐偽日滋漸張勢也故所在相告許深文巧詆鞭笞不得停囹圄不得隙在上之人有以齊之而以理理之法固當爾雖使聖賢復生理今之世純用禮樂焉而於刑罰不究其有能致理也乎竊嘗研推三代之治與今日之宜斷然以刑為之始而不能不厚望於司刑之官也惟我皇朝於刑是審是慎内而兩畿則以臺憲重臣董之外而諸藩則屬之按察使若府則特設推官一人焉是蓋配六官以為理矣嵗時復出大司冦屬廵行天下加詳允焉至今刑未甚措而禮樂未甚興將予之所謂始者非耶抑司刑者未得其理而理之耶皆未可知也今天子踐阼百度更始首降德音拳拳於欽恤之道士也乗大運膺官守攄夙學庸非一時耶吾郡俞君世美以成化癸卯鄉進士屢上春官富文史識道理今年夏謁選天官天官卿才之俾節推臨江府事臨江大郡也民庶而訟繁僉謂非君莫宜將之任謁余言為行李叙君固豪傑之士其於天下始固識之得之乎哉今出佐大郡為詳刑官將舉而措之不難矣雖然計君之職亦難矣夫環一郡之刑獄皆於君焉平反焉然非能自致於理也必且合乎上之意以得乎下之情夫上得以勢位臨之下得以利害動之惟上之狥則廢職惟下之狥則廢法二者不可均也一視之於理禍福利鈍不遑計焉雖然處下易處上難夫下之人動以利害世固有不畏利害者矣而下之利害且有時而不行也惟上之人不但臨之以勢位又能以名動之世鮮有不好名者矣徒取敏㨗辦事之名以爲榮焉而下之情多失其實雖知而不問問而甘心焉何取於理哉君且安焉食其禄居其位可乎不可也深不佞敢以告君并以風當世之詳刑者通判原公利民偉績序代作地勢入於東南吳故澤國也松為呉甲郡地分東西鄕東瀕於海乃髙阜西薄諸湖則洿下焉時或􅍂雨兼旬則西為巨壑或彌月不雨則東或龜坼民於是乎艱粒矣夫一郡也而利害逈異旱潦在天者不可必有相之道則存乎人焉故古之言治水者二濬與防而已今天子向意東南軫念及此蓋自府僚縣佐而下凡職是者皆慎其選匪賢且才弗得任視他特加重焉先是水利掌於浙臬慮其事兼而任分也故特出部署一人以代之又慮其官暫而權輕也故特命今郎中傅公某專掌之而吾侯以倜儻卓犖之才服是命而期至上下得人一時胥慶焉粤惟東南之地旣非西北諸方比沃壤宜稻梁故莫利於水一失其平轉利為害猶反覆手也而吾侯心切民隱慮闗國家廣詢博訪諏厥便以為利民計相時之宜度地之利髙者濬之以疏其堙淤漲塞之妨下者堤之以殺其奔騰澎湃之勢蒼農老耕皆安所業焉某也試以目擊一二言之槩可類推矣肇家濵密邇縣治自邑以西阡陌皆取給焉故嘗堙淤民恒苦之侯至自松覧厥地以為是當疏者乃檄諸縣鳩工集財夫丁凡若干人皆即日從事侯又親臨以程之畚鍤之聲相聞於道未及浹旬而向之堙淤者類皆通焉是河遶學宫之南迤􅆔而西蓋當一邑文明之地源脉乆蕪不獨田夫有旱暵之憂雖登臨弔古者平沙淺草凄凉溢目蓋有感歎而興怨者矣今既得侯以通豈復有昔日之遺恨乎故嘗循河而舟焉則啓土成畦絫絫然若山之障乎兩旁也又嘗登髙而陸行焉則碧澌縈匯宛然乎一邑之襟帯也鷗鳥浮沉帆楫上下遂為一方之勝槩焉嗟乎是豈直為文觀哉居民授田其旁者負耒耜而欣欣伊誰之賜歟夫春秋之法凡勤恤民隱者皆在所當書以侯之績之偉如是固大書特書不一書而後已也顧非其人歟侯姓原氏某處人官今松江府倅云賀大理丞李仲陽序今上將用一人丞大理下公卿議議以監察御史李先生仲陽名上報可而先生遂進爲天子輔弼之臣矣監察御史林君孚可合同官者而問賀於深深應之曰先生所謂當世之才而名位則未極者也昔先生從先封君遊嘉定矣深少而聞之知讀其文矣贍以博長而登朝先生賜之交獲識其人矣粹以雅旣乃南廵得被其政矣正而理曩過桐鄉考於其治矣豈弟而民思之也若是者深竊以為用先生之未及盡而丞大理亦常資也於先生何賀焉孚可諸君子各以意對曰天子懸位以待天下之賢者賢者必得然親踈之感異固人情也仲陽吾之所知者而吾獨得無情乎吾是以賀曰此朋友之義也可謂進而不忘者矣曰天下之要以天下之賢者處之不賢而處天下之要吾等與有責焉仲陽所處吾可以慰矣吾是以賀曰此秉彛之心可謂公而有體者矣曰君子之仕也行其學也非榮其位也而位弗相值則有枉其學者矣仲陽值其位而大可見之行也吾是以賀曰此公善之心也可謂仁而同物者矣曰天子為官而擇人人得而官理大理者古廷尉之官所謂天下平也平而天下之理可幾矣吾是以賀曰此社稷之志也可謂忠而及逺者矣夫進而不忌則有功公而有體則有勸仁而同物則有容忠而及遠則有章有功可以大也有勸可以化也有容可以受也有章可以乆也大而能化受而能乆請以是為先生賀可也遂書為序送黎侍御廵按南都序議者皆曰今之御史美官也御史而廵按又美也按而得善地又美也其不以士之學而仕仕而行仕有不得盡其學而行有難於仕者而御史者行之易也御史而廵按行之遂也按而得善地行之而速其效也是其所以為美也雖然以㒒論之殆所以為難也御史以言為職天下事御史皆得言之言之而善其後夷考其人如其言不已難乎其出而廵按則尤難焉者夫獻其言盡其議其成與否顧緩與速我猶不得獨任其責也一旦奉天子明命轄數百里之地數百里之地左仰而右望一人是頼固非曩之徒言可槩又况浹歲責其成者哉維僻逺之地為易稱耳蓋事簡俗變簡則有餘變則有功故也非若通都大國百廢具舉刻期而集心條手彚有日不暇給者矣而縉紳大夫又瞠乎其後也議其得失如較白黑毁譽之來固朝行部而夕廊廟若此者皆㒒之所以難也由其難以成其美豈非存乎其人哉新喻黎君乾兆官至御史御史而廵按按而得南都南都固善地也今之所美備之矣然度君果舉是也乎㒒知黎君者也真其人哉夫士必有學而後行之大必有氣節而後行之沛然君聚書充棟暇則較閲若經生然間嘗奉緒論叩其所得深矣其立朝屢抗大議蹇蹇諤諤不少狥俗挾其所有如是乎可量也然則今日為御史御史而廵按按而得善地有不舉舉而不難未之有也於是嚴吉士惟中乾兆之婣家也喜是行必成其美率我同館之士凡三十軰賦詩餞之既成而屬序於㒒維昔崧髙烝民此同朝餞送之始也然成於一人止於一篇未有若今日之盛也而二詩者於山甫申伯之德業極其鋪陳若不容口至於今讀之人不以吉甫為佞故㒒於序是詩也舉其美列其難易而并著黎君之大者將以諗於天下後世天下後世之人讀是詩也亦不以㒒為佞固􅂅且幸也時黎君之母太孺人適登八十乾兆素謀歸壽壽今便甚將遡江而上率其族人子姓共拜於堂下然後循江而下以視事焉共其公以慰其私此皇華四牡之所無者是又一美也故序賀君内子輓詩序婦人之德無故無稱凡稱必故也婦人之職不越閨門其稱賢婦繫其夫其稱賢毋繫其子匪專辭也專辭則故故者婦人之厲也相夫子以正終無得而稱焉斯夫人之道也武昌賀君天爵之内子某氏婦人之賢也不幸蚤死其賢愈顯余來南雍辱交於賀君既乆竊歎其賢於人也有三讀書綴文既工既勤氣銳志專無少外奪其敏而學一也賔至則㓗觴豐豆有飶有芳酒醴以時殽核惟旅其恭而禮二也衣皆麻枲不御繒帛雖質而整望之有章其儉而𠂻三也及是内子之卒予然後知君之賢與有助焉卒之日在南雍之寓殯殮既具天爵嗚嗚哭不休曰天乎奪吾良仇家蠱雧心矣吾曷以究吾學中饋無所託矣吾曷以飲食吾友衣裳顛倒矣吾曷以取吾𠂻衆聞而悲之乃訪古蒿里薤露為詩若歌以悼其厲以賢其賢以吊賀君之不幸君重惟内子客死且無嗣恐遂湮其賢也乃彚次成帙屬予序而傳之予謂君之内子厲莫大焉享年不得望三十相其夫不及食其報客死之日無三尺之孤此豈惟賀君之所痛天下之所共悲哉將死者有知未遽逝也雖然氣之聚而生其散而死方其聚也不能不散脩短數也惟有賢傳則不汅汅厲而以賢其與不厲而不賢又果孰為脩短哉於是乎生者死者宜皆無憾也夫詩總若干係於於左方覽者當各得其指焉故序張母翁孺人八十壽序孺人氏翁翁莆大族也入我朝有謚襄敏者官至戸部尚書爲時名臣孺人之祖也孺人㓜有淑質以女德聞一鄉擇歸東崖府君遂相府君以文學起仕至龍門令以婦道聞一郡東崖府君吾上海令張侯國鎮之父也國鎮以名進士令海有美政豈弟慈祥人父母之士大夫望侯容色如楩楠杞梓鬱茂參天又如明珠玊樹光彩照世退而私相語曰侯固學成意必有本將山川之間氣耶亦父母之訓成也何淵源逈異若此侯嘗貽書吾兒楫曰秉壷有母行年八十養在里地瞻雲千里靡日不思母每作手教至必曰汝父所蓄出焉尚餘汝之上海猶龍門也其一心為國以報天子又曰循良之政古人所賢汝之上海乃製錦也其加意民瘼以無負所學又曰功名之際官有三事先襄敏公之望與東崖公之名舉目在前汝之上海固發軔也其懋思先德以振家聲予老且康無予思也秉壷每得書必焚香百拜奉之惟謹故海政麤治惟尊翁儼山知之不識果能慰吾母否也今嵗辛丑十一月廿又五日實惟初度之辰將致一觴為壽惟儼山一言侑之予聞之歎曰此一世之賢母也吾邑六百里孺人之膏潤及焉予何敢愛乃作而言之世稱八母惟嫡尊且貴焉而壽世之所難也壽登耋耄尤難也壽矣而賢又難也賢矣多男有如國鎮後之者則又難也制進士有錄錄世系也録必先嫡至貽封亦必先之孺人播螽斯樛木之風以大張氏之後東崖公三子孺人袵保過於本生國鎮為季已先録之方將入為臺諫馴至卿輔孺人當踰百齡鸞封鳯誥一品之貴又將先及此則古今之所難而亦古今之所敬且愛也敬愛所萃歌頌興焉是闗雎麟趾之義也莆陽文獻當有鉅作揚之顧予不類為歉聖天子將采詩陳風孺人之懿又當先及孺人於是可慰而國鎮之為養大矣乃製為三祝之詞授侯寓歸俾歌之以侑觴其初曰瞻彼蓬壺峻極於天時出雲雨覆露八埏壽筵啟兮當筵前太夫人中坐兮擁列仙其次曰東望瀛海中有三山六鰲引首蟠木為闗流霞再進兮同潺湲笙歌沸兮舞斕斑其三曰二儀交㑹六合同春邑有賢令家有慈親對南山兮綺席宏陳回古風兮今孺人新江十詠詩序君子去其鄉則思何思欲見之也欲見之者何厚之道也何為欲見之厚也重本也凡事必有本水有本源木有本根作室者有基本而况於人乎人之生於是鄉也山嶽儲精水土孕靈父兄宗族之攸萃一旦去之曷為而能已於思乎既思之遂去之者何古者男子始生則懸桑弧蓬矢志四方也將行道於四方也夫以孔孟之聖賢轍迹幾遍天下而獨於齊魯之邦未嘗忘情焉凡以重本也夫人之情既不能無思思而不能遂見得見其似者可矣此圖畫咏歌之設古人之所為不廢者與是故輞川以摩詰之丹青平泉以文饒之手筆彼皆百世傳也而况于今乎林君徳潤鄞産也來教於吾海邑居常為重本之思其鄉士郁古淡為作新江十景圖以慰之十景者何曰梁山伯祠曰石將軍廟曰高衖義塚者古也曰龍潭禳禬者功也曰葉菴齋鼓曰寳慶晨鍾曰夾塘觀漲曰新渡横舟曰吾港秋月曰百丈春波者勝也士大夫聞之各因題賦詩焉浸成巨巻而授予序按新江在鄞城之西十里許而所謂十景者相望於三四里中於徳潤之居環而列焉徳潤當鳴鐸授經之餘每一展玩按圖咏詩則水木桑梓之念勃然以興化日致位顯融所到益逺相與提携之乆又有今昔之感而益思所以為鄉邦重者不必親到其地而凡杖屨之往來童子之遊釣者已厯厯在目不自知其身之為客也是巻何可少哉凡有事四方者可以法矣贈翁憲副存道自松赴浙序松天下之雄郡也朝廷必擇士大夫之賢且才者守之士大夫之得守松者亦以賢且才自待是故松治常天下之最也而守輙遷及夫遷而去也民各因其治思焉其民之雍然以長也其治和其民之穆然以深也其治肅其民之驩然以固也其治惠其民之秩然以婉也其治文其民之儼然若有慕也廓然若自失也其治寛以仁君子率於是乎有考焉潮陽翁侯存道以名御史出守松不及三年遷為浙江按察使副其去也民思焉所謂雍然長者穆然深者藹然固者秩然婉者實兼之而儼然若慕廓然若失者尤甚蓋侯之治以寛為之本是宜繫民之思推郡莆陽李君與侯雅知善來攝海事率其屬役往送焉蓋從民之思也而謂深宜序昔侯為御史時余初登朝從班行末望而偉之亷問焉曰翁御史辱從朝士游稱有風裁者亦曰翁御史又間與湖襄之士游數能按者亦曰翁御史閩之士從旁首肯焉又曰是嘗治吾興化者固宜然侯所到皆有聲去皆見思若是然則自松而遷浙又自浙而遷而去也其民有弗思者乎其士大夫有弗交譽者乎夫浙亦天下之雄藩也將於異日乎有考焉前松守宜春劉侯今為其布政左使劉侯之治尚嚴翁侯往以寛濟之其有合乎兩松守並時俱蒞於浙又皆賢也藩臬兼資政刑相弼浙不謂得人矣乎故得牽連書以為浙之士民賀壽汪思雲室余孺人七袠序大江迤南山川雄麗甲宇内而生人稱焉多偉丈夫竒男子隱顯不常而常可稱述蓋自古然我朝涵養休息幾二百年宛然周南之風化徽歙又江南之上游也山益髙俗益美氣益完固蓋不獨男德為賢而又有女德焉汪生尚庠歙産也遊上海以母壽請為祝曰吾母余孺人今年以八月廿又四日登七十尚庠謀捧觴歸敢以聞孺人思雲居士汪處全之配也予聞其賢舊矣尚庠雖無請予當有詞况請之勤乎予乃進尚庠而告之曰家之興以婦子之賢以母夫之相以妻汝知之乎汝父思雲與予交三十年矣雅懐貞操挾髙貲游江湖間求一世豪傑士與之上下其意氣重義尚禮無世俗翻覆之態殆以啇隱者與然什九在外而家門之政自孺人一身當之思雲三十未有嗣孺人每語之曰吾無以侍君汪之大事未遂君寕獨我望與逺近良家子求可得也胡為栖栖若是儉乎思雲感其意為置側室已而孺人即舉三男而側室繼出三男人以為賢淑之報焉六男繞膝孺人撫之如一産暨長一一為婚娶恒誨之曰爾父不得已業啇爾軰各宜以經學光汪氏吾願也於是二子遂以邑庠士遊太學聲名藉藉起鄉人榮之行將以科第顯有日矣孺人之教澤及汪氏者何如也且夫梁鴻之譽頼孟德曜而益彰范滂者學行則自其母成之若孺人者宜於家繁於嗣善於室所謂令妻壽母非耶雖然壽亦多端矣蓋自五十之艾以至於期頥均之謂壽而七十則人稱之為稀年若孺人之賢亦世之所希有也夫以希有之徳而享希年之壽此固天道之所厚庇而隂隲焉者也尚庠歸以予言為孺人壽觴侑孺人倚几聽之亦必喜而悦既喜且悦則心日樂而氣日充矣由是而底期頥可俟也尚庠乃再拜請書遂書為壽儼山續集巻九
