body:
  text: 儼山續集巻四明陸深撰七言律詩五十二首春分日大風九十日春分一半四千里路長風沙寒衣欲變難為客曉夢無憑數到家闗塞每憐新過鴈山城深䕶未開花向陽賸有閒庭院滿意東來吹帳紗大風昨夜雨沙今大風美人高閣怨飛蓬栁條萬結渾欲斷梨花一株容易空豈是宋都過退鷁亦愁鄉信阻歸鴻江南茅屋吾所愛莫教吹捲瀼西東早朝聖人勤政百工良鐘鼓聲嚴夜未央仗馬但聞嘶落月朝鴉不見帶朝陽班成鴛鷺當堯陛影動雲霞䕶舜裳緩歩歸來綸閣静尚添官燭校文章出北城與嚴唯中倪本端同行天門積雨洗炎蒸日射西山紫翠層白髪先朝老供奉青衫騎馬向諸陵幸陪鴛侣時相並欲挽龍髯却未能流水稻田城北路去來吾記昔年曾題函谷草堂為許廷綸表裏河山故國西昔人曾費一丸泥逃秦客去雞猶唱擬杜詩成手自題天際浮雲横紫邏夜忩燃火照青藜臥龍未許終藏雨指㸃南陽是隔谿對月庭樹扶疎月轉隂烟銷畫燭候虫吟隔簾秋色三千里伴影離人一片心門寂紅顔頻對鏡帳寒清夢尚揮金去年燕趙今呉楚指㸃明年意更深送黄子和主事赴揚州鈔闗潮弄船聲發建康計程明日到維揚官橋夜鎻初來客輦道春摇故國楊傍斗五雲常捧日横空一劒獨飛霜政成不隔來年路儒雅風流日繞腸秦淮漁笛桃花新水滿江流一棹波連白鷺洲網趂夕陽魚在桞酒隨村店蟻初篘高懐閒弄江梅曉古調遥翻嶰竹秋幾度曲終潮正落有人指㸃説東遊題陶雲湖墨花水仙淡妝高韻北風寒傍水猶宜月下看神女誤遺金約指良工新製水晶盤綠羅帶引風初定碧玉璫含露未乾細檢畫圖知苦意春光不愛染雲巒子殤後一首小巷深深日似年柴門寂寂掩風烟一川花桞春無賴三五嬋娟夜可憐狼籍頭顱多殢酒飄摇魂夢但高眠少年事業真堪笑囊有殘詩近百篇苦寒歸心愈切次胡可泉韻囊無楊震四知金手種桓温柳十尋殘菊傲霜如戀客棲鴉帶日自投林間來曝背猶堪獻驚起衝寒苦未禁夢繞故園春事裏烟波門巷落花深晩泊風濤滿目月黄昏晩泊澄湖獨樹村漁艇隔溪常宿火茅茨臨水半開門夢從五夜多逢赦古詩罪人多夢赦人過中年易感恩聖主如天司節候陽和須向歲寒論閏月廿七日雨雹圓如龍眼書異亂颭明珠玉不如兒童驚喜走階除拾來顆顆圓相並望裏星星濕有餘造物自應工變化隂陽誰為管盈虚為農復恐傷農事細檢春秋起例書丹陽孫思和東遊每當山水勝處輒繪為圖冬夕過儼山示我光福一段賦此看君畫裏汛扁舟今夕披圖數勝遊水面青峯七十二山腰黄橘幾千頭帆開逺影江湖闊天接中流日月浮試問虎溪橋外水為誰烟浪下蘇州次韻白鴈二首秋傳孤鴈過瀟湘人在高樓望故鄉顔色總疑新變態羽毛錯認舊隨行闗山雪後寒無影禾黍風前夜有霜贏得光輝照塵世久從靈沼近文王來從星漢下瀟湘糚㸃楓林入醉鄉錦字傳情通萬里銀筝移柱送斜行溶溶月色憐孤影渺渺歸心滯晩霜堪歎楊雄頭盡白惟將羽獵奏君王度太行而西多土壠層複風物都澹泊自沁北行谿山間始見梨花道傍雜卉紅紫斑斑時四月二日也慨然有懐京國舊游一路尋春何處尋山中春色夏初臨依㣲楊柳風無力惆悵梨花月有隂陶宂尚存三代制耦耕應抱古人心舊游忽憶憐芳事雲路西南隔上林夜集夏桂洲宅送崔後渠無限高懐付酒邊燭花如為吐紅蓮雨餘殘暑消簾幕月轉㣲風裊篆烟東閣大開留别客玳筵高啟列羣仙不知今夕為何夕疑在珠林玉樹前和荅胡汝載瓊林珠閣不勝寒慚負時趨白玉闌獨抱琴書躭寂寞誰從花竹問平安沈腰己痩頻移帶潘鬢新添欲滿冠相對長安同作客椷詩特地勸加餐和張甬川臥月書懐可憐三五月嬋娟度榻穿幃攪客眠只照長安情不極共看千里意俱懸金波欲動江湖迥銀漢斜流殿閣邊萬户千門深夜裏清輝應為搗衣偏謁曹九峯先生墓清才巨筆更逍遥白玉樓成赴紫霄池上夢驚生碧草碑前人到奠芳椒隂森氣候還松蓋摇落年華但柳條多少漢朝金紫貴將軍只數霍驃姚自天姥望天台何處天台有石橋行人指㸃碧雲霄劉郎欲度何由得隱士難迥枉見招齋磬出林春漏永征旗繞澗暖烟銷仙凡咫尺空惆悵馬首東來客路遥兩宿僧房病後身高情聊與白雲親青山似畫閒門少紅日如輪世路新呉楚地連多客户瀟湘天逺有騷人南中歲晩饒風雨愛聽鐘聲報四鄰雪後入禁中供事瑶翻層雪䕶黄金天上清寒分外深山遶帝京開玉障氣凝宫柳長瓊林鳯凰池畔風先合鳷鵲樓頭月有隂雲物不須書異瑞秪占三白慰民心郊壇演樂金湧隄沙接鳯城西山晴雪照人明闤扉出郭依黄道臺殿凌空鎻太清陽氣正凝南至日禮官頻展奉常牲聖人制作親遭際身到鈞天聽九成禁中齋夜寂寂齋心夜氣濃玉河西下鳯樓東忽驚凡骨留天上賴有仙僚共雪中蓮漏暗通風力勁𤨏窓斜映月痕空大烹本為牛羊薦鼎鼐調和愧未工臘日嚴寒新製狐裘服之六十一回經歲寒狐裘初試向長安南人不識千金價北地尤珍一腋看白盗己非前轍逺紫貂雖好䇿勲難衰慵尚戀君恩重辦得朝趨候夜闌丁丑除夕門掩虚堂畫燭輝隔宵先自理朝衣氷霜逺道臨青鬢星斗中天䕶紫微豈有㳙埃報知己且將身世付忘機物情自與流年換今昨無勞論是非别李時元下第吳山蒼蒼共燈火潞河悠悠即去途乍可後期還磊落莫因逺適悲江湖晴風浪摇四月麥宿雨帆輕十幅蒲南國詩成須早寄風塵清夢客樓孤和易欽之遊廣恩寺春日忻逢水西寺入門無數香烟凝鄉園千里逺作客塵土十年終愧僧風光毎向閒邊見山色試憑高處登未問西來栢子樹可憐清沼玉壷氷視牲向晩郊壇第幾巡願儲精意奉明禋去來路熟渾忘逺西北山多欲礙春終見牛羊歌帝右未因鼷䑕變齋晨東風又遍天街草御輦須憐碧玉茵右廂齋居槐影參差月滿空橋門雲館鎻重重齋心自覺春宵永痩骨偏承夜氣濃北斗旌旗驚閃爍南郊圭璧奠從容相如最有凌雲筆恨殺文章草漢封送陸良弼調楚雄長沙才調賈生同古郡滇省楚更雄萬里驛程山共水五更心事雨兼風極知駿骨臺堪築未為齊門瑟轉工交契十年情不盡長安幾度别離中分題燈下細書壽副憲盧師召乃翁青藜火底坐揮毫猶有蠅頭滿薛濤似與黄庭傳妙訣還將白練冩風騷懐人詩就石湖曉寄子書成劒閣高見説方瞳今己碧更從天際送鴻毛清明日半軒前丁香盛開偶題小院迴廊曲曲深為誰頻結雨中心東風吹到第幾信節序俄驚百五臨簇簇紫茸如可嚥蕭蕭華髪豈勝簪故園買去開還早相伴溪梅水竹林歸途再同林介立經行蓮塘楊柳芙蕖一徑長未秋先己動新凉塵心到此消應盡暇日來多儘不妨空翠拂衣山有氣柔芳過雨水俱香千尋萬雉金湯地信有人開吏隱堂送林以吉提學泥封芝檢下青㝠帝輔皇畿重典刑秋滿大江雙畫楫風隨驄馬幾長亭滿蹊桃李含時雨到處篇章發地靈更向斗南占氣象雲開五色見文星食菱一曲菱歌江上秋畫船歸近望江樓北來物色渾如玉南望鄉闗第幾州風味疑從仙掌墮水芳曾傍錦雲浮歲寒獨枉佳人恵消得相如一片愁食酥疊前韻瓊花凝露拂高秋玳瑁筵前十二樓軟滑不須論北塞温柔元自出南州夜寒錦帳笙歌細春煖金尊琥珀浮慚愧清寒玉堂客得聞風味破新愁謝顧未齋恵連實疊前韻長卿病肺幾經秋藥餌頻須正倚樓忽枉新篇題玉井渾如高誼借荆州細傾圓實珠璣亂尚帶清香玉露浮見説功多心獨苦采蓮歌罷使人愁疊韻荅柴徳美黄門藻思芙蓉露下秋逺過王粲賦登樓時焚左掖三千疏曾定山東一百州獨客琴書殘臘盡中天臺殿瑞烟浮夕陽無限憑髙興興汝同懐北顧愁和俞國昌食鱸再疊秋字鱸魚誰送海門秋逺客思歸正倚樓張翰因風辭洛下東坡乗月向黄州鱠成飛雪銀絲細目斷烟波釣艇浮賸有詩筒報知己且憑斗酒慰覊愁戊戌元旦早朝曉日曈曨映彩霞先春欲綻上林花侯藩接履朝元旦聖主垂衣御正衙楓陛天高嚴虎豹繡旗寒襲偃龍蛇九重禮樂登三代四海車書正一家早朝宫井疎鐘曙色催五雲百和繞蓬萊優游萬國龍顔動森列千官雉扇開寳鼎赤墀籠曉日玉音丹陛隠春雷城鴉高拂扶桑景白玉橋頭侍從囘初試羊㲨予有一端藏笥中者十年兹教内館始製為衣以禦北風感而有作蕭颯頭顱感是非半生何敢愛輕肥相將歲晩看新製指㸃年華亦故衣北郭嚴凝隨痩馬西州辛苦到殘機病來却恐渾憔悴且試休文舊帶圍和宫端後渠玉亭賞蓮之作玉亭清切五雲邊盆沼誰移玉井蓮來賞正逢初過雨倚看須著半含烟何妨絶代稱君子准擬前身是水仙四十年來同榜客一尊相屬醉花前疊韻荅嚴介谿賞蓮紅衣翠蓋玉闌邊一曲新凉聞采蓮芳潤似擎金掌露清芬疑惹御爐烟主人元是瀛洲客勝賞真成陸地仙别後難忘定何處一樓風雨五更前恭謁顯陵二首曈曨曙色映祥雲臺殿巖巒錦繡紋春氣正濃連王氣人文逾朗應乾文水知宗海千川合脉是真龍五嶽分願獻周原𤓰瓞頌萬年長擁聖明君龍蟠鳯翥有餘竒聖教皇情無盡時華表欲棲千載鶴靈風常滿萬年枝橋山弓劍瞻雲閟寢殿衣冠展月儀地接三都中都祖陵南都孝陵北都七陵元咫尺天開一統正雍熈中秋月下懐高進之浦溆虚堂欲暮秋故人青眼夜深留微風明滅漁舟火四壁淒清戌角樓身世渾疑非幻境心期千載有神遊庭前忽報中秋月踏碎花隂未肯休送方矯亭赴南祠部詞人南國古來多乂渡秋江渺渺波兩地客懐俱復爾十年心契奈愁何鳥啼畫省常封印簾捲鍾山且對歌後夜黄金臺上路鴈書頻望下星河昨𢎞治辛酉南畿秋試獲識呉江錢廷輔廷佐兄弟若聮珠駢璧文采映射心竊賞之既别去無從晤言時時往來於懐今嘉靖丁亥夏廷佐以扁舟訪予江村始知廷輔方應郡貢去而廷佐先領正徳己卯鄉薦矣轉盻三朝垂三十載而予亦老矣為之感歎次韵奉荅秋風一曲伯牙琴曾和鳴臯鶴在隂别後相思多夢寐重逢今日是山林大鵬萬里須搏海駿馬高臺為築金見説松陵富酧唱直從皮陸到如今今呉江即古之松陵儼山續集巻四
