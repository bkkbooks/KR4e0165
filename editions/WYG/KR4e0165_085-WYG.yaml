body:
  text: 儼山集卷八十五明陸深撰䇿癸亥南監季考問國學之設所以維持世敎造就人才非徒為粉飾太平之具也自昔以來其建學之制與為敎之法得才之効互有不同則游於斯者皆不可不知也請以所疑從諸君質焉孟子論學推三代所共宜無異名也而禮有上庠東序右學東膠成均辟雍之異何以不合於孟子孔門傳大學之道不過三綱八目宜無他道也而禮有三徳三行六藝六儀四術四敎與夫樂徳樂語樂舞之目何以不同於大學師一也而有大司樂樂正師氏保氏司成司業之職何以分士一也而曰選曰俊曰造曰進之義何以取周之五學與漢之三雍唐之七學宋之四學其數之不同亦各有説與今太學之六堂其亦有同於古乎不也古之士以徳業相先今乃行業不修惟筭撥歴之月日豈以是為惜寸陰耶古之學以明經為務今乃經術不講羣爭短差之甘苦豈以是為奪錦標耶欺誕相習每稱病以免坐堂奔競成風或附勢而求速化憚拘束而樂放縱避勤勞而求安逸若是者可望其有成材乎兹欲變化士心作新士習使為師者各舉其職不為倚席之博士為士者各安其業不為城闕之子衿爭先於學問而資格之不計相讓以道徳而奔競以為恥不負菁莪之化聿成棫樸之材何所施而可國初積分之法可復舉乎湖學經義治事之敎程子吏師禮賢之議亦可用乎抑别有道乎前代太學諸生有舉旛而救鮑司隸者有倡義而不汚朱泚者有殺身而爭宰相之用舍者有捲堂以論丞相之起復者其忠義節槩為何如不知其人亦嘗筭撥歴而爭短差乎諸生皆四海之英膺貢舉而來肯自處若人下乎願一吐胷中之奇老夫當歛袵以拜下風嘗讀賈生書未嘗不陋其辭之陿也美才如誼何患不知不患不知何患不用如是其陿過矣暨得觀先正議論謂生志大而量小痛哭流涕於初見君不祥則又快其言之中也由今觀之乃大不然夫奉公履忠臣子姱節引墨循繩士女美行此特中才之的耳非所與論於賢知之外也是故士有倒行逆施以適於道道喪法弊然後大臣敢與天子抗議以行其志故曰賢者作法愚不肖者拘焉誼之悲千古之痛也今夫太學者豈惟賢士之所關哉民生休戚之所關也世道升降之所關也何則今日之生徒異日之百僚庶府也天下之事待人以集集事之人有不自太學出者大都四之一耳一不勝四雖盡歸之太學亦可也不儲其才於未用之時而欲較其功烈於既用之日斯是之謂不耕待穫胡可得哉古者太學之禮雖詔於天子無北面所以尊也降至兩漢三老五更不失古意歴代之所禆隆封厚者獨一此爾恭惟執事蚤學聖賢望隆台輔有年矣竊恐門生故吏之言不信於天下故不敢頌稱功徳由今天子任執事之意可謂重矣虛位三年溫詔接踵自我朝以來未有盛於執事者也而執事其亦果不負此任也哉愚生雖在草莾亦思咏歌聖明以侈師道之得人况得躬逢其盛與係籍弟子者哉草莾咏歌尚期徹於執事以露諷諭近在門墻固當一躡忌諱而言之此而嘿嘿是重負執事也固欲一言又恐先動賈生之哭所以睢盱躑躅而不敢者於兹兩閲月矣雖然執事方有問焉宜終不得無一語也日者季試䇿目愚生竊得而伏讀之一則曰諸君二則曰老夫何其言溫而氣和憂深而思逺矣執事不負明天子者其不於此畧見一斑也哉伏惟明問自昔以來建學之制為敎之法得才之效皆生輩所宜知於是舉疑義數端以詰於乎執事之心所謂待人以不薄者矣愚聞隆古之日人之生也自能言能食時有敎以至成童弱冠之日有學故自八嵗入小學迄乎入大學之年中間訓詁名物固皆口誦心唯章析句通由是而往盡天下事理次第而學之積以日時高深上下靡有或遺及其隨用也舉而措之是故風尚淳厚禮樂宣著此古之敎亦古之道也執事慮今之學非古之敎以古之道繩今之人乃先緩辭括義以驗其體然後與論天下事以博其用自愚觀之學以識治為難而記誦辭章不過格致之一端爾諸如彼類皆愚幼讀其書與學於其師者姑俟終篇以獻未晩也茍於名物度數之間徒舉先儒之成説至於紀綱法度無通融之術者世之君子固有拾芥高科而才不堪一縣吏指揮孑子而步趨彳亍比比僨事者愚未嘗不刻骨刓心以惻隠之也夫泥於古而不通於今者謂之腐儒熟於世故而暗於道者謂之俗吏二者皆君子所弗學也伏惟明問行業不修惟筭撥歴之日月經術不講羣爭短差之甘苦嗚呼是固宜執事之所為驚恠而亟問也諸生入太學者皆由貢舉徳性就矣學業成矣登庸將矣烏乎然哉嘗觀天下之勢人情而已情之所安不能拂之使違雖有堯舜之知湯武之勇若使逆人情而用之斷曰不能也亦文情以合法而已矣太古之世民之初生被髪裸形與禽獸無異聖人製為冠帶衣裳之冠帶衣裳本人情之所甚安也若被之土石草木掩蓋之而已其有不跳踉而投擲者乎國初生徒固有數年不徙者今不過三四年之間而爭端百出豈古今人情不同逕庭哉曰不也夫人之情非有所樂於此孰肯甘辛苦而安之故馳馬試劍獵較原野之間羸憊甚矣厥明復事必將操戈據鞍奮躍而先之何則樂於得獸也使有獵較之勞無獵較之樂吾知不能一時安矣今日之事何以異此國初雖曰日捲三班然因而飲食之諸生整衿束帶攜書就館飯畢班㪚從容自公然後各坐號舍以遂所業且朝藝成而夕見用矣既無薪水之勞又有行志之樂如之何而不安耶今也不然雖有廩餼之給已非養賢之初意又况貧病衰老侵尋於其中辛勤客旅流浪嵗月雖有志之士亦將起而爭之况于好逸惡勞中人之性哉此勢之所必至者亦何足恠蓋嘗驗之人之欲去此地者必其心有所不樂也其相爭者必其所不相安也夫樂則相安相安則相遜此理之必然者故曰知而不好知之未至也好而不樂好之未至也事而至於樂聖人制禮樂之本也今之生徒有望太學而興畏者矣烏在其能樂哉伏惟明問欺誕相習毎稱病以免坐堂奔競成風或附勢而求速化憚拘束而樂放縱避勤勞而求安逸於乎孔子曰君子之徳風孟子曰上有好者下必有甚焉者矣今日太學之敎其諸異乎古之敎者矣所存者獨文學一科耳其又異乎古之文學者矣愚生自入太學以來竊嘗用情焉其所見聞者不過曰某長於舉業可以取捷進士也從而禮貌之某熟於時文可以雄長場屋也從而援與之敎之者如是而己未聞某為道徳而被一褒也某學聖賢而博一譽也豈羣然數百人之中曾無一二輩以當其選愚不敢厚自誣於一世也况科舉之業係於人者其學也有至焉有不至焉聖賢之事本諸天者是惟無學學之必至大抵科舉之學易而聖賢之學難又舉世皆好科舉而不好聖賢則人孰肯重違天下之所好以獨攻一已之所難能自拔於流俗挺然風氣之表世寧幾人哉且夫文人無行自古為然蓋其究心枝葉而遺棄本根游藝之日長而依據之功少今縱不能直示學者以本根之地顧為之揚其波助其瀾明知其人之不可與言也而徒重其文辭彼將曰吾之醜吾之文足以蓋之也有愚不肖者從旁熟視之亦將曰某且如是猶齒于人吾亦為之無傷也轉輾效尤人將何憚而不為乎中人之性非有所勸之於前與有以懼之於後不能動中矩矱士習之不美有由來矣伏惟明問變化士心作新士習使為師者各舉其職不為倚席之博士為士者各循其業不為城闕之子衿爭先於學問而資格之不計相讓以道徳而奔競以為恥何所施而可愚聞聖王不沿禮樂以為治君子不襲故常以立敎何也道與時常不能以偕行故也執事憫學敎之陵夷奮然左提而右挈之愚以為執事人也又得其時竊所望焉必欲逺追三代坐享人材之效此其事係愚生更有論撰在度不能卒然行之也何則太學與銓選相通欲復太學必變銓選欲變銓選必變科舉此非有願治之聖君與得君之賢相大約更張之漸以三十年之久不達故曰不能卒然行之也兹欲行國初積分之法復宋儒湖學之規愚直謂其勢亦有不可遂者又何也積分之法即前所謂通銓選者已以今日之資格行國初之積分則士有老死成均者矣豈其本願哉若宋胡瑗痛詞賦之弊其在湖學矯之以經義治事夫湖郡學也當是時師有定敎弟子有定學故安定之門人出而天下之人才廢矣慶厯中嘗頒其法於太學然宋朝三舍之法猶有小成大成之遺意故士多有至數年者蓋經義治事之學非可責効旦夕之間日久功到庶幾有成然宋人亦但著為令而己未見其能舉之豈非鄉學與國學不同師雖有定敎而弟子無定學故也今日之事則又不然入太學者有所謂水程事故之日其實歴也有數月者有上周嵗者最多者不出三期月之外又有課試之累又有薪水之勞其間實力於學者幾時哉夫茍用之亦揭虛名而已有益上下未之有也夫人居家與居傳舍異傳舍常思行居家則安業今之太學今之士之傳舍也故曰勢所不遂者此也獨二程禮賢吏師之議為可用於今日耳雖然立法貴於濟事不貴於紛更使法立而人駭駭則疑疑則不信不信則不用要在因其勢而宜之若禹之治水然豈獨禹之治氷哉三代聖人用此道也且夫忠質相因忠弊則捄之以質文質相生質弊則捄之以文是故其人不駭而亦不知其法之改也燕趙之人生不識舟楫一旦至於具區彭蠡之濱望帆檣而疑矣及觀其出没風濤縱橫上下則足顫背汗而吳楚之人固有以舟航為家者耳目不同也甚哉耳目之障蔽不可以易而袪也若驟相期於言意之表其不為燕趙之舟楫者幾希今日之太學謂宜以今日之宜處之今日之宜畧有四事愚請言之一曰大學術以救科舉之弊愚聞古之人無不學也其學以二十五年之久然後仕焉既仕也惟才是任無所謂資格也是故伊尹起於莘野傅説舉於版築太公興於渭濱始也養之如此終也任之如此今日科舉既得出身之餘惟論嵗月官資而已竟不問其學何所本才何所堪言及於此雖欲自已其流涕痛哭不可得也上之人既以是待天下之才人才所學視有司一舉業之外少畱意焉雖然舉業本意未始不善何則本之經書以觀其義理之學叅之論判表䇿以觀其理治之方胡瑗所謂經義治事者固以兼舉而並行矣聖祖謀畫極有深意前輩先達功業頗高今日舉子不必有融㑹貫通之功不必有探討講求之力但誦坊肆所刻軟熟腐爛數千餘言習為依稀彷彿浮靡對偶之語自足以應有司之選矣學術至此其又可悲也夫今九州之廣四海之逺聰明才辯固自不少皆科舉之學誤之也天下人才不過二等天資明敏者上也學問後通者次也上焉者其於科第早得數年次焉者其於科第遲得數年大約如是而已矣早者血氣未定一旦心與物交有引於功名有引於富貴間有有志學術而重為政事所縛者既有志又有地千百之十一耳是上焉者科舉誤之也遲者血氣既衰力不迨志是次焉者科舉又誤之也舉天下之人才皆誤於科舉如此不幸者不可追矣又幸而得入太學者正宜與之講明學術致力於身心而不徒詞章畱意於經濟而不但記誦知是行是雖嵗月有淺深皆不失為君子人也異日有位可屬望焉若復程督舉業是以有限之功為此無用之事朱子所謂伎倆愈精心術愈下不若不敎之以全其朴忠之為愈也何則舉業者進取之媒非致理之路也其弊也浮華而無實用捄之之地在今日之太學耳蓋鄉學所儲未成之才也太學所養將用之才也二曰開薦舉以寓激勸之微權國家取士於科貢仰視前古似為少狹然亦足以周天下之用取才期於足用而已矣又况太學之士皆名待用薦舉若無俟也此有説焉朝廷官人制為等差曰守曰令曰藩曰臬曰卿曰大夫曰公曰孤異其章服辨其資階此皆非其人性分之所有也蓋假此以妙其用使少者賤者俛然知其尊且貴而服役之其中才者則又歆豔而企及之故曰爵祿束帛所以磨世厲鈍也以執事之碩徳重望試於太學之中熟視嚴察其終不負執事者嵗一二人特章論列之雖薦未必用用未必顯天下已曉然知太學有薦舉之路孰不樂居之刮磨拔濯以應執事之選哉其功為不少矣三曰隆禮貌以愛惜人才愚聞太學與百司非但勢不同其意亦不同也何則百司謂之政太學則謂之敎百司謂之治屬太學則謂之師生百司有五刑太學則有二物百司主法太學主恩今日彞倫之上生徒步趨拜揖一不敢越厥度高拱堂噲指意而已豈百司敢京哉愚以為不如是則道不尊退而聽事畧宜霽威無益拜跪一切罷去以勵諸生之節執經獻疑從容窮日以承執事之敎愚以為不如是則道不行若夫高堂深陛不敢仰視固已扞格不通矣良法美意安從致之孟子論政所以必本之仁心仁聞也蓋養人才如養山林非但雨露滋之又勿使牛羊牧之雨露滋之牛羊牧之竊恐滋不勝牧矣其末也則在於變文體以救俗學之弊傳曰太上立徳其次立功其次立言文非君子之所先亦君子之所不廢也文體關時理不可誣又君子所不得恝也是故為文不本於六經皆茍而已前代文體具有成論獨宋南渡以後纎弱破碎議者謂其國體然也元人承宋矯之以麤豪呌嘯益不足觀我朝又監元人之失類以歐蘇為宗愚見世之好歐蘇也亦嘗取歐蘇之文閉門而讀之未見其足法也喟然嘆曰由六經而至歐蘇有之矣未有由歐蘇而造六經者也夫歐之文溫雅其學勝蘇之文通達其才勝無歐之學與蘇之才而為其文所謂效季良不得者也國朝百餘年文運亨嘉宜在今日伏惟畱意焉蓋六經者道徳之淵藪也由漢以來用文取士不可改已不敢不本之六經者譬諸適都之人中道而迷其路有人於此指之曰此南也此北也此東西也若人北征猶可以達大道而之都如曰此有捷徑彼有便途吾見其不東蹈海則南走越耳是没齒而不能望都也為文本經此正示之向方庶幾異日因文以見道耳夫是四者愚昧不敢自必謂何庶乎人才學術可得一變也孔子曰齊一變至於魯魯一變至於道於乎天下之事為之不憚其始之難而後獲其終之定必探其本之故而後致其末之理是故為執事類數而條説之以俟採擇焉若所謂學名者名不同而義同雖謂之名同亦可也孟子蓋有見矣且夫成均者五帝之學成之為言就也均之為言平也天之生才於是就焉天下之才於是平焉上庠者有虞之學庠之為言養也所以養雋徳也東序者夏后之學序之為言次也次序先王之道而學之也右學者殷商之學學所以學士之宫也周制曰東膠又天子曰辟雍蓋膠之為言糾也所以糾收學士也辟明也雍和也化道天下之人而使之成士也義皆主於敎士非若專於養老專於敎民專於習射其事分其義殊也大學之道載在周禮者則有三徳三行六藝六儀與樂徳樂語樂舞見於王制者則有四術四敎若多於孔門之傳授然周禮王制所云皆修身之事或以道言或以敎言實相表裏也所謂師之職愚聞古之敎者不獨以禮而必以樂故大司樂樂正皆繫之學也敎國子以三徳者師氏也養國子以道者保氏也司成之名起於唐蓋總統學政者也司業之官設於隋其本於樂正司業者乎雖有不一同職於敎養而已矣所謂士之義者命鄉論秀才升之司徒則曰選士司徒論士之秀者而升之學則曰俊士升於司徒者不征於鄉升於學者不征於司徒則曰造士大樂正論造士之秀者以告於王則曰進士夫選者擇也擇而取之也俊民之秀也造成也成其才也進者進而官之也此其義與所謂歴代之學者則東郊虞庠辟雍頖宫周之五學也明堂靈臺辟雍漢之三雍也國子學太學四門學律學書學筭學暨國之監唐之七學也太學武學小學律學宋之四學也數雖不同以愚考之其重在太學則一而已矣何則周之虞庠小學也頖宫諸侯學也辟雍與東郊同地曰東郊又曰辟雍别諸侯也漢之明堂靈臺各有所事惟辟雍為養賢之地唐之六學皆領於國子監宋之四學令司業為之其亦隸於國子者也與今之六堂皆統於彞倫大同而小異焉但漢之三雍本於圖䜟之故唐之七學雜以一藝之名宋承唐餘猶存故轍我朝則以率性修道誠心正義崇志廣業為名直追三代而上下之今之士居之敢不顧名以思義此亦愚之志也伏惟明問前代太學諸生有舉旛而救鮑司隸者有倡義而不汙朱泚者有殺身以爭宰相之用舍者有捲堂而論丞相之起復者其忠義節槩為何如諸生肯自處若人下乎於乎彼數子者皆所謂遭時之不幸者也其忠義節槩誠激昻千古執事以為何道而致然乎夫天下之榮美人常不為者知不足也知而不為者知之未真也惟其真知是以力行數子蹈之也竊嘗觀之西都學術去古未逺哀平之世猶有存者故宜有舉旛之士徳宗之世陽城韓愈繼在太學故宜有倡義之人道學於宋為盛故宜有殺身去國而不愛者彼皆顯然知名義之可重而戮辱之為甘其為之也豈有待哉求如古人亦敎之古人而已矣夫茍敎之既已知之則必行之幸而為賢宰輔為良百司不幸而見鮑宣遇朱泚目擊李綱之去國與史嵩之之起復則為王咸為何蕃為陳東為黃愷伯不難矣孟子曰浩然之氣塞乎天地之間有所養也若夫不敎不學之人簞食豆羮尚不相能安望其捐軀赴死以扶天下之大義乎此則不知之罪也是故士習不美是未敎也敎矣不率是未善也善矣不遷是棄物也迸諸逺方終身不齒其亦古之道乎天理之在人心不由外鑠實由外亡是在執事覺之而已矣愚生鄙野蚤乏父兄師友之功罔知避忌狂妄於大人君子之側無所逃罪然自度惟執事可以聞此言也幸甚先敎而後誅之儼山集卷八十五
