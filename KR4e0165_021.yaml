body:
  text: 儼山集卷二十一明陸深撰樂府二二十八首聖駕臨雍詞八首太平天子重斯文龍氣南來五色雲遙望雲中雙鳳下須臾春在辟雍芹南下旌旗曉日明廟門東畔百官迎亭亭繡蓋隨風轉萬乘君王却輦行松柏隂隂御幄高尚衣跪進絳紗袍龍行虎步臨黃道瑞氣祥雲捧節旄聖道中天日月高不辭再拜聖躬勞侍臣獨有詞林重盡許庭陪冠百寮庭覆紅雲午日晴藍袍次第列諸生六龍不在煙霄外馳道中間板轎行寶座龍紋繞赭黃經筵相向列前堂尚書講罷天顔喜又進西階大易章公孤殊寵出千官偏得君王座上看階下太官承㫖罷一杯分賜小龍團覆階黃土接長安白馬朱纓金縷鞍輦出橋門直西去滿城士女看回鑾經筵詞二十首經筵開自祖宗朝按月逢旬第二朝今上春秋偏好學三千年後見神堯國初經筵無定日至英廟初朝始著為儀今用每月初二十二二十二日寒暑及有故奉㫖暫免多以春二月秋八月舉行今歲實以七月二十二日上之勤學也編排御覽效精誠白本高頭手寫成句讀分明圈㸃罷隔宵豫進講官名凡進講先從內閣㸃題票示講官分撰講章送閣下詳定勑房官用高頭白手本寫成二通講官預進東閣用象管朱印成句讀科發隔日進呈其一在御案展覽其一在講案供講絲鞭聲肅退朝官名在經筵各整冠一字班行先出隊中臣扶輦下金鑾凡經筵例用勳臣一人知經筵事內閣或知或同知經筵事九卿之長及學士祭酒等官侍班翰林兩坊及國子祭酒每二員為講官詹事府詹事等官各部侍郎出由翰林者仍為講官翰林春坊每二員為展書官給事中御史各二員侍儀鴻臚寺錦衣衛堂上官各一員供事鳴贊一員贊禮序班四員舉案侯伯一人領將軍入直制勑房官書寫講章通謂之經筵官皆得入銜每當鳴鞭退朝上將赴經筵則各從本班略整衣冠以次先出分隊作一字行隨駕而南金水河頭白玉橋上公寶帶侍中貂逡巡小立瞻龍氣左順門高御幄飄駕過金水中橋迤邐轉東各官俱候橋北南面小立望駕升至左順中門進入然後度橋循行每望見御幄迎風映日或時見小傘蓋擎蔽朝陽文華東啓奉天東滴翠浮青映碧空講藝談經頻設仗太平天子坐當中文華殿在今奉天門之東比諸殿制稍減而特精雅用緑色琉璃瓦左右為兩春坊上之便殿所常御者也今用為經筵之所中設御座龍屏南向又設御案於御座之東稍南設講案於御案之南稍東入殿中門當檻下白石一方純潔可丈許擡講案官置案當其北二三尺地始稱講官拜起也百官朝下殿門前仗馬雙牽七寶鞭黃道正中移步輦侍臣班從赴經筵上御奉天門朝罷百官皆北面拱立中使齊牽仗馬過東上興下御座乘板轎由丹陛南下赴文華經筵官執事官皆從龍池鳳掖藹朝暾板轎初回轉角門聽唱官人來進入講章默默又重溫各執事官於左順門之南門西以次相向序立定時上已御文華闔中門各官東行下坡則板轎已回出向西循河過小橋北入角門矣適啓文華中門內侍唱官人每進來外門傳唱畢各官始北行將由兩門以入是時輪講官各默誦所講之章敬慎之至也殿陛森排劍㦸重金貂玉蟒護真龍司儀起案雙雙過御榻前頭取次供今駙馬都尉游泰帶刀入直立東近壁諸將軍以次侍立各執金瓜西亦如之諸內侍稍北東西分鴈翅以次亦執瓜侍立諸司禮太監分東西班近御案鴻臚贊曰起案序班二員舉御案置御前二員舉講案置御案之南正中講案衣裙用純黃綺橫經几子赭羅裙小對團龍簇繡雲擡向御前安穩定黃金鎮紙兩邊分御案面衣青緑團花錦圍裙赭黃金龍小團花序班舉案將至御前司禮二太監自東西來接舉至御前近座上有金尺二條用以鎮壓講章第三㕔協兩坊官長跪拈書漚手攤幸對天顔剛咫尺禮嚴不敢舉頭看第三㕔史官㕔也又曰槐㕔即今翰林院正㕔之西偏史官所居是也兩坊左右春坊也展書官悉從內閣題定兼用坊院近時多以修撰編修檢討為之今廖中允道南張贊善治仍供展書新遷故也每講四書展書官從東班出每講經史展書官從西班出進詣御案前跪出手展講章二太監接手攤滿以金尺鎮定然後起至此則天顔真咫尺矣屏息以從事蓋人臣榮近之極而敬慎亦於此極矣漚手香名太醫院每嵗製此香以分餽各官行出班東面照西臚聲高揚叩頭齊參差進講並平肩立輪著周書孟子題鴻臚贊進講畢講官一員從東班出一員從西班出俱詣講案前稍南北向並立鴻臚贊鞠躬扣頭畢展書官進詣展書畢起立則東講官一員進至講案前立奏講某書畢稍退展書官復詣展書畢則西講官一員進至講案前立奏講某經史畢稍退仍並立鴻臚贊鞠躬叩頭禮畢故進講每至參差而拜起必用比並故事先四書而後經史四書東而經史西也兩行冠珮列金緋供奉諸臣盡繡衣步入殿門同磬折諌官端拱靠南扉經筵官分東西侍立各以職事服大紅袍講官雖品級不齊亦皆服之展書而下官各服青緑錦繡惟給事中御史與兩侍儀官傍南楹作一行東西各三人俱北面立備觀察也師保公孤儘上行元勳立近衮龍傍紅雲不動爐煙細聽講虞書第幾章時武定侯郭勛以太保知經筵事立東班首西班則內閣一人首立最近御座餘序次立再立一行居後金鶴飄香瑞靄濃寶爐籠火擁蟠龍未曾暫免經傳㫖不怕嚴寒報仲冬殿中金鶴一雙東西相向立盤中下有趺架飾以金朱以口銜香香黑色如細燭狀外國所貢也其下則以三山小銅屏風障金銅炭爐兩展書官冬立其下每冬則設是嵗十月置閏節屇仲冬尚未傳免上之好學可謂無間寒暑真聖德也緑琉璃殿洞重門黼扆中陳擁至尊傳與太官供酒飯兩班文武盡承恩鴻臚出班中跪贊禮畢兩班官俱轉身北向拱伺玉音官人每喫酒飯各皆跪承㫖白玉闌干與案齊一行殽核盡朝西珍羞良醖俱名品指㸃開囊囑小奚光祿寺設宴於左順門之北蓋奉天門之東廡也依品級序坐作一行俱面西珍羞良醖二署名賜宴惟經筵最精腆例得帶從官堂吏及家僮輩攜囊榼以收餕餘姿容霑醉總仙桃黃閣三公共六曹步出順門俱北面曕天拜舞不知勞宴畢出至順門之南分班北向叩頭謝恩而退隔宿薰衣問夜闌齊心轉覺副心難不知言語功多少到得君身保治安凡進講衣冠帶履俱薰香退即以别篋貯之示不敢䙝也必齊戒必沐浴演習講章以祈感動一念之誠殆未易以言語盡也齊辰服次聖躬勞淺淡垂衣寶座高昨日御批傳帖下龍紋重整赭黃袍上好學彌篤每當忌服輟朝之日即以變服御經筵諸執事官俱烏紗淡服以從惟帶或用角或照品臨期取旨今閏月草有一日悼靈皇后發引傳帖經筵官照舊服大紅其餘青緑錦繡皆如制是日始覩上赭袍矣朱衣司禮下東班風細傳言縹眇間暫倚木天西面望聖皇親饗兩宫還是日將下奉天門忽司禮一人下東班向內閣若有宣示者始知上將西朝兩宫矣各執事官俱暫入史館候駕東還行禮儼山集卷二十一
