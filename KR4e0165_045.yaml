body:
  text: 儼山集巻四十五明陸深撰序九贈少司冦東洲屠公南歸序嘉靖十有八年己亥夏六月朔雷變奉先殿掣其左吻之鍤若劒者而烟熖及於列室今皇上瞿然震恐求所以應天之道者若曰彌文其勿事事惟上下一德秪承之以匡台母易從禮部言三公九卿大僚皆當上章求避位上親臨去畱之以共成格天之業于時刑部右侍郎四明東洲先生屠公方自大理卿遷上若曰宜聽爾去而㫖獨加溫蓋上所以注存之深意而非夫人之所敢知也公字安卿舉辛未進士為御史有直聲巡按江西能力制寧藩之横不遑顧忌而竟亦莫之能傷正德間嘗紀軍功有勞奉命當遷京秩廻翔八年始自御史出知保定府府又冗劇公力當要衝手撫凋瘵又五年乃復調延平自延平凡六轉以至今官天下士大夫感望其諳練之才光輔中興之業大抵公之才明果慈恕詳慎整潔於官無所不宜若其剛毅之氣耿介之操有壁立萬仞之勢是故於世鮮合公亦不甚求合於世而每以易去為能及其决於去也天下士大夫又無不惜之尚書泉坡先生周公左侍郎南塘先生宋公同官也惜之尤深而謂深宜有贈深惟君子之道出處而已出處之際義命存焉是故其去也有不得不去其來也有不得不來夫是之謂命其去也有不可不去其來也有不可不來夫是之謂義深與公亦嘗同官於閩晉間南北相從之日久知公於義命之學甚辨於是行也寧不有餘裕哉雖然既去而復來者公家太傳襄毅公是已旋去而速來者今司徒儉菴梁公是已皆命也至於蹈止足之分繫一代之風化若兩疏之於漢則不可不去當理亂之幾負華夷之物望若司馬公之於宋則不可不來是則義也深故贊公之不得不去而竊有望公之不可不來也將以復於二公或曰此非子之言天下之言亦當朝羣公之言也遂書為序擬進同異録序臣愚才拙器疎力小圖大故嘗狹陋漢唐之治思欲致身唐虞之朝恭遇陛下繼統御極天縱性成真堯舜之主也千載一時益思自奮第愧誠意素薄不識獻納之宜言出禍隨動與罪㑹仰賴陛下仁聖曲賜保全尚與衣冠之列昨自講筵出佐延平延平實文獻之邦楊羅李朱四賢之遺風猶在水土相宜職務易稱臣頗得以讀書向學每見先儒議論有切於大典禮大政事者手自劄録未及三月又䝉陛下特超常資付以山西學政俾列憲臣増還舊秩非臣捐糜所能報也比至山西巡行之暇偶出舊編麤加銓次分為上下謹用繕寫上塵乙覽伏惟聖人之學貴得其要帝王之務在知所先儻事博覽汎觀殆非神明化育所以無聲無臭之妙也頗恨時日有限文籍少隨不免挂一而漏萬譬如涓埃何益海嶽然裒多益寡之志終存而萬折必東之性難改竊伏自念臣本農家僻居江海之上兼有藏書可資考索衣食所餘足備筆札之費儻䝉乞賜骸骨少假嵗時臣當部分首尾兼總修貫勒成一家之言庸為萬幾之助㒺知可否若蹈淵氷不勝恐悚待罪之至臣謹序經筵詞序深故史官嘗厠講幄既而去佐成均遭家不造今上皇帝紹統之三日陛辭南奔情事未伸卧疴滋久荷皇帝神明不遺舊學博采薦章特以講讀事召起於海上將處以翰林春坊之職未及國門再遷祭酒知遇兩極感愧交深雖許身之義徒明而經國之猷彌逺也是歳秋七月重理講官遂首被恩命龍羣在列牛背甫來方切戰兢㒺知攸措蓋嘗屢上文華仰窺聖學憲天法祖崇古右文堯舜以來之統緒信有傳矣宛然身遊唐虞與夔龍輩相揖讓於一堂之上也加以天縱聖神威顔咫尺奔趨莫及進退踧然又凜乎隕墜為懼每於供職之次聊述短篇皆因事而選詞積成數首雖不足以鼓吹休明用存一代故實云爾松江府志後序正德壬申冬十月松江府志成深從今守内江喻侯讀之曰松江以水為郡其齒聚繁無名山茂林之固其利百榖漁鹽為大東際於海西下諸湖其害亦惟水為大此古今大較也物產之盛衰人文之髙下習尚之隆替則因乎時大抵一世而變或百年再變亦或有數年之間而屢變者皆不可無示後來顧耆舊局於見版圖具其數法家修其文説者騁其辨其指殊故其辭畧務欲博綜一郡之始終使百世而下徴文獻觀理道者有要約焉此志之所由以作其體重矣翰林學士顧先生頗因舊志㑹萃成書數年于兹而郡事屢變守又屢更矣乃克成於喻侯稽古右文之日其厯時之久也若此其用力之勤也若此是可謂博綜一郡之始終而文獻理道皆於是乎具昔先王之經理天下也既因土宜以辯國都又以精神之運以底定民志而其不可傳與不可不傳者則又筆之書以示鑒戒六籍所載皆是物也而禹貢周官固有志之體矣惟松才轄兩縣貢賦一志實甲天下程其土力或不足獨以民之勤力苦作以給之而後已顧屢變之餘有難終恃此任世道之責者所宜念而亦侯意也深忝以文業從學士後愧菲劣無能為役乃得論次所欲言者附名其末豈非幸哉豈非幸哉送楊拙菴都憲總制兩廣序夫所謂名臣者有二人焉竢之以歳年試之於中外考其位不滿其徳蓄其才不究其用天下之人惟恐其一日不為宰輔也夫是之謂望其先世嘗有大人盛徳之士勲著于朝廷澤及于天下後世饗其成則思見其人思其人則必求其子孫而樂為之報也夫是之謂世二人者之於人國也所至而功業隨之矣蓋養深則發盛培厚則植蕃故曰皆名臣也雖然才未必望望未必世是故以賈傳之於文帝迄於不遇而絳灌之屬當國房杜之於唐勲業盛矣而後嗣之賢者無聞若夫才矣而望望矣而世兼之豈非今昔之所難者哉深竊觀之重望世德之臣必出於久安長治之後故孟子之論故國曰非謂有喬木之謂也有世臣之謂也然則從容養望以當功名之㑹承藉家閥以引長君子之澤士大夫之榮遇固也而亦孰非國家之福哉惟我聖明重熈累洽百六十年於兹矣是宜有世望之臣者出若今右都御史拙菴楊公固其人哉公建安人也而先太師文敏公之曽孫文敏公厯相四聖佐成太平名在華夏事在國史百世而下思見其人而不可得者也公夙承家學早掇巍科遍佐銓曹迭貳常僕遭權姦之忌出牧視學迂廻于外召尹天府遂陟少宗伯復自南都入掌寅清之職再轉為少司徒總國儲偫繼督餉于西邊方其時天下之望咸屬公焉凡有要地必以擬公或進擬而未下及是兩廣總制之臣闕在廷大臣合辭推公上以公為右都御史賜璽書以便宜從事公上疏辭焉復下制褒嘉且贊之行天下之人或又謂公之未盡用也刑部郎中林君德緒合鄉宦之在朝者請為公贈于陸深深無似嘗於班行之末望公眉宇退而槩于所聞以致景仰者有年矣其敢辭惟公才無不宜正氣直道不肯少貶以自徇平生憂國如家所至必重是行也奉上德意以副羣情之望特左契耳惟我朝土宇之廣前世無比顧西北東南時有邉警籌兵撥餉其事至重也昔太宗文皇帝親征西北大建廓清文敏公實從之行最多贊畫今天子又付公以東南之任則是我國家金甌形勝之固其於楊氏之祖孫尚有賴哉且天地之理有定位氣化之運有順序故治常始乎西北而成乎東南也深竊以是為公頌言之且以為國家賀謹序一泉文集序都察院右僉都御史巡撫山西提督鴈門等關清苑王公既卒之六年冢子某來同守松又逾年始捐俸刻其遺文而懷慶集山西集先成嘉善集太常集户部兵部兩集與别集皆計工力次第告成冠以誥勑尊聖製也乃若名公碑板一時哀挽之作更為一集附焉總之凡若干巻而王氏之文獻於是乎可考矣某以深嘗知公屬為序惟公之學其大者在經綸康濟時出緒餘以為文章典則爾雅有作者風故起自科第咸中髙選亡友後渠崔公昔在翰林最慎許可每稱公場屋之文語在墓誌中今讀懷慶集中量地均糧諸或問則杜君卿李泰伯之諳練也山西集中處置宗藩修舉邊務則賈太傳之通達也奏疏諸集則陸宣公之流亞也兼兹衆長公誠天下士哉惜也未盡見於世年僅五十有六而止嗚呼此某刻書之志也悲夫公幼有至性不妄言笑私居嚴若神明當官􅊩事奮發直前不惕勢利有肅清寰宇之志歸自山西不問户限外事稍暇則讀書綴文以自樂髙介特立尤不喜浮華脂韋之習故與世若落落然教子甚嚴身自為範故某懋承家學柄任伊始仲子閥積養待用彬彬然中原文獻足光文忠之後矣雖然有一家之文獻有一代之文獻一代之文獻繫乎時一家之文獻存乎後何則唐宋文獻韓退之歐陽永叔實當其盛而元和慶厯之治麤有三代之遺風此一代之文獻也文中子講道河汾步趨周孔而中説之傳則福郊福畤與有力焉此一家之文獻也自今觀之公所樹立奚讓韓歐而𢎞治正德之交實我朝太平之極王氏世代不乏賢而某兄弟視郊畤輩或過之嗚呼斯集也固一家之文獻而一代之文獻亦於是乎可考矣故序壽唐龍江憲副六十序提學憲副龍江先生唐公以乙未生是為成化之十有一年也既而舉丙辰進士是為𢎞治之九年也正徳初年召為給事中改為員外郎郎中再遷為按察副使奉璽書專督學政於江西當己卯庚辰之際遂謝以歸今嘉靖之十有三年是為甲午而公亦己六十矣養深而蓄厚清夷精明之氣若歳寒松栢壽徴也天下之人識與不識咸稱公為有道之士深聞有道之士嘗以身關國運惟我皇明列聖開基挽囘淳和之氣迨于憲宗之朝昌大濃郁至矣孝宗御天以大聖人之德鼓舞一世才俊懋焉武宗繼體則重熙累洽之日也今上皇帝道冠百王身致唐虞之治四朝全盛皇乎休哉而公以生成出處一身當之天下之人不待列表譜圖而後知公為有道之士也深又聞有道之士常以身關世運惟公出自名族德器夙成於凡天下之書無所不讀而浸潤於義理故少以文章名世一洗膏梁綺紈之習而畱心當世諳練閲厯富有經綸之具故早以功業濟時晩乃以亷靜勇退之節為天下倡一方習俗之轉移往往繫公嚬笑間世風為之一變天下之人不待及門親炙而後知公為有道之士也自古有道之士在一鄉則一鄉重在一國則一國重在天下則天下重在朝廷則朝廷重在家庭則家庭重重斯敬敬斯愛公之所履愛敬萃焉故南山之詩曰樂只君子萬壽無疆言有德者必有壽也夫德至於樂其德盛矣公焉徃而不樂哉然世之知公者謂公咏歌太平之日長黼黻皇猷之日淺以大道引長其年算而仁壽海宇之責未副身犯天下之大難有隱功於社稷而絶口不言徒退處於不争之地而忘曲直是非之待我而定也有竹頭木屑之才而方怡神於浴沂風雩之地是故天下日望公之起也日望公之起則日願公之壽日願公之壽則為公祝者且日至矣而况於姻黨乎今之六十又一初也是公一身之所關復有天運存焉詩人以來未之有聞也十二月廿有八日是為懸弧之辰顧君世安徴言為祝深適還自江西將為關輔之役念予三人者兄弟之異姓也而相知實深於是乎言雖然亦天下之言也謹序儼山集巻四十五
