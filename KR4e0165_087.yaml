body:
  text: 儼山集卷八十七明陸深撰題跋二跋劉都司家藏卷右卷所錄今四川都指揮使司掌印都指揮同知劉公永昌之大父都督僉事劉公諱紀之手筆也紀際遇聖神細大必書其中禁廷秘事有可以備史乘之闕者永昌攜至蜀司裝池完好間以示故史官陸深深諦玩累月仰見先朝之禮意欵密與前輩之敦朴縝愼皆有後生之所不及聞者起敬起慕之不暇况為劉氏之子孫者哉惟我英祖復辟一事有大功於宗社子孫都督公其功臣之一也永昌食其報思為忠臣孝子與國同休以光門閥固宜視此為至寳永昌武舉鼎魁直言義氣為今上皇帝所親信天下之所共知者其勲業正未可量又將傳之子孫為大訓也深竊聞景帝不豫時中朝大臣相約具封事上請迫於燈假未及投進明日上元四更而南城之事舉矣疏稿留在禮部尚書姚文敏公䕫家後姚以示郎中陸昶今觀此所記乃為正月十七日當以都督公為據從實也跋羲獻六十帖此帖予次平定白二守應衡鎰所貺曰此出楊州高氏高少卿頴之淓予兩試同年又同為庶吉士頴之得此石於京師時予嘗與王欽佩共閲之蓋金城黃廷臣先生所為石用端溪紫稜而潤模勒皆工亦近時之佳刻而已損動若此廷臣名諫蘭州人嘗為翰林學士以事出為知州先生究心字學别有從古正文行世帖中釋文跋語蓋手筆也夫篆生隸隸生草草生楷故楷寫草草寫隸隸寫篆章草多存隸晉唐間人毎於楷中兼草體雖不同而法各有辯也先生好以古偏旁附麗楷法不免過奇如此帖釋文於草書亦時誤讀間為校定數字然今世書學亦豈復有斯人哉為之感歎因跋其後再跋羲獻六十帖予復得此帖於應衡諺云琴聲難學而易忘予亦謂此寡好而易壞正不厭其多也歐陽文忠公跋雜法帖云老年病目不能讀書又艱於執筆惟此與集古錄可以把玩而不欲屢閲者留為歸頴銷日之樂也文忠大賢愚不敢望萬分之一而病目廢讀既已有之潮田精舍與長林修竹在三江之口者恐不減頴上行將歸矣當有此樂又曰物維不足然後其樂無窮使其力至於勞則有時而厭爾然内樂猶有待於外物則退之所謂著山林與著城郭何異宜為有道者所笑也則其言深逺矣因併記於此以自覽省跋郭熈長江萬里圖此卷長江萬里圖為張夏山大叅所藏予於京口見米元章澄心堂紙一卷筆力奇恠有意外象家居時吳人持至一卷夏圭墨氣古勁可愛此卷則規模郭熈而平逺清潤有不盡之趣宋室倚長江為湯池故當時畫手多喜為之卒不能守而鐡騎飛渡矣乃相與為之浩歎夏山家金華山中景物絶勝而宦囊半貯此物將行住坐臥不離耶復相與為之大笑跋宋刻絲作樓閣右刻絲樓閣製作甚工世所罕見也諸物種種咸可辯識庭下花一類頗似今八仙狀豈古瓊花耶予欲題曰揚州看瓊花圖以歸表弟顧世安藏之世安博物好古良是予言嘉靖庚寅予為晉陽之役三月三日渡江泊𤓰洲候風北望維揚城郭咫尺不知古觀新葩視此竟何如也舟中一再展圖聊記於諸作之後跋趙子昻臨張長史京中帖右趙文敏公臨張長史京中帖筆法操縱骨氣深穏為眞迹無疑且不用本家一筆故可寳也聞公嘗背臨十三家書取覆視之無毫髪不肖似此公所以名世也觀此信然嘉靖九年禊飲日跋於舟中跋張翰宸書右小楷宋清傳一通行草玊連環歌一通南翔張翰宸先生書姚文光炤所藏裝池成卷以示予二文皆醫家言而文光亦好書習醫故尤愛之翰宸嘗署嘉定校官國初以能書名在宋仲溫陳文東之間今觀其行筆用鋒楚楚有法前輩自可想也夫書學必窮㸃畫波磔之妙方能成家其猶醫也必知望聞問切之道乃可濟世諺云學書止於廢紙學醫將至於廢人嗚呼可不慎哉文光其寳之跋東海草書卷二首東海先生以草聖蓋一世喜作擘窠大軸素狂旭醉震盪人心目而此卷矮紙疎行尤擅清麗明窓淨几之下娛悦襟抱者不少况詩律㪚語俱有關繫處不但其子孫當寳之也後有吳文定公為陳冷菴跋識蓋冷菴所得今為先生之孫敷善所收祖武手澤不但尋常所當寳之書畫也冷菴名琦字粹之罷察官歸至口食不給予少時猶及識焉清癯鶴立望而可敬又聞文定公起嵗貢先生獨識之曰嵗貢中亦有此人耶遂以狀元及第卒為名臣五六十年前先生風範如此最後東橋顧華玉衡山文徵仲文翰有法皆吳産也語云魯無君子斯焉取斯深於是為之歛袵敷善其尚寳之敷善名其性後樂先生之長子涵養粹深慨然有求道之志又不但以辭翰世其家而已此卷柬札皆後樂先生所得於交游者末有二柬一則與龍山大諫一則敷善所得可謂一家之文獻足徵者矣卷中皆一代儒碩鉅公予之師門在焉餘多常同朝而敬事之者有不及識無幾亦復名流抑亦一代之文獻足徵者矣顧其所言不出寒暄問訊之常禮而敦樸和厚之風藹然可掬予生也晩三復於此為之感歎因題其後歸敷善藏之跋十七帖右修内司十七帖予偶得之友人敗篋中帖首填損三行毎行舊有藤黃旁注細字再為表工抹損然拓手甚高真所謂薄雲過青天也余諸帖惟此最古最佳最先得故余尤最愛也再跋十七帖右十七帖不全石刻在關中近時蔣侍御伯宣亦刻石於吳下顧不若此刻猶存拙意也黃伯思亟稱此帖為書中龍蓋妙在行欵耳此本行欵當為模勒者展促亦失之矣昔唐太宗購二王書右軍書有三千餘紙取其迹以類相從率一丈二尺為卷此帖亦一丈二尺凡百七行九百二十三字余收有淳熈修内司帖一卷行欵正同後復得趙松雪對臨墨蹟皆神采煥然可寳也往時周府東書堂晉府寳賢堂各用入刻皆不復知此矣漫記於此再跋十七帖此十七帖張都憲西野先生自京師寄入成都行欵模勒皆有古意但中作蘭亭圈塗又是一刻末亦少數行跋溫泉石刻乙未初夏予入關浴於溫泉起覽諸石刻命拓數種此華清宫詩與今所行三體唐詩前二句數字不同疑當從石按杜常字正甫本宋元豐間人據此刻明甚伯弜精選不應開卷便譌甚矣編纂之難如此此帖字畫亦佳跋東書堂帖予聞東書堂帖舊乃石刻據此跋則木帖矣王槩後官理卿至刑書諡恭毅借搨時重修之已非初帖矣再跋東書堂帖此跋則成化辛丑重翻本予道汴間見貽者則又重翻矣每翻毎下有宗室號西亭者好文學為予言定王初刻帖久亡之憲王别鑄銅作帖為定王埋蝕世復鮮傳聊記於此再跋東書堂帖昔人云蘭亭無下本本勝也此東書堂所刻二王帖往往有姿韻因剪裝跋師山集川貴叅將孫君仁自徽來赴任由香溪覆舟僅得免其鄉人鄭君廉宜簡以此集侑椷至孫君尚手濕封投予予命童熨帖之裝為四册師山集國初有大字本新安再縮小刻之此刻頗精宜簡所為也宜簡為師山後人往年嘗持其遺令手藁至翰林予為作跋此集别為編目錄置之卷首蓋法當爾跋李蒲汀尚書所藏鴈山圖東橋先生自桂林瀟湘來守台游此山以為奇深自武夷三峽還朝見此圖亦復以為奇也蒲翁端坐廟堂以極臥遊之趣八荒一闥殆此類耶跋李昇出峽圖是卷雪景山頭皆襯金着色法度森整而筆墨清潤極為精工心知為唐人之作而卒未能定其名氏舊有籖題小李將軍紙最古而字畫草率因未之信予購得之京師間示知畫者以為當出王摩詰予家所有王維雪溪圖并小幅鳳舟圖與此皆不類又曾見輞川圖與高士奕棋小幅惟奕圖用筆與此同因題為王摩詰而褫去舊籖見者同聲以為摩詰無疑間居以來校勘頗勤遂定為李昇出峽圖云昇唐末成都人也初得法於李思訓思訓時號大李將軍其子昭道號小李將軍皆唐宗室至昇畫與昭道並譽故亦名小李將軍載在宣和畫譜者論序如此乃知前人題識雖小亦未易輕也又按畫譜記御府所藏昇畫五十有二出峽圖在焉流傳數百載而完好如新意必經好事之手或有神物呵䕶以至於予大抵法書名畫所貴收藏茍存憲古藝游之意其於檢心畜德未為無助彼徒以為文具玩物則喪志之戒攸在吾子孫其念之宣和書畫譜皆出蔡京之手其識鑑自繫人品已難盡據至稱昇筆意幽閒清麗過於思訓往往誤為王右丞者殆有自來云觀於是卷可以神㑹矣跋唐人䨇鉤大令帖書學至於臨摹鉤搨能事畢而藝斯下矣雖然其法亦漸不如古若䨇鉤惟唐人最工嘗見歐虞褚薛皆為之此卷獻之諸帖是白麻紙紙盡處有御府法書印蓋宋思陵時物也其為唐人手筆無疑舊藏王寧駙馬家識以承恩堂駙馬都尉永春侯圖書二印按寧建文間駙馬以罪幽於家永樂改元始封永春侯帖後跋云嘗購得唐人䨇鉤羲獻帖各一卷羲帖亡而此卷存付其長子藏去又囑以深寳愛之當時勲戚好尚如此予在長安愛其舊也收得之庚子九日題跋商父乙鼎右鼎得之京城考其尺度量容與商父乙鼎皆合銘文三十字都完第宣和所圖則腹著饕餮而間以雷紋豈識同而欵異耶古人有製數器而秖用一銘者然余尤愛此器之渾素厚重也因託林君翔之寫之而郁宗周作圖如右跋蕩南詩蕩南朱先生君佐舉𢎞治丙辰進士令歙最有聲稱予聞之鄉同年王仲錫知其政事如此亟相慕焉自後宦歴參差無緣納交惟時往來於懷而已嘉靖丁酉予自蜀藩召為光祿卿四署多才士不下三十輩而獨以朱君守宣為奇已乃知為蕩南之子也守宣一日出此册予讀之文學又如此時先生年已逾七望八任眞率物蕭然物外若神仙然因歎前輩之不易及而重愧予相知之晩也因書其後命守宣寳之跋韓熈載夜燕圖圖畫本以資游息至於事端波流之際則有鑒戒存焉故善惡之跡皆君子之所不廢也此卷所圖韓熈載夜燕其事至不足道其描寫景物意態備盡委曲一展閲間令人可喜可愕煩心滯思寧不一灑然耶介谿先生舊藏此圖今位秩宗佐聖天子議禮制度身任繁劇當其繼日待旦之餘所以宣湮塞而通高明其亦有取於此也夫其亦有取於此也夫古銅印章跋今宫保太宰松臯先生許公之為司寇時也得古銅印一紐於閻伯仁氏閻得之邠人之闢地者其文曰廷美之章與公字正同古今人名字相同理或有之顧隠見之時若有異數存焉士大夫之博雅者並以為公瑞少師大學士桂洲夏公題之曰神錫金符紀瑞也鵲化龜顧古固有之兹豈影響之麤已乎公摹其文圖其形裝池為卷間併印以示深按印者信也古公私皆有之其製金玉銀銅凡四品惟天子曰璽丞相列侯御史大夫二千石已上皆曰章千石已下則曰印晉志亦載相國太尉御史大夫皆金章金銅古蓋同稱云是印銅製板紐有稜紐下有池方寸餘而小篆朱文若私印然而命之曰章豈其人嘗通顯為公侯與惟朱文入印實始於唐而漢器物銘多作陽識是印填繆側讓具存古意殆非近世之所能為也然自晉唐以來無廷美顯聞者而竟歸於公將神物預擬以有待耶是未可知也惟公父子兄弟皆位公孤而宰衡之典若合符節重以碩徳宏材被今天子特達之知雍容廟堂陶冶一世之人材朝廷之美家庭之美身兼有之是印也豈聲稱之同已乎謂之神錫固宜聊記於此以符封拜之兆云跋邊伯京草書千文書法弊於宋季元興作者有工而以趙吳興鮮於漁陽為巨擘終元之世出入此兩家是卷千文為邊隴西伯京書自敘出於漁陽結構甚密波瀾煥發殆未易優劣也按史元順帝以至順四年六月即位改元元統凡二年乙亥則重紀至元凡六年辛已則改元至正不知何以復系至元於辛巳耶豈作是書時乃正元之日而逺方尚未知改元耶石抹元之宦族仕浙者尤盛景良未詳其履歴此必伯京寓浙時為書耶自後數年而元亦季矣我朝三宋者出追踪魏晉開一代書學之源而今賢才輩出駸駸古人矣鄭思齋啓範得此卷持以示余為論文翰與治化相通者若此思齋治理文章直欲等秦漢上之顧於此卷欣賞焉異日當軸取人之善亦若焉可矣跋所書黃甥良式綾卷黃甥標字良式予赴召侍予北行及赴調又欲侍予南行至杭予辭之以此綾索書舊作舟過嚴瀨行青山中如畫不覺盡此嘉靖己丑七月廿四日儼山轉拙翁儼山集卷八十七
