body:
  text: 儼山集卷六十七明陸深撰墓志銘六太學生竹溪唐君墓志銘嗚呼此竹溪先生唐君之墓蓋從其先塋金匯之阡以嘉靖癸已十二月十有七日乙酉問豫銘藏焉豫始舉進士讀中祕書僦居西長安里與禮部郎中西園唐公實連屋是時吾松之宦于朝者故禮部尚書南山張公為光祿寺卿直文華殿禮部尚書東江顧公方侍讀翰林大理少卿中岡董公在刑部今肇慶守宜菴董公在禮部故中書舍人沈公繼昌侍內閣鄉好甚洽無暇日無相過從公長者也而㑹尤密豫既近居復與公之從叔宗禹同鄉舉故相好益歡公既病豫候問益數數焉公竟不起豫哭之益哀且填其行狀而竹溪方自家來奔以兩旬日行三四千里人愈憐之而豫始識竹溪年少又長者也豫屢産子皆不育年且四十始得楫豫早夜心計之安得積善好修如唐禮部家者婚焉以延豫世㑹聞竹溪有女往請焉而諧乃大愜豫既忤時再有晉陽之役時竹溪搆疾矣還遽哭之尚冀或臨其葬及是葬有日矣豫復為豫章之役遂不得往相其紼嗚呼吾尚忍銘吾竹溪哉竹溪姓唐氏諱儒字子魯尚書禮部郎中唐公諱禎字原善號西園之長子也母劉氏贈安人世居華亭之白沙里其先汴人系載少師大學士東湖費公西園墓志中西園多竹有水環焉竹溪因號以識先澤自少頴敏動以禮間服飾器御敦尚朴雅年十四母劉安人卒毁瘠幾殆嗣喪陳安人如劉安人再喪王孺人如陳安人西園公舉成化丁未進士家食久被命入朝竹溪奉世父北園公總家事以居北園公特鍾愛焉讀書郡城中攻苦淡學以大就每從郡邑諸生試諸提學御史每優遇之每舉於鄉輒不售正德戊辰應例入國監時弋陽汪雙溪先生為祭酒復優遇之自國監再舉再不售乃卷懷以歸以家為政斬斬有法孝弟之風洽於鄉閭先是西園卒二弟侃價幼竹溪撫之各有立遂將建室植産以居之布散聨絡有恩有禮一時端人正士咸重之樂與之交有勸之仕者則曰吾家世受國恩吾敢忘吾忠藎顧出處自有命也乃即竹溪之上修西園堂刻遺稿以庋之又築徑節之亭以見志益樹竹數畝濬流其下時復徜徉若與漁樵為侣客至則飲奕欵晤備有煙霞水石之勝故吾郡東稱舊家必以唐為第一而唐之象賢亦必以竹溪為第一云家居自奉甚約力田教子外絶無他慕四時享祀必敬必躬嘗有六世祖塋就廢既卧疾耳語價曰成吾志者吾弟也手數金使修復之乃完以嘉靖壬辰二月十有八日卒於正寢享年五十有二云惟竹溪君天常甚厚無嚴聲厲色嬉笑話言藹藹有旨趣飲酒至百杯而能不亂倉卒應大事靜以鎮之觸物有可傷無間古今疏戚即淚涔涔然下殆仁者與初弟侃早卒無嗣即以子自重後之繼而自治生乃以自治易自重人以為合禮而自重復夭竹溪委曲其間能使朱氏婦有所恃以完其節人以為達權宋氏甥早失母竹溪撫之如女既長以歸張進士鳴謙人尤以為難云配張氏賢而克相即南山公之從孫子男一即自治聘沈進士服采之女進士中舍之子而學士之世嫡也女四長適董希大於少卿太守為從祖次適顧應雲即東江公之孫也又次適陸楫又次許聘何應鰲按法宜銘銘曰仁不必壽亦既有後厥所施張百不一偶有質有文且創且守豈間家邦曰唯孝友東海所匯長江抱右生直死哀自足不朽天道無私發豐蓄厚嗟嗟竹溪抑又何負唐處士夫婦合葬墓志銘徽有處士先生行誼在宣德正統之際曰唐邦仁諱禮年四十卒在天順之壬午越五十年正德己巳之嵗其配仇孺人年八十有六卒其子封文林郎知縣傑卜以某年啓而大封以究孺人同穴之志禮也其孫澤方事今上為刑部郎中乃於京師乞銘於深深讀本朝御製至五倫書顧見髙廟駐新安時召耆儒與論理道有唐仲實先生者以不嗜殺人對上恱賜尊酒束帛心竊慕之至是受郎中君狀先生實處士曾祖也按唐本氏李有諱虞號梅癯者後於唐遂姓唐本德宗之後或曰國姓也世居汴宋南渡時諱承昈者守新安因家焉故今婺源之嚴田有池曰飛龍橋曰太子云髙祖諱元為關洛考亭之學虞文靖公集以前輩風範稱之仕終徽州路教授曾祖即仲實公仕終紫陽書院山長祖諱子儀舉賢良知興國縣文廟選為趙府紀善父諱永吉以詿誤謫戍卒於邊時處士年七嵗張孺人母之少明敏能讀書旁及星歷之學性孝友痛父之寃也故竭力養其母如父事三兄禮如事其父後當析居地有右者術云不吉處士曰吾也少當居是雖諸兄亦莫之能强也邑嘗置監長平倉出納維允鄰有汪姓者匿其産於他戶以欺之於異母之弟處士發其籍曰骨肉至是耶且使百世爭也釐正如故友人有喪明當赴之薄暮雪深别卜葬期來告處士已三鼓冒雪往矣居嘗曰吾唐世文獻新安之稱必曰三唐先生至吾而遂微乎乃以為任數年而姪行相繼取科第為監司郡守者三人處士有力焉仇孺人諱誠歙舊族也處士卒時諸孤㷀㷀長才八嵗季猶在妊而貧窘甚父母憐之欲其就食於家卒不往冬寒絺幃雪時綴裙布為被以體溫諸孤而環之處士厝所僅百武而東雨時輒往庇淚與雨俱注張孺人在堂方有幼子之戚損食復還泣事之聞者悲其志云邊戍嵗有征索甚嚴或勸鬻産自念曰吾所以不死者守此以俟諸孤耳諸方營辦業竟無損季子祿客死汴仲子瓉復死荆襄二婦皆守節如孺人云嗚呼唐處士之風槩使天假之年或得用於世其所樹立何如也可謂刑于寡妻至于兄弟者矣惜也蚤卒而孺人乃後五十年以扶植唐宗蔚為詩禮以成處士之志譬諸邦國可謂得忠臣者矣子男三長即傑娶洪氏封孺人次瓉娶張氏次祿娶王氏女二長適鮑璋次適方烈孫男四溥澤己未進士任刑部郎中漢濓辛未進士任南京太常寺博士孫女二曾孫男六銘曰同室則短同穴則長惟丈夫之烈惟婦之良沈此雙璧某山之陽綿綿奕奕以長發祥誥封宜人陳母黃氏墓志銘陳母宜人姓黃氏世居餘姚通德鄉之竹橋里父諱海字伯川仕至福建建寧府教授方正行古道世稱朴菴先生母某氏宜人故中憲大夫湖廣襄陽府知府虛齊陳公之配也初虛齊筮仕河南彰德同知滿三載赴吏部書上考封及兩世由是父慎菴先生諱某得誥封官如其子列秩為大夫母某氏為宜人而黃宜人從夫貴顯年六十有七正德乙亥考終於正寢既葬仲子熺奉太史李君本之狀來請銘深往嵗以翰林編修奉使過浙江謁謝文正公于里第從其子今少宰學士汝湖先生昆季間得聞虛齊之風既教國子熺肄六館每試諸生熺必居首同年倪小野在禮部為豫道熺之早服母訓也復知黃宜人之賢熺遂以禮經舉應天鄉薦豫閒居海上熺輒來問學熺母之銘豫曷敢辭按狀宜人生而貞靜自幼孝敬動止皆有法讀孝經列女傳即通解女紅中饋之事咸精工朴菴夫婦鍾愛之朴菴與文選陳靜菴先生交甚契靜菴者慎菴先生弟也靜菴先生復鍾愛虛齊一日請於朴菴曰吾猶子佳先生能以子妻之乎朴菴曰諾靜菴以告慎菴乃命虛齊壻焉時朴菴任江西樂平教諭明三禮為一時經師虛齊偕宜人往事之因受業焉宜人內贊力且勤虛齊學成慎菴喜每見靜菴必謝之曰得此佳婦吾弟之力也吾門其興乎虛齊别籍於寧國之宣城以成化丁酉舉應天鄉試捷至餘姚宜人曰差以慰吾舅姑望耳丈夫事寧止此耶虛齊五赴南宮宜人復勸之曰此行勉之二親年髙得逮祿養進士第亦等耳况功業又不係此虛齊心是之已而果就銓試髙等得同知彰德府宜人從之官為內治政門鑰肅然虛齊之政大有聲九載遷貴州思南府知府宜人在任嵗時必手製衣履以為舅姑壽既乃聞宜人之訃從虛齊奔歸治喪如禮虛齊起復知湖廣襄陽府宜人始留奉慎菴於家益孝且敬事宜人尤極委曲宜人兩目苦翳步履恆艱宜人出入必扶持之病或增手調湯藥至忘寢食處妯娌間情意尤洽舅姑所遺多讓諸叔伯同居三十年無間言嵗時祭祀從虛齊行禮潔修感慕無替虛齊好交游賔賢宴集恆脫簮珥以佐飲饌之費性惡僧尼有募修梁道者必以錢米施之不吝有來售産者慫恿虛齊厚償曰吾子孫且享之此亦隂隲也僮僕輩事貿易戒勿取贏曰爾毋招怨也日攻紡績事或勸之自便則曰處貴顯以事逸樂使子孫效之敗不可救吾用以為戒也性不喜華侈至育子女必節其服食曰吾欲為汝等積福耳教子睦族賙窮恤匱義方尤多平生鄙婦人失節事若婦人即病或就醫診視亦羞之故雖得竒疾亦不好藥石偶患足瘍七日而卒實三月某日也子男三長爟娶某氏興府引禮舍人贈四川鹽課副提舉次即熺娶某氏沂普慶三為知州俱有聲方向用未艾燦益府典膳女一適倪贄即小野太守之子二皆庶生孫男七曰璋即提舉曰文魁潼川州判官次曰垚曰莊曰垹曰垕曰完孫女五曾孫四葬以某年月日卜吉於姥嶺山之陽惟宜人出自名族歸于宦家培養之基素厚而師資之地固殊故善譽叢焉以豫所聞焉槩之良是法當銘銘曰有菀者園其核實繁室家之詠采蘋采蘩禮始夫子棼以從類子以母賢妻以夫貴懿哉宜人展也不朽夫有賢婦子有賢母土深水厚鬱鬱芊芊視我銘詩後千萬年范時修墓志銘范光湖之上厥縣寶應有君子焉余不及識其人交其弟不及見其生聞其死順以事親稱其子也文以起家成其兄也澤以惠宗廣其仁也是三者皆適於壽之道也而竟强年以死嗚呼悲哉君姓范氏諱新字時修大父禮隱德弗耀父畬宣義郎母刁氏兄弟四人君最長其季韶字時美者余之同年友也癸亥嵗與俱遊南雍挹其文學固疑有所從來也是冬訃至時美號哭旬日不能仰視客余往弔焉竊怪其過於為禮也乃知時美能詞章取巍科其師師之其友友之纎悉皆時修之力也嗚呼兄弟之間人所難處也友于屬恩訓成屬禮禮勝使人鮮歡恩勝將枉其才而廢之也君成弟之才而致弟之感以恩以禮可謂兩得之矣由是觀之則其平生可槩識也君性急而心坦能談論好以氣勝人識古今器物頗留意法書名畫又工排律詩尤能幹家植業佐其父致富然未嘗畜一錢私産也宗黨有貧乏者即量給之或不及白其父父終不以為專也及死之日啓篋笥惟存田糧驛站馬草數目父愈憐之嘗自歎曰不知醫非子也由是博覽醫書又曰惟名與器可以榮人重王命也㑹朝廷有納粟例即入資拜其父為郎官雖非父志以其孝而安之教他弟各業其業恩禮視韶其為多類此初娶同郡張二守之女早卒繼娶張二尹之女生一子曰嘉謨一女曰二姐俱幼疾已革父母問之無所言强而後曰吾三弟奉吾親吾二息依吾親吾無恨也獨眼中不見吾韶此為介介耳以某年月日卒年至四十有一卜吉於某年月日祔於官莊祖塋之側余不容辭時美之請遂按狀而銘之有愧而生孰與夫死之寧無愧而夭曷害其表表嗚呼時修魄祕靈遊處士鄭可齊墓志銘鄭生舜功再至京師凡三閲寒暑往返萬餘里乞為大父可齊銘其墓可齊豫故人姓鄭氏名廉字宜簡可齊其别號也為人磊落好義舉名卿大夫多愛之尤重然諾雖千里之赴不失時日豫之謫延平也可齊相豫行尤勤故豫尤德之以嘉靖十八年正月十三日卒于家得年六十有六云按歙之鄭族最盛最舊有師山先生者諱玉以死節著名諱得韶者以行誼聞一鄉故歙有善述堂可齊之髙祖也曾祖孟寧祖文修父成大號鹿門遺隱母汪氏可齊生有美質清修博雅操觚為文翰不下儒者諸技能精巧要妙凡出其手者雖名家或未及壯齡服賈遊吳淞不屑屑於刀錐之末而意氣豁如也歙俗健訟以必勝人為能正德間為鄉人嫁禍郡太守遂當以大罪而可齊實他出無與亟走京師聞其事於朝乃械繫赴御史臺種種白其事盡釋自姑熟馳三旦夜抵家跪父母前曰兒無狀幾驚二親兒罪獲昭雪矣人尤以是服其勇且能孝云配許氏有賢行子男一思宏娶某氏先二年卒孫二舜功舜勛茲卜以某年月日葬某山之原惟我皇明治安日久而津潤滲漉沃被土膏故大江以南號稱殷富歙據上游山谷深固尤多故家大族子弟之賢者習為容雅輕財貨好施與然咸負氣英英然其過也往往陷於剛折可齊能巽順以自全不辱其親者矣可謂故家大族之子弟尤賢者非耶豫竟悲焉為之銘銘曰千章喬木扶疏枝柯氷霜澗壑摧挫奈何貞士宜簡保護實多慶延於世其廕則那銘以永閟石也不磨李先生墓志銘先生姓李氏諱文字尚文處之縉雲人也李氏之先出溫之獨山自獨山而徙台之仙居曰李村又自李村而遷縉雲則生一府君也府君於先生為六世祖元末時為美化書院山長云祖諱襲字秉憲贈刑部右侍郎考諱檜字宗堅妣湯氏方氏實生先生少有美質補邑弟子員績學攻文綽有聲稱胡公某提學浙省以理學為已任每試必加奬譽然每不利於場屋例當貢禮部遭宗堅府君喪又遭湯夫人喪而生母方夫人又喪積哀成羸適同宗人又以事挾制先生使卒不得志乃歎曰吾命也夫當吾病與家釁㑹也遂理菊莊别居以自娛日以教子孫為事而凡已成之學遂不及一見之行嗚呼惜哉大江之南俗多貴其所生而以側出者為左雖年之長在亦略焉必克自振立加人數等僅僅與嫡出者比然亦背毁而心輕之甚弊習也初宗堅府君遘疾彌年先生侍左右最謹府君曰汝孝敬如此吾死之後必歆汝饗汝汝宜承吾祀事且以長宜亢吾宗也先生泣受之後雖屢遭流言之變惟事包荒而兄弟之間恩義日篤人以為難𢎞治間鄉人疫傳染甚酷雖至親莫相援恤者乃為市藥囊米哺之瘳之全活頗衆正德戊辰嵗饑又為出米穀賑之凡活數人有願出身傭作以報德者為謝而遣之里人有負財者顧以他事見誣當道得其情論如律先生憐其貧乃日給之食徐白公庭而出之其行誼多類此以某年月日卒於正寢享年闕配羊孺人出四川望族婦道克修為族人法以某年月日卒享年闕卜以某年月日合葬於黃坑之陽子男四曰需曰頥曰蒙咸克厥家曰升舉𢎞治辛酉鄉試息女一適虞邦瑛孫男十四擢試昻直忠洪臣相光選亨時元久孫女三深昔遊南雍得與李君升交愛其文雅好學今十有五年矣深比起告至都而升亦至試南宫乃以狀來乞銘誼不敢辭夫古之君子多負俗纍孔孟所以致意於里仁之美也教化之不明也久矣若先生者明爽洞中樂善慕義豈所謂克自振立者非耶其必有後矣宜銘銘曰其成之難其尼之易胡為而致以承其前以啓其後孰匪所有不愆爾相不琢而光君子攸藏太史勒辭以告來者式車立馬儼山集卷六十七
