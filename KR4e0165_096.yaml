body:
  text: 儼山集巻九十六明陸深撰書山西家書二首從遼州出巡回省得汝書文理雖通未見長進處可用心讀書作文如今秀才難做况朝廷行揀選之例甚嚴山西處所有退百來名者進學亦甚難此中却有好秀才十五六嵗三塲文字可觀者到處有之亦有是上年科舉者吾兒自宜勉勵知汝母子俱好心甚喜慰但知汝有腰痛疾少年豈宜有此莫是跌撲來吾甚憂懸姚時望病近當瘥復吾愛此人恬静欲養汝徳性故留之吾每思難得一箇好人為汝師範若姚昭唐鑰此二生汝可延請至園中作㑹看書考文朋友之助亦自有益切不可放心使性為游戯無益之事且過今殘年明春我南歸教汝兒須以逺大自期家事一毫與汝無與最要孝弟和敬處宗族早晩奉事母親如今不小矣只此至囑此處亦有好秀才不減吾江南但十三四能作三塲文字俱通走科場者又江南之所少也得便寄數巻回汝苦用心可也餘不能盡筆浙江家書一首我廿六日已到任今打發陸鑑先回報知一路事俱可問鑑山立俟開年遣回崔來鳳先生是添註官甚閒吾兒可收拾來此講學汝母親須待二三月看此間光景座船來請也汝來須是正月半前呌箇闊頭船坐來勿使人知至囑至囑江西家書十一首我離家已兩月餘汝用功何如古人言寛着限期𦂳着課程縁汝氣體弱又有舊病須要節量讀書學問大事在養心養心先須養氣元氣充足百事可辦汝性静定有可進之資不可虚負了家中閒雜不必管接見人務要揀擇無益之事足以費日力害身心當畏之如蛇蝎可也抄回文字一册是察院試巻熊鼎臣李六峯極稱之方恩是一都司乃肯向學如此近日相姪自武當還與劉甥人竒來俱㑹于司中備知吾兒在家學業不廢并見汝書字皆慰客懐但聞崇明有警愁汝母子驚惶今日李提學來自蘇云已定疊甚喜甚喜此事自有天數也汝欲隨例出試亦好只慮汝乍涉人事出入官府勞苦不堪耳只要小心敬謹若作文寫字必須整齊有法度與朋輩交接謙和簡黙自重為上自餘家務俱不煩汝也寄回聖政記一部十二本此即太祖實録要熟看中間頗有誤字錯簡闕疑可也象筆四管收用我出巡在九江六月五日得家書始知汝考試的信但列名在四等得與觀場亦是當道奨進之意汝宜自立以無負知已也若往南京只與姚子明同船甚好館榖薪水費當一力助之其餘量力各為幇助亦是汝報其師之意也須往丹陽上陸路顧一女轎多備一二夫力擡之行李盤用江行載入城顧一闊頭船甚為方便不可於此等處惜費入城須借一僻静下處可請問顧五叔必得佳所至囑至囑落下處後宜杜門静養令精神强足則文采自彰無益之事料汝決不肯為但人事奔走與往來交際禮不可闕者亦思撙節之至囑至囑最宜擇交若浮華輕薄之士致敬而逺之不知三試録曾取下樓看併有辛酉同年序齒録否只在叢書中不曽清理付汝若得入手看之但是我同年或同年之子孫俱要致敬盡情以敘世講之誼至囑此等事須場屋畢日方可行之未入場之先且須與子明或陳子充與唐門親戚舊科舉吾鄉老成質朴者去投巻看班圗先了公事雖出口行路亦須遜避謙恭若見達官長者尤宜寡黙恂恂汝早有令名古人以為不幸須防造物忌之至囑至囑其餘事宜汝當隨事省察存心為上酷暑冗中不能一一巻面并三代脚色務要如式親書為上若倩人慣熟者寫之亦可須要一字一字對校㸃畫偏傍所繫甚重也每場各宜安放臨時仔細看詳須縫一洗舊青布袋僅取容巻從頸中懸掛胷前防衆中不測袋須舊青布者恐靛色易汙巻面也入場我有舊青三梭直身是曽入㑹試場者汝可與母親檢尋來服之且留與同孫作傳衣也褲子亦須要綴襻頸帶今年八月近寒須防風信場中過煖不妨耳要帶好水梨蜜薑用筆須試過稱手者乃濟事多亦無益也燈燭下謄真尤要仔細須再三看題目次序恐坐失格是一番徒勞耳初場七篇文字破題要整齊溜亮講股要分明切理繳束處要出新意以見精神切忌短弱作結老健有波瀾通忌晦澁中場作論於時文中作古文間架要雄深雅健最忌熟爛與套子説理文字要鋪敘義理明潤成章與作史論立議論不同格表只要餖飣圓熟須看時代若唐表只看韓栁等作宋表要典則雅麗俱須照管題目用意措詞五判畧知律意便可用事填去以通暢為上五策先要識䇿眼如君徳便須與相業相並之類只在䇿問中已含此意了認得了大頭腦便縱横説去其體方雙關文字多便好看要事實至囑至囑陳秀至始知有臨場再試之舉但慮吾兒氣體不耐許多勞苦老懐懸懸大凡世故亦要練習今是冠年矣但不可隨世毁譽孳孳於得失之間以動其中耳故令陸欽由江行來看汝欲知入場的信若不得入場便須東歸積學待時未晩也提學處因在嫌疑之際不可致書若科場蹉跎得進學亦可但不可干人薦引吾兒自當以逺大自期立志以明道希文為的在吾兒勉之而已吾鄉水土薄風俗日下須奮發激昻自拔秋來懐抱不甚佳候吾兒信為慰八月朔時文新變得險怪今科欲一洗之此人心之公亦天理亦世道關繫不小江西程文吾與有力焉近已見兩京浙江湖廣皆有復古之意可為文運慶北京録公謹寄來湖廣録多出於崔東洲之手吾兒宜觀之吾鄉文運甚厄奈諸君不聴好説何戒戒母見吾兒論吾升沈事詞意輒不平此雖父子之情却甚不可吾老矣出處進退有義有命各求得其本心而已自後見人問及但曰家父亦安之如此即了茍委曲之不惟於吾無益亦非養汝和平之福也至囑至囑所要江西文巻無甚惬意者要不足為吾兒法耳寄去數篇即此巾巨擘其不記出處者是考巻知之提學先生許抄録數篇來忙甚未得到手俟别寄葉掌教先生兩子已到省方與謀但渠根脚是上次考罰等第殊難下手未有以報也我八月初七日署掌司事要脱進場之勞至十五日科場事務又脱不得却辭了司事連夜幹辦似過勞廿八日鹿鳴宴罷更初痰氣發作甚苦甚苦是夜右臂如割亦是作團兒疼明日過南昌道中偃卧小睡後加倍痛楚至無安身處喚醫診視云是痰火且小作運動方甦自後每至三更後即痛痛即起坐掉臂日間穿衣作揖與把筆書判却似少解以此知宜動不宜静也如此二十餘日今可矣汝母之症恐亦是如此今且令人扶掖在房中走幾步或坐眠椅不可倒身貼席試之如何此病只是血虚多勞多思所致可延明醫仔細胗視請山立早晚照顧嘗見人醫血虚多作風氣濕氣後成大患盖血虚乃是不足風濕猶是有餘二症用藥不同可請問顧五叔斟酌之吾兒前書勸我求退我有何貪戀耶顧國恩未報恐兒輩坐享難消耳先欲效勞徐俟機㑹也八月廿六日主簿劉永濓自嚴太宰處附至汝書并頭場題目知汝勞苦吾意甚憐之九月十六日驛夫持書録至再知汝二三場勞倦吾恨不能止汝此行奈何奈何想今已到家不至作病否要静定養心為主至囑至囑吾十四日已見南畿試録解元乃是儒士彌封拆號豈有意必耶汝告入學又添一番擾攘恐汝因此奪却工夫汝宜自勉汝學未成未可有過望但人生出處各自有時古人云强學待問可也發周秀回為他一年在外此子似稍本分有送府縣書録一一付與吾兒裁處分送之我起居事務可一一問他汝母病勢緩急可與盤纒打發皁隸陳秀星夜先來後令桂魁一來亦得念吾兒獨學於家海濱新縣殊少麗澤之益欲告吾兒者非筆墨能盡賴兒知向上不昧於是非頗足慰老懐耳今嵗科場吾計兒曾作過幾篇恐是好尚時新體製為黜落爾且經學尚未經師講明金華姜郎中絅字幼章丁丑科程文甚佳今罷官歸家甚貧吾向自北歸與之同行且致意欲延至吾邑令汝從之此可與儲芋西老先生商量吾家西園中請來與吾兒一講館榖束脩不難也議定可報來吾從江西致書大凡講學須明經明經以經世為大吾兒此行游諸老間亦有所觀法乎讀書之暇亦須處置家事别辨男女灑掃室堂羞潔祭祀應接賔客鈐束婢僕問理園田之類畧畧經心但不可為利耳吾少時讀書亦只是隨世俗以圖榮華温飽故不能大有為於天下吾兒勉之舟次龍津驛四川家書七首六十生朝杜門謝客惟有思親懐鄉東望悒怏而已想汝母親并汝姊諸骨肉不知何以為情耶吾留滯在此不意作許乆前時五月間信是虚傳昨推北太僕㸃陪者此兩闕北行西留皆非吾願若得南闕甚好亦且聴命而已此間事亦有難處者早晚殊勞苦幸此身康强勝似在家聊以自喜耳家事逺吾不能計慮吾兒量能照管但凡事務減省併工學業科場近吾老矣汝母病近醫藥如何此心懸懸言不能盡偶有人便附此不知何時可到也此月中欲打發山立同一人回且稍待未定未定餘不及一一書族中至親并顧五官人學召輩只報與康寧而已自舊嵗十二月十四日張忠來得家信汝雖不報同孫吾慟苦奈何此兒終坐闕乳之故此為父母者之過往者不可追後車之轍可以為戒切記切記正月七日唐信臣報汝母病愈頗得喜慰但老年淹纒恐元氣不能復大憂大憂六十夀誕不知汝輩如何為禮吾惟有拈香拜禱而已送歴承差近兩三日前自南都來傅國相計當在新正得到想家中必有人同來甚慰望慰望顧提學先生進表行云欲至吾松寄家小乘便附書未卜何日可得到真所謂家書抵萬金也此間一行人伴俱好但東歸無期耳可再四慰安汝母親官中事不甚費力覺精力勝在江西時比在家大不同汝輩亦可安心眼疾漸瘥眼力漸減汝可視吾手筆家中凡百想汝能料理聞汝已食糧亦家門之光不可廢却工業至囑至囑餘俟良便寄回逆臣録一部彰善癉惡録一部可看其大綱科場中首一問䇿要問此兩書也知之知之歴可照舊年分送其餘酌量吾兒與學召商量處之或寫我名亦可前廿四日顧提學僉憲行曽附家書但不知何日得到也今因楊同府行再附此紙楊如上任可與顧五叔同去隨分行賀此間人口俱安刻日望傅國相承差到耳張忠或再至上海也汝母親得安好汝可上𦂳學業更須於應事接物上體驗天理人欲之分孔子曰克已復禮為仁此是終身受用大學問目前小小毁譽不必留意也老身逺在萬里家事勢不能及汝可向上向學至囑至囑餘可寄聲内外親戚東歸想不乆也三月間書寄顧提學楊同知不識何日可到我此間百凡只如常眼疾似輕終是力短耳六十老人亦是常事五月十二日承差自京還潘巡撫先生陞督木侍郎朝議欲以我代之但命未下若果有此東歸未知何日兼是此間地方亦有兵荒難處之事奈何奈何我中心只愁汝母親病圖歸一見汝侍奉盡心盡力得好些便半眠半起老景儘不妨但不可令管家事爾家事且只令各家人照舊掌管要戒飭此輩安分營生毋蹈前轍汝一心只向學轉眼明年又是科場矣我只看汝此一着至囑至囑學召前次不寫書想不在家汝姐如何可傳我意要伏侍母親也顧五叔并族中不得一一作書可道意今後承差來順差可與銀五錢特差一兩知之朱兵備富太守書近日方到知汝母親病日就痊可甚喜甚喜但年已衰老終不能無憂也奈何奈何吾在此思家之心不能奮飛但萬里去就殊為難耳自入冬來吾情况不甚佳兼政務冗碎須一一理㑹費心力不可言要取一房有家小得力家人來用縁置二三婢子皆不甚得力要伴送乘春水出峽回來吾遂作歸計也至望至望家事吾不及問想吾兒自能隨宜料理之只望汝來秋科場一舉吾一生事決矣汝姊夫婦并汝房中嗣息吾尤以為望也陞遷消息已静聴之命但得脱此地方自作計較明年六十一嵗吾豈乆戀榮名者知之知之寒甚忙甚寫此不盡臘月十二日二月十八日抵荆州已脱三峽之險是日遂得李譚二吏齎汝家書至得汝母痊好信息慰喜不可言䝉恩得轉入京實出望外但衰病日益甚無以報國為之憂懼憂懼廿四日即取道襄陽南陽入朝矣此官列居禁近聖明嚴核故不作東還恐遲負耳新詔亦有三代恩典亦欲乘此機㑹汝母子自可安心不必懸掛兼我舊病最忌濕熱以故北行欲趂四月初旬到任殊為匆促汝今嵗亦有科舉恐又涉一番人事有妨費也汝知之知之今打發陸欽回秋冬衣物可即遣的當人同送從閘河至京一一細事俱分付陸欽汝可與母親從宜處分欽亦不可重託知之知之坐船窻燃燈附信可意㑹也儼山集巻九十六
