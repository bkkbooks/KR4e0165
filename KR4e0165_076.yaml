body:
  text: 儼山集卷七十六明陸深撰墓志銘十五先孺人墓志銘嗚呼孺人天下之賢母也雖然哀吾孺人之不及於養也孺人志不在養痛深之未有以養吾孺人也於京師卒卒之日自少師閣老李公而下咸臨奠焉深即日解史事扶柩還還之日自閭里能言而上咸迎哭焉既殯殯之數日親戚之疏者逺者自百里外咸持紙錢來哭曰以是報孺人之某惠某德也而人未之及知也嗚呼斯非天下之賢母也耶孺人姓吳氏蘇之嘉定人父諱實母薑氏蚤失恃年二十三歸竹坡先生為繼室逮事筠松府君尤夫人府君夫人性嚴整獨孺人時時可其意閲三十年無間也前孺人瞿子曰沔甫九齡孺人即子之時再舉子一舉女皆不育年二十八始生深又六年生一女曰素英八嵗死竹坡先生喜遊南窮湘沅北走燕齊晉魏之墟或嵗一歸再歸或間嵗未歸孺人奉府君夫人以居早作晏息課男耕田女織布農月僮婢俱出親為之淅米於甑實薪於竈抵暮䇿其雞豚之入命長老僕行籓外視牛圈縱犬鑰户退乃坐南牖下張燈或時乘月紡木綿坐深於膝旁使之讀書漏深乃罷明早升堂視饌畢鄰之貧且急者族之不能衣者食者有災者悉來告告則各如所欲給之不給則解裳衣捐笄珥以繼故家雖饒而黃白綺縠之飾未嘗留也府君有男五人諸孫無慮十數率聚而教之孺人從中館榖束修筆硯費咸經理之如是者嵗以為常是故過於勞勩恆苦多病深年二十五謬舉鄉試明年壬戌會試下第還業南雍是時孺人春秋五十餘兩少兒曰溥曰博育之既長矣遂奉以往蓋思欲以江山巨麗之觀紓其早嵗勤劬之過也於是登巨艦道五湖遡長江以達乘秋霽無風濤之險孺人喜津津曰吾願也然居南雍再嵗再病病輒殆乃蘇甲子之春遂奉以還明年乙丑深舉進士入讀書中祕例得攜家益思大其桑榆之樂又迎之以最小兒博侍來京師居少間又病如南雍丁卯冬深蒙恩授官翰林編修孺人得報曰是鮮政務當乞一假還覲汝父吾從汝而南吾夢寐故土也涉春歷夏日就羸憊既亟乃曰汝無冒時禁詒汝父憂吾雖病無苦也竟不起嗚呼深之罪尚忍言哉實正德戊辰九月二十四日也上距所生正統己巳十月二十八日適六十云今卜以己巳十二月十五日奉窆於洋涇之北原從祖塋也深不孝既未能遍走當世之巨公以乞書孺人之藏不敢私敘懿美以瀆孺人之終於是乃收血而志之不忍銘京女志銘余客南都癸亥以七月哭吾女四嵗者明年三月哭吾兒兩嵗者今丙寅客北都亦以七月哭吾兒八日者十月未盡一日吾女京姐又死且三嵗矣余又哭之三年之間四哭子女於客舍生世果何如耶嗚呼將兒得於天者素薄耶將醫藥失調耶將余之德不足庇兒耶將生死禍福夀夭富貴物自取之而天不與耶其不然耶先有人妄傳兒死抵家吾父亟以書來問吾發封吾母聞而解之曰死當得生爾書後數日竟死是果偶然者耶非耶兒聰慧百出已能誦五七言詩詞數十首每使歌之蓋物之不長者大抵然也不欲悉識特識余之悲而埋之天壇之南銘曰父陸母梅家在海月生在酉死在亥甲子迄寅嵗三改瘡痘遍體紫蕾蕾宛轉可憐痛百倍南郊南原阜且塏松棺布衾祭以醢速久深藏慎勿悔清女權厝志女清年十三病痞死於京師痞凡嵗餘更數醫竟莫能治最先治者陳寵寵醫京師有名也當其時夏腸中有聲乍寒乍熱寵診之以為氣虛有積以阿魏丸餌之既微有形在左脅下以為痞也有胡某者都人也以治痞名榜于通衢曰半日取效亟使視之曰痞良是是名女得男疾法當下下之與之藥即阿魏丸自是常服阿魏丸而病愈甚吻渴減食膚黃變幾殆是時也産醫者李圭曰吾子齊傳祕方能治齊來按曰脈數甚內有積熱服阿魏丸是謂熱濟熱也渴固宜法當健脾清中才得服參术麯蘖等劑以正勝也或曰是在膜外藥餌不及攻若以補助祗邪王耳何從勝嘗見一治法用朴硝填患處火尉之令微熱若是數數為之愈矣乃依其方果獲效在內經有之鹹以軟之者是也遂以朴硝治外而以齊藥治內有間硝力遂頑而齊藥亦無大效也然日羸弱自後來治者爭言補脾胃矣或曰是必針灸不然不止江西有秀才蔡登以針名登貢來致之登曰非痞曷針我有成藥治之當起登謂痞男必左女必右今左耳醫者蜀王坤以為登大不省耳遂受其成藥不用而登猶以相貌云必無他坤遂治之専主於脾胃而以雄黃白礬膏貼之然效愈逺矣晚又治於蕭正齋正齋名某杭人也其説李王之間而加黃蓍為劑者彌月卒不起嗚呼女果死於病耶抑失醫然也京師之醫盡之矣所未及者針灸然言針灸者十一故常不可耳或曰是疾成於水滯北方多有之若南還啖河中水乃有瘳訪諸人人曰非便女偶聞之遂日夜促其母歸未及歸而女死嗚呼女果死於客耶於是乎有遺憾矣自女患是疾見余日夜憂嘗進曰大人無徒苦兒有吉兆自當無恙其母扣其狀曰常夢之帝所隨一行人乞夀帝與我脂傅唇覺而唇猶冷然唇者辰也是益我以辰矣又夢人索病與他人兒乃捧腹向曰若是寶貨便當與之此我腹中疾那得與人余聞曰仁哉果然當如女言無恙乃相與破顔而女亦囅然每晨興常如何之女應聲曰今勝於昨實不勝也察其意蓋見余頻年哭其弟妹姑謾慰之爾至於死猶云無恙言語無少亂者比病中夜嘗讀列女傳國風小學雜女記讀之間有未通即以意屬讀即不爽余竊怪其如此病既加從余乞帖學書余曰兒女郎也何用為此遂不復事然見書即曉點畫大都與弟妹輩講説之未死前兩日猶坐誦詩時祖母吳夫人衣紫花半臂適來視兒褰幃曰婆婆年時衣單夏月得寒疾今當更衣之夫人背而泣曰兒何暇憂老身耶其死夫人尤痛悼之不已女巧慧工藝不欲書聊敘病醫時事以識余之痛云俟他日返葬銘而藏之女諱清姓陸上海人父深母梅氏為初舉女許配鄉進士董君懌之仲子以丙辰臘月望前一日生以戊辰五月望後一日死余挈之走四方居南都者三載居京師者四載云不成殤女權厝志銘嗚呼吾女果死矣祭奠不得舉鄉邦水榖枕藉不得用鄉邦草木瞑目不得悼祖父諸父諸母嗚呼痛哉女乳名定桂上海陸子淵之第三女也母梅氏許配劉復之子兆元生以𢎞治庚申之八月草八日死以癸亥之七月草五日壬戌九月草二日隨余來南都距來南都之前一月十二日劉方問名至南都之三月十二月朔病痘其二姊屢頻殆危兒獨不舉藥歡然就愈既愈二姊癯然骨立兒獨豐魁日異私心喜以為厚於天者也孰知其不足恃耶兒巧慧宛轉能得人歡心令人悼其死不已死之日祖母臨焉余哭焉其母哭之慟且數曰不來南雍兒或不死雖婦人之言不通於命要有傷豫心者乃抆淚志之權厝諸都門之外謀返葬焉銘曰歸寄有時勿震勿䀌優焉遊焉終安故國不成殤兒子志嗚呼吾年二十有七始生汝父母賴以有子祖賴以有孫汝之生在南雍吾馳書歸報吾之故人慰之曰有子內外族人賀汝之祖曰有孫嗚呼今復何望耶汝生兩月遭汝季姊之殤吾恃汝而哭之不盡哀今汝之死也吾何恃而不哀耶又二月汝之祖母母相對病甚汝呱呱啼乳吾持汝哭而禱曰汝福德當重慶已而皆愈吾甚喜豈汝能慶及其親而不能自庇其身耶甫半周汝祖來視祖母於南雍懷汝而喜曰貌類我貌類我回顧乳者屬曰避風節食無厚溫也别又牽汝曰歸見汝學步也今吾歸將何以慰汝之祖耶汝好睂目豐肌肉白如瓠早善盻笑見者莫不歡喜提攜之汝亦不驚不懼其親父母尤不同常兒故凡余出也目光射户外懸懸不見則號泣入則翼而附之如有知然𢎞治甲子三月一日夜夢兒病痢甚苦求醫不來怪而覺之不敢發明日而疾作果先腹瀉發疹不可藥九日死矣嗚呼能不悲哉能不悲哉余將瘞汝郊之外自此去家甚邇且不忍也汝尚未成殤不敢曰殯乃薄衾就木置諸寓舍之外門之內俟返葬焉兒陸姓繼恩其乳名也是為志儼山集卷七十六
