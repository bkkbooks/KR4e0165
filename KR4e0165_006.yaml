body:
  text: 儼山集卷六明陸深撰五言古詩二三十五首贈别徐昌穀二首北風吹我衣送子山之隅一瞻再三顧別離在斯須知遇良獨難工瑟徒好竽感念管鮑私安得不區區昔為比翼鳥今如失水魚一日為三秋悵望增欷歔二北風被原野送子古郭下叶僕夫逺前途執轡柔如組屏營復躊躇氣結不得語許身忌太炫榮名毋多取珠明蜃人心玉縝良工苦寄言同心人蜂蠆多風雨夜宿爛柯山農家爛柯本在金華不知此何以名夜扣田家門空庭列松炬導之上小樓一室有雅趣木榻久已塵頗勝棲草露雞豚棲下方警戒煩再顧雖無窮途哭必有神物護時敕符俱從老農拙言辭起拜具禮度感此深山深土風儼淳素武卿山中晚行水流青山中人行白雲處落日下西崦餘光拂髙樹此行何所有一眺空海宇慚乏山林姿來此成賔主間居擬陶林居罕人事漸與農圃親時還讀我書夢寐見古人桃源亦何有傳説失其真藹藹風日妍鬱鬱草樹春儻免病為纍吾亦愛江濵寓彰德倉司小憩頗有花竹之觀愧乏瀟灑趣享此山林居時花當春發喬木向日舒好風泛崇光有鳥鳴前除坐久起顧影悠然思遂初去住各有適得喪兩無餘雨後分種秋葵早葵花已繁晚葵始萌滋迎陽與應肅物性各有宜吾欲備四氣代謝任所之往者固已爾來者當自知人生會有適遲速何足疑但願風日妍臨秋挹髙姿眷此尺寸間尋丈以為期殷勤付畦叟愛養貴及時登翠華巖上洞窮髙暢逺矚躋勝酬良緣京塵動千尺往來成嵗年偶上翠華洞間尋舊鑱鐫無煩辨人代惟知出風煙長安近捧日韋曲低去天惟皇朝萬國聲教被八埏振策一以眺髙雲下淵泉德輝九苞鳯形勢百足蚿新晴病起獨登臺觀耕東曦散早涼沃土依水曲宿雨一以霽微風滿疇緑農人欣及時物情遂所欲稼穡良獨難勤惰各有屬夙疴幸暫舒登臺恣遐矚饁餉偕爾鄰指揮顧我僕新苗含露滋把愛等蒼玉稍稍已成行纍纍尚盈束茍遂豐稔期寧知泥塗辱倦遊拙理生藉此一廛足齋居園林變夏木弱軀猶春衣豈乏四方志瘏馬不能車偃息滄江涘水竹既清虛悟恱有夙契𡨕詮資簡書翔禽懷佳音時雨鳴前除境適謝力遣迢遙遂忘豫風琴豫蓄二琴客為調之偶置亭間適天風微動自出異響客歎希有作詩紀之陶令無絃趣未忘矯俗心退之聽穎師哀怨一何深伊余兩瑶琴因風調至音乍如落松濤復同驪龍吟掩抑竟何有斷續難自禁恱耳貴一適傳指勞千金乃知宇宙間喧寂寄所任火化本無迹至理不可尋以余疏慵姿置之風水林碧雲寺觀泉堂辭白玉前寺到碧峯下石幢插渚波貝葉翻般若循除決清泉此境極瀟灑琤琮金佩傳宛轉玉繩㵼緬懷川上心臨流歎不舍曾聞貂璫雄揮金事遊冶髙臺相掩映松篁雜梧檟似識舟壑安寧知蕉鹿假止觀等殷鑒洗酌泛周斚臨清車行南人不識車北人不識舟二者更相苦役役不能休吾生本丈夫安能絶行遊生長東吳郡偕計來皇州嵗暮風日烈行行阻且修黃塵翳白日四牡騑梁輈未明候晨雞殘更進薄羞堅氷交狐豕寒疇下羊牛疏林希突煙迥野多荒丘觸目集野意撫時縈羈愁豈不愛遺體髙居詎良謀遑遑念飢溺遐思禹稷儔秋懷斗杓西指申興言懷幽詩玄蟬泣髙柳玉露零泥泥急景如受驅少壯誠幾時丈夫懷苦心飄泊將奚為恱彼庭前樹芳花綴繁枝莫俟涼風欺果實獨後期題畫關河凍初合雲物嵗已晚紆轡雞鳴樹悵望羊腸阪徘徊不能度風髙馬毛短陳光祿惟順迎暾書舍四首龍泉瀑布下匡廬倚天垂玉柱瀟瀟六月寒坐對白龍舞幽人送目餘新添夜來雨寺鐘蒲牢吼蕭寺明星出東方動息各有會隨風逺飄揚喚起巫山夢縹眇賦髙堂漁歌愛聽江湖調滄浪第一聲桃花新水浪搖動楚王城得魚沽酒處風雨更多情樵語風暖鳥聲喧隔塢聞人語盤雲拾墮樵晨昏自來去深山多虎狼同心邀伴侣豫家舊藏瀟湘圖聊因舊題各成短詠八首山市晴嵐山以逺市珍山中復成市輕雲結浮嵐東風㵼清泚不辨往來人微喧隔林起漁村落照風波本無定漁家愛夕陽絲綸搖揚處多在瀼西傍清歌一曲竟天水共微茫煙寺曉鐘清曉坐聞鐘知是何朝寺微霜動商飇秋隨鴈行至聨翩去鄉人豈無懷鄉意江天暮雪雪片大于手江空嵗復寒幽人髙卧處偏得畫圖看為問梁王簡何如楚客冠瀟湘夜雨扁舟瀟湘上夜聽瀟湘雨回風度明璫叢篁各成塢欲起寄相思美人隔南浦洞庭秋月月光隨處好何况洞庭秋風露三千里金波上下流此時聞鐵笛天際一登樓逺浦歸帆孤帆自天際出沒見秋毫歸心同逝水飛度挾風濤臨流一悵望空覺此生勞平沙落鴈鴈陳驚寒早平沙襯水圎同懷稻粱意南下盡翩翩誰念關山逺猶有尺書傳玉華雜咏七首為盛程齋賦玉華山海風吹海雨飛過玉華山山中人不見窈窕翠微間得月乘鸞度開雲放鶴還白雲窩雲來如有情雲歸本無迹歸去羣山青來時林樹白窩中卧雲人偶值愛雲客萬柳塘千條萬條黃垂柳復垂楊連雲難辨色蔭月不留光幸不當岐路别離那復傷望湖樓登樓望澄湖樓髙湖面小金波月裏秋青草雨中曉心間境逾靜悠然見魚鳥韓山一髮韓江水韓山相對起扁舟乘海潮回首渺千里上流春雨多夷猶弄清泚越王走馬埒燕臺骨已朽渥窪種未生何年走馬埒尚帶越王名榕葉斜陽外坐看海雲輕鶴舟買得青田種相㩦共一舟碧簫吹夜月飛度百花洲借問華亭唳何如赤壁遊過安山几間有髙達夫集偶拈東平路作一首戲效其體飛鷁指金臺揚帆出巨野細柳縈長隄新蒲弱堪把煩襟散遙岑好風送朱夏七言古詩四首雲山圖贈嚴介溪西還美人別我還楚封遙望雲山如畫中憶昔燕市初相逢年少意氣雙飛鴻朅來射策披心胸五雲旭日蓬萊宫玉堂對榻聞曉鐘南郊獻賦追揚雄旁人忽忽稱儒宗文彩往往驚相公過從莫限風雪衝卜居長安家屢通眼見天日升潛龍石渠夜照藜火紅退食聨步時從容移書論道相磨礱豈徒握手期協恭自信肝膽摩蒼穹今我日月催衰慵近有白髮臨青銅世事浮雲無定蹤况子縗絰儼在躬十年契誼蘿施松一旦摻袂成西東人言此圖千萬重我意試比應難窮中山圖次韻俞國昌都諫送許補之侍御謫定州中山風物美且都無乃賢達避世區芝山許子今巨儒虬髯逸論如大蘇隻手欲作回天圖七月詔獄朱顔敷我生有癖惰且迂辱子契誼時與俱兩都三試要不殊空憐警夜鴈有奴寂寞府中棲樹烏剸割修復見昆吾聊試兒童夾道呼中山山中勸種榆月夜與髙進之沈德楨諸友過簳山次壁間韻棹歌欲停山月吐月影照人清可數疑心已斷壁間蛇壯氣猶驚草中虎清溪曲曲淡不流此月重來猶故我秋思空庭蕭索簾櫳雨秋色漫漫四山裏間花不語傷朱顔落葉無聲風未起依稀三五少年遊鳯凰臺畔臨吳楚家書自怪滿紙題猶剩胸中數行語儼山集卷六
