body:
  text: 儼山集卷四十八明陸深撰序十二重刋豆疹論序醫家素難如士人本經至矣備矣獨豆創不經見本草號稱古書亦無明著方録至漢未時始言豆疹以為得自征羌豈上古生人無此疾耶又迤北諸人苟南近長城即出豆疹多死亡似又繫於地氣矣江南水土濕熱凡嬰兒必痘死生雖異無一得脫亦有長大始出者豫所生育子女多罹此毒比年四孫連接夭殤至為楚割不能不致憾於醫藥之無工也嘗聞宋有聞人規者著書專論痘疹具有條理往在館閣多方尋訪而未獲表弟顧世安氏素修醫業收蓄古書甚富每與論此而託焉歸田之又明年汾州柏山劉先生􅊩松之日首以此書為惠展卷讀之殊快夙心乃為手訂數字因命黃甥標校勘出甥立抄方以成一家之言嗚呼使窮鄉下邑家置而户藏之稍識文義決不至訛誤其所保全者可勝道哉乃重翻朗刻庶便覽觀經云如保赤子蓋言保赤子之難尤難於保民之難也柏山以才御史出副郡車觀於斯舉可謂先其所難者松民坐享仁壽之福必矣世安授官太醫院為御醫供事聖濟殿蓋欲廣先生之意因請為序以傳懷旗集敘𢎞治辛酉深忝鄉薦乙丑春釋褐于成均三四年間客都門遊齊魯留南雍出入三吳旅食之日多所得詩凡若干篇率皆道路語爾既被上命儲史館得專意文學探囊讀之感念今昔恍然若一日之所遇也取其甚不謬者存十二三焉傳有之曰士以旗昭有事也深叨列下士仰沐鴻澤雖逺在草莽其敢一日忘斯招之至耶故命之曰懷旗集云介菴先生鄭公哀挽序同知南雄府致仕進階奉議大夫介菴鄭先生既卒其子通判大名府相希説編其志銘墓表哀挽之作若干篇元老名卿文士詩人海內之賢言焉而信今信焉而傳後渢渢乎事核而情悲也上海陸深讀之曰此循良之吏論定而不朽仁孝之人揚親以致志者於是乎徴之矣嗚呼君子之學以經綸為至其遇不遇繫乎逢君子之道以出處為大其安不安存乎我故持必遇之心者無必安之地者也介菴先生四佐大郡其在南昌也以左調其在髙州也以憂去其在大名也以薦升其為南雄也以齟齬停任又以紛更報罷然不皆遇也清白之操惠愛之政郡之人至今思之不能忘是可謂善行其所學者矣方其解南雄也使先生少自媒必獲安其位及權姦之誅也先生當起矣卒致其仕恬退之風止足之義視世之巧營固戀者何如也是可謂安於出處者矣夫遇制乎命者也安由於義者也以義處命此儒者之能事而先生之考終也無少遺憾豈易得哉深聞之其德厚者其後昌其學深者其風逺乃今希説之向用未艾固將大發先生之藏而天下之欽德慕義者其於先生之闡白容少緩耶惜深生也晚不獲侍先生以探其大全深造然辱交於希説亦有年矣始獲論次其經綸之方出處之大為哀挽序送何述齋太守入覲序易有之聖人久於其道而天下化成蓋言上下之交也仰惟皇上中興御極二十有二年凡七朝諸侯矣明年甲辰復當大朝之期松江何侯述齋先生先期戒行士大夫咸悵悵然不釋其去相與就陸深謀之思為留行亦欲望侯之久於吾郡也深亟是之而願有以告夫臨年入覲以行明陟古之大典蓋常禮爾惟國有大事與方隅未和則以特旨留之方今上際治平下成康阜四海九州方軌畢至固我侯之樂於有事也忠勤大業行矣於是唐憲副龍江曰是禮也夫天子制禮諸侯稟禮以致之天下載見之詩所為作也盍相與送之自趙太常曲江而下咸餞之江上御醫顧定芳寧丞喬訓趨而進曰餞必有贈贈必以言屬深為之序深惟我朝稽古建官超越百代太祖髙皇帝開天啓運朝覲之典自洪武丙寅著令行之百七十餘年矣藩臬郡縣之長吏精白一心以承德意者惟此舉庶僚有位顒然以待旌甄者亦惟此舉雖然天下之郡皆統於藩臬而幽明聽焉天子以一身主張於上而幽明之柄付之銓曹銓曹所寄以為耳目者諸侯也勸懲之義所以為理者莫大於是惟畿輔之郡則百執事之賢否獨守得與銓曹共之視藩臬等郡守之任莫重於兩畿而南畿為尤重實以髙皇首善之地典禮存焉然南畿之郡又莫重於蘇松非徒以財賦之浩繁也六官之事亦最他郡顧松地狹矣尤難於蘇守固天下之選也我侯述齋先生之守松也特出妙簡其為治也不動聲色而百務具興二年於兹慈良愷悌之政覃敷四境是故霑其惠者親之為父母服其斷者仰之為神明覿其德者尊之為賢聖古之龔黃夫復何讓兹朝正禮成天官卿必且明揚於廷則松郡治平天下第一無疑矣百執事之師帥於是乎在一方之民瘼於是乎達千里之風教於是乎宣侯方斂功績於無言之表以成上下相交之業是行所繫顧不偉與爰念先朝列聖每當入覲時有特旨舉其賢者能者異等者錫燕午門兼賜璽書馳驛以還或不次遷擢遂登台輔皇上勵精圖治明作之功與三代並隆必舉舊章我侯又當第一無疑矣則吾郡士夫感知之情不於是而少慰哉詩亦有之蓼彼蕭斯零露湑兮蓋言逮下也既見君子為龍為光蓋言承上也深不佞請歌以侑别送司訓吳先生九年考滿序石峯吳先生教上海學學者有成矣遂從海學滿九載考以上吏部將去海而海之士夫相與歎息其賢酌酒送之有為留行之計者曰先生政成九載海實三年吾有子弟何可一日無先生有為達才之言者曰先生束縛校官幾二十載內外樞要何可一日無先生相與質於陸子以為何如深聞之曰先生去留資格具在非我輩之所能與深獨愛敬先生之有量有識而又以歎資格之重困夫豪傑也士舉於鄉矣旅試於春官其上者為進士正榜其次者為進士副榜其藝能無以大相逺也其實皆謂之出身然從正榜出者二十年可至卿相出副榜為校官者必限以實厯之歲月未滿一日不聽使去去而以殿最也特視其子弟員之中式與不中式者乃皆若此間亦有去為御史者終不數數也豈才之同出於鄉舉里選者顧遂爾懸絶耶抑人之限於地者無以自見也將采聽者之未廣與推轂者之無公耶先生自丁卯舉於鄉戊辰舉於禮部教於蘇者三年教於長沙之攸者乂三年至於教海始滿實厯云先生清才博學勤于講説所至以春秋為教其生徒自官司外常數百人每舉必中式往來校文於蜀於廣於齊魯所得多名士馳驅萬里江山湖海之奇勝輒有紀述咸可傳誦淹留散緩之意未嘗少見其去海也束書就道與嘗所往來者敘分留别道義繾綣之情薰然入人是其卿輔之量經綸之業蓋已具見於此矣此所以為先生也若乃舍文字而持權衡辭冷局而當要路竊謂先生亦既晚也深於是乎有感昔臨川聶先生大年為校官時王文端公抑菴先生在吏部大年嘗因題畫以致意其略曰以二十年求畫之心求天下之士天下其有遺材耶是後斯言徹于文端公欣然薦奏於是大年遂有修書之命人兩賢之今先生之才無愧大年而整菴羅先生之賢逺過抑菴適居吏部是行必有遇也又例得再試禮部先生褎然舉首以發於持滿之餘深於是乎有望故序竹亭詩序芝山之麓有竹亭焉今少司冦胡公之所築也有桑梓之義公之託於物者如此京都之間有竹亭焉今士大夫之所賢也有配德之道物之附於公者如此始公之在荆也荆有竹亭其在廣也廣有竹亭其在閩也閩亦有竹亭宦轍所至凡竹亭云者必公也無疑其於今也惟公而不惟竹或見竹焉儼乎若公之有臨也物因人重者如此由是士大夫之能言者咸有作積為若干什公以深嘗登斯亭也授簡為序深暇日從二三子讀焉渢渢乎何其音之長也充充乎又何其好德之同也融融乎何其入人之深也二三子識之夫物生也有自成也有託是故瘠土無豐苗弱質無正色其斯之謂與豫昔將命而南也止於饒使禮告成遂有事於觀察登芝山而望焉鄱湖之渺瀰我聖祖弔伐之所也封藩之規度守令之理制明秀之山川膏沃之田疇富庶之齒淳龎之俗我列聖休養之厚也萬竹森映極瀟灑之趣則公之故居而亭之所為築也乃降而修謁焉式其里聞弦誦之聲登其堂挹清修之操入其室觀朴素之業有先世之文獻在焉既而觴豫於亭示豫以晚節之志蒼粉碧玉與秋色相髙令人肅乎其為心穆乎其為容欲去而不能者久之已復從公移植數本於公署為旦夕之瞻企豫蓋有所感也夫昔人有言禮樂必積德百年而後興蓋生養教習之漸然爾皇明撫運混一規模成於鄱湖之役則饒固首善之地也凝和被化宜有為天下先者而公生其間適應百年之運加以故家流風荷承傳之學具禮樂之材為巨儒為名臣為天下羽儀蔚乎其有章也卓乎其不羣也優優乎應變而不窮也屹乎處毁譽而不懼也其不為斯竹矣乎蒔以佳壤育以和氣固以籓籬時以培植堅剛茂密之質足以資世用而和民生乃若挺拔之操可以干霄漢蔥蒨之色可以傲霜雪使乾坤之正氣後時而獨存者是宜公之有取於斯也故曰至治之世多君子至人之居無疵癘二三子唯而退因録為序公名韶字大聲登甲辰進士揚厯中外以至今官柄用方始云淡軒集序詩之作工體製者乏寬裕之風務氣格者少溫潤之氣蓋自李杜以來詩人鮮兼之矣兼之曰詩不其難矣乎得其一體者然且有至焉有不至焉則詩之道或幾乎廢矣而世未嘗無人也三百篇多出於委巷與女婦之口其人初未嘗學其辭旨顧足為後世經何則出於情故也詩出於情而體製氣格在所後矣此詩之本也深少遊邑校時淡軒先生已號宿學工為詩其時固未能讀之也其子鶠與深同舉於鄉又同舉進士於朝往來兩都間每與先生俱當其時又未暇讀之也今年以先孺人服家居其子鶠方編次為集始得請而讀之凡若干首嗚呼是誠所謂出於情者耶先生厲孤耿之操秉剛方之性侃侃不與俗人瓦合是故其詩煆鍊清峭如其人雖屢屈場屋薄淡自居無怨尤迫蹙之態可謂情之正者矣夫詩出於情難情而得其正又難也是宜有傳焉鶠作而曰家君道固如是其果然與宜為集敘且夫伯俞之梃無恙無恤之簡不忘君子所以為其親者無所不愛而况於其言之成章者乎宜鶠之蚤圖之也而先生苦志力探嗜好俱泯者得所付託矣其決傳而無疑者又於是乎在送浮屠默菴序普照僧默菴嘗從定菴曹先生學詩與書又每從士大夫遊故釋而文余道松亦主焉至則設茗論詩持紙乞余書數詩以為常屢焉故契若古之方外交也乙丑歲會郡僧綱闕默菴捧郡檄謁選於吏部既受命冠服有章又加昔一等矣一日過余别且請以贈余曰維佛氏以無為宗萬有皆幻身世電泡耳吾之所有爾之所不取也何以贈默菴曰緣愛生欲緣欲墮干萬劫非愛非欲即證果矣何名為有何名為無余曰終然不同奈何相謀默菴曰不必於同不必於不同願卒兩忘之余曰余與爾異趨也獨不畏其相妨哉默菴笑曰何見之太晚也佛之道常附聖人之道而行不相妨久矣余曰異哉當竟其説默菴曰吾佛氏之道一切修於內然常使外者無擾也擾之則力倍矣是故聖人之道行使君臣父子禮樂刑政各職其職以綱維乎天下大定矣然后吾徒始得出其一身以究其學不然且弗暇矣故琳宫梵宇金璧輝煌而吾徒安饗常在太平之世穨垣敗宇而沛顛流離者必喪亂之日也故佛道獨盛非佛之福也聖人之道盛非獨儒者有望也雖吾徒亦日夜望之余服其甚辨然終未以為然也遂次第其語以為贈使歸質諸定菴焉定菴之季十峯與其羣從皆余友也而甚文必有能印正其説者儼山集卷四十八
