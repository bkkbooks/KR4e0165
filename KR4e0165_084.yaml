body:
  text: 儼山集卷八十四明陸深撰雜文浦喻陸子生於海瀕而家于黃浦之上浦故松江别流江堙而浦代志曰楚時春申君黃歇所鑿因姓其氏壯遊四方適吳覩五湖具區北渡大江逾于河達于吕梁然後知水之為理也海水際天浦水朝潮夕汐盈縮吞吐匯為汀洲帶以百里湖水汪洋渟泓萬頃一色漫流四溢而不見其涘也江水夾以連山源逺流盛蛟龍黿鼉變怪百出而獨力東注河與江埒而源益逺流益盛濁悍若怒吕梁水搏山而行崖石鎖囓濺沫崩湱鍧蕩出聲是故海至大也湖至澄也江至深也河至長也吕梁至竒也彼曰浦者大不能海澄不能湖深不能江長不能河奇不能吕梁奚取焉雖然被之以長風則驚濤雲奔亦似海天開浪恬其出無窮又似湖獨流勇赴似江與河至於潮頭秋壯排空倒嶽雖吕梁或不能及嗚呼水之觀盡於是矣余性好水常慕逺者大者奇者深且長者及東出海自北而歸復返浦上之舊廬歎曰天下有本同而末異者兹物是也又聞龍門砥柱瞿塘灧澦洞庭皆極天下之偉觀皆未及到今而後知到焉亦一覽而已也是故忽於近者非知逺者也易於小者非圖大者也作浦喻序交贈劉子大江之西有士曰劉子某與江東陸深友數嵗矣而未有合於時也往時劉子遊南雍深聞其人而願交焉辛酉之秋走金陵與劉子講相見之禮是嵗深領薦北上取道江淮會劉子於齊魯之間居京師與劉子鄰寓間日輒會已而深南歸與劉子别劉子避暑燕臺乘秋而還觀鄒嶧望尼泗泝吕梁之波絶江南渡登黃茅諸峯經吳越而西再會於金陵嵗暮歸省太夫人於廬陵再别矣嵗戊辰復會於京師然遂别别而又會是未可知也大抵每與劉子會必有言言必有合也每别劉子必有所得有所得必以告也故嘗樂與劉子會而悲其别雖然竟不能使劉子一日留何也始深之聞劉子也以瓌翰麗藻既見得其人焉方行古貌既交得其學焉𢎞放浩博及是京師再會為别最久而劉子所得深矣行益慎貌益充博者益以約而文章益工比聞劉子涉歷之餘剝落華飾獨趨本原浩然有求道之志夫學之於道若飲食然珍錯之雋不若穀粟之為用也適口之竒不若充腹之為味也深方倀焉未有所適將於劉子是賴而劉子去矣故敘以為别使有考焉讀春秋正傳雜記春秋聖人之刑書也康節雖有此言蓋指齊桓晉文之功罪重言之春秋豈止為刑書哉謂聖人專為刑書尤不可禮一出則入刑此言猶可謂犯禮則得罪出刑則入禮此言不可世豈有才脫罪便能合禮之人乎今法家除議輕重罪外有一等供明人是出刑矣謂皆合禮得乎其本意謂刑禮相反而語則滯矣禮也者屬人事止可謂天理之節文若謂禮即天理又謂天理即天道愈支離矣知我罪我之我夫子自謂也豈可謂我衆人經云葬我蓋彼已之詞也讀老蘇文嗟乎知人誠易哉諺云唾烏事誠有之夫烏惡聲也本以先警人若或德之然人未有不唾焉者也王安石在宋時方其沈滯下僚天下人識與不識惟恐其不得為宰執蘇明允深辨其姦至今以為刻薄論也似矣使所謂刻薄者當時得聞於上上之人姑聽不盡用安石後來豈有熙豐靖康之禍哉不為家國天下惜大計而為一布衣惜小嫌謬哉忘一已之私奮然為世發幾先吾於明允有取焉蓋不謂其已中也硯室志虛靜子有古硯作木室貯之其製方其廣袤視硯其高寸有半廉隅嶄然過客數十發而視之曰硯美也却而望之曰美則美矣室少引矣弗稱也夫虛靜子惑焉命匠氏將改為之匠氏操斤而進睢盱而歎曰是所謂甘苦得中高卑合度者矣將其嶄然者纍之也乃刓爾觚乃斫爾稜而寸之有半尚爾爾也向客逺而睨之已蹶然曰乃今式矣虛靜子曰圓之可以徒合也如是夫學説君子之道莫先於學夫器弗飾不完事無法不成方圓就於規矩射者存乎彀率猶之於學也學之時義大矣哉繼往聖覺來裔參天地贊化育皆學之功也堯舜由是聖賢由是不由於是則桀紂幽厲愚不肖若是其甚也顧世之學亦多岐矣孰不自是哉宜君子辨之早也彼其含華茹英雕肝鏤腎浸淫百家模擬六籍鏗鏘瓊玉宫商金石高辭奧義連章纍牘浮繢積采傾耳炫目文辭而已焉者末也考證製作推合隂陽堯文舜治禹畫湯章禮容聲樂鍾斛斗量因襲沿革纎悉精詳上稽千古下辨百王制度而已焉者迹也腹貯載籍口含經史聖作賢述野纂國紀仰淹墳典俯囿諸子意象靡遺何文不理該洽通貫歷歷可數記誦而已焉者陋也若乃脫裂文義凌躐等節灰心幾乎聖功速化類乎上達異端之道也耽於訓詁溺於言辭描寫摸擬之真依稀假借之似支離之徒也若是者匪弗學也由前言之則不全由後言之則不正君子之學以全為貴而要於正明諸心盡諸性以達諸天而已矣雖然泛而為之無其序不可也且夫性者心所具也天者性之盡也心外無性性外無天學之者其始諸明心乎本之戒懼以求其密繼之體驗以止於是極之擴充以滿其量由是七情不鑿而五性具矣萬化出矣事天之功於是為大所謂繼往覺來參贊者不於斯而備之耶夫是之謂學難之者曰聖賢之學以致用也學而弗用焉用學應之曰事必有體用斯由焉不惟其體惟其用猶之室而無基步而不履難矣哉故心者身之體也身者家之體也家者國之體也國者天下之體也孔子之於大學其論修齊治平必先之以格致誠正是固用之説也曰聖人作經詔告萬世正學門户惟兹肯綮子知斂華以近裏美矣循子之説固將舉六經而盡棄之耶曰非是之謂也凡學以為身也為身以為心也六經皆心學也豈曰聖人辨且博哉况古者誦詩讀書皆為養心設也徒玩其土苴而忘其精粹反之此心不有得焉吾恐羣聖人作經之志荒矣望於天下後世者孤矣彼禪寂者吾固非之章句之儒亦所不取也曰名物度數古今事變不格其物曷窮其理徑約之患固子之説啓之矣曰不然物必有理理必有義雖變故不齊斯二者不易之論也誠使吾之虛靈者無以具之絲棼蝟興安所折衷哉物不為吾用吾反為物役矣况學之貴於全者亦非獨略於是也顧末不先本後不加前自然之次也孔子曰志於道據於德依於仁遊於藝夫是之謂善學於乎論學至於孔子萬古之法程卓乎不可尚也又於戲三五靈灝誕育為人圓顱方趾效法乾坤反身而取萬有畢備奄然存化違物不逺斯隳學之過也粵自羲黃以前遐哉漠乎斯文既興列聖授受殆夫精一執中之訓益有論説矣雖學無費詞而教以言闡運使之然也自周而下由孔而上則淵旨微義森若繁星洋洋乎總厥大成金聲而玉振之也孟氏而后學就絶統嬴秦斷然棄之漢氏質而陋於聞道唐人華而不實風斯下焉皇天相宋聖學勃興濂溪濬其源伊洛助其流推而上之直追孟氏盛矣哉遊揚而往馴致末異譬之膏田荑稗與之俱化矣考亭夫子實踵其後左排右駁口喻手補復求諸義理之中而得之知行並進內外交養文質彬彬稱君子矣不一再傳竟墮卑萎殆終宋之世焉元處士劉因敘學博而寡要去之亦逺我明純德靈鬯克享后皇糾和翕淑篤生哲人今耆宿在朝正學宣朗余小子忝際遭逢願吐胸臆敢就正焉作學説自訟汝驕汝矜既墮既輕謂汝多能而病人之不稱謂汝多辨而屈人於無聲多能害道多辨近刑勿謂汝少三十而立䇿名持祿汝實何德薄蓄厚施寡種多穫汝甘於小成是謂狼疾朝聞夕死云胡不力自警孔曰默識孟云勿忘夜氣既斫山徑則荒茍外物是恃則內焉必亡雖桓文之盛魯史猶譏其未王堯舜之道本於孝弟文王小心昭事上帝暗室大庭孰云有異知而不為是曰無志惟無志之人乃足以僨事汝奚不曰我異於是責志論天下之事成於氣之充而敗於氣之餒夫三軍之帥至勇也可以奪之金石至𡨕頑也可以開之天地至幽且逺也可以格之是孰使之然哉氣為之也茍無是氣四體在我有弗喻焉至靈如人有弗感焉雖褐寬博有弗勝焉况於天地况於金石况於三軍之帥者哉故曰成於氣之充而敗於氣之餒孟子曰其為氣也至大至剛繼之曰夫志氣之帥也由是觀之凡氣之充者志之立也凡氣之餒者志之靡也是故事莫大於氣氣莫大於志志莫大於責夫志以令氣氣以聽志吾見有弗動動斯臧矣有弗舉舉斯終矣推是以往何事之不可為何功之不可集何習之能移而氣之能勝哉故曰氣莫大於志顧人之情樂因循而成於惕勵棄於自畫而獲於有所勸嘗試之撻而示之識必專也疾而覺之悟必速也昌被不飾則形喪神馳衣冠以間其體珮玉以警其耳采色以觸其目則肅然穆然常若大賓之是接矣此蓋通中人而下之故態也故曰志莫大於責雖然氣以志充矣茍無義理以養吾志而以血氣輔之則為強梁為剛愎為暴虐且將無所不至矣故君子之責志志於道志於聖人而已矣易曰天行健君子以自強不息健者天之志也故四時寒暑各司其職而百物生焉自強不息者君子之志也故修於身刑於家措之國與天下者萬世法焉夫天之志無事乎責也君子之志不待乎責而自責者也是知程子之論非為君子也為困學者發也是為論四川與何總兵論西番用兵公移一首為照西番自古以來不能為中國大患亦未嘗不為中國患要在羈縻之而已往昔難以槩舉以我朝國初兵力之強御史大夫丁玉經略之勤其終也亦惟給散銀顆至今各番藏之以為寶是雖丁大夫威惠入人之深亦以賞之而已今為撫𠞰之説者已失其宜而所謂無不撫之𠞰者尤為不通之論蓋撫之不從而後𠞰之未聞既𠞰之而又撫之也且如土夷芒部已叛則𠞰之而改為流官鎮雄府如烏蒙烏撒雖有兵端但撫之而已蓋𠞰則必盡撫則必賞故曰撫夷賞番非漫語也今西番自有部落自成風土比與土夷尚槩聲教者不同將欲𠞰之則不能盡將欲撫之則不可終故為中國之計者必以備禦為上䇿伺其犯邊則誅之因其欵塞則賞之賞之者非盡賞也賞其欵附者也誅之者非盡誅也誅其犯順者也若思為拓土開邊之䇿生事喜功以僥幸於萬一則啓釁搆怨孰任其咎耶麾下熟知番情忠勇素著當儕之古名將之列比與白面書生妄為自用者不可同日而語見蒙撫按批示開詳番情請具誅賞撫𠞰事宜逐一開報以憑轉達訪得深溝一寨及據地圖詳觀山脈起自西番迤邐而來至於深溝地面方始落下壁立斬絶約高三十餘里我難以仰攻而彼可以下據蓋彼反在內而我在外地勢則然譬如城堡可以內守而不可以外有也今縱一時攻破竊恐不可有也有之恐不可守守之恐不可久今若悉併財力建為城堡西番暫且逺避俟我功成不過數十人至百餘人守之而已一旦驅其醜類乘便逐之殺虜殆盡知近日貴州凱口之事則地方之責又將誰任耶昔人謂幽州之地曹翰可取孰可守也竊意此地宜空之使彼不得而居我亦不必履此孤危則架梁裝塘之擾可免而華夷之界限自明且省後慮此亦書生臆料之言亦希麾下斟酌以為久逺之圖備細開示以憑轉達與四川巡撫論處置西番用兵公移一首為照今嵗威茂用兵建議運謀身親行陳則兵備副使朱紈之功為多副總兵何卿始議不合後乃強從參將周繼勳中立二者之間其用事贊成則指揮龔鋭也大抵此舉彌文勝而誠意微始事收功多涉誇詡若使四川諸邊尤而效之則挾忿自用假公營私而天下之禍始有不可勝言者矣重煩奏報奉有明旨臺下與人為善欲使之因事有功甚盛心也深等豈容復開妬婦之口第念國事至重終難隱默今據副使朱紈條陳四欵內多支詞甚至自相矛盾者往往而是反覆推詳乃其不能自安之本心耳亦在所取惟有布政司錢糧姦弊多端必須請官查盤下落方顯貪廉若少遲延必蹈往年五寨之弊侵尅難明至三十餘萬殊為不便儼山集卷八十四
