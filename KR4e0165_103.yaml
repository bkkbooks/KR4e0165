body:
  text: 儼山續集巻三明陸深撰五言律詩五十八首春早春訊今年早東風隔歲來弄黄初上柳試白己傳梅高閣消殘雪重淵動蟄雷好花臨水背應恠未曾開東池梅花白雪塢楊栁緑烟隄野曠春偏晩江深日又西為尋彭澤宰如到武陵谿茅屋人家裏時時聞鳥啼花朝故園新甲子今日是花朝雨意含高閣風光到小桃隂晴候農圃山水動漁樵夙有林泉癖淮南謾見招曉發北津將過慶寧㑹鄭方齋通守初破桃花浪遥過杜若洲禹功今尚在江水正東流浩蕩蓬瀛路追隨李郭舟壯心何處極聊此付春遊從丹鳯樓前渡江春色臨江閣年光遍海城東風吹又轉芳草望還生天路青雲迥鷗波白羽輕平生濟川意野渡更分明江上登望江流何渺渺孤帆澹秋暉遥知三山近復送百川歸蜃樓横碧落龍湫臨翠㣲徘徊那可極返照上人衣端陽畎畆驚時序端陽復早晴遥知宣賜裏空有侍臣名舟子漁龍渡騷人糈酒情千年渾舊俗地接楚江城五月七日雨中宿觀瀾亭溽雨江天暗通宵水氣多壯心驚歲月人語隔烟波舟檝供高枕江湖付短簑浮沉聊爾爾擊節自長歌舟中稍稍時雨歇悠悠午夢醒極知行更樂誰遣鬢成星草長蛟龍窟風回鸛鶴腥滄浪聞孺子一棹過前汀五月晦江上送宋義卿民部重五月不至望六送行舟梅雨快初霽荷風如早秋天涯俱宦轍江上倍離憂欲采幽芳贈因過杜若洲初秋對月今夜新秋月三江復故鄉龍歸行雨後蛩助擣衣長梧葉三分變蓴絲十尺强人間自離别天上亦河梁南翔寄姚文光欲訪高人宅先為倒屣迎何如溪上路空復雪中情風雅還千載雲霄近五城東流與歸棹曲曲大江清别朱升之淺交多别語情極易忘言送客風生舵懐人月到門夜長偏旅榻秋早是江村復向論心地何年共一樽秋齋夜聴雨林屋意自愜雨交羣息初氣通琴幌潤聲斷畫簷疎獨火明深竹方牀滿舊書夜闌清更徹豈敢少吾廬夜宿清江浦懐夏公謹懐人不能寐風雨滿船窓為問揚州勝瓊花解作雙河流赴東海淮甸自名邦並有澄清志聨舟渉大江薄暮放舟金鼓送歸舟星河欲共流㣲霜初入夜落葉己辭秋人語江聲荅漁燈岸影稠逍遥吾取足何處是滄洲十一月朔與錢國輔江門觀漲水檻漂垂釣江門不掩風望窮東海若身擬爛銀宫浴日中流急浮天一葦通魚龍吾得免消息任虚空與張山人夜渡入夜水雲闊烟霏共渺茫遥空聞鴈陣逺火識魚榔野渡虚舟楫寒更犯雪霜吾哀倦行役復此戀江郷雨夜入夜簷花細迴風雪片輕歲寒如此候愁絶最闗情燈火虚齋永園林曠野平重門須及早波激大江横㣲雪不成尚臘猶應雪前春未謝寒入簾看片片隔竹聽珊珊旭日含花動流雲帯雨乾來牟如失望誰續腐儒餐臘庚申雨中歩出西郊視葬先兄素菴和淚北風雨傷心西郭墳江聲空逝水山色有浮雲未起隆中卧先修地下文池塘春又到南鴈不堪聞和荅黄勉之國器推豪俊郷評熟姓名風帆同偃蹇歌調獨淒清故里層雲映長河片月生非君敦素尚老去若為情題西青小隱幽人肥遯處一片夕陽深入望連秋水横空帶晩林琴書元寂寂門巷自隂隂雲路蒼茫裏鴻飛不可尋乙酉歲際二首燈火髙樓夜人間歲又除團圞兒女㑹蕭颯鬂毛初椒葉頻傳令桃符只自書百年强過半非是更何如二揚燎明連漢流星紫入烟千門俱守歲一夕共増年寒勒梅香細春回竹葉前江湖身倘徤歌詠祝堯天和劉仲素鷄鳴山歩入招提境下方秋水浮雪深枯壁定雲遶逺江愁鐘伴黄昏去泉依白石流共僧分一榻十日不梳頭十四日濟淮雲霞開曉色舟楫亂黄流千古濠梁意當年帝業州地靈山繞闕天近水環樓壮志隨丹檢芳春感勝㳺湖泊阻風風水一相激江湖因改形去來本無定恩怨空有情客路遥山瞑漁燈極浦明卧龍何處所歸鴈自知更過故城㷼薊日巳逺薄行齊魯郊孔顔千古樂管鮑一生交無復歌長鋏何心學觧嘲舵樓風水急落日掛林坳長至入侍内殿遇雪丁卯歲夙直通明殿雲空雪片飛履髙防失足憐濕畏霑衣宫蹕傳來逺期簪望不稀陽和通帝徳瑞白滿皇畿自朝天宫還經海子雪甚有懐顧未齋宻雲逗晨光澄湖抱上方混鵞聲轉細礙馬路偏長道履三陽泰花添兩鬂蒼髙樓正竒絶清宴憶春坊再集五賢堂次至日登山韻奉荅嵩野路向髙峯入筵隨落日開客憐今雨到人擬古風回逺暝含殘雪新陽動蟄雷愛君清徹骨不為看山來題來青軒次韻禪定無來往塵縁有送迎每於冠盖入先動塔鈴鳴天近多仙氣山深少世情極知公為國未問水雲程次韻何仲黙别鄭山人兼柬李獻吉歲晩同為客衝寒對别尊獨憐辭帝闕不羡曵王門行計惟詩巻相思有夢䰟南還逢李白悵望幾黄昏人日遇徐子容積雪霽人日苦寒欺客襟相看一杯酒不負百年心劉向俱中秘相如獨上林共君回首地十載賦春隂三日雪中入内署瑞雪三陽候祥雲萬里同鳯池留伴待鶴馭入羣空林花猶怯凍宫桞未禁風老覺才情減梁園賦獨工與盛希道太史談𤣥二首愧乏山林骨欣逢大隐人時參言外意己識相中身斜月前谿水微風别浦津青山誰可住春入桞條新二我有江南屋花叢掛月痕湘簾風不捲寳鼎火初温仰面晨窺牖低頭夕掩門千言難易辯無語向君論謝類菴恵山菜數色戢戢雲能把盈盈露帶漙琅玕難比色苜蓿正虚盤百事俱堪做千金欲報難偏慚名未識細撿國風看自忻州還度石嶺闗北望沙塲磧南來石嶺闗遥山看圍合新水送潺湲短髪蒼茫裏髙情紫翠間曉隂渾未散暫此寄悠閒予入晉以四月二日宿權店三日過南闗抵盤陀八月東巡還亦以二日抵權店是晩遂宿南闗三月午餉盤陀豈有定數耶一飯盤陀驛青山是冄來登臨殊不盡莭物苦相催樹色庭除古秋衣篋笥開天涯俱作客去住莫驚猜萬善驛小憇西山初出險南日正隨陽客路逢殘歲人情懐故郷河流看渺渺雲樹入蒼蒼天地留形勝中州古帝王望日觀氷十里湖南路連空入望遲日華流寳氣風景接瑶池岸谷人間事氷霜歲晩知揚雄工奏賦羽獵想當時井陘道中遇雪三白豐年兆連朝瑞更多巖阿皆入畫郢曲况聞歌㸃綴乾坤好調停莭候和青山如好客乗興逺相過入平定州雪擁頻囘馬山寒少見人歲長不記歴風暖即知春泉石謀生薄烟霞即事新此中有真隱能望豈能親曉發包家集殘月曉猶上清霜春正濃背山過疊疊前路去重重野店客期集沙村人力農中原戎馬地開運憶飛龍東郷長至去歲巡萍郷至日復至日萍郷更東郷長途雙客鬢浮世兩年光水轉谿無路林寒夜有霜天時與人事消息看相將露坐露坐消江夜開簾納水風十年常作客百計若為工星斗三天上郷園大海東南飛烏鵲侣未必羡冥鴻自山南過宣妙寺復㑹周約菴小燕深慰停舟待還承髙㷼開雨中多寳樹風外妙髙臺老愛塵凝榻心驚夢破槐空門多意味欲去重徘徊送顧頥齋進表有美文章伯樓船出漢嘉萬年天子壽一統帝王家灘下黄牛峽江回白鷺沙大官供賜酒湛露映流霞習池襄樊戎馬地山簡愛高閒勝事傳千古江流抱一灣碧山羅户牖翠篠漾潺湲東望増郷思宸遊正北還登祭江亭春深羊傅廟江湧鹿門山一上孤亭望遥空獨鶴還浪沙明浴日苔砌暈成斑耆舊登臨地高風乍可攀轟廐驛乗潮順風北下人生快心事風水送歸舟況復青山曲頻過碧樹洲草深藏乳鴨波逺沒輕鷗苦愛觀風地終慙為國謀上虞道中山海無藏秀乾坤有奥區土風兼百粤習氣近三吳潮落曹娥渡天垂賀監湖畫船牽錦纜時復下菰蒲玉山西下換小舟乗月平生愛山水清興此宵偏兩岸爭開畫中流獨進船星河相隱映波月共嬋娟又向灘聲裏珠明練倒懸次韻送李都閫相望極天涯兹行况近家弦驚雲外鴈弓臥壁間蛇南國收蠻霧重湖靜浪花宏開仁壽域那敢獻餐霞常州道中遇雨片雨江南路舟行幅畫圖樹頭勻著翠荷葉亂跳珠秦望烟光晩晉陵雲氣孤所嗟舟子意霑灑與泥塗荆門驛逢張常甫庶子忽報荆門驛俄傳學士舟喜來狂欲舞起坐病俱瘳客笥衣重改人家麥已秋風波自淹速意緒且綢繆五言排律一首夾馬營大風不知遊子意正切故郷情飄颻自南北颯飁亂噌吰撼樹動地軸飛沙迷日晶急流江故逆去棹布頻横前途勞問訊舟子重論評觸日白雲舞漫空紅雨傾燕啣泥不度鵲託杪偏驚髙閣心疑動危峯勢若撑人間因苦樂天道任虚盈宋祖龍飛地髙皇虎脱嬰百年兩陳迹雙眼獨分明更發斜陽裏浮萍是此生儼山續集巻三
