body:
  text: 儼山集卷六十一明陸深撰傳三擬孫炎列傳孫炎字伯融句容人也祖文嗣父顯卿皆為儒炎身餘六尺面鐵色一足偏跛於書少所不通喜雄辨辨常窮一座人元至正中天台人丁復金陵夏煜皆有詩名炎遊此兩人間最深時時與夏煜飲酒賦詩角勝得一雋語輒槌案大譁聲撼四鄰每下筆纍紙可盡由此驚動江東間出遊四方所與交必當時豪傑常鄙視章句儒衆中自負曰孫炎豈齪齪伍耶竟困而歸嵗乙未高皇帝渡江得金陵開江南等處行中書省召炎炎見上陳元運將終勸上養士以圖大業凡稱上心戊戌從征浙東擢池州府同知尋改池為華陽府即拜炎華陽知府明年冬召為省都事月餘會處州降乃以都事往總制處錢穀兵馬之柄悉委之不取中報且以省符未署者付之聽自辟任炎匹馬入處時賊營城外酋蠻咸狼虎踞不肯奉官府約束炎至坐􅈦事驅城中民跽階下諭上意在生民無自取虀粉為也語氣慷慨甚民皆叩頭流血退而轉相告以為孫使君不比舊官可玩狎矣炎又為檄遍屬縣諭之皆投兵相繼為良民又擇其驍勇者為兵拔其服衆者為長時練習之以備冦罷則歸農馳一符立軍門至無敢後者姦吏豪族束手畏之雖在數百里外常若炎臨其家不敢出聲語時上方事延攬秀民伏匿山谷中咸未肯出炎鉤致一二人問有才者為誰今皆安在録其姓名遣使者以書招之當是時劉基章溢最為處士所推基又最有名使者再往返不起以一寶劒奉炎炎以為劒當獻天子作詩封還之仍為數千言書開陳天命以諭基基乃肯就見置酒與基飲論古今成敗如傾河決基深歎服曰基始以為勝公公論議若此基何敢望公也炎徒以口舌安反側郡上方征伐無一兵與炎壬寅二月苗將賀仁德李祐之叛襲炎炎坐無援被幽空室中列卒環守脅炎降炎紿之曰若縱吾吾能成若事叛將益疑之遇夜以炙鴈斗酒饋曰以此與公訣炎引佩刀割鴈舉巵酌酒仰天歎曰嗟夫丈夫死爾死義爾賊死肉臭狗且不爾食卒怒持劒瞋目擬之炎飲酒自若食竟叱其解衣炎罵曰此紫綺裘吾上所賜誰當解者乃引枕而臥賊乘其睡中害之年三十戊申追封丹陽縣男妻王氏初國兵入金陵死之太史公曰語云膏粱養體金石伐病其文武之謂與孫炎早以竒氣自負遭際草昧觀其於鎮撫民有餘力矣卒死於兵亂何哉擬花雲列傳花雲懷遠人也少孤隨母嫁張氏貌偉而黑勇力絶人嵗癸已謁高皇帝於臨濠一見奇之俾將兵略地遂破懷遠城虜其帥以歸進拔全椒乘夜襲繆家寨走之甲午秋七月上將取滁州雲單騎前行卒遇數千賊顧後騎逺雲乃提劒躍馬貫其陳而去賊驚曰此黑將軍勇甚難與爭鋒是行從克滁乙未春正月從取和州得兵三百人授管勾夏六月從渡江先濟從克采石取太平上以雲忠勇命宿衛左右丙申春三月從克集慶得兵千人升總管徇鎮江丹陽丹徒金壇諸縣皆下之過馬馱沙擒殺劇盜數百人授前部先鋒夏六月立行樞密院於太平以雲為院判丁酉春正月克常熟得兵萬人命將之三月攻拔常州駐守牛塘營秋七月以兵三千趨寧國道羣盜間陷山澤中者八日雲操戈轉鬬而前出入險阻斬獲以千百而身未嘗被一創一矢還命守太平庚子夏閏五月漢主陳友諒以舟師冦太平雲帥麾下三千拒之友諒引巨舟泊城西南隅敵衆緣舟尾攀堞而上城中飢憊遂陷雲被縛縛急雲怒罵賊奮躍大呼縛盡解起奪守者刀殺五六人復罵曰虜非我主敵也曷不趣降敵怒碎雲首懸於舟檣衆射之雲罵不絶死年三十九甲辰追封東丘郡侯初雲戰方急夫人郜氏抱三嵗兒拜家廟泣會家人曰城且破吾夫忠義人也必死之吾夫死吾不可不死所不可者使花氏無後兒在若等善撫之聞變夫人赴水死之侍兒孫氏負兒去就漢軍虜至九江軍中惡養小兒孫更以兒屬漁家曰此兒良宜善視之是年冬漢破孫脫身至漁家視兒良在瞷漁人出竊負以逃夜宿陶穴中天曙脫簪僦舟以渡會漢潰軍還奪舟捽之江中孫氏抱兒遇斷木浮至附入葦洲採蓮實哺兒七日不死夜半聞人聲呼之逢一老父號雷老告之故與俱行明年辛丑春二月達上所孫侍兒抱兒且泣且拜上亦泣置兒于膝曰此花雲子將種也賜雷老衣遣之詔復其徭不見雷老追之無所得云兒名煒水軍左衛指揮僉事太史公讀花東丘傳而異其所謂雷老者豈一時豪俠士類脫人於難而併與身名焉隱之至託之神物甚矣其江流斷木抑亦有天命可以為難楝塘翁小傳楝塘翁姓李氏名正華字本素鄞人也鄞甬之東山水清嘉人喜種植務農功李氏世家鄞城初櫟軒先生開别墅於古鄮之墟北枕龍岡南列鹿巖諸峯其東則太白山雄跨西來諸水則東吳小白寶幢咸會而束之以匯縴橋有形勝焉櫟軒生五男子而翁最長會當析産以居翁顧諸弟慰之曰吾當徙且業吾農也乃往得墅因手植二楝曰楝苦木也吾以此示子孫遂築室鑿渠繚之以垣內外整整可居久之二楝離立門左右日長以茂適蔭塘水之上亭亭若張蓋逺望數十里可見皆曰此李氏之居也因稱之曰楝塘而稱翁曰楝塘翁云每春夏之交楝吐花煜煜香風披拂紫翠若錯繡可愛天且盛暑濃隂敷布幾百餘武翁坐堂上綸巾羽扇手一編或口哦小詩興至則拂柯攀條升高望逺每呼子若孫讀書其旁聽以為樂時出步田疇間與農人較量粳秫問嵗入多寡客至未嘗不置酒即橋為席因石為几菱芡蓮藕之屬請客所欲即取而供之或棄其餘鵲下巢鳴喳喳魚尾尾躍水面不復避人或對奕或鼓琴或流觴而飲或蕩槳而遊大醉則放歌振起林木間與漁榔牧笛之聲相和答客人人愜不忍言去去則就塘浴浴起則枕石而臥清蔭掩映不知炎熇之襲人也入秋冬則有黃葉飛舞浮沈碧流中爛若雲錦青子纍纍葡萄在架野禽啄啅羣翻爭墜時復夕陽在樹則炙背而觀之月明之夜倒影入池如鏡乍拭星斗羅列其下咸可俯而掬也門外樵採歸者船尾相銜如織或值風雨暴至則金鳴鐵應若在戰場霜雪交加則瓊葩玉蕊如登瑶圃當其意會處豁如也翁撫之曰此足以老矣路當通津往來者至比之桃源而不僻翁遂以楝塘名天下天下士大夫從而咏歌之翁亦作詩自賞有云人薄利名何患老子分耕讀不妨多世傳以為實録不獨佳句也翁四子曰循義循禮循智循信俱世其家循義乃以文學起甲科繼以卓異應令格召為天子耳目之臣翁遂兩膺勑典蓋異數云今踰七望八之年風神邁朗冠佩偉如所謂神仙官府兼之者非耶善乎姚太史之言曰楝之榮晚且久也故人又稱之曰楝塘封君云太史公曰豫聞種木者求用於十年之後大江南多長林木不可以品計大抵農家喜種槐與楝適所用也故諺有之曰頭槐二楝夫槐一發為良楝良於再發豈不信哉昔王祐種三槐於庭曰後世必有為三公者已而果然翁種楝而其子循義舉進士為御史乃再發之符與種槐事同然而不同者王取必於槐而翁無心於楝也豫故類而論之鮑處士小傳太史公曰豫讀前代隱逸傳記未當不慨想其人也其欲易足其業耕釣其道孝友廉介其事讀書誦詩治氣養生其樂登高臨深彈琴放歌時時弄筆墨著書睢恣自適而已其中空洞未易窺也豫北遊蓋三千餘里矣當山川之盤鬱顧林木之茂密意必有先生處士隱居其間咸即訪焉而未得將豫遊之未逺耶及有官京師從祀諸陵出入都城每每加物色之京師五方之所聚也或者有朝隱吏隱大隱庶幾一遇焉然其迹愈微愈不可得而見云黃山者江南之望山也其山廣厚延亘數百里其高見三百里其下多洞府蓋古仙靈之窟宅世傳黃帝於此仙去故其居民猶有隱逸之遺風云汪程鮑鄭黃山著姓也居其地蓋皆千數百嵗鄭廉氏之於汪𢎞仁氏友也𢎞仁嘗客太史公所廉介於𢎞仁言於太史公曰夫子居常喜道隱逸黃山鮑處士其隱者耶蓋隱於賈者也乃今老矣休矣太史公唯唯夫隱者恬淡多考終夫惟不變其末以成其操非是曷考耶是弗可以弗傳已處士姓鮑名光宇字以𢎞歙人也鮑出夏后氏敬叔仕齊食於鮑因氏鮑敬叔生叔牙亦仕齊薦管仲相桓公乃大有功當時語曰管鮑率為宣王時卿秦既併六國鮑遂散處漢哀帝時司隸宣最顯光武時永亦為司隸晉有靖為葛稚川所愛宋有昭以文章稱自後鮑氏無甚顯者趙宋南渡有壽孫者亦自青齊來歙壽孫者與父宗嚴爭死賊世稱慈孝鮑家而歙之鮑立矣孝宗敬皇帝時時明吮母疽愈郡太守上之令格得旌門會太守代去事寢鄉里義之時明實生處士生三嵗而程孺人卒程孺人者處士之母也當時無知也比有知有及程孺人者無不涕泣不已兹謂其得慈孝之遺云甫冠年偕其羣從行賈往來汴中積十餘嵗資纍巨萬他賈者咸弗若也或請焉曰吾惟無競心云爾方貨之集也競者市之惟恐盡吾俟其盡取之而吾從而取焉及其售也競者發之惟恐不盡吾俟其盡發之而吾從而發焉夫市競焉價必湧售競焉貨必壅是皆非物之理也吾惟無競焉而以物之理為理故吾之賈也常居人後而操其贏也常先雖然聊寄觀於是已矣非吾好也會且棄去從吾初志乃歸傍黃山之麓闢園治圃鑿池構軒日以雲物卉木自娛樂浩如也性耿介不能為淹阿淟忍態人鮮覩云子芝蘭葵太史公曰自三代井田法廢士大夫鮮不兼農賈之事况他無祿位者乎若鮑處士之從賈近於理財蓋託迹於一事者非耶語云大隱在城市又不然乎晚逸居士傳晚逸居士者歙人也姓鄭氏名敬偉字郁大世居雙橋出歙令君安曾祖德紹祖仲榮父文盛咸以誼禮後鄭居士少孤走四方懋遷以資雄長既有子三曰尚似尚化尚僩咸肖乃俾以其業而休焉故稱晚逸居士云居士事母孝為弟弟與人交必敬慕其賢者弱冠遊止桐鄉弔朱司農之墓登余忠宣公大節堂徘徊慨歎不能去識者竒之兄玄偉客河南為苦惱子者所訹苦惱子梁宋魯衛間無賴結數人為黨收養丐乞無依者於他僻處廉知四方商賈之有財者乃令一人入市貿易故為低昂以激怒又激以取辱譁諸市其黨尾偵之待其勢成乃直前謂為兄弟也佯責其不謹謝過扶去歸則殺一丐者明旦素服號慟蒙尸以至其黨又從中和解之盡獲其金帛乃已玄偉坐是亡去錢數千緡居士聞之乃晝夜馳蹤迹至陳州盡得其狀以聞于官悉置諸無賴于法北方之俗少衰矣官還其緡之半竟以歸其兄云休寧人程祿家貧後母弟被誣以殺人事不勝捶楚乃誣服祿恐其傷母志也出白于吏曰實殺人者祿也今抵罪者乃吾弟爾吏遂釋其弟而坐之居士與之錢若干為路費慫恿以聞于朝祿竟得白其行誼多類此居家以禮度自持為一族倡常語諸子曰非勤無以生財非儉無以足用非禮無以立身非義無以處事汝曹以此四言終其身可也又曰兄弟如鼎足足傾則鼎覆矣汝曹能協心一力庶幾吾志在是今年凡十為鄉飲賓云太史公曰昔司馬遷以言事當腐刑漢法得贖遷家貧竟下蠶室遷乃發憤傳貨殖遊俠以著微志若曰當是時以金銀數鏹與有力尚氣之人捐數鏹與之皆足以脫已於禍豫讀其書未嘗不悲焉夫財貨於人至薄也茍當其急亦足以免患而全其大若夫美女奇物不至則羑里之西伯未可知也易曰利者義之和也不其然哉所貴乎人之豐其財者正以其能脫賢人君子於患難而其倡義也乃先衆人而辦耳不然金谷郿塢之所畜竟何為哉竟何為哉程祿之遭遇郁大玄偉之得其弟皆過於遷遠矣豫故次其言行作晚逸居士傳居士儻所謂古之人非耶儼山集卷六十一
