body:
  text: 儼山集卷五十七明陸深撰史記一周大記周后稷名棄帝嚳子也其母有邰氏女曰薑原為帝元妃薑原出見巨人迹履之而有娠居期生子以為不祥而棄之隘巷牛羊皆腓字之又棄之林中會山林人多遷之棄之冰上飛鳥覆翼之薑原以為神乃收養之因名曰棄棄為兒時屹如巨人之志其遊戲好種樹麻菽麻菽美及為成人遂好耕農相地之宜稼穡焉民皆則之堯聞而舉為農師有功帝舜曰黎民阻飢爾稷播時百穀封于邰號曰后稷别姓姬氏后稷之興在陶唐虞夏之際皆有令德后稷死子不窟立不窟末夏后氏衰廢稷不務不窟以失其官而奔戎狄之間不窟卒子鞠立鞠卒子公劉立公劉雖在戎狄之間復修后稷之業百姓歸焉周道之興自此故詩人歌之公劉卒子慶節立國於豳慶節卒子皇僕立皇僕卒子差弗立差弗卒子毁隃立毁隃卒子公非立公非卒子高圉立高圉卒子亞圉立亞圉卒子公叔祖類立公叔祖類卒子古公亶父立古公亶父復修后稷公劉之業國人戴之薰育攻之民怒皆欲戰古公曰豫不忍為乃去豳踰梁山止於岐山之下豳人盡復歸於岐下及他旁國亦多歸之於是古公乃營築城郭而邑焉作五官有司民皆頌之古公有子長曰太伯次曰虞仲太薑生少子季厯季厯娶太任皆賢生昌有聖瑞古公曰我世當興其在昌乎太伯虞仲乃如荆蠻以讓古公卒季厯立是為公季公季修古公遺道諸侯順之公季卒子昌立是為西伯西伯遵后稷公劉之業則古公公季之法禮賢下士士多歸之伯夷叔齊聞西伯善養老自孤竹往歸之太顛閎夭散宜生鬻子辛甲大夫之徒皆往歸之崇侯虎譖西伯於紂紂乃囚西伯於羑里閎夭之徒患之乃求美女奇物獻紂紂乃赦西伯賜之弓矢斧鉞使得征伐曰譖西伯者崇侯虎也西伯乃獻洛西之地請去炮烙之刑紂許之西伯行善諸侯皆來決平於是虞芮之人如周俱讓而去明年伐犬戎明年伐密須明年敗耆國明年伐邘明年伐崇侯虎而作豐邑自岐而徙都豐明年西伯崩諡為文王文王囚羑里演易之八卦為六十四卦蓋即位五十年詩人道西伯受命之年稱王而斷虞芮之訟云太子發立是為武王武王改法度制正朔矣追尊古公為太王公季為王季蓋王瑞自太王興武王即位太公望為師周公旦為輔召公畢公之徒左右王師修文王緒業九年武王上祭于畢東觀兵至于孟津為文王木主載以伐紂畢立賞罰遂興師武王渡河中流白魚入舟既渡有火下于黃屋流為烏其色赤其聲魄云諸侯不期而會者八百皆曰紂可伐矣武王曰未可也乃還師歸二年紂昏亂滋甚殺王子比干囚箕子太師疵少師強抱樂器奔周於是武王遍告諸侯曰不可以不畢伐乃率戎車三百乘虎賁三千人甲士四萬五千人以東十一年十二月戊子師畢渡諸侯咸會乃作太誓二月甲子昧爽至于牧野乃誓武王左杖黃鉞右秉白旄誓曰豫發維共行天之罰今日之事不過六步七步乃止齊焉夫子勉哉不過四伐五伐六伐七伐乃止齊焉勉哉夫子爾所不勉有戮事已諸侯會者車四千乘陳師牧野紂亦發兵七十萬人距武王師尚父致師以大卒馳紂師皆倒兵武王馳之皆崩畔紂紂走反入登于鹿臺之上蒙衣其珠玉自燔而死武王持太白旗以麾諸侯諸侯畢拜武王乃揖諸侯諸侯畢從武王至商商國百姓咸待於郊於是武王使羣臣告語商百姓曰上天降休商人皆稽首再拜武王亦答拜遂入至紂死所武王自射之三發而後下車以輕劍擊之紂之嬖二女皆經自殺武王又射三發擊以劍斬以玄鉞已乃出復軍其明日除道修社及紂宮及期百夫荷罕旗以先驅武王弟叔振鐸奉陳常車周公旦把大鉞畢公把小鉞以夾武王散宜生太顛閎夭皆執劍以衛武王既入立于社南大卒之左右畢從毛叔鄭奉明水衛康侯封布兹召公奭贊采師尚父牽牲尹佚策祝曰殷之季紂殄廢先王明德侮蔑神祇不祀昏暴商邑百姓其章顯聞于天皇上帝於是武王再拜稽首又曰膺更大命革殷受天明命武王又再拜稽首乃出封紂子祿父殷之餘民未集武王乃使弟管叔鮮蔡叔度相祿父治殷已而命召公釋箕子之囚命畢公釋百姓之囚表商容之閭命南宮適散鹿臺之財發巨橋之粟以振貧弱命南宮史佚展九鼎寶玉命閎夭封比干之墓命宗祝享祠于軍乃罷兵西歸作武成封諸侯班賜宗彝分殷之器物武王追思先聖乃褒封神農之後於焦黃帝之後於祝帝堯之後於薊帝舜之後於陳大禹之後於杞於是封功臣而師尚父為首封尚父於營丘曰齊封弟周公旦於曲阜曰魯封召公奭於燕封弟叔鮮於管弟叔度於蔡餘各以次受封武王徵九牧之君登豳之阜以望商邑武王至周夜不寐周公旦曰曷為不寐王曰告女我未定天保何暇寐我南望三塗北望嶽鄙顧詹有河粵詹雒伊毋逺天室營周居于雒邑而後去縱馬華山之陽放牛桃林之野振兵釋旅示天下不復用也武王已克殷後二年問箕子以天道武王病羣公懼穆卜周公乃祓齋欲代武王武王有瘳後而崩太子誦代立是為成王成王少周公攝政管叔蔡叔疑與武庚作亂畔周周公誅武庚管叔放蔡叔以微子啓代殷後國於宋收殷餘民以封衛康叔康叔武王少弟也晉唐叔得嘉穀獻之成王成王以歸周公于兵所周公受禾東土旅天子之命初管蔡畔周公討之三年而畢定故初作大誥次作微子之命次歸禾次嘉禾次康誥酒誥梓材其事在周公之篇周公行政七年反政成王北面就羣臣之位成王在豐使召公復營洛邑如武王之意周公復卜申視卒築居九鼎焉曰此天下之中道里均作召誥洛誥成王既遷殷民周公作多士無逸召公為保周公為師東伐淮夷殘奄遷其君薄姑成王自奄歸在宗周作多方既絀殷命歸在豐作周官正禮樂制度於是民和睦頌聲興成王既伐東夷息慎來賀王賜榮伯作息慎之命成王懼太子釗之不任乃命召公畢公率諸侯以相太子而立之成王既崩二公率諸侯以太子釗見於先王廟申告以文武之所為王業之不易務在節儉毋多欲作顧命太子釗遂立是為康王康王即位遍告諸侯作康誥故成康之際天下安寧刑錯四十餘年康王命作策畢公分居里成周郊作畢命康王崩子昭王瑕立時王道微闕昭王南巡狩不返卒於江上立昭王子滿是為穆王穆王即位春秋已五十矣王道衰微乃命伯冏申誡太僕作冏命穆王將征犬戎祭公謀父諫曰不可先王耀德不觀兵夫兵戢而時動動則威觀則玩玩則無震是故周文公之頌曰載戢干戈載櫜弓矢我求懿德肆于時夏允王保之先王之於民也茂正其德而厚其性阜其財求而利其器用明利害之鄉以文修之使之務利而辟害懷德而畏威故能保世以滋大昔我先世后稷以服事虞夏及夏之衰也棄稷不務我先王不窟用失其官而自竄於戎狄之間不敢怠業時序其德遵修其緒修其訓典朝夕恪勤守以敦篤奉以忠信奕世載德不忝前人至于文王武王昭前之光明而加之以慈和事神保民無不欣喜商王帝辛大惡于民庶民不忍欣載武王以致戎于商牧是故先王非務武也勤恤民隱而除其害也夫先王之制邦內甸服邦外侯服侯衛賓服夷蠻要服戎翟荒服甸服者祭侯服者祀賓服者享要服者貢荒服者王日祭月祀時享嵗貢終王先王之順祀也有不祭則修意有不祀則修言有不享則修文有不貢則修名有不王則修德序成而有不至則修刑於是有刑不祭伐不祀征不享讓不貢告不王於是有刑罰之辟有攻伐之兵有征討之備有威讓之命有文告之辭布令陳辭而有不至則增修於德無勤民於遠是以近無不聽遠無不服今自大畢伯士之終也犬戎氏以其職來王天子曰豫必以不享征之且觀之兵無乃廢先王之訓而王幾頓乎吾聞犬戎樹敦率舊德而守終純固其有以禦我矣王不聽遂征之得四白狼四白鹿以歸自是荒服者不至諸侯有不睦者甫侯言於王作甫刑穆王立五十五年崩子共王繄扈立共王遊於涇上密康公從有三女奔之其母曰必致之王女三為粲夫粲物之美也女何德以堪之小醜備物必亡康公不獻後一年共王滅密共王崩子懿王囏立懿王之時王室遂衰詩人作刺懿王崩共王弟辟方立是為孝王孝王崩諸侯復立懿王太子燮是為夷王夷王崩子厲王胡立厲王即位三十年好利近榮夷公大夫芮良夫諫曰王室其將卑乎榮公好專利夫利百物之所生也而專之其害多矣以是教王其能久乎夫王人者將導利而布之上下者也王而專之其歸鮮矣厲王不聽卒以榮公為卿士王行暴虐侈傲國人謗召公諫曰民不堪命矣王怒得衛巫使監謗者告則殺之諸侯不朝三十四年王益嚴道路以目厲王喜告召公曰吾能弭謗矣召公曰是障之也防民之口甚於防水水壅而潰傷人必多民亦如之王不聽於是國莫敢出言三年乃相與畔襲厲王厲王奔彘太子靜匿召公之家國人聞而圍之召公曰吾昔驟諫王王不從以及此難也今殺王太子其以我為讎而懟怒乎乃以其子代王太子太子竟得脫召公周公二相行政號曰共和共和十四年厲王死于彘太子靜長於召公家二相乃共立之是為宣王宣王即位二相輔之修文武成康之遺風諸侯復宗周十二年魯武公來朝王籍千畝虢文公諫曰不可王弗聽三十九年戰于千畝敗績于薑氏之戎乃料民於太原仲山甫諫曰不可王不聽四十六年宣王崩子幽王宮涅立幽王二年西周三川皆震伯陽甫曰周將亡矣昔伊洛竭而夏亡河竭而商亡今周德若二代之季矣夫國必依山川山崩川竭亡國之徵也不過十年數之紀也是嵗三川竭岐山崩三年幽王嬖褒姒周太史伯陽讀史記曰周亡矣昔自夏后氏之衰也有二神龍止於夏帝庭而言曰余褒之二君夏帝卜殺之與去之與止之莫吉卜請其漦而藏之乃吉於是布幣而策告之龍亡而漦在櫝而去之夏亡傳此器殷殷亡又傳此器周比三代莫敢發之至厲王之末發而觀之漦流于庭不可除厲王使婦人裸而譟之漦化為玄黿以入王後宮後宮之童妾既齓而遭之既笄而孕無夫而生子懼而棄之宣王之時童女謡曰檿弧箕服實亡周國於是宣王聞之有夫婦賣是器者宣王使執而戮之逃於道而見鄉者後宮童妾所棄妖子出於路者聞其夜啼哀而收之夫婦遂亡奔於褒褒人有罪請入童妾所棄女子者於王以贖罪棄女子出於褒是為褒姒當幽王三年王之後宮見而愛之生子伯服初王娶申侯女為后而生太子宜臼至是竟廢申后并去太子而以褒姒為后伯服為太子太史伯陽曰禍成矣無可奈何褒姒不好笑王欲其笑萬方故不笑王為烽燧約諸侯冦至則舉烽火乃舉烽火召諸侯諸侯悉至而無冦褒姒大笑王説之為數舉烽火其後不信諸侯益亦不至幽王以虢石父為卿國人皆怨又廢后去太子申侯怒與繒西夷犬戎攻幽王幽王舉烽火徵兵兵莫至遂殺幽王驪山下虜褒姒盡取周賂而去於是諸侯乃即申侯而共立故太子宜臼是為平王平王立東遷于雒邑辟戎冦也平王之時周室衰微齊楚秦晉始大政由方伯五十一年平王崩太子泄父蚤死立其子林是為桓王桓王平王孫也桓王三年鄭莊公朝桓王不禮五年鄭怨與魯易許田許田天子之用事太山田也十三年伐鄭鄭射王傷二十三年桓王崩子莊王他立莊王四年周公黑肩欲殺莊王而立王子克辛伯告王王殺周公王子克奔燕十五年莊王崩子釐王胡齊立釐王三年齊桓公始霸五年釐王崩子惠王閬立惠王二年大夫邊伯等五人作亂惠王奔溫居鄭之櫟王弟頽立為王初莊王嬖姬姚生子頽有寵及惠王即位奪其大臣園以為囿故五人因以作亂四年鄭虢伐之殺王頽復入惠王惠王十年賜齊桓公為伯二十五年惠王崩子襄王鄭立後母曰惠后生叔帶有寵於惠王襄王畏之三年叔帶與戎翟謀伐襄王不克奔齊齊桓公使使平之九年齊桓公卒十二年叔帶復歸於周十三年鄭伐滑王使遊孫伯服請滑鄭人囚之王怒將以翟伐鄭富辰諫曰凡我周之東徙晉鄭焉依子頽之亂又鄭之由定今以小怨棄之王不聽十五年王降翟師以伐鄭王德翟人將以其女為后富辰諫曰平桓莊惠皆受鄭勞王棄親親翟不可王不聽十六年王絀翟后翟人來誅殺談伯富辰以其屬死之初惠后欲立王子帶故以黨開翟人翟人遂入周襄王出奔鄭鄭居王于泛子帶立為王取襄王所絀翟后與居溫十七年襄王告急于晉晉文公納王而誅叔帶襄王乃賜晉文公圭鬯弓矢為伯以河內地與晉二十年天王狩于河陽諸侯畢朝晉文公踐土之盟二十四年晉文公卒三十一年秦穆公卒三十二年襄王崩子頃王壬臣立頃王六年崩子匡王班立匡王六年崩弟瑜立是為定王定王元年楚莊王伐陸渾之戎次洛使人問九鼎王使王孫滿却之十年楚莊王圍鄭鄭伯降已而復之十六年楚莊王卒二十一年定王崩子簡王夷立簡王十三年晉殺其君厲公十四年簡王崩子靈王泄心立靈王二十四年齊崔杼弒其君莊公二十七年靈王崩子景王貴立景王十八年后太子聖而早卒二十年景王愛子朝欲立之會崩子丐之黨爭立國人立長子猛是為悼王王子朝攻殺猛晉人攻子朝而立丐是為敬王敬王元年晉人入之王子朝自立敬王不得入居澤四年晉率諸侯入敬王于周子朝為臣諸侯城周十六年子朝之徒復作亂敬王奔于晉十七年晉定公遂入敬王于周齊田恆弒其君簡公二十年孔子相魯四十一年楚滅陳孔子卒四十二年敬王崩子元王仁立元王八年崩子定王介立定王十六年三晉滅智伯分有其地二十八年定王崩長子去疾立是為哀王哀王立三月弟叔襲殺哀王而自立是為思王思王立五月少弟嵬攻殺思王而自立是為考王此三王皆定王之子考王十五年崩子威烈王午立初考王封其弟於河南是為桓公以續周公之官職桓公卒子威公代立威公卒子惠公代立乃封其少子於鞏以奉王號東周惠公威烈王二十三年九鼎震是嵗韓趙魏為諸侯二十四年崩子安王驕立是嵗盜殺楚聲王安王立二十六年崩子烈王喜立是嵗周太史儋見秦獻公曰始周與秦國合而别别五百載復合合十七嵗而霸王者出焉十年烈王崩弟扁立是為顯王顯王五年秦獻公稱霸王致賀九年致文武胙於秦孝公二十五年秦會諸侯於周二十六年周致伯於秦孝公四十四年秦惠王稱王其後諸侯皆稱王四十八年顯王崩子赧王延立赧王時東西周分治赧王徙都西周西周武公立公子咎為太子共太子死有五庶子母適立司馬翦説楚立之八年秦攻宜陽楚救之將伐周蘇代為周説楚王曰何以周為秦之禍也言周之為秦甚於楚者欲令周入秦也故謂周秦也周知其不可解必入於秦此為秦取周之精者也為王計者周於秦因善之不於秦亦言善之以疏之於秦周絶於秦必入於郢矣秦借道兩周之間將以伐韓周畏之史厭謂周君曰何不令人謂韓公叔曰秦之敢絶周而伐韓者信東周也公何不與周地發質使之楚秦必疑楚不信周是韓不伐也又謂秦韓強與周地將以疑周於秦也周不敢不受秦必無辭而令周不受是受地於韓而聽於秦秦召西周君西周君惡之周令人謂韓王曰秦召西周君將以使攻王之南陽也王何不出兵於南陽周君將以為辭於秦周君不入秦秦必不敢踰河而攻南陽矣東周與西周戰韓救西周或為東周説韓王曰西周故天子之國多名器重寶王案兵毋出可以德東周而西周之寶可以盡矣楚圍雍氏韓徵甲與粟於東周東周君恐召蘇代而告之代曰君何患於是臣能使韓毋徵甲與粟於周又能為君得高都周君曰子茍能請以國聽子代見韓相國曰楚圍雍氏期三月也今五月不能拔是楚病也今相國乃徵甲與粟於周是告楚病也韓相國曰善使者已行矣代曰何不與周高都韓相國大怒曰吾毋徵甲與粟於周亦已多矣何故與周高都也代曰與周高都是周折而入於韓也秦聞之必大怒忿周即不通周使是以弊高都得完周也曷為不與相國曰善果與周高都三十四年蘇厲説秦白起無攻梁四十二年秦破華陽梁城周從馬犯説也四十五年周君之秦秦攻周周最謂秦王曰為王計者不攻周攻周實不足以利聲畏天下則秦不王矣五十八年三晉距秦周令相國之秦還而見秦王曰請為王聽東方之變秦攻三晉五十九年秦取韓陽城負黍西周與諸侯約從將天下鋭師出伊闕攻秦秦昭王怒使將軍摎攻西周西周君奔秦獻其邑三十六口三萬周民遂東亡秦取九鼎寶器而遷西周公於􅓆狐後七嵗秦莊襄王滅東西周周亡論曰周道備矣蓋文武周公之盛也至於東遷王綱陵遲蓋幽厲之所為衰也太史公追論營洛其意蓋曰周之興也以豐鎬亡也以洛邑其實不然孔子曰文武之政布在方策豫因舊文略討論之使學者可覽見焉儼山集卷五十七
