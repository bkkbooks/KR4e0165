body:
  text: 儼山集卷七明陸深撰五言律詩一六十首何舍人館中對雪燕地春猶淺髙城雪更明相逢為客處同有望鄉情棧閣因風積樓臺入夜清不知梁苑賦何似蔡州城過盧溝橋野適意自愜逢春更可憐弄黃初試柳破碧已分泉馬足騰晴霧雞聲隔午煙翠華巡幸日馳道直如弦孝廟挽詞帝座宵沈彩皇祇晝嘯風時己午之間上賔申初有黑風從西北來括地揚塵咫尺不辨人懷三代治天忌萬年功衮冕丹青裏山河涕泗中聖恩如可報精衛海濤東下陵片月青山外遙燈緑樹中馬蹄知熟路人語雜回風臺殿參差出冠裳倣佛同穹碑猶入望揮涕憶神功對月連夜月色好此宵看滿輪金波惆悵裏碧海别離新氷雪南征鴈關山北望人琴書照清影舟楫對通津假寐假寐依洄洑篝燈伴水雲晚潮隨月上歸鴈帶霜聞地古三江合星移五夜分冥行吾豈敢露宿畏離羣三日出大明門日華麗髙閣風光媚輕塵喧喧車馬動藹藹嵗年新花柳回芳甸關山念逺人履端逢泰運大饗卜明禋賦得玉河煙柳御堤新水上細柳織輕煙隱映金鑾外低回玉甃前曉容橫一抹春色試三眠地接天門近常霑雨露偏得劉子書念子不能寐中宵鳴素琴近聞衡嶽去遙望楚江深入夢多岐路緘書有好音隔忩風雨橫愁絶故人心寄李獻吉客到梁園者仍煩致起居夜來新有夢春去久無書緑野深花徑黃河抱草廬迢迢千里道目短鬢蕭疏和張玉溪山行一徑出林坰四山開畫屏霜鐘度逺寺雪柳帶長汀路轉城闉出雲深石洞冥千年埋玉處龍氣晝常扃華蓋殿外候駕雪中有懷崔後渠嚴介溪上陵此去西陵好花驄並轡行橋山瞻王氣禮殿肅精誠候吏供宵飯歸鞭促曉程立殘金殿雪憶爾到昌平分水祠漫成江頭十日坐無日不吁嗟緑暗連天柳紅明委地花銜泥新燕子傍水舊人家南望無終極青天又一涯谷亭經舊寓土屋曽為客朱炎夜見星棗林連驛路麥飯趂魚腥萬里看雙鬢三年抱一經經行重俯仰楓樹晚冥冥過清河煙霧不見山春氣濃如酒沈沈醉逺山愛飛孤鳥沒隨意片雲間興為尋芳發塵憐撲面還石橋流水漫立馬聽潺湲徐州洪次韻表裏山河勝東泉復上流斜陽明石佛古堞繞徐州溪影尤宜月潮聲不待秋去來風雨橫竒絶冠兹遊月下抵彭城險中不覺險家近轉思家世路元無盡人生故有涯鄉音傳白苧秋事付黃花今夜彭城驛清尊對月華寶應晚泊天接湖光迥雲開塔影圓老漁明宿火客子傍歸船晚市風聲靜秋沙月色偏絶憐淨如練間擬謝公篇渡江幾日江南路靈旗發畫船江流餘舊日山色入新年風細蛟龍卧雲開虎豹眠夕陽京口閘吟興酒尊前過丹陽平明辭鐵甕日暮過丹陽逺道初知客方言忽近鄉苔封聫艇緑泥涴小車黃柳暗河橋下平分麥秀涼遊金山次唐韻過水金山寺真憐地脈分潮聲生絶壁江影墮孤雲涼吹先秋到長歌入夜聞登臨殊不極斜日伴微醺嘉定登圓通寺佛閣次王節推韻酷暑宜髙閣時花上檻紅水沈銷活火氷簟受南風鳥背層霄外龍腥古鉢中晚涼頻徙倚村郭失西東黃純玉之再遊龍華也豫不及再陪悵然次韻浦口橋西寺水深塵事稀重來黃叔度尚憶陸探微霜後驚紅樹天南望紫微還將五色手歸補衮龍衣遊昭慶寺秋風昭慶寺初日滿回廊地古松能偃山深橘未霜移舟還傍麓著屐試登堂髙閣凌雲表憑闌意自長坐月喜易欽之見過方庭兀坐久漏水靜來聞雉堞孤雲補旗竿片月分鄉心基逺夢涼意感微醺賴有同心者敲門慰藉勤題竹送張鍾美待御按雲南臨岐欲有贈贈此比琅玕南國多炎暑因君見嵗寒風雷山嶽動瀟灑畫圖看白雪真難壓青雲亦可千晚過元明新居嵗暮天涯客相依願好鄰樓臺殘夜月梅柳隔年春契誼憐知己馳驅愧此身浮雲終日事偏感異鄉人苦雨長安十日雨雨中孤客愁泥深妨著屐鄉逺怕登樓水氣偏欺日雲隂每妬秋不知畿甸裏禾黍尚堪收月下與張碧溪泛舟微月墮止水空明漾淺沙放舟沿柳岸看竹過鄰家林靜一枝鳥溪喧兩部蛙不應張博望别自有仙槎贈沈舉人銓嵗晚風江闊天空朔鴈孤君行自氷雪吾意且江湖驥北千金價鵬南萬里圖文章關國運把酒對青蒲儼山春曉二首濛濛連夜雨曲曲帶溪山隔水分喧寂經旬斷往還天連滄海近人比白鷗間多藉東風力吹春到閉關又初有江山勝况逢花柳春曉雲含宿雨暖吹約輕塵樹裏看孤棹煙中辨四鄰幾年京國夢喚醒愛間身寄孫思和竟負回舟約虛煩下榻留惟餘三畝宅遙望七峯樓天接星文動江涵鴈影流煙花正無數老眼幾時休雨中行史涇江路西南永端陽亦不晴草堂松粉潤花塢蘚痕平橋古行人迹田低過水聲兹遊自竒絶雲樹望中生六日雨二首郊居世塵少農月雨聲多暝色連葭菼繁隂動薜蘿歌謡終帝力霑潤即恩波漠漠江天外時時白鳥過又長間緣性懶愛雨為年豐入夜聲逾急因風勢轉雄燈前欹病枕江上憶漁翁亦有滄洲興相期泛水東南浦阻風西風催逝水一片布帆輕渺渺江鷗去離離錦樹明興髙偏有恨秋老最關情咫尺溪南路天留訪戴行留布金寺宿宿俱投寺行行莫問津麥波搖落日花雨戀殘春水國攻農事禪房清世塵鄉心與野意從此往來頻秋齋夜聽雨二首鸛鵲林棲盡秋窗細雨來野雲天共逺涼氣夜交催簷溜斷仍滴燈花落更開幽人心賞足孤詠寄髙懷又南畝苦刈稻秋風兼送寒老農舂舊穀紅女搗殘紈暗響隨黃葉疏香消紫蘭物華知節改加意幾回看宿碧雲寺西崦碧雲寺天空近太微堂虛寒吹入簷宿暮雲歸聽履仙卿集留僧錫杖飛偶因方外勝殊覺世情非次韻嚴介溪上陵帝遣修陵祀秋來得並行雨聲連日夜山色洗幽并逺道防殘暑齋心冀晚晴敬皇弓劍地揮淚想西征酌别何舍人兼問訊空同子年少誰如子他鄉怯病身春風滿歸路幾日罷征輪塵合青山逺河開碧樹新故園如見月應念未歸人贈别王瑩中二首孤舟連夜發客子念還家逺道多秋卷髙城急暮笳一身籠外鳥萬慮壁間蛇春色淮南路江蘺繞白沙二愛爾不能住髙樓空暮思浮雲連日腳流水繞天涯未有孫陽遇虛煩楚客辭故園江上好風詠况相宜五塢山房為盧師陳賦不是黃金地毋煩白石歌春風湖上路夜月鏡中波插案圖書在緣階蘭桂多遙知梅雪後杖屨待經過晚自西堤擕楫兒散步夕陽江水外曲曲帶沙堤生意隨汀草間心付杖藜漁舟天上下人語瀼東西稚子偏憐我相㩦過竹溪赴儲芋西少參中途過陳氏莊避雨合下陳蕃榻真成訪戴行燕泥妨馬力花雨弄春晴十里緣江路中年故國情不須團蓋擁風淡正雲輕人日雪二首院深勤掃地簾靜愛聞香墮壑隨風力穿雲逗日光山城閣道迥松徑石衣長欲試煎茶水丁寧近竹房二人日嵗常隂今年雪更深天空山競出春早柳難禁四海三農望孤城獨客心故園江上路梅塢有誰尋看雲筠簟瑩氷紋開簾卧看雲隨風還作陳映水復成文出岫連綿起竒峰次第分更能呈五色持此獻明君人日春日復人日鄉心亂客心東山遊不到西嶺雪常隂城郭林泉繞風雲殿閣深梅花臨水發拋事且須尋月下行舟水曲風帆渺雲開月殿圎金波千片動珠斗半空懸樹影連山合歌聲入夜妍舵樓髙似屋歸興坐來偏蘭溪道中朝日暉江路平林映逺山宿雲收不盡髙鳥與俱還秋草弄幽色寒松有好顔時時上髙瀨隱几聽潺湲教巖暮發向夕秋山紫西風吹白雲納涼移榻屢待月引杯勤嶺樹參差出漁歌次第聞去留俱有適吏隱欲中分宿建昌縣公館聽雨和周玉巖都憲五月溪山路水深雲更深溪梁連近麓帆影掠長林巨浸愁農事重隂傷客心翻將經濟意時向簿書尋鄱陽湖家居滄海曲觀水入雲天斜日番君廟西風塢子船草封髙岸沒波合斷山連起擊中流楫秋光滿大川望雲居道逺山初近天長晚更晴水從星漢落舟在畫圖行擊楫吳郎計乘槎漢使情難將物外意空博世間名萬載冒雨曉發途中次韻逢迎南至日上盡雨中山人過龍行處雲生馬度間征旗殘畫捲弛擔隋樵還阮籍何心者豫方索笑顔二曉行隨落月細雨暗前山天地隂晴裏風雲變態間逺裝初覺重濕鳥并知還捲幔峯巒接丹青有好顔儼山集卷七
