body:
  text: 儼山集巻七十五明陸深撰墓誌銘十四省軒莫先生墓誌銘壬寅冬十一月七日癸丑鄉貢進士省軒莫先生卒於家嘉靖之廿有一年其子南京工部主事如忠予告歸養之明年也又明年癸夘冬十月癸酉卜𦵏於二里涇祖塋之次如忠率諸弟匍匐走上海乞銘予諾焉按狀華亭之莫氏自正二府君始居胥浦鄉正二生慶一慶一生真一真一生文通皆修隠操文通乃遷郡城之榖水坊而莫氏始大文通生勝勝補庠生用嵗貢授官北京虎賁衛經歴滿考得敕贈及父母而莫氏始名郡中矣勝生昻昻生昊昊字宗大號一軒以尚書學有聲一時登成化癸邜應天鄉試第二仕東昌府通判卒配嚴氏繼强氏生六子而省軒行第三諱愚字汝明别號省軒省軒生而明秀長贅廣東僉事竹坡朱公昴内外咸有師承名益起亦以書經登應天癸酉鄉試凡八上春官年五十有六而卒配朱氏子男四長即如忠登嘉靖甲午順天鄉試第二繼舉戊戌進士高等娶富氏四川按察副使好禮女繼楊氏山東按察副使儀女次如信縣學生娶姚氏工部主事參女次如徳府學生娶韓氏側室吳出次如爵陸出尚幼息女二長嫁王諤次唐氏遺腹生孫三是龍是驥是騏嗚呼吾松素稱文獻多故家舊族然三世兩魁中有啟承之士俱守一經宛然西漢風誼信未有若莫氏之盛者也省軒嘗以經綸望其後而如忠之功業方發軔康衢惜也省軒齎志以早世吾郡斯文為之出涕况相知如予者哉予憶少時出見郡先輩皆卓卓自樹立風儀學術足啟後來繼從諸生為舉子業一時所與游者咸雅馴動遵經傳未有浮華靡麗之習如竹坡公予同年友也及見省軒尤愛之而予遽銘其墓耶嗚呼悲夫嗚呼悲夫省軒孝友天至事親咸有禮度素以天下事自負諳練世故明習法律思欲見之一世自倡義厚宗祀享交際之義内外親踈之辯下至樹藝孶畜米鹽之細舉籍有經緯而又盡取古今家訓門範可行者條列以示來軌其於天官星歴皇極經世律吕書獨為深解䇿算了了故尤有心計而莫氏益昌且繁矣嘗曰周官一書規模宏闊然至於羽毛鱗介之㣲區處甚宻是獨不宜於家乎又曰兒曹勉之且夫君子得志則有民社之寄而憂不得志則有宗祊之寄而憂孟子之論生道憂患為先使天運不積生人之理息矣東南膏沃民易以逸故多不才以驕侈敗族所習非也兒曹勉之又嘗喜誦老氏言聖人執左劵而不責於人故處世多隂厚無求知於人故知者鮮矣予故具見之比聞如忠泣道復如此此豈經生舉子所為空談也哉予重悲之乃叙論其大㫖誌之并系之銘銘曰家聲之舊於我乎傳世澤之有於我乎延海山左右若封乎萬年處士南溪朱公墓誌銘處士諱暉字文采别號南溪華亭人也按朱氏其先出亳之永城漢有朱詢者行相國參軍事傳至孝友先生諱仁軌以徳義聞于唐宰相敬則其弟也自宰相傳五世為茶院制使諱華戍守婺源因居黄墩又傳九世諱燾者宋徽國文公兄弟行也燾官饒州教授又為饒州人自饒州又傳五世諱素者仕元為松江府推官乃樂華亭風土居之故今為華亭人推官生祐之武舉進士祐之生信國朝永樂中仕至工部營繕郎中郎中生迪簡迪簡生宓號南莊有隠操壻於泗涇之李孺人寔禮部員外郎宜散公之姑也生三子季即處士初南莊公依李以外家業不當别業西居落落不屑家人事處士奉之治㸑值嵗饑斗米百錢處士有心計而孝凡奉養畢具雖甘毳腆腴之物隨須而辦父母亦不知其所從也南莊喜飲酒李孺人每止之處士内順母心外私釀以進故雖以酒困乃其心㒺不頽然樂也𢎞治間詔令民間𦵏及時適南莊以脾疾卒當盛暑勉力襄事如制既乃廬墓而以所居讓其兄兄卒無後復養寡嫂終其身鄉里稱之凡義舉必曰朱處士南谿南谿云南谿賦性雅淡無所嗜慕獨嗜善慕義若不及處人不設城府處己惟以理自勝好交海内名賢館待無倦當泗水之匯擇勝作駐春堂復裒先世敕誥凡九通建寳敕樓近樓闢圃蒔蔬種樹水竹翛然極盤桓之趣忽一日慨然嘆曰吾憶廬墓時僅僅容膝今堂構軒豁畆鍾之田可備魚菽之祭有子學文人生可矣遂不復事事以嘉靖廿又一年六月二十日考終於正寢距其所生庚寅嵗十月三十日得夀七十有三配孫孺人無子乃懐仲兄子子之名曰承順側室徐氏生三子長曰承益次曰承緒季曰承祊承順以文學倡諸弟有能詩名承益以縣學生上成均成緒總家政承祊舉應天丁酉鄉試出後竹坡僉憲公既而攜歸著繼祀不繼産之説鄉黨是之㑹巡撫陳公祥據禮曰昭穆也治命以愛竟立祊南谿乃戒祊曰繼産母多取余志也承祊兩從之孫四人朝賓朝賢朝賚朝質孫女二卜以某年二月廿二日𦵏于顧宗涇從南莊兆域禮也承益等渡濤江走千里乞徐奉化伯臣狀來問銘余嘗登九敕堂徵故家之文獻覽觀于泗上愛之西環九峰若畫泗水匯其南澄碧映空可酌焉忘饑此風人之所詠也加以勝國遺老隠逸之區流風餘韻猶有存者是宜詩禮之胄託以引長焉故處士以南谿自表見葢素尚云宜銘銘曰古稱仁里亦曰華宗有偉朱氏長發自公漢唐苗裔洙泗㑹通地因人勝派以源同嗟嗟南谿有古人風既承既啟乃衍乃豐詩禮文物允肇我躬席珍邦寳厥功則崇百世貽燕孝友敬恭詎曰不試隠約為工抱璞孕秀善始令終過者必式若堂之封青山翥鳳黄浦游龍示我銘詩以閟𤣥宫九槐喬君夫婦合𦵏墓誌銘太學生喬大登諱禾别號九槐子上海人也上海舊家稱山喬而喬後為盛大登喬氏之良也大抵南土喜工文華而於世務若不屑其在門閥者尤甚獨大登自少頴鋭讀書業文之餘即留心治理故凡錢榖田賦書算法律米鹽布帛等等精練雖居積貿遷竒贏十一咸能操切至於土木基搆鐵石瓴甓之細尤善心計是故堂室整潔園田部分悉有法一時號稱饒裕而喬氏益大焉使得效一官當一職移家於國必有富庶之績不至頽闒叢脞匱缺經費以妨公上固理治之才也年僅五十有六未及注選而卒予旅食于外聞而惜之惜也才如大登不一試以起鄉士之陋何耶予既歸田思見大登而不可得矣嗚呼悲夫嘉靖癸邜冬其孤承嗣承慈以𦵏銘請予諾焉乃發狀論其世善乎徐南湖御史之言曰海上世望巨族不減百十至有鄙田舍翁過分溺奢欲萬萬不恤也非舛也耶故人子能知難痛心者可與述孝矣讀斯言也則大登貽謀端雅益可惜哉豈徒有才云爾按喬之先有彦衡者自鶴砂遷于邑再傳而為止菴翁諱巖字鍾良配徐氏生三子大登其季也孟仲蚤世大登卓卓自樹立淬勵從師學成三試弗售時止菴翁年且高援例入太學從太學試又弗售乃謂其友曰吾屢蹶固知尺寸實應舉之式士不求合難以速得志也娶湯氏雪懐君之女都憲公之孫也有賢行善相起家初雪懷見大登所為文愛之而女焉因贅于湯逮止菴卒乃攜湯孺人歸共止墓舍力苦以襄事時屋止數椽身無重衣家産落落君笑且慰曰丈夫不克自奮乃望先人之遺天下豈有徒享榮富者哉故止菴遺蓄悉以讓諸大兄乃夫婦夙夜勤勞為之二十年始作家祠揣溝洫營第宅為子孫經久計平生尚氣岸重大節不下疆禦刺刺慨慷多作逺遊為忌者中傷遜避僅免嘗語人曰君子修正不蘄立名名自歸不蘄逺毁毁自去吾遑計焉海内縉紳聞而韙之家居整辨内外語言不妄出入一以教子為事延師豐館程課尤嚴然以有口忤當道竟得重譴踰年遂卒湯孺人繼亦卒鄉邦悼之子男二長即承嗣娶朱氏尚書玈溪之孫次即承慈娶朱氏御史青岡之姪孫業舉向學可世其家孫男二長守約承嗣出次伯驥孫女一聘唐懋義皆承慈出卜以十二月二十日合𦵏于沈家濱之原宜銘銘曰嗚呼九槐瓊林一枝少予知之長予才之卒予銘之後千百年尚有遺思嗚呼九槐其深藏之處士西莊王公墓誌銘正徳庚午十二月丁酉望𦵏我西莊王公於高昌里之北原其子太學生淮率其弟瀛洲踵門其孫相堯捧狀泣以告曰先君𦵏有日矣願賜之銘深自冠年與淮友善同攻進士業同寢處公時館榖之朂以大就既得官京師數書候問不幸以憂還復來弔慰方圖所以報公者而公不可起矣嗚呼銘非深誰為按上海王氏有諱谷真者公之高祖考也妣孫氏諱璘者曾祖考也妣陳氏諱翼者祖考也妣魏氏實生友號道正有行誼名公之考也妣陸氏生公諱銘字敬言别號西莊初娶江氏繼姚氏林氏子男四長淮娶郭氏宋氏為江出瀛娶康氏洲娶孫氏姚出後弟鎧為林出女二嫁曹鶴蔡和孫二長即相堯次相文以正統癸亥六月十七日生正徳己巳十月二十二日卒夀六十有七云公天賦厚厖涉獵傳記詞貌清修以憲度自持尤善生殖手致者萬金然能周人之急勇於出財宗族之孤寡貧乏待以衣食者數家架梁築道焚劵如是者又嵗數數為之為之者必於義必不為者必不義也其行大都類此中歳厭㕓居築西莊别業以游佚君子賢之曰西莊而不名嘗輸粟賑邊得品官服非其好也惟教其子孫必以科第顯行及矣而不待豈有數也哉為之銘曰惟典好禮著魯論君子有榖貽後昆公蓄斯厚發必蕃誰其舉之子若孫謂予不信視兹文儼山集巻七十五
