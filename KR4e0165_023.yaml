body:
  text: 儼山集卷二十三明陸深撰樂章六十二首恭擬太祖髙皇帝孝慈髙皇后上册樂章迎神惟皇髙祖英靈在天神功大化裕後光前寢廟儼若音容僾然竭我孝思以格于重𤣥雲車龍馭髣佛盤旋與乾元同運何萬斯年肅以跂豫若有見焉永佑豫小子對越䖍䖍初獻俎豆既陳酒醴維清既戒既栗明德允升孝孫始奠庶展精誠鴻稱徽號聽于無聲昭格可冀綏我思成亞獻載酌載獻惟聖顧歆庭陳萬舞樂備八音端冕有恪以表豫一心靈風習習祗拜欽欽大禮斯舉有壬有林終獻神降伊邇終秩有嚴三爵既右百禮具瞻惠我多福以讓以謙罔極難報感懼載兼洋洋皇祖如見兮厭厭徹饌奠獻既備敬徹不遲亦有餘休默鑒在兹肅雍顯相益秉孝思我祖我妣惠我恩慈仰德無替終事有儀還宫祀事孔明神休滋錫孝孫有慶法宫云適心䖍體和禮嚴境寂景雲祥風荏苒翬翟撫此瑶圖永膺寶歷於萬斯年過廟必惕戊戌秋明堂禮成慶成宴樂章七首萬嵗樂風調雨順秋光好啓明堂吾皇有道尊親饗帝多仁孝際昌期成大報朝天子宫懸繡簾黼座黃金殿雕龍彩鳳簇瓊筵湛露初霑宴堯舜重逢唐虞再見五雲天御爐煙遙瞻聖顔雉尾開宮扇水龍吟五色祥雲擁六龍開禁殿列臣工主恩皇澤禮樂象成功文華物采極天風動萬國來朝貢一奏開明堂之曲大禮候昌朝崇孝敬正宗祧鈞天聲裏韻簫韶金殿凌雲切紫霄聖君萬夀臣節百僚願上華封謠仰祝唐堯四邉靜國祚萬年禮樂重光一統天玳瑁筵麒麟殿瑞靄祥煙聖主開恩燕鳯鸞吟時文聖明運中興道太清業敷天功扶世治化升平和神人靖邊境敘彞倫協咸英一德秉精誠璇衡齊七政享明堂大典斯成奠玊帛潔粢盛妥神靈兆休應報深恩罔極難名萬嵗樂鵷聯鷺序臣拜舞荷醲恩躬逢聖主配天勳業髙千古同聲祝文共武戊戌冬至南郊禮成慶成宴樂章四十九首萬嵗樂五百昌期嘉慶㑹啓聖皇龍飛天位九州四海重華日大明朝萬萬世朝天子滿前瑞煙香繞蓬萊殿風回韶律鼓淵淵列陛旌旗絢日至朱躔陽生赤殿氣融和徹上𤣥歷年萬千長慶天宮宴水龍吟寶殿金爐瑞靄浮陳玉案列珍羞天花炫彩照耀翠雲裘鸞歌鳳舞虞廷樂奏萬嵗君王壽一奏上萬壽之曲聖主垂衣裳興禮樂邁虞唐簫韶九成儀鳳凰日月中天照八荒民安物阜時和嵗康上奉萬年觴𦙍祚無疆四邉靜天啓嘉祥聖主中興正紀綱頌洋洋功蕩蕩國運隆昌萬載皇圖壯鳳鸞吟維皇上天佑聖明景命宣五雲輝三台潤七緯光懸協氣生嘉祥見正萬民用羣賢垂袞御經筵宵衣勤政殿禮圜丘大祀精䖍明水潔蒼璧圓秉周文承殷薦眷皇家億萬斯年二奏仰天恩之曲皇穹啓聖神欽乾運祗郊禋一陽初動靄先春萬福來同仰至仁祥開日月瑞見星辰禮樂協神人宇宙咸新水龍吟春滿雕盤獻玉桃葭管動日輪髙熹微霽色遙映袞龍袍千官舞蹈鈞韶迭奏曲度升平調水龍吟紫禁瓊筵暖應冬驂八螭乘六龍玉巵瓊斚黻座獻重瞳堯天廣運舜雲飛動喜聽賡歌頌太清歌長至日開黃道喜乾坤佳氣陽長隂消奏鈞韶音調鳳軫律協鸞簫仰龍顔天日表如舜如堯金爐煙暖御香飄玉墀晴霽祥光繞宮梅苑栁迎春好燕樂蓬萊島上清歌雲捧宸居五星光映三台麗仰日月層霄霽日月層霄霽中興重見唐虞際太和元氣自陽回兆姓歡愈開天門九重霄日轉皇州繞燕天家共歌魚藻龍鱗雉尾彩雲髙祝聖壽慶清朝御鑾歌雅奏樂升平瞻絳闕集瑶京黃童白叟喜氣盈謳歌鼓舞四海寧金芝結秀玉樹含英聽康衢擊壤聲帝力難名賀聖朝華夷一統萬國來同獻方物修庭貢逺慕皇風自南自北自西自東望天宮佳氣鬱重重四靈畢至麟鳳龜龍殿前歡瑞雲晴靄浮宮殿一脈陽和轉禮成交泰開周宴鳳笙調龍幄展天心感格人歡忭四海謳歌遍慶豐年賴皇天錫豐年勤禹稼力舜田喜慰三農願嘉禾秀瑞麥鮮賦九州貢八埏神倉御廩咸充滿養民以養賢新水令聖德精禋格昊穹一大統四夷來貢玉帛捧文軌同世際昌隆共聽輿人頌太平令誕明禋天監元后光四表惠澤周流來四裔趨前擁後獻萬寶充庭盈囿稽首頓首天髙地厚祝聖人多男福壽三奏感昊德之曲昊德運光明一陽動萬物生升中大報蒼璧陳禮崇樂暢歆太清星懸紫極日麗璇庭乾坤瑞氣盈海宇安寧新水令五雲深護九重城感洪恩一人有慶陽初長禮方行帝德文明表率家邦正水仙子萬方安堵樂康寧九域同仁荷聖明千年撫運承天命露垂甘河獻清見雙岐秀麥連莖喜雪隨冬應覩祥雲拂曙生神與化並運同行四奏民樂生之曲大報禮初成象乾德運皇誠神州赤縣永清寧靈雨和風樂太平隂陽交暢品物咸亨元化自流行允殖羣生水龍吟五色祥雲捧玉皇開閶闔坐明光鈞天樂奏冬日御筵張文恬武熙太平氣象人在唐虞上水龍吟玉律陽回景運新燕鎬京藹皇仁光昭雲漢一氣沸韶英錦瑟和聲瑶琴清韻瞻仰天顔近太清歌萬方民樂時雍鼓舞荷天工雷行風動喜今逢南蠻北貊東夷西戎來朝貢大明宮星羅斗拱九重天上六飛龍五色雲間雙彩鳯普天率土效華封允協河清頌慶太平惟天眷我聖明禮圜丘至德精誠乾元永清洪膺景命休徵應泰階平千秋嵗聖主乘龍御萬邦慶雲翔化日重光羣臣拜舞稱夀觴載歌天保章滾繡毬五雲車度九重利見飛龍耀袞章火藻華蟲擊虎敔考鳬鐘鼉鼓逢逢八珍列九鼎豐隆堯眉揚彩舜重瞳萬國咸熙四海雍齊歌頌聖德神功殿前歡萬年禮樂中興日大化覩重熙河清海晏臻祥瑞五行順七政齊超三邁五貞元㑹既醉頌鳬鷖天下樂萬靈朝拱接清都享南郊欽天法祖願聖人承乾納祜中和位育龜範馬陳圖醉太平醉樂萬年規謳歌四海熙衣冠蹈舞九龍墀麗正仰南離紫雲髙捧唐虞帝垂衣天下文明治鎬烏岐鳳呈嘉瑞真箇是人在成周世五奏感皇恩之曲雙闕五星光霓旌樹紫蓋張璇臺玉歷轉新陽鈞天廣樂諧宮商恩深露湛喜溢霞觴日月煥龍章地久天長六奏慶豐年之曲聖主懋承乾綏萬邦屢豐年神倉御廩登大田明粢鬱鬯祀孔䖍輿情咸豫協氣用宣萬古帝圖傳璧合珠聯七奏集禎應之曲天保泰階平寶露降渾河清嘉禾秀麥集休禎遐陬絶域喜氣盈一人有慶百度惟貞萬國頌咸寧麗正重明八奏永皇圖之曲鎬燕集天京頌魚藻歌鹿鳴邊郵安堵萬邦寧重譯來庭四海清咸池日曙昧谷雲征帝座仰前星豫大豐亨九奏樂太平之曲皇極永登祥乾符啓泰運昌玉管回春動一陽金鑾錫宴歌九章虞廷獸舞岐山鳳翔日麗袞龍裳主聖臣良水龍吟香霧氤氲紫閣重仰天德瞻帝容星輝海潤甘雨間和風樂比鳶魚瑞呈麟鳳永獻卷阿頌水龍吟萬户千門啓建章台階峻帝座張三垣九道北斗玉衡光元氣調和雅韻鏗鏘昭代慶明良太清歌萬方國盡來庭稽首歌帝仁仰荷生成振乾綱隂陽順序民物樂生逢明聖萬年春永膺休命華夷蠻獠咸歸正蒼生至老不知兵鼓腹含哺誦太平九有享清寧萬嵗樂太平天子興隆日履初長陽回元吉醴泉芝草休徵集曾聞道五星聚室賀聖朝一人元良百度惟新握赤符凝𤣥應享太清大禮方行祀事孔明感天心億載恆承慶明王慎德四夷咸賓醉太平星華紫殿髙雲氣彤樓繞九夷重譯梯航到皇圖光八表玉宇無塵明月皎銀河自轉扶桑曉平平蕩蕩歸王道百獸舞鳳鳴簫韶看花㑹普天下都賴吾皇至聖看玉關頻欵天山已定四夷效順歸王命天保歌羣黎百姓天下樂九重樂奏萬化開望龍樓雲蒸霧藹仰天工雍熙帝載臣民歡戴溥仁恩遍九垓清江引黃鍾既奏陽和長德感天心貺人文日月明國勢山河壯衢室民謡頻擊壤清江引鈞天畢奏日方中既醉歡聲動雲章傍袞龍飇勢翔威鳳萬方安樂興嘉頌千秋嵗上下交歡燕禮成一陽奮萬彚咸亨風雲㑹合開明運紫極轉璇衡朝天子文班武班歡動承明殿禮成樂備頌聲喧真咫尺仰天顔日照龍鱗風回雉扇翠蕤旋奉仙鑾雲間斗間五色奎章燦萬嵗樂天回北極雲成瑞望層霄重華日麗九垓八極樂雍熙祝聖壽萬萬嵗儼山集卷二十三
