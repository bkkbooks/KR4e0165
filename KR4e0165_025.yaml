body:
  text: 儼山集卷二十五明陸深撰詩話三十二則袁御史海叟能詩國朝以來未見其比有海叟集豫為編修時嘗與李獻吉夢陽何仲默景明校選其集孫世祺繼芳刻在湖廣獻吉謂海叟諸詩白燕最下最傳故新集遂刪之嘗聞故老云㑹稽楊維禎廉夫以詩豪東南賦白燕其警句云珠簾十二中間捲玉剪一雙髙下飛時海叟在座意若不滿遂賦一首云故國飄零事已非舊時王謝見應稀月明漢水初無影雪滿梁園尚未歸栁絮池塘香入夢梨花庭院冷侵衣趙家姊妹多相忌莫向昭陽殿裏飛亷夫擊節歎賞遂廢已作手書數紙盡散座客一時聲名振起人稱為袁白燕姜南明叔云朱簾玉剪乃常熟時大本之作其全篇云春社年年帶雪歸海棠庭院月爭輝珠簾十二中間捲玉剪一雙髙下飛天下公侯誇紫頷國中儔侶尚烏衣江湖多少閒鷗鷺宜與同盟伴釣磯謂為尤工但所記海叟首句不如故國飄零事已非為勝明叔又記顧文昱白鴈云萬里西風吹羽儀獨傳霜翰向南飛蘆花映月迷清影湘水涵秋㸃素輝錦瑟夜調冰作柱玉關曉度雪霑衣天涯兄弟離羣久皓首江湖猶未歸明叔謂三詩可相頡頏大抵咏物詩體不免要粘帶頗纍氣格三詩必有能辨之者文煜字光逺姑蘇人陳思王七步詩世所傅誦云煮豆燃豆萁豆在釡中泣本是同根生相煎何太急世說所載微殊又餘二言云煮豆時作糜漉豉以為汁萁在釡中燃豆在釡中泣本是同根生相煎何太急世說撰於宋臨川王劉義慶時去魏未逺當核未知何是本詩但萁在釡中燃於理差礙爾晉人工造語如潘安仁詩叙表兄弟云子親伊姑我父惟舅直是雅暢若在唐以下諸公口須汝親我姑我父汝舅成文耳古名手詩有絶類如蹈襲者鮑明逺客行有苦樂但問客何行與嵇叔夏從軍有苦樂但問所從誰陶靖節雞鳴桑樹顛狗吠深巷中與古曲雞鳴髙樹顛狗吠深宮中詞㫖何異及李太白白苧與明逺本詞才有移易顛倒耳他不能盡記豈古人重相擬與古人詩語有不可解者如劉越石宣尼悲獲麟西狩泣孔丘二句重復如此歐陽公杜彬琵琶皮作弦曾虎臣能改齊漫録載一說云彈琵琶妙在指撥硬杜彬琵琶如彈皮弦然若絲弦則斷矣所以喻其妙也即四弦一聲如裂帛之意頗為造理段成式酉陽雜俎載段師能彈琵琶用皮弦賀懷智撥彈之不能成聲則似真有皮弦矣或謂古琵琶用鵾雞筋作弦元楊瑀又記畏吾兒人閭閭世習銅弦曰余親見聞之漫書于此世傳曹景宗競病韻詩為沈約輩所驚歎南史所載我昔在鄉里騎快馬如龍與年少輩數十騎拓弓弦作霹靂聲箭如餓鴟呌平澤中逐麞數肋射之渴飲其血饑食其胃甜如甘露漿覺耳後生風鼻頭出火此樂使人忘死不知老之將至今來揚州作貴人動轉不得路行開車幔小人輒言不可閉置車中如三日新婦此悒悒使人氣盡此段文亦豪宕陳思王集惟洛神賦為最沈約答陸厥書云以洛神比陳思他賦有似異手之作當時論已如此近抄陸內史士衡集亦惟文賦為最他皆不及乃知人不數篇而傳之逺者必文也漢書蒯通贊自春秋以來禍敗多矣而下減去一昔字兩而字皆七字成文分明是一篇詩特少叶韻耳其簡質若此贊東方朔則有韻矣首陽為拙柱下為工飽食安步以仕易農依隱玩世詭時不逢此與銘詩何異退之詩於叙事處特有筆力如兒童見稱說祝身得如斯儕輩妬且慙喘如竹筒吹老婦願嫁女約不論財資老翁不量力纍月笞其兒攪攪爭附託無人角雄雌數句曲盡登科時人情物態千載如新但此格本自木蘭焦仲卿來下此則俚俗元白之流派有韻之文章是已學者博取之可也贈張籍詠雪一篇歐陽公不以隨車翻縞帶逐馬撒銀杯為工而以坳中初蓋底垤處遂成堆為勝但此亦未盡體物之妙蓋雪之初下必雜霰而輕細是凹處易於攢聚髙處正難粘綴耳至於松篁遭挫抑糞壤獲饒培有激昂憤厲之氣若隱匿瑕疵盡包羅委瑣該則所感者深矣一瞬即七里箭馳猶是難檣邊走嵐翠枕底失風湍但訝猿鳥定不知霜月寒前賢竟何益此地誤垂竿此謝靈運七里瀨詩也其格律與唐人何辨乃知濫觴已逺沈宋猶是後塵爾宋思陵有中秋夜月詩作擘窠行草甚竒偉嘗見其石刻落句全用東坡看潮寄語重門休上鑰夜潮留向月中看只換三字云分付九門休上鑰便是帝王口氣矣詩句有相似而非相襲者然亦各有工拙杜甫云江清歌扇底野曠舞衣前儲光曦云竹吹留歌扇蓮香入舞衣李義山云鏤月為歌扇裁雲作舞衣劉希夷云池月憐歌扇山雲愛舞衣老杜格髙但歌舞於清江曠野之中固不若竹下荷邊之韻池月山雲之句風情興致藹藹政自可人王摩詰渭城朝雨之詩謂之陽關三疊相傳已久而歌疊不傳或曰凡三歌之恐或不然或曰首歌全句次歌五字又次歌尾三字句凡三歌謂之三疊亦未必其果然否也折楊栁古曲名多用以詠笛李太白洛城聞笛此夜曲中聞折栁何人不起故園情杜工部聞笛故園楊栁今搖落何得愁中却盡生吾鄉袁御史景文亦有聞笛落句云天邊楊栁雖無數短葉長條非故園景文工詩師法少陵其詩有集而笛詩俱用楊栁故園事興致各不同與世之撏扯者異矣識者能自辨之故園事當本於桓伊東坡嘗欲刪去栁子厚漁父詞後兩句豫亦欲取李太白關山月節却後四句不知古今人所見同耶否文選所載漢蘇李詩蘇東坡以為齊梁間小兒所擬非真當時詩也古文苑又載蘇李詩七首文苑後出尤可致疑杜子美云李陵蘇武是吾師然世必有真蘇李詩當是何等又曰五言起於蘇李豈作始者固不傳耶圍棋世稱為手談又曰坐隱二字蓋晉人語也可入詩三代以後君臣間隔近時尤甚獨講筵一時真所謂天顔咫尺也正德間上聽講希闊七年四月十二日上御文華殿時講官石祭酒珤字邦彥吳學士一鵬字南夫邦彥講論語大哉堯之為君章南夫講尚書天秩有禮章深時初為展書官班於殿西南隅因憶比為庶吉士時內閣試經筵宴罷有述詩曰御廊宴罷侍經還轉覺微忱報稱難輪直每陳香案拜隔宵先進講章看但祈聖聽頻傾注秪託遺經保治安論語尚書俱次第春秋還擬進螭端是日適講論語尚書豈非預定所謂詩䜟者耶但春秋之義未知如何耳同年劉寓生字竒進石首人在同館中最年少疏宕有美質試聞鴈詩竒進立就曰秋至人間增客思况聞秋鴈過皇都數聲到枕渾如舊幾隻穿雲不受呼自惜短翎驚嵗月可憐寒影遍江湖海天愁鬢那堪汝故國音書得到無衆皆歎賞檢討汪器之偉閲其卷謂之曰詩甚佳須作御史耳寒影遍於江湖非御史何官也後竟受御史出貴州為權姦所誣幸不死國初越僧曇噩字夢堂能詩一日聞劉孟熙績唐處敬肅諸詩人遊集曹娥祠乃微服求載船尾衆見而惡之方分韻即景賦詩噩忽作禮曰若有剩韻願布施一箇衆異而拈蕉字與之噩應聲吟曰平明飯罷促篙梢纜解五雲門外橋去越王城三十里到曹娥渡八分潮白飄春雪栁花舞緑弄晚風蒲葉搖西北隂雲天欲雨恐驚篷頂學芭蕉一座盡驚曰子得非噩夢堂乎遂與之共遊餘姚楊軾字軾同嘗寓寧波延慶寺時僧房雞冠花盛開賦魚字韻詩云絳幘昂藏錦不如臨風欲鬬又躊躇若教夜半能三唱驚起山僧打木魚軾宣正間人卒於天順中于肅愍公謙以才器有社稷功觀其題太行近體詩亦足以冠冕時輩漫録于此信馬行行過太行一川野色近蒼茫雲蒸雨氣千峯暗樹帶溪聲五月凉世事無端成蝶夢畏途隨處轉羊腸解鞍盤礴星軺驛却上髙樓望故鄉茫茫逺樹隔煙霏獵獵西風振客衣山雨未晴嵐氣濕溪流欲盡水聲微回車廟古丹青老碗子城荒草木稀珍重狄公千載意馬頭重見白雲飛丁酉出蜀自西陵北上遇一郡守亦是相識人送豫郭外致辭曰本欲遣一官相送老先生是朝廷大臣誰不奉承豫笑而謝之坐輿中自惟曰斯言可以自了不足以了人復吃吃笑不休因閲髙達夫别董大一絶云十里黃雲白日曛北風吹雁雪紛紛莫愁前路無知已天下誰人不識君乃知唐人已有此丙寅嵗與李員外夢陽夜坐以芳樹為題作一字至七字詩蓋唐已有此體矣張南史詠草云草草折宜看好滿地生催人老金殿玉階荒城古道青青千里遙悵悵三春早每逢南北别離乍逐東西傾倒一身本是山中人聊與王孫慰懷抱霍渭涯謂三字亦可成體是在詩經與琴操古樂府已具天馬歌通篇用三字鮑照春日行云獻嵗發吾將行春山茂春日明園中鳥多嘉聲梅始發桃始青泛舟艫齊櫂驚奏采菱歌鹿鳴風微起波微生絃亦發酒亦傾入蓮池折桂枝芳袖動芬葉披兩相思兩不知深謂三字語既短簡聲易促澀貴在和婉有餘韻令嫋嫋耳如此詩落句是也鄉前輩朱岐鳳名應祥敏於辭翰為一時所驚服嘗有一絶句云江面微風瀉浪開鳥聲啼過釣魚臺暖雲欲作桃花雨一片隂從栁外來豫作一小閣在方丈池上當春夏之交小雨時至池面無風倚闌佇目歌簡齊平池受細雨之句殊為幽絶日華初動和風徐來則吹皺一池春水之詞愈見有工詩貴實境如是宋中書舍人朱翌新仲有詠摺疊扇一詞云宮紗蜂趕梅寶扇鸞開趐數摺聚清風一捻生秋意搖搖雲母輕裊裊瓊枝細莫解玉連環怕作飛花墜然則北宋時已有之矣古詩并畫中所見團扇羽扇耳不知摺疊扇起於何時而今遂盛用之耶登山涉水之間専事賦詩則反礙真樂葉石林記陳后山每登覽得句即急歸臥一榻以被䝉首家人知之即猫犬皆逐去嬰兒稚子亦皆抱持寄鄰家徐待其起就筆硯即詩已成乃敢復常大是為詩所苦大抵江山既勝風日又佳從以良朋韻士便當極躋攀眺望之興罷從燈下或月夕追憶所遇歷歷在目然後發之詩文庶幾各極其愜而無纍矣趙松雪有墨竹在崇德士人家吾鄉華亭衛董先生題一絶句其上云漢家日暮龍沙逺南國春深水殿寒留得一枝煙雨裏又隨人去報平安其子仲穆善畫蘭勾曲張伯雨題之曰滋蘭九畹空多種何似墨池三兩花近日國香零落盡王孫芳草遍天涯二詩婉潤頗相當聞仲穆曾見之遂絶筆於蘭而松雪惜不見竹詩也儼山集卷二十五
