body:
  text: 儼山集卷四十一明陸深撰序五古菴文集序古菴文集凡二十二卷自第一卷至十四卷文若詩在焉自十五卷至終卷奏疏及公移在焉咸次第可誦法云華亭古菴先生張公之所著其嗣子文貴之所手書以刻焉者也公諱誥字汝欽成化丙戌進士自翰林庶吉士授監察御史歷任都察院右副都御史巡撫雲南致仕而還蓋以文章飾吏事者四十餘年是集可考已深憶少謁郡前輩若大司馬莊簡張公及公與憲副定菴曹公皆博大長者和厚豈弟言行風裁蔚然有章而三公者又志孚而聲相和也深既有當世之交每歎以為非後輩所及正德辛未再入翰林公送之行執手諄諄道玉堂舊事與為文章法若不忍休者暨與滇南士大夫遊問滇之撫臣必稱三原王公及公而公之撫滇也實出王公所薦至論金汁河之利則又三原公之所無者又憶往嵗卒業南雍時適蘭溪章公楓山先生為祭酒每稱丙戌人材之盛若一峯羅公未軒黃公定山莊公而公復出是科與相項背則公之所為淵源者固有自哉其名世無疑是集也渾厚簡雅一洗艱深鉤棘之風明習國體不事空言信乎體用具而質文均益歎以為非後輩所能及也其傳世無疑若夫詞翰並麗橋梓相輝家學之傳又於是在異日足備郡故深郡人也重論其世而序之重刻家語序代郭通判允禮作今襲封衍聖公成菴先生自闕里寓書雲間以家語見屬允禮故闕里外孫也不敢辭于時適有家禮之役以其餘工成之而完好可讀云惟我宣聖素王無土道德之奧布在方册若是書所載蓋亦不少矣史記世家以此為相定公十二年以後事也或曰此非孔氏之舊意者庭闈緒言相傳於其賢子孫者序次成之故名家語以别於論語云爾厥後魏之王肅果得此本於孔氏二十四世孫猛家遂以行世至宋大儒朱子復以為是當時書過孔叢子逺矣或又曰論語及禮記諸篇皆從此出然則有志聖人而從得其心迹者不於此求之將奚從哉况於心親迹近有如允禮者哉乃若成菴之賢光于家乘愧允禮文學不及王肅徒以叨屬葭莩之末系蚤承父兄之夙學於此書竊有意焉又况遭逢皇明全盛之朝聖道尊崇之世視彼王肅託身衰魏則大有過焉者允禮將託是書以不朽也故為具論所由來者如此願與天下學士共之他日歸闕里當以此刻與續刻家禮板置諸奎文閣中成菴先生以為何如也詩微序深承父師之訓以詩經發科自少誦習中嵗業舉如制反覆諷詠之餘各有所疑輒用劄記逮通籍禁林獲交英俊間於僚友間稍出一二質之頗有合焉而亦未敢遽以為是也念今六十年矣雖於經術之大終身難聞而一得之愚不忍自棄聊復稿存將以示子孫題曰詩微其章句篇什多仍乎舊是編也蓋欲折衷傳序兼采衆長以明詩人之旨其疑者存焉其闕者擬焉而因以附見鄙説求為朱子之忠臣而後已嗚呼僭妄之罪安所於逃粗令後世知豫之苦心豈所謂皓首一經者耶張文水六十壽序海邑之南文水在焉邑以水利也水自西南來者匯為孫灣詰曲紆回渙然有文故稱文水凡言水於海邑者必以文水為勝文水之上居落在焉其人多務本朴茂力耕勤織竹林魚池望之蔚然淳里也而張氏獨以詩書為業代有文人凡論世於文水者必以張氏為舊而張氏之能文章修行誼者又必以宗之君為賢故宗之得號文水人稱之曰文水先生文水先生屢以文上鄉貢自邑校升之太學文益有聲鄉黨之士宗其文者翕然敬且愛焉今年辛卯八月草九日為六十初度士友相率捧觴致祝李君百朋以祝辭為託深不敏頗憶少時與文水同學為文章金舂玉應爭相濯摩期以名世而諸提學使臣與當道之能權衡者每加課試必以文水為首延譽峻奬而文水意未嘗自足也今去之三四十年文水之文未獲少露一二於四方且暗然自持或者將負此以老耶而文水意亦未嘗不自足也豫竊感焉縉紳大人皆曰是烏足以論宗之哉夫君子達生至人立命斯道全乎我而無意於世然後不為世所纍而世恆賴之是故表萬物而獨全出處時也隱顯遇也遲蚤數也有如此水好風過之縈為淪漪怒且嘷焉舞為波濤方其安流一注千里乃若滔天浴日之竒生物澤世之功固在也而水亦何意焉此文水之志也自兹天休與年俱進屹然斯文之領袖以與此水無窮方今天子急於求賢不遺巖穴况宗之名在天官品題有待一旦出潛變豹使國家得老成文物之用且當為世快覩而文水亦豈宜遽以此自足哉人亦有言其華茂密者其果碩源匯深長者其流沛朝榮之木無堅田間之渠易涸固物理哉豫聞之曰是足以為文水祝遂書為序古文會編後序漢氏以來名能文者不過是數子衆愛而喜為之傳者不過是數篇是編也出於今監察御史黃君希武成之者吾松守陳侯民望也黃君來視學南畿以斯文為已任期還于古侯適初政協志作興君子謂是舉也贊同文矣深昔與黃君同被上命入讀中祕書時以文章為職業得縱觀前代之文而揚榷之謂文莫盛於西京而極弊於江左江左今江南諸郡是也黃君將有意於兹土耶然去之千數百年風聲再變已非昔矣振而起之豈亦有待也哉夫文者質之餘也猶本之有華也古之人質厚重而本盛大是故其言必文而必傳夫質可變也本可培也力變其質以豐培其本其何古之難復議者曰古今時也文實隨之古之文不可還也深竊惑焉夫時以氣化文由道同道茍同矣胡時之隨且古之人何限也而以文傳者僅僅固有時不能為者矣其能之者繫其學也士知所以學士大夫有師長之道者知所以倡亦何為而不成嗚呼獨文也哉雖然倡而後有學焉此今日刻書之旨而賢監司良守牧之體也工既訖謂深實郡士宜有言於簡末深少喜學文今稍知本意甚悔焉乃於是編覽孔明之二表讀伯淳之四針庶幾見所謂大成者耶願與鄉郡士共勉焉贈指揮使李君授職還鐵嶺衛序遼東鐵嶺衛指揮同知李君涇其先朝鮮秃魯江人髙祖鷹你洪武中來歸授總旗遂家鐵嶺焉曾祖英以戰功授副千戶祖文彬父春美嗣正德初南北盜起春美從征戰滕縣戰冠縣戰狼山復往戰饒源洞皆有功升指揮使及歸征北敵克復應州以戰功再賜織金衣獨兵部核南北首功少合格乃鐫級為指揮僉事嘉靖初春美因開原松山堡領哨有功復升指揮同知推守靉陽以老罷涇當嗣職之京兵部以案牘經火春美戰功無稽止請以正千戶授涇涇上疏辨父功次既白乃得復授指揮同知將歸鐵嶺過余告曰三代以後仕者分文武為兩途介胄之士以武勇力戰而得官朝廷因其舍生為國有捍難衛民之功故爵祿職位延及子孫以此報功而為臣子勸奈何有司不能體朝廷之意動欲裁制武職以為為國家袪冗食殊失古人以爵祿勸激之意况吏胥深文巧詆而官之失得在其掌握此馮唐所以慷慨而論魏尚也且余祖自外國來歸苟世次功勞少有不明則受抑多矣是故必得大人君子之筆而記之則李氏之子孫世世有所憑矣豫曰不然夫武勇之臣為國家干城爵祿得之智勇智勇而不出於忘身徇國之忠亦非也君之居於邊鄙也小則能為國家出竒以制敵之侵軼大則立功建績使北敵深憚而不敢近塞則忘身徇國之忠著矣縱有媒孽其細故者豈待君之自辨哉亦必有如馮唐之論彰彰於世也且君以迹逺為懼獨不觀漢唐之史乎昔者金秺侯日磾以休屠之裔而武帝有託孤之命至於七葉垂貂雖霍子孟有所不及李臨淮光弼以阿跌之族而肅宗有王爵之封至於智勇武略且居郭汾陽之右二公皆棄戎即華不恃門閥徒以忠順自致其身耳君尚勉之哉君尚勉之哉陶節齋傷寒書序監察御史玉洲陸公按蜀之明年百度貞肅於是博求藝文以惠來學顧有取於陶節齋傷寒之書乃節縮廩食命知成都府邵子經濟刻之而謂深宜序昔人以良醫方良相二者果若是班乎蓋為生意論也良醫生人良相生人人廣狹之勢殊爾存主則一也醫胡可少哉雖然生意之閼遏邪氣盩之故邪氣之在天地間為姦為蠧為弊端其中於人也為百病惟傷寒殺人為最速惟積弊害治為最深是二者實相類也故節齋之治傷寒也主於攻邪至謂世無真傷寒斯言一出而前人之論盡廢公之奉命也風裁所臨儼若神明爬梳剔刋無弊不革而三蜀之生意悉還是二者適相當也深故比而論之以引其端且以告有事於蜀者非徒為醫家樹赤幟也書凡若干卷擬己卯山西鄉試録序代作我朝三嵗取士著為定制行之百有餘年條式品格愈嚴愈密奉行之者公明正大意視初始如一日也法久而無弊者莫善于是乃今正德十四年己卯復當其期於今上為五開科而嵗星亦一周矣山西布政使司復舉行之如制而巡按監察御史某至期實監臨焉亦制也先期分聘司考校某官某某官某各集而提調學校副使馬卿所選三府應試之士凡若干人亦集及期任提調者某官某任監試者某官某而某官某相與佐贊于外臨期則鎖院樹棘設簾隔座糊名易書按經彚考限日分場而三試之一如制其法惟舊其事惟新凡閲若干日既竣事揭榜于通衢復梓其文之合式者若干篇人之中式者若干名與諸執事諸條格為試録夫榜以曉近其事略録以傳逺其體詳故宜有序而某以職事序諸首昔人有言長材大器往往出於西北蓋以文章許東南也今兹之來履方輿之雄勝固未暇考觀其人品而得先從事於所謂文章焉者窮日夜之力因所疑而致志焉口誦目披則藻繢絢爛之所照映和暢沈渾之所宣揚使人起敬而忘食已恨於不能盡録而録之止於是者固當嘗一臠而知鼎矣持此以往其於吳蜀豈多讓哉然後歎古人名理之未盡也蓋自古帝王多起於西北而出於山之西者尤盛惟我聖祖挺生東南奄有西北而混一之文皇作京密邇三晉列聖繼承傳世八九佑啓文明鼓舞感孚之妙先及厚被旋斡化工所謂道德齊而風俗一車同軌而書同文者正在今日諸士其朂之南山野唱後序舅氏南山先生以厚德長才從政當其華潤之融結勳績之底成往往溢出一寄之篇翰兼是者可以為難矣還自臨安敻得江山之助是時春秋八十餘矣陶物寫靈日增月益尤足以驗素養之深厚卜來算之綿遐也近時號稱詩人者尤所難及間集其詩云南山野唱凡若干首某請而刻焉深少獲從先生遊得聞春秋謹嚴之旨然先生為人坦恕毋取於傳家刻核之論而獨求聖人之心以顯達宏正為主也故其詩亦復似之覽者可以概矣夫古人之詩務得性情不假雕刻而後工後世藻繪勝而法禁密矣其於古道何如也昔者輔嗣好易其學傳之外族人都稱通解今先生詩道逺過弼易而深則有愧王氏之諸甥也雖然若洪駒父之於黃太史陳履常之於郭大夫亦安敢諉之無從得焉而自棄也哉病少間因記所私於簡末以告成事云儼山集卷四十一
