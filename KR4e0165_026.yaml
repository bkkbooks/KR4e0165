body:
  text: 儼山集巻二十六明陸深撰册應制擬撰皇天上帝册文伏以浩蕩難名萬物被生成之徳高明在上一人嚴昭事之誠蓋神莫尊於天而乾實稱爲父遹伸曠典適當𦕈躬恭惟昊天上帝一氣感通四時成歲佑人家國每形仁愛之心福我邦圻益致聰明之助左右列聖隂隲下民迨于沖人特隆大庇爰自宗藩入繼臨御十有八年迄今眷命維新坐受四夷萬國全付以君師之任宛同乎父子之傳每荷元慈深慙克肖陽爲賞隂爲罰懋成亭毒之功日重輝月重輪廣運中和之徳勉圖報稱莫罄名言惟是尊崇載揚大美彼清虛一大之説已渉不經况郊禘六天之文僅成巫史慨自周家制作之後沿於漢儒傅㑹之餘魏晉傷繁隋唐過濫自茲以降曾何足云欲章無二之尊願洗千古之陋惟我祖考若未暇於一朝顧此典彝如有待於今日是用請之九聖告于百神恭上寳册曰皇天上帝庶明主宰之大義用極尊親之至情裕後光前郁郁之文斯在居高聽下恢恢之量維容伏願穹顥居歆羣黎徧徳精誠仰達永承黍稷之馨香明照俯臨尚冀牛羊之右享敢昭鴻號敬藉休光表賀景雲表恭遇嘉靖十七年九月十九日景雲見者臣等誠懽誠忭頓首頓首稱賀上言伏以太平有象雲呈五色之竒聖壽無疆雷動千官之祝惟皇天景垂霄漢由聖人德至山陵事罕前聞人爭快覩茲蓋伏遇皇帝陛下道通𤣥極德合神明奉三無私永爲民物之主宰應五百運達觀禮樂之㑹通甞謂敬莫大於享天乃若孝宜先於嚴父爰求典則用究精微四郊九廟之鼎新二祖七宗之對越崇禋太室肇啓明堂配享之禮將行感應之機先動時維季秋之月日臨己丑之辰有雲自天浮空抱日非烟非霧氤氲璀璨以爲章如囷如輪舒巻悠揚而有氣適當丙巳漸向明離戢干戈於四夷如颺露布兆子孫於千億蓋取雲仍矧王相悉合於土行廼休滋方進於水徳列詩書而無愧寫琰琬以增輝天亦何言人皆有目雖傾海嶽難既揄揚皇上方且謙讓於未遑惟祈黙報禮官遂竭精誠而固請浹月始從此大聖人之所作爲而古帝王之所未有者也臣等徒深踴躍莫效㳙埃感覆冐生成之恩焉知帝力仰流通契合之妙粗識天心堯望方隆企昭回於紛郁舜歌載續揚爛縵於風聲瞻丹陛以蟻旋下彤庭之虎拜自天有命紀至瑞於百僚望氣成文䕶眞龍於九五臣等無任瞻天仰聖欣躍之至謹奉表稱賀以聞聖駕廵幸承天恭視顯陵禮成賀表伏以大孝統天旋轉法乾坤之運至仁御世晶華合日月之明禮重山陵恩覃梓里茲蓋伏遇皇帝陛下聖由天縱性本生知視四海爲一家運天下於掌上循憂勤惕勵之道居不遑寧妙鼓舞作興之機身先率物德純不已文王之所以爲文善取諸人大舜於是乎為大有典有則無怠無荒永懐豐鎬之故都夙軫園陵之大事禮詳法制義取廵行誕告多方爰攄獨斷下九天之仙蹕蕭萬騎於雲屯士氣騰懽人心望幸旌旗聨駱總列宿於北辰輦輅迢遥薄大江於南紀先驅響應屬車景從故以三千里之郵程僅供兩旬日之足力萬靈擁衞一德感通風伯雨師前清塵而後灑道嶽神川后高降福而卑效靈少駐帝鄕載瞻王氣望鼎湖之龍已遠悵華表之鶴方還堂隧來同橋山啓秘躬親卜兆何閔曾之孝足云兼試省方舉舜禹之隆以續可謂一舉而大備是誠千載之希逢者也臣等叨扈聖輿仰承彝典漢高之過沛上惟侈歌詞光武之入南陽徒私親貴粤遠稽於往牒孰有盛於明時慶協天人光増海㝢利見龍飛於舊邸何啻衣錦鄕之榮式貽燕翼於名藩佇聞湯沐邑之賚陽春白雪和簫韶於九成郢樹荆門震嵩呼之萬歳益勤贊頌奚罄名言伏願帝治垂衣百代永金甌之固皇圖磐石萬年延寳祚之長臣等無任瞻天仰聖欣躍感戴之至謹上表稱賀以聞大駕廻鑾賀表伏以六飛告至大慰都人就日之心三台既平式符太史占天之法禮隆仁孝功蓋乾坤茲蓋伏遇皇帝陛下天與人歸聖文神武紹二祖七宗之綂得三王五帝之傳鴻烈駿厖懋樹無前之績蘿圖寳籙方開有道之長臨御十有八年邁徳三千餘載父天母地尊祖敬宗握天子之權以行天子之事居聖人之位而得聖人之時誠大有爲真不世出四郊並建總條貫於百王九廟鼎新煥文章於三代主鬯得託分茅有人比承慈闈之上昇軫念顯陵之中隔躬行展謁親事卜征汛掃松楸敬恭桑梓光賁飛龍之邸某水某丘詩陳鳴鴈之篇一遊一豫蓋王度極於無外而天子必也有親爰自啟行旋及竣事惜寸隂之隙粤有萬幾推一孝之端可徧四海遹彰渙汗誕告廻鑾惟聖人以天下爲家然明主必宅中圖大寢園載肅輿輅既匡號令速於風行歡聲鼔爲雷動㑹諸侯於方嶽寔嚴後至之誅禮百神於行朝益妙先天之用暨敷恩澤載沛徳音復賦蠲租每自近以達遠睦宗綏族蓋由親以及疎舉千古之曠儀無非事者成一王之典禮有足徴焉馳道三千還期兩月念宗廟社稷之重雨夜兼程忘舟車鞍馬之勞星霜並戴蜂屯蟻附縁途見喜色之欣欣虎歩龍行遠道瞻聖容之穆穆揮毫落紙時有賡歌授几開筵常霑寵宴鄙周王之歷塊八駿奚爲陋漢武之横汾三疊安取未有人君之盛節乃若今日之大成者也臣等夙荷恩慈仰叨涵育扈從多幸恭承帝賚之駢蕃居守何功欣覩天顔於咫尺妥靈宗祏額手臣工虎豹九關儼高居之上帝雲龍千載慶嘉會於一時伏願艮福咸和乾剛廣運無逸乃逸用收位育之功日新又新以保雍熈之治臣等無任瞻天仰聖欣戴踊躍之至謹上表稱賀以聞應制擬撰請慈表伏以昊天㒺極難名鞠育之恩日月不居永抱幽明之恨屬嘉平之四日憶昇舉之初年情若茹荼叩地號天之靡及事同逝水瞻雲愛日以何從今則倐届大祥再移寒序園陵迢遞悵迷漢水之風煙几殿悲涼愴履玉階之霜露雖禮有盡於先王之制而哀難窮於孝子之心欽惟皇妣慈孝貞順仁敬誠一安天誕聖獻皇后聖靈慈儉性成睿明天賦昔佐先帝徳昭彤管之音肆佑𦕈躬運啟蘿圖之祚俔天作合流淑化于二南儷極居尊正母儀于四國詎意曜輪匿景月殿淪輝六宮莫覩於風儀萬姓盡同於雨泣白雲千載仙遊之歳月何長𤣥序三冬人世之光隂易邁以今特假昇𤣥之醮用伸追遠之誠恭陳鳯座於𤣥堂肅迓虬軒于丹陛伏願白蜺青駟並嚴駕以遥臨蘭殿椒房覽故宮而延竚咫尺儼如存之日清虚登極樂之天瑶饌瓊羞少設崑丘之宴寳燈華燭暫爲絳闕之畱鑒沖子之至誠洋洋乎如臨其上眷諸孫之在鞠煦煦然若寘于懐遺庥誕集於宮闈景福永綏於廟祏無任激切瞻仰之至謹具表祈請以聞儼山集巻二十六
