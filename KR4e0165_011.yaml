body:
  text: 儼山集巻十一明陸深撰七言律詩三五十首寒食展墓細雨東風曉未晴養花天氣近清明人間桃李俱生色望裏松楸獨繫情龍劍上騰星漢闊奎章遥映錦雲横傷春不道春如許芳草年年滿路生初夏四首桔橰聲裏送春歸乳燕遷鶯接隊飛入硯柳花還礙筆撲簾槐雨欲霑衣月茶初碾金文餅團扇新裁白練機小閣正宜清潤候晝長消得往来稀銀塘新水鴨頭紋載酒浮花動午薫老圃養成三徑竹野人耕破一溪雲㢘纎雨脚晴不斷怯恰鶯啼逺更聞為惜琴書妨溽暑自鋤苔砌辨香芸穹林迢遞綠生煙漠漠澄空映水田喚雨喚晴鳩不住能髙能下燕頻穿春暉東去元無恙風力南来漸有權起坐江樓自清曉游魚吹浪碧荷圎綠隂庭院晝初長藥碾丹爐按古方病後精神渾愛惜閒来文字費商量自攜藜榻安風背新作茅堂向水陽子鮆正肥斑竹笋欲將身世老江鄉夏日山居三首柳烟槐雨帶斜陽極浦遥山入𣺌茫溪水通潮魚作隊梅風催夏稻成行竒書到手添交直往事驚心免校量縹緲有聲来别院小兒新課甫田章小卜山居背郭開江流面面繞亭臺樹猶若此誰堪待少不如人老漸来一曲緩歌聞白苧滿天凉雨過黄梅野情轉覺閒方稱願與君王乞草莱綠隂樹樹水田田坐愛牛羊散逺天風送潮聲来别浦雲收雨脚過平川幾村茅屋青山外無數漁舟白鳥邊不信桃源是何處每將文字萬人傳初秋夜隨身枕簟綺牕虚映水樓臺晩浴初夢裏已無投筆事閒来如有絶交書㸔低北斗知宵永驚早西風是病餘家在吳淞江上住底須天際憶鱸魚秋興三首茂苑長洲東復東江天淼淼夜含風誰家吹笛關山裏幾處征衣搗練中鴈字未成雲又合魚書欲寄路難通不知宋玉才多少只賦悲秋已自工揺落年光急暮笳得開懐處是還家新凉門巷堪羅雀舊業園田學種𤓰南浦風波㸔白鳥東籬消息探黄花疎慵莫道渾無事袖手猶能領物華半空凉籟撼千軍滿地秋光錦繡紋近水芙蓉先帶露故園楊柳欲欺雲憑髙萬里從今見行樂三秋自古聞堪歎揚雄甘寂寞一生空老太𤣥文秋懐十二首景物逢秋老更成峽猿何必斷腸聲習家池上歌如沸庾亮樓頭月正明萬里山川催木葉五更鐘鼓動江城當年與賜金莖露夢斷空瞻白玉京天闊風髙秋意多青山如削水層波知歸𤣥鳥遥憐汝向晚黄花獨奈何故國笙歌遺玉樹前朝荆棘有銅駝興亡亦是浮雲事古往今来鬢自皤碧草幽花滿故園南山卧對久㤀言年来行李書千巻老去生涯水一村已辨弓蛇還石虎毋煩怨鶴與驚猿秋光更比春光好蜂蝶紛紛不到門青燈挑雨不成眠愛聽芭蕉夜似年去日苦多無計欵浮生如寄定誰賢成功白髮馮唐老好事青山謝客偏他日向平粗畢願懶雲秋水䕶沙田斗帳香消病骨輕少年憶得賦秋聲青藜火煖西風勁白玉堂深晝漏清上帝雲霄陪絳節仙人星漢濕金莖髙山流水空瞻遡秖恐涓埃報未成閒堦積雨長莓苔藥裹詩籖手自裁潦水正須愁八月浮雲常與望三台長沙卑暑偏饒病嶺表風波是有才茅屋若為容我老文章一洗舊悲哀六代三吴業已荒英雄遺恨水茫茫試量秋與愁多少始信年隨鬢短長江上野鳬爭得食山中叢桂早含霜長門本為黄金賦賦就長門却自傷一番風雨報園林岸柳汀蒲半不禁兔魄已隨華月滿鳯棲應戀碧梧隂清商律應笙歌細白苧功多箧笥深起向推移占物候為誰先有嵗寒心潮聲江上喚登臨日日東流故故深十尺蓴絲風蕩颺一天魚信雨侵淫鴟夷去後猶堪恨禹蹟南来不可尋一曲吴娃雙畫槳蛟龍堆裏晝隂隂總為秋光滿葛巾未應偏恠白頭新明珠本自能疑我沙鳥何心却避人一片雲輕終過眼百年論定不隨身草堂舊在三江上聽水聽風知幾巡團扇情多咏未休井梧何事强知秋霜華先上雙蓬鬢壯氣空餘獨倚樓誰復常何工薦士徒聞李廣不封侯千尋鐵鎖如堪借借與人間鎖斷愁病回門巷晝長扃留滯周南改嵗星滿目秋容頻㸔鏡十年舊帶屢移釘髙梧急雨聞金井柞火新凉照素屏深夜不眠緣底事自攜鉛槧校丹經自八月二日至六日皆大潮成巨浸頗得竒觀愛看秋水坐斜曛汗漫東来昔未聞風送潮頭噴積雪波連天際貼層雲髙聲疑有蛟龍怒逺影空迷鸛鶴羣安得此心無一事南華經裏老遺文山堂晩晴觀楫兒作字論文說劍更爭棋五十年来兩鬢絲無事可為甘袖手有山如畫且題詩望中禾黍秋風粒夢後芭蕉夜雨枝小几映忩承落日雙鈎古帖坐教兒元宵横笛短簫催暮筵星橋火樹共參天人于年穀占先兆老向煙花正有緣霄漢無聲風力定山河留影月華圓他鄉頻嵗氷霜裏故國今宵殿閣邊時余寓樓在邑庠禮殿經閣之後渡江桂楫蘭橈江水生前麾小隊渡江行人生幾度東風面花信一番春雨晴初日出林光欲動豐泥逐馬滯猶輕少年游釣難㤀處莫恠丘園太有情次韻王子升侍御登姑蘇玉峯二首牙旗分隊捲芳埃獨上姑蘇百尺臺南斗下臨東海近青山多在白雲隈謾勞此地興亡恨共仰中朝將相才合是長城應萬里野人林壑卧蒼苔目極長亭更短亭觀風使者節初停潮頭東去和雲白山勢西来繞郭青艷冶鶯花春入望太平門户晝長扃闔閭最愛干將劍化鶴歸来尚姓丁舊墓夕陽一片好山光啼鳥啼猿總斷腸有客已成風木恨何人為廢蓼莪章年年芳草催寒食隱隱青山似洛陽流水橋東頻立馬一杯時復奠椒漿七月四日與姚時望放舟過南浦早秋煙水帶雲山江上扁舟信往還潮力漸隨青草短野心元共白鷗閒愛談舊事消殘暑賴有青尊破老慳四十年前釣游地歸来雙鬢已成斑五日夜坐見新月中庭秋影又經年節序驚傳巧夕前一井西風梧葉信滿谿凉露稻花天多情宋玉偏工賦曉事揚雄晩尚𤣥江上小堂蕉石裏不妨燈火抱書眠元日渡江二首殘日樓臺媚逺天清寒先覺鬢毛偏多情桑梓依江郭過眼烟花改嵗年龍氣常占雲五色蓬山只隔路三千東風似解知人意吹向梅邊復柳邊潮回沙際識春回逺見帆檣映雪開向晩中流空日月倚天隔岸有樓臺波濤東下元相逐鷗鷺羣飛莫浪猜一望海雲俱不極令人遥憶濟川才懐江東山居知非知命復知還不負青青屋後山無數好花臨水淨幾羣嬌鳥弄春蠻子雲辭賦終成悔摩詰圖書早占閒愛殺江樓無一事重簾長䕶白雲間元宵風雨風雨無端妬早春上元燈火寂遊塵此身天地誰非幻何物隂晴解弄人臺殿下方空悵望星娥髙處自精神强扶殘病酬佳節絳蠟銀屏照座新十八夜雨細雨斜風轉寂寥閙春燈火第三宵姮娥愛影收鸞鏡歌吹生寒濕鳯簫此夜金吾還不禁多情銀燭更髙燒隂晴本自關天意恩怨人間總未消雨中樓居惜春心緒雨連宵作陣颺空勢轉驕晚向梅花愁爛熳早從桑土念飄揺行人泥滑三汊路漁子潮平獨樹橋别有好懐髙閣裏捲簾香霧倚雲霄出西郊書感花香草色遍天涯團蓋風多旭日遲負郭人家田陌陌送春心緒柳絲絲未應華髮偏憐我試問流年苦為誰路繞溪迴無限好何人不起釣游思七夕與客夜坐花外䦨干雨乍稀早秋風候報羅幃億千萬刦俱遭遍四十九年都是非白石清泉初已遂髙山流水願多違誰云白髮三千丈信手梳来不過衣和徐鶴谿宜興道中喜雨韻谿上山青更水青樓船揺動櫂歌聲先甞陽羡龍團細不慕揚州鶴背輕鐵甕潮聲還寂寞銅棺秋色倍分明仙郎才調元如錦白雪新篇擊楫成簳山曉發經行福泉過青龍畫船春盡水雲和曉夢中間十里過山色擁螺澄海霧溪流如帶綰江波逢人毎問三三徑對酒遥聞欵欵歌最愛凌空凭鴈塔何妨此地著漁蓑青龍南寺與時望輩步過北寺觀三亭橋冐雨乗肩輿還漠漠谿田半草莱曾聞此地起樓臺黄金歌舞有時盡赤縣軒墀何日開髙閣俯闌驚鸛鵲古碑㸔字剔莓苔軟輿十里乗春雨花柳情多喜客来詠鶴予蓄二鶴于山居標格異凡實華亭種云修吭髙足鳯臆龜文鳴聲清亮真仙人之騏驥也往嵗為魯夫傷其一孤雄匹處若怨若慕益深孤潔之趣每加眷恤日益馴擾時望見予輒鳴舞不已若迎若導予益憐之丁亥之秋予渡自水東為旬月之留是鶴忽飛止寓樓之外人共異之文學姚時望即日賦詩比于道義至謂士君子反面者為薄蓋有刺焉予覽之梗槩于中援筆和焉翩翩一鶴下雲中正倚髙樓落日東憶得羽毛如昨夢不敎心力破長空呼童䕶足防秋雨㸔汝梳翎颺晩風赤壁青田是何處㤀機聊與海鷗同王昭君昭君出塞自是漢人禦戎失策却與尋常婦人失身不同斬毛延夀正是淫其色耳殊不成誅賞昭君既去亦不見有思漢思歸之意後来受彼淫烝已化其俗矣古今詩人咏昭君多是題蔡琰耳與文姬事頗不同此亦史傳疑義因華泉有作次韻却抱琵琶别漢宫長城萬里戍樓空一身逺嫁從明主半面新糚付畫工雲外不殊青瑣月塞前初𦂳黒山風異鄉景物新相識無限悲歡曉角中題南莊號背倚青山面水田草堂修竹向陽天夜深南斗當牕見雨後薰風掠燕翩牧笛農歌俱負郭西成東作總豐年主人愛打蒲團坐一巻莊生秋水篇題松泉號藤杖芒鞋白疊巾松泉隨處是知音半空素練懸秋色十里青山蕩午隂坐愛團圞當偃盖卧聽嗚咽替彈琴道人緣業休相問聲色中間未了心題漁樂圖平沙坦路有風濤便欲移家傍此曹鼓櫂鳴榔自成趣賣魚沽酒不辭勞拖藍檻水春雲膩破白船窻夜月髙收網一燈山下泊綠簑衣底讀離騷贈别鄭㢘新作相逢别更新雨中心緒病中身空勞魂夢遊千里又負鶯花過一春江上水深芳草合尊前人逺尺書頻歸舟若度嚴陵瀨此夜燈花定有神儼山集巻十一
