body:
  text: 儼山集巻三十四明陸深撰議薛文清公從祀孔廟議臣謹按祭祀之義本以報功而孔廟祀典實為傳道夫聖人之道大矣遠矣今六經所載皆聖人之道也有能以六經之道藴之身心是曰立徳發揮六經之理見之政治是曰立功講明六經之文形於著述是曰立言夫徳以建極也功以撫世也言以垂訓也凡有一於此皆應法施於民之義故祭則福焉類則歆焉靈則妥焉神斯享矣此孔廟祠祀之所緣起非徒以彌文為也顧世儒之論從祀者每多責備於著述之文而於道徳之實若在所後蓋有見於祭法報功之説亦以孔子删述之功居多而祀典皆在教學之地故爾臣則以為聖人之道本末一貫謨訓功烈以時而出初無意必於其間也其在後儒不得不與時而為升降此祀典之所以品節也自今論之孔門七十二賢親炙聖化相與講明有翊道之功故宜祀秦火之烈典章焚棄故二十二經師口授秘藏有傳道之功宜祀魏晉之際佛老並興故排斥異端者有衛道之功宜祀隋唐以後聖學蓁蕪故專門訓釋者有明道之功宜祀自程朱以來聖學大明學者漸趨於章句口耳之末故躬行實踐者有體道之功亦宜祀此皆出於人心之同然而無事於一毫之假借故曰禮以義起又曰天序天秩此之謂也欽惟我朝列聖純以道化天下表章六經不遺餘力名臣輩出足配古人然知以理學為宗者實自瑄始考其平生出處進退言論風㫖其不合於聖人之道者鮮矣况生當程朱之後素尊程朱之學而反躬實踐復性存誠所以立其徳者亦足以救末世支離之弊習其於世教似為有功揆之祭法亦應有合但先年亦嘗建議從祀先臣劉定之議以為瑄實名臣勤學好問歸潔其身無愧文清之美謚至以較量朱子之門人高弟微寓不滿故斷以瑄祀可無施行蓋其愛䕶祀典之嚴也如此後來公論有曰本朝理學一人有曰今之真儒當入孔廟有曰比元大儒當入從祀有曰濳心理學當入廟庭有曰有功名教侑食無忝蓋其推崇尊慕之至也如此雖然是非必久而後定禮樂待人而後行今聖明在上議禮考文正其㑹也臣又按古人制祭祀之禮雖曰報功其意又在風勵後來蓋欲引長其道以為世教計也是故孔子之祀通於萬世則孔子之道行於萬世豈徒以籩豆祼獻云乎哉若使今之為士者皆能如瑄之為學則言行功業必有可觀於世道何如也所謂法施於民者莫大於此仰惟皇上中興徳冠千古行聖人之道得聖人之綂主張斯文蓋亦有年如瑄者河津有特祀矣太原有專祀矣必欲鋪張一王之大典以表章理學之有人羽翊聖門風勵來學則從祀之選非瑄不可謹議辯崧宅辯名名實實以彰道也作崧宅辯辯曰崧宅非崧宅也記地者蓋疑之疑之而未綜於實也曷從信哉予嘗遊焉九峯聨絡其前呉淞横亘其北襟以横泖帯以大盈地窪而土洳實松江之下流蓋一澤也有阜隆然相傳為晉袁崧宅遂以名予退而讀晉史史無崧傳附見於袁瓌傳中題曰山松云果即崧與則此非崧宅也崧家世非呉茲何以有宅按晉隆安四年崧以呉國内史來築滬瀆壘明年孫恩陷扈瀆崧遇害史亦云然借曰有宅又將弗暇矣或曰崧死國事呉人賢之因其所經比之甘棠云是猶非也夫崧之死憐之可也人未必賢之也呉之人尤未必賢之也何則崧受專城之寄不能為國禦災捍患以有功徳茲土頃焉知勇俱困受戮賊手計當時因崧而死者非一人也人將無望之乎故晉史不列之死事之傳蓋諱之也且二其名以識史家之深意不然豈山松者又一人耶或曰崧之後就居于此故名夫晉宋六代避諱特甚焉有子孫居其地而敢以祖父名之乎是又非也故凡言松者若崧子里之類皆因松以名非附名於崧也然則機雲以名山者亦盡非與曰是殆其鄉人之志而非陸氏後人之所為也夫機雲之死並非正命文章名世實惟鄉榮况陸氏於呉累世將相功徳甚深惜才懷惠之人眷眷於山川桑梓者情也亦實也若崧者上豈得與諸陸伍下豈得與二俊班耶故曰崧宅非崧宅也舊本名松澤爾故今其地水先為災文襄周公嘗欲經理之予蓋聞諸故老云立心辯君子之學始於為已終於成已非有待於外也有待于外非君子之學也君子之心亦以為吾何待於外哉自我學之自我成之自我得之而已矣故見於外也寧闇然而毋慕於的然其立心以為不若是是則外矣由外闕者何與於吾之損益哉誠使一鄉之人是之一州之人是之而天下之人舉是之吾之學其弗然與吾之心其能安乎一鄉之人非之一州之人非之而天下之人舉非之吾之學其然與吾之心其有安乎君子之心求於安而已矣豈有待於外耶心之安吾遂之以成吾之安也心之不安吾去之亦以成吾之安也夫知吾之安之也而遂之内以自信外以自堅誠之立也知吾之不安之也而不去之内以欺已外以欺人偽之趨也誠則聖人矣偽將不為小人乎是皆原於立心之間也果有待於外哉夫自學者至於聖人其上不知凡幾等矣自聖人至於小人其下亦不知凡幾等矣一誠一偽之間若是之懸絶吁可怪也蓋行吾之誠則日進由信而美由美而大其至聖人也何逺之有由吾之詐則日退蓋於此者恐其露於彼也飾於暫者恐其彰於乆也反覆轉輾此心喪焉不自知其入於小人之域矣嗚呼成已者聖人也喪已者小人也曷為成已始乎為已也曷為闕為人也是故聖人之於小人誠偽辯之也闕人以即乎聖人者在辯乎誠偽而已矣孰闕於外哉解來鴈軒解闕大夫之贄也軒大夫之居也凡鳥之陽屬闕時而識序焉惟鴈世之居室軒豁而爽朗者通謂之軒中書舍人顧君汝嘉長安之居有軒大司徒蒲汀李公為題之曰來鴈蓋紀瑞也瑞何以紀識不忘也所不忘者何君恩也君恩何可忘而又何取於鴈哉凡動物皆有靈有靈斯有感有感斯有通有通斯有應應斯徴徴斯驗矣鴈能通夢於人而闕君恩㑹若先告者瑞孰大焉此來鴈軒之所以識闕惟我皇上中興以禮樂文章飾治功凡才能畢錄而竒特之士尤所眷任若汝嘉其一也嘉靖壬辰冬十月顯陵告成當有金石之製大書深刻以垂示永永於是少保禮部尚書夏公奉勑撰文特命汝嘉書篆蓋異數也於是汝嘉奉命惟謹窮日之力未辦乃宿顯靈之宫以畢命是夕四鼔汝嘉夢縞衣者至卧側拱手語云方以類聚物以羣分覺而異之適家僮至報云夜四鼔有鴈一自天下止于中庭飲啄自如汝嘉益異之時江御史占之曰是汝嘉題名之兆而異日名位之所至品服所象也已而御筆親書汝嘉之名於碑且繫以新銜云夫六夢有占載在周禮而熊羆為男子之祥魚旐為豐登之瑞著於詩舊矣大抵天人一氣也顧其精誠之所㑹合者金石可開魚蟲為應而况於夢寐之間神明集焉易曰何思何慮此之謂也若夫遲疾隱顯乃有數爾汝嘉勤於職事為今上所信任一時交遊皆文墨典雅之士與其弟汝誠對居長安聯鑣並轡雍雍後先斯於名軒之義皆有取焉汝嘉淳誠人也天之所與必矣予特為解以祛世之惑且以俟鴈服之至汝嘉尚懋之哉儼山集巻三十四
