body:
  text: 儼山集巻七十四明陸深撰墓誌銘十三監察御史鄭公墓誌銘嗚呼思齋殁且十載矣始克𦵏而予始克誌之於人世何如也嘉靖癸夘冬鄭生開自莆陽走海上再致遺命復奉王大參應時狀并以葉方伯鳴玉書來速銘二公端人也予發書而泣嗚呼悲夫士君子遵一王之制以興履正途修正學適當聖人御極乘可為之時而又有能為之具顧其所出才十一爾而遽尼焉竟齎以逝嗚呼予於思齋能不悲乎而繼之以泣也按狀思齋名洛書字啟範姓鄭氏出南湖唐太府卿露倡道于莆四傳至刺史肇徙楓嶺生倉曹楨楨生静邊都統帥瑄析居待賢里之桃源至元泉南提舉朝避冦徙郡學之前其八世祖也高祖貴八曾祖再一祖廷輔再徙郡治之前皆不仕考諱祥號近菴正徳丁夘郷舉授電白教諭母林氏九牧蔇公後實生思齋思齋初生時適鄰家曝書龜趺移因命之名自少岐嶷異凡兒教以古歌輒成誦稍長治經章解句析師宿以為賢已年十四應省試還補郡弟子員提學東泉姚公試郡數百人中拔寘第一時年十七也丙子舉于鄉丁丑舉進士觀政廣西道奉例歸省蔡太君于家明年始覲于電白㑹廣中兵亂難仕百力營衛近菴以歸嘗過江門拜白沙先生祠因登甘泉湛先生之門折衷理性之學甘泉器之時有黨陸伐朱者極力排辯嶺南人士亦貼服云時王改齋宜學舒梓溪國裳兩内翰謫居亟稱之不置庚辰赴銓授上海知縣上海東南劇縣也素稱難治思齋治之以慈恵若有神明然每事事抵日昃則垂簾屏坐鼓琴誦詩以自適或退而引諸生論經史月徵季考時其勤惰而激勸之嘗曰為學不以聖賢為邦不以仁讓非士也士多成美才海故健訟庭下常數百人詞入悉受而遣之聴自息有不息徐為數語折之即皆引伏又曰民之争禮之廢也乃計家為里里有長計里為郷鄉有老選髙年有行者充之朔望則里老率其鄉人子弟行揖遜禮講書歌詩錄善紀惡海多火𦵏又曰此非民之罪也令之不徳也為立義塜明表樹定禁約以示之習尚浮靡六禮過制且婚無載書易速于訟為之詳品節定書式令社學師掌行之遂建社學九十六區隨學建倉為之約正司馬準常平之法適嵗太歉倉且不給乃大發賑之時饑民相攜來歸者萬計雜沓無緒為之法制别以都里列以交衢識以旌旗散以僚吏金榖封裹坐衆而即之授受以手焉論次鄉賢名宦修葺社稷壇墠祀典咸秩更定邑志文獻以章海賦久弊始議以三鄉田為三則稱土而均撫按咸是之奏上而未果行其説猶存嘗於履端謁郡歸泊海口下有沉屍壓以石磨忽見之嘆曰此必客死故莫余告也遣人偵之近村民家有石磨失其牡執來合之為一即訊乃伏果江西賣卜人嵗晏將歸房主利其財而殺之又一夕舟行見焚屍者詰之曰吾嫂也姑隨俗爾數日有告母死無歸者因憶向日道見火而不哀豈其人耶因逮來集諸隣保訊之衆云此家無喪亦無嫂乃告者之母暮行被殺而奪其首被發其家藏首被一一具在有懐金渡海者舟人沉之其家不知也旬日告發乃盡呼舟人其一已移之他渡即令解其首帕密遣示其妻問金妻果以金至囚乃伏諸如此皆麗法抵罪無拘吏文邑人稱快初不以為功也又罷勾查以益軍匠禁賭博以蹙游惰毁淫祠以人巫覡表節義以奬人倫懸鐘磬以達幽隠當道才之以卓異交薦乙酉春召為河南道試監察御史巡視京倉九月實授巡按通州丁亥九月選推提督南直隸學校計立臺之日僅三十三月而章凡四十七上其論治心修身之道者五事勸上廣仁恩以恵京師者十事救災求言復上十事皆剴切語多不載至論逸欲之戒有曰陛下觀於御馬可以求御民之道觀於使舟可以求使民之道劾費少師張詹事之交惡有曰失近臣守和之義乖明時雍穆之風二臣宜罷論調停器使之説有曰過為區别則才能何以自容每事紛更則法令何以專一開大臣薦舉之門者將移威福之漸破條例資格之常者必啟奔競之路悉荷上優容采納其薦達臣工也如大學士楊公一清兵部尚書王公守仁彭公澤宜以軍旅禮部尚書羅公欽順吏部尚書楊公旦户部侍郎邵公寳國子祭酒魯公鐸宜以簡任其勲徳耆舊也如大學士謝公遷尚書林公俊孫公交宜以眷禮其救解過誤也如總兵馬永之革任御史魏有本之調外給事中楊言之下獄鄭九萬之瀕死郎中葉應驄之就逮主事繆宗周唐樞之編管皆一代之偉人名士士論韙之既奉敕陛辭而南過徐聞近菴公訃號慟兼程歸治喪如禮己丑𦵏太君近菴於南寺月峰山明年壬辰終制赴闕補浙江道兼理廣西江西諸道所至振舉名日益起而忌者日亦益衆時方考察京官適在當局㑹有互相糾劾之命給事中有失官者訐奏上特㫖報罷而思齋歸矣道吳舊治士民相攜徒步送百里號泣攀挽者載路既歸莆以明年甲午閏二月十一日卒于家年三十九耳逺近莫不痛悼之娶葉氏方伯女弟明恵肅慎忠廉之助居多子男二長即開側室方氏出也娶黄氏主事文炳之女早卒次誾丘氏出早殤息女一許配林大尹成立之子卜以某年月日𦵏某山之原思齋天分極髙以氣節自負所與交游必海内賢豪士非其人雖貴顯不顧好辯有口喜稱古昔先王明習當世之故廣庭羣議善批屈人卒亦以是自屈云念深昔在正徳丁丑春試有事於禮闈與一二僚友相約期得名世士思齋經房出今大學士介谿嚴公公以示予類批讀其文擅塲之作也以呈兩主考閣老戒軒靳公學士東江顧公共咨嘆得之晩不及梓文為惜㑹出令海深時居先詹事公憂目睹三年之治咸覈思齋謬以予為知己若不忘吾海也故予志海事獨詳而應時所為稱述者數千餘言自當傳信云思齋文翰精麗所著思齋集若干巻藏于家為之銘銘曰玉挏迺折瓦墁獲完刓方屈直物則有然君子之守寧曰毁全簟瓢為夀鍾鼎非年烈烈御史電白不死國之忠臣家之孝子餘慶實多貽厥後嗣徵我銘詩以閟千祀進階亞中大夫黎平府知府郁公宜人王氏合𦵏墓誌銘嗚呼是為直齋先生郁公之墓昔在𢎞治間文治極矣有起自東海之上以一經魁天下者公實先登葢一時之盛也兹以嘉靖癸邜冬十二月某日𦵏公于榆木涇之原其孤夢麒禮服徒跣奉唐憲副龍江先生狀來乞銘誼不容辭正徳初公為御史在浙江道龍江為給事中在兵科深待罪史官在翰林同朝同鄉又一時之盛也嗚呼公可以不朽矣公諱侃字希正别號直齋晩號嵩陽山人志本始也葢其先從宋南渡徙居上海之烏泥涇故今為上海人五世祖徳達髙祖文富號菊隠曾祖愷號筠軒祖䝉號月坡世有清操以行誼望于鄉逮松坡府君諱瓊始以進士業補縣學生蔚有文譽以公貴贈奉直大夫南京禮部儀制司郎中配周氏贈太宜人生四子公其季也自少頴敏十嵗能屬文出語輒驚其長老大理卿王公景明與松坡府君同學友善每見必竒公松坡亦以吾久淹塲屋振吾業者必此子也已而疾將革連聲讀書屬之公頷而刻厲益勤遂遊舅氏周侍御之門學成而博洽選補縣學生諸提學使者試文必竒絶恒以掄魁期之辛酉領應天鄉試壬戌第進士觀政禮部初授行人奉使徽府王器重之戊辰選授監察御史監稅蘆溝有才名既奉敕兩廣稽覈糧儲疏上四事武宗嘉納焉值逆瑾干政辛未出判安吉州適有湯氏之變公皆先料潜消地方安堵壬申量遷開州知州乃崇禮教修武備豪右為之歛跡時内翰何公塘名士也與公同僚懽甚甲戌遷南京刑部員外郎公色喜遂將母之志即迎養太宜人于金陵公素精法比明允為諸司冠有指揮某傳襲曖昧公發其私證左辯甚人以為神明明年奉太宜人喪還渡江驟風公泣禱而霽人以為孝感戊寅二月終制赴闕補南京儀制司郎中㑹武宗南巡駐蹕金陵一切禮文皆公手所裁定權倖母敢干焉辛巳二月調禮部主客司郎中多所釐正具疏乞汰冗員宿弊為之一清然仇怨側目矣本年七月遷潮州府知府潮俗獷猂公治嚴明果信人心貼服暇日集諸生講授經義咸稱得師毁淫祠秩正祠士風為之一新上官有出令妨民者皆停閣不報勢豪禁戢以法律故多咈意而謗讟興矣㑹朝覲例移知黎平公曰黎固仕邦也若猶吾潮吾其歸哉因上疏乞休時白巗喬公為太宰深知公而聴之遂歸歸務髙居厚養結社賦詩為樂不以世務嬰心教子課孫動循禮憲藹然文儒之宗鄉邦倚重焉既厭城市乃築别墅於吳江之爛溪杜門簡出時具輕舟眺覽於水光山色中悠然有自得之趣暮夜猶張燈讀書不輟戊子聖天子以祀典覃恩詔進公階一級公感恩稔每念國本所繫乃上疏請稽古建壇秩祀髙禖以祈皇嗣時李文康公在内閣亟稱其退不忘君有餘忠焉丁酉秋命子夢麒二孫恪性應試兩畿忽遘疾以八月九日考終于正寢饗年七十有三配王氏贈宜人太平守易菴先生女明慧貞淑通孝經烈女傳大義易菴鍾愛擇配得公文大竒之既歸公孝敬勤儉事太宜人曲盡顔志生夢麒年三十一而卒繼董氏大理少卿中岡公之姪世家嫺則習書翰知大義手撫遺孤備極慈愛太宜人尤賢之年闕而卒再繼吳氏大僕卿闕公之孫孝姑慈㓜内外無間言公敭歴中外内相之力居多皆次第從公於俞原禮也今繼俞氏封宜人蘇州衛指揮友山公之女有賢行子一即夢麒績學修徳以世其家娶曹氏廣西僉事錦溪公女三女長董出適戴憇次吳出早卒次俞出嫁周式尚書白川公之子孫二恪娶唐氏性娶孫氏俱國子生孫女一曾孫二元吉貞吉曾孫女三嗚呼公素英傑以直道自居遇事議論風生黑白不爽文章追踪古作者六朝以下勿論也事業欲與韓忠獻范文正相許與貌不踰中人而膽氣磊落見者企服晩乃抑損恂恂辭意温雅務為睦宗厚俗之舉親之者咸欣欣然若負暄焉深辱公厚善且同舉於鄉嘗相要約以自見於世者多不能酬然公之器業凡三四變最後乃粹然云宜銘銘曰古三不朽得一者傳公所樹立有功有言其言維何高文大科其功維何州郡省府詩云徳輶公克舉之太上無名視我銘詩鬱鬱若堂過者必式相助多賢永同此室廣東布政司理問王公配侯孺人墓誌銘東海之上南浦之陽厥有喬木故家實維王氏積徳好誼葢自宋南渡以來凡㡬世矣然皆以隠操高一鄉傳至怡岡公始以文學起家屢試塲屋晩乃隨例貢入太學既而循資試天官名在高等得選廣東布政司理問所理問賢於其官滿兩考遂致仕歸歸奉八十之親者數年甚樂焉以嘉靖甲午年六十有三卒配侯孺人從公歸自嶺南後五年己亥年六十有八卒嗣子誥乃緘狀來乞銘先是怡岡之𦵏予許銘屬有萬里之役未償也及是孺人之訃予益感悼又重予兒女之悲乃發舊稿併叙之嗚呼予忍為此哉嗚呼予忍忘此哉殆有數存焉公諱寅字正之怡岡其别號也父諱衮字九章號檜亭以孝友詩禮聞大江之南母談氏系出宦族慈恵敬慎祖諱某字某號南浦祖母某氏曾祖諱某號漁樂曾祖母某氏高祖諱某號槐雲高祖母某氏初里中有好善人人稱王佛子者是為養静處士養静實生槐雲養静之父為友文處士則王氏始遷之祖云怡岡少勤敏家業益豐贍檜亭公特鍾愛之躬行孝友聲稱籍甚其居鄉也敬老禮賢賙窮䘏匱一時習俗多為之轉移其守官也敬事奉公初不以小大難易介其意動欲行志嘗一署新㑹縣事剖决無滯覈處梅嶺分疆商稅量劑有方撫按特以禮待人皆多其才而又惜其用之不能盡也孺人系出郡之宦族坦齋司訓侯先生諱平之女也母某氏少嫺家範有淑徳初怡岡為坦齋館甥已偕孺人歸事檜亭公暨奉談孺人左右孝養備至乃至睦宗逮下閨閫之務俱斬斬有條理一洗綺紈靡侈之習而王氏之澤益以衍裕一族稱賢無間内外故其殁也人尤哀之子男三長曰誥娶梅氏繼莊氏初誥生有美質予以仲女許為配及笄而殀仲女賢甚故予淑人每見誥未嘗不思女而涕從之梅氏之繼實淑人之姪也次曰訥側室王氏出聘張氏次曰諾側室許氏出息女一適何良臣孫三廷佐廷佑廷仕孫女三誥卜以嘉靖十八年十二月吉合𦵏沙岡之原又明年夏五月予在京師追書為銘使誥納焉以極予死生之痛銘曰生以澤延配以徳偶望以才充世以仁後嗚呼長江横前九峰列右是為怡岡之藏而王氏所為不朽贈徵仕郎中書舍人隠西張公墓誌銘尚寳丞張君電有母沈之喪如例以終制請今上皇帝特㫖留之許以三月奔歸即起供職復以給驛請上又允之葢殊典云電感泣廷辭就道乃過予以告曰電辱公指教以有今茲門祚之榮實徼福焉惟是歸𦵏期嚴先人之封願得公一字埋為銘予不忍辭乃按孫中書墀所為狀叙之曰公姓張諱冔字以周隠西其别號也世居松江之華亭元末有諱國英者避兵海上因家焉國英生夀昌夀昌生中善中善生森森生公公性至孝讀書循禮侃侃有執持善處淡薄尤不能媕阿取容於俗人有弗合理者雖廣座中輒指斥不少貸故鄉黨以直亮服之内外諸族人皆嚴憚如父師然年六十卒𦵏澧涇之阡嘉靖十六年丁酉三月初一日遇廟享恩以電貴贈徵仕郎中書舍人公初娶陸氏生一子曰霳繼娶沈氏即電之母也受封太孺人太孺人出上海舊族父諱鏞貞懿慈順不喜華靡事中書公竭力養二親俱躋夀康撫霳如已出初舉電有竒質愛之無所不至既而電遭遇聖君以文墨進御一時才俊無能出其右者漸致顯融館閣諸大老咸加器賞是嵗秋奉使便道歸省太孺人於家舞綵上觴光動桑梓環海之人咸嘖嘖歎羡此邦之所無亦近古之所未聞也以己亥十二月十五日考終正寢得夀八十云卜以庚子五月十一日將啟隠西公之藏而大封焉子男二霳娶王氏電娶龔氏女一夏深其壻也孫男二守繩娶王氏守經娶姚氏孫女三曽孫一予蚤識司丞世同里閈故特書其大者系之銘銘曰宗黨稱善于野則同隠逸之操有古人風載啟其後文雅鉅公國恩天與殁贈生封珠駢劔合氣若長虹孰是不朽惟孝與忠蔚哉斯丘大海在東儼山集巻七十四
