body:
  text: 儼山集卷五十六明陸深撰記五沐齊記黃子汝新顧名思義顔其所居之齊曰沐以問於東海陸山人山人告之曰沐之義大矣哉按沐從水從木成文又曰以木受水為沐山林之間萬木叢萃焉浹旬告旱焦槁枯焚沛然雨之蔥蒨改色早夜滋露欣欣向新勾者伸萌者達有不容遏之勢至於榮華果實以顯設造化生生之妙逮夫水泉涸落然後歸根養困以迓維新之㑹夫人心猶木也顧可無義理之沐哉易曰日新之謂盛德屈木為槃凖以規矩挹水貯之時其寒暖以湔澡人身之汚垢一新舊染用享上帝成湯之銘曰茍日新日日新又日新夫利欲猶垢汙也顧可無沐浴之功哉彼異端者流窺見元化之祕妄意時日之間亦嘗以卯酉為沐浴矣鑿泉揠苗將襲取助長冀新新焉是襲抑末矣非汝新之謂也夫水木曰沐以自新也木水曰沐以新人也敬立而義行體周而用具斯義也孔子之舊也汝新其究而一新之哉汝新之先人未軒先生嘗以是道佐皇明之中葉顯而未融遂啓莆陽文獻之傳過庭之餘厥有聞哉從子如英山人同年進士也交舊而情新兹歸莆儻以質焉汝新曰願為記怡怡堂記歙據江南上游山愈高地愈狹是故境愈勝居愈密而齒繁其人往往游寓而散處也夫境勝則難遷居密則易爭人散處則情常不聨其勢然也由其勢而忘其俗之厚薄者恆民也夫難遷之至也鄙吝生焉爭之易也仇讐樹焉情之不聨也途人至焉君子將思變而通之乎通之者豪傑也黃君緬字惟中世家於歙慨然念地之故既以千金拓其宇又以若干金作堂若干楹工訖進其二弟約經而詔之曰斯堂之成也豈曰豫之侈乎吾弟之相也抑亦先人之緒也昔之湫隘者今兹翼然其有立乎昔之櫛比者今兹廓然其有容乎昔之互出入者今兹歡然其有合乎桑梓森然其前後乎山林蔚然其環衛乎吾與若安焉息焉迎和導祥以引嗣續于百世也百世而下將復通之則斯堂也豈惟黃氏之堂哉抑亦歙之堂哉且不朽矣雖然非豫之所敢必也二弟跽而俯曰唯唯於是兄作於前弟奉而趨兄止於中弟列而侍寒燠以時風雨以除弦誦俎豆日相周旋於堂隍之間蓋怡怡如也宗黨過而落焉共顔之曰怡怡之堂以成惟中載拜謝曰不敏敢辱教介豫友人楊君伯立請記於豫豫交黃氏有日矣惟中懷清通之才篤厚彞倫崇尚文藝約字㑹中抱圭璋之器誦說載籍醖釀經綸經字守中勵高尚之操維持清門總統內範兄弟若此固足以望於歙矣而况於兹堂之作哉貽謀端本有出於風氣之外者豈豪傑士非耶豫雖未獲登兹堂以覽觀山川之㑹合稽驗土木之精工考紀嵗月之早暮以激引聲光於永永豫獨愛惟中出於風氣之外也一居室且然况有大於此者哉夫一家始於一人有夫婦而後有父子有父子而後有兄弟有兄弟而後有子孫子孫以至於百人千人萬人其始本一人也由一人以至於途之人此古人之所以難也夫婦父子者恩之屬也兄弟者禮之屬也恩屬則固禮屬則疏故兄弟者恩之漸殺而禮之本始也恩以附於禮者兄弟也孔氏之訓曰兄弟怡怡豈非以其難哉夫怡怡之謂也和之至也和之至自兄弟始故曰致中和天地位焉萬物育焉况於兹堂哉豫與㑹中有麗澤之雅㑹中方將以禮魁天下因取其義之合於禮者俾惟中歸而刻諸堂以為記鴈山圖記古稱山河兩戒南戒盡鴈蕩山云山髙四十里頂上有湖方可十里鴈至棲之故曰鴈蕩袁采云鴈蕩山溫州樂清東北山之通名也去縣九十里而遙山蓋純石而土山不與焉沈存中云諸峯峭峻險怪不類他山當是谷中為大水衝激土盡去而石獨立爾采復為圖序總之云東西四谷西外谷有寺四曰古塔靈雲寶冠石門其流水自大芙蓉港出纜嶼其路平夷西谷有寺七曰能仁羅漢飛泉普明天柱華嚴瑞鹿其水自峽流筋竹澗出清江皆峻嶺自石門來者曰東嶺自芙蓉來者曰丹芳嶺自筋竹來者曰飛泉嶺達于東谷曰馬鞍嶺東谷有寺四曰靈巖淨名靈峯真濟其水自峽流白溪溪上有路通白溪驛東北有嶺曰謝公嶺達東外谷有寺曰石梁自石梁東北至雙峯以達黃巖左有谷曰南北閣南閣乃鴈蕩之北有崇德寺水自蕩頂分流焉鄭向文云古樹老藤蔽虧天日林顛葉隙時見異峯餘波泄注流為飛泉髙自雲霓懸瀉數道鴈山之大略如此其雜記一時之勝者石梁云月已沒白雲西來如流水風吹橡栗墮瓦上轉射巖下小屋從瓴中擊地上積葉鏗鏜宛轉殆非世間金石音靈峯洞云兩大石相倚如合掌至掌中望見山嶨中青天如懸一片冰靈巖云巨石孤立如人俯月出正懸東南角星象纍纍下垂四旁如游魚噞喁以身為浮游在灝氣上夜色如霜雪諸峯相向立儼然三四老翁衣冠而偶語能仁云鴈山西南一峯絶髙下視衆山猶當是大父行舟行南海月餘常望見直西北有物如高髻亂髮才一握大倚為指南西谷云出南户望屋上山山圍屋如城府或纍纍然如蜂腰綴下而刳其中淫淫然如燕巢斜罥而部其户䫜者窊者仰者噴者羃者訛者傴者喙者掉者俯而窺者騰而上者如人皆具耳目口鼻而無一相似又云從靈雲寺南入山時時過絶險挽牽懸藤偃木以過日正中僅到山顛望見永嘉城下大江如牽一線白李孝光云北從天台來入古東甌郡境上望見西南有山相向立如兩浮屠遊者咸曰此鴈山門户也益深入其阻視羅漢洞東西天柱大龍湫猶人有眉目十八寺皆其肺腑也文人之所次第如此豫聞之土人言秋遊鴈落有以哉南土溫溽春氣氤氳故有毒螫至草木黃落毒去乃可入數百里山皆在目中無毫毛蔽遮嗟乎遊貴及時也哉豫將問途焉有告余者曰鴈山循崖而南百里如畫自樂清道白河芳林逾窑㠗過長􅀈原經古塔本覺寶冠石門諸寺出白溪驛謂之右路自黃巖由白若嶺入石梁過靈巖逾馬鞍至能仁出長􅀈抵窑㠗謂之左路馬鞍嶺蓋其分界云東谷之峯五十有三西谷之峯四十有八謂之百一峯有泉五有巖二十九有石三十三而石行廊為勝有潭七而沐浴為大池一澗一曰筋竹峽一曰經行門一即石門也有洞十二而道姑為古有溪四而四溪之水為㑹有嶺七而丹芳為峻凡四十九盤有障二而平霞為華有橋二有嶼二有閣二即南北也有菴三而八扇為八菴有亭四而看不足為奇堂一曰資深遊人之所有事也余性喜登臨中嵗四方行萬里而勝處必往蓋嘗至天台云獨於鴈蕩有眷眷焉今老矣乃畫為圖聊以資臥遊之適爾因考論其槩為記近時陸文量以藩參出遊具列形勢謂西湖諸峯為劣至登平霞則獨立四顧疑非人間世也潘三峯御史加品隲焉謂有勵拔有空洞有雄渾淵澄勵拔如介空洞如通雄渾淵澄如旁行不流各舉其人類之則又出丹青談笑外皆有關於兹山也因并記之願豐樓記歙據萬山之顛多舊家人務本而俗禮讓顧田狹而齒繁也力耕或不足族聚而重遷也密屋而難容故其地多樓居嘉靖丁亥汪氏之新樓成軒爽堅緻為一方望蓋克尚之居也扁曰願豐而請記于余使再至㑹余有逺役也克尚送之重申其請余叩之曰今世故家舊族喬木日茂而手澤就澌矣其子孫之賢而力者往往以更新室堂為繼述之大蓋其意亦欲傳之子孫以為燕休生息之地耳至于支分泒屬則門户各有掌握雖一瓦寸椽之微必計爾我以為承傳之大雖至親有不相假借者蓋一室事爾意至狹也杜詩之所謂願豐憂國者之事卿大夫職業也於子何居克尚之言曰綺田野人耳何敢與於國謀顧念穀粟桑麻生民之天也一遭歉儉則骨肉有不相保者矣奚暇禮讓之圖且身處瘠薄之地人力雖盡孰與天時衣食既充仁讓可廣是故恆願時和年豐如唐虞之世綺得為堯舜之民而兹樓庶可保之子孫矣豫聞之曰是安得有道者之言哉夫天人一氣耳志之所之氣必隨之願望所及天亦應焉至其效之淺深遲速係其誠否何如耳是以咨嗟嘆悼之聲或召水旱災戾之變而和平恬淡天日之所為清明也此中庸之義而儒者之極功克尚其有聞於斯哉一樓居而公心昭焉誠意萃焉仁澤寓焉將所謂庶幾者非耶雖然稼穡王政也燮理相業也家國人道也兼之者身也盡之者分也通之者一也克尚亦何負于卿大夫哉因書為樓記燕翼堂記詩之雅曰貽厥孫謀以燕翼子蓋言圖逺也凡遠之圖則近者始有所藉若乃圖近於近則尤近者或有所遺而况於其逺者乎此古文武周公之志也夫文武周公聖人之備者也其所圖維經畫匪徒用以造周而已實以教萬世於無窮爾萬世而下有能師文武周公之志而用之乎師文武周公之志而用之則利用安身動罔不吉而况於其細者乎豫故有愛於黃氏之堂也歙黃氏之裔曰文晟父一旦顧謂其子壽貴積輩曰吾黃氏自芮公避地於潭渡八百餘年矣先世思誠之堂燬吾力復之今吾復抱孫矣合族之㑹不已難乎於是壽等咸曰諾乃擇地於思誠之東復作一堂既成而軒豁美麗據山水之勝扁曰燕翼父父子子祖祖孫孫世相踵武於其上蓋秩如也積來徵記記曰君子之居室也非徒以光門庭侈輪奐而已也蓋亦有義存焉是故先人貽之于我承之是之謂傳世自我作之後人受之是之謂永世傳世之謂孝永世之謂仁斯義也在身成身在家成家在國成國神而明之無巨細無精粗其究一也昔周之興也卜世三十卜年八百既其終也咸過其厯雖曰天命亦由文武周公相與經畫而圖維者以深長之思為久大之計若詩之所詠者而黃氏之堂義有取焉斯亦文武周公之徒非與則潭渡者固黃氏之豐鎬而兹堂將不為魯之靈光也哉雖然詩之頌曰君子有穀貽孫子蓋言祖宗之所以裕其後者非徒以基業為也抑亦有善道焉夫善莫善於仁黃氏復以仁孝與斯堂並傳焉則傳潭渡之族之盛豈可以世計哉於是積再拜曰此家君之志也遂書為記儼山集卷五十六
