body:
  text: 儼山續集卷一明陸深撰賦二首水聲賦并序陸子北征困於道路日不數里而閘隸扄啓數更告勞獻瘁蓄泄稍愆則舟膠于沙夜宿河次聞河水努閘而過者淙淙汩汩臥不成寐乃秉燭倚舷聽而賦之轟轟乎蟄雷摶地軸與齁齁乎將颶風撼而砥柱折與喧喧乎龍嘯雲與哮哮乎長鯨之吼日與逢逢乎周庭鼉鼓何桴之不絶也吰吰乎蕭寺鳧鐘而莛又無節也閧閧乎共工之首抵觸天柱與隱隱乎穆王之駿復道馳掣與鏦鏦乎長平機發金革偕糜與烘烘乎咸陽火縱而玉石裂與南薰和兮調揚泰山頽兮響長洞庭奏兮未闋華州哭兮未傷將使褒姬輕裂帛巫山醒襄王胡騎解重圍而鍾生改聽乎宫商也陸子寤驚惕若心兵靜言審之胡為乎鳴舟人告豫曰是曰水聲四老圖賦并序清河公暨其夫人受封之又明年也公壽八十夫人未及者二年蓋今昔之所難也其子職方郎中允敬方佐天子削平羣盜不能一日去謀所以為壽者乃以四老圖使其友陸深識之將寓歸樂公之志焉其辭曰偉四老之軼羣兮乃山澤之列仙何冠裳之陸離兮儼商周之所傳宅乾坤以為家兮采桃實以為食馭隂陽之逸駕兮縱吾轡之所極邁商顔以求侣兮過絳邑而問年淡逍遙於野中兮各陳詞而競前覩眉宇之軒揚兮知顔色之獨好忘榮名而不顧兮亮有得於要道欽丹青之輝映兮羡高風於異時邈芳躅之孰繼兮顧於今而見之乃有遺安先生南州淑氣子肯父堂母以子貴嫓雙美於共世兮若鸞鳯之在霄固松柏之貞茂兮閲歲寒而後凋俯澄江之如練兮接蓬瀛於咫尺宴瑶池之白雲兮映氷雪於姑射所貴君子之年兮作邦家之寵光詠南山之篇兮聊寄情於霞觴睇桐里之鬱鬱兮垂䕃於鯉庭相天誅之九伐兮固昔授之一經方將履太和而超無為兮偕羣仙以容與橫大江之雲濤兮爰徴詞而臨楚五言古詩五十七首擬古三首擬行行重行行悠悠日將逺思君心甚邇所嗟異居處同生不同里别離既以苦㑹合諒以難逝川期東海行雲戀故山自知去日貌難比舊時顔出門即逺道兩雪紛浩浩潦泥緇素衣安得白日照矯首念征人憂傷易終老擬西北有高樓層樓一何巍亭亭切雲霄綺疏縹眇間欄楯匝周遭不知誰居中哀怨逐風飄為言本邯鄲關河望迢迢區區懷苦心三載非一朝援琴以寫之意重絲難調初為陽春曲再行鼓山高妙音本絶世賞識何寥寥思為雙黃鵠比翼與俱翺擬孟冬寒氣至歲盈易寒風曠野何蕭條深居戒逺趾四壁亦飄搖陽和日已往隂沍日已驕門外逺書至啓函知故交慰我以好音期我以明昭感兹殷勤意千載詎能銷素心抱愚衷欲吐還自韜秋懷三首越人挾燕石買之曰千金和氏抱荆玉至死悲不任㷼石媚光彩舉世傾所欽彼璞一粗礪在中誠難諶不惜大寶湮傷哉和氏心二鴻鵠非讐人挽弓欲射之蜻蛉亦何意兒童解黏絲人生寄一世毁譽安所期高樹多天風高臺多赫曦貞白茍不虧豈能隨崇卑三試歌清廟篇餘音遏流雲千人掩耳過萬人不為聞轉歌後庭曲和者日紛紜已矣何足論吞聲淚沄沄贈别徐昌國二首北風起天末送子城東闉願言遲數里欵欵得具陳我有一端綺持以贈夫君不願為黼黻不願為袴裩願為平居服昏旦常相親垢敝忍棄捐愛惜情如新二北風吹我襟望子不得見跂立恨足短淚落迸如霰草樹搖寒凉二曜急流電游子在路岐襦薄馬悲顫未明戒先驅薄暮苦後殿空谷多松柏念此步不進南望水澀舟不得去同行者謀就陸戲成自慰春江多桞花風起花還飛夕陽斂飄蕩委地相因依行止諒有數蚤暮同所歸百年總行旅安用長歔欷羲和無東回安樂誠幾希眇焉泣岐子人逺事己非飄飄山水間志願良不違朝多清風來暮多繁星輝古稱太史公千載欽嘉徽和趙類菴燈花誦君燈花篇值我燈花燦旖旎欲浮香敷披似春半圓朵競霞呈岐枝誤星散娛玩夜三更遲回腸九轉獻祥諒無私凉德歌有靦南郊禮將成預兆明庭宴無藉春風吹偶見春風靣影搖畫屏斜蕊墮銀檠亂君才本天妙况復論交淡游戲賦燈花膏馥人猶厭麗藻凌六朝高風駕前彥倘許望後塵鉛槧從兹辦寒燈復作花政爾從人願邯鄲縣南見捋柳芽充饑者青青楊柳樹弩眼學窺春春風漸暄妍品彚一以新如何遭採折捋之葉屯屯初疑摘早茗尤恐識未真問此胡為爾答云療饑貧芽茁本可茹何暇辨芳辛既免私家競復有官道遵連朝斷烟火持此抵八珍地爐酌野水拾樵煮清淳幸將糠粃雜撑腹藉輪囷去秋淫潦厄今春㸃差頻焉知歲年計聊度旦暮身嗚咽語難了淚落如可紉見此三歎息臨岐倍傷神黎民有菜色何况等木皴道路正供億一日須萬緡民腹已如此民力那堪論王政先㷀獨漢治資良循天恩倘可乞咫尺當重陳儼山精舍晚意風蟬咽翹林江鷗泳别渚雲霞變初秋焦枯慰時雨豈乏凌冲志蓬瀛渺何許兀坐當軒楹凉飈滿衣苧中炯常晏如外紛亦屢拒㑹心適寡諧顧影聞獨語風雨夜擁爐防警楫兒從傍屢作啼思野居寧免懼所恨乏兼資雞犬偶不寧兒女成悲啼青氊有舊物緑林多健兒昨聞東西陌頗受狐鼠欺明燈守長夜風雨正凄其豈云網可漏無乃歲阻饑春陽正駘蕩民物方皥熙願言寄當路莫憚催科遲雜詩三首四叙若鱗次君子感變遷昨日夏熱酷今夕秋月鮮凉飈振天末草樹失故妍元鳥逝不返蒼鷹厲髙鶱茍無豳風人何以卒歲年二古井春無泉槁木夏無枝仲尼歎糞土詩人詠德基中夕起坐歎歎息將奚為去者日己逺來者安可期不見令名士監古乃得師三敝幃殉老馬恩義貴有終三良從下世黃鳥哀國風蟻冗墮太山蛆流毒桓公棄置萬夫望憂來不能窮浩歌當永夕沉思夜將中元旦日蝕白日衆陽宗王正四序首况此月初吉食之亦孔醜故老相驚嗟百年未曽有頗聞文皇時兹事亦匪偶當其君臣㑹災䘲豈能久宋公才一言熒惑乃却守于今太陽厄從申直至酉羣僚萃南宫簪組紛前後臺史報初虧稽首再三扣元臣跪伐鼓申救情獨厚高高若罔聞啖食未滿口乍疑璧微缺忽若鏡中剖須臾如月初恍欲露星斗慘淡不可辨氛霾互纒糾天人㑹相通垂戒固不茍吾聞月掩日其事果然否無乃陽道衰遂為隂所走月本傅日行代明得稱耦倘使日景虧月光安所受其事或渺茫吾欲徴神瞍載觀春秋書一一各有取下土蟣蝨臣慚無捧日手雨夜無寐泛然成篇海隅苦卑暑溽潤恐違生思凌千仞岡一眺白玉京玉京多仙侣招邀有深情餐啖皆淳和被服何輕盈俯視塵中世朝夕競浮榮聽雨摵摵入葦際蕭蕭自簷楹幽居忽復旦逈野薄江城偃息從兹始塵鞅詎能嬰園田被膏潤琴書有餘清浮生本未定譽毁等隂晴聊有盈觴酒獨酌慰幽情吳人以巨艦載湖石至雨中閲之濛濛江天雨遙遙湖水船誰施巨靈斧擘此青數拳縹眇呈夏雲嬋娟隔春烟雖乏衛公識偏懷米生顛蹇豫頗好竒有癖在林泉肩輿度壑暝孤榜逐溪緣品視剔苔蘚摩挲計雕鐫遄歸亦乘興臥遊裁短篇寓樓寄儲芋西天低歲云晏故鄉復僑居與子共巷陌相望一水餘瓦屋正鱗次石橋亦虹舒心親物無礙㑹數意猶疏乾坤本逆旅日月自居諸來此飲名酒相携校詩書華髮不可變功名等為虛及時須行樂政恐不待豫申章示同志聊以酬遂初題茁蘭滋蘭茂九畹靈雨茁其芽和氏抱荆璞以身明不瑕芳澤貴自保物色寧有涯但使臭味同歲晚何足嗟猗猗關西彥風流如謝家光輝媚幽巖旖旎掦芬華溫恭君子持令德戒紛姱豈乏桃李姿貞白世所嘉洗竹蘭以當門鋤竹緣太密洗託身茍失所彼美徒漫爾郊居時雨餘茅蕪手自啓好風來林端煩曦䕃樹底生事雖甚微粗足辦鹽米㑹心即交游異姓等兄弟吾行迫始衰聊復勤四體伐檀譏素餐相鼠歌有禮九月朔晨興落葉紛可掃客行殊未歸大化無停運倦翼多卑飛凌寒懷執熱撫序悲授衣物候變南北世故有依違晦朔成代謝所嗟知者稀謁漢高廟元冬曜白日曠野吹大風旅行齊楚交密與豐沛通磊磈半畝丘乃有高皇宫堂堂赤帝子儀像居當中天運茍不極未肯生英雄一時風雲㑹百輩皆王公野人守敦朴香火祈年豐那知千載上行天乘六龍丈夫事真主聖人優百工感歎復感歎豈必非遭逢贈别汪天啓同年借問何所悲相知新别離掩袂各揮涕步步不得辭恐墮兒女情揮酒盡一巵念我同門友高舉振羽儀東西各有過與子願獨偕叶意多覺别促情親身不違仰視白日速嗟此道上泥久要四海志歲年空路岐慷慨發我歌我歌當向誰諒子重察識㑹面知有期過黃憲墓當年自無營千古如識面安用金石堅始知儀秦賤曉行襄江濵殘月墮西堰溟濛草露晞屭贔標題見相從牛醫來古意倘未變和陸太宰水村也適軒詠懷地即大隱勝材集補天餘達人秉高尚詎云朝市拘覆庇本四海俯仰托兹廬雲石自流峙吹噓及根株命觴沿徑曲鑿泉當坐隅遂使耳目曠頗勝絲竹俱心融境斯一理適情自娛載理聞鶴譜時臨換鵝書藏胸富丘壑佐世登唐虞疏品荷陶鑄蓴鱸思躊躇室邇人甚逺歌嘯日正舒賤子獲聽履自負龍門如送徐昌榖湖南纂修取友在異世貴此肝膽通與子同鄉國筆硯亦屢同一别歲月速那得不匆匆宵戒一觴酒起視夜方中追子恐弗及繆綢叙難終夾居長安道參商各西東況兹萬里隔目斷雙飛鴻江湄長芳草鬱紆傷我衷詠蠶食葉圖為康修撰德涵作啖葉勢未已謀生意何愚但知厭其腹寧知用其軀恩深報必厚功高禍與俱物理固若此感歎將焉如張太史常甫得豫告聞子有逺役我心己南悲菀彼桑與梓藐在天一涯恨無雙羽翰高飛鎮相隨持此一寸心隱抑詎當知宵起步廣庭天高列星遲人生有㑹合世故多别離别離勿復道但問别者誰雜詩覽鏡難自持容顔豈常好秋髙風露徑黃落紛弱草豈無長生藥馳心違至道淨宇澄垢懷冥觀契元造遲回三十年念此苦不早瑶池與元圃微風蕩芝草釣臺雙臺切高雲碧溪下長風本懷戀比鄰長嘯辭王公把釣已忘魚入夢猶非熊人境有舊廬客星動高穹江山自朝夕禽魚或西東朝市各取適出處俱自躬豈曰萬户侯非此一畝宫咄嗟保厥始優游慎所終玉華雜詠三首蓬壷羣仙厯萬劫三山乘六鼇琪樹連瑶草珠宫貝闕高歸來玉華子新製六銖袍碧香閣雨洗碧色鮮風來清香逺田田既堪悅亭亭若可飯幽期當南軒微波坐成晚問月臺月出青山外浮雲為掃開缺圓緣底事弦望孰相催有言俱不省流影照高臺宿佑聖觀候明發是日小至宦業祗簿領游目曠林泉偶此山隂雪來衝竇中烟新陽一以長天道㑹好還招邀復材彥探討事幽元初遵濳虬壑還過種玉田曲檻俯躍鱗盤空墮飛鳶時聞林端磬幾遇雲外仙相將願有遂所適期無前武城觀漲因憶陳后山五月一雨凉中宵大江南之句情景悠然援毫有述長河五月雨一夜十尺强大星映南斗微風生蚤凉坐此景物暢懷彼路阻長人生百年內弦望倐相將茍非金石固動靜各有常大化無停息仰視河漢光安山道中晚棹洋洋水波逝水欽川上懷遂將去齊魯明當度江淮逺役謝塵鞅高居理茅齊沙田二三頃婉孌東海涯芳春景物麗夕陽襟抱佳耕讀有遺軌長使願無乖題陳光祿惟順迎暾書舍二首鷺嶺白鷺斜行下青山百里長登高一以眺風物近瀟湘謝安如可起飛去逐鸞凰寺烟有寺隔東鄰人烟日中滿感此盈虛間沉吟坐來晚曠古達者心尋山不辭逺近田詩并序太宰松臯翁作近田詩以示其冡子㒜㒜奉以為别號深讀其詩序窺見翁之實學近裏若此因和一章近世有講學者長虛騖逺賴翁此作可以一變深亦為之惕然蓋不獨可以傳之一家也㒜其實之國風驕甫田鄒孟戒捨已載歌許近田取譬同一理許本太嶽後繼世疊金紫煌煌示新篇下帶有深㫖西周帝王基纍世由農起千載公劉詩配天后稷祀致廣本慎微舉逺必自邇請觀阡陌間東西僅尺咫耕耘貴及時稼穡便佐使屨杖傍門廬饁餉出童婢收成俄頃間焉用枉邐迤心田尤近之力耕從此始請君聽我歌我本田家子晨興見白髮四十期有聞覽鏡髮改素古人悲染絲一變不復故神王自中恬形勞豈外慕伊余本懦儒履滿每知懼悟言養生篇引領遂初賦大化運自然頽景不可駐達人固忘我君子保末路華實見本根相將歲寒暮裕州宵行車中聞雨計程兩旬日乘傳二千里山川氣候分值此廉纎雨輦路斂輕塵遙山渺烟樹淅瀝響蓬軒夢想春江滸行役雖苦疲隂陽有燮理物情荷恩慈天運賴明主甘霖在咫尺滂沱慰中土月下發河間西北列𤣥隂晨氣何凜冽鼻息凝層氷纎指不得結出郊遂無際戒頮膚欲裂﨑嶇雖强禁頗勝風沙沒新城趨涿州喜見西山杳杳青雲間崒嵂黃金臺行人多苦寒常恐北風來風起則黑氣如山當空北人以為候漸近始分明熟視驚還猜相逢陌上人顧問首屢回所期既以遂鬱紆開我懷送王存約赴惠州二首㳙埃難為功犬馬終戀主新辭掖垣直郡符遂中剖平生弧矢懷慷慨赴南土身逺跡甚邇愛深心愈苦於惟孝皇仁貽謀邁前古網羅天下才拔十望得五鼎湖一睇瞻臨風淚如雨二朱方赤日永揚舲江路長亮無沉湘賦寧少伐木章川原孕靈淑藻麗發景光冲抱秉素尚令德藹餘芳徽音幸毋阻一寄鱗鴻將莫以仳别恨置此氷炭腸地理任險易天運變炎凉寓谷亭二首幽蘭出佳谷託根岐路傍路傍多風雨侵凌良獨當榛荆雜菅茅紛紛遙相望白日萬里逺腐草流螢光感此忽求懷氷炭入我腸千古曠達人去住貴能忘松菊有良侣諒兹非故鄉安得垂天翼附之東南翔二駕言登高丘憑南望天涯倣佛北堂樹穠郁時敷披心恍神與俱長跪畢我私初言定省違次言苦路岐三言近起居四言長相思五言母慈重未能報男兒滔滔殊不已涕泗交相垂浮雲自南來雙日忽如遺茫茫千里外想仰徒噫嘻日夕山下歸露草青離離送朱子文令奉化少小同鄉校文翰事幽討比身雙南金抗志萬物表鄙余慚先登遲子在逺道邇來叩帝閽披腹呈至寶經綸以為期朂哉善自保我有平生人我有平生人區區管鮑看金石諒匪堅何况蕙與蘭聨袂慷慨歌歌聲激雲端青雲為之開白日照肺肝恩情中道阻盟誓日己寒四海非不寬吾心自不安清宵入我夢援琴為吾彈霜後拾槐梢製為剔牙杖有作金箆與象籖淨齒或傷亷青青槐樹枝一一霜下尖偶聞長者談物眇用可兼搜剔向老豁其功頗勝鹽兩堅苦難入薄肉忌太銛眷此木氣餘柔中末逾纎復有苦口利用之代針砭余官自槐市日夕映齊簷西風動中宵乾雨鳴疏簾呼童事收拾把束若虬髯試以苜蓿餘風致殊清嚴作詩示君子取才慎棄捐江行望洪都吳楚並南紀風物共清嘉澄湖富魚鳥聨山起龍蛇人力務稼穡土膏雜桑麻秋氣日漸徑四野垂幽花旌旗發前澨樓船奏清笳極目有嘉致兀坐淡不譁雲開帝子閣水深高士家南浦餘碧波西山結綺霞撫此大藩地豈曰盛繁華緬慙寄民瘼何以答晨衙閒居三首璧月墮止水可玩不可親幽人俯闌曲羽扇一角巾悟我真色相淡然忘此身二軒中何所有四壁微風發其大不盈畝納此一輪月嬋娟萬里情徘徊照短髮三畫簷淨流雲鮮月代秉燭上有梧樹枝下有寒泉緑夜深地復靜俯仰皆自足儼山續集卷一
