body:
  text: 儼山集卷五十一明陸深撰序十五送光祿卿張南山先生致政序皇帝青宫之臣最舊者宜莫如南山先生焉先生起家中舍明年召直文華殿纍遷至光祿寺卿四十有餘年矣中間嘗佐天官參大藩登容臺實未嘗去文華一日也是故最舊昔人以一生仕宦不出國門者為榮且幸於先生何如也先生工書翰富文藻長箋大幅幾遍海內人爭寶愛之雖兒童婦女皆知有先生焉是故於宫僚又非特故舊而已今上既光臨大寶先生年且八十矣抗章請老上念其賢且舊為特允之又以給驛請復允之蓋異數也昔人之歸道出上東門外觀者歎息再三曰賢哉彼固見幾而作者耳人猶賢之遭逢明聖晝繡而還於先生又何如也竊嘗觀造物於人若故忌之吾不知其何理也長於文墨或纍以政事使之不得盡其力享有聲譽或終其身與之焦勞焉其於功名之際尤所吝惜竟不多使之完以去也於先生獨不然鳯池綸閣之上未嘗有簿書之擾姓名滿四海未嘗一日輟賦詩飲酒之樂金紫纍纍歸而為江山風月之主載籍所稱如先生者寧有幾人哉而先生身有之未必知其榮且美若是也自今之觀於先生者不知何如其景慕歎羡耶又安知後之觀於先生者不如今耶雖然世未必盡如先生也蓋其文以書掩才猷以髙暇掩今所稱者率其緒餘耳深嘗得先生一事於隱微中真可以立頑而勵貪也方孝宗萬幾之暇雅意文事多所述作每一書進御儒臣類有陟賚酬勞也先生修詩海珠璣成例得進階乃獨辭免由是觀之其亷退之節所可傳者又於是乎在是豈偶得於天而徒有所享者哉深少聞吾松有二張先生者博學洽聞人望也蓋謂東海公與先生爾不幸生也晚不及遍遊諸老之門愧方登朝而先生又去矣考德問業將安適從能無眷眷於懷乎故受命於長者之前濡筆為敘云送沈西津憲副赴陜西序按察使之制視都察院故曰外臺臺以司法也其設官視內臺略降一等其二亦有副有僉自按察之副而副御史大夫亦再遷而已其有卓異者或遂遷固非特以其官而已矣亦其道之易以行也副使之職總持法令以振肅寮屬專之者刑獄也有平反之道焉視刑曹理寺吏之貪亷才不肖得坐而進退之視銓衡有兵戎之寄者視司馬有學校之責者視禮曹國監獨錢榖不與焉則又取於才之備也吾友沈君仁甫自刑曹郎中遷為陜西副使上將有意於仁甫而大用之而將藉是以為之階也雖以仁甫之才亦將階是以為之地也而自致之大用也秋官張君九苞屬豫贈之蓋豫三人者其居同里其學同業同朝同為世姻而豫又職文也當言夫言者行之標也知者行之宅也孔子曰有德必有言易曰知至至之謂言與知之重也故言而不能行者誕也知而不敢行者弱也非言與知也天下之大業存乎人成天下之業者存乎學擬之而後言致之而後知斯學之道也仁甫長於論議而明於理名位所極宜仁甫之自有者矣獨念少與仁甫同業時遂有斐然之志既而以言後先見録中遭棄置兼罹憂患杜門家居者有年矣得從仁甫益辨天下之故考求古人之迹以合當世之變其成敗利害若有可言者矣今上起廢之餘豫尚無所於見而仁甫固得行之也豈非豫之願哉雖然言之難孰與知之難也知之難孰與行之難也議論他人之失得孰與我之自見之行也行矣而不槩其所言至忘其所以言者而變之而復以近似之一說自諉則豫誠誕漫無稽而負仁甫多矣今陜西督學則朱君升之備兵則張君廷紀二君盡豫之所交而當世之望也仁甫往參其間相觀而善陜西按察之政必將為天下冠矣豫又當書乃序以别為己方序豫喜手抄書方時少壯夜寒爐炙不廢泓頴今五十有六年矣衰病垂及乃喜抄藥方豫外病病齒最先最甚故抄方自治牙始其次病目而扶衰之方兼抄壬辰春寓榆關久間從諸生借書消日因得寫此嗚呼掘泉止渴求救目前此豫一人之事也杜門集方遐想舊躅此豫一家之事也因題曰為己方而序之送縣侯曹孟輝入覲序今制凡以四季之年元朔皇帝御正衙大受朝賀而因以行黜陟之典於是京尹嶽牧郡守與州縣之長吏罔不精白一心以承德意而異政奇蹟畢以宣揚明廷士大夫往往乘此以赴功名之㑹而治理於是乎考成焉明年壬辰適當其期而上海令曹侯孟輝治且三年矣遂以上海之異政奇蹟以獻于上先期戒行士民攀留之不可得各次第送之十一月某日縣之丞尉送之既而請贈深適有晉陽之役不及與祖餞後乃揚言而問之曰曹侯之治海三事踐矣六條舉矣百里之內熙熙矣是行也當受上賞必矣於是李君申作而言曰侯吾鄉達也申也賴侯之教水土以平橋梁以建使民不病於耕涉三四年來民用有秋而生齒日以蕃息深曰敏矣夫是之謂惠而不費黃君貫惠君應繼而曰自佐侯以來徴科有度出納惟允貢賦給而民不擾吾等惟蚤夜是觀是法微侯貫應不及此深曰恭矣夫是之謂寬則得衆王君徽又曰徽西人也未諳南土軍鹽之劇侯嘗命之曰惟嚴而恕可以集事徽是以不愆于政深曰直而溫寬而栗兹臯陶之令聞也主簿張君相又趨而前曰惟侯總政惟尉司刑刑之不中政從之隳矣相也先后左右吾侯又安敢戾和以罔法深曰欽哉恤哉感而後有應也夫是之謂錫類典史陳君相則執爵以揚於衆曰侯吾師保也相將從之于邁矣侯有德有才相無望於萬一萬一相有少愆則貽侯之羞相敢不殫志與盡力深曰慎矣斯事長事貴之道也夫政有體為政有序得其序之謂禮被之聲音之謂樂故曰見其禮而知其政聞其樂而知其德觀於此則侯之德政可知己是寅協之衷也仁讓之化也逺大之風也文華之實也治功之成也而君臣之倫朋友之誼於是乎在即此亦可以獻於上矣今天子神聖方以道化天下而尤加意於畿輔之臣侯當受上賞必矣因録為序以贊侯之行顧母李孺人五十壽序東川顧君世安先大父筠松府君之甥草堂先生之孫省軒翁之子也其配李孺人江灣之舊族也有賢行實佐世安以承顧宗族黨稱焉一方之人咸以為兩美並世二氣咸和真一家之禎瑞云乃生六男子三女士而顧氏之宗益以蕃矣世安博學多才藝以明醫事今上為御醫領內局有天下之望而孺人附之益以顯矣冬十月十有六日為孺人初度適開六袠姻戚媛姥捧觴稱壽者擁户欵扉一方之人又以為五福駢臻一家兼備蓋天下之禎瑞云古稱形和則氣和氣和則天地之和畢應此類是已而孺人之壽可量乎于時仲子從德率諸弟從仁從義從孝從悌以告曰吾父母之賢惟伯父知之亦惟伯父能言之從德等思所以悅母而慰父者伯父豈有愛乎豫諾焉憶昨戊戌之歲豫有四方之役不及為世安壽心甚恧焉盍少遲之以同壽可乎乃諭之以俟今年世安奉命使江南得便道過家適及其期此殆至和徴應天之佑善蓋如此乃製為三祝之辭俾從德輩歌之孺人中坐聽之其心有不悅者乎悅則壽進而五十蓋其初階也歌曰望東海兮西池氣氤氲兮光陸離門有霓旌與雲旗君恩渥兮湛露斯吾父壽兮吾母與之俱枝連理兮案齊眉再歌曰奉慈闈兮紫玉觴翠雲帔兮黃裳儼中坐兮髙堂庭有蘭兮愛日長八千歲兮春復秋誕欣欣兮樂康三歌曰揚斕斑兮簫管舉紛拜舞兮兒與女龍之孫兮鳳之侣倚閥閲兮崢嶸去帝庭兮尺咫義方朗兮慈顔開淡逍遙兮容與歌既畢風氣為之暄妍天日為之朗霽不知蓬壺方丈竟何如也乃復進從德輩而告之曰孺人與吾家梅淑人猶姊妹也豫視汝父差長一紀則兄弟也是故其情密其分親不獨譜系著稱吳下也嘉靖辛丑豫之乞歸汝父送之潞河之上信宿而别别復執手曰吾邑風化孝弟宜先感動誘掖仗兄此行豫感其言而愧無以為報也豫少事草堂先生文采道德照映一世兩典大郡為時名臣筠松府君晚䝉聖恩贈官至詹事學士二老相歡相敬愛豫今老矣猶厯厯記之先姑之舉世安也府君實命之名曰定芳今日為李氏之甥者尚當為陸氏之甥否乎此汝父所囑之孝弟也於今壽母見之矣惜也汝兄從禮方以詞翰直內閣不及與斯舉儻轉以豫言達之則孝弟之風逺播而世澤之垂永永矣因録為序封僉憲頥菴潘公八十壽序東海之上蓬萊方丈之境接焉人多壽考海上之邑環六七百里中涵江湖之秀故多文獻土脉膏沃風氣完固又多長者我朝文教四訖其在吾邑涵養休息者幾二百年是故俗益淳氣益厚仁壽之業益以宣朗乃若當一方之盛以享五福之全則頥菴先生潘公其人也公朴茂誠慎儀觀有顒自一言一動之間具有規矩品式內外族人賴以師保少負美才有經綸天下之志退然若不勝衣嘗一仕項城尉屬當時艱修繕城垣平允刑獄惠政大著而項城之人亦父母之既去猶思而公口未嘗言功悉卷而懷之故一方之長者莫先焉公有四丈夫子皆身所為教長恩曰子仁次惠曰子迪又忠曰子藎季恕曰子行蔚然詩禮之澤子仁既登甲科馴服大僚子藎歌鹿鳴以起子迪子行皆績學橋門光彩照映故一方之文獻莫先焉壬寅之歲公壽八十十一月草有六日其初度也適子仁以四川參議遷山東憲副還乃率諸弟捧觴為壽公以子仁貴始封憲僉初階奉政宸奎煥然牙緋儼若安坐一堂之上斑斕滿前蘭玉就列望之者以為神仙而吾邑真蓬萊方丈之境也邑之親朋皆相約稱壽篚幣牽牲傾動城郭又一方之盛事抑亦百年之所未有也中書舍人趙君元伯請書其事以傳豫方南歸實倚公為重乃序之曰凡壽敬髙年也敬髙年敬其人也是故君臣父子之道系之人倫經綸禮樂之業本于人事盡倫以舉事此世風之攸關引而長之稱壽之所為重也夫善莫大於錫類錫類莫大于忠君忠君莫大于體國我朝帝業度越千古雖然所藉以為治安者人才焉爾矣若夫訓成作養之方則天下之賢父兄也惟公善端未易枚舉而諸子乃能發公之藏以需國家治安之用類孰大焉子仁奮迹州郡厯典大藩方當一面之寄忠誠體國柄任伊始子迪兄弟鼎起甲科同心共濟益振潘宗當為荀氏八龍又進而與元愷並傳豈特一方之盛美已也豫故論次其大者以復於元伯儻以為然請為公壽謹序江東藏書目録序余家學時喜收書然覼覼屑屑不能舉羣有也壯遊兩都多見載籍然限於力不能舉羣聚也間有殘本不售者往往亷取之故余之書多斷闕闕少者或手自補綴多者幸他日之偶完而未可知也正德戊辰夏六月寓安福里宿痾新起命童出曝既乃次第于寓樓數年之積與一時長老朋舊所遺厯厯在目顧而樂焉余四方人也又慮放失是故録而存之各繫所得儻后益焉將以類編入理學括要序理學括要凡六卷禮樂之具性命之說萃焉元故鼇溪書院山長樂安詹先生道存所著而其從曾孫東魯君所編次以刻之松郡者深郡人也使序之曰自昔聖賢其志廣其學博其守約志廣故欲以成天下之務學博故必以周天下之故守約故嘗不外乎此心之神明蓋非約不足以該博非博不足以濟務孔子曰吾道一以貫之又曰我欲託之空言不若見之行事也顧行之之序則由身始孟軻氏沒而世儒以功名就世者往往不知約之守而惟博之務其道則雜未能至於博而或施之應務其術則疏故君子之學鮮矣先生生當濓洛講明之後而又吳文定公之鄉也其學有宗㫖大抵本於人倫日用之常以推極乎隂陽造化之變讀是編也可謂有斯志而又有斯學者矣惜也未見之行爾而若有待於今東魯君也君名崇辛未名進士出推一郡者行始也儼山集卷五十一
