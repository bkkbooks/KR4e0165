body:
  text: 儼山集卷五十八明陸深撰史記二吳記吳太伯弟仲雍皆周太王之子而王季之兄也王季賢而有聖子昌太王欲立王季以及昌於是太伯仲雍乃避之荆蠻文身斷髮示不可用季立是為王季而昌為文王太伯之荆蠻自號句吳荆蠻義之從而歸之千餘家立為吳太伯太伯卒無子仲雍立是為吳仲雍仲雍卒子季簡立季簡卒子叔達立叔達卒子周章立是時周武王克殷求太伯仲雍之後得周章周章已君吳矣因而封之乃封周章弟虞仲於周之北故夏虛是為虞仲列為諸侯周章卒子熊遂立熊遂卒子柯相立柯相卒子彊鳩夷立彊鳩夷卒子餘橋疑吾立餘橋疑吾卒子柯盧立柯盧卒子周繇立周繇卒子屈羽立屈羽卒子夷吾立夷吾卒子禽處立禽處卒子轉立轉卒子頗高立頗高卒子句卑立是時晉獻公滅周北虞公以開晉伐虢也句卑卒子去齊立去齊卒子壽夢立壽夢立而吳益大始稱王自太伯作吳五世而武王克殷封其後為二其一虞在中國其一吳在夷蠻十二世而晉滅中國之虞中國之虞滅二世而夷蠻之吳興從太伯至壽夢凡十九世壽夢二年楚大夫申公巫臣奔晉自晉使吳教吳用兵乘車令其子為吳行人吳於是始通於中國乃伐楚十六年楚伐吳至衡山二十五年壽夢卒壽夢有子四人長曰諸樊次曰餘祭次曰餘昧次曰季札季札賢而壽夢欲立之季札讓乃立諸樊稱攝元年諸樊已除喪讓位季札季札謝曰願附子臧之義吳人乃舍之秋吳伐楚楚敗我師十三年諸樊卒有命授弟餘祭以次必致國於札札封於延陵號曰延陵季子餘祭三年齊相慶封有罪來奔豫之朱方之縣以為奉邑以女妻之富於在齊四年吳使季札聘於魯去魯遂使齊去齊使於鄭去鄭適衛去衛適晉十年楚㑹諸侯伐吳之朱方以誅齊慶封吳亦攻楚取三邑而去十一年楚伐吳至雩婁十二年楚復來伐次於乾溪楚師敗走十七年餘祭卒弟餘昧立四年餘昧卒欲授季札札讓逃去餘昧子僚立二年公子光伐楚敗而亡王舟復襲得舟而還五年楚臣伍子胥來奔公子光客之公子光者諸樊之子也嘗以為吾父兄弟四人當傳至季子季子即不受國光父先立即不傳季子光當立隂納賢士欲以襲僚吳使公子光伐楚敗楚師迎楚故太子建母於居巢以歸因北伐敗陳蔡之師九年公子光伐楚拔居巢鍾離初子胥之奔吳也說以伐楚之利公子光曰胥欲為父兄報仇耳於是子胥知光志乃求勇士專諸見之光喜子胥退耕於野以待十二年冬楚平王卒十三年春吳欲因喪伐之使公子蓋餘燭庸圍楚之六灊使季札於晉以觀諸侯之變楚絶吳後吳不得還於是公子光曰時不可失也告專諸曰不索何獲專諸曰僚可殺也母老子弱而兩公子將兵攻楚外困而內空也是無奈我何四月丙子光伏甲士於窟室而謁僚飲僚陳兵於道自宮至光之家門階户席皆僚之親也人夾持鈹公子光佯為足疾入于窟室使専諸置匕首於炙魚之中進食而弒僚公子光竟立是為吳王闔廬乃以專諸子為卿季子至命哭諸僚墓復位而待公子燭庸蓋餘二人遇圍於楚者聞僚弒而光立乃以其兵降楚楚封之於舒闔廬元年舉伍子胥為行人而與謀國事楚臣伯嚭奔吳吳以為大夫闔廬與子胥伯嚭將兵伐楚拔舒殺二公子光謀入郢將軍孫武曰未可四年伐楚取六與灊五年伐越敗之六年楚使子常囊瓦伐吳迎而擊之大敗楚軍於豫章取居巢而還九年西伐楚至於漢水與楚兵夾水而陳闔廬弟夫概欲戰闔廬弗許夫概曰王已屬臣兵兵事上利何待焉遂以其部五千人大敗楚兵闔廬縱兵追之比至郢五戰楚五敗楚昭王奔鄖與鄖公奔隨吳遂入郢子胥伯嚭因以報父讎十年春越聞闔廬之在郢國空乃伐吳吳使别將擊之秦兵救楚吳師敗夫概見秦越交敗吳而闔廬留楚不去夫槩亡歸吳自立為王闔廬引歸攻夫槩夫槩奔楚楚昭王復入郢而封夫槩於堂溪為堂溪氏十一年吳使太子夫差伐楚取番楚徙鄀十五年孔子相魯十九年夏吳伐越句踐為檇李之戰使死士三行造吳師呼自剄吳師觀之越因而伐之敗之姑蘇傷闔廬指軍却七里闔廬病傷而死太子夫差立志報越每朝出入使人呼其名曰夫差而忘句踐殺而父乎則對曰不敢三年乃報越夫差元年以大夫伯嚭為太宰習戰射常以報越為志二年夫差率精兵伐越敗之夫椒報姑蘇也越句踐乃以甲兵五千人棲于㑹稽使大夫種因太宰嚭而行成請委國為臣妾夫差將許之伍子胥諫曰句踐為人能辛苦後必悔之夫差不聽聽太宰嚭卒許越平與盟而去七年吳聞齊景公死而大臣爭寵新君弱乃興師北伐齊子胥諫曰不先越而務齊不亦謬乎吳不聽遂北伐敗齊師於艾陵至繒召魯哀公而徵百牢季康子使子貢以周禮說太宰嚭乃得止因留略地於齊魯之南九年為騶伐魯至與魯盟乃去十年伐齊歸十一年復伐齊向踐率其衆以朝吳厚獻遺之夫差喜惟子胥懼曰是棄吳也諫曰盤庚之誥有顛越勿遺吳不聽使子胥於齊子胥屬其子於齊鮑氏還報吳夫差大怒賜屬鏤之劍以死齊鮑氏弒悼公夫差聞之哭於軍門外三日乃從海上攻齊兵敗乃引歸十三年吳召魯衛之君㑹於槖臯十四年春北㑹諸侯於黃池欲霸中國以全周室六月戊子越伐吳乙酉越與吳戰丙戌虜吳太子友丁亥入吳吳人告敗於夫差夫差惡其聞也斬七人於幕下七月辛丑吳晉爭長夫差曰於周室我為長晉定公曰於姬姓我為伯卒長晉盟已與晉别欲伐宋太宰嚭曰可勝而不能居也乃引兵歸國士皆罷敝於是乃使厚幣以與越平十八年越益彊句踐伐敗吳師於笠澤二十年越復伐吳二十一年遂圍吳二十三年十一月丁卯越破吳欲遷夫差於甬東豫百家居之夫差曰孤老矣不能事君王也吾悔不用子胥之言自令陷此遂自殺吳亡越誅太宰嚭而歸論曰語有之蓬生麻中豫覽延陵季子之高誼喟然歎曰何其似太伯也太伯用以造周季札以而基禍豈所謂可與立未可與權者耶儼山集卷五十八
