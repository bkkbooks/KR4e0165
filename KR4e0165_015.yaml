body:
  text: 儼山集巻十五明陸深撰七言律詩四十五首謁諸葛廟武侯祠廟已千年過客何心盡可憐百里營留鳴鼔後兩函表上出師前江流不轉餘灘石峽鎖猶聞哭杜鵑自信英雄終有氣風雲常䕶舊山川送客過昭覺寺霜日江雲杳靄間聊慿酒力駐穨顔一冬天氣常嫌熱幾度郊行蹔借閒世上無情惟白髮人間有福是青山山僧更住青山裏翻罷楞嚴獨閉闗暇日謁潛溪宋先生祠華國文章報國身青山萬疊未歸人髙皇最愛才無敵學士應誇酒有神不向東方戀桑梓至今南斗避星辰揚雄杜甫俱鄰傍落日祠堂采澗蘋少宰學士温託齋赴召成都邵守作三詩送之予覽其辭甚麗和韻一首玉堂金馬退朝囘常憶班行一字開東閣共推蕭相入西川獨數子雲才瞻雲已識親幃近捧日頻勞御札催六月扶揺眞一息十年魂夢繞三台將過新都秋曉同衞􅓳川東行昭覺鍾聲隔幔聞筍輿十里度秋雲山家歲計占農事客子年光付吏文岐路軟紅隨馬去逺山晴翠過江分聨珠倚玉多佳致此日同行頼有君錦江浪花如織逺黏天濯錦溪邊勝可憐五色文章初日裏一川綺縠午風前東流到海通蓬島南浦逢春送酒舩若問乘槎霄漢事支機抱得已多年冬日同􅓳川過范浣溪曲徑疏籬路欲迷草堂歲晩浣花溪槐柯倒影醒殘夢竹汗留青滿舊題暇日偶從南郭隱好山多在小牕西高人未用逃名跡江上天空北斗低發新津風日甚佳有述江山偏覺此行多愛聽巴音入櫂歌錦樹微茫連岸脚畫船掀舞出盤渦山雲欲起常迎日水鳥驚飛不離波為客十年勞勝賞朝天萬里又經過與余方池草池兄弟遊三巖山下三巖逐二難春風初試杏花寒人情倦去方驚老江面東來漸覺寛一代交遊論出處百年身世雜悲歡浮雲本是山中事欲為蒼生起謝安留題凌雲凌雲殿閣倚江開三面江流抱石臺逺浪貼天成綺縠舊題多日長莓苔下臨風雨空三蜀高處星辰接上台一為賞心留勝槩還看秀色産竒才兌陽書樓面山花竹背山樓合着元龍最上頭雲氣隂晴常不定江聲囘合正東流九闗清夢通霄漢八月仙槎貫斗牛欲賦兊陽形勝裏山川元是漢嘉州二月五日發長壽隻隻樓船面面山磯頭石齒鬭彎環灘聲忽送蛟龍窟雲氣常封虎豹闗南去雜花渾爛熳西來晴雪正潺湲櫂歌風起旌旗動時有漁歌互徃還春雨遊岑公祠石門泉竇境尤竒紫暈蒼痕雨更宜信有神仙住人世何妨遊宦向天涯盤崖一綫通銀漢滴乳千年長玉芝流水高山俱望眼栁條花蕚繫春思卄六日雪後赴金太常南郊觀禮有述三級圍環八柱擎碧青浮動日華明萬年禮樂歸眞主一代彞章見大成天壓周廬元咫尺雪消馳道轉澄清微臣將事依龍衮試向瑶臺最上行仲冬晦過海印寺有述萬歲山隂海子橋十年重到笑勞勞舊時風景依稀在歲晩氷霜積漸高鐘鼓連天涵日月樓臺倒影蘸波濤千重王氣盤龍虎常有紅雲覆赭袍立春後一日午門宴罷有述金殿􅊮樓白玉臺芳春風日暖初囘千官簇擁雕盤細萬國趨陪綵仗開黄道正中當御座碧空遥映入仙盃兩階拜舞俱霑醉已有歡聲動蟄雷丁酉除夜十年除夕總天涯帝里今宵鬢已華歴盡苦心難報國撥殘新火倍思家鳯樓縹緲囘銀漢宫漏迢遥隔紫霞閒倚畫屏清不寐獨將春信問梅花歲暮旅館燈花異常有作雪封虚館燭開花乍吐紅英暈紫霞四壁圗書看照影一行兒女念還家金蓮恩重身難稱白玉堂高鬢有華應是明朝當獻納坐聽宫漏隔牕紗介谿宗伯榮賜麟袍和甬川少宰韻白玉䦨前紫獸鋪黄金臺下古燕都千年典禮開綸閣萬里風雲䕶帝圖藜影木天時戰蟻鐘聲長樂曉聽鳬由來此地文章海杯視三江與五湖送沈大華下第還舊業長楊滿篋閒春風燕市買驢還輕塵鳥背頻揮麈曙月雞聲欲度闗世味旋嘗隨路酒鄉心遥慰隔州山憐君無計能留住草草詩成空厚顔龜峯晩興度壑穿巖興未遒更從燈火數竒遊風高八月寒先到地僻千年事轉幽碧澗每逢春漲合丹崖疑共暮雲稠平臨北斗長安近身在天南重倚樓次韻白雁波澄照影度瀟湘囘雁峯高近帝鄉星陣望窮雲半沒雪翎風急字斜行蘆花深處驚遥火木葉催時䕶曉霜記得上林棲宿處每因􅊮矢識君王登太白樓夜郎一去幾千秋尚有任城太白樓身後功名空自好眼前汶泗只交流當年狂客心偏戀近代風人誰與儔拍碎䦨干呼不起月明風細憶神遊贈别鄭宜簡扁舟五月大江東鮑管千年見古風天北天南三十載聽風聽雨幾宵同閒來只愛青山好老去方知白髮公我已倦游君作别相思多在月明中和介谿賞蓮雨氣自天香冉冉風光臨水碧颸颸移來玉井仙人掌開傍金波太液池本為憐芳衙散早翻因解語酒行遲新歡舊賞年華裏倚徧䦨干有所思送張懋勉之赴新建縣丞雲間文獻舊名家藝苑馳聲幾歲華新捧除書辭赤陛滿斟别酒對黄花東湖古廟餘塵榻南浦疎簾捲落霞少府勝遊還勝地好將清譽徧天涯送崔都尉奉使顯陵雪中送客重徘徊白馬銀鞍畫角哀雲繞鼎湖龍臥起月明遼海鶴歸來金符玉節山陵使戚畹侯封將相才萬里皇圖元咫尺東風囘首鳯凰臺内丘大風塵沙曲風塵冉冉高行行偏念聖躬勞九天日月懸平野萬乘旌旗捲怒濤山勢逺隨馴象輦春光正滿衮龍袍侍臣亦有揚雄賦欲奏河東愧二毛送黄甥標東歸送汝黄金臺下路西風多少渭陽情愁看世態如雲變須遣鄉闗似月評海内勝遊吾欲倦江東好事若為成過家上塜俱如禮來趁鵬摶九萬程黄甥良式博文好學予雅愛之相從南北二十餘年患難之日多而安樂之日少予既不能無愧而亦不能無望焉兹行也悵戚殊甚賦此為别以期明年之會送魏僉都伯深鎭汴中丞玉節下承明風動中州數十程喬嶽一時瞻氣象長河萬里為澄清旌旗號令新開府藩省官僚古帝京若向周公舊臺下六符先候泰階平五月十三日下灣始入舟居淡雲微雨帶青山細栁新蒲水一灣人世百年眞夢裏聖恩今日是生還來看海鶴迎風舞坐愛江鷗盡日閒京國風塵能化白臨流偏詫鬢毛斑和答陶南川兵侍曉開畫鷁帶遥山夜泊溪漁細栁灣鴻雁逢時知北鄉蓴鱸有約待南還虚傳海外千年藥且向人間一日閒寄語隔船陶士雅故園新笋鹿胎斑後樂堂家宴守歲歌管聲喧餞歲除大江東下抱閒居夜筵椒酒元隨量春帖桃符手自書老去何妨髫鶴髮歸來猶及饌鱸魚十年萬里風和雨此夕團圞畫不如客從海上餽杜鵑花甚佳薄暮移燈照之有作穠緑深紅照夜明自從西蜀識佳名年芳不隔闗山道勝事新添洛社盟高閣捲簾看不足一春啼鳥恨難平䦨干六曲催花信芳草王孫空復情壬寅中秋夜同姜明叔王元宷翫月蓬瀛東望月華圓咫尺煙霄萬里天屏翳驅雲憐浩蕩銖衣和露鬬嬋娟良宵嘉會俱難得天上人間各有縁十二䦨干須遍倚莫論風雨是何年自潭山取道過𤣥墓盡日湖山不厭多畫船初泊綵輿過路從鳥道衝黄葉浪打漁磯濕緑簑閒處風光巖壑占望中天氣水雲和相逢莫問鴟夷事愛聴滄浪隔樹歌雨後對花和答沈叔明三逕歸來春水生送春初覺病魂輕名花舊種渾無恙擕酒頻過倍有情十尺䦨干圍紫豔一番風雨妬紅英殷勤寄語憐芳客尚保丹心向日傾中秋後二夜與姜蓉塘諸友登樓月到中秋分外清共登江閣俯空明參差漁火遥通海縹緲鸞笙欲近城滿目星辰分上下百年塵世半隂晴一樽且盡今宵醉鄉國賓朋倍有情東軒春興笙歌院落養花天六十年踰七十前坐隱尚餘經國手臥遊無藉買山錢江流東下饒鮭菜風信南來有雁箋雙鬢不嫌搔更短老人心事愛隨縁初夏移舟天馬山過嘉樹林聽僧道淨彈琴城隂水木夏初臨十里來過嘉樹林乘興不妨靈運屐賞心先到頴師琴望中海日依微見物外煙霞次第尋欲上前山最高處扁舟應向五湖深史涇西發西去青山入望多棟花風信水雲和田家秧馬黄梅雨谷口漁榔白苧歌星館宛如天上列畫船疑向鏡中過人生合住江南老何處滄浪與碧波喜雨次答鄭文峯正郎使君本意為澄清先遣仁聲作雨聲百里望餘青障合三農舞破緑蓑輕貪看䆉稏行來濕愛聽芭蕉坐到明無數鄉心與時事每吟佳句候秋成築堤海門東啓䕶長堤小築江沙舊屋西十里蘆花依岸轉一川月色向人低儘從鷗鳥忘機下或有龍孫挾雨啼便擬種為桃李巷春風無語自成蹊甲辰元宵後二夜觀市燈效白樂天好懐佳節是鄉園歌舞樓臺開上元萬里團圞春正月千家燈火水西村太平有象瞻天闕老大何心倚市門但願年年同此夕田蠶花竹長兒孫有草類藜而幹生其本多緑葉至末始敷為紅紫經霜更絢爛可愛一名雁來紅俗呼老少年山居小閣前倚䦨一株尤茂密高可文餘病起過宿相對甚適偶成一律老去誰能更少年此來相對亦欣然人間白日無䋲繫爐裏金丹有訣傳秋水蘆花三畆宅西風鶴唳五更天曉來霜重紅於染伴我梅花紙帳眠五言絶句三十首初夏五首野曠孤亭迥晝長花影遲蒹葭飛白鳥楊栁囀黄鸝二芍藥花初謝芭蕉葉已斜窻前一夜雨浮緑漲文紗三林日不到地溪風常滿船雨餘黄犢健天際白鷗眠四初日浮空動微風剗地涼苧衣人尚怯看竹過横塘五細草縁層砌幽禽語畫梁好風排户入吹散午時香和安鴻漸登樓曲四首登樓覽春暉春暉可憐晩所思在天涯欲徃道里逺二日夕倚樓望行人歸未歸斷魂與殘夢相逐雁南飛三雪後樓偏好青山破白看客衣無奈薄高處許多寒四樓頭紅粉糚樓下紫騮馬兩處總相思無言淚成把與周適齋潮州過張龍山樊栁圃納涼明月谷陽水長橋卧綵虹緑楊風不動人在鏡光中我有江南屋我有江南屋春深草映門湘簾低不捲寶鼎夜常温西巖為劉都閫我愛西巖好桑乾繞帝城黄金臺下駿細栁月中營西湖夜氣消殘暑天光浸曉星草青藏白鳥波緑泛紅菱成晉驛庭槐繁隂戯為一絶雨意將雲白山光隱樹青總看行蟻夢何日報鷄醒暮至清源積雪千峯白層氷十尺强吳兒渾不解只道為炎涼疑冢疑冢七十二冢冢渾相似春風草又青斜日牛羊裏辛丑歸途中絶句八首高鳥依依没長河淼淼流風塵隨短鬢去住任扁舟二弱栁風前轉新涼水際浮蓴鱸如有待歸日正逢秋三村村喜麥黄南風散初暑古岸緑隂中行人自來去四日落山煙紫林深暝色寒殷勤問前路今夜宿新安五曉行不知程夢醒聞細浪曙月逐雞聲櫂歌來枕上六水色拖蒼玉槐隂墮緑雲會心詩半屬得意酒微醺七目力耽書短歸心引路長深林喧鳥雀斜日下牛羊八海月和潮上風帆接畫船故鄉連夕夢景物正依然碧雲寺鳥道千盤迥羊腸一徑斜年年二三月紅杏碧桃花過叢臺青山不改色緑樹有新姿昔人歌舞地今見草離離白槿尋常紅與紫不及淡梳粧木槿籬邊過氷肌照拒霜題小景二首箬葉舟能大桃花水正新了知魚有樂袖手捲絲綸二自愛看秋水鷗閒我更閒蓼花洲渚裏隨意弄潺湲偶成蓬萊波浪淺汀洲杜若新暖雲不作雨閒殺釣鼇人六言絶句一首過淮隂故堞初驚雨歇古祠高枕江流一抹霏微輕靄片帆歸去清秋儼山集巻十五
