body:
  text: 儼山續集巻十明陸深撰記四首小沼記劉子竒進窽地為沼於庭庭方廣不踰尋丈沼居其半側足行庭中衣前後裾常欲渉沼波是故曰小沼京師地髙燥水泉雖曠野皆難得况城市乎必欲置諸家庭間雖小亦難也初劉子作沼課㒒汲井輸水日不足既而時雨適至沼遂溢因甃以磚而水始渟涵僅乃一泓蒔藕其中浮以蘋藻於是沼成陸子淵過而翫之俯見眉髪歴歴可數蘋若壓淤而藻若緯波者徜徉終日不忍去劉子遂命觴於沼上子淵賞其竒顧而問曰夫見不足者羡有餘孟子曰觀於海者難為水見至足也子楚人也而家於洞庭夫洞庭天下之觀也浩渺瀰漫千里一望者嬰而習之見而狎之矣又奚羡此一勺為哉劉子仰而笑俯而歎曰夫亦各適其適耳吾固不知洞庭之為大而兹沼之為小也鳥適於木非必皆鄧林獸適於陸非必皆鉅野是故水一也余誠生長洞庭之上見敗舟没人而洞庭之害者衆矣而吾兹沼幸不至是且一物同適而安危異焉吾未能相易也子淵聞之曰近於理作小沼記正德二年三月六日塊庵記呉江東陸生以塊名庵夫茍物雖微且惡或中於人之所好木之朽析薪好之塵垢醫師好之糞壤老農老圃好之况其尊者乎獨塊何好眎之塊然而已人無知愚賢不肖授之塊皆弗欲生自少日放言髙論希大慕遠已不見好于其鄉既學文辭脫棄時尚求世之所不好者為之反而行古人之道正其本責其末斥其浮崇於實人皆望望焉其去之也不有類于塊故得以塊自居雖然塊也者積而至于尋丈放于頃畆之外皆塊之為也滋稼穡養百物出其力以利于世及其至也諸侯藉是以為社稷天子因之曰有天下塊之德生恐其弗勝也敢記于壁癸亥之歲日長至自為文云遺橘軒記金橘橘類也其大如彈小者如豆其味酸其木扶疎其實純黄可以實賔豆或以之漬宻香美可乆江南園圃多有之或以為庭實秋冬時纍纍隱映可觀而蘓之洞庭擅厚利焉一名金柑昔人所咏分金者是殆其一種與𢎞治末江南連嵗大寒河氷盈尺凡物之附熱者輙死柑橘無遺雖洞庭百年之植皆盡往往呉人之所厭飫者顧取給與他方余家西堂庭中一樹先大父手植也可五六十載輪囷盤屈有竒觀焉正徳戊辰余以憂還家林木變衰花竹蕪萎而是橘也獨以其蔽於屋一角尚在方其盛時園圃聮榮美實克牣奚獨顧此一旦經變之餘人方幸其無恙而加愛焉豈知向日之所蓬藋而蒿艾之者亦是物也哉夫事有時貴物有託存此類非耶遂作小軒臨之除去穢壤疏剔條幹其僵凍未凋之色與余哀毁僅存之形又相當也因題其楣曰遺橘且用比之於桑梓云巳己二月朔日記鶴沙家慶圖記雲間山水自西來結滄海東匯其最勝地曰鶴沙晉華亭侯别業也因得名最古其地最著姓曰談蓋自司空公而後益繁焉談氏之子弟其最佳者余皆獲與之交焉曰舜年者與同筆硯攻進士業最相友善舜年之兄曰舜耕與同埸屋角藝俱敗去因而相知於是以文義下上者十年於兹矣最乆雖然余未獲升談氏之堂而於其昆季羣從猶未數數然也竊意必有仁厚壽考之人與文章博雅之士相稱以當兹地之勝正德丁巳余自史局東歸談茂才曰寳之者謁余東江手持一圖曰家慶者再拜言曰寳之家翁杞石先生與家夫人金今年並登五十六月八日誕辰也兩從父東石西石先生繪此圖為壽先生從父之知已也而家翁之頥交焉者也敢以文請挹其容煦然而敬恭也聽其言粹然而辯也課其進退䕫䕫若有承而出之也余甚異之廼進自賔階與之坐而諾焉柘石先生者名某字舜錫舜年之最長兄也以行誼聞昔人稱王謝子弟靡不佳者其故家流風致然今夫以舜耕舜年者為之弟而有寳之者為之子又故家焉其人何如也余所謂仁厚壽考者其斯人與余聞談氏愛石輦洞庭之祕發靈璧之藏環居而山焉巉巖峭巁類海上三山之為而竒峯幽洞足以供瞻眺入詠歌雲霞縹緲之中時有驂鸞駕鸐者彷彿來焉於是舜錫稱杞石舜耕稱東石舜年稱西石夫山氣之融結者也其德静若君子之亷介而有恒者也故孔子曰仁者樂山繼之曰仁者壽以類從也夫居山樂山聖人尚因其情以占其效之必至而况嗜石之篤如杞石之為其效又何如也又况厚之以耆舊之風衍之以詩書之澤者然則今之五十慶之所由始也他日將膺國慶天子且致慶願少徯焉豈特家云乎哉雖然舜耕舜年之繪圖者弟也寳之之乞言者孝也皆不可以不記䟦三首䟦世壽堂巻夫金玊之純固也山嶽之静常也松栢之貞茂也物且然耳若周氏之世壽固有本哉深竊論周義翁之壽足以繫興亡之故為不徒矣三代而下惟宋失天下最長久惟元興最為艱難宋自一汴二杭三閩四廣卒於崖山一舟而元自朔漠滅國五十以及夏及金及宋盖國家之廢興事變多端日月逾邁而翁以大年生於宋長於元鄉飲於明何其竒也六世孫震以名進士筮仕鄱陽令嚮往未艾是能以其道夀人而益以昌翁之世者又不徒為壽而已矣震其懋之哉深乃於鄱陽觀是巻而書之翁生於宋景定之五年鄉飲禮行於皇明洪武之五年卒於鄉飲後之六年震生於成化之五年舉進士於正德之六年深書于七年寔震令鄱陽之明年也䟦鄭文峯所藏劉松年赤壁圖右赤壁圖宋劉松年所畫按赤壁之勝具於蘓子二賦一時景物復具於此圖當是一幅今釐而為二為鄭司徒文峯先生所藏予家有鮮于伯機行書後賦因舉而歸之文峯遂裝成一巻相與賞歎以為物必有合固龍劒也予謂合不合無足論惟物之得其所托似非偶然者文峯髙雅所至有江山之助以為廊廟之儲竹頭木屑猶在所錄況圖書也哉雖然黄州赤壁托東坡以傳樊口赤壁亦傳自曹瞞之攻戰後世忠憤之士多倖周瑜之有功至雪堂留滯皆以為舒亶李定軰承附時宰故江漢間兩赤壁各繫漢宋之事覽斯圖也千載之真是非定矣此巻胡可少哉文峯其寳之䟦定武蘭亭巻昭陵永閟千年蹟定武猶存幾様碑今人間定武又閟不可見矣世逺則同歸朽滅何物不爾金石為傳世之器果足盡情耶近時禊帖稱汴中者絶佳予金陵購得此巻紙墨又佳蓋數十年前物也又安知後之人不興歎於此耶書二十四首與董中岡二首恭諗榮還即欲趨侍以悉夙懐顧多病多事然此心南嚮已乆令姪至知已弄璋是足以當二品官千鍾祿矣他尚何足介帶時下春和倘能一日深當作侣以搜奇選勝於茂林修竹之間浮世得喪不過夢幻想髙雅之懐自有妙悟非深所能助也如何如何深登堂展謁無日不勤比縁舊痾殘暑遂負中秋之約方懐慚悚忽奉手書情誼藹然措躬愓若少伺扁舟南浦敬下陳榻也再承全篇累幅明珠良玊令人把玩不釋手勉為效顰蹇澁難繼容更請教所示紫岡之卜敬如尊命無不可者兹草草具目以上俟議定以原契去也但孤姪在縗絰之中圖㐮大事意望今嵗之租尚煩執事者指揮爾如何如何委曲事宜悉告來使幸扣之倘有示不吝别紙病暑憒憒裁荅不謹與郁直齋七首唐橋舟次奉違教範忽復經歲瞻仰惟勤想公愛我當不異此懐恭審道候清嘉為慰往時梁上蹤跡得伏法否近聞崇明之警天下事養亂釀禍率皆有漸故園薪木何甞一日不在念也濳消鎮定屬望要途亦恃有卧龍長嘯如何如何深處此隨分供職頻作谿山之行遇㑹意處亦復忘勌第苦目疾殊不快暢何當數追左右以助麈尾耶舍姪相自武當登廬阜東還扣之或有竒事也遥計壽筵宏開必隨賀賔上巨觥致頌餘惟台亮相姪還曾具啟達伏諗台慈萬福為慰今嵗夏熱殊酷適以事過江州南康乃在廬山之麓番湖之陽避却秋來兼攝湖東兹將上懐玊盤桓上清宫以尋神仙之窟宅樓船已次龍津便中特以奉報世間齷齪齷齪事已付之度外王法公道吾静以俟之儻不遇亦已矣自古至今士之不遇者何限也往嵗甞告執事欲求故鄉一塊安樂土恐亦未便可得也奈何奈何餘非面莫盡近見鄉録四五處文氣皆和平世道豈將復耶跂予望之餘不盡昨承惠古紙感感詩帖改字尤雋永荷荷作詩一事古人論之詳矣要先認門庭乃運機軸須發之性情寫乎胷次然後體裁格律辯焉方今詩人軰出極一代之盛大抵古宗選律宗杜可謂門庭正機軸工矣惜乎過於摹擬頗傷骨氣昔宋時有優人誚舘閣者衣破碎之服揚言於衆曰我李義山也為三舘諸公牽撦至此今日文選杜詩亦可謂牽撦盡矣惟直翁可免此聊為道之幸見教一二至望至望小兒近日又作得經義五篇皆朋儕中擬題奉為令孫與黄生一日同作為教兼煩老手細批各篇後乃見推愛若徒以好語復之非所望也至禱至禱甞聞前軰言今世無文章但有減字換字法耳不意衰老及見之吾夫子稱堯舜之德業以為煥乎其有文章文章一也無古今之異有此等文章則有此等事功大可憂也豈可亦尋行數墨間為小事哉恨吾菲薄且病惟有感歎與退避而已若主盟斯文一變至道不得不有望於當世之大人君子吾直翁豈可多讓哉偶得𤨏綴録在几奉去雖未敢據以為凖則有多少朴質前軰尚可想也幸教示深此行匆匆寔多懐畏辱拳拳教愛臨發遠餞尤深銘刻叨庇嵗暮履任随分供職所幸寮宷多故舊兼有湖山之勝但覺興味迥别老態殘生固應爾耶柰何柰何近小兒南來念欲從二三名士游以廣見聞此又䑛犢之常顧辱憐愛惠之好言此意尤難忘也謝謝所要明經士想為令孫輩師模須校選奉報亮之亮之時下春明伏惟尊候多福吟嘯為樂浦上園亭花竹當漸佳恐耆舊赴召未得具饗也不盡昨承枉顧欵語領教益多故舊凋謝景入桑榆雖日日得此猶為不足又何暇知身外事耶敝廬頼庇落成後即讀書教子自可為局中末著矣此意執事或能亮之適得京中七月廿四日書報晋溪公此時尚未有凶兆荆山真孟浪也白川南轉恐亦未為的實知之兩生文巻納去此如上路人取道不謬矣但要脚頭不住京洛可到也無事他求隂雨愁人聊此不具聞公種樹且將架石令人欣然便有山林之趨深適東渡故園竹木森秀果實叢生摘取數顆奉消南行詩渇此事即爭三五年有實受用矣連日齋居清晏海叟集亮入品藻如之何此老詩有氣骨往時年少喜方人甞以為髙過呉中四傑人多不服惟王文恪公以為然追念長安詩杜中品評編校將三十載而獻吉仲黙俱已下世為之慨歎此老别有全集俟著眼後更須裁訂商量也與戴子孝一首别去懐仰殊苦不識何日是君故鄉團圞之㑹途中亦復無恙否深叨逺庇客居粗安但覺與世齟齬耳思與君孤舟漫遊髙樓劇話處恍然一夢而都事不如意然後服君之練達而始悟㒒之迂狂也無柰賦性頑鈍雖蹶而不悔近得秘法朝參之餘杜門焚香一味參禪習静雖書冊盡皆掃去乃大有益瞻望千里何縁得與君極論耶所留巻尚未寫得縁釋褐後即有入舘事繼之國哀勿勿容徐圖之故鄉知契見間即望致意便風附問指不多及與唐竹溪一首昨者問俗亭餞送髙情雅愛無任感刻别來途次賤累軰叨庇俱安將抵灣下忽䝉㤙命孤逺之蹤辱聖主特達之知出自望外顧菲劣無以報稱為懼入朝躬謝皆幸成禮五月望後已到任屢䝉宣賜品物絡繹在道近拜侍經筵之命寵光恩禮遂與卿輔畧等榮感之餘惟增慙懼忽忽月餘未間報謝乃辱逺使多儀豈勝慰浣與顧東川表弟二首自灣中分首南路備經憂恐出閘河始就順境舟次幸不熱士大夫頗多慰藉甚適至六月六日始抵家暑濕煩毒又耳聞目見者豈魑魅之區耶鄙之不忍笑之不可欲泣而道之不能雖一日不得安處又吾弟日望不還正如芒刺了却楫兒婚禮又候過半月遂南来不知吾弟是何日到家為何事留滯乃爾自杭州尚望追及也七叔以八十之年率諸子弟軰為湖山之遊却又是一段竒事七月廿三日遂汎錢塘一路溪山如畫風水兩便兒軰遊嬉藹藹頓忘旅懐八月初渡嶺皆安好入武夷過却生朝極登臨躋攀之樂形容不能盡有一二門生追伴四五日窮九曲尤竒勝此處却寛廣有田成段落源頭活水分渠而浸時正見秋黄之際至此雖描畫亦不能盡矣鱗魚白飯輕徭薄賦極可治生人世仙界無以過此廿一日上任廨舍皆寛敞後有髙丘園亭流泉繞階除入厨中時時拄杖登髙谿山皆入几席府治中風俗甚佳豈羅仲素李愿中之遺化未泯士夫只有三四家皆朴實勤儉如古人卜居無以過此吾弟能飄然一來可商量也人還附此不盡深再拜九月十九日往謁羅豫章先生祠堂山行去來計五十餘里還見張禎者得手書始知北歸慰喜無量此處一一皆有北信不過四十日世熊反覆若此深之南來殆有天幸耶簿書簡稀溪山佳勝且風俗淳朴真可以忘老矣揖兒學業日有進益比之京師大不同早晩與之論道理講學問殊不落莫古稱忠義之人是處便有山川鬼神呵䕶此理不可誣但所謂天之君子人之小人且須受之不必校不必校今年故鄉歳事如何吾弟得暇扁舟南來儘有竒趣也跂望跂望鄭侍御被劾可念近日有信要作乃翁墓碑别有數處請文乃苦事苦事餘乘便再啓與董子元二首山亭舊遊殊動世契之感故不能乆留廻舟遂抱病甚苦不意發竒石相贈益令人悵然慚愧與頌謝交勝也柰何柰何衰老之人復䝉璽書臨門誼當趨命松城得握手尤望尤望臨川集脱落當覔一全本奉觀官箋三寫去舊稿承命也昨承顧兼小兒承教無任感慰所留紙冩去途中寄白巖先生二詩以吾子元有通家世契爾能和至尤望尤望聞收蓄本朝先達紀載甚多乞一一目出寫至與寒家所有者比勘之如何如何張月鹿云祝枝山所著蘓材小纂在文府亦望發來一目山居卧病殊苦春寒有文話商量不識扁舟肯北下否拂榻以俟奉宗溥從兄七首西門别後在途備甞辛苦幸不落入賊手道路之難未有甚於此時者言之可懼六月初冒暑入城供職七月間乞恩得給賜勑命二軸但念先母平生受盡勤勞竟不能少俟為恨涕淚如何弟宦况如故京師風土頗相宜無恙報此足矣秋成不知如何山東北直𨽻盗賊猖獗此有大氣運無可柰何郁希正還便時在閣下看教職巻聊此古人云烽火連三月家書抵萬金不知此書何日到也餘萬萬不能盡自十月五日八郎死後苦痛萬狀此兒聰慧過人今既殀死後事可知矣往時雖屢遭此但今氣血已衰尤覺難忍幸九郎得好室人漸健客中聊爾遣日天道遠未可測觀之國事家事人事意欲求退此計已決少俟機㑹下手耳主上務明察而英武獨斷為臣子者精白承休之不暇甚為可愧可懼也王世明房宅欲交易若果成為歸老之䇿亦是鳩居鵲巢省後來費力且恐浦東不是安居也幸斟酌兩月來心事憒憒百念灰冷聞宗潤兄病已全愈但澄之兄尚未脫體不知近來如何吾一輩兄弟數年來衰謝若此豈是不肖叨冐寵榮為天所厭或是不能積善隱惡所致也可懼可懼大伯七叔處皆不敢報書俱煩吾兄奉慰一一張約齋先生處望申悃愁膓病骨不能盡述去嵗一冬不得家中消息極為想望深居京庇及如常近日聖駕東還例霑金織賜衣紅青二品寒暖三時但虎彪花綵似借武階得為便服皆出制命也榮懼兼之約齋先生或能備道時事當就問其詳嵗暮有書止家屬之行所慮道路饑荒風波不測若夏麥有收可作行計伏望自老父而下慰安之向承示及前程一事曽與約齋先生細議髙下前却之間吾兄惟意所安者深當量力處之更望裁示老父今歳八十有一恨不能遂戯綵之歡兩小兒或能作嬰兒真態也興言及此不勝神魂飛越惟吾兄體之念之比承手教不任感激賤累輩極荷周旋北來途次亦安穏於客居甚為團圞但南望老親不覺涕泗之交下也此情柰何顧門戸事大聊復隱忍於此以有所待南來守官粗遣近方謝印上下之情不至枘鑿而抗顔任怨勢須乆而後定也大比在邇吾兄沉鬰已乆理宜大發秋風消息已為洗耳嵗暮擬對床於長安矣小考聞已過尚未有的信今嵗方在例頭恐取人之路太窄入簾免至冬烘亦一便也新年來不得家信又聞家小北來心甚擬望二月壽筵不得預如負芒刺此時正在禮闈校閱將定辱二主考先生許壽以文而同事諸公俱作壽歌都練俞國昌題曰禮闈遥祝將成大軸寄歸弟因居家間乆兹來供事誓竭公誠但過勞病作僅能畢事今嵗塲中主於崇雅黜浮貴理學變文體而一時負名之士或不在選所得皆實才也舒芬王正宗二巻皆本房竒作舒以經學勝王以後塲勝後舒遂大魁天下頗愜輿論今特寄二子巻併塲中批語試細觀之或出與鄉中諸後進一看可以思齊他尚有佳作因人事不能盡録陸續可寄也靳公竟以物議去國真可惜矣比日家人至得書兼知吾兄所以拳拳為弟之情百凡加意何敢忘何敢忘弟自入冬以來病勢漸去十月初間議有南司業之行便欲欣然承之復有留行者近又有司禮監教書之命生徒幾三百人皆權貴難制馭而批授問難極為勞攘五日一往徒歩十里似非病後所可堪也柰獨客萬里懐老念㓜無時少忘屢欲為退休計顧家門事大未敢輕為自便如何如何京中時事人心安堵天命祖德宜若無事但聖駕一還則無復他慮矣朝士間有送家屬還兼引疾去者亦各行其所見耳弟之家屬勢須一來舟可用自雇府縣中決不可干兹雖有書特致問訊此事不欲與之言也臨行事宜更望斟酌或決之龜卜耳十二月初還遣一信來為行止承示宗澤兄葬事如此亦可其間委曲吾兄自為善處古人所云忍之一字或可行之大抵此人倫之變也吾兄出處事弟亦謀之俟有便委曲當别陳京中事體委曲約齋先生必能道之約齋行後兩日而司業之命方下目今移居到任俱已定疊叨祖宗厚廕與夙承訓誨厠大臣之末霑侍從之榮所得不為不多矣自度任益重而官益冷夫任重則人之責我者益備官冷則我之副人者甚微能不重為戒懼此言惟吾兄知之審之思老念幼之心無日不切秪恐南都卒難得耳柰何柰何春初家屬權且北來乘機旋處之不敢不安於命也與徐伯臣二首卧病索居思一見故人而不可得如長谷尤難為懐不知新凉可期否向許寄邵復孺先生詞稿近亦收得一二種手筆即當奉覽前輩盛美付之落莫庸非後死者之責耶臂病將廢衰殘可憐適示銅物當為漢器是天禄辟邪之類制作甚佳惜斷其尾爾餘候面悉逺諗道候清吉仁政展布念昔遊佳勝恍然身在海山奥區顧老矣為之悵望不能已已昨自望日扁舟出行田舍迤邐至青龍江上舊置竹林池塘結數椽于上九峯當前歴歴在目其右枕白鶴江吳淞抱之而東因榜其門曰歸從紫閣黄扉裏住向青龍白鶴間頗憶長谷不得相與指㸃之然鵬摶鷃笑固物理不齊爾臨啟作報忽漫及此一笑一笑儼山續集巻十
