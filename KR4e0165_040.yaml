body:
  text: 儼山集巻四十明陸深撰序四北潭稾序禮部尚書贈少保謚文毅傅公北潭先生遺文一帙嗣子今禮部主事棨入梓以傳主事君謂深宜序深乙丑禮闈公所舉士也愧無能報公之知乆而未有以復雖然公之文何賴於深此主事君之志也奚敢辭惟我皇朝一代之文自太師楊文貞公士竒寔始成家一洗前人風沙浮靡之習而以明潤簡潔為體以通達政務為尚以紀事輔經為賢時若王文端公行儉梁洗馬用行輩式相羽翼至劉文安公主静崛興又濟之以該洽然莫盛於成化𢎞治之間盖自英宗復辟勵精治功一代之典章紀綱粲然修舉一二儒碩若李文達公原徳岳文肅公季方復以經綸輔之故天下大治四裔向化年榖屢登一時士大夫得以優游畢力於藝文之場若李文正公賔之吳文定公原博王文恪公濟之並在翰林把握文柄淳龎敦厚之氣盡還而纎麗竒怪之作無有也公舉成化丁未進士𢎞治間列職坊院寔由三公之門而一時同館以氣節相激昻者羅文肅公景明其人也是其師友淵源之地已為夐異而涵養之深造詣之密公所自得者尤多故其文章皆温雅典則如鉶金璞玉不見追琢刻畫之工而光彩可掬斯稾所存豈惟家傳爾已又嘗聞公言文章政事本出於一文章之可施行者即謂之政事政事之有條理者即謂之文章盖公之志必欲舉一世於禮樂仁義之中而不屑屑於語言文字之末視韓退之歐陽永叔輩弗論也正徳初公佐吏部再遷大宗伯當朝正色有壁立萬仞之風每臨事謇諤如正法王之號奪番僧之田阻監鎗之謀論兵老之弊皆有大功於宗社而身始不安於朝廷矣既歸北潭登臨咏歌超然形跡之外而天下之望日歸焉盖公之隠見進退所謂華國而經世者煥然可述文章之大孰過於是深故論次之以為序送倫編修彦式歸娶序倫君彦式以禮闈第一人天子親䇿之以進士第二人賜及第既又出館閣近臣為之師俾積學中秘期大用焉時彦式甫冠年未受室以故事請歸行親迎禮上若曰禮成亟來彦式入廷謝廷辭既卜行冬官何先生汝璧彦式師也請為彦式贈于深方是時天下之慕彦式者衆矣學者師其文士大夫重其世宰輔愛其才同列薫其徳閭里榮其光也惟昔先諭徳公以狀元及第雅負重望為史官之長時予入院踵其後辱知愛焉丁丑禮闈與有職事嘗旁從讀首選者紅巻擊節鼔掌謂天下才也私為朝廷得人賀及拆曉主者宣名以訓也因憶癸酉秋北上與冬官先生聨舟日獲晤語間稱其鄉士之佳曰倫以諒以訓兄弟也則又諭徳公子余故耳熟焉已而廣東之鄉書至書首者以諒也予既重冬官之精鑒及是按籍勘磨又知為彦式則余之欣喜慕豔出於常情而欲為之助者亦衆矣雖然余何以加於彦式哉惟我朝設科目以羅網海宇之士名公碩輔雖相繼起而一家之中父子兄弟並以魁元策名當世如南海之倫氏前乎未之有也今天下稱之曰三倫昔宋蘇明允先生與其二子子瞻子由自西蜀來一旦名動京師子瞻子由俱出歐陽文忠公之門天下稱之曰三蘓程太中先生與其二子伯淳正叔自洛宦遊於湖湘識濓溪周先生於邂逅俾二子受學焉遂成大儒天下稱之曰三程夫三蘇氏三程氏之興當有宋極盛之世是故論者以為匪止繫一家而已我祖宗列聖格天之功敷文之化百六十年於兹盛極矣而三倫際興豈非國祚之光與天下之光哉後世將以配三蘇氏三程氏僉謂曰宜雖然明允晩起布衣已非諭徳公之比至蘇氏之學君子亦有遺憾焉記曰擬人必於其倫其三程氏乎程氏之學得聖人之全而上繼孟氏以承孔子周公文武禹湯堯舜之統其功萬世永賴今嶺南先輩身居輔相以推極程氏之功用退而講明程氏之學以淑後進者各有偉人自程氏後其道於今日謂之大行可矣而况彦式承家學當嘉運負髙資尚其益進於此學哉汝璧曰吾志也遂書為序壽王母趙太夫人七十序浙水之東姚江之上有壽母曰趙太夫人先南京吏部尚書龍山先生王公之配新建伯兵部尚書守仁之繼母今鄉進士守文之母也行太常寺卿兼翰林學士陸深於龍山公為鄉試座主亦嘗從陽明遊而守文則督學時所校士視太夫人猶母也太夫人進封一品今年壽七十守文自京闈取捷名在魁選春試畢歸及六月十六日初度之辰謀捧觴而問夀於深深憶往嵗癸已之春持憲東巡拜太夫人於紹興之里第時太夫人出坐中堂冠服雅靘肅然語家門三數事徐牽守文而囑之曰是兒或可教以毋忘先尚書之徳則又愀然曰守仁遺孤幼老眼在望門戸事儻可經理以無忘新建伯之功深唯唯乃退自後寢步履康和神情安裕有深思長慮之風有凝和兆祥之氣深再拜堂下跂而俟其逾閾出而歎曰此天下之賢母也亦天下之壽母也是時蔡提學僉憲宗兗汪提學應軫鄭大行寅時尚為貢士與徐貢士建俱以宗親侍郡守縣令軍衛黌校之士皆從旁觀如堵一時感動摵摵有聲非太夫人之賢而能若是乎初尚書公例當䕃子時守文有庶兄守儉太夫人亟推與之曰恩當自長受坐是守文居鄉校者數年不與薦名晚乃從太學得列天子畿内之英為翰林先生之髙第弟子使天下拭目而覩之曰是狀元冢宰之子而㑹魁勲臣之弟不又將繼踵而起矣乎一時京師亦復感動有聲非太夫人之賢而能若是乎閫徳懿範見於呂宗伯鄒太史姚學士之所敘述皆可咏歌又有他人之所不及知者尚衆然即此二事亦可以為太夫人壽矣今守文歸即深之辭以為祝太夫人聞之其有不樂乎樂則壽不可量矣深又聞之賢於一鄉者必享一鄉之福賢於一方者必享一方之福賢於天下者必享天下之福今天下之廣不知如太夫人者有幾人乎有之足以享天下之福矣夫享福莫大乎得壽使太夫人得壽盖天下是享以天下而守文之心可慰也守文行矣書以為夏翁並壽詩序郡教徐先生言於東海陸深曰丙家苕溪之上故有形勝壯遊四方乃即大江之陽而愛焉水自嶓冢山自嵩髙者適㑹於六合沃土朴俗尤所賞戀耆士夏翁長者也又聨之為婚婣故遂家於六合夏翁與其配某孺人並年七十今辛卯之嵗十月某日為初度願先生一言以長六合之風且以表丙卜居之志予敬諾焉予昨調官晉陽尋即奉詔南還半嵗之間兩經六合南面長江如白龍委蛇隔岸青山交㦸若畫枕以園田帶以岡阜橋梁衢路公府民廬咸秩秩整比而又挾之以濟通利用厚生故其人熈熈無巧鑿狡獪之習意必有鉅夫偉公出其間以當山川之秀亦或有髙人韻士隠約混同以薫陶斯人不然則壽考淳愿之人可訪也恨乏知舊為之物色是時徐先生方丞太學守官京師遂無從聞問蓐食去來意未嘗不眷眷兹土也徐先生所厚夏翁者豈其人耶徐先生曰翁號虚菴朴茂敦素居家孝友與人忠信尤好施予嘗修家譜以聨屬族人嘗捐金市地以開廣學宫嘗出百金以修葺縣治嘗供粥藥以拯濟饑病又嘗埋胔掩骼凡若干千縣大夫髙其行舉為鄉飲賔者廿餘年今精力清明鬚眉森秀夫婦之間嫓美儷徳予擊節曰翁固其人哉予覽古記桃源武陵以為神仙所宅豐沛之間有朱陳村嫁娶不出其地傳數百年以為世外異境若將趨焉自今觀之武陵不過谿山明麗當時人避虐政相率以往乆之長育子孫非必真有沖舉羽翰之事而朱陳婚姻止於二姓必皆朴野未知禮義文物之澤有如翁者生長太平之世名山大川不出人間足以適體而樂志夫婦父子之倫藹然天和碩士燁然文明道誼之交際方且葆和含真駸駸上壽使真有神仙殆將過之矣庸非聖世之一瑞哉予與翁同鄉愧未識翁而徴於徐先生者已若是固不必登堂三祝而後為之壽也世當有善頌者播為聲詩以傳之永永彼桃源朱陳圖畫又安足道也遂序其事以張六合送姚君謙夫赴象山丞序今所謂親民之官者惟守與令而令為尤親令而下有丞而丞為尤親大抵官資漸卑則其去民漸近去民漸近則其與民漸親勢也與民漸親則其澤民漸易亦勢也丞胡可少哉今之守非積數遷不至而令與丞多出於筮仕今之令十七起甲科故常彊鋭俊傑今之丞十八起冑子率衰晚遲頓之人爾是故今之令往往樹特達奇偉之政而丞有能配之者求其十一且不可得何也將自畫於衰晚遲頓苟以具位而已故上之人以是待之下之人亦以是忽之雖有可致之勢而特達竒偉之政每在此而不在彼與信然兹豈國家官人之意與君子自待之方乎吾邑姚君謙夫少頴敏以舊家子選入邑校尋以資補胄子今上天官得丞象山縣其年方壯志方勵視其外扣其中豈所謂畫於衰晚遲頓者哉按象山古越地僻在海曲其民儉朴尚氣節號稱易治其令即余之同年馬君懋聞所謂彊鋭俊傑者耶其守諸侯𢎞望則鄉前輩也謙夫將有所遇矣而特達竒偉之政起矣於其行也序以送之送沈子龍别駕之任汝寧序國家進士之途闊矣惟科目為正途士大夫仕進之途亦闊矣惟州郡為政本若夫出自正途而道行於州郡以基政而崇化此當今之所以為榮貴而士大夫所履之亨衢也由是以登藩臬躋公卿進而為名臣賢輔又進而與古之名臣賢輔同傳焉皆可也惟有慕外之心者藉此以為膏潤之地而失其職惟有非分之望者視此以為卑𤨏之累而不安於其職是二者皆非也可菴沈君字子龍去嵗以通判原職謁選於吏部今年夏始得補汝寧旅食京華寂焉自守無一毫非分之望兹豈肯視汝寧為膏潤之地耶子龍與予同縣稱舊家世業醫儒其祖若父皆與余通家故子龍亦視予為不薄嘗與子龍論吾鄉風俗之概衣食饒洽人尚藝文居民得以耕織自足而僻處海隅無通都竒麗之習盖淳如也近年文風尤盛家詩書而戸筆墨秀民賢子弟起取髙科當顯任者亦可與天下争衡矣獨於所謂名臣賢輔者二百年來未之或見能不於子龍之汝寧有望乎哉子龍尚不以卑𤨏為畧可也汝寧今之中原即古淮蔡汝潁之地其民果敢强毅可率之以尊君親上之風吾知子龍必能視汝寧之民如子弟而汝寧之民亦將愛戴子龍如父母矣如此則名臣賢輔之功業又豈在勢位間耶聊於是行乎卜之也子龍舉癸酉鄉薦屢試春闈乃就教職秩滿遷南京國子學正又秩滿始判處州既而以讀禮歸所至紆徐人咸惜之而子龍不以介意也兹當捧部符而去吾鄉之仕於朝者咸賦詩為贈予知子龍早且深是故望之最厚因以為序儼山集巻四十
