body:
  text: 儼山集卷八十二明陸深撰碑重修祖陵之碑奉敕擬撰朕惟我太祖定鼎于南我文祖遷都于北兩京並建屹立天地之中由是上世陵寢界于江淮間朕以倫序入承大統春秋霜露之感未嘗不南向而悽惕也其在泗州者實我熙祖裕皇帝祖妣裕皇后隧宫攸安暨我懿祖恆皇帝恆皇后德祖𤣥皇帝𤣥皇后咸此焉奠是稱祖陵去州城東北十有三里洪武之十九年修建如追尊制設官奉祠月日惟謹顧今歷嵗百五十餘矣雖萬靈擁衛王氣常然華夷之所向仰臣民之所敬恭者一日猶葺也肆豫冲人上膺天眷逺藉神休嗣位以來日稽典禮凡所以竭孝思於祖宗者九廟七陵以次興舉惟是帝業所基之域尤軫于懷曩撫臣馬卿具以上請㑹南京工户二部尚書侍郎蔣瑶唐胄相繼有言朕特下其事於所司議亟行之頃撫臣周金御史蘇叢以工完來告遂疏乞朕親製碑文以示萬世時禮部尚書嚴嵩工部尚書溫仁和覆議請從朕既慰既喜特賜俞焉朕惟天命有德以開一代之統必生異人豫擬於數百年之前潜光隱耀世無能名以為植本發源之地淳䝉沕鬱彌久彌敦然後聖子神孫託體繼志而千萬世之鴻業垂焉若我德祖懿祖發祥於熙祖育德於淳祖而我太祖龍翔電繞用成乾坤再造之功皇哉巍乎三代以還莫得而倣佛焉賁兹靈壤固東海之一源上林之一本也朕曷敢忘朕之子孫其曷敢忘朕之千萬世之子孫其又曷敢忘大工始於十四年之八月成於十六年之十二月仍舊而崇飾者凡若干遹新而備物者凡若干咸具在有司自餘則祠官領焉內外肅穆一代之制煥然用稱朕報本至意敬勒諸石傳之永永欽哉陸氏先塋碑深幼侍先筠松府君時府君年髙謝家私事矣長眉素髯每日晡酒微酣乃慨然發聲聲甚激越曰吾陸得氏姬周大聖人之後也當元之季皇朝之初興其陸氏之中衰乎而有兹餘慶府君矣雖然無屈不終伸必有興焉者其竹居府君之後乎乃灑泣數行回顧深曰汝小子識之餘慶者筠松府君之祖也竹居者筠松府君之父也已又述竹居府君之始遷縷縷的的深僅領略未知也後筠松府君沒且一紀深謬舉進士以翰林編修還拜先塋至是距竹居府君之葬又且若干年矣始克追敘遺言為先塋碑碑曰府君姓陸氏諱德衡號竹居其先汴人建炎南渡來華亭居華亭大有資積稱巨室今松城有興聖院浮屠其基蓋半為陸捨云餘慶自華亭出居于魏塘之馬橋北莊蓋陸氏之别業也門有巨槐株可十六七㦸列孔道時元亂未艾盜白晝行劫一日羣盜從東方掠一人來被掠者急抱槐不可解大呼求援餘慶嚴户外視賊勢張甚即從中大言應之賊叵測散去去抽刃劃抱槐者兩吻抵耳即不能出聲死死者有子踪跡得賊所訴寃直走金陵時太祖髙皇帝初混一天下凡民間幽隱皆得徑逹由是從中遣人急逮賊并逮餘慶餘慶逮時竹居府君才數嵗耳上多女兄行第七最末從以兩壻兩壻者陳某某也兩壻皆衣食餘慶家如兒賊既戮坐餘慶不救護殺人律謫戍國初法凡當戍先營工於石灰山者百草日滿乃議地發遣於是餘慶役日滿矣復就囚禁由江行二十里還金陵聽指揮二壻竊議今當詣謫所矣道里費盡奈何一人當先還經理之競欲往不決二壻竟不告而夜俱往明日餘慶失兩從者驚曰是固忘吾乎吾且忘之又安忍於吾弱兒乎吾又安忍以戍事貽吾弱兒乎及今猶可為也於是紿守者曰吾將臨江遺矢守者從之乃乘間牽守者並入于江江流悍急歿其尸竟不謫戍云蓋戍者既遣有地死即其子襲戍若死于未遣前未地即其子不襲戍令然也遂招魂葬馬橋今馬橋有塜蓋衣冠之藏云竹居既喪父家産盡為諸壻所據又不自安乃流落去外且三十又二矣來上海上海有章某者長鄉賦雄於一方一見竹居即竒遇之歸語其室曰若旅人視耽耽形倀倀貌不雄而揚殆有後者以吾女妻之決矣逾年産一子是為我筠松府君也諱璿又産一女後嫁為樊某妻竹居府君既受室既有子女即别産於章氏有田一㕓有屋一楹在黃浦之東由是始定籍於上海而魏塘之産棄不理矣獨嵗時持紙錢上塜一往來耳諸壻亦復分散他去惟陳某尚據故業在竹居府君性嚴馭內最有法而章夫人又有賢德能起家先若干年卒筠松府君既長見竹居府君竹居府君未嘗霽容也始來居浦東時鄉里共來持短長不相容竹居以好語慰遣之即來需索不如意立致惡語或隱几而卧他日待之復如故蓋長者云妾黃氏生三子曰璣曰珮曰瑾璣有二子珮庠生早卒無後瑾有一子惟筠松府君有五男子五男子復各有子於是始彬彬矣嗚呼惟竹居府君其道似陳實郭林宗清而夷嚴而不峻其光暗暗隱於農賈之間以再造兹家在易其屯䝉之際乎筠松府君以詩禮繼之未洽也古人有言德必百年而後興今固其時矣深大懼墜先人之志碑以示後之人以成我筠松府君也世系不載載在碑隂銘曰惟宣王中興分籍於六乃夷於編氓乃散處列國楚狂歌鳳漢賈以口辨紛逐代有顯士不絶踵躅惟昔江左以四姓著華亭啓封邦域乃樹自汴宋南渡言復我故土遭世多屯或不保厥户若水中淤不絶僅一縷烈烈餘慶殺身成仁以覆我後人惟先竹居誕集厥身皇皇四奔乃定於海濵若淤水未泄或未臻于淵淪逮我顯祖筠松力決其障手足並皴龍江東注惟禹之績匯為髙原抵厥𤣥宅順導五湖偉哉肖厥澤草樹鬱鬱合抱盈尺滄海東環九峯趨其西陌是曰陸氏之塋永寧先魄於惟遐哉筠松府君碑陸氏世稱長者至筠松府君尤有聲稱而家始大矣先民曰堯舜之世比屋可封蓋言不獨在朝周之初興詩人咏歌兔罝棫朴其氣機之開與惟我皇明太祖皇帝汛掃前陋淳和用集太宗皇帝生養休息之日以豐隆故永樂洪熙之間風俗最淳其君子焉淳博其小人焉淳朴渾渾乎蔑以尚兹惟我府君適逢其運天賦不羣博大而𢎞戰戰小心克儉克勤以興禮教敘彛倫蓋休哉懋哉至余小子深蓋二傳矣生遭文明之盛策名登庭獲接故老聆祖宗之休懿又為史官覩纍朝實録金匱石室之藏於是乎稽事實考治化得以沿流風觀俗尚府君豈不乘運而生也哉乃次其行實刻諸墓道之石自華亭來遷者曰竹居府君諱德衡配章孺人實生我府君府君生數嵗而章孺人歿自少倜儻竒偉弱冠北遊至梁而還丰姿峭岸言辭粹雅夙有林泉之尚遭時承康獲遂斯志嘗手植美竹髙松蔚焉成林中嵗著處士衣冠杖屨其下每曰古稱樹德夫德如樹久而後有託焉者此之謂也因自謂筠松云故今稱之曰筠松府君者著其志也府君慷慨任真以信義自持能赴人之急難卒然捐數十百金不吝也鄉里皆尊禮之既而縣令尊禮之府太守又尊禮之然卒不以干守令是時邑中賢豪有金彥英陸大用陸有常者凡數輩獨府君後起尤見重云人有侵犯府君者至再三皆怡怡然受之曰是余先人之志也夫物之負氣而來也甚鋭徒爾激之必折折必有受其傷者吾須其平耳當有愧悔之然其人有愧者有不愧者愈甚者甚者後罹于法人曰府君以是遺之耳乃嘆曰出之必反為之必受理有然者我固遺之邪君子聞之益賢其為長者是時郡邑稱長者莫先焉其於弟子若諸孫必教之修仕學曰吾未嘗學問粗足自解然人何可以不學吾又何可以不教學學未必其皆仕也倘有仕者亦余之志也每見古法書名畫三代鼎彛器必重購之曰古之人非有甚異於今之人也然其技能絶者何也夫心以造物目以行之手以從焉古之人心如目目如手其志専而事不雜吾固不得見古之人吾徒謂古人之粗迹而置之甚不然也尤精於鑒賞嵗月真贋望而知之是時號博古者必歸府君就正焉府君家居必雞鳴時起衣冠夜飯畢則列坐諸子孫於一室略叩其日之所為曰嵗有春春者天之神也日有寅寅者人之神也故春氣不發舒者嵗必儉寅氣不振拔者人必憒人憒於寅徒終日耳夫人日中氣盛有為必成夜者人之所息者也宜有以思之思之則善從生不善從而識吾於汝曹非徒苦為也凡天文有變異必謹識之曰人者日月五行之分氣也氣行於天而質凝於地氣變於上則質變於下顧其始也甚微然因是以為警耳其所居墻壁處必有日月五星字皆滿至晚嵗益有見於其分際云每好讀書然不深求嘗自謂粗解其於農卜雜家多留意焉然其行多合於古人之言不槩於道希矣嘗論起家不以勤勞者必弗久也無故之利必弗居也其論人物必質且厚者也聞人之有不善必弗言有善必弗輟諸口也跡斯以往其真長者邪是以采而著之嗚呼豈非乘運而生者哉夫繁言隱雅飾行亂俗孔子曰與其不遜也寧固又曰如用之則吾從先進然則時固為之所也非邪府君年八十有三卒其配尤孺人世家嘉定父諱德衡又里中賢豪有五男子曰太平定震寅女三嫁羅俊許容顧澄諸孫十八人涵瀾沔淮浙瀹沂深溶漢渭河溥瀚博洲汀汶以某年月日葬洋涇之北原後某年又啓而孺人祔焉后某年始克為碑云王侯去思碑此上海王侯去思之碑其文曰侯姓王氏名卿字良佐太原人也初有戎籍于𢎞農之衛遂以河南貫舉正德甲戌進士戊寅夏來令上海蓋自德州之德平遷也令上海幾三年有薦於朝召為户部主事去去而民思之侯敦厚質實所居不為赫赫名其治海也循循然因海之故而辦上官未之或知也侯處之淡然不疑無甚髙深城府人樂親附有以非意干侯者侯瞪目視面頳然變竟不一語其人流汗走故侯之去行李才數簏爾舉之若囊槁葉也民尤以是思之武廟南巡道路洶洶有緣以為姦利者侯抗諸邀索一不應第曰車駕至日供不供有令也何先事自擾為竟以安堵他郡邑有坐是得譴者縣糧長有曰􅍐頭􅍐頭者兜攬聚斂之首人也其人必且材技尖儇候伺人意隙中之大率官取之􅍐頭􅍐頭取之糧長糧長取之民民輸十糧長輸六七􅍐頭四三之嵗罔虛日侯悉除去曰此假一手取諸吾無取吾何􅍐頭之為每嵗里甲賦錢於田斂之官以充經費曰匱錢匱錢者官操其竒贏而出納之諸行市賣有折閲者有入空劵而待命者侯每公用先簿直之給而後入嵗杪羡餘且數請于上官嵗連災或出匱餘賑之民以不傷時疫流行侯操善藥作糜粥躬行鄉落遍給之小舟獨行侍御簡少民初不知為官也江藩犯順人心騷動侯諭衆曰江海潮汐非賊利也固無慮奈武庫何吾且有備乃以告訐人獲罪者許以鐵贖由是兵刃森然而民免科賦矣尤慎改作三年無土木之役舊民復蘇公宇廨舍嘗曰取足居止已矣至於出令則曰令何可遽出出必祈於行行必祈於久朝自為之暮自更之何以範民為故終侯之任若畫一焉雖胥𨽻坊甲之人亦以不譁嘗語諸學官曰松郡文名尚矣講習討論諸生所自致也規程以煩三博士恤其家禮其身令實主之何敢誣也㑹有計偕士窘於行者曰舉賢邑令責也舉而不能行焉用令為遂捐俸若干贐之士用感激乃若稀簡權幸抑遏刁頑理剔寃滯躬親淡泊一用清淨之治海俗幾為之一變其德逺矣深按上海古華亭也地盡東海耕織之力甲天下人易為富其失也僭奢俗喜相雄其失也囂訟禮讓之風少衰於曩日矣故海之政也廉慎儉信所宜先焉侯人品髙有得於誠意之學故言行咸鑿鑿而感應隨之彼巧飾以捷取者繫民之心果何如也又聞諸唐貢士周曰侯嘗有言造化所甚惡者財也所甚靳者福也吾得之而不能享吾享之而子孫不克肖多多亦奚用吾見以利貽子孫而竟破其家者何限也嗟乎侯斯言也豈惟繫吾海之思哉耆老胡錦等合數百人發私財市片石以請曰陵遷谷變此石永存惟侯以永存深故史官也槩於所聞良是故得牽聨書之碑樹之縣衙之右以長海人之思嗣鄭侯洛書曰可矣徐侯昭遂以告成事云儼山集卷八十二
