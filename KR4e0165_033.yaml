body:
  text: 儼山集卷三十三明陸深撰經筵講章嘉靖七年九月十二日經筵明王慎德四夷咸賔無有遠邇畢獻方物惟服食器用王乃昭德之致于異姓之邦無替厥服分寶玉于伯叔之國時庸展親人不易物惟德其物這是周書旅獒篇召公戒武王的説話明王是明哲的君慎解做謹四夷是東夷西戎南蠻北狄賔是臣服的意思方物方土所生之物昭示也展親是益厚其親的意思不易物不敢輕易其物也昔周之武王既克商適西旅獻獒召公猶以為非所當受故作此一篇書説道那明哲之王能慎其德故凡一取一與一喜一好無不致謹所以四方夷人聞之皆來賔服雖遠在萬里之遙近在封疆之外各以其方土所生的物來獻無一處不到然其所獻者乃是可為衣服可以飯食可供器用的並無竒玩異物若是那竒玩異物便能喪志所以不許他充獻獻亦不受他的此之謂明王慎德也明王既得貢獻乃昭示其德之所致頒賜于異姓之諸侯使之無廢其服亦效職貢寶玉重器則分賜于同姓之諸侯使之益厚其親親之道如此則是明王以德為物而不以物為物所以受之者但見其德而不見其物矣故説道人不易物惟德其物臣竊觀此章之旨要在慎德一言蓋言人君於此貢賜一事有德則謂之受方作福無德則謂之瀆貨斂財有德則人皆感恩圖報無德則人亦不懷其惠矣恭惟皇上敬一慎修勤民寡欲自臨御以來不寶異物不畜珍玩四方賦入惟充經費鷹犬狗馬之署盡行罷遣其慎德之至同符周武嘉靖殷邦二三師保時進召公之訓戒誠千載一時也方且睦親柔遠諸藩賜豫則有寶册冠服之儀皆萬金為貺持節之使踵接于途諸夷朝賀則有綵帛金楮之賚皆滿載而歸欵附之來歲無虛日所以同姓異姓飽德感恩可謂一芥重於九鼎矣雖然天子以天下之財公天下之用要有深仁厚澤以為祈天永命之道且如車服以命有德弓旌以禮遺才賑發以活窮困爵土以待武功皆所謂德物也伏惟聖明加惠嘉靖七年十月初二日經筵儲子曰王使人瞷夫子果有以異於人乎孟子曰何以異於人哉堯舜與人同耳這是離婁篇記孟子與儲子問答之言以見人性皆同的意思儲子是齊人瞷竊視也儲子一日告於孟子説道齊王素知夫子之道德而未能測識其淺深故使人私竊窺視以為容貌辭氣動靜作止之間果有異於常人否乎孟子遂答他説道我猶人也不過同得天地之理以為性同稟天地之氣以成形豈有以異於人哉非惟我與人同雖古之聖人亦莫不與人同且如唐之帝堯贊其聖則曰惟天為大惟堯則之虞之帝舜論其德則曰明於庶物察於人倫然即而觀之氣體形色亦猶人耳何嘗異於人哉孟子之言平易切近如此齊王聞之亦可以自諭矣臣竊觀此章所記一以見齊王之於孟子蓋有尊敬之心特無真切之見一以見孟子之在當時嘗懷行道之心不為過高之論至於堯舜與人同之一言尤見心學之要他日嘗曰人皆可以為堯舜至論之曰服堯之服誦堯之言行堯之行是堯而已矣夫同具口體同有言服而其所以為堯舜者乃在於此恭惟皇上真堯舜之主法言法服莫不尊親邇者制雲龍之劄諭創忠靖之衣冠其所以禮遇臣鄰者真有感孚契合之妙而無窺瞷覘視之勞區區臣愚目見而躬逢者過於孟軻遠矣豈勝榮願嘉靖八年三月初二日經筵萬章問曰人有言伊尹以割烹要湯有諸孟子曰否不然伊尹耕於有莘之野而樂堯舜之道焉非其義也非其道也祿之以天下弗顧也繫馬千駟弗視也非其義也非其道也一介不以與人一介不以取諸人這是孟子與萬章之徒辨論聖賢出處去就的道理割烹今之庖厨是也要是求否不然之詞有莘國名駟是四匹介與草芥之芥同言甚少也萬章問於孟子説道世人皆言伊尹身親宰割烹調之役以干求於湯而後得政此事果有之乎孟子答他説道否不然言無此事既曰否又曰不然者深著彼説之非也孟子既非世人之言乃遂言伊尹之道伊尹當夏之末造商之未興退而耕於有莘之野以樂堯舜之道堯舜之道何如以精一執中之傳致雍熙太和之治咏於詩載於書者伊尹皆有以歆慕而愛樂之矣自得若此外慕必輕故凡非其義也非其道也雖與之以天下之祿不肯一看雖繫之以千駟之馬也不肯一看其大者如此非其義也非其道也雖是一介不肯與人雖是一介也不肯取於人其小者又如此夫伊尹之道嚴於辭受取與之間無大無小一以道義而不茍如此豈肯以割烹要湯為哉臣按史記所書伊尹負鼎一事實出於戰國之流言此是司馬遷不學之過耳蓋戰國之人溺志於功名遊説之間以捷出於富貴利達之境故為此論不過蠱惑一時之聽以求便一已之私耳殊不知聖賢道義之方其待身也甚重其取人也以身考之書曰惟尹躬暨湯咸有一德克享天心受天明命由是觀之湯之得尹尹之遇湯夫豈偶然之故哉恭惟皇上不邇聲色旁求俊彥懋昭大德蓋已視成湯為無愧矣至於任相之道進賢之方皆取諸身則又等成湯而上之故自臨馭以來風動化行士大夫之間取與甚辨道義日重而爵祿為輕矣一德享天之效端有望於今日已上講章三首先公為祭酒輪講時撰進內閣副本輔臣以例詳定首尚書一章出少師楊文襄公一清次孟子二篇出少師張文忠公孚敬及少保桂文襄公萼獨援史記論伊尹負鼎一闕謂戰國之人溺志於功名闕之間以捷出於富貴利達之闕尹之遇湯夫豈偶然按此一段桂文襄公悉抹去先公以為不慊本旨遂於講畢靣奏語載公年譜中今詳定真稿俱藏於家而登集則依原撰以示子孫國學講章是故君子動而世為天下道行而世為天下法言而世為天下則遠之則有望近之則不厭這是中庸第二十九章亦言人道以終上章居上不驕之説君子是指那王天下者而言既居天子之位又有聖人之德故凡動作必能盡善盡美世世天下皆以為法則而不能違所謂聲為律身為度者是已措諸躬行是為法行天下後世便以為法度如規矩之為方圓也形諸言論是為法言天下後世便以為凖則如凖繩之為平直也遠近以地言若要荒之外四海之際這是遠者仰其制作之善皆有企想親就之意特以無階而可達孰不有望乎所謂戴之為元后者是已若其近在輦轂之下畿甸之間親承制作之善鼓舞涵育之餘皆惟日而不足孰敢有厭乎所謂親之如父母者是已夫君子之所以臻此者由其尊德性以極道體之大道問學以盡道體之細故能率天命之性以為修道之教耳豈有所襲取強為於其間哉雖然君天下者尚賴於學如此况其下者乎爾諸生來遊太學沐浴至教當天下一統之時際列聖作人之效果能從事於存心致知之學而有得焉他日列有職位陟居人上庶幾不驕以至寡過豈非同文之化哉尚相與勉之策問國學策問五首問明體所以適用故曰體用一源或者倡為有體無用之説果然與夫學術所以立體功業所以致用又似不同與三代而下惟宋室人才最盛韓范富歐並有功業周程張朱俱稱學術無容議矣豈有功業者或未究於學術而有學術者功業顧未盡耶請究體用之説問天下安注意相天下危注意將信斯言也則安危之勢既殊而將相之任亦異不知身兼將相者又何人與試論將相之所以異同諸生異日或有當其寄者乎不知以古之何人為法願毋讓問賞善罰惡天子事也孔子作春秋借其權以行事論者謂徒託之空言不知空言果何補而至今存也逮宋朱子之作綱目論者謂以繼春秋之絶筆然於漢書莽大夫揚雄死於晉書徴士陶潛卒固賞罰之事與不知於春秋之旨同乎異乎請著於篇用觀所藴問學術之正莫有過于濓洛關閩四家者果有次第與抑因其時之先後而為言爾先儒推程氏之學直繼孟子豈濂溪不得與於斯耶關中學者特尊橫渠及夫東見二程乃有臯比之徹至於西銘之作孟子以後未見豈洛學未之或先也惟我文公倡道考亭以繼諸子説者乃謂周東遷而夫子出宋南渡而文公生則又踰孟子而上之將所謂集大成者非耶其淺深之間正諸士據依之地明以告我問古稱備邉三策謂周得中策漢得下策秦無策焉不知上策者何代得之其策果何如也試舉而論之并論周秦闕之所以優劣者今之京師逼近諸邉烽火告警無歲無之不知古之策有可通於今抑今之制禦或不可盡泥於古諸生抑亦有自得者竊願聞焉山西策問八首壽陽問文武一道古也後世分而為二何耶三代而下稱漢唐文武全才可指而數與唐之太宗亦可謂文武之主矣興自晉陽其流風猶有存者與説者謂唐文三變唐兵三變又何其多岐也有變而之善有變而之不善何與諸生試著于篇盂縣問盜賊之興皆有所由自古弭盜之道不過曰撫曰勦二端而已一於撫與將至於廢法一於勦與或至於傷恩然則如何而後可昔人固有帶牛佩犢之勸亦有綵線縫裙之機不知果有得於撫勦之法與近者盂縣小警由於盜礦然山澤之利與民共之帝王之盛德也不有封禁則天地之氣或泄而招致之禍虞於此何道以處之諸生盂人也願以告我欣州問郭子儀之將功寇平仲之相業亦唐宋之冠冕也闕與評隲之可乎夫謙沖不伐善處魚李之間闕不優於相業與器量鎮定決策澶淵之役固亦長於將略也豈全才者自優於用耶人皆議其窮奢極欲又何與將務大者固不矜細也夫僭奢敗度小人處富貴者之所為而謂二公為之乎至今有藉為口實以濟其私者作俑之禍君子所痛也諸生盍論之以觀自待崞縣問董仲舒楊雄王通韓愈四人皆後代之大儒也其學術之優劣先儒亦既有定論矣試舉而評之願因舊聞以驗新得毋泛毋略代州問昔賈誼三表五餌之説議者謂之為踈後來和親歲闕往往祖其術而用之郭欽江統徙戎之論當闕見信既而劉石亂華其言無一不驗豈慮闕固難耶方今真保之間安插降人歲久漸蕃闕黠如劉元海者而後可以嘯呼也密邇闕能不為之過慮西北二邊歲被兵患朝廷闕下之力為備邇者卒伍單弱餉饋空虛萬一闕深入抑亦可為寒心鴈門雲中介乎兩間有闕士經心久矣必有善終之策願聞之繁峙問曾點浴沂風雩與明道吟風弄月茂叔庭草不除與子厚驢鳴自適皆有道者之事諸生試形容之五臺問儒先有言科目不足以得人果然否與其謂明經止於一藝不足深探聖人之旨然則聖人之旨舍經安求哉其謂賢良止於對策非有直言極諫之實然則直言極諫者豈有外文字耶我朝設科貢兩途以取士諸生必由此出今日之所學他日之所用者安在盍各言之定襄問闕科無善政賑飢無竒策信斯言也固將坐視其闕不知黃紙所蠲如何而民受實惠青州之政闕可舉而行與山西災荒極矣豫行欣代間數百里愀然在目伊欲免賦與則祿米日增邊關歲闕為告急伊欲賑濟與則倉廩空虛謀斷互異闕彌文於民何如也漢室半租之賜宋儒社倉之法抑不知可復舉乎否也諸生其昌言之將以聞于當道儼山集卷三十三
