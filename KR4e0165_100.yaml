body:
  text: 儼山集卷一百明陸深撰書京中家書二十首築城之説本出內閣吾無意必其間每見促我為之吾對曰老先生為我欲城一方居之我不若尋一城去住却其事如此此吾所以有遷居之計也近聞崑山有閣老城之説毁譽之可畏者如此吾兒以鎮靜處之可也十月草四日天子親饗太廟行古禮皇后亞獻妃獻列聖命婦助祭用幃幕列班於廟廷一代禮文之盛惜汝母之不及與也吾為之南望慨然可從容達吾此意以感動之十一月三日方在收束山陵之行黃驗封郎中親送改給追贈手本至朝廷曠蕩之恩祖宗豐厚之澤臣子希闊之遇友朋憐愛之情一時併具所謂喜極涕零不知為子孫者何以為報也寄回便可據此焚黃改題神主且汛掃東廳權作祠堂禮節請龍江翁斟酌之連日欲打發陸欽回有數事未定不曾起身昨日顧浩來陸劬繼至具知家中事心甚牽挂前書所謂世道正指骨肉間設謀欺害等事吾兒不可不長慮却顧也榛姪來告葬事已有定期但墳山營造吾平生精力盡費在此兼有勑命亭在誰敢輕為遷動祖穴只容五冢蓋地氣已覺難勝七房穴本是我房侵過葬定豈容再讓榛辭甚直若已葬過如禮如法此於禮律無礙若未成葬可再令榛房人到京當請明於撫按與守令自有主張也只有吾兒北來決須奉母一來待科舉過後有處若宦途留滯難處難處此吾兒孝誠宜熟思熟思世安在此計議最熟標甥能詳之三代誥命軸已送科挂號三月初間用寶制詞出於名筆吾甚愛其簡嚴厚重真王言也今日買得唐褚遂良所臨蘭亭帖有米元章趙子昻諸名賢題跋乃希世之寶也吾家有月半眠食二帖皆足為傳家珍玩知之知之家中纍嵗收拾書畫皆吾精力所在有未經裝表者俱是陸欽經手可作一箱帶來兼收買得舊綾錦來為裝束過蘇却與周一之顧倩得一表背人來尤有用須湯氏乃可向曽與一之商量者黃良式亦知之此等事既可以娛老亦可以為清人事故及之發行若趲得四月中旬到庶老幼俱安至囑至囑昨夜燈下周林陸俸到得汝書具知家下大小事務甚以為慰復以為念也老人旅懷奈何奈何聖駕南巡恐不能免俟有的信星馳歸報也吾意欲汝攜家來京此實為風俗薄惡乃出避地下䇿耳吾嘗細與黃標論量再三再四豈標忘之耶或不欲盡告汝也吾亦不欲盡告汝也汝姊意無他以為母親來此可以為樂可以養病兼風土比舊不同以此懇情耳無他無他汝意亦是孝情亦是孝情所謂異中之同也今因姚某回先附此家中事付汝處分待報後為動靜可也十二月十七日棄逺田是吾兒好事今聞有紛紛作弊者顧恐吾兒受纍耳所謂一法立一弊生要斟酌之糧額重輕吾舊牽兩鄉為中數今聞有司為均平之䇿不知料理得如何此是未齋之意今已當軸矣如丈量一事此公不甚知訣竅吾亦不曽細論也人傳海盜大發時荒衆貧理勢必有但未知事變果如何吾邑人貪利而無逺謀此地又有典當大鋪誠大盜之招也可慮可慮每在內閣二老便向豫説築城之事吾每以溫言解之曰待吾遷入一城中住却未齋應聲道明春盡室入京矣此道理當然吾兒決作奉母北上之計可也新太守是黃華字秀卿號紫谷其人天下之選也與新大尹想有更新之政一郡之福也知之知之松城買一房遷居亦是喫緊處吾兒未可付之孟浪也日下别有的當人回報前日陸劬回限在年內到家今打發陸欽回專為汝母子攜家北來計連夜為此不能安寢每日與世安計較此事亦甚難處就中不如來為上䇿上䇿汝母病後與汝離别必至苦思自能增病若一路作遊山玩水之行老人必然舒暢此可盡汝孝誠我在此孤旅晚年夫婦得共團圓亦是至樂若費用稱家力可辦不消求人况我亦常有痰火發作病隨年長官中人事并門戶無人可託吾兒到此事有統一只四方回書酬禮不至受纍况汝遂承國恩古人云為國忘家此乃大事忠臣孝子當勉力為之自餘皆可處分古人所以鄙懷土懷居也只有新婦妊身朝廷南巡二事吾兒宜斟酌之得發行趂早為妙十二月七日知均徭事出銀想有司立法之初如此不必告乞饒免且隨衆納銀自有公論也况我家三十年來蒙朝廷恩澤甚多所謂秋毫皆帝力也只奉府縣出銀亦是忠君報國一事吾兒知之知之昨曾與南原論定復附此得汝母書不欲北來亦是連次受纍慮怕奈何奈何只宜早晚寬慰不可勉強況恩典在冬至南郊方有文移往來起送却恐途中受暑熱新孫且不可逺行汝姊病後甚難甚難吾兒須打算與汝母離别得半年中可保無事只汝自來亦可也别有書牌樓扁字求諸能書者寫成一時技藝只如此學士是五品例不及三代蒙恩得此亦是千載竒逢正可標揭以示後人逺勝於盡寫官名聚於一榜耳昨與黃甥標詳論之撫按諸公曾有作興者俱要查題府縣學官題於左方牌坊既蒙當道作興亦甚感悅榮美之事世所難得須承以謙所議題扁如吾兒意無不可者昨與黃標論此只有一官分樹二三坊者若以一坊并寫三官恐非制度吾意只題為學士坊兩旁雕花補之或題解元鼎魁以足鄉會試似為得禮如何如何署書難得佳者前日寄來尺寸失寫官尺周尺雖令人寫却不知懸上大小入目如何須得人在樓下勾勒合式方可傳逺無錫王惠可請來一寫更與唐承宗陳起靜商量描摸入刻方得定當此等文墨事正吾兒少年日力可工吾恐不能逺制也努力努力此間時事早晚未定昨附奚學山今日未時詔下侍從還所回御札議亦下得旨知道了不至相左矣請乞三代誥命因吉日行關過吏部題本後即有手本先寄辦焚黃禮三十餘年辛勤得此兒輩當知所自也家事吾兒只照天理行去吾與弟輩安敢不加親愛亦欲教之以延門祚一味姑息非祖宗望我之意此亦自有斟酌於其間也吾兒一意奉母向學開貢行汝頭上尚有幾人也便中報來姚子明有母喪可為助銀米少致弔慰之意孫汝鳴拳拳之意吾甚感但老懶不曽致謝會間可致此意沈明卿海嘯歌甚佳邑中前輩少此作可為致意要當以古人自期待可也適有星士推汝命今年科場甚利使我老父母早見兒成名豈非晚福科場後汝母子欲歸何難也吾鄉近知荒歉盜賊難免一宜北來吾兒在家獨學未曽友天下士以充拓見識二宜北來近年北方地氣溫潤與往時不同且多明醫良藥汝母必喜三宜北來且早來謝恩恐負遲慢之罪兼吾老年有骨肉之樂此等吾兒又宜熟思之只小孫未宜出路娘子或未能料理門戶吾兒又宜熟思之不若作一併出路也且吾兒他日亦要事君獨身逺客亦要令家小習慣之不宜畏避也昨吏部右堂推上有旨再推蓋為宫僚不可輕動故爾如張甬川兩疏給假送母皆不允司直任瀚乞養病為吏科所劾吾與兒别整六年人情世態種種變改要須早來庶面議以為善後之圖耳吾欲告汝者筆不能盡百凡動靜俱付之老天途中不宜惜小費不可干人交際之間當以道義為主至囑昨日陸仁沈廷桂來得書知家中大小事體汝子母有北來訃甚慰甚慰吾為此舉却是為汝母病後衰年消遣優養以永日延年其次慮家中無得力仁義宗族可託汝子母難以相離雖吉凶禍福皆所不計豈念家事耶吾老來倚靠朝廷聖明所享所遇皆過分過望至於家産之厚薄用度之豐約此是吾兒事若其處分料理久已付之吾兒吾不與也吾兒不必過為避遜之詞惟是汝娘子娠孕一事殊為酬酢難處耳適與世安計較須是趂早入京或多置知事老媪一二人或在嘉興蘇州别顧一座船備用如何如何一則天熱二則科場近不可遲疑也崔東洲已升太常寺卿掌國子監知之近日吏部之推不點者想聖意留為日講之地汝到此自知吾老年只求清燕耳聊示汝知兼向母親處説知夜來感寒作吐瀉殊無苦知之此間只聞汝母子二月草七日起身不見有端的消息懸懸之望日夜在心又聞道路飢荒冦盜復以為憂也但要謹慎小心歇泊處務須支更少睡最怕汝母驚動凡百都付之老天至囑至囑閘河水此時想有又須計量炎熱熟思審處今差承差胡承宗同沈廷桂接來承宗是山西舊人頗實落故用可善待之途中行止事宜悉已分付汝再當駕馭之沈廷桂愚狠不中當事只我家人無一人可託者奈何奈何見面時細商量也吾身比往年覺得病少近日講經筵兼講衍義上命至榮後來恩典亦重平生願望而不可得者賴天地祖宗無以為報所惜到手遲覺費力也汝母須左右順適要令忘憂至囑至囑儼山集卷一百
