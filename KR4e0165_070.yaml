body:
  text: 儼山集卷七十明陸深撰墓志銘九誥封太恭人顧氏墓志銘徐太恭人顧氏以子洗馬階貴封實贈中順大夫江西按察司副使思復府君諱黼之繼室也以嘉靖十九年庚子六月朔卒於華亭之里第饗年六十有八云己亥嵗今上皇帝建儲宫妙選中外直諒名實之臣充賓寮時階奉璽書提督學校自江西召為司經局洗馬兼翰林院侍讀仍以四品階秩供職是秋北上太恭人送之郊亭命之曰聖天子録汝于罪戾之餘躐處清華汝但盡心事事老身幸能飲食毋我念也今年春再遣季子陟學于洗馬牽其衣曰為語汝兄汝姊善事我幸無恙已乃撫其背曰汝好取科第汝兄儻亦轉遷年時歸為捧一觴正我七十夀爾及階自長安聞訃與陟相對舉其辭哭甚慟則又哭曰母報已矣君恩咫尺可覬也即具疏以情事請上特允之賜祭賜葬蓋殊典云既乃奉太史趙君景仁之狀問銘于深按狀太恭人系出浙之鄞以有戎籍于松江所故今為華亭人父振宗母駱氏太恭人生有異稟謬以星家言其不宜子遂不欲嫁行年三十始歸思復府君府君已再娶曰吾有子若女矣術言果然然亦何傷吾聞難嫁女必賢庶以母子女也是時府君丞宣平初娶于林生子曰隆生女嫁葉蕙繼娶于錢生一女嫁趙輔太恭人入室果能視前産如已生府君又有側室遺女亦育而嫁之蔣乾猶子六人復撫視之無間府君自宣平移丞寧都皆迎母就養太恭人奉姑惟謹丞時出署他縣或奉檄理公務别所十九在外太恭人孝養姑愈謹又躬自紡絍以助丞亷是生洗馬次生一女次生陳次生陟而術家之言窮矣鄉人多以為美談洗馬風猷凝逺為諸生時已脫頴衆中有天下之志府君目存焉因母喪自免不復遊宦家具益落太恭人佐以儉勤至脫簪珥殆盡府君充然若不知也嘉靖癸未洗馬進士及第明年府君考終以編修守制還人以私干者太恭人率從中沮止之蓋不欲以家纍貽其子云既終制還朝以編修論輔臣建革非便謫為延平推官稍遷為同知為僉事為副使太恭人咸裕如也先是府君有妹歸姚氏者寡太恭人亦有姚氏寡姊皆老而貧太恭人胥迎歸與共寢處衣食之甚恭二媪謝再四太恭人慰之曰吾見吾姑如見吾夫吾見吾姊如見吾母爾石氏姒暴卒太恭人有美材夀器即輒與之其仁厚類如此他如訓愛內外子姪各有成立族人待以舉火者尤衆蓋徐氏之賢母云以成化癸巳十二月三日生兹將以卒之年十月二十七日祔思復府君蔣涇之阡子男四長隆娶何氏次即階娶沈氏繼娶張氏次陳早卒次即陟娶宋氏國子生女四嫁施文治者為已出蓋奉以終養者云孫男四曰琛曰璠曰球曰環環以後陳孫女三嗚呼女德繫人家世大矣諺稱蘆花絮事託諸大賢而鶴燕之夢實兆宰輔信然然則太恭人完養厚畜殆天相之以昌徐宗洗馬君之所為發祥而託始者夫豈偶然也哉是宜銘銘曰大器兮小官貞女兮嫁晚二美兮匹難天作之合兮澤逺蔚斯丘兮且吉完視我銘詩兮琰琬太安人王氏合葬墓志銘皇明正德初有死忠之臣曰禮科給事中郤公夔字舜臣嘉靖初今上特賜褒旌事具黃太史碑表中太安人即公配也姓王氏父諱政平定守禦所正千户母嚴氏太安人生有異兆簡默沉靜及笄歸公以儉勤佐公登科第官京朝公既死事邊鎮太安人㩦長幼纍纍西歸忍死竭力以經紀郤氏之家理荒修廢凡三年而始定又數年而略備于時長子元深始仕為夀州守仲子元洪始舉進士屬官司徒旋改御史得授敕進封中外迎養太安人若少慰然既而元深歸自夀元洪歸自秦乃率二季清徹左右承顔太安人益歡戊戌之春手自移菊顧而歎曰萌芽既生本根就腐物理則然人可知矣起去如不樂遂感疾以嘉靖十九年庚子十一月七日卒於正寢享年七十有九四子二女孫男八人孫女九人卜以明年二月二十日啓給事公之藏而合焉禮也元深手自為狀遣弟元溟走京師問銘豫昔有事於晉陽識夀守文淵又自秦入蜀識少參文範復憶往年初登朝時逮見給事公誼不容辭嗚呼忠義事關祚運而感應必至者天也我朝養士有禮至於孝廟盛極矣是故給事之節以報國也太安人之造郤以報公也子孫多賢以報太安人也豈非天哉豈非天哉法應銘銘曰國有忠臣室有貞婦家有慈母於人乎何負是曰不朽合而封之昌厥後中憲大夫湖廣提刑按察司副使張公墓志銘我孝宗敬皇帝臨御十有八年養成忠正直諒之風士大夫不以言為諱以不酬所言為恥凡臺諫必極天下之選布列有位蓋肅如也于時張御史鳴鳳則在南臺武廟初權姦擅政鳴鳳等咸切諫有中旨下詔獄械逮至京集于闕下杖臀人三十凡若干人而上海實有二人焉曹御史閔與御史鳴鳳是也已皆重創幾死皆幸不死民之深時出候才相顧涕泣而己庚午秋逆瑾伏誅有詔敘復稍遷湖廣按察司僉事尋升副使以父喪解任服闋仍補湖廣今上皇帝既自興邸起適公以繼母之喪還遂有寶鏹綵幣之賜者再蓋宜有受知焉而公已不及矣嗚呼公之於時也抑亦遇而不遇者非與嘉靖元年三月二十二日卒於苫次享年五十有八深方在疚聞而悲焉卜以明年十二月六日壬寅葬于龍華祖塋之次其孤寶仁等奉遺言以墓石見託衰絰走百里拜且泣曰先君之棺已蓋矣世果有定論耶定未定惟執事戟手曰此先君志也言已又泣深慰且辭焉則又泣深知公淺嘗聞徐參政讃道公吏永康精甚己卯庚辰之際京師見前文選萬少卿鏜稱公有治才都給事中邢君寰謂湖湘之政公為最蓋當是時巳有飛語聞于朝然坐是竟白諸君以深鄉人也質之然不謂公止於是也已乃按狀狀出金華推府張公世和世和名鳴鸞公之兄也當有據乃志之志曰公姓張氏諱鳴鳳字世祥上海人也别號梧岡子狀稱張之先出南軒後自汴扈從而南因家上海有諱楷之仕元至提舉楷之生海運萬户達之達之生詢詢仕我朝至貴溪知縣貴溪生海寧教諭復吉教諭生雲林隱君述雲林生紹字宗道别號晚節冠帶監生贈刑部主事公之祖也刑部生應天府丞諱黼字仕欽别號養恬丁未進士配尹氏贈安人實生公公生未浹旬而尹安人卒鞠於大母以成少頴敏與世和同領應天乙卯鄉薦登丙辰進士知永康自永康召為南京山東道監察御史巡歷江上下咸用安濟再赴湖廣時會使闕二年皆公署掌憲體明慎按撫諸公交薦章六七上四川巡撫都御史胡公世寧特疏其有撫綏御衆之才云武義有殺人獄久弗決當道自永康檄公治之夜夢緋衣語之曰得王十一乃了厥明物色其人獄遂成人咸神之公之器幹多類此惜哉竟止於是也嗚呼初府丞公以公貴進階亞中大夫母尹氏加贈恭人繼母瞿氏亦封恭人公事瞿務得其歡心撫弟有恩曰毋忤吾母也娶余氏封孺人稱善相子男五長寶仁娶葉氏次寶忠娶沈氏次寶訓娶朱氏次寶賢又次寶臣側室林氏出也女二長適錢萬選次未行孫男二孫女五嗚呼愛憎毁譽之情善惡是非之故同行而異理古人所以有毫釐千里之歎也惟臺諫執其公惟鄉邦存乎實公於權則必行近於實則必信此世所以大同孔子曰斯民也三代之所以直道而行也深於志公重有感焉乃銘之銘曰孔云必達在家在邦捐軀赴國世亦少雙孝弟之言罔間內外目覩龍飛事豈有待待不以年拊髀懷賢古今所歎秉彝則然千載萬載惟公惟德有考厥終視此銘石將仕郎景寧簿雪莊韓公墓志銘公姓韓諱綸字緡之别號雪莊上海人也韓於上海為舊族至公始以文學登進初居黃浦之東華漕漣之上有諱福四者生盛盛生允恭允恭生彥英彥英生呈呈生十男子長諱永常號槐隱槐隱始拓市居謹願長厚修髯白晳如畫以輸粟授品官衣冠偉如也槐隱實生公母張孺人公少有大志為邑弟子員有聲成化丁未例貢入國學卒業家居時槐隱年高家族豐衍命諸子各理家政乃就公養養克以志頃之槐隱公張孺人相繼謝世公喪葬盡禮廬居墓側因名雪莊遂以自號士大夫題風木遐思卷表之正德丙寅謁選天官授浙之處州景寧縣主簿景寧山縣也險瘠而民獷因礦而盜公捕其尤者論法餘撫諭之皆貼服為良故多虎患公設法以弭之縣每闕尹即公署篆以廉勤聞時鄰縣有殺人獄三人悉論死處守梁公檄公鞫之公立釋其二曰法抵死者一人耳處屬十縣多宿逋御史按者委公辦理甚嚴公歎曰是徒驅窮餓於溝壑無益也曷若俟秋成帶而徵之乃具申白會有詔蠲焉幾滿兩考諸當道並皆奬勞偶以濕疾懇請而還民甚思之既還再營雪莊以居稍稍搆亭榭闢園囿植竹種菊與鄉士夫結晚香之社觴詠為樂優遊其間幾二十年以嘉靖丙戌十月二十日卒享年六十有九配談孺人諱原靜同里望族明慧孝敬及笄歸公閨門穆如也治家種種有條緒尤以勤儉慈惠不妬聞從公於景寧內助為多及歸道嘉興以正德辛未五月念八日卒享年五十有二兹卜以某月某日合葬於趙溪先塋之次惟公出饒裕之家際豐亨之運仕宦雖不甚顯非茍碌碌而尤以早退為賢平生謹畏重信義繼室費晚舉一子甚愛之憫其弟維之無後也即命為繼教子孫皆有法韓宗益大公可無憾矣子男一恕娶顧氏知浙江都司印倜儻有文女三長適縣學生余繼瑞次適山嶽次許嫁趙希忭費氏出也孫三藎臣國子生次鼎臣次俞臣豫時將為延平之役藎臣具狀以請希仁送豫至武林要豫為銘銘曰仕以達云達豈盡仕一命茍共是曰致理嗟嗟雪莊况也履止有淑者媛以續以似同穴而歸兹謂不死阡原鬱鬱載蕃後祉敕封承德郎南京祠祭主事趙公墓志銘公諱山字天秀姓趙氏曾祖諱鑑祖諱瑜考諱清妣施氏上海人也公少孤長而玉立豐頥秀幹有治才能振起其家義授散官衣冠峻整一時上官往往器之郡邑有大役輒以委任敏而趣辦喜從賢士大夫遊家居黃浦之上築精舍其濱蒔芙蓉映水每花時望之若繡幄錦城故號東浦因以命子憲讀書其間時往課之觀潮汐往來乃悟盈虛消息之理故持身淹雅人稱之曰東浦翁云憲有聲文場遂起鄉科登嘉靖乙未進士丁酉選授南京禮部祠祭司主事戊戌聖天子推恩詔下竟以憲官授敕封鷺繡銀章光動閭里人以為此東浦翁之食報也既而就養南都睇城闕之巍峩覩江山之佳麗又聞諸當道大人巨公論議歸益務謙抑儼然儒宗長者所謂始笑終疑卒乃貼然服矣庚子憲遷儀制郎中得考一滿便道省公於東浦之上時已徙居浦曲少南因得寒疾每促憲赴闕曰人臣之義以勤勞見忠吾老矣尚有厚望焉辛丑憲行行月餘而公卒於家享年七十有三憲奔歸月餘亦卒人共惜之憲子逢吉煢然治兩喪並葬而為公乞豫銘公豫韋布之交而逢吉則外孫壻也誼不容辭逢吉手自為狀能道家世之詳且拜且泣曰吾大父性至孝心地坦夷不設城府每當是非曲直之際則務公言故人多忌之隂中以事搆成大釁破家營救得免嘗歎曰吾受毒踰時則已彼施之者能久貼席乎且我常受彼常施天之道固昭昭乎昔吾父之未有子也往禱三茅君歸取家衆斗斛悉毁之曰我得孫矣已而逢吉生豫聞其言皆鑿鑿可志公蓋不但食子之報也已今卜以癸卯冬十二月三日葬于楊塘之隂配吳氏系出清門淑慎善相與公同日受封為安人子男一即憲娶喬氏息女二長嫁周易早卒次嫁顧鳴鸞側室高氏出也孫男二長即逢吉娶王氏次迪吉孫女一嫁陸文熺豫仲孫也嗚呼公真儒宗長者哉宜銘銘曰澤之長兮江流湯湯風之逺兮其人不亡手所樹藝華國發祥其胤克昌兮曰此封君之藏儼山集卷七十
