body:
  text: 儼山集卷七十一明陸深撰墓志銘十敕贈安人孫氏墓志銘故蔡安人既成葬矣始及贈典既成贈矣始克志之蓋誠有待也哉於是上海陸深得按武選汪君文盛狀書之將追而納之玄堂之右志曰安人姓孫氏封户部主事河南商城縣學訓導蔡先生諱貫之配也孫故崇陽望族居里之橋墩港世修隱德有諱賢者實生安人安人始生嶷然殊異氣柔而聲和五嵗能讓七嵗知戒九嵗精女紅讀孝經小學列女傳都通大義年二十四封君先生受于孫氏之廟而室之封君出名家少即聰頴過人蔡處士府君諱英愛之為擇婦必孫氏女既成禮中外交賀先生方為邑弟子員遭嵗惡家遂中落安人脫簪珥服飾以佐賓祭經史之費罔德色焉封君讀書安人紡績俱入夜分或至達旦積勤本儉以復家幾中興焉時處士府君與太夫人鄉居距十里許安人問安歸無間朝夕得甘旨必先奉處士府君嘗曰相兒子他日亢吾宗新婦之力也𢎞治戊午封君先生始循例貢至京師授職商城安人從之數年縞衣糲食晏如也太夫人年八十餘留崇陽安人每一思之輒數日不懌歸省視者至再既沒終具悉出潔鮮不倚辦於妯娌既葬號慟思慕若不勝焉僉曰孝婦云性淡泊尤不喜飲酒好周人之急了無後望不欲子姓析居綜理家政老而不倦孤姪祿與玉安人撫之人不知非已出也卒以有立下至臧獲有過必曲為掩覆無喜怒之形以正德十二年十月十日終于正寢夀六十有八明年戊寅二月草七日葬于青山祖塋之次禮也子男四長曰朝朴茂務農後安人闕年卒次曰翰縣學生次曰乾户部員外郎僉浙江按察司事季曰幹縣學生息女二長適闕次適闕孫男八孫女五初僉憲乾成進士于京師即為迎養之謀未數月遽以訃去既禫還朝列職卿省適今上皇帝入繼大統覃恩宇內亟有褒贈之錫安人孝敬慈惠之報獲於天者異數已若是矣僉憲文學器識淵懿明粹雅負經綸之望翰幹諸季俱以經術需次顯榮方將徵諸人事殆有餘祉焉應法宜銘銘曰古稱善相獲良惟艱况也宦成從以間關亦有善教思食其報鸞封鳳章泉壤斯耀運有蚤莫德則不朽惟善之徵十索而九嗟嗟安人尚有餘慶我銘徯之陵谷為證承直郎汀州府通判宜亭劉公墓志銘公姓劉氏諱兖字復之别號宜亭其先汴人有諱亨叔者始占籍華亭亨叔生仲禮仲禮自華亭遷上海今遂為上海人仲禮生文中世修隱操文中生鈍贈奉政大夫真定府同知公之祖也考諱玉别號靜齋義授散官妣王氏實生公資稟頴拔丰神和雅倜儻有大志受易于鄉先生陳晚莊造詣卓然有科第之望屢試不利成化間以例貢入國監時丘文莊公為祭酒甚嚴於諸生少許可見公文翰加賞拔焉注選還家餘二十年孝友之風動于宗黨癸酉始上天官第入優等授汀州府通判甚有政惠巡按御史張公委以糾巡之職汀故反側郡也公謫姦撫良四境咸安適江西盜起閩廣騷動調浦城兵素稱難制守巡官檄公領之撫馭有方軍民兩便巡按御史胡公深加奬勞自是勞勩遂感嵐瘴猶裹疾視事不怠越嵗疾再作乃乞謝政當道者慰留再四竟不可歸與鄉士夫作晚香之會觴咏為樂者數年以嘉靖二年癸未二月二日終于正寢上距所生天順戊寅十月八日得夀六十有六云娶山氏舊家淑德先公數年卒卜以是嵗冬十二月十日丙午葬于方濱祖塋之右啓山孺人之封祔以側室錢氏而合焉子男二長兆元績學承家廩膳生娶瞿氏錢氏出次兆先胡氏出女四談斗曹寶諸茀其壻也一未行公故名家也潤澤演溢淵源殊矣而明秀豈弟公實有焉筮仕大郡遂克樹立而引年勇退蹈止足之戒殆今之完人者非耶尤善筆札工為詩早侍遊宦多聞見之益杯酒談笑綽有風致不見有蹙迫矯拂之態今莫窺其際也初公有母兄充時從父坦齋先生命為後後坦齋有子而充早世復歸承大宗焉終身事坦齋父子也坦齋卒服心喪者三年人尤以此重之深與公纍世㜕姻髫丱時辱公為忘年之交知公為深兹兆元涕泣奉狀以請乃志而銘之銘曰赤劉啓祚代有聞人清門宿望奕葉維新嗟嗟汀州脫頴絶塵既文既史惟子惟臣才以兼濟夀以成仁萬古者名百年之身孰是完歸嫓美先民先民遺訓惟德有鄰以昌厥後孫子振振我刻銘詩此石不泯敕贈文林郎監察御史王公封太孺人齊氏合葬墓志銘公諱振字廷舉年六十有三以正德十三年卒葬大梁之東郊越十有四年戊子是為嘉靖之七年今上皇帝大推恩典始以子琇貴敕贈文林郎南京湖廣道監察御史配齊氏封太孺人太孺人受封之六年年七十有三以甲午十月八日考終于正寢時琇以江西按察僉事捧表入朝適還便省得視殯殮人以為異數云卜以明年乙未四月某日葬于邊村岡之東野遷御史公合焉禮也深方為關輔之役道大梁嘗與僉事同官因往弔焉僉事拜且泣曰昔子贈我也知我有老母在也今吾葬母也而不虞子之遽來也是偶然耶乃揮涕指庭下所琢石曰必以是為託詰旦具縗絰造館授狀深慰而諾焉按王之先出下邳世居皮家渡口有諱仁者隱德元世仁生興興從我太祖髙皇帝起兵編伍寧國衛太宗入靖永樂間調宣武衛遂家于汴興生順順生通通娶戴氏生丈夫子其仲即御史公也是時同衛人齊能娶王氏實生太孺人年十七歸公公性嚴毅於人不茍合朴直有古風通解文義尤善筆札成化間太監藍忠鎮守汴亷知公乃出令免公事事而事文書焉藍本靜安公亦樂事之草餘年無與為比會藍卒而劉琅者至矣琅貪暴甚公甚憂之託疾求退不得退歸謂齊孺人曰將不與禍會乎吾且毒吾兩目庶幾脫此孺人止之曰何自苦乃爾彼左右人可請也公百計通之果免歸琅敗凡佐琅者俱敗而公迄無他孟兄威早世遺孤環珮公撫之如已子均其財産使各得所待諸弟釗賢鋭恩義曲至咸有成立云公喜焚修晨起必誦內典數卷而止夜必瓣香祈天無間寒暑初公家甚落孺人來歸佐以紡績每勸之經營于外而內事一切任之事舅姑飲食必躬致每向公作好語曰吾家世寧終賤貧乎須教諸子讀書為衣冠流時僉事方七嵗適在旁孺人撫其頂曰不尚有是兒乎乃延師擇友日日課之既而公寢疾以卒孺人泣謂僉事曰汝父棄汝早以貧遺汝吾恐纍汝學當為汝謀使裕由是僉事得一意向學遂以科第起人以為賢母云子男四長玠娶侯氏次瑜娶吳氏次琮娶陳氏三子皆先卒次即琇娶何氏繼娶李氏孫男八曰紳曰祿曰爵曰化曰中孚曰中立曰中行曰中逵孫女二曾孫二惟太孺人始終以道誼相御史公起家身食僉事之報銘在是銘曰治世尚文亂尚武革武從文翁與姥誕育季子文中虎王氏日昌天所祜兩美並世難縷數始離終合穴吾土式車奠椒孰敢侮邊村髙原高膴膴太史作詩殿萬古竹溪韓公夫婦合葬墓志銘嗚呼是為韓從事竹溪之墓顧孺人虛左合焉藎臣自判荆門州奔還哀慕切至治喪如禮以告豫曰先人之葬已成卜矣非舅孰銘孺人豫先姑女也故藎臣謂豫為舅而竹溪視豫外兄也嗚呼豫尚忍銘吾竹溪耶竹溪諱恕字希仁少有美質秀偉頴敏學進士業便通已乃棄去例授浙江都司知印從父雪莊公命也雪莊仕主景寧簿母談氏韓故上海舊族代多長厚世系具豫所撰雪莊墓志中竹溪易直簡修和厚醖藉言行皆衷不屑屑於聲利家遂中落雪莊在景寧幾兩考每嵗一往省行李道萬山中蕭然也雪莊歸談孺人道卒竹溪生事死葬竭力以濟人稱其孝教子親自課程人稱其嚴中嵗乃闢園圃構亭榭時與賓客徜徉花間當其意興所到奕碁染翰尤為灑落人稱其逸晚授章服衣冠偉如雖從事資勞亦復棄去也年六十有二以嘉靖壬寅五月七日考終于正寢孺人諱愛梅父省軒顧公與今御醫定芳同母産也而長莊順淑慧夙嫺禮度廣南太守草堂先生鍾愛之擇壻得竹溪既歸孝敬勤儉為韓宗倚賴和妯娌睦宗姻御羣小曲有禮意談孺人卒費孺人繼之孺人左右奉養必得其心人以為難而竹溪之孝益光矣初雪莊有弟維死無後雪莊以幼子慈後之慈於本生欲兼其業竹溪以為法不應爾義可也竟割産畀之會竹溪有從兄恩亦死無後孺人抱仲子國以與竹溪曰是不當後乎母煩再割也邑人兩賢之得年四十有八先竹溪十六年卒實嘉靖丁亥之九月草九日也竹溪感孺人之誼終身不娶以報至是大封焉禮也子三長藎臣以太學生授濟南經歷遷荆門州判淳謹有治材娶潘氏次國太學生出後娶沈氏季俞臣娶潘氏孫女二孫男二宗道宗周嗚呼豫家海上數世矣與韓顧聯姻藎臣嘗學於豫每侍京邸御醫則同朝班固骨肉之託也歸將託竹溪以老焉今已矣豫又安忍不銘吾竹溪耶銘曰生以禮胄配當其偶是曰夫夫婦婦克昌厥後以貽不朽有眠牛首與載同久儼山集卷七十一
